body:
  text: 第四十回禪師坐化證菩提三主雲遊成大道詩曰逝水滔滔不斷流浮生寄這似虛舟垂髫童子霜堆鬢矍鑠禪師雪灑頭回首功名成大夢俯思榮辱付浮漚釋歸極樂玄驂鶴萬古傳揚姓字留話説隋煬帝被突厥圍困於雁門關衆皆危懼帝遣元帥虞世基率精兵開關出戰大敗而歸煬帝大驚詔天下募兵守令勤王當下屯衛將軍雲定興知天子有難聚集豪傑起軍發馬赴邊塞救駕驚動一個年少英雄年方十六聰明勇決識量過人前來應募卻是太原留守大將軍李淵之子李世民來見雲定興獻策道突厥敢舉兵圍天子于雁門必謂我等倉猝不能赴援今白晝則引旌旗左出右入東進西退令數十裏不絶黑夜則金鼓之聲相應照會呐喊不息猾虜必疑援兵大至望風而適矣雲定興依其計果然突厥疑有大兵漸漸散圍不敢逼迫不半月間各郡救兵皆到突厥聞知解圍而去煬帝方得還朝大賞衆將自此李世民之名四海盡知英雄欽服李世民見天下大亂盜賊滿前已知隋室將亡陰有安天下之志輕財養士結納賢豪有一謀士姓劉名文靜又一宮監姓裴名寂旨與世民相善密議大事劉文靜道今主上南巡江淮李密圍逼東都劉武周已據汾陽宮群盜殆以萬計當此之際有真主驅駕而用之取天下如反掌耳太原百姓皆避盜入城劉某為令數年盡知豪傑一旦收集可得十萬人尊公所統之兵復且數萬一令之下誰敢不從乘虛入關號令天下不半年間帝業成矣李世民大悅對父李淵道主上無道百姓困窮晉陽城外皆為戰場大人若守小節下有盜寇上有嚴刑危亡無日不若順民心興義兵轉禍為福此天授之時也李淵大驚道汝安得出此言取滅族之禍也次日李世民又道目今盜賊日繁遍于天下大人受詔討賊賊可盡乎願大人早定大計李淵笑道吾夜間思汝之言亦大有理今日破家喪軀亦由汝化家為國亦由汝世民和裴寂設計暗囑宮人張尹二妃設宴宮中側殿待李淵酒酣二妃擁抱同臥龍床恣樂通宵次日李淵怕事露定計殺了副留守王威高君雅二將遂作符飭內宮監庫物賞軍改換旗幟軍聲大振先據晉陽又取長安開倉庫賑濟窮乏改立白旗聚集文官武將大小軍士宰牛殺馬祭賽天地諸神誓衆於野作檄文遍達各郡又差衆官迎接代王侑即皇帝位於天寶殿改元義寧元年大赦天下時隋煬帝駕在江都遙尊為太上皇李淵自立為唐王都督內外諸軍事此時宇文化及宇文智司馬德勤裴虎孤行達等扈煬帝在江都聞知長安李淵有變自為唐王心下不平姦黨合謀于大業十三年夏四月弒煬帝于玄門之側立秦王浩即皇帝位探馬報到長安李淵大哭聚衆官發喪挂孝望江都遙祭當下諸大臣謀士皆有尊李淵為帝之心稟于李世民世民與劉文靜裴寂李靖謀定差文武官員隨司農少卿裴之隱請詔此時恭帝年幼即令蕭造草詔願禪位於唐百官奉李淵即位改元武德元年改郡為州改太守為刺史立建成為太子世民為秦王元吉為齊王傳檄諸郡共起軍馬伐宇文化及化及敗績被李世民斬之傳首長安示衆天下稍定消息傳入西蜀杜伏威升殿聚集文武商議查訥當先奏道老臣近聞唐王李淵禪了隋朝大位目今又滅了宇文化及其餘諸國或降或滅已聚勇將千員精兵數十萬謀臣智士皆傾心事之眼見得天下十有七八矣況兼太原分野王氣正盛紫微星光彩倍常正應昔日林禪師之言主公亦須預備戰守之策又聞李公子世民仁明英武識量過人傾身下士豪傑景從有帝王之表主公不可輕視之也杜伏威道孟子雲五百年必有王者興亂極生治自晉世祖受禪以來五胡亂夏繼以五代兵戈疊興戰爭不息群黎塗炭四海淩夷以今度之將及五百年矣上天豈無好生之德忍使生靈久困水火哉太原帝星朗朗林太師常言此地必有真人即此推之李世民非命世之主而何孤弟兄三人自十六歲起兵屈指五十餘年感軍師神機妙算百戰百勝初受齊後主之恩次感隋文帝之德以一介儒生而位居王侯食祿五十餘載富貴久而且極人生快活滋味不過如此吾聞位高者責重貴極者身危戀戀於此禍基不遠意欲遨遊方外寄迹煙霞辟穀延年訪真修道卿意以為何如查訥道主公何出此言大丈夫翹首雄飛豈甘雌伏太原雖有真人大事猶未可必主公鼎足三國戰將數百員精兵二十萬進則可以橫行天下退則可以扼守西蜀唐兵至此三國互相救援蜀地必能保全設或天命在唐不過奉其正朔納款歸命如亡隋故事則子孫可以永保富貴主公何故思及方外之事使英雄氣短謀士志消人心一解大事去矣老臣切以為不然杜伏威道軍師之言雖善但大數已定非人力之所能為今以天下事度之世民應天順人仁義播于四海大物必歸唐主孤若秣馬厲兵與之抗衡必蹈烏江之轍如稱臣納土委身事之又非忠臣不事二主之心豈不貽笑萬世須待林太師西秦王萬壽王相會共議良策君臣正商議間忽近臣奏萬壽爺有檄文到來杜伏威拆開與查訥同看上寫道即今三月二十五日乃林太師壽誕屈王兄車駕早臨同往山中奉祝專候再拜杜伏威道若非張三弟預達則幾乎失忘師爺壽誕隨差官備辦禮物同軍師查訥世子杜世廉即杜應元之子勝金姐所生乃天定王之弟時勝金姐已故因夫人舜華只生一女無嗣立為世子老將尉遲仲賢隨從杜伏威起駕到青州郡此時西秦王薛舉車駕已到萬壽王率文武百官出郊迎接二王入城上殿行禮設宴相聚不勝之喜説及唐朝之事皆無定議張善相道天氣融和萬花如繡明日同二位王兄且去郊外遊樂一番何如天定王西秦王同聲道好次日張善相頒令旨整備車駕郊外遊玩杜伏威薛舉張善相三人各駕龍車三位世子杜世廉勝金所生薛仁禹阜囗蜚仙所生張一奇琳瑛所生軍師查訥文武百官俱騎駿馬內侍儀從軍兵共千餘人出西門遊玩此時暮春天氣風日晴和百花開放山明水秀柳緑桃紅君臣看之不足有詞為證詞名瑞鶴仙悄郊原帶郭芳草路馬迹車塵漠漠垂楊獻山角蕩春風搖曳珠簾翠箔鸞呼燕狎顫巍巍花枝重壓有山靈勸我慢解繡鞍且尋杯酌不計程途迢遞遇酒逢花高歌緩頰君臣共樂扶酣醉繞紅藥看前村已欲紅稀緑暗東風何事又惡任流光過卻猶喜春遊興劇看看日色近午張善相問侍臣道此地有甚寺院可以暫息近臣奏前去不遠有一個伏龍觀極是高大寬敞可歇車駕觀後有牡丹國盛開共數十種天下無賽奉殿下令旨禦膳早已整備在觀候駕宴賞張善相即命往伏龍觀少頃到觀前觀中道衆撞鐘擊鼓俯伏山門接駕一齊殿中坐定道士獻茶內侍奏後園筵席完備請三殿下赴宴三王同入後園看那牡丹果然開得茂盛但見千葩吐豔萬萼呈奇王樓寶相楊妃亭畔倚欄杆魏紫姚黃飛燕掌中施妙技迎風向日渾如帶酒新妝側面傾心儼若向人私語不隨桃杏妖嬈色獨占群芳卉裏王萬壽王分付內侍摘黃白二種插在古瓶之內置於席上佐酒正宴樂間只聽得隔牆浩歌之聲甚是清亮王等側耳聽時歌道丹砂九轉換成仙在在為家處處天一粒粟中藏世界三升鐺裏煮山川白鶴有情呼即至黃金無色化非艱身中火棗誰人識此藥原來便駐顔歌罷鼓掌而笑又一人歌道何處是吾家飢來食絳霞琴彈碧玉調爐煉白朱砂曾經舟化米親見棗如瓜一瓢藏太極三尺斬妖邪寶鼎存金虎元田養白鴉目前真閬苑何必泛星搓歌罷二人狂叫大笑薛舉聽畢大怒喝令將官拿觀中老道士來見駕道這賊道好大膽孤兄弟在此飲酒甚人在隔壁高歌狂笑你輒敢留此等狂夫放肆攪擾著軍校拿下捆打一百道士俯伏地上戰兢道小小道罪罪該萬死乞殿下天恩饒饒恕兩月前來來來這兩個遊方道人杜伏威笑道那道士不必慌張慢慢説來道士又稟道這兩個道人拿些銀兩定要租牆裏那一間房煉丹小道慮來曆不明再三推阻二人抵死要住只得暫許數日小道暗裏窺他兩個道者倒也安靜終日閉目危坐端然不動又不見他飲食不知今日為何風顛起來驚犯聖駕伏乞天恩杜伏威道放了這道士就差內待到房內好好叫那兩個道人來見不可大驚小怪少頃內侍官領著兩個道人到花園內來衆人舉眼看那道人一個生得蒼顔鶴發瘦臉長髯一個生得長眉大耳闊面重頤身上都穿著一樣的百衲道袍頭上都戴一頂班竹道冠腰系麻縧腳穿草履飄飄然有出世之表徐步向前打個稽首道三位殿下稽首了薛舉怒喝道汝是何處野道見孤等不下拜敢如此無禮甚為可惡那長髯道人仰天大笑道貧道乃方外野人不習君臣之禮那裏省得甚麼跪拜杜伏威道這也罷了孤問你二位道者為何不去雲遊卻在此長歌狂叫那闊臉道人笑道貧道二人久聞西蜀名山勝景甚多故雲遊至此亦是暫寄蘧廬耳到此數月欲覓一施主舍酒與貧道二人吃個酩酊未遇其人適聞酒香撲鼻不覺興動聊發長歌以遣清興杜伏威道你二人既要化酒何難之有叫禦膳官取一埕酒與二道者飲張善相問你二人可用葷麼二人答道用齋張善相道杜爺賜你酒孤賜你一齋分付內侍整一桌蔬齋看兩個座兒與他飲酒二道人稽首謝了旁邊坐下自斟自酌瞬息間一埕酒已吃完杜伏威道汝二位還能飲麼二人道蒙賜這一埕酒只可與貧道潤喉而已酒興二字全未全未杜伏威大笑分付內侍再取酒來管廚官又取一埕好酒與二人霎時間又飲盡了頃刻吃盡了四埕美酒兩個才立起身來呵呵笑道這四埕酒略嘗滋味向前稽首稱謝杜伏威道不必謝了今你二位乘著酒興卻往何方去長髯道俺們離此前去到太原要見秦王李世民一面杜伏威道當今唐天子登基全仗秦王以成大業汝二位去見他何用闊臉者道如今秦王功蓋天下四海揚名英雄豪傑莫不歸附李淵得享天位皆秦王之力群臣共議立秦王為太子其兄建成其弟元吉暗妒造謀每欲殺之貧道去見秦王勸他棄職歸山隨俺兩人雲遊天下授以長生不死之術煞強似立身坑阱後以罹大禍故欲去走一遭二來兼求一醉薛舉大笑道此狂夫之言滿口胡柴秦王自起義兵衝鋒冒陳出萬死一生以得天下正要混一區宇享太平無疆之福成子孫萬世不拔之業豈肯隨汝遠山雲遊餐風宿露言之太迂深為可笑長髯者道大王但知其樂不知其苦俺道人們慈悲為主方便為門從唐高祖即位以來誅邪伐叛六十四處煙塵消除了大半狠征惡戰滅族亡軀不知喪了多少英雄當今占據城池稱孤道寡的尚存一二十家數年之間眼見得亦罹此禍貧道欲一一勸化使衆諸侯急流勇退避患潛蹤其中肯棄功名撇富貴而明哲保身者能有幾人故此欲往太原見秦王力勸他依行學道秦王斂手則衆諸侯皆得高枕無憂這不是貧道們的慈悲方便處薛舉道這道人又胡説了李世民天生英傑命世奇才豈不知治世安民撥亂反正之理乃一旦棄帝王之業違仰望之心而從汝修行學道乎道人道俺二人雖方外野人頗明天象每見太原王氣鬱然紫微星朗朗拱照豈不知李世民是一代真主噫但恐彼之得意處即是三大王之失意處也薛舉怒道唐朝自得中原孤等自守西蜀土壤懸隔有何優哉道人道大王試説古往今來命世之主曾有不統一者乎目下唐主內憂蕭牆之變外有群雄之角蜀地險峻路僻糧阻故遲遲未進而數年後內難既靖群雄盡滅唐之旌旗不指西蜀而誰指哉大王若與之抗寡不敵衆北面而事之又惹天下英雄恥笑此際當如之何説得薛舉閉口無杜伏威道二位仙長確有定見孤弟兄每每慮及於此未有成議今蒙賜教令人豁然頓悟孤久慕玄修夢想仙風甚渴但恐俗骨凡胎難到蓬萊弱水若得仙長破述指路豈惜區區富貴功名那道人道大王但恐你心不堅耳學道何難修真亦易墮劫與飛升乖爭方寸間三位大王起兵以來雖然殺戮生靈只為濟民利物身居富貴行實清廉況能薄名利遠聲色輕貨財滅滋味屏虛妄除嫉妒俠膽貞肝靈台炯炯比皆人之所難及也若能委脫紅塵逃出羅網將大位傳與世子割愛分恩清心寡欲隨貧道遨遊四海浪蕩煙霞吸風飲露嘯傲乾坤數年間必悟玄機定超塵劫若非宿緣有在三大王焉能與貧道一面乎請即長往不必多疑杜伏威三王皆低頭不答道人又道天定王天定王記得隔塵渡頭天主樓上賜酒受教雲五十三年後依然上王樓詩猶在耳何遽忘之杜伏威聽罷猛然省悟離席道二位仙長莫非就是褚一如姚真卿麼道人笑道闊別久矣此處重逢杜伏威慌忙下拜道弟子為塵俗所迷不知大仙駕臨失迓萬罪萬罪道人答禮道吾二人奉天主法旨接引三位到蓬壺學道以待行滿飛升無由進見故托酒狂歌微言隱諷莫罪莫罪杜伏威拜罷薛舉張善相查訥一齊上前行禮張善相道此二位仙長與王兄何處曾相會來何不早言費了許多唇舌杜伏威笑道就是孤一向對林太師並二位賢弟所言送公公骸骨還鄉時路阻大溪得二仙長扁舟濟渡引入仙境參見混一真人傳授琴棋心法又賜仙果瓊漿住了兩日拜別之際真人賜八句詩道遇喜不為喜逢憂豈是憂囹圄百日患舒抱莫含愁棧閣成基業深淵解組休五十三年後依然上王樓至今珍佩不忘歷歷應驗獨有深淵一句不明今思深淵者李淵身為唐帝也適才偶爾相逢卻像曾交半面顛倒尋思不起不是仙長自言幾乎當面錯過但孤等愚夫俗子不識玄機懇求仙長點化一二三生大幸三王躬身請二仙上坐飲酒二仙道貧道不復飲矣適間所賜美酒仍在埕中未曾飲去借此以試大王耳告別前往成都府威鳳山下小庵內專候三位駕臨切莫羈誤杜伏威道謹遵仙旨弟子等往峨眉視林恩師之壽事畢即相會于成都矣二仙點首長嘯一聲倏然不見萬壽王等且驚且喜一齊上車回朝整頓禮物率領三位世子查訥等一同起馬來到峨眉山天定王等下車馬步行上山進庵參見林淡然杜伏威薛舉張善相稱觴祝壽次及杜世廉薛仁禹阜張一奇查訥上壽了然後進上禮物即於草庵之內次序坐下飲酒杜伏威將西郊遊玩遇二仙點化棄位學道之事説了又道不肖等三人已許之于成都威鳳山相會未曾稟知師爺不敢擅便今見恩師之後即長往矣林淡然道汝三人功成名遂皆具仙風道骨今能同志棄家修道必能蟬蛻塵寰登紫府而位上仙可賀可賀況三位世子俱老成英偉足繼大業不墜家聲今俺有一樁大事正欲與汝等一見今幸俱會於此亦系宿緣使老僧無限歡喜今晚三王世子與近仁暫宿草庵明日午時老僧即當西歸永別杜伏威等大驚一同站起身來道師爺何出此言使某等神魂欲絶幸再留幾年林淡然笑道明日午時俺的大限已到何能強留今夜與諸君相敘一宵便當回首杜伏威兄弟三人淚如泉湧悲泣起來林淡然勸道三王不須悲切老僧年已過百受享逾分復何憾焉杜伏威掩淚道師爺修煉既久自當驂鸞駕鶴羽化飛升為何又入這境界去林淡然道釋玄二教總屬虛無古佛上仙須離幻體雖聖祖佛老亦所不免薛舉道師爺預知未來之事此一去靈光歸於何處不肖等復可相見否林淡然道脫此皮囊即歸覺路釋道殊途一時未能遽會張善相道師爺西歸乞留一言遺世廉等終身佩服以為蕃蔡林淡然道待三子自問方可教之杜世廉即起身敬問守己待人之道何先林淡然道立心宜誠待人宜恕又問事君治民之道何先林淡然道事君宜敬莫以得失為榮屏治民宜寬莫以督責掩仁慈薛仁禹阜躬身問治國治家之道林淡然道治國要知民情辨忠佞遠異端重農務治家恭儉好禮勤職業擇鄰居遠損友勿使妻妾近尼釋而多勃溪勿使子弟愛遊佚而無生計張一奇整容問處變用兵之道林淡然道處變貴於知機貪者受禍用兵明於賞罰吝者遭殃總之要重英豪知進退察虛實同甘苦勿以敗惰勿以勝驕知此數者為將之道其庶幾乎三子拱手受教重斟美酒再整佳肴飲至更深林淡然令衆人安歇杜伏威等道只有一官之會焉可酣睡撤去杯盤林淡然盤膝跌坐禪床之上杜伏威等次序坐談直至天晚依依不捨早膳已罷林淡然入房內香湯沐浴畢換了一身布服對衆人一一合掌相別印月樵雲二人跪下泣求修焚衣鉢林淡然但道靜養二字再問時林淡然又道無欺二人言下省悟淡然即命擡出龕子放在庵前林淡然跨入端坐于內問印月道有午時否印月道將是午時杜伏威一行人環立龕前林淡然手持念珠對衆道一聲大衆保重老僧告辭了閉目垂眉一霎時神光出舍圓寂去了只見鼻中垂下玉箸來杜伏威等跌足慟哭大小官民人等無不下淚杜伏威道且住有一樁要緊大事倉猝間不曾問得深為可惜衆人問何事杜伏威道不知林師爺要何人下火失於問及印月道大爺已曾分付不必他人下火回首一晝夜自有真火從足心而起可以自焚本相杜伏威遂命燃香點燭設祭修齋出示曉諭三國官民人等盡皆挂孝遍處傳説林聖僧坐化當有真火焚身遍處傳揚次早上山來燒香的人若男若女何止千萬近傳官禁喝不許近庵杜伏威道不妨今日林師爺坐化西歸正要百姓觀看以顯平昔道行清高宦官不許禁止衆人皆捱近龕前磕頭禮拜誦佛之聲振動山嶽看看午時將至忽見兩股青煙從龕底而起漸漸有焰燒著龕子此時看的人翻江攪海良久焰光大熾焚著林禪師法身只見一線金光從昆侖頂上沖出直上九霄化成萬道霞光輝煌燦爛旋繞空中恍惚是一金身長老騎鶴冉冉從西而去杜伏威等俱各禮拜上自縉紳下及士庶無不頂禮合掌誦佛直至天晚方散杜伏威一行人就於庵中宿歇樵雲在禪床坐褥之下檢出一張箋紙乃是林禪師親筆寫的辭世頌子送于天定王看杜伏威三人一同觀看上寫道殺人如麻立身似砥寵辱不驚恬淡是菲酒吸百川肉吞千家醉臥中峰羲皇自擬皓月清風高山流水長嘯狂歌何分角微心證菩提法舟相肌生彼蓮花逍遙無己杜伏威將箋文交與世廉令匠人裱成一軸藏于宮中侍奉次早三王親自拾骨用玉匣盛貯葬在中峰頂上築成一塔四圍種植樹木中立碑亭上鐫普靜正教禪師之塔側首建一禪院命譜看守名為普靜禪院皆衰經重孝哭泣祭祖畢與印月等作別下山不説杜伏威等回鎮且説草庵內黑豬名小賽者自林淡然升天之後每日必到塔前踴躍哀叫不及半月斷食死於塔側土民義之即葬在草庵之後壘土成墳名為義冢山下仕宦富民皆感林淡然神靈各出資財拆去草庵大興工作改成一寺名為飛龍禪寺中塑太空禪師法像衆立印月樵雲為住持撥山田百畝以為供奉四時焚香與普靜禪院一前一後香火不絶後印月年至八旬一夕忽然坐化樵雲後亦善終有詩為證巋然禪塔倚中峰普靜松風送曉鍾造愛及民恩澤溥至今香火繞飛龍再説萬壽王張善相等駕回晉州換了吉服文武官員朝見已罷張善相道孤等三兄弟幼蒙林太師教育之恩皇天庇祐十六歲起兵即成大業至今享五十餘年厚福皆賴衆卿之力回首功名一場大夢假饒活卻百年孤等已過大半郊外二仙所言使人夢中頓覺昨送林太師歸西即同二位王兄商議定了功名已送正當急流勇退效範蠡之歸湖學張良之辟穀脫卻利鎖名韁從師雲遊學道圖一個長生不老羽化登仙今後衆卿各宜盡忠輔佐世子即位君臣緝穆上下齊心愛民節儉重賢尊德或遇唐朝動軍皆要遵依查軍師約束切莫負孤之言杜伏威薛舉亦喚杜世廉薛仁禹阜分付一場三個世子一齊跪下大哭道父王年近古稀正當安享天年豈可聽信邪道之言遠離鄉國況路途風霜勞頓惟慮有損無益願父王以社稷為重莫被邪道之所惑也三王含笑不言群臣一同俯伏奏道願主公聽千歲良言還宜治國安民以圖大業再或主公厭繁喜靜將大位傳於世子退居別宮修真煉性以娛老景何必拋家棄國隨二道人遠遊方外受千辛萬苦有傷龍體況修仙修佛原屬荒唐往古來今有幾人飛升幾人不死三位主公素明理道為何起這一點念頭伏乞聖鑒不可遠行三王笑道孤等立意已決衆卿毋得多言杜世廉薛仁禹阜同道父王堅執雲遊不肖不敢抗拒但母親在宮懸望群臣未得一言乞父王車駕暫回國都一言而別以免母親愁煩杜伏威薛舉道汝言差矣孤等既已出家復何恩愛作兒女之態不必再言查訥向前道三位主公出家已決臣等不敢阻撓但自創業以來老臣感三主公大恩言聽計從解衣推食義實君臣情同父子從事五十餘年恩寵過望今一旦君臣訣別寧不銷魂使老臣寸腸如割言畢悲咽不勝三世子衆臣俱備垂淚查訥又拭淚道老臣設一杯疏酒為三位主公錢別伏乞俯從張善相道近仁既有美情孤等必領其意立酌三杯即此長別各人飲酒畢內侍官捧出衣服來杜伏威薛舉張善相皆除下金冠卸下錦袍玉帶脫了朱履頭上換了一條藍布包巾身上穿一領黃布道袍腰系絲縧足登草履三王隨即動身三位世子查訥和衆文武群臣一齊步行送出郭外衆臣掩淚而別三子大哭失聲查訥等再三勸慰一同回朝慘然不樂此時王騏王騋朱儉皇甫實常泰繆一麟黃松等一班老臣俱已謝世查訥道國不可一日無君今日乃黃道吉日請主公登位以理萬機張一奇允諾查訥率群臣奉世子即位改號咸興元年稱為武庚王衆臣奉賀已畢當晚辦宴慶賀次日查訥發付王驤曹汝豐二老將帶領精兵一千衛送薛仁禹阜回信州即位查訥尉遲仲賢領精兵一千衛送杜世廉回楚州即位一齊起馬武庚王率群臣送至郊外相別杜世廉薛仁禹阜單馬同行了一比次早分路各投本國查訥奉杜世廉即位稱為文德王改號樂治元年王驤奉薛仁禹阜即位稱為義靜王改號履泰元年三國俱厚賞群臣赦獄免稅禮賢敬土操演軍兵互相慶賀百姓大悅有詩為證世子稱孤丕振家先君遊迹遍天涯三王鼎立安西蜀自此升平樂歲華三國百姓感念天定王西秦王萬壽王恩德各于本郡蓋造生祠妝塑金身延僧侍奉春秋二祭綿綿香火不絶三王之後聞王出家修道亦皆在宮中修焚持齋皆八十餘而終再説杜伏威薛舉張善相三人迄逞而行不數日已到威鳳山下遇著姚真卿褚一如二仙授以內養密訣長生妙術遊遍天下名山勝境四海五湖無所不到又到獨峰山五花洞重逢張找與令狐氏令狐氏又傳張善相吐納之法數年之後方引到蓬萊參見混一真人後來俱證上仙飛升而帝至唐太宗貞觀十三年欽差薛仁禹阜為大元帥領軍馬十萬征討高麗對陳之際面中藥箭昏迷墜馬衆將救回寨內其夜幾次發昏將欲垂絶次早忽有一全真生得童顔鶴髮相貌奇偉徑入寨來對將士道山人聞知主帥有難特來救他性命將士聽説道待小將通報請見那全真道不須相見但將此藥送與主帥服之其患即痊若問我姓名教他看藥帖上字語即知分曉將士接了藥再欲問時全真化一道清風而去將士驚駭將藥送與醫官細説此事醫官看了藥帖計議道既然仙人賜藥必是還丹即將藥調化灌入薛仁禹阜口中下得咽喉便覺蘇醒方知人事數日後金瘡全好醫官稟其事薛仁禹阜驚異教取藥帖來看上面寫道昔居王宮今作山人為汝金瘡遠離玉京盡忠報國毋忘帝恩西秦王示薛仁禹阜看罷淚下衆官驚問其故薛仁禹阜道那全真乃下官家尊也向年從師學道雲遊方外三十餘年不得一面今知下官有難特來相救已成仙道全真即西秦王也衆官慶賀此一段乃是後事表過不題再説杜世廉薛仁禹阜張一奇自即位之後三國俱各承平萬民樂業每每差人探聽三王消息不知去向三小王只索焚香祝天願賜重逢唐高祖武德七年春三月秦王世民遣軍師李靖大將尉遲敬德薛萬徹帶領馬步軍兵八萬征取蜀地大軍行至楚州界口探馬報入蜀中杜世廉和查訥商議拒敵之策查訥道目今唐天子已成一統四海莫不歸心正是王師無敵主公著與之抗是逆天也依老臣之見不可使敵軍入境先遣能言之士奉玉璽書輿圖降表以見主公知機明哲唐天子必然重用不失封侯之位不然非保全之策也杜世廉道父王臨別時再三囑付降唐今日事已至此降之為上但不知武康王義靜王所見若何查訥道萬壽王西秦王雲遊之際也曾諄諄戒諭不可與唐王相持主公速發檄文通知二國正議間近侍官奏義靜王差官至此有事陳奏杜世廉宣至殿上拜舞畢那官道臣護軍都尉呂彜是也主公見唐兵犯境思難與對敵王軍師知天命有在勸主公降後未知殿下聖意若何特遣臣拜求聖諭共作良圖杜世廉道孤正為此事運與查相國計議未定王兄既欲降唐甚為合理亦須達知武康王方好查訥道唐軍將入境事不宜遲主公一面速修表文一面就煩呂都尉去見薛殿下報知降唐之事庶不耽誤杜世廉就差呂彜去了不數日武康王義靜王車駕齊到青州杜世廉迎接設宴相聚此時三國降表輿圖皆已齊備選能言之士前去納款尉遲仲賢道老臣聞知唐軍先鋒尉遲敬德乃老臣之族侄也老臣若去相見事必諧矣杜世廉大喜即差仲賢納降交與降表輿圖金寶玉帛尉遲仲賢領了物件上馬而去行了兩日方到李靖營前守營軍士攔阻尉遲仲賢喝道吾乃西蜀大將軍尉遲某特來見先鋒有話快去通報軍士慌忙報知尉遲敬德令請進寨相見尉遲仲賢下馬入寨相見畢薛萬徹問道將軍遠來有何見諭尉遲仲賢道某乃西蜀文德王駕下驃騎將軍尉遲仲賢也領敝主與武康王義靖王之命言天兵下臨恐驚擾百姓三王情願歸服有勞將軍等遠涉故差某責輿圖降表奉獻唐主金寶玉帛犒賞三軍伏乞二位將軍俯從某不勝之幸尉遲敬德笑道貴主真知機之英傑不動干戈能順天命天子必加重用小將力當保奏今將軍與某同姓不知仙鄉何處尉遲仲賢備道鄉貫是朔州金吾村人氏枝派家譜卻與尉遲敬德原是叔侄之稱尉遲敬德大喜重敘尊卑之禮引入中軍來見元帥李靖行禮而坐尉遲敬德達仲賢來意又説此位將軍是小將族叔今奉蜀主之命獻上降書輿圖金寶以歸大唐伏乞元帥鈞旨李靖大悅道久聞西蜀三傑之名今知天命歸降我朝實為知機下官回朝必當力薦當下收了降書金寶設宴款待尉遲仲賢道蒙元帥大德感恩不淺敝主有命欲迎大元帥諸將軍人成都一會伏候台旨李靖道三王既已降唐將軍先回下官率諸將明日即至成都矣尉遲仲賢酒罷告辭而別次日李靖尉遲敬德薛萬徹俱冠帶不束戎妝率領數十種將來至楚州城杜世廉張一奇薛仁禹阜查訥等已先在城外迎接進城同入大殿一一行禮杜世廉道某等偏僻小邦幸蒙元帥諸將軍大駕親臨孤等不勝欣躍今已降唐惟慮皇上見疑乞元帥周全重生之德李靖道下官童稚之年已聞杜薛張三王鎮守西蜀英名蓋世四海傳揚故我秦王殿下起兵以來屢欲征討下官力止不欲進兵今唐軍未及接境而三將軍即已納款足見知機明哲下官班師回聖力保三將軍不失王侯之位杜世廉等皆大喜相謝大排筵席相款以下種將軍士俱有犒賞李靖留在楚州三日不回營寨晝夜講談兵法兩下甚是相得至第四日李靖等拜別回營李靖道下官班師在半途住扎相候將軍等同赴京師不可有誤杜世廉等頓首領命不説李靖回師且説杜世廉三弟兄收拾寶貝金珠打點朝京面帝分付衆將宮謹守各處城池待唐天子有旨到來再作區處一月以後薛仁禹阜張一奇俱至楚州會齊帶領查訥尉遲仲賢等勇將百員軍士五千取路到襄陽府與李靖相會一同赴京不止一日已到京師李靖安頓杜世廉一行人在城外自率尉遲敬德薛萬徹入朝先到天策府見秦王世民各道杜世廉等歸服之意秦王大喜宣至側殿相見杜世廉等拜舞畢秦王道三卿在蜀名聞已久今歸於唐平生大慰孤德不如漢高卿才可匹三傑共用富貴毋多疑也杜世廉頓首道臣等三人父子相繼鎮守西蜀七十餘年齊周隋三世屢經變更未得真主故權且自守臣父與林禪師占天象預知太原已出真主天命歸於殿下故昔臣父出家分別之時諄諄曉諭臣等早歸大唐以順天命久欲瞻拜天顔奈無門路今蒙元帥至蜀得解甲相投殿下天恩寬宥前愆臣等不勝惶悚秦王道卿父即杜伏威薛舉張善相林禪師即林太空否杜世廉道是也秦王道可惜孤無緣不能一見高明之士今既出家卿可知其消息否杜世廉道臣父叔三人飄然長往雲遊訪道將及十年臣等差人遍訪並無蹤迹每每挂心未知行藏若何秦王道卿父皆是才高德邁功行兩全之士何愁學道不成明日面聖奏過父皇建詞封贈以顯其功杜世廉等叩首謝恩次日秦王親率四人和李靖等早朝見駕舞蹈已畢秦王至高祖駕前備細將杜世廉張一奇薛仁禹阜歸服之事和林太空得道坐化杜伏威等善觀天象命子歸唐仙遊情節一一陳奏高祖龍顔大憂賜禦宴授杜世廉為濟源侯龍虎將軍薛仁禹阜為遂平侯金吾將軍張一奇為湯陰侯驃騎將軍子孫世襲官爵各賜錦袍玉帶采段金花欽差工部官蓋造三處府門私第查訥職授昭勇將軍尉遲仲賢職授安遠將軍以下將勇各各升官賞賚西蜀各郡州縣官員俱照原職鎮守本郡杜世廉等上表謝恩唐高祖又敕賜西蜀南平府縉雲山下創造殿宇裝塑林淡然杜伏威薛舉張善相神像林淡然敕贈為通玄護法仁明靈聖大禪師杜伏威贈為正一靜教誠德普化真人薛舉贈為正一五顯仁德普利真人張善相贈為正一咸寧淳德普濟真人數月之間殿宇已成敕賜匾額唐高祖親筆禦書三字名為禪真宮自此遠近燒香士女絡繹不絶最是靈感百姓祈禳作福者甚多家家供奉戶戶瞻依至今改為重慶府縉雲山下殿宇舊迹基址猶存有詩為證南平西北縉雲山三子成真逝不還萬古千秋遺迹在至今遊客指頽垣後來查訥致仕善終於家其子查衡襲職尉遲仲賢因隨駕征討突厥亡於陳中贈武平侯子孫世襲其爵杜世廉薛仁禹阜皆享富貴三十餘年壽至九旬而薨只有張一奇於貞觀十一年奉旨征剿高麗舟至鴨緑江狂風驟起大浪掀天戰舟將覆被高麗王部下大將哈都罕兒所獲張一奇義不屈節自刎而死唐太宗憐其忠立祠享祭贈為鄭國公其子張鏞襲授國公之職後世子孫俱登科甲直至皇明依然一大族也後賢觀此作一詞以志感詞名滿江紅詞雲碌碌浮生囗虛度一番歲月祗只為是非榮辱令人周折舌劍唇槍徒自斃紛紛蟻陳誰優劣到頭來未免夢黃粱空悲切誰打破風流穴誰打散愁眉結終有個興罷酒闌人歇明哲知機須及早等間兩鬢堆霜雪君不見三俠棄職訪蓬萊登金闕
