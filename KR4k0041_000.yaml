body:
  text: 禪真逸史上明清溪道人著目録第一回高丞相直諫辟邪林將軍急流勇退第二回鍾愛兒圓慧出家梁武帝金鑾聽講第三回林長老除孽安民丘縣尹薦賢禮釋第四回妙相寺王妃祝壽安平村苗二設謀第五回大俠夜闌降盜賊淫僧夢裏害相思第六回説風情趙尼畫策赴佛會賽玉中機第七回繡閨禪室兩心通淫婦姦僧雙願逐第八回信婆唆沈全逃難全友誼淡然直言第九回害忠良守淨獻讒逃災難淡然遇舊第十回貪利工人生歹意知恩店主犯官刑第十一回彌勒寺苗龍敘情武平郡杜帥訪信第十二回都督巧計解僧頭守淨狼心驗枕骨第十三回桂姐遺腹誕佳兒長老借宿擒怪物第十四回得天書符救李秀正夫綱義激沈全第十五回佞子妙相寺遭殃姦黨風尾林中箭第十六回奪先鋒諸將鬥勇定埋伏陳玉鏖兵第十七回古崤關啜守存孤張老莊伏邪皈正第十八回梁武帝愎諫納降虞天敏感妻死節第十九回司農忠憤大興兵梁武幽囚甘餓死第二十回都督冥府指翁孫阿醜書堂弄師父第二十一回竊天書後園遣將破妖術古剎誅邪第二十二回張氏園中三義俠隔塵溪畔二仙舟第二十三回清虛境天主延賓孟門山杜郎結義第二十四回伏威計奪勝金姐賢士教唆桑皮筋第二十五回遭屈陷叔侄下獄反囹圄俊傑報仇第二十六回山徑逃蹤鋤禿惡黃河訪故阻官兵第二十七回計詐降薛舉破敵圖霸業伏威求賢第二十八回湯府丞中計敗兵杜元帥納言正位第二十九回軒轅廟蘇朴遭擒延州府伏威遇弟第三十回沈蘭劫寨陷全軍牛進迎街懲大惡第三十一回報仇瀝血祭先靈釋怨營墳安父骨第三十二回張善相夢中配偶段春香月下佳期第三十三回計入香閨貽異寶俠逢朔郡慶良緣第三十四回善相破法斬馮謙士開解圍推段帥第三十五回元帥兵陷苦株灣衆俠同心歸齊國第三十六回雙玉人重逢合巹三義俠衣錦還鄉第三十七回羅默伽肆凶受戮尹氏女盡節還魂第三十八回土地爭位動陰兵孽虎改邪皈釋教第三十九回順天時三俠稱王宴李諤諸賢逞法第四十回禪師坐化證菩提三主雲遊成大道
