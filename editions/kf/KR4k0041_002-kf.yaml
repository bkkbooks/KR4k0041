body:
  text: 第二十一回竊天書後園遣將破妖術古刹誅邪詩曰秘籙真符出洞天男兒獲此可登仙靈文初試欽神鬼兵法新傳繼俠禪春日密韜文豹略秋香公忿牝雞冤妖淫膽喪英雄手只恨衰椿不大年話說先生得病十分沈重張善相忙人後廳和張太公說知先生病重張太公慌了親到書室來看見先生睡在床上不住聲叫疼叫痛張太公問道老師染何病症這般呻吟苦楚先生哼道學生蒙長者相延感激不盡多是福薄不能消受一時無故染此篤疾竟莫測致病根由天降災殃諒來多死少生若有疏虞望乞收殮若得骸骨歸鄉感恩於九泉之下張太公勸道不妨耐心調理決然無事太公口雖勸慰心下憂慌當晚接連三四個醫人診脈這個道是感冒風寒那個道是虛火所激又有的說是中毒又有的說是犯邪三四個醫生東猜西扯沒做理會處大家商議了多時共撮一劑表寒散大解毒驅邪的藥太公親自煎與先生吃下去只指望病好豈知反添脹痛摣床拍席幾次發昏攪得張太公一家不安使人去占卜祈簽說道犯了甚麽二司大王三郎五道又有陰魂作祟太公登時安排祭禮邀請道士攘星發檄纏了一夜先生病體愈重不曾減得分毫有詩爲證醫卜由來出聖書個中精奧少人知祈攘藥餌皆無益說破真方病即除卻說杜伏威和薛舉一床睡著兩個暗暗地冷笑直到天明薛舉醒來對杜伏威道那鳥娘養的不知夜來心事何如杜伏威應道這會兒正當緊要處鐵漢子也要化做汁哩須待臨期方可解救兩個在床裏說笑不提防隔牆有耳張家一個丫環名喚嫩紅托茶出廳上與太公吃打從杜伏威窗外經過聽見他兩個在床上這般說笑卻思量道若如此說這兩個小官必然知先生病的來歷遞茶與太公吃畢嫩紅對太公說我适才托茶打從杜薛二小官商前過聽得薛小官口裏這般問杜小官這般回答若要先生病症好除非問他兩個便知端的太公驚道原來如此小小年紀只恐是說耍你去叫他兩個出來待我問他嫩紅走近房前叫兩位小官太公相喚問一句話兩個應道來也來也即爬起穿衣薛舉道叫我二人說甚麽莫不是走了馬腳杜伏威道不妨有誰人知道若問時只推不知便了同出廳來對太公唱喏太公笑道先生這樣病重你兩個可也睡得安穩怎地救得他方是師生之情薛舉道好笑我年幼小但曉得讀書那裏會醫病杜伏威笑道太公真是年紀高大有些顛倒昨晚那幾個有名的醫士卻也胡猜亂猜醫不好病反來問我小廝們怎生救得他這喚做活搗鬼太公心裏暗想道若說破了這兩個猢猻決然一口賴住不如且哄他一哄當下笑道既是你們不能救先生只索罷了爲何反衝撞我老人家快進裏面吃早膳兩個板著臉走入去了不多時太公著家憧單叫杜伏威出來杜伏威問道太公又喚我何事太公道先生在房裏睡著叫苦你進去問一問安才成個學生的道理杜伏威道太公說得是即到先生臥房中去了太公走入軒子內來見薛舉靠著桌兒吃粥太公埋怨道你這小廝忒也狠毒自古道天地君親師先生如父母一般怎地下得毒手將他害卻性命薛舉睜眼道太公好沒來由先生自染病幹我鳥事太公道這小廝還要嘴硬适才問杜伏威他說都是你弄那法兒去害先生又說還有甚法兒可解他已一一招認你還廝賴薛舉大怒道這小猢猻你自怪先生責打去城外尋甚麽鬼頭塞腸草做弄先生反推在我身上太公道他說有藥可解你快說出不幹你事薛舉道甚麽藥解將糞清汁吃下去便好了太公也不說破忙令家憧去買了糞清燙熱了與先生吃下去頃刻間腹內骨碌骨碌的響了幾陣要淨手太公叫另拿個淨桶與先生一連解了兩三次疼止腫消果然一時平復睡一覺吃些粥湯便下得床來坐在房裏將息只聽見門外人聲喧鬧有人廝打先生走出門看時卻是薛舉和杜伏威揪發狠打先生喝住了道我病體略得寬爽你兩個又在這裏廝鬧惱我成甚規矩薛舉杜伏威見先生罵俱各放手氣忿忿兩下立著俱不做聲張太公拄著拐杖跑出來道先生不要發惱你的性命全虧他兩個相救先生驚問其故太公將鬼頭塞腸草糞清解毒緣故說了兩個互相埋怨泄漏了機關因此廝打先生怒道不爭這兩個小廝如此無禮反來捉弄師長太公道看老朽薄面不要計較他罷先生躊躇一會歎口氣道令孫學問日長須請經儒教授以成大器學生才疏學淺恐誤令孫大事即此告辭況薛杜二子今雖粗鹵頑劣察他氣宇不凡他日必成偉器學生明早拜別太公便行太公再三款留先生堅執要去太公無奈次早贈送修儀禮物待了酒席告別而去太公見先生已去令家撞送薛杜二生回莊林澹然見了問二子何故回來家憧將弄先生的事端告訴一遍故此先生不樂辭館而去林澹然大怒道兩個畜生恁地不知擡舉不用心攻書寫字反去幹那蠱毒魘魅的事甚爲可惡拿竹片要打苗知碩等勸住罵了一番打發家僮回城至九月初旬張太公另請一位西賓又著家憧來莊裏見林澹然接杜薛二生讀書林澹然喚兩個同到方丈中道目今難得張太公另請一位先生來呼喚你二人赴館你兩個收拾快去若再如前做出事來重責不恕杜伏威搖手道不去不去當今離亂之時讀那兩行死書濟得甚事不如習學些武藝圖一個高官顯職有何不可不去讀那死書了薛舉道我也不去只隨著老爺學武藝罷林澹然心裏暗想這二人分明是武將規模何苦逼他讀書且由他罷便道你兩個不去讀書小小年紀卻學甚武藝不去也罷但不許在外面生事早晚要擔柴汲水勤謹做工若有不到處一體罪責休恨薛舉杜伏威齊道情願跟隨做工不去赴館了林澹然寫帖辭謝發付家憧回城去了時序易遷轉眼間又是隆冬天氣時值十二月十九庚申日正合通書臘底慶申一切修造遷葬祭祀求神俱吉張太公家裏新塑一尊值年太歲靈華帝君延接一班平日誦經念佛的老道友到家念佛先一日著蒼頭具柬到莊裏接林澹然杜悅等同臨佛會林澹然甚喜次早同杜悅苗知碩胡性定沈性成入城裏來留薛舉杜伏威和道人行童等看莊薛舉和一班小廝們自去閑耍道人行童等無事到日午吃些冷飯閉上莊門各自放倒頭尋睡去了這杜夥成獨自一個在禪堂內弄棍舞槍耍了一回走入方丈裏開食廚尋點心果子吃不見一些心裏想道昨日廚內有若干果子食物今日爲何一空畢竟是老爺藏過了徑奔到林澹然臥房裏來只見房門緊鎖無匙可開當下生個計較撬開紅漆禪窗從窗檻上爬進去尋著食籮取出幾個炊餅來吃又藏些果於在袖裏正要抽身跳出忽見經桌上堆著幾部經卷杜伏威逐本拿起來看過翻到書底尋出一卷書來甚是齊整比諸書不同綠閃錦的書面兒白絨線裝釘正面簽頭上寫著天樞秘籙四個楷字揭開看時雪白綿紙上楷書大字是林澹然親筆謄寫的目錄上寫著遣神召將卷之一杜伏威逐張揭開細看卻是些法術符咒變化的神書心下大喜將書藏在柏中複翻身爬出窗外將窗扇依舊閉上一溜風走到方丈裏坐定悄悄開書默誦那詞咒至晚不見林澹然回來薛舉和道人行重俱己睡了杜伏威雖然睡在床上一心想著天樞秘籙眼也不合想了一回暗把讀過的詞咒又背一背看恰也一字不忘心下算計道趁今夜老爺等不在莊道人等又都熟睡不如乘著星光月色請一請神將試看他來否忙起來披了衣服悄悄走出房外拽步入後邊花園裏依書圖譜按著罡步撚著訣口中念動真言神咒可煞作怪霎時間只見狂風驟起吹得毛發皆豎風過處忽然現出一尊神將生得身長丈餘頭大如輪三眼突出兩鬢蓬鬆赤臉紅須撩牙似鋸頭戴束發紫金冠身穿鎖子連環甲腳登黑皮靴手執鑌鐵鐧高聲問道吾師宣召有何法旨杜伏威見了唬得魂飛魄散目瞪口呆這花園裏一時無躲處跌轉身拚命奔入牆側東廁裏藏避又聽見那神將大喝道既召吾神爲何不出來相見果有甚的差使杜伏威寒籟籟地抖不敢做聲那神將見沒人回答又喝道法師既無差使召我何爲快快遣發我去也杜伏威心裏想道我唯讀得召將的神咒不曾見甚遣將的法兒怎麽打發得他去只躲在東廁裏不做聲便了那神將見無人答應在花園內四圍尋覓行至東廁邊覺有生人氣發怒提鐧打將進來奈東廁是穢汙之處要上天庭不敢入去只將鐵鐧東敲西擊呼呼喝喝直到五更四下裏雞鳴了那神將只得飄然而去這杜伏威在茅廁上蹲了一夜驚得骨軟身麻不能動彈捱到天曉精神困倦不覺就睡著在東廁板上卻說林澹然杜悅等在張太公家內做一晝夜道場至天明吃了早飯辭別太公回莊薛舉同道人等都出莊來迎接只不見杜伏威林澹然問杜伏威何處去了薛舉道昨晚和我上床同睡天明起來不見了他不知那裏去了道人行童一齊道果然昨晚閉門一同歇息今早不知去向林澹然笑道這小子又不知何處頑耍著道人行童莊前莊後小房側屋處遍尋覓並不見影一個行童尋到後園內假山邊花樹叢中到處尋過亦不見蹤迹打從西首穿徑而過只聽得東廁裏鼾聲如虎行童探頭張望卻正是杜伏威睡在那裏慌忙叫醒道小官人爲何在這香筒裏打睡住持老爺和你公公回來尋你哩快去快去杜伏威怒道我正睡得熟你這狗才大膽來攪醒我的睡頭行童道這是甚麽所在還要貪睡遍處尋你不見卻反嗔罵人且去見老爺不要拖累我杜伏威道見老爺卻待怎的同行童進禪堂裏來林澹然問道俺不在莊你夜間卻往何處頑耍行童掩著口笑道小官睡在後園東廁裏打鼾适才還嗔我叫醒了口裏兀自咕咕噥噥地罵杜悅惱道這野畜生奇怪得緊真好不知香臭爲何在這茅廁裏睡林澹然道你因甚好床好席不睡反去投坑廁當作安樂堂杜伏威瞪著眼不做聲林澹然見他如此思量了半晌猛然省著昨日臥房窗子不曾上得插箭書籍不曾收拾得好莫非竊見天書在後園胡亂幹甚麽勾當出來喝令杜伏威跪在佛廚前急抽身到臥房開了鎖進內看窗子時又是關的但見桌子上書卷已是翻得亂亂的慌忙開書廚尋三冊天書只有中下兩冊不見了天樞秘籙桌上細細檢尋也不見有諒來是杜伏威偷了就問道人昨日夜間曾聽見甚的響動麽道人都道沒有甚的響動但是睡夢中聽得遠遠有呼喝之聲不知何處林澹然道不必說了是這小潑皮幹出事來也即喚杜伏威快拿天書還我杜伏威不敢隱匿袖中取出來雙手遞上林澹然接了笑道你昨夜請何神道可直說來免打杜伏威道昨日我看見這書上面第一卷就是召請天神天將我日間暗暗將詞咒記了乘老爺不在黑夜園中試耍才念得幾句咒語不知怎的這般靈驗一尊神道就來了生得厲害怕人我慌了只得躲避東廁裏被那尊神道大呼大喝東敲西擊尋人廝打直到天曉方去因吃了驚故此一時睡去乞老爺饒恕則個林澹然道還是你造化若不往茅廁裏躲避這一鐵鐧打做肉泥罷罷罷也是前定之數這本書就傳與你朝夕用心攻習不可漏泄天機異日求取功名皆在此書之上杜伏威接了天書公孫二人拜謝以後逐日杜伏威求澹然指點傳授一步也不出門晝夜習演天書兵法變化之術有餘工夫在後園裏同薛舉習學十八般武藝杜伏威使一杆長槍薛舉使一枝方天畫戟數年間兩個武藝都已精熟杜伏威又早十六歲了薛舉年登十五一日林澹然在禪堂裏閑坐正值早秋天氣金風初動天色微涼杜伏威薛舉二人閑立在簷下林澹然喚二人近前道我向來教你們的武藝未知二人誰勇誰怯趁此清秋天氣你兩個比較手段高下若何以決前程杜伏威薛舉