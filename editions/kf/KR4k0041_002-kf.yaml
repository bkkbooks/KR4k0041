沖出二十餘人各執器械爲首一人身長體壯肛眼大鼻頭頂竹笠身穿直袖短衫手搦一柄大鈀邀截路口原來是羊委的丈人尤二仁聽得隔河鑼響諒是女兒有事正欲來救應有人報知備細慌集家丁憧仆又請了一位教師名爲朱百文抄路俟候剛剛相遇朱百文躍出路口見了二人哈哈大笑道我說是甚樣兩個三頭六臂扳不倒的大漢兀的是城隍廟中一雙小鬼乳腥尚臭輒敢橫行薛舉大怒道汝這嘔眼賊囚有甚手段敢開大口速點火把送我二人回府稍有遲延每人頭上受我一棒朱百文舞動大鈀劈腳面掃來薛舉舉棒隔開二人搭上手鬥了數合朱百文一鈀攛近膝邊薛舉仍退讓過那鈀呼的一聲響又見擦至耳根被薛舉一棒掀開跨進一步隨手棒下朱百文躲閃不叠右腕上著了一棍撲地倒了鈀已撇在一邊尤二仁父子家憧一齊上杜伏威迎住一棍早已打倒一個薛舉從旁攻進兩條棍如龍飛電掣尤家人不敢遮架只聽得喇喇地響人著棒個個損傷棍著棍根根斷折兩下正廝鬥間忽然大雨驟至伏威當先薛舉斷後直打出路口尤二仁見天黑雨大二人勇猛不敢追襲只得互相攙扶打傷的人抽身回去連夜延醫療治不題再說這兩個頑皮得勝冒雨而走奈何天色黑暗路途泥濘難行一步步捱山溪口渾身透濕只見溪西有一座廟宇二人奔至廟前門檻上坐了商議候雨住再行看看捱到夜半倏然雲開天霽一輪皓月當空二人擡頭看時扁額上寫著孤忠二字一同進廟觀看正中神廚內乃是楚相國範增神像兩旁從神俱已零落薛舉道向聞人說孤忠廟內白晝出鬼雖然走過幾遍未曾進內一觀看著何如杜伏威道我正要捉個鬼兒耍耍進去進去此時破壁中透入月光照得明白兩個步入東廊灣灣曲曲踅進一座土牆裏邊是一片大園誰見敗草過腰蛩聲滿砌園盡頭有三間大樓二人登樓憑欄四顧甚有景趣正看間忽見一人闖入園內手中捧著枕褥走近樓下少頃踅將上來二人駭異將身躲了暗中偷覰見那人披著發赤著腳生得醜陋彪形虎體二人看了不知是人是鬼且不做聲只見那人脫去衣裳裸身赤體兩手撚訣雙眼直視月中踏罡步鬥口中念念有詞倏忽之間空中一婦人赤身披發乘風而至直入樓中見了那人驀然睡倒那人忙抱褥子與婦人墊了將枕枕了頭婦人如醉的一般任他所爲杜薛二人即閃入神廚後黑影中藏避悄悄張他只見那人渾身精赤摟抱著女人正欲雲雨杜薛二人看了按納不下躍出大吒一聲喝道何處妖邪來此行這不法之事不要走吃我一棍那人吃了一驚急忙跳起跑下扶梯二人隨後追下直趕出上牆外寂然不見二人不敢追出複上樓看那婦人赤條條仰睡不動二人問時又不答應杜伏威道這婦人被那廝妖法所迷須用法水解之方可正要下樓取水忽聽樓下喊罵無知賊子敗我美事快下來與你見個高下伏威薛舉挺棍奔下扶梯那人手持雙刀退出天井中伏威與薛舉兩條棒圍住廝並三個人鏖戰良久那人被薛舉看清一棍擊中眉心撲的倒了薛舉便奪過一把刀將那人首級割下挂在柳樹枝頭搜檢身上裙帶上系葫蘆一枚內藏丸藥杜伏威取了葫蘆將藥撒散到廊外澗中舀了一葫蘆水先念瞭解咒含水噴在婦人臉上婦人方醒見了杜薛二人驚惶慚愧沒處藏身將褥子扯過遮了下身一堆兒蹲著發抖杜伏威道不須驚怖暫且消停定性與我說知備細婦人坐了半晌道妾身龐氏住在柳家村裏孀居守節只有一個兒子三月前來了這個人異樣打扮說是外國人善看三世圖能知過去未來之事我齋他一飯就要他看三世圖他問了我年庚八字就講出我亡夫的名號來說亡夫生前造孽現在地獄受苦直交罪滿罰生陽世變爲鴨我等婦人一時沒見識聽信其言啼哭求他超度他道只有一條門路可救亡夫脫離地獄轉生人道妾再三求懇他要我頂發四十九莖中指甲二枚問他要頭髮指甲何用他說發者取法皈三寶指甲者名指日超升這是佛爺爺秘傳我依數剪頂發指甲與他稽首去了當日脫衣就寢猛然滿腹作癢忽然一陣冷風吹我出門騰空而起到此園內方住那人預先在此擁抱我上樓任情淫汙直到雞鳴醒時依舊在家床上不知爲何如此將及三月夜夜攝我到此不知此人是個甚麽人亦不知他姓名今遇郎君乞爲救援薛舉道你可知這樓子是甚去處麽婦人道不知薛舉道這是孤忠廟後樓婦人道若是孤忠廟與我寒家相近過溪去轉出松林便是柳家村了薛舉道我等不是凡人乃範相國直班大將領相國之命誅此妖賊以救你性命你可急急回去莫露風聲若泄天機受禍不淺婦人道感尊神救護誓當重塑金身焉敢泄漏奈何身上無衣怎生回去薛舉令婦人站開將褥子扯作二幅令婦人身上圍了薛舉杜伏威引領下樓徑出廟外婦人頂禮悄悄過橋去了此際漏已五鼓二人取路回莊不敢敲門直至天色大曉道人開門見了二人冷笑道賞得好桂花如何賞了夜桂住持爺好生著惱杜公公一夜不睡見面時有些兒不尷尬哩一條竹片眉毛上滾了二人不應走入莊裏到苗知碩臥房來知碩見了甚是埋怨薛舉將日間相打夜內廝殺之事細細說了苗知碩大駭道好呀出門就去闖禍天幸得勝而回若有差池怎了少刻進禪堂中來澹然正怒潔二人一夜不回之故二人不敢隱諱一一將前事稟知澹然道畜生好膽他家妻子不賢與你二人何涉醉後行兇倘一時失手傷人如何區處夜間廝殺雖是救人一命事非切己總屬鹵莽設有決裂汝二人取罪非輕自去分理抵當權寄下五十竹片二人暗喜只在園內較習武藝足迹不出莊門話分兩頭再說尤二仁父子商議次早府中進狀但不識二少年名姓難以行詞尤大略道人名樹影死誰遮隱得過明日必定要探聽出那廝名姓來然後告理尤大倫道我昔年催趲錢糧打從小蓬山經過見河內二小子打死一虎人都說是張家莊上的人今看這二惡少面龐相似莫非就是他尤二仁道若果是張家莊上的乃林澹然的人了莫去惹他各去寢息未及五更只聽得扣門聲急開門看是羊委家憧報說昨晚大娘子忿氣不過趕入何家酒店和那老媽媽廝鬧不合將他胸前撞了一停那媽媽就叫心疼將及半夜嗚呼哀哉死了官人娘子都去山後躲避特令小人報知尤二仁跌腳叫苦慌忙著人分投府縣去打聽消息且說何老嫗有一兄弟姓曾名仙是本縣罷吏也是個囗不爛的閑漢他有三件本事人不能及第一件一張好口能言善辯第二件一副呆膽不怕生死第三件兩隻鐵腿不懼竹片衙門人取他一個渾名叫做曾三絕當日見姐姐與羊家廝鬧而死正是撓著癢處寫了一紙狀子往廣寧縣中告理知縣差人檢驗收屍隨即拘喚一干人犯候審當日又有一夥保正裏甲等呈說本都孤忠廟後園殺死一人身首異處系遊方之人不知姓名現存兇器戒刀二口棍棒二條事於人命重情地方會同呈舉知縣又差人檢看屍傷著落保正買棺盛貯一面行下公文限委緝捕人役遍處緝訪凶身不題這尤二仁父子見曾三絕是一個勁敵只得暗買求和衙門上下裏鄰人等皆用錢賄囑縣官又聽了人情朦朧審作誤傷人命判數兩銀子與何老嫗的兒子斷送兩下息了訟事但尤氏先遭杜伏威當衆人前羞屏露體氣忿不過實思痛打何老嫗一頓出這一口惡氣不期何老嫗死了受這一驚不少又因訟事耽憂背上忽生一疽其大如鬥晝夜呼疼叫痛合著眼便見何媽媽冤魂索命求神禳解日加沈重其疽漸漸潰爛臭不可近遍生小蛆洞見五臟捱至月餘而死遠近之人無不稱快以爲忤逆不賢之報有詩爲證尤家女兒不足憐凶頑應得受災愆最異縱妻羊委子也隨流俗保殘年再說杜薛二子暗裏探聽何媽媽身故兩下構訟繼後又聞尤氏患疽棄世兩人心窩裏撇下了一塊只是無辜拖累何媽媽損其一命此亦天數難逃只索罷了這杜悅因那夜孫子不回心內驚憂一夜不睡又值秋涼冒了些風寒染成痢疾症候年老力衰淹淹不起正是世無百歲人枉作千年計不知杜悅病體凶吉如何且聽下回分解第二十二回張氏園中三義俠隔塵溪畔二仙舟詩曰年少郎君伸大義星前盟結金蘭契離亭執袂暗銷魂歧路牽衣垂血淚倥傯孤客伴殘燈孟浪狂夫運怪異津頭咫尺有蓬萊誰道無仙嗟不遇話說澹然年老受驚又因深秋涼氣侵人冒寒傷食得個痢疾症候血氣衰弱淹淹不起林澹然請醫調治竟無功效日加沈重杜伏威侍奉湯藥晝夜不離左右杜悅自覺病勢危篤叫杜伏威請林澹然苗知碩胡性定沈性成薛舉都到床前坐了杜悅垂淚道老朽公孫在此叨擾感激住持厚德雖至親骨肉不能如此正要求住持指迷不期大數已到病入膏育今將回首老朽年過八旬壽元已足死複何恨只是受了住持莫大深思今生未有所報須待來世效犬馬之勞林澹然道老丈何出此言使貧僧愧赧無地雖染貴恙寬心調養自然痊可不必憂煩杜悅道老年人患痢十無一生若要再活人世須是仙藥靈丹小孫伏威心性鹵劣得老爺教誨提攜老朽雖在九泉不忘大德又對苗知碩等道老朽承列位厚情義同瓜葛不想命盡今日乞看薄面照管小孫則個又叫薛舉道伏威與你共親筆硯情勝同胞異日貧富相扶患難相救保全異性骨肉之信義莫學薄幸人也薛舉連聲應諾又喚杜伏威道我兒命薄未識父面不期二母俱亡家業蕩盡可傷可傷若非林老爺收養訓誨未免流落天涯感得皇天庇祐使我公孫相會實出望外今我病篤命在須臾我死之後你可學做好人務爲世間奇男子大丈夫替祖宗父母爭一口氣不可懶惰遊佚自甘不肖我之骸骨不可流落他鄉你父親也曾囑付隨便時要帶回故上祖塋埋葬使我魂有所棲方全你孝順之心說罷哽咽兩淚交流杜伏威放聲大哭林澹然衆人亦皆垂淚當日晚間杜悅氣絕而終杜伏威幾番哭絕衆人再三勸慰人殮已畢停樞側首敞廳裏盡皆挂孝林澹然親自主壇又請鄰近寺院僧衆做功德道場超度亡魂到七七四十九日將靈樞擡出莊外空地上張太公父子和鄰近念佛道友僧衆都來相送林澹然執火把在手口裏念偈道大衆聽著將軍杜公名號平昔素存忠孝精神直透昆侖威力能擒虎豹咦從今跳出火坑中一點靈魂歸大道林澹然念罷放火焚化棺木已畢杜伏威拜謝澹然並衆人款留張太公衆道友吃齋而散次早社代威拾骨痛哭一場有詩爲證衰柳寒蟬泣素秋商風颯颯下汀洲人生自古誰無盡貴賤同歸一土丘林澹然將杜悅骸骨藏在寶瓶內封了口著杜伏威祀奉安頓朝夕供養如在生一般杜伏威見公公已故心下十分慘切思量冥中父親囑付之言公公臨終之語一夜睡不熟次早起來進方丈見林澹然唱了喏林澹然問今日爲何起得這樣早杜伏威垂淚道弟子有一事稟上老爺公公臨終叮囑要送骸骨歸鄉土埋葬弟子遵祖父遺言今欲暫歸鄉土走一遭一者完了葬事二來也好認一認宗族祖居不知老爺心下肯容去麽林澹然點頭道這也難得一點孝心葬骸骨認本宗都是不忘本的念頭甚好甚好便放你去也不妨但是路程遙遠未曾走過如何認得況你年紀小小的那曾經歷艱苦又且單身獨自俺卻放心不下杜伏威道我年紀雖小承老爺訓海深曉武藝精通法術雖未走過口便是路縱然一身何愁險阻林澹然道正爲此故俺不放心惟恐你倚傳法術賣弄手段惹出事端爲禍不小一路上須當小心謹慎勿露圭角不可使在家性子今日星辰不利不宜出行待後日打發你起程杜伏威應諾走出禪堂外撞著薛舉杜伏威扯住道我後日送公公骸骨回岐陽去目下就要和賢弟久