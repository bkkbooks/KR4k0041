俗語雲成則爲王敗則爲寇當今天下四分五裂英雄競起我等器械未備軍卒未練糧草未足焉能成事若攻得一城破得一邑進有所據退有所守方可轉動今若輕舉儻有疏虞豈不自貽其海依小弟之見繆大哥守寨薛二弟佐之留五百嘍囉在此河口及中流險要之處阻截來往客商仕宦船隻凡一概財物十取其三不可殺害良善積少成多這錢糧不是有的了然後招軍買馬接引四方豪傑軍馬以漸而盛一面待小弟率領五百嘍囉前取延安府若得此城就是根本選英雄之士鎮守地方然後東征西取次第施爲庶可無失薛舉繆一麟同道杜兄所言乃是萬全之策繆一麟又道據險攔截客商這是我的分內之事不須薛君幫助招軍買馬也是我一力支援薛君可輔佐賢弟攻城略地方得成事薛舉慨然應諾當晚席散閒話不提次日杜伏威揀選五百壯健嘍囉和薛舉別了繆公端駕起舟揖渡過對岸上馬搖旗呐喊殺奔延安府來有詩爲證兄弟兩同心師行神鬼驚將軍威武重何複有堅城卻說當時梁武帝被侯景逼死台城立武帝第三子世贊爲帝在位二年侯景弑之又立豫章王世記登基未及數個月即禪位於侯景景即位稱帝郊天大赦改元太始天下大亂時有梁朝大將二員一名王僧辨一名陳霸先見侯景僭位另輔佐梁武帝第七個太子湘東王諱繹字世誠爲帝即位于江陵大發兵討侯景侯景屢戰屢敗與百餘騎東走追及斬之不二年湘東王又爲魏主所執陳霸先複立貞陽侯淵明即位因朝內變亂遜位與太子晉安王登基次年晉安王即禪位與陳霸先國號陳建號永定是爲陳高祖皇帝此時江南地面已屬陳高祖所轄這江北地方尚屬東魏歲次庚午乃孝靜帝武定八年也魏主進高歡之子高澄之弟太原公高洋位爲丞相封齊郡王八月朔日魏主下詔禪位於齊郡王於是高洋即皇帝位國號齊改元天保延州府卻屬大齊地境這延州太守蔣勵乃齊帝的寵臣右仆射皮景和之內侄景和一力薦拔爲延州府太守管轄二州七縣地方廣闊錢糧極多人煙稠密百姓富庶是一個膏腴的都會蔣太守臨任已來殘忍苛刻百姓盡遭其害當日聽得心腹人報說黃河孟門山有一夥大盜廣有財帛錢谷如山近日殺了鹿阝州知州因怕別郡領兵來征剿成功得了財物故此親自提兵剿捕不期遭薛舉詐降計死於非命逃命軍士飛報府丞湯思忠合府大小官員盡皆失色湯府丞速著人齎公文下各縣令招兵守城一面急急申文至樞密院轉奏齊主請發救兵征討原來這延州府離黃河只隔得一百餘裏所轄宜州縣貼近黃河本縣知縣姓鄭名琦正坐早堂探事的飛報將來說蔣太守全軍陷沒官身亦被殺了又湯府丞有緊急公文下來說孟門山賊勢猖獗殺損官軍蔣刺史俞福皆遭其害各縣嚴守城池待部文到日一同出兵征剿鄭價看罷心下憂驚與書吏計議道日前蔣太守要征此賊我再三諫阻且從容動兵蔣太尊反怪我懦弱發怒而去今日全軍陷沒太尊被害本縣失於救應罪坐不小如何裁處吏書稟道蔣太守全軍陷沒朝廷坐罪老爺此事猶緩可以辨解如今賊軍戰勝其勢浩大本縣貼近賊巢儻賊寇一時臨城如何抵當乞老爺早發軍健民壯人等防守四門再議征剿之事鄭琦道此言甚當正欲點軍守城只聽見喊殺震天金鼓不絕探子飛報黃河強寇擁大隊嘍囉圍逼城下鄭知縣慌聚縣丞縣尉幕賓書吏上城來看只見衆嘍囉擁著馬上兩員大將呐喊搖旗討戰鄭琦仔細看那兩員將官一般打扮但見束發金冠耀日雕鞍神駿騰雲錦袍細甲放光明畫戟蛇矛輝映左首馬超再世右邊呂布重生伏威薛舉兩超群二虎將當先出陣鄭琦看城外二將奮勇部下嘍囉卻是不多心下亦不甚慌回頭問縣丞道戰守二策何者爲先縣丞傅明答道城池狹小軍少糧稀只宜謹守飛申本府各道發兵救援並力退賊方可保全縣尉奚良原系軍衛出身恃著自己積些武藝抗言道賊軍乃烏合之衆何足介意堂尊若與晚生軍士數百立斬賊首報捷台下鄭琦壯其言即撥軍士一千民壯三百大開南門奚良披挂上馬手提大刀出陣兩邊布陣已完奚良躍馬向前大喝覓死賊奴殺害蔣刺史正欲興兵擒拿碎屍瀝血以祭蔣公今反自來投死快快下馬受縛杜伏威道當今朝廷多事皆是你這幹貪官汙吏茶毒生靈我老爺特興義兵代天討罪你若知天命的早早下馬歸降可免一死奚良大怒拍馬舞刀殺來杜伏威正欲迎敵薛舉一匹馬早已飛出兩騎相交刀戟並舉二人戰十余合奚良一刀砍來薛舉閃過卻破個空薛舉複身照心一戟將奚良刺于馬下衆軍無主四散奔走杜伏威薛舉乘勢追擊鄭琦在城上見奚良被刺驚得面如土色慌叫閉門杜伏威軍馬早到門邊閉門不及城內軍士只得攔住廝殺被薛舉一連刺死十餘人軍皆四散杜伏威一馬當先直入城裏此時城中鼎沸人民各不相顧狼奔鼠竄嚎哭振天軍士降者大半鄭知縣單騎而逃縣丞傅明不知去向杜伏威薛舉入縣衙坐於堂上出安民榜禁止軍士殺擄犯者梟首百姓安堵如故開倉發粟賑濟孤老貧窮擊動縣堂大鼓聚集耆老鄉民社長六房書吏傳下號令凡有不到者全家處斬人皆懼死互相引薦一時聚集縣堂參見衆人稟道將軍呼喚有何台旨杜伏威道我興兵到此非爲財帛子女只因官吏不仁萬民塗炭特來誅剿貪酷替你百姓除害你們可實實說來本縣中有甚麽英雄豪傑孝子順孫皆當實報不可隱諱亦不許僞報衆人道本縣窄小沒甚豪傑只有在城善慶橋堍下一少年書生姓查名訥字近仁文材出衆極是個孝順的人甘守清貧不希榮祿縣主鄭爺時常周濟堅辭不受這一人是個奇士餘者俱是村夫俗子薛舉又問鄭縣尹傅縣丞做官何如書吏道鄭縣主爲官清廉傅二尹爲人剛介這二位老爺百姓皆感仰其德杜伏威便傳令鄭知縣傅縣丞二家老小宦資著人護送回家不許侵犯耆民百姓歡喜而散杜伏威薛舉二人帶甲權宿縣衙次日杜伏威差書吏人等齎金帛重禮到查訥家內聘請進縣查訥辭疾堅執不受書吏回覆杜伏威道是我差了我當親往禮請才是求賢之道乃與薛舉帶數個將校步行到查訥家中查訥迎入草堂相見坐定獻茶已罷杜伏威看那查訥但見眉列青峰眼澄秋水韜光姓字奇謀未許外人知抗志窮簷飽學自誇王帝佐端莊爾雅沈雄處沒半點輕浮慷慨牢騷談笑裏伏萬餘兵甲不是子牙再世應知鄧禹重生查訥道小生無學無能株守蓬蓽何勞二位將軍大駕光降有失遠迎杜伏威道當今國家變亂盜賊蜂起百姓遭殃四海有倒懸之危小將特興義兵除暴安民非圖金帛子女而來也古人雲良禽擇木而棲良臣擇主而事某雖赳赳一勇夫渴有求賢之志聞君大名如雷灌耳敬奉微禮欲屈尊駕共救生靈替天行道望勿峻拒爲幸查訥道某一介書生不諳世務況老父年高朝暮難離膝下不能奉命將軍休罪薛舉道某弟兄二人竭誠奉謁敦請足下爲公非爲私也尊翁年雖高大接入縣衙亦可奉養足下堅執不從眼見得滿城百姓盡遭殃也查訥一聽此言心甚感惻方才允道待某稟過老父願侍將軍聽教只恐才疏學菲有負二公重托耳有詩爲證才出茅簷意氣濃二十八宿羅心胸宜州一諾軍機定位看天山早挂弓杜伏威大喜喚從人獻上禮物查訥收了稟知父親同伏威等上馬入縣衙來杜伏威大排筵席慶賀一面令查訥權掌縣印查訥推辭不受只居行軍記室之職正飲酒間哨馬報延州府府丞湯思忠帶領五千軍馬數員大將把城池四面圍住速請主將出令查訥笑道湯府丞此來是自送其死耳薛舉問道湯府丞爲人何如查訥道這府丞姓湯名思忠冀州人也一味好財貪色酣酒吟詩乃富家子弟白面書生不諳韜略今日之來豈不納命杜伏威道請問足下大兵臨城何以退之查訥道二將軍英雄無敵何故下問於鄙人杜伏威薛舉再三請教查訥道杜將軍領五百軍馬開門迎戰可敗不可勝別有良計杜伏威慨然起身披挂上馬手執長槍選軍五百大開城門出戰對陣湯思忠隨從六員大將一員是統制司正統使常泰一員是副統使樂正年一員是統制司把總王連城一員是本府都總管錢向一員是副總管沙應龍一員是毗豐衛護衛申千秋各各全身披挂騎著戰馬手執兵器兩陣對圓湯思忠立馬陣前高聲喝道何等狂賊輒敢殺害大臣僭據城廓快快下馬受縛免汙我刀杜伏威道你這些害民的豬狗殺得盡絕方暢老爺之意那一個送死的快向前來官軍隊裏一員大將手持大斧拍馬出陣衆視之乃是正統制常泰兩馬相交戰不十合杜伏威拍馬回陣常泰不舍奮力趕來杜伏威棄盔散發而走奔入城內隨後常泰湯思忠號令衆軍依舊將城緊緊圍了晝夜攻打卻說薛舉接應杜伏威入城同進縣衙坐定查訥問道來將何如杜伏威道敵軍雖衆不足懼也若用我那所藏將土這數千軍立刻化爲齏粉但遵恩師分付不敢擅用耳查訥驚道小生看本城軍馬不過千餘難以敵衆故先令將軍試探一陣然後出奇兵勝之將軍既有軍士何不用之以取勝也薛舉笑道杜將軍將土藏在衣袖裏近仁要看即時可至查訥道或者是杜將軍胸中有數萬甲兵否既有軍馬小生願求一見杜伏威就於縣堂上身邊取出寸草赤豆口中默誦真言喝聲道疾頃刻間變成軍馬杜伏威又念咒語軍士各依隊伍坐作進退不差分毫查訥看了道請收了法機貴秘密不可泄露杜伏威右手撚訣大喝一聲軍馬依然變爲草豆查訥道杜將軍有此妙術神鬼莫測斬將必矣杜伏威道此法是我恩師林爺傳授甚是玄妙臨別時他再三囑付說此法只可護身用於急難之時不可恃此幻術妄行殺戮聖人雲邪不勝正妖不勝德若專仗此法恐其有失不信只看黃巾赤眉等輩便是樣子因此不敢擅用乞足下另設良策破敵查訥道尊師所言語語金玉自古及今未有以邪術而得天下者兵以正合以奇勝經權互用方合玄機杜將軍暫且解甲休息三日之後必然破敵當夜歡飲直至更深罷席薛舉守東南二城杜伏威守西北二城號令嚴肅軍士齊心次日平明查訥升堂理事張挂榜文曉諭居民城內人多糧寡難以支援凡百姓人等願出城者聽其自便守門軍士不可阻擋城中百姓貧乏者攜男挈女盡皆出城就食絡繹不絕正是甯爲太平犬莫作亂離人不知查訥是何奇計以破官軍再聽下回分解第二十八回湯府丞中計敗兵杜元帥納言正位詩曰摘句尋章一腐徒敢當重任執兵符羽書未報三軍捷浪戰先迷人陣圖慷慨少年欺信布奇謀策士勝孫吳德敷黎庶居尊位不讓當年胯下夫話說湯思忠同六員將百般攻城不下數日後軍心漸漸懈了湯思忠無計可施傳令暫且退軍再作道理常泰稟道某看那賊武藝不在小將之下怎交鋒未及十合便作敗而走莫非其中有詐亦須準備王連城笑道常將軍過慮鼠竊狗盜之徒只希劫掠而已今遇大軍心膽皆碎望風而走乃怯也有何詐計只顧催趲攻城不可退侮楊思忠道王總撫所見甚明正議間忽見小軍來報道城內百姓無糧攜老挈幼俱出城外就食湯思忠下令道百姓出城聽其所往軍士毋得乘機擄掠違者斬首令方出又見報有一夥百姓投入營門要見老爺有機密重事來報湯思忠令只許爲頭的進見軍士引數個爲頭的百姓入寨湯思忠喝道汝等衆人有甚話說莫非城中奸細麽那百姓叩頭道小人們不是百姓原是本城軍校賊首杜伏威薛舉破城劫掠勢不可當小人們戰敗只得佯投賊兵部下原來這賊不爲爭城奪郡只圖財帛子女將縣庫劫空正要覆回巢穴不意老爺軍到將城圍困目下城內乏食賊心甚慌欲回水寨又無出路衆賊計議今晚偷開東門逃走小人們探得這個消息妝做村民雜出城外特來報知以求重賞湯思忠賜以酒食和衆將商議道賊兵無糧今夜逃遁未知虛實何如常泰道衆賊大肆擄掠諒糧草尚足久支今據城未及十日便說無糧其中必有奸計主將不可輕信墮其計中依小將愚見只是催軍圍城外無救兵不久內變城自破矣總管錢向道無糧之虛實雖然未審戰敗欲逃此是實情今且將報信軍士監候主將遣將二員各帶一千人馬埋伏東門僻處待賊衆出城之時放起號炮半腰裏截住後兵就奪城池主將起合寨軍馬趕殺前軍使賊兵前後不能相顧管取大勝湯思忠大喜道錢總管之計甚妙言亦不可信機亦不可失事不宜遲一面將軍校監候一面遣兵埋伏差正統制常泰領步軍一千出東門離城十五裏東南地名石佛村埋伏差護衛申千秋帶領步軍一千出東門離城二十五裏西北地名珠梅莊埋伏俱聽號炮響一齊引軍殺出就勢奪城二將聽令而去又差總管錢向領軍三百帶諸色號炮離城琵琶嶺高阜處埋伏覰賊兵出城放起連珠炮爲號接應兩處伏兵湯思忠和沙應龍樂正年王連城率領軍馬準備捉賊記功有詩爲證漫無奇計欲成功不識人間有臥龍螳臂撼搖徒自斃致令千載笑湯公話分兩頭再說查訥暗定妙計揀選精細嘍囉十數個妝做鄉民到湯恩忠寨內傳報消息自和薛舉杜伏威在城樓上飲酒作樂至申牌時分探事的報說敵人分軍四出不知何意查訥笑道湯府丞中吾計了杜伏戚道官軍移動必是複來攻城軍師怎知中計查訥道將軍不須問今夜管取殺敗官軍明日請將軍在延州府城中高坐當下就傳將令薛將軍帶領精壯嘍囉五百本縣壯士五百至黃昏大開東門徑奔黃河渡口每一人背包裹一個如遇伏兵盡皆抛棄違者立斬遇著敵兵盡力追殺只看紅紅燈出城爲號就是接應兵到又並朱儉帶領弓箭手三百長槍手三百亦出東門馬家堰土山上屯紮若見火起即出村口射官軍後陣長槍手各帶紅燈籠一個守護箭手杜將軍帶領馬步軍一千二百在東門外離城僻近處埋伏只看官軍殺進城時攔阻回路準備捉人三將聽令各自打點去了查訥連夜差軍士城門內掘下陷坑四下埋伏撓鈎手各各摩拳擦掌等待交戰有詩爲證妙算誰相匹神機第一流運籌揮羽扇談笑覓封侯再說延州府府丞湯思忠當晚遣兵調將已定然而自領馬步軍兵離寨伺候總管錢向領了三百軍士至黃昏左側已到琵琶嶺山上撒開炮架一眼望著山下等到更餘此時月色明朗望見山下西北上火光沖天而起軍兵無數行動錢向即忙放起號炮知會兩下伏兵申千秋聽得炮聲震天率兵殺出珠梅莊來卻好與薛舉兩軍相遇薛舉倒拖畫戟拍馬先走後面嘍囉將包裹盡皆棄擲而走申千秋策馬挺刀來趕薛舉軍士不顧廝殺且搶包裹薛舉正走之間只聽背後申千秋趕來大叫賊將休走薛舉勒轉馬頭喊道尋死的快來納命兩馬相撞兵器變加不三合申千秋被薛舉一戟刺死馬下衆嘍囉見主將得勝勇氣百倍翻身衝殺過來這邊官軍因搶物件隊伍已亂又無主將四散落荒而走被嘍囉大殺一陣屍骸遍野薛舉正欲回軍遠遠見東南上火光沖天喊聲大起又沖出一大隊人馬來薛舉停馬看時只見四匹馬上四員大將隨著數千軍士飛也似湧來薛舉大叫道爾等兵已殺盡何故又來送死王連城拍馬向前罵道賊奴中吾錢總管妙計早早下馬受縛薛舉大笑道蠢奴何曾中你之計你等反中我家之計了坡下一將已被我刺死你等又來受用這條畫戟王連城激怒舞動大刀劈頭砍來薛舉挺戟就刺兩軍呐喊二將鬥了十餘合不分勝負湯思忠拍馬觀看心下驚惶又令沙應龍樂正年二將助戰沙應龍也使方天戟樂正年用雙鐵簡二匹馬刺斜裏殺過來薛舉抖擻神威一條戟擋住三般兵器一來一往又鬥上二十合薛舉賣個破錠蕩開陣角敗陣而走三將不舍一齊拍馬趕來薛舉約走半裏之地三將看看追上薛舉斜倚畫戟彎弓搭箭看得清射得巧颼的一箭剛中樂正年肩窩翻身落馬薛舉回馬就刺王連城沙應龍二人抵住廝殺衆軍救樂正年上馬已是昏暈將絕薛舉和二將戰上數合帶馬又走二將忿怒趕來追過山嘴忽然鼓聲亂響薛舉急擡頭見一片紅燈照耀山頂心下暗會忙策馬奔上山來後邊二將狐疑正欲回馬薛舉已至山上一聲梆子響山上亂箭射下急如飛雨沙應龍所乘戰馬腿上著了火箭負疼滾倒將沙應龍掀翻地上胸膛上被馬踏壞王連城忙來救援身上已著數箭昏暈倒了衆軍中箭著傷死者甚多山上朱位和薛舉合兵一處回身追殺下來殺得屍橫遍野血流成渠降者不計其數朱儉取了沙應龍王連城首級複取舊路殺回城來再說統制官常泰領兵在石佛村埋伏當夜更盡聽得炮聲振天即帶軍士呐喊殺奔城下見城門大開並無一人阻擋常泰心下暗想賊黨無糧故棄空城逃遁虛插旌旗諒無人馬當先指麾軍馬殺入猛聽得天崩地裂之聲軍士一齊叫苦都跌入陷坑內去常泰情知中計急忙帶轉馬頭奔出城外城內伏兵齊出殺得官軍大敗常泰顧不得軍士單馬落荒而走不上五裏一聲鼓響閃出一枝軍馬當頭一員大將正是杜伏威攔住去路大叫匹夫待走那裏去杜爺候你多時常泰大怒奮力惡戰二將鬥四十餘合不分勝負衆軍打攢攢布成簸箕陣圍逼攏來正待並力擒捉只見塵頭起處又擁出一隊軍馬來卻是薛舉朱儉回軍薛舉見杜伏威戰常泰不下拍馬挺戟夾攻常泰措手不及被薛舉生擒過馬綁縛了其餘軍士盡皆投降杜伏威大獲全勝進城天色黎明查訥率將校迎接入縣衙坐定軍士推過常泰立於階前查訥慌忙下階親解其縛請入堂上而坐常泰頓首道敗將請誅何敢當將軍重禮查訥道當今兵戈載道萬姓瘡痍豪傑拊囗人人思奮我等替天行道拯救蒼生將軍不棄願同舉大義常泰感激請降拜於階下杜伏威扶起遜坐有詩爲證自分生平鐵石腸輸忠期把姓名揚只因朝內多奸佞致使將軍一旦降當日設宴慶賀犒賞大小三軍查訥查點軍籍共得降軍四千余人良馬五百餘匹糧草器械甚多心下大悅和杜伏威薛舉道湯府丞戰敗單騎逃去不如乘此大捷之勢攻破府城以爲根本然後攻掠諸縣廣蓄錢糧大事就矣杜伏威薛舉道先生之言正爲迅雷不及掩耳深合玄機就此進兵不可遲滯常泰坐于側席低頭不語查訥道常將軍既蒙不棄即當請教爲何低首不言常泰道敗兵之將不可言勇感蒙三位將軍不殺之恩思欲報效惟恐生疑不敢言耳杜伏威道大丈夫傾蓋若故白首如新義氣相投肝膽可照有何疑哉久聞將軍乃忠義之士智勇足備如有見教焉敢不從常泰道湯府丞一介書生不知軍務延州府百姓被其重斂苛虐者皆欲食其肉而寢處其皮今遭戰敗必驅軍民同守雖是民無親上之心但此城郭頗堅錢糧亦廣一時難以攻破攻戰之際未免百姓遭殃小將有一計此城反掌可得查訥拱手道願聽將軍良謀常泰道將軍今夜放小將回城見湯府丞某須如此如此說時彼必聽信將軍便進兵來攻某爲內應但入城之後望將軍禁止殺戳實爲萬幸查訥離席稱謝道常將軍妙算非某所及就此進兵將軍切莫有誤常訥道大丈夫一言既出駟馬難追豈有變更即折箭爲誓當下席散常泰收拾了當初更開城門去了薛舉道常統制初降未知其心近仁縱彼出城儻有變詐反墮其計查訥道將軍放心某素知常公少立名節秉性堅貞此行管取成功明日某與杜將軍爲前部將軍爲後應同往攻城朱誠庵守衛本縣縱有詭計亦不足慮又遣牙將宋斐帶兵五百追趕常統制望見城池便要回軍不可前進一一分撥已定卻說湯思忠領衆將和薛舉交戰見前軍得勝薛舉敗走忙催軍策馬隨後追來正走間敗殘軍士迎著報道王沙樂三將俱被殺死全軍盡沒常統制兵敗被擒湯思忠大驚忙收轉馬逃回府城催軍守護四門當夜二更軍士報城外常統制單騎叫門黑夜不敢擅開乞請鈞旨湯思忠自上城樓來看常泰高叫開門後面追兵來也湯思忠終是懦懦不知兵法見一人一騎回來忙令軍士開門迎進驚問道統制不回諸將戰死下官手足無措今者何以得脫而回常泰道小將聽得炮響即出軍襲城不期被有準備我兵大敗回軍死戰正欲脫身路遇一員少年壯士馬上挂著沙應龍王連城首級他兩下夾攻將來小將難以應敵無奈詐降幸喜賊將無謀遽爾聽信待小將以心腹被我黃昏竊了二人首級砍開城門逃奔出來彼已知覺故有兵來追趕正言間只見遠遠火光明亮追兵漸近呐喊鼓噪將至城下常泰道賊兵黑夜決不敢臨城主將休往少頃追兵果然退去常泰笑道我諒昏夜之間賊兵焉敢近城湯思忠大喜留常泰在府衙安歇次早探馬報賊党杜伏威薛舉引軍馬數千聲言要取城池湯思忠忙請常泰商議常泰道恩府督軍護陣小將出馬力擒賊首則餘黨自散矣說罷綽槍上馬大開東門出城擺成陣勢遙望軍馬已到兩陣對圓門旗開處擁出兩員少年驍將常泰高聲罵道逆賊無知正要興兵征剿今大膽返城求戰是自送其死耳薛舉罵道忘恩背義之徒有何面目誇口常泰聽了大怒挺槍躍馬沖過陣來薛舉挺戟迎戰兩軍呐喊二將鬥上二十余合薛舉拖戟回陣杜伏威出馬交鋒數合之間常泰虛搠一槍望城內就走背後查訥薛舉杜伏威三將率領軍士緊緊接尾追來湯思忠見常泰敗回親自摧軍出城接應倏然追兵已到面前慌忙回馬逃命被薛舉飛馬趕近門邊活捉膝上常泰招集衆軍進城盡降其衆杜伏威薛舉查訥常泰都到府堂坐定押過湯思忠跪於堂下杜伏威指著罵道害民賊子貪酷狂夫百姓遭爾荼毒錢谷被爾侵漁今既被擒有何理說湯恩忠道懦儒濫叨爵祿不能爲國家出力反遭爾等所擒一死何辭但聞建王霸之業者不絕人之嗣仆年半百只得一子今方三歲乞將軍可憐說罷伸頸受戮查訥道湯府丞爲官雖貪臨難不苟姑饒其命杜伏威喝道戕民之賊本該族滅查軍師憐宥免汝一死叱軍士放去湯思忠得了性命抱頭鼠竄收拾家小連夜回鄉去了但見忙忙似喪家之狗急急如漏網之魚平日間裝模作樣詐百姓財物儼是活閻王今日裏鼠竄狼奔保一家首領宛然真小鬼說不起繃刑吊拷自問了絞斬徙流離亭那有餞行人沿路絕無饋送客支不動驛夫轎馬捉不得公用舟車行一程耽驚一程惟慮省悟複來追思一事煩惱一事這次再無餘羨得仗著那硬舌頭爲人再世饒了這窮性命得放還鄉林下情願呷清湯當道何爲不作福杜伏威稱須放手湯思忠是下場頭查訥出榜安民開倉賑濟次日建立招賢館延接四方豪傑之士數日間接得數儔大將一人複姓皇甫名實字碩卿陝西富平縣人生得身長九尺大眼鋼須慣使九節銅鞭武藝出衆一人姓曹雙名汝豐字公厚陝西鞏昌郡人生得身材魁偉狀貌猙獰面如囗血須似鋼針能用大刀有萬夫之勇因武舉不第隱居山村打獵聞杜伏威招賢特來相投又有一人覆姓尉遲雙名仲賢字子用朔州單陽人氏生得身長面瘦骨格清古善使流星錘飛槍有百步穿楊之箭爲打死人命逃竄江湖今特來投一人姓黃名松字爾耐年方二十餘歲生得容顔清麗虎背熊腰能使雙刃大叉本縣人氏因見杜伏威開倉賑濟招賢納士有仁義之風故至招賢館拜見黃松就舉薦本郡城外盧家灣有三賢士姓王弟兄三人胸懷經濟之才腹藏孔孟之學熟諳兵書深通韜略人都稱他爲王家三俊長名騏字孟龍次名騋字仲良三名驤字季昂屢次刺史辟請不就將軍須當禮聘可爲梁棟之材杜伏威即差黃松齎金銀玉帛往請王家三俊弟兄三人聞黃松說杜薛二將有仁義之風不可違逆欣然受聘同黃松到招賢館投拜杜伏威薛舉大喜排筵慶賀次日查訥請杜伏威升堂議事杜伏威居中而坐左首薛舉右首查訥東邊一帶是王騏王騋王驤常泰西首一帶是皇甫實曹汝豐尉遲仲賢黃松次序而坐查訥開口道列公在此某有一言杜將軍自興義兵已來屢戰屢勝得了郡縣招賢納土英雄歸心吊民伐罪應天順人仁義之聲播於遐爾王霸之業翹首可成前賢有雲蛇無頭而不行鳥無翅而不飛雖有英雄雜亂無統紀律不行今日杜將軍當正大元帥之位掌握兵權諸位將軍盡聽號令量材擢用或掌錢糧冊籍或理民情詞訟或專任征伐或督理糧草或專司行賢各供乃職則上下齊心方成體統列君意下何如衆人同道查近仁所見極明所當如此乞杜將軍早居元帥之位以副衆望杜伏威道小可因見紀綱頹廢萬姓流離故興兵馬招接英豪共斬亂臣之頭以救黎民以安社稷事定後擇有德者居之仆等北面而事庶無所利人心皆安天理亦合今若率爾自大妄居帥位甚非義舉皇甫實黃松兩個跳起身來諫道今者煙塵四起人人稱雄我等聞將軍大名盛德故來相從將軍若堅執不允近仁之義則人心攜貳各懷猶豫大事去矣王騏兄弟三個亦勸道查君之言深達事體統制無主人心不攝不如權就帥位又非稱王道寡有何僭妄早發兵馬以圖他郡此是正理何須推遜薛舉道諸君之言甚善大哥暫爲主帥統攝軍馬何必過謙杜伏威只得應允就改延州府爲都統元帥府府前立一面帥字杏黃旗諸將尊杜伏威爲都統正元帥薛舉爲都統副元帥查訥爲軍師王騏爲副軍師王騋王驤爲參軍常泰曹汝豐爲先鋒朱儉黃松尉遲仲賢皇甫實俱爲護軍校尉當日殺牛宰馬祭天享地大赦囚犯王騏又道名位已定人心悅服本郡所管二州七縣皆是錢糧豐足之處諸縣易攻只有鹿阝州城廓完固人心堅附況且錢糧極廣一時難以攻破若得此州則諸郡不足定矣查訥道王孟龍之論最普元帥宜聽之杜伏威道任從軍師調遣查訥傳下將令副元帥薛舉率領馬步軍兵五千王騏爲參謀尉遲仲賢常泰爲左右羽翼即刻起程攻取鹿阝州次撥曹汝豐皇甫實二將帶領步軍三千爲接應陸續進發其餘將士盡隨杜元帥守護城池有詩爲證元帥開牙殺氣騰風雷號令最嚴明一朝榮貴君休訝今日方知顯將星卻說薛舉一行人馬至隆鎮村下定寨柵領軍四面圍定鹿阝州判裘澄爲官清正善識天文在任日久深得民心因是知州周升任滿朝覲至黃河被繆一麟所殺上司以委裘澄署印自齊顯祖天保九年蒞任以來已是五載此時顯祖肅宗二君相繼而殂其孫世祖即位改元河清世祖皇帝柔懦無才寵信嬖佞居東宮時有幸臣二員和士開穆提婆甚是得寵因世祖登基即以二人爲左右二樞密執掌朝綱總理國政凡是有金寶賄賂者升擢顯位清廉公正者黜退貶謫因裘澄是個清官無甚金銀浸潤假以不救堂官爲由奏陳世祖差四個武士提裘澄至京師勘問裘澄打點和武士啓行赴京剛遇薛舉提兵攻打城池裘澄安慰了四個武士督兵四門守護夜間上城巡視仰觀天象見將星朗朗照於本城心中暗想目今皇上無道寵用佞臣主星昏暗太白後入帝座不久國家將亡今和穆二賊無故拘我至京勘問此去必遭陷害古人雲識時務者呼爲俊傑哲人要知機不如背了武士歸降來將再圖後事未爲不可正是情知不是伴事急且相隨當下裘澄命將四個武土留下不知這四人性命如何且聽下回分解第二十九回軒轅廟蘇樸遭擒延州府伏威遇弟詩曰敢言直諫配三仁遠謫邊隅作去臣設計定謀催勁敵輸忠盡節重天倫生前誓作奇男子死後當爲正直神萬古芳名垂竹帛蘇君端不愧儒紳話說裘澄仰觀天文見將星朗朗照於城內知難與爭鋒有心歸服杜伏威回衙和心腹人計議暗將四個武士逐出城上豎起一面降旗差親隨軍校往薛舉寨內遞上降書薛舉看罷喝道此是用詐降計誘我入城若要是真降著裘州判親來吾才不疑軍校回城備細說了裘澄道既已歸降必須親往換一身素服親捧版冊輿圖印信步行到城外薛舉寨內跪獻薛舉慌忙扶起道久聞足下才德欲謁無路今幸相從實慰渴想裘澄道卑職老邁無能株守鹿阝州受齊顯祖寵祿不能盡忠報國甚爲赧顔又遭輔臣嫉妒將欲提回勘問心所不甘聞將軍興仁義之師大駕到城傾心願投麾下不思爵祿之榮惟求泉石之樂幸蒙不加誅戮感激非淺薛舉大悅遜之上坐設宴相待酒罷並馬進城安民已畢差快馬飛報帥府杜伏威查訥大喜就委王騏權掌州印請薛舉裘澄同至帥府相見薛舉接了回文別了王騏與裘澄衆將回至延州帥府下馬入堂參見衆觀裘澄一表非俗但見頭戴儒冠身穿素服果然一貌堂堂淡黃臉三丫掩口髭髯骨格非常眉隱江山秀氣胸羅錦繡文章慣識天文也知地理熟諳行藏不是尋章摘句果然定霸圖王杜伏威道久聞裘君大名今得從事何幸如之裘澄道老朽樗櫟庸才時乖運蹇故主之恩未報反罹奸黨之讒自分身遭縲絏感蒙仁主收錄誓當報效決不負恩杜伏威亦設宴款待飲酒三巡查訥道本府七縣二州惟鹿阝州富庶而險因今得裘公相從真乃天意非偶然也但其餘州縣未曾歸附不識何計可以取之裘澄道卑職雖不才蒙元帥軍師垂問這數縣縣宰俱與某契厚廣樂縣縣令譚希堯汾州縣縣令姚鸞敷城縣縣令姚鳳與姚鸞是嫡親兄弟這三人俱是齊顯祖天保六年除授與卑職相交最久文安縣縣令王大爵廣安縣縣令伍通宜君縣縣令柏台此三人蒞任未久相交雖淺頗亦義氣相投不必廢元帥張弓只矢只須卑職片紙喚來拜投麾下上郡州知州席銘傳材傲慢外有虛名內無實學不過一腐儒而已攻之亦易只有白土縣縣令蘇朴是個謫官才兼文武智識不凡天保元年舉孝廉曆仕外郡聲名籍籍盜賊屏息朝廷嘉其才於天保八年升爲諫議大夫直言敢諫權奸斂迹今上新登大寶寵用和土開穆提婆二人此公上書切諫忤了朝廷謫爲白土縣縣尹最得民心椎慮這一縣難以攻拔軍師須選大將定良謀庶幾可得查訥道既承明教乞公作急修書致于諸縣若得歸附白土亦不足慮也當日帥府擊鼓傳令諸將皆集查訥分撥出軍大元帥杜伏威爲主帥常泰副之曹汝豐尉遲仲賢爲合後共起精兵五千去攻取白土縣又令黃松爲正將皇甫實爲副將率領精兵三千攻取上郡州即日起程一面揀選能言軍士齎書分投往各縣去了裘澄暫授帥府參謀參贊軍機兼署延州府郡丞查訥薛舉諸將等俱備守城不出且說黃松皇甫實二將不一日已到上郡州令軍士搖旗擂鼓並力攻城知州席銘探知消息分撥軍民守衛聚集住貳官員書吏人等商議席銘道賊兵攻陷延州郡殺了蔣刺史和鎮撫俞福近來裘州判又舉城納降賊勢猖獗爲首二人英雄無敵今既臨城如何區處吏目鄒聞道答道本州城廓堅固一時難破所憂者催糧草不敷耳堂尊大人謹守城池火速差人齎檄各郡求救內外夾攻方可退賊席銘從其計添軍各門固守遣軍健出城分投各郡求請救兵並不出戰當晚黃松解圍下寨和皇甫實計議道席知州一書生耳聞我兵至焉敢迎戰意必發書鄰近州縣請救這早晚恐有人出城公宜分遣人要路攔截使彼內外消息不通城中無糧救援不至數日間城自陷矣皇甫實道主將所見極明即遣精卒把守東西南三處要路北首是大寨諒無人敢過將及天曉三處軍士果然獲得數個奸細解進寨來細搜身上懼有求救文書盡皆殺了急催軍士並力攻城果然城內人多糧少百姓饑荒怨哭之聲不絕這城中有一富戶姓甄名雍原來是個破落戶出身爲人刁鑽奸巧佛口蛇心專務足恭謅佞習成一家生理俗言叫做慣扛幫又喚做烏嘴蟲幫襯著宦家子弟賺得些錢鈔納了本州提控倚官托勢剝削小民役滿夤緣當道選作遼州黃澤鎮巡檢兼管稅務盤詰客商車輛大獲財利被人告發上司驅叱回鄉做成偌大家業廣置田産只是慳吝鄙嗇爲富不仁親族鄰友毫無所及惟圖便宜不顧行止若得分毫利益任你唾駡談論漫不爲意因此人人怨惡目爲小人取他一個渾名喚做縮頭龜有詩爲證看人顔色吃人虧打罵由他我自爲筍殼包成花子臉任藏名號縮頭龜衆百姓見黃松等人馬攻城甚急城內糧食不敷暗中三三兩兩商議道縮頭龜家裏錢財滿庫米粟如山我等受餓他卻閉門飽食我等不如打進他家搶擄糧食大家吃些免得餓死料官府自救不暇焉能禁治百姓內中有一人與甄雍是鄰居姓張排行遜六向前道諸君所言雖妙但是只圖一時之飽不思殺身大禍比如搶了縮頭龜糧米就是白晝搶劫與強盜何異此乃犯法的事攪然究治如何脫身爲今計不如先差的當之人吊出城去投降來將約定今夜舉火爲號砍開南門接引大軍進城我這裏黃昏打進縮頭龜家裏將他滿門良賤盡皆殺了擄劫家財糧食放起一把火來就勢往州衙前也放一把火迎接杜伏威人馬入來我等可保身家無事還有重賞哩衆人齊道這算計甚好事不宜遲儻露了風聲其禍不小當下就叫張遜六扮做漁翁披蓑戴笠扒出水門走不半裏被伏路軍拿人黃松大寨黃松細問來歷張遜六細道前情黃松道莫不是席知州使你來的難以聽信張遜六磕頭道席銘那廝不知民情艱苦一味糊塗城中缺少糧食百姓大半餓倒小人等只爲生死二字來見將軍若有虛詐將小人監禁於此但看今夜何如皇甫實道既如此說不必疑心今夜苦果火起城開便是他的功勞必有重賞黃松將張遜六拘留寨後遍示衆軍嚴裝飽食以待內變再說甄雍是夜謹闊前後重門和一妻二妾子女們在後廳花軒裏飲酒作樂說說笑笑道看這些不成才的花子們日常間不肯節儉今遇兵火卻都餓死怎比咱老爺飽食暖衣這等快樂雖是咱天生的造化卻也要人力經營咱每日積趲錢財省儉日用故得如此提挈你衆人享福自古一人有福挈帶滿屋說罷大笑不止唱道咱快活心胸肉滿春台酒滿鍾直飲到昏鍾動傾幾個青花甕嗏醉了樂無窮嬌嬌陪奉洗腳登床便把云云弄管甚麽圍城不透風大娘子與兩個小娘子各奉我一杯再唱出與你聽三位娘行一個幡竿兩木樁立起似筆架樣坐倒似山形狀嗏與你熟商量今宵當長明夜輪他後夕在三娘帳咳若是這般又起爭端了也罷不若今夜都來共一床你兒女們也敬我一杯我再唱一出你們聽白臉黃邊二物從來入手艱或把繩兒貫或作攢絲面嗏財與命相連有他飽暖骨肉團圓慶賀深沈院富貴由人說甚麽天這甄雍正在家飲酒取樂瘋獐瘋智的驕其妻妾忽聽得門外一片喊起數百人手執器械火把一擁而入甄雍見勢頭不好情知劫擄急忙閃入臥房躲避未及進門被一好漢劈頭一棍打死一門老幼盡行屠戮衆好漢搬運糧米收擡金銀衣飾停當四圍放起火來只見州衙前又早火起城門大開城外黃松皇甫實見城內有變火光燭天忙驅軍馬擁入南門殺進州行據住了庫藏涵殺官軍單單走了席銘不知去向家眷人等亦被亂兵所殺黃松率軍救滅餘火出榜安民次早打開倉廒將米粟盡散與被火百姓大賑貧窮差張遜六至延州元帥府報捷查訥薛舉聞之大悅重賞張遜六授爲百夫長幫助黃松權掌州事聽候調遣不題再說杜伏威軍馬殺奔白土縣來哨馬報道自上城外已立下三個大寨中寨是縣尹蘇朴左寨是縣尉戴大儒右寨是弓箭教師顧天麗三寨共有二千餘軍號令整肅準備已久杜伏威傳令離城二十五裏依山傍水紮下營寨商議進戰之策常泰道裘州判甚言蘇樸之能元帥不可輕敵杜伏威笑道狠瑣小敵何足介意明日一戰誓擒此賊常泰道元帥雖然英勇遇勁敵不可造次明日某與元帥衝鋒引戰尉遲公與曹將軍領兵接應庶無失誤杜伏威從其言次日平明俱全身披挂將軍馬分爲二枝杜伏威常泰領馬步軍三千當先搦戰曹汝豐尉遲仲賢領步軍二千在後督陣大刀闊斧殺向前來蘇朴知杜伏威軍馬已到隔夜預先籌畫了令左右二寨如此出兵接應當下披挂齊整綽槍上馬出營布陣兩軍對圓二將出馬蘇朴高叫何處狂賊敢擅離巢穴來此搦戰杜伏威馬上躬身道末將久仰侍中大德故爾輕造侍中名聞寰宇才任棟梁而爲區區一縣令智士爲之不平不若與小將共起義兵掃除逆黨同享富貴豈不美哉侍中俯納愚言庶不陷於賊臣之手蘇樸大笑道汝乳臭孺子曉得甚麽吾以忠孝傳家豈從賊黨爲寇我擒汝獻俘如拾芥耳言罷挺槍躍馬殺過陣來杜伏威正欲迎戰一馬早已飛出乃是副將軍常泰也手持大斧接住廝殺二將鬥了二十余合蘇朴拍馬回陣常泰趕來被蘇樸背射一箭正中常泰右足常泰吃了一驚撥馬便回蘇朴飛馬趕來杜伏威攔住接戰數合後蘇朴撥馬又走杜伏威大喝道那裏走你那背射計射得我麽驟馬緊追趕過對陣蘇樸已閃入門旗裏去了猛地裏一聲梆子響弩箭如雨點般射來杜伏威情知中計慌忙勒轉馬頭左肩上已著兩箭負疼帶箭而走蘇樸一騎馬緊緊追來衆官軍見伏威已敗俱大喊圍將上來正在十分危急恰好曹汝豐尉遲仲賢步軍早到兩下混戰又聽見西南角上喊聲大振一彪人馬驟至卻是弓箭教師顧天麗手揮鐵朔領軍殺入陣來又見東南角上也喊聲大振一彪人馬擁至乃是縣尉戴大儒手執雙劍率軍衝殺過來兩校生力兵勢不可當將杜伏威人馬困在核心自辰至午衝突不出部下的將士損折甚多三處官軍漸漸圍逼杜伏威無奈只得披發仗劍口念真言將劍往西北一指霎時烏雲罩地霹靂震天狂風大作走石飛砂又毒蛇猛獸凶神厲鬼隨風而至嚇得官軍驚怖無措抛戈撇劍而走蘇樸等亦皆棄陣逃去杜伏威與三將乘勢大殺一陣收軍回寨常泰尉遲仲賢曹汝豐皆賀道元帥真天神也不然我等都被擒矣杜伏威笑道今日是我欺敵太過誤中奸計若非法術破之幾乎狼狽諸將士俱疲憊了各賜酒食將息謹守營寨不題再說蘇樸回寨查點軍士傷損不多和戴大儒顧天麗商議道杜賊已入吾彀中將被擒獲不料用此妖法脫困而去實爲可惜兵不厭詐今晚諒彼戰勝不作準備乘機劫寨二公以爲何如顧天麗道此計甚妙今夜劫寨可保全勝當夜二更顧天麗當先蘇樸繼後帶領精兵一千悄悄進發到得杜伏威寨邊已是三更衆軍發喊殺入果然杜伏威不曾準備俱在夢中驚醒慌張亂竄你我不能相顧杜伏威聽得喊聲大起寨內火光透亮急披甲綽槍上馬衝突出來怎當箭如飛蝗不能前進複身穿出寨後奔走顧天麗見杜伏威單騎出寨欺他獨自一人策馬趕來看看追上杜伏威回身迎戰二將鬥了十余合顧天麗額中一槍翻身落馬杜伏威人馬被官軍一沖自相踐踏盡皆潰散直到天明蘇樸收軍自回去了杜伏威聚集敗殘人馬少刻衆將皆到查點軍士折傷大半杜伏威屯紮不住只得同諸將回延州郡來查訥薛舉接見備言致敗情由查訥道前者裘參謀致書各縣未見動靜黃將軍已取了上郡州不期大元帥反敗于蘇樸之手勝敗兵家之常不足介意必須起大隊人馬薛元帥同行方可成功衆將皆然其言當日再添軍士共馬步軍七千杜伏威薛舉查訥常泰曹汝豐尉遲仲賢共六員正將殺奔白土縣來但見軍行騰起地中塵遮空蔽日馬走踏翻攔路草偃土搖風槍刀噴雪閃爍進萬道寒光旗幟蒸霞招展動半天殺氣馬上將神威凜凜渾如惡煞下雲端步下卒面硬猙猙好似夜叉離地獄進退不參差軍容嚴肅銜枚雖疾走隊伍整齊果然將帥堂堂陣到處人稱正正旗哨馬探聽急急報入蘇樸寨中蘇樸笑道我正要賊軍盡來受戮免勞跋涉此時另選一員健將龔德淵代顧天麗之職傳令二寨不可出兵兩下相拒數日並不交戰薛舉對查訥道兵貴神速如此對拒不戰此縣何日可破儻附近救兵齊至何以禦之查訥道某已算計定了遲延數日探彼虛實今已盡知只有中寨堅固難攻左右二寨吾先出奇兵以搗之若得此二寨則中寨把持不定必奔入城那時另有秘策取縣在反掌之間薛舉大喜查訥傳令正元帥杜伏威大將曹汝豐率領精兵二千攻打左寨副元帥薛舉副將尉遲仲賢率領精兵二千攻打右寨正先鋒常泰率領精兵三千直取中寨三處俱初更進發左右二寨放心殺進不可退步管取成功得勝之後兩路抄轉中寨之後待蘇樸離寨追襲常將軍之時即打入彼寨放火焚之殺回邀截敵軍又分付常泰道將軍至彼不可便殺入但擂鼓呐喊虛作攻擊之勢使敵將不敢出寨則左右二寨無兵救應破之必矣但聽我這裏號炮一響便抽軍回儻追兵掩至且戰且退只看陣後火起複殺回夾攻可獲全勝若我令箭一至即當合兵攻城切勿有誤衆將等受令而去各自打點起兵先說常泰一技人馬一更動身三更盡方抵蘇樸大寨一齊擂鼓呐喊直逼寨前蘇樸正在中軍帳秉燭觀書未曾解甲忽聽得寨外喊聲人衆已知敵軍臨寨傳令衆軍不許妄動妄動者斬又撥弓弩手五百營門口埋伏若敵軍進寨即發弩射之如彼軍退我親自追趕必擒賊將於是兩下拒住但呐喊擂鼓並不交戰再說杜伏威一枝人馬二更盡已到戴大儒寨口寨內還有燈火杜伏威一馬當先斬寨而入勢不可當原來戴縣尉在帳內飲酒不堤防敵兵驟至不敢迎敵上馬穿寨後而出走不半裏黑影中撞出一彪軍來卻是大將曹汝豐喝道快下馬受縛戴大儒驚跌馬下被衆軍捆了前寨軍士大半被杜伏威所殺踐踏死者無數這右寨龔德淵也被薛舉軍馬砍入寨來人不及甲馬不及鞍大半殺死降者亦多當下龔德淵見勢大單馬逃生去了這兩枝人馬破了左右二寨徑抄到中寨之後常泰率軍在寨前鼓噪虛張攻寨之勢聽得連珠炮響忙抽軍回身便走蘇樸見敵兵陣腳移動率領精車隨後追來常泰且戰且走約數裏之地蘇樸陣後火起常泰情知兩路兵到了複轉身躍馬持斧直取蘇樸蘇樸挺槍來迎未及交手哨馬飛報大寨已被敵軍放火焚燒兩路人馬大至蘇樸驚慌無心戀戰撥馬而逃背後常泰追來正慌急間見前面火光中二少年大將攔住去路三處人馬合將攏來官軍大敗各自逃生蘇樸單騎拚死殺條血路奔入城門將門緊閉拽起吊橋只帶得百余個軍士進城可憐三寨官軍皆死于槍尖馬蹄之下蘇樸入城分撥軍士緊守四門杜伏威三處人馬搶得器械盔甲糧草甚多只見查軍師令箭已到分付蘇樸軍敗入城之後三處人馬並力攻城只留西門放一條走路今日西戌二時務取此城遲延不進者定按軍法衆將分撥人馬杜伏威攻南門薛舉攻北門常泰攻東門城上炮石亂下自平明直攻打至申時將士俱已疲弊飛馬又到傳軍師將令諸軍不許擅退今晚務要入城違令者立輸但見士卒吐舌搖頭道這次須當努力將軍咬牙切齒誓破此然後休兵稍緩些兒軍令施來無面目若懈退卻鬼頭刀下不容情傳號箭各營知悉人人奮勇揚威飛羽書大小齊心個個衝鋒陷陣有這般急性軍師不放些兒婉囗有那樣英雄元帥身先士卒登城即如鐵桶也攻開便是金匝須粉碎衆將士遵奉將令奮勇攻擊將近初更彩雲之上微露一鈎新月只見城內喊聲起處北門大開薛舉尉遲仲賢拍馬先入諸軍隨後繼進各門守城軍士見敵軍進城都奔竄逃命杜伏威擁入南門常泰打入東門蘇樸正在馬上催督守城聞報北門已有軍馬入城顧不得家眷見西門無兵攻打徑出西門而走馬不停蹄奔了半夜卻走到周水河口一路無人追趕心下暗喜此時走得人困馬乏巴不得下馬暫歇又恐追兵趕來勉強又行了兩箭之地忽見路傍一座大廟宇廟門上釘著一個大匾上鐫著軒轅廟三個金字蘇朴下馬人廟向神位拜了數拜禱視道下官蘇某蒙聖恩除授諫議大夫不幸忤了朝廷謫貶爲本縣縣令蹇遭狂寇杜伏威攻破城池家小被陷乞神明顯靈助陣若得興兵討賊克復城池功成之日奏聞朝廷重修廟宇大塑全身願祈鑒察祝畢席地而坐神思困倦正欲睡去只聽得一聲梆子響殿后搶出四五十條大漢來將蘇樸執縛已定原來是查訥預料蘇樸必走這一條路故晉西門放他預先埋伏健車于軒轅廟內候蘇樸入廟即時提下當下衆軍正等個著將蘇縣尹解入縣來城中安寧如故杜伏威一行人都在公堂坐下將蘇朴戴大儒二人和家眷盡皆監下犒賞衆軍次日查訥親自到縣賀喜杜伏威等諸將迎入堂上設宴慶賀薛舉道查近仁神機妙算雖子牙複生不能過也發三路兵搗營使彼三處各不相顧此計易見早知城內必有應兵此是何術非某等所知乞軍師教之查訥道小術何足爲異二位元帥攻破左右二寨抄入中寨時某已預選勇士四十余人取所殺官軍盔甲旗號腰牌妝作齊軍乘亂隨蘇縣尹雜入城內約定黃昏月上砍開北門迎接大軍入城但留西門放蘇君出走欲生獲之耳此時爲何不見擒來只恐逃脫又留一心腹大患矣杜伏威等聽罷大喜道軍師神算臥龍鳳雛不能及也昨夜軍士于周水河軒轅廟中生擒蘇樸這廝監禁在此待軍師到來斬首號令以泄日前劫寨之忿查訥道元帥差矣當今之世得人者昌失人者崩似蘇君智勇足備世所罕有某之用計生擒不忍殺害正欲得之以助元帥取威定霸豈可因一時小忿囚禁以辱之衆服其論查訥即同杜伏威薛舉親自進獄將蘇朴戴大儒釋放換了衣冠請出堂上以禮相待又將兩處家小盡皆放出寄居民家安頓查訥一心只要以思義感動蘇樸使彼投降不期蘇林心如鐵石不肯轉移查訥等再三殷勤勸慰待之上賓蘇撲向南而坐閉口不言衆人無可奈何戴大儒頗有歸順之意見堂官如此不敢開言查訥分付人役伏侍蘇戴二人賓館安置蘇樸至夜半候衆人睡熟解下裏衣鸞帶自縊而死天曉人知報入衙裏查訥大驚齊出來看視不勝傷感即令厚殮已畢任蘇朴家眷搬喪回故土安葬戴大儒心下淒慘不願功名拜辭要去修行查訥亦贈金帛釋其全家眷口團聚而去這一節乃是查訥大德之處有詩爲證仁主好賢若渴將軍視死如歸德沛黃泉瞑目恩施赤子揚眉再說各縣聽得杜伏威軍馬臨城驚惶無措有的議堅壁固守有的議出兵對壘有的議發文書求取救兵主張不定正慌急間接得裘州判書劄書雲不佞澄夜觀乾象主星暗弱將星倍明正照此地杜將軍者師行有紀勇力絕倫真英雄也難與爭衡不若倒戈納降庶稱明哲鄙意如此其從與否則惟尊裁毋致後悔特此馳達以盡平日相知之雅餘不贅言這廣樂縣縣令譚希堯見了裘澄之書差人往各縣計議各縣回說裘君見識最高城池又大兀自歸降我等城小民稀糧草不足焉能據守幸彼攻取上郡州白土縣二處勝敗未知候有消息再作區處數日間探馬報說敵將黃松攻破上郡州知州席銘棄家逃遁各縣驚疑次後又報杜伏威軍馬打破白土城縣尹蘇樸盡節而亡譚希堯問了二處消息火速移檄各縣共約納降廣樂縣譚希堯汾州縣姚鸞敷城縣姚鳳文安縣王大爵宜君縣柏台俱城上豎起降旗差人齎降書冊籍詣元帥府投納裘澄差人引各縣使者至白土縣拜見杜伏威遞了降書伏威大喜重賞來人隨即行文委譚希堯等照舊供職掌理縣事只有廣安縣知縣伍通不納降書棄城遁去查訥令王驤權署縣印杜伏威得勝班師回延州府來大小將士迎接入城至元帥府參見杜伏威開筵慶賀酒過數巡杜伏威舉杯對查訥道不佞招集義兵鋤強扶弱無心得地感蒙軍師妙計兵不血刃一連下了數郡雖是根基創立奈何地僻民稀東有周師南有陳國西有齊軍儻三國齊心並力來攻前後受敵正犯了寡不敵衆之語軍師何以處之查訥笑道不須主帥費心查某已主張了也齊世祖初登大寶國家多事況和士開穆提婆二奸臣執掌朝綱蒙蔽主聰諒來一時軍馬未得就動陳國君臣猜忌連年饑饉自守不暇何暇伐人惟周朝稱爲隆盛君臣緝睦卻又與這裏地境隔遠若軍馬涉險而來糧食轉運不繼又防陳齊二國乘虛直搗其後料他決難動兵這三處人馬都不足爲慮也今主帥已得數郡糧食可支十年人馬將及萬數退可自守進可攻取所少者人才耳主帥速宜招賢納士延攬英豪若得謀臣如雲武將如雨何愁基業不弘規模不大哉吾觀武州南安朔州三郡地闊人稠錢糧廣大得此三郡亦可與周齊陳鼎足而角矣正談論間軍士飛報東門外一員大將帶領數千雄兵大張旗鼓勢欲攻城查訥杜伏威都吃一驚急登城樓觀看杜伏威見了那將不覺踴躍大笑道故人來也正是漫言久旱逢甘雨今日他鄉遇故知不知來將是何故人且聽下回分解第三十回沈蘭劫寨陷全軍牛進迎街懲大惡詩曰齊君千駟誇豪富沒世無名總是空采蕨首陽彰大義辭金暮夜蔭三公強梁牛進圖鴻業諂佞周乾作禍叢惡貫滿盈災害至昭然天理豈相容話說杜伏威見了城下那一員大將大笑道公端既來吾事成矣薛舉也笑道果是繆兄今日方會查訥等驚問何人杜伏威道這是我結義之兄姓繆名一麟字公端本貫河南人氏有一身好武藝在黃河孟門山上聚義和我偶爾相會拜爲刎頸交日前殺敗蔣太守曾立大功爲打延州府各自分兵他在黃河港口招軍買馬向因征戰無暇遣使迎請今日自臨必是招得軍馬來相助也查訥道元帥得這枝兵如虎添翼速開門迎進杜伏威與衆將下樓迎出城來那將厲聲高叫君武用十之別來無恙可賀可賀杜伏威一馬當先笑迎道繆大哥來何遲也繆公端拍馬向前兩下拱手大喜並馬入城諸將隨後分付帶來衆軍暫於城外屯紮杜伏威等進城到帥府下馬升堂衆將上前一一相見已畢坐定杜伏威道自從與兄長拜別之後倏爾數月近日托兄福庇一連得了幾個城子正要差官迎請幸蒙駕臨小弟不勝欣躍繆公端道聞賢弟連捷小可特來奉賀薛舉道日前煩大哥招兵之事不知已得多少人馬了繆一麟道賴二賢弟虎威數月間招得健卒萬余良馬八百匹糧草亦多這也不在話下更獲得一件無價活寶專來進貢杜伏威薛舉同笑道公端獲甚異寶乞借一觀繆一麟道此寶乃杜君武瓜葛一月前嘍囉來報關下一對男女要見甚麽杜將軍我諒杜將軍必是賢弟了開關令進那一對夫婦道是杜陽城鳳凰嶺朱家塢鄉民爲因日前留一有孕女人說是一位杜客人之姐路途不便難以同行暫寄在小人家內自別之後杳無音耗這女人十月臨盆産下一個俊秀孩兒將及彌月方說他是岐陽府杜員外應元之妾安氏名爲勝金夫主被凶徒誣陷而死幸員外親侄杜某救援逃難至此得生孩童奈何晝夜啼哭夢寐不寧今杜某在黃河孟門山繆將軍寨中特說小人夫妻二人伴送到貴寨來我問他名姓他說姓朱名慶講起昔日妻子被奸僧所劫仗杜客官之力將和尚焚死夫婦感德故送母子兩個還將軍報恩可煞作怪這小兒到我賽中啼哭便止了我已賜金銀酬謝二人而去今送此子同勝金姐來與賢弟撫養骨肉相逢豈不是世間的活寶即喚隨行軍士轎中擡過勝金姐來兩下相見悲喜交集勝金姐雙手將孩兒遞與杜伏威伏威接過抱於懷中細觀容貌生得磊落非常想起日前叔嬸雙亡之事不覺腮邊淚落哽咽不已薛舉查訥齊勸道令先叔先嬸雖遭陷害幸生遺腹之子後裔有人不須悲切杜伏威謝了衆人令勝金姐母子後堂暫息備辦筵席慶賀尊緱一麟爲帥府督理糧儲大總管之職又命查訥犒勞新招勇士另撥後堂房屋一所與勝金姐居住帶來丫鬟仍舊伏侍又買婢子二人炊囗供勝金使用一連數日歡宴衆心大悅一日查訥請杜伏威薛舉升堂議事聚集大小將士參見但見旌旗密布刀戟齊排將軍顯八面威風士卒列千群虎豹人人賈勇個個披肝綸巾羽扇軍師談笑運神機寶劍金符元帥登堂頒號令果然殺氣沖牛斗須信英風振海隅查訥道目今連得了數個州郡殺了蔣太守朝廷聞知早晚必起兵來其敵不小吾聞兵法有雲三軍司命糧食爲先兵不宿飽徒多無益大元帥速遣大將統精兵奪取附近城池資其府庫錢糧以充兵餉兵精糧足那時雖有大敵可保無虞此今日之急務也杜伏威道承軍師指教但不知發兵先攻何郡繆一麟道某久聞朔州府錢糧廣大百姓富強若得此郡便是基業況有一件妙處那鬱郅縣有一宦家田園萬頃産業極多金銀滿庫米票如山論此家私果堪敵國我們得這家財物盡夠軍糧支應煞強似得幾處窄小城池查訥笑道世間也有這等豪富之家不知此家姓甚名誰平日爲人若何繆一麟道若論這人心地卻也利害比我們江湖上好漢還狠十倍我山寨裏常有被他所害的窮民來投奔訴說這人姓牛名進綽號牛剜心當初爲梁武帝樞密院右仆射極貪極酷冒祿妄功逢君之惡一味糊塗所以致富後因侯景作亂殺戮大臣用計逃回大置田産廣放私債門下又用了一個知趣的幫手實是狠毒姓周名乾原是樞密院判官因他殘忍不仁人人叫他做周剝皮助這牛進爲惡搶人産業奪人妻女大鬥重秤克剝小民輕則私行吊拷重則賂官斷送還要說人情講公事買良爲娟賤買貴賣掠人女子養作瘦馬故此十年之間家私巨萬這等惡人縱使碎屍族滅不足爲過說話未完只見杜伏威咬牙嚼齒怒髮衝冠離座大怒道殺了這廝剮了這廝油內烹了這老煞才方出我心中之氣我與他有不共戴天之仇每欲擒來剜其驢心以條先尊一向不知下落故爾羈遲今聞公端言及此仇可報此忿可雪矣查訥等驚其故杜伏威將父杜都督救林澹然被牛進奏劾梁武帝差武士提究驚死之故說了後牛進與周乾史文通私自抄沒家產二母相繼而亡以致飄零流落冥中相會從頭備說一遍因此與他有不共戴天之仇言畢失聲慟哭諸將亦各嗟歎查訥勸道主帥不必悲傷今日繆總管提起此人乃元帥先尊之靈也乘此機會只索整兵踏破朔州擒此老賊報仇便了有詩爲證飲恨終天末得伸欲誅仇寇慰親靈今朝惡滿難回避遠在兒孫近在身杜伏威拭淚商議攻取之策查訥傳將令以常泰爲正先鋒曹汝豐副之領馬步軍五千爲前隊杜薛二元帥領馬軍三千步軍七千爲中隊查訥黃松繆一麟領馬步軍五千爲合後直走朔州郡諸將得令陸續往南進發其餘將土俱留延州帥府駐紮且說常泰曹汝豐二將領軍將朔州府圍困鼓噪攻城城中刺史梅先春急聚合府官員計議軍情梅先春道杜伏威巨寇倡狂特甚蔣太守俞福等皆遭其害湯府丞棄家逃竄蘇侍禦逼得自縊而死某前者急遞求救表文至京久不見援兵來到目今賊勢甚銳何以當之府判沈蘭道某觀賊勢甚大若出軍廝戰恐非萬全喜得本郡城廓厚固壕塹又深糧草豐足盡可堅守待彼勢懈出奇兵襲之一戰而可擒矣梅先春道公言乃金石之論遂親自督軍守城多設擂木炮石檢點各門軍士常泰曹汝豐率衆並力攻城城上擂木炮石打將下來軍士多致打傷不能近前一連攻打數日無一些破綻報後軍已到常泰迎著杜伏威查訥備言其事查訥道常將軍可遠遠圍城不可太通徒損軍士待我另設良計以破之於是離城二十裏太白山南屯下三個大寨中寨杜元帥左寨查訥右寨常泰三寨中每日早間出兵攻打下午撤兵回寨又早過了十餘日城中愈加嚴謹查訥道攻此小城半月不下城內固守如之奈何杜伏威笑道久矣哉不用吾法矣此城難破只得弄那法術試看城內怎生救應查訥道除是如此或者可以攻破杜伏威出令三寨軍士並力攻打東南北三門只留西門不打城內梅太守沈通判見了商議道賊人今日只留西門不攻其中必有詭計西門愈加要添兵守護城外杜伏威親督三軍並力攻打三門城上訴如飛蝗不能近城捱至申時杜伏威率領千余馬軍扛了四五個竹籠徑奔西門打開籠子伏威馬上仗劍念咒喝一聲疾只聽得呼呼風響籠內飛出無數火龍火馬異獸毒蛇齊飛上城頭盤旋沖突守城軍士見了盡皆驚倒各顧性命而走自相踐踏死者甚衆只見火龍火馬口中吐出火焰將城樓四圍燒著霎時間烈焰飛騰西門鼎沸杜伏威傳令提三寨之兵盡打西門梅太守看了驚得面如土色手足無措沈通判忙出軍令軍士妄動者斬立刻教取人溺蒜汁犬馬之血望空亂設那火龍火馬愈加熾甚不能澆滅原來林澹然之法乃天心正法非金剛禪之邪法也所以非穢物可破沈通判慌了亦無計可施梅太守急中生出智來命軍士齊上把附近民居房屋盡行拆毀那火龍等只燒得城樓遇石遇空即止沈通判忙教把擂木亂石抛下亂打杜伏威軍馬立腳不住只得遠遠退軍回寨但見旗幡皆倒卷步騎盡回身金以靜之惟間聒耳鑼嗚鼓以動之那用喧天催戰將軍怏怏士卒佯佯望營投止且埋鍋解甲休兵齊下寨杜伏威與查訥商議道我今日用此法以爲無人敢當不期城內又有如此豪傑軍師何以處之查訥道某聞城中糧米可支數年廓厚壕深郡官甚是賢能一時未必可破另有一計在此所重不在攻擊聞朔州城內儘是富室豪家人民繁雜寸土如金所少者柴薪耳必要出城樵采如今但分軍四門晝夜圍困不容柴木入城不過半月城中必然有變有米無柴豈能久守百姓自然慌亂那時乘機而進此城可得矣忽哨馬報西北上有數千人馬殺奔前來不知是何處軍馬杜伏威查訥薛舉率衆將一齊準備迎敵原來這一枝軍是南安府刺史班僖因探馬飛報朔州府被圍賊攻甚急與幕賓封大賓計議發軍救應敦請一員大將姓樊名武瑞原是河南人氏前任梁武帝殿前護駕驃騎大將軍因剿薛志義有功重加寵用後侯景篡位不回原籍徑往南安州避難素有英名禮請來解朔州之圍帶領步車五千稗將數員殺至朔州卻好杜伏威兩軍相撞各布成陣勢樊武瑞一馬當先大喝何處賊奴敢侵我城池殺害百姓快快下馬受縛免汙我刀衆軍視之怎生模樣有南柯子爲證白髮如彭祖銀髯賽老聃提刀躍馬敢爭先一似黃忠殺下定軍山功成彌勒寺名揚薛判官藏鋒斂鍔已多年今日一軍驚機尚童顔常泰挺槍躍馬大罵何等匹夫自來納命一合之中若不擒汝不顯英雄樊武瑞大怒舞大刀一面砍來常泰挺槍架住二人戰二十餘合不分勝負兩軍呐喊聲振山嶽城內看見是南安救軍到來通判沈蘭慌忙率領裨將袁良臣王照鄧暉及精兵五千大開東門殺出接應繆一麟黃松迎住兩頭廝殺這邊樊武瑞和常泰又鬥了十余合常泰架隔不住看看敗陣曹汝豐舞手中截頭大刀飛出陣來助戰樊武瑞力敵二將全無懼怯薛舉立馬觀看良久見常泰曹汝豐戰不下那將對杜伏威道大哥可分兵一半前去助繆大哥敵住城裏之兵待小弟去擒那一員大將說罷即分兵一半挺方天畫戟飛馬而來大喝來賊且往快快下馬受死樊武瑞更不打話提手中大刀接住廝殺數合之中薛舉一戟早刺傷樊武瑞左臂翻身落馬衆牙將並力救回薛舉招動大軍衝殺過來殺得官軍大敗衆將單救得樊武瑞和數百敗殘人馬抄小路逃到南門城上見了急開門接應入城去了再說沈通判人馬和繆一麟廝戰王昭被黃松一箭射中心窩死于馬下沈通判心慌跑馬先回衆軍見了各自逃散梅太守親率大軍救援沈通判入城杜伏威大勝一陣斬首千餘級奪得器械馬匹無算收兵回寨天色已晚大賞三軍飲酒作樂忽見群鴉數十自西北向南而飛鳴噪不已查訥道主帥和諸位將軍看此鴉鳴主何凶吉薛舉道皓月初升群鴉疑以爲曉故此飛鳴耳杜伏威道不然鴉鳴不祥之兆也西北方位屬金金方主殺群鴉自西北而至南金火相戰必有殺氣從空而起故此飛鳴以我度之今夜防有賊人劫寨不可不備查訥道元帥言者是也梅太守若堅守不出此城實爲難破若來劫寨則自送城池與元帥中吾計矣只須如此如此必擒此人杜伏威大喜當晚查訥調遣人馬先令副元帥帶精兵三千到南門外離城一裏東北山僻處埋伏只聽喊聲起炮響之際領軍乘勢奪取南門這是要緊第一個所在薛舉領軍去了次令常泰繆一麟黃松曹汝豐田將各領兵二千寨外四下埋伏只等中軍炮響一齊殺出如遇敵兵盡力追趕直至離城三裏放起號炮和薛元帥並力奪城不可怠慢常泰等四將領兵埋伏去了杜元帥可守中軍待敵將入寨之時布起風雷驚怯其膽敵兵必退然後率精兵繼進攻取城池查訥獨守大寨分撥已定再說梅太守接得樊武瑞沈蘭兩處敗兵入城知王昭中箭身死又沒了千餘人馬心下憂悶與衆將商議樊武瑞道小將初交鋒那兩個賊漸漸輸了後來沖出一員少年賊將其實武藝出衆勇力絕倫被他刺中左臂幸喜傷淺不妨誓擒此賊以報一戟之仇沈蘭道久聞老將軍英名蓋世今反被鼠輩所欺如之奈何樊武瑞道勝敗兵家之常固不足道目下賊兵大勝其志必驕決無準備我這裏選精兵數千待夜靜徑劫大寨出其不意決然取勝賊黨可擒梅先春沈蘭齊道老將軍深諳孫吳此計大妙當晚選精銳軍士五千飽食嚴妝人銜枚馬勒口樊武瑞袁良臣爲先鋒沈蘭鄧暉爲後應悄悄開南門進發有詩爲證老將偷營膽如鬥人盡銜枚馬勒口平欺孺子不知兵強中更有強中手到得杜伏威寨前已是半夜樊武瑞聽得更傳三鼓指麾軍士呐喊殺入寨中卻是空寨樊武瑞叫苦不叠急教退軍衆心慌亂望後便退只聽得寨後炮聲響處震動山嶽忽然狂風驟起霹靂交加四下伏兵盡起火把齊明東南常泰殺來西南繆一麟殺來東北曹汝豐殺來西北黃松殺來四下喊聲如翻江攪海驚得樊武瑞袁良臣心膽皆落不顧軍土放馬先逃後面軍馬被杜伏威沖作兩截中搶著箭者不計其數降者千餘人常泰四將緊緊追趕著樊武瑞袁良臣沈蘭鄧暉領兵正來接應只聽得前軍大喊炮聲震天已知中計二人慌忙撥轉馬麾軍速退後面追兵已近樊武瑞隨著沈蘭一同奔走將近城邊只隔裏餘又聽得後邊連珠炮響沈蘭笑道賊兵施放號炮虛張聲勢驚我等也今已近城不必心慌樊武瑞道且奔入城再作區處二人商議間只見東北上火把齊明喊聲大振沖出一彪人馬勢不可當沈蘭等大驚拼命衝突而走背後一員少年將手挺方天戟大叫不要走了沈通判這裏袁良臣鄧暉二將捨命護衛沈蘭奔到城邊仗得梅太守領兵開城接應沈蘭人馬剛入得城薛舉軍馬已到倉猝閉門不叠被薛舉一騎馬一枝戟當先搶入城裏袁良臣鄧暉並牙將一齊向前來擋薛舉大喝一聲將鄧暉一戟刺于馬下其餘驚散梅太守見勢大難敵單騎逃走袁良臣只保得沈蘭逃命薛舉引軍大進後邊常泰諸將陸續殺到杜伏威大隊人馬如潮湧殺來將朔州府據住四下放火殺人喊聲不絕杜伏威薛舉各帶數百軍士圍住牛進周乾兩家宅子杜伏威殺入牛進府中不分良賤老幼盡行屠戮單剩得牛進一人反剪綁了先著人監鎖在獄用心看守然後抄劄家私把他糧食盡解入府放起火來牛進房屋頃刻化爲灰燼再說薛舉殺入周乾府中遇人便殺只不見了周乾拿住一個丫鬟說昨日早上出去未回薛舉問道何處去了丫鬟道我是償債的來得四五日那曉得他出沒所在薛舉收住寶劍叫軍士背他出外饒了性命其餘不分男女盡皆殺了雞犬不留把細軟財物裝載起解也放火將住宅燒毀了此時天色黎明查訥軍亦到鳴金收軍杜伏威令遍處張挂榜文有人擒獲梅知府沈通判樊武瑞投獻者賞銀三千貫生擒周乾投獻者賞銀五百兩將首級來獻者賞銀三百兩其餘將士盡皆赦宥不究有詩爲證堪笑牛周二賊臣胸藏矛戟起奸心一朝天理還相報財散人亡化作塵再說梅先春棄府撇妻單馬逃命出了北門驟馬加鞭如飛而走行數十裏忽然遇見沈蘭袁良臣三人掩面而哭沈蘭道如今失陷城池兩家老小不知下落這事怎了梅先春道早知如此只依足下堅守不致今日之苦反被樊武瑞害了侍勇劫寨墮賊奸計我與你上不能保封疆下不能全妻子進退無路不如一死沈蘭道堂尊差矣大丈夫爲國忘家豈因家室被害即欲自經於溝讀目今南安府刺史班公智勇足備且城池堅固人強馬壯不如投之借兵報仇以複朔州有何不可梅先春從之三人徑到南安府來叫門城上見說是朔州刺史即忙通報班僖開門迎接入城相見畢梅先春哭訴其事班僖道學生見貴郡被賊圍困甚急故令樊將軍領兵前來救援不期反中賊人奸計失陷城池害了寶眷今無別說須作速傳檄諸近州郡借兵救援急急寫表申奏朝廷發軍征剿我和你招募勇士聚集鄉兵操練將士待諸處兵會並力殺賊務取城池以複列公之仇此爲上策二公不必憂心梅先春沈蘭拜謝正說間管門軍士報樊將軍回府班僖迎入驚問將軍何以得還樊武瑞請罪道失卻朔州小將之罪也昨晚劫寨誤中奸計城門東北沖出一隊人馬勢不可當小將諒不能勝只得走回再作商議班僖道今彼起兵討賊報仇樊將軍還肯向前否樊武瑞道小將願決一死戰以雪前忿不擒賊首誓死沙場班僖大喜商議起兵話分兩頭再說杜伏威占住朔州府城取府庫錢糧一半收入公用一半散給百姓將梅太守沈通判家眷安頓在府衙不許一人擅入出榜安民設宴慶賀席間談及牛進爲惡之事杜伏威大怒道幾忘了要緊大事叫獄內取出牛進來裸衣赤體跪於堂下杜伏威指著大罵道老剝皮日讀聖賢之書心存狼虎之毒汝既位至公卿不思輔國愛民一味貪財好色剝民脂膏食人腦髓雖碎屍萬段不足以雪萬民之怨我且問你那林澹然長老與你有甚冤仇苦苦逼他逃竄無立錐之地那杜都督老爺和汝有何仇隙可憐害得他人亡家破含冤莫伸也有今日拿住的日子牛進叩頭道老朽自知所爲過分雖死亦可矣但追拿林和尚與抄劄杜都督兩樁事皆是鍾守淨那禿驢唆哄朝廷以致如此非關老朽作孽便是放債一節將本覓利豈是貪財妾媵雖多皆因乏嗣亦非好色生平或有些不公不法的小事今已滅門絕後是以報之老朽年過八旬無用之物乞將軍憐憫赦宥一喘自今以後改惡遷善學做好人便了杜伏威笑道這花嘴老賊奴到了此際兀自巧語花言說得自己身上乾乾淨淨一些事都沒了叫左右掌嘴行刑軍校齊喝一聲將牛進提住頭髮打了一二十個巴掌杜伏威怒氣不息喝左右扯下去先打五十悶棍軍校吆喝一聲捶發倒拖下堂打不上數棍牛進年老熬不得疼痛一時暈死杜伏威喝教噴醒來軍校提起頭來噴水漸漸蘇醒複令行杖有詩爲證勢焰滔天氣概遒英雄誰敢不低頭須知運敗彰天理一頓皮鞭打老牛正喧哄間只聽得門外擂鼓聲急杜伏威問有何事故管門軍校報進有一壯士擂鼓口稱要報機密大事見了元帥爺方肯說出杜伏威叫令進來那壯士進見跪稟道小人姓呂排行第十家住府城外昨日山上打獵遇著惡官周乾在一小庵躲避小人拿獲在此這周乾日前替人追私債將小人父親呂毅活活逼死獄中今特解送元帥爺以報昔日之仇杜伏威大喜喝教快解這廝進來待我看他怎麽樣一副凶嘴臉號做周剝皮只見三五條漢子將周乾背剪花綁了解入府裏來跪於階下見了牛進俱各低頭不語杜伏威見了不覺毛髮倒豎大喝一聲你這驢心狗肺的賊子誤國害民的蠢奴罪惡深重不知你驢心生得怎地模樣我先取來看一看然後剝皮以應尊號周乾道今日如此悔無及矣只求早死杜伏威笑道好賊子你求速死我偏教你慢死生受些兒苦楚令軍士用細索將周乾手指腳指緝了吊起來懸空挂于梁上用黃荊條自頭至足渾身打遍周乾叫苦乞饒薛舉查訥等拍手大笑打了一回喚庫吏取出白金賞那壯士呂十回去呂十叩頭領賞而去杜伏威令放下周乾來取朱墨二色將牛進臉上塗了紅朱周乾臉上搭了黑墨俱各背剪兩手牛進項上插一面白旗上寫著欺君誤國剝削小民殘害忠良奸臉兇惡犯人一名牛進遊街示衆周乾項上插一面黃旗上寫著貪功冒賞讒諂阿諛陰險助惡犯人一名周乾示衆撥數十名軍校押著往本城四門遊遍要牛進周乾口內自叫犯罪情由如不叫時令軍校以利錐錐其手足至晚方回衆軍校領了將令簇擁牛進周乾出府走遍六街三市二人怕受錐子只得口裏自稱罪犯看的人千千萬萬僅各拍掌歡笑說有天理報應不差這是作惡的樣子直至天暮解回府中正是善惡到頭終有報只爭來早與來遲不知二人生死若何且聽下回分解第三十一回報仇瀝血祭先靈釋怨營墳安父骨詩曰人生處世若浮漚何用攢眉作遠猷金穀園中花已老館娃宮裏水長流英雄到底誰無盡恩怨臨頭就肯休斷首刳心剿雙惡遊魂地下默含羞話說杜伏威預先在堂上擺下故父都督杜成治神位陳設祭禮點了香燭宣讀祭文已畢杜伏威對靈慟哭將牛進周乾跪於神位之前杜伏威親自動手剖二人之心瀝血祭獻燒化紙錢著刀斧手剝了周乾之皮藏於府庫中以戒後人將屍首棄擲郊外有詩爲證憶昔炎炎勢語出神鬼驚二人相倚奸公論著其名天道原好還今日祭先靈剜人仍自剜剝衆剝吾身錦衣玉食夫曠野喂饑鷹寄語當權者胡不留人情當晚查訥薛舉和一班將官置酒與杜伏威賀喜盡歡而散次早商議發兵取南安府忽哨馬來報南安郡太守班僖同梅知府沈通判樊武瑞領大軍殺奔前來查訥笑道正欲興兵去取南安他卻自來省了我多少錢糧以逸待勞安有不勝薛舉道某夜來得一異夢請軍師解之查訥道元帥請道其詳薛舉道五更之初夢進一樹林內有一大將黑臉鬍鬚魁梧異衆坐於兩大木之間雙手揲蓍身下跨著一人那大將呼我之名指道此汝父之仇人也吾兒何不報之驚覺醒來顛倒尋思不解其意查訥低頭暗想半晌問道元帥之先尊大人莫非是與樊武瑞有甚仇恨否薛舉道常聞住持爺和苗師父說先父因火燒妙相寺殺了和尚官兵梁武帝敕陳玉爲總兵督軍征討先尊中計而亡說彼時有一大將姓樊失其名號好生英雄了得莫非即是樊武瑞也未可知查訥道向聞武帝國樊武瑞征討有功甚加寵用後侯景作亂將武帝逼死台城武瑞恥與同朝挈家逃遁不知去向今卻依附班刺史興兵到來朔州害先大人者必此人也薛舉道軍師何以見之查訥道揲蓍者乃是爻辭也兩木之中夾一爻字身下跨著一人豈不是個樊字今班僖和樊武瑞領兵而來適合令尊大人夢中相告事非偶然此仇當雪矣杜伏威衆將皆服其論薛舉大怒道這樊武瑞既是殺父仇人如何當面容得他過大哥與軍師乞助一臂之力今日誓擒此賊以祭父靈杜伏威道叔父之仇即我之仇我父之仇既雪叔父之仇如何不報當並力擒之薛舉大喜隨即點起馬步精兵一萬五千同衆將出東門外平川曠野之地布成陣勢專候敵兵到來少頃見東南上金鼓震天喊聲漸近漫山塞野官軍來到排成陣勢兩下射住陣角南軍門旗開處閃出一員老將怎生打扮堂堂相貌白虯髯鐵甲籠袍鎖子牙劣馬如龍刀燦雪威風凜凜勝靈宮這老將軍正是樊武瑞手執鋼刀坐雪白馬左首一員副將袁良臣右首一員副將張雄俱全身披挂手挺長槍身騎劣馬杜伏威看罷對薛舉查訥道來將甚是英勇不可小覰了他須設計以破之薛舉瞋目大叫道大哥是何言語長他人銳氣滅自己英雄不須一軍相助你看我單騎力擒此賊說罷便手挺畫戟一騎馬沖出陣前大叫來將通名樊武瑞喝道吾乃驃騎將軍樊武瑞便是汝豈無耳不聞我英名輒敢侵奪城池殺戮百姓薛舉聽見是樊武瑞不待言畢躍馬挺戟殺過陣來樊武瑞將刀架住兩員大將抖擻精神戰五十合不分勝負樊武瑞心下暗想這小小豎子手段高強勝他不得必須如此提起大刀劈面砍來薛舉側身躲過樊武瑞帶轉馬頭便走薛舉不舍放馬趕來樊武瑞覰薛舉來得近擲起一把飛叉劈胸刺來薛舉早已照見將戟杆撥開樊武瑞見擲他不著暗暗稱羨口中大叫賊子慢來薛舉喝道走的不算好漢說話未畢又一把飛叉貼右耳擦過薛舉吃了一驚不敢再追撥馬複回本陣樊武瑞回馬趕來叫道潑賊快快下馬受縛漸漸趕上薛舉看樊武瑞馬頭不遠橫擔畫戟取弓搭箭颼地一箭射來樊武瑞正趕猛聽得弓弦響連忙躲閃一箭射中頭盔樊武瑞奮怒趕上薛舉回馬又戰兩個大展神威再鬥三十合不見輸贏官軍隊裏惱了一員虎將張雄挺槍驟馬出陣助戰北軍隊裏正先鋒常泰出馬接住廝殺鬥了十余合張雄被常泰一槍刺于馬下袁良臣大怒躍馬挺槍直取常泰曹汝豐手舞大刀驟馬迎敵數合之中曹汝豐賣一破綻撥馬回陣袁良臣放馬追來曹汝豐翻身一刀袁良臣躲閃不叠傷著左臂負疼跌于馬下衆軍士擒縛回城樊武瑞見張雄袁良臣二將落馬心慌膽怯不敢戀戰倒拖大刀落荒而走薛舉驟馬來追樊武瑞奮勇殺出陣後走不上一二裏只見彩旗招揚金鼓喧天閃出一員少年大將正是大元帥杜伏威喝道樊賊體走快快下馬樊武瑞大怒提刀衝殺後面薛舉又到二將夾攻樊武瑞措手不及被薛舉生擒過馬擲於地上衆軍縛了有詩爲證老將馳驅已白頭提刀矍鑠覓封侯早知一旦英名喪悔不林泉作遠遊官兵無主抛戈棄甲奔走逃生班僖梅先春遙見樊武瑞被擒驚得魂不附體放馬而逃可憐沈通判走不叠死於亂軍之中杜伏威催軍大殺一陣官兵屍如山積流血成河奪得馬匹器械極多降者甚衆鳴金收軍入城府中坐定大賞三軍犒勞諸將牙將等解樊武瑞袁良臣二人到來站於堂下薛舉咬牙切齒大罵道逆賊死奴是吾殺父大仇今日被擒尚敢不跪先剜汝狗心瀝血以祭親靈然後碎屍萬段袁良臣連忙雙膝跪下樊武瑞挺立不跪薛舉大喝道潑賊何爲不跪樊武瑞面不改色笑道我這一雙膝不屈於人久矣大丈夫視死如歸今被汝擒有死而已任憑鼎烹鋸解剖腹剜心有何懼哉薛舉大怒拔劍欲砍杜伏威雙手扯住勸道樊公威武不屈真丈夫也此等豪傑世所罕見吾甚敬之二弟看愚兄薄面乞恕其罪薛舉道大哥之命焉敢有違只是戴天之仇何可輕放樊武瑞道我與將軍並無半面之識有何戴天之仇果爾延頸受戮亦須說明薛舉道汝記得十年前劍山薛大王諱志義的否樊武瑞聽了方才醒悟大笑道原來爲此當初劍山薛志義恃勇擄掠火焚了妙相寺殺死和尚大敗官兵梁主頒詔令陳元帥同我等收剿此時奉詔討賊君命所使不得不然亦不知是將軍先尊也今將軍爲父報仇吾願就戮說罷伸頸受刀薛舉擲劍於地雙手抱住道非敢忘父大仇實緣將軍英傑之士不由人不愛慕既出於無心某豈忍加害即忙解了綁縛脫自己錦袍披于樊武瑞身上納之上座史官贊曰武瑞樊公鐵石心胸臨難不屈克全孤忠松柏遜節莫邪讓鋒伏威明達延攬英雄薛舉好賢愛慕由衷傾心下士不約而同所以二人有王者風名垂竹帛功勒鼎鍾千秋萬載聲施無窮樊武瑞遜道樊某被擒蒙將軍不殺已爲萬幸何敢當此薛舉道久仰英名幸而一會甚慰渴懷杜伏威繆一麟查訥等俱一一相見講禮以賓客相待薛舉分付軍校將袁良臣也放了綁坐于末席設宴款留飲酒之間查訥道梅太守敗陣而逃其膽已落今宜發兵攻取城池南安唾手可得杜伏威道久仰樊將軍謀略蓋世驍勇絕倫幸得相從天下不足定矣今欲攻取南安願求良策指教某等拱聽樊武瑞道某乃敗軍之將一介武夫諸將軍智勇足備何下問于小將也既承明問則兵法有雲兵貴神速將軍以得勝之兵長驅而南智者不及謀勇者不能力勢如破竹此城反掌可得然本郡人民良善班刺史正直清廉乞將軍憐之杜伏威等一齊歎服道真仁智之將也樊武瑞又拱手道敗將蒙薛將軍杜元帥賜以不死銘刻五內再造之德生死不忘但求開天地之心釋放歸田敗將老矣得耕牧以終天年則莫大之恩也杜伏威道將軍差矣某等得將軍同事如魚得水正欲旦夕聆教共圖鴻業以享富貴豈有舍去之理樊武瑞道仆今年老力衰非昔日之比無心軒冕有意林泉今幸死中得生焉敢再貪富貴懇元帥仁慈慨許還鄉實感山嶽之德老朽縱留於此亦無益于元帥也查訥道樊將軍決意歸閑元帥不須苦留任彼自便以全其志亦是美事杜伏威應允樊武瑞頓首稱謝酒闌席罷起身告別袁良臣稟道末將遭擒自分必死荷元帥不殺之恩得以重生亦願隨樊將軍歸耕田園苟日晚景乞元帥一體同仁感德非淺杜伏威道袁公欲與樊將軍共樂林泉亦不敢強留隨令軍校捧出錦段數端黃金一笏贈爲養老之資希二將軍曬存以表相愛之意樊武瑞堅辭不受杜伏威愈加敬重親率諸將擺導送出南門樊武瑞袁良臣下馬拜別而去正是幸得相從魚水歡誰知先我著歸鞭黃金不受真豪傑望斷行旌倍慘然杜伏威等一行人怏怏回城一路上稱羨樊武瑞廉能忠節歎慕不已當晚查訥傳出將令薛元帥繆一麟曹汝豐常泰黃松五將帶領馬軍三千步兵一萬次日五更造飯平明進兵徑往南安府先入城者爲頭功次早薛舉率領諸將軍馬殺奔南安府來這班僖梅先春二刺史兵敗回城無計可施只得親率軍士守護以防攻打忽探馬來報賊將薛舉率大隊人馬已近城池班僖心慌和梅先春商議目今賊軍勢九難以交鋒欲待堅守怎奈軍需不足如何是好幕賓封大賓道賊勢浩大空城難守不如暫棄此城投奔他郡再留後計班僖道非也某受朝廷大祿牧守此城棄城苟免豈是大丈夫所爲甯死以報國焉可棄城而去說罷拂衣入府去了當夜封大賓同梅先春私逃出城不知去向卻說薛舉親督軍士將城圍困晝夜攻打至第四日薛舉令軍士于北門布起雲梯棄了畫戟手執短刀身披輕甲奮勇攻城自辰至未兩下相拒呐喊不絕薛舉見城上軍校漸有懈意大喝一聲飛身先跳上城守城牙將一齊迎戰被薛舉手起刀落砍翻十數個其餘都四散奔走薛舉據住北門諸將相繼而上大開城門守城軍率各自逃生城內大亂男女號哭之聲盈耳班太守知城已陷懷印胸前向北號泣再拜赴池水而死有詩贊道血淚湧泉丹心不毀身赴清流一廉似水夫人公子相向大哭卻好薛舉常泰領兵入衙問其備細夫人哭告丈夫盡忠死節薛舉歎道我之過也分付常泰把守私衙不許一人擅入忠臣之門鳴金收軍出榜安民一壁廂差黃松到延州府迎請杜元帥查軍師軍馬一壁廂差心腹將士把守四門取辦棺木將班僖屍首撈起以禮殯殮發付夫人公子收擡家財搬喪回籍開倉賑濟貧乏杜伏威正在府中商議軍情探馬報到薛元帥破南安差黃將軍露布報捷杜伏威大喜委黃松鎮守延州自和查訥帶千余人馬往南安郡來薛舉率衆將迎接進府相見諸將一一參謁薛舉將攻打南安功績備陳一遍杜伏威大悅著查訥犒賞衆軍又遣繆一麟去打會甯縣薛舉天打當亭縣常泰去打長道縣曹汝豐去打成州縣四將各領兵三千分頭而去卻說這四縣官員見杜伏威軍勢浩大皆望風而逃兵不止刃得了四座城池杜伏威與繆一麟等分路巡行各縣杜伏威馬導行至成州縣西門驛前忽聽得有人喊叫救命杜伏威令撤去傘蓋看是何人見一老嫗俯伏街心叩頭求救杜伏威憐其年老令軍士扶起講話那老嫗立于馬前擱著兩行淚又不做聲杜伏威道你有何冤枉爲何不言老嫗道爺爺話長哩求爺爺車駕到婦人家裏細細訴明杜伏威問你家在何處老嫗將手指道那對河大樹下牆門內便是杜伏威應允恐有奸詐令甲士隨行至門首下馬老嫗引入中堂取一把椅子請杜伏威居中而坐躬身下拜杜伏威看他家裏雖然頹敗卻也華堂峻宇這老嫗舉止有劄必是舊家風範起身答以半禮老嫗拜罷侍立於側稟道老身惠氏亡夫傅嶠是梁朝大司農傅岐的嫡親兄弟杜伏威道既是傅司農弟媳乃忠臣親屬請坐了講惠氏謝了坐于傍邊道亡夫向來乏嗣禱于虞舜廟中然後有孕將及臨盆忽有一乞兒持破琴一張要賣錢五百貫亡夫素諳音律即以五百貫買了這琴配上冰弦試彈其音清亮異常識古的說是東晉舊物乃嵇大夫所遺到如今雖千金亦無處可覓亡夫喜甚珍藏等閒不與人見不意生的是個女孩兒感舜帝所賜遂名爲舜華這舜華女兒年至十歲亦頗聰明亡夫教以調弦便解音律亡夫傳與數曲俱彈得精妙及亡夫棄世時舜華十四歲了將此古琴授女兒叮囑道兒當珍藏此琴見琴即如見父舜華痛哭受琴制一錦囊貯之自作角調思親引商調幽閨怨二曲以寫愁懷女工之暇便彈此曲數年來與琴朝夕不離自亡夫歿後家業凋零幾次欲賣此琴又捨不得一月前舜華正對月撫琴倏然雲低月暗起一陣怪風風過處閃出一個將軍模樣的白臉妖魔將琴劈手奪去舜華吃了這大驚便成一個癇症晝夜狂罵不省人事老身聞得元帥爺爺法術通神必能驅治故不避責罰鬥膽拜求乞擒此搶琴怪物救寡女一命恩同天地說罷又拜杜伏威道不須多禮汝女必中邪了我夜間爲汝治之看是何祟以救女命惠氏歡喜忙整酒飯相待看看天暮伏威傳令部下將校兵卒俱暫屯門前空地不許喧嘩堂中點起香燭只命一家憧伺候餘人皆避伏威卸下戎服書符撚訣杖劍步罡口中念動真言霎時一尊值日神將下降拱立稟命杜伏威道今有傅司農侄女舜華所撫故琴不知是何邪攝去致此女重疾顛狂乞吾神查勘速拿前來明正雷霆法律天將唯唯而去至二鼓將盡只見天將乘雲腦揪一人擲於堂前稟道偷琴賊獲到候法旨杜伏威燈下看那妖邪怎生模樣但見麵團發黑齒白唇紅三綹掩口微須一雙突睛細眼頭戴簇花萬字羅巾金抹額雉尾針簪身穿團花錦衤闌背子繡裹肚鸞線緊束下著一條白水褲兒紮護膝撥霧撩雲足蹬著一雙抹綠軟靴纏腿繃飛風掣電喚做慣走路的使者疾似流星名爲會請客的官兒速于鷹隼手內常擎書一簡肩上橫擔令字旗呀原來是個值日符官使者杜伏威喝道汝是何處符使輒敢興妖奪人古玩那符使伏於階下道小神乃淮河使者花花太保部下游弈神是也太保巡河遙見本宅小姐貌美意欲娶爲夫人特差小神先奪其所好後攝其魂魄至水府成親豈料小姐堅執不從惡言穢罵太保惱了將他拘留水府然亦不敢加害小神奉上命差遣乞法師饒恕伏威又問琴將安在遊弈神道雖然攝去尚藏在本宅家廟下未曾盜歸水府伏威怒道胡講上帝敕汝等爲神正直濟民護國海晏河清怎麽反行邪淫不法之事煩天神並擒太保將此二孽押赴雷霆治罪施行繳旨天將應諾手提遊弈神騰空而去此時夜已過半伏威請惠氏出堂備言前事已將妖神押赴天曹令愛可保無虞矣惠氏拜謝回房看女兒那小姐倏然蘇醒惠氏忙問我兒你向來爲何如此真憂死娘也舜華道失琴之時見一白臉勇士挾我至一大殿中有一花臉穿紅袍的將軍迎我進去兩旁樂人吹打喝我同拜花燭被我毀罵一場不肯同拜那花臉賊將我囚在冷室中我終日毀罵適見幾個錦衣人手執刀斧繩索綁縛那花臉賊去了又引我回來方得蘇醒惠氏把杜元帥擒妖之事說舜華不勝感激天色已曉杜伏威令家憧到家廟中取琴果然在神櫃之下家僮將琴獻上杜伏威接在手中細細展視果系好琴互但見背斷梅花雷氏尾焦蔡子中郎天桐地梓合陰陽音韻清和調暢三歎朱弦洞穴一聲阿閣鳴凰當年師曠審精詳堪愛繁奇嘹亮杜伏威玩之不忍釋手就命焚起香來轉軫調弦彈一曲慢商調廣陵散乃當年姚褚二仙所傳也其曲小序三段本序五段正聲十八拍亂聲十拍彈畢誇獎琴音不已想此琴之音與天主樓中玉琴無異真無價之物也玩索間忽見惠氏走出堂來萬福道感元帥爺法力女兒舜華平複如舊無以爲報适才爺彈琴之時小女扶病出來竊聽他道廣陵散自嵇仙歸天之後無人傳此真派帥爺獨精此曲不知從何得來恁般精妙但可惜不全尚有後序八段乃袁孝己所續小女記得親切願傳帥爺以報活命之恩杜伏威大驚暗思天主傳我時原說還有後序八段留之不傳以待他年姻緣配合今此女能彈莫非姻眷在此千里能相會乎心中已有調和琴瑟之意了乃佯應應道多謝令愛厚情目今軍務倥傯無暇及此容日領教便教起馬致謝出門惠氏跪送說小女專候帥爺車駕回來草環相報伏威拱手而別將校簇擁前進忽見村口有一大廟扁上寫太保行宮四字杜伏威問是何神居民道是河神花花太保之廟伏威怒道如此妖神不宜供奉喝軍士將神像打倒立刻拆毀其廟木料磚瓦付保正修了學宮杜伏威回至朔州大小將士迎接入城設宴洗塵伏威將傅小姐失琴被魅之事對衆人細說又道我觀傅嫗嫠居賢淑其女因教可知意欲求爲正室不識可乎查訥道傅小姐既是司農侄女乃閥閱名家母賢其女必正元帥聘爲夫人必能內助有何不可薛舉笑道忠臣之女作配俊傑門戶相當況傳琴之意夙緣有在即當遣聘成婚攜帶小弟吃一杯喜酒杜伏威道婚姻之事蓋由天定不可造次必須稟過住持爺方可行事查訥道不然今且先遣聘禮待稟過林爺然後完親又何妨礙杜伏威依言備黃金一百兩白金五百兩彩段二百端明珠二串挽查訥爲媒花紅鼓樂送至成州縣傅小姐家裏來惠氏接見查訥備道杜元帥求親之意僕從獻上禮物惠氏大喜收了排席款待送上小姐庚帖查訥相別回朔州覆了杜伏威的話親事已諧俱備歡喜不題再說繆一麟軍馬打至長道縣界忽見一軍校跪于馬前稟道小人是樊將軍差來奉書于元帥爺的繆一麟收了書帶那人回朔州府見杜伏威等禮畢將書獻上同拆看得書曰沐恩辱將樊武瑞薰沐百拜恩主杜元帥大將軍並思主薛元帥大將軍麾下罪朽被擒自分幽冥之客感蒙洪造慨存螻蟻之生雖粉骨碎身不足少酬萬一匆匆拜別未悉鄙衷有一緊要重事失于稟聞杜思主先尊都督大人當年蒙詔捐館太夫人與夫人相繼棄世三位靈車寄于武平郡城外荒土之內牛進暗差人焚化帶回朔州埋在郊外翠微觀後糞窖之側可憐可憐十餘年杳無知者杜元帥可速差人取之薛恩主先尊將軍大人昔日劍山與陳玉交鋒中計落阱自刎坑中尊首已獻朝廷豪骨尚埋土內雖經日久蹤迹可尋薛元帥亦宜差人取之擇地安葬以盡二恩主人子之心此亦瑞之少報效於台下也他日重逢當效草環萬惟台照不悉杜伏威看罷踴躍稱謝道父母骸骨許久不知下落晝夜彷徨睡不安枕今得此消息勝如登大寶矣薛舉道父親骸骨未收人子之心何久欲求取無蹤可尋今幸樊將軍傳示真天地之大恩也亦足以報父矣問樊將軍今在何處軍校道樊爺付書之時說往終南山修道去了杜伏威薛舉向南拜謝取銀五十兩賞那軍校去了次早杜伏威沐浴更衣焚香拜祝了上蒼率諸將上馬出城取路往翠微觀來尋取遺骨觀中道士撞鐘擊鼓聚集道衆遠遠跪接杜伏威等一行人進殿參禮三清衆聖畢齊到殿後糞窖邊教軍士並力掘下去道衆俱備驚駭不知其故只見衆軍用力掘土至五尺餘深忽掘見一洞洞中吐出氣來就如煙霧一般軍士便不敢動手停鋤稟覆杜元帥伏威同薛舉查訥等向前來看果見煙霧奔騰盤繞洞口亦不知是何異故查訥道如此濃郁必非地氣洞內或藏異物再命軍士掘開便知分曉衆軍士又掘下數尺乃是一個大窖只見有一條青蛇身如鬥大頭生短角眼放電光約數丈之長做一堆兒蟠在窖中見了衆人也不慌也不忙漸漸昂頭掉尾露爪揚鱗杜伏威等衆見了俱備驚愕遠遠站開只有薛舉按劍立於窖側看他動靜只見霎時間天昏地暗雷雨交作霹靂一聲這青蛇從穴而出乘雲駕霧往東南飛去了少頃依舊天清雲散日色光明衆人方知是龍非蛇也有詩歎查訥不能預知以致泄氣詩曰盤龍之穴真天子何事軍師盡渺茫查訥一言扶帝主只因不識喪禎樣薛舉招呼杜伏威等入窖裏看時那龍蟠之下卻是三個骨瓶查訥歎道主帥無福樊將軍誤卻大事此是真龍穴帝王之地也若不開掘數年後主帥必登大寶龍氣已泄實爲可惜杜伏威笑道近仁之言謬矣豈有子爲天子而使父母骸骨埋於糞窖之側乎吾寧不得大寶不忍使父母之骨穢汙也查訥等頓首道真純孝之主也杜伏威道純孝吾何敢當但於心有不忍耳說罷俯伏窖內手抱骨瓶號啕痛哭諸將和衆軍無不下淚查訥薛舉再三勸慰方