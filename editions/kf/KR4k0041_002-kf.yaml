叔侄暫試一局看二人對弈杜應元輸了直饒至六子杜應元大悅當日就寫下兩個柬帖著家憧往桑衙接桑皮筋及道人二人次日小酌桑皮筋接了帖子和道人商議道這杜老兒殺得心膽皆寒不敢出頭怎地今日又來請我們酌酒道人道有甚事故這老頭兒今日必擺佈得些財物又思複帳了貧道和公子再去贏他些錢鈔教這老兒夢中也怕桑皮筋拍著手笑道師父說得妙磨拳擦掌巴不得天晚次日辰牌時分杜應元一面著人去桑行邀請一面叔侄二人在廳上計議打點少頃報桑皮筋和道人到了接入廳上禮畢桑皮筋見側首坐著杜伏威生得人材魁偉相貌威嚴心裏暗想道三老官何處請這個人來莫非也會手談的開口問道這位是何人杜應元道是舍侄杜伏威在外日久近日才回道人介面道好一位令侄大有福相說話間酒席完備四人傳杯弄盞行令歡飲到下午家僮撤席另換酒肴並不提起勝金姐桑皮筋乘著酒興道老丈還肯尼教一局麽杜應元道敗軍之將不敢言勇心下也欲請教一局奈何囊中空乏不敢罵陣桑皮筋道老丈太謙了賭一東何如杜應元道這卻使得桑皮筋道如負一子出銀二錢以爲次日東道之費杜應元道二數太多道人道輸一著罰銀一錢罷了二人首肯擺下棋枰對局杜應元連輸二盤共少四著半兩下大笑而罷重赴酒席將及更余道人起身謝別桑皮筋道酒興雖盡棋興正濃誰敢與我再對一局麽杜應元推辭道老朽年邁神衰目力不足對局必輸若公子不棄待舍侄請教何如桑皮筋道更好正要領教杜伏威道小子無能公子相讓幾子方好道人道且對一局便見優劣二人分開黑白擺下棋坪但見沿邊而下謂之立不連而人謂之於粘連勿斷謂之行以我攔彼謂之約遠粘不斷謂之飛斜行粘話謂之尖連而不斷謂之粘斜侵拂彼謂之綽連子直入謂之沖隔路相對謂之關可斷先視謂之覰死而結局謂之毅虎口先斷謂之劄相當抵住謂之頂離而爲二謂之斷以子按頭謂之捺以子擊節謂之打隔子偎敵謂之蹺閉之不出謂之門深人破眼謂之點傍通其子謂之透逐殺不止謂之征先投虎口謂之抛後應打子謂之劫先截後所謂之劈聚子點眼謂之聚促彼急救謂之抄連子直破謂之刺逼拶不歇謂之盤兩子夾一謂之夾玲瓏不漏謂之松兩圍不死謂之持詩曰棋雖小數與兵通勝手何須用詐攻神識預周應莫敵先入一著妙無窮道人用心窺視杜伏威棋子甚是神捷不動心思隨手而下自然合機成局桑皮筋輸了一盤心下不忿佯笑道愚生酒後神昏況閒談甚無趣味杜兄須賭些甚麽才有意興杜伏威道任公子尊意若何桑皮筋道少賭些罷十兩一局勝者得采杜伏威應允二人複整棋局對壘間杜伏威又勝了道人勸公子道夜已深沈請公子回行明日再來頑耍桑皮筋紅著兩頰道有這等事怎地就回去了務要取勝方歸這兩局是我屈輸了皆因錢少故此不能動棋興須多出些采頭才妙杜應元取出一百兩白銀放在桌上對桑皮筋道日前小妾送在公子處問得人說拗劣不從老朽將此銀子著舍侄與公子相賭舍侄勝乞還小妾公子勝袖銀回府何如桑皮筋大喜道老丈慷慨知趣對道人道師父你看這一回畢竟是我贏了道人袖手不言當下桌上點著四枝大燭照得明亮桑皮筋張口咬指千思萬算右手兩指拈著棋子卻似發傷寒病一般不住的搖顫杜伏威談笑自若信手而下殺得桑皮筋棋子四分五裂應接不及桑皮筋又輸一局大叫一聲罷了推枰拍案而起呆笑道明早送還尊寵拽步往外就走杜伏威扯住道公子慢行乞留文約明早可以擡人不然何所憑據桑皮筋道咫尺之間何須文券明早擡人便了杜伏威道這話難講久聞公子作事不甚瀏亮明日攪不還人如之奈何這正是當面錯過了桑皮筋大怒罵道那裏來這野畜生不知上下恁般可惡不看老杜分上送你到縣家去重加究治杜伏威激起性來將桑皮筋劈胸扭住罵道我把你這狗男女臭強盜鳥娘養的潑皮賭錢須要明白只許你騙人怎地就要送我莫說別的便要砍你這顆驢頭有何難處先奉承你一頓拳頭提起有拳正待要打杜應元一把扯住道侄兒不得無理道人也勸道分明是公子的不是爲何就出言傷人杜君亦不可如此粗鹵要全令叔體面杜伏威方才放手桑皮筋賭氣不肯寫券定要回去杜伏威決不肯放兩下爭競不開有詩爲證勢豪倚勢欺人伏威忿氣不服凡棋那比仙棋落局難妝騙局看看五鼓雞鳴道人道公子與杜兄吵鬧終無了期貧道爲二公和解公子耐心暫坐貧道和管家先去著人送杜老文尊寵過來然後公子回府還是如何杜伏威道師父見教得是若如此萬事皆休道人辭別而去不移時一乘轎子送勝金姐回來杜應元不勝歡喜喚媽媽領進去了桑皮筋見了氣得目瞪口呆杜應元道公子今番可請回府罷桑皮筋也不做聲大踏步走出門外指著杜應元罵道我把你這兩個賊胚死囚不要忙定弄得你家破人亡才見手段一頭罵一頭走杜伏威又欲趕去杜應元攔門阻住各自散了桑皮筋怒氣填胸回家對道人說此忿何能消得道人笑道公子你好度量淺狹勝敗得失此乃常情比如公子勝時杜公不動聲色今日之失乃是還他故物又不傷公子己財何必如此忿激桑皮筋道錢財如糞土便輸了千萬也不動心只叵耐杜老兒的那個狗男女甚爲可惡必須結果了這廝性命方消此恨道人勸道公子不鬚髮怒自古說相罵無好名公子暫時甯耐待他那侄兒去了再騙這杜老子耍他一耍消這口氣未遲桑皮筋見道人婉轉相勸把一腔子氣早挫了幾分但是面無喜色心下悶悶不悅吃罷早膳和道人往街坊上閑行散問信步走到一個去處卻是錦營花陣風月之叢喚做留情巷這都是行院人家居住共有五七十名美妓桑皮筋東顧西盼這些娼妓都認得桑公子俱起身廝喚桑皮筋一路談笑取樂正走之間只聽得背後有人叫道桑相公好快活吃了茶去桑皮筋回頭看時是一個幫閒相識怎生模樣淡白眼兜臉焦黃屈曲須一鈎鷹嘴鼻兩道殺人眉赤眼睛如火甜言口似飴笑談藏劍戟評論帶黃雌域伏妝人狀狐行假虎威汗私誇嘴直超勢過謙虛遇富腰先折逢貧面向西揮毫多白字嫁禍有玄機屈膝求門皂陪錢結吏胥見財渾負義矯是每雲非性黠精詞訟臀堅耐杖答吮癰何足異嘗糞不爲奇呵盡豪門卵名呼開眼龜原來這人姓管名賢士本巷居住祖上原是仕宦出身不知怎地幹了壞天理的事生下管賢士的父親名喚管窺自小嫖賭喪了家業因而做些穿竊的勾當渾家閻氏又與外人通姦醜聲播揚這管賢士卻是奸生子俗語稱爲雜種後來這管窺做出事來經官發配邊地不知屍首落在何處閻氏卻隨了本地一個棍徒栗盡度日這管賢士隨娘改嫁跟著栗盡學些拳棒習寫詞狀專一幫閒教唆挑哄人興詞告狀他卻夾在中間指東說西添言送語假公營私椅官托勢隨風倒舵賺騙錢財唱得幾句清曲曉得幾著棋局憑著利口便舌隨機應變凡是公子貴客喜他一味的奉承不過少他不得城裏城外遍處有人識得他故人取他一個綽號叫做管呵脬又因晚爺姓栗別號栗刻呵年至三旬之外娶得一個妻室複姓上官氏此婦父親名喚仕成原在本郡衙門前居住專靠做歇家糊口最是奸狡險惡剜人腦髓凡是結訟的士客鄉民在他家裏寄居無一個不破家蕩産這女人貌雖窈窕性極淫悍因管呵脬和幾個舊相處小官來往每每夫妻爭鬧管賢士不聽妻言上官氏尋思夫既拐得小官偏我相處不得朋友即和隔壁富商黃草包通姦管賢士禁止不得只索做了開眼龜這正是祖宗不積所以男盜女娼鄰居少年見他夫妻每日爭風廝鬧戲編曲兒四隻以譏之曲名桂枝香代上官氏罵夫愛你龐兒俊俏怪你心兒奸狡不念我結髮深恩反道那無端惡累心旌自搖心旌自搖慢罵你薄情輕佻耽誤奴青春年少暗魂銷幾番枕冷衾寒夜縮腳孤眠獨自熬代管呵脬答妻雖憐你腔兒窈窕可惜你性兒粗糙嘴喳喳一味研酸怎當我心兒不好更紛紛草茅紛紛草茅這些關竅有何風調那通宵恁般空闊深如海爭似陸地行舟去使篙上官氏又罵夫深情厚貌心同虎豹只圖那少艾風流全不顧傍人嘲誚淚珠兒暗抛淚珠暗抛擠得個今生罷了兩分張各尋祟祟小兒曹木墀花戴光頭上受這醃臢惹這樣騷管呵脬又答妻心雄氣暴終朝聒噪大丈夫四海襟懷豈後與裙衩爭鬧羨當今宋朝當今宋朝願與他死生傾倒難回你別諧歡笑謾推敲任予延納三千客讓你黃家一草包這管賢士原與桑皮筋會酒頑耍過的當日在留情巷裏偶自遇著桑皮筋應聲笑道小管許久不見管賢士道一向窮忙久失親近大相公是個福神一向灑落麽桑皮筋道惶恐近來受了一場醃臢臭氣心下十分不樂因此到這裏消遣一回管賢士聳著兩肩戲著臉道相公是天地間第一個有財有福的快活人有甚煩惱處終不然有那一個不怕死的來衝撞相公桑皮筋歎口氣道不要說起說將來氣殺人管賢士道相公有甚閒氣和小人說知這怒氣登時便消了即款桑皮筋道人到家裏坐下慌忙叫上官氏出來見了茶罷管賢士又道大相公委實有甚煩惱見教何妨桑皮筋道敝鄰有一個姓杜的老兒是個誠實君子每和學生博棄賭賽互相勝負雖然輸一些不過排遣取樂而已日前來了這位遊方師父圍棋甚高承師父指點幾個局勢說數著玄機學生比前頓然悟徹和那杜公賭賽勝了他數百金又虧師父親自與他對局贏得他一個美妾且是有趣了管呵脬將扇子在桌上敲一下插嘴道妙妙妙後來卻怎麽桑皮筋道不期杜公那裏尋一個甚麽侄兒來素不會面又是別處聲音這杜公請我與師父酌酒酒間後不覺棋興勃然和老杜又對弈起來且喜又勝了幾局管呵脬嘖嘖搖頭稱羨道大相公醉後還如此勝他好棋好棋桑皮筋道咦好棋咳不想那侄兒接上和我相持我費盡神思他卻並不在意就如風捲殘雲一連數局殺得我舉手無措連銀子與那嬌滴滴美人兒俱贏去了管呵脬跌腳道呵呀可惜可惜銀子倒是小事這美妾把他複了轉去真是氣殺相公擺佈他才是桑皮筋道妾與銀子輸去這也罷了我說黑夜之際難以擡人明早送還尊妾老杜到也肯了叵雨那侄兒野蠻反說我放刁說謊出言不遜我不曾罵得幾句反被他結扭一場捏起拳頭只待要打你曉得我平日也有幾分手段的不知怎地被他結扭竟自掙扎不得若不是老杜和這師父苦功一頓拳頭奉承在我身上了只得連夜還人方才放我回百你說世間有這樣異事麽今早我定要擺佈他師父再三相勸我心下尚是忿他不過管賢士睜著兩眼喊叫道有這樣異事反了反了世間都沒王法了王孫公子被人毆辱下一等的不要做人了這位師父好沒主意見公子被小人所願不出力相助反來勸阻若是小可在時路見不平任他甚麽好漢也要和他跌三交豈肯吞聲忍氣受小人之恥辱被人笑話桑皮筋被管呵脬數句言語聳動大怒道管兄說得最是轉思再思越發可惱還是怎地斷送他才好道人道貧道雲遊四海見識頗多凡事忍耐些好聖人雲若以責人之心責己恕己之心恕人方是君子臂如公子與管兄相賭公子勝了焉肯空手而回自古賭錢不隔宿當下放了公子回府次日討人公子不肯還時奈何杜子取約也是正理貧道看那個侄兒不是善良君子所以勸公子將就罷了管賢士笑道師父勸桑相公的言語都是橘皮湯果子藥太平活兒但不知讓人容易下次公子難做事了若說那廝是個本分老成的人倒不必和他計較既是個囂薄子弟決不可輕放了他天下英雄好漢小可眼裏不知見了多少只怕大相公或思得耐得若依小可主意只消我筆尖兒一動管教他立刻遭殃這喚做掄刀不見鐵殺人不見血棒打不見疼傷寒不發熱毒口不見蛇螫尾不見蠍苦痛不聞聲分離不見別世上若無此等人官府衙門不用設桑皮筋跳起身來喊道這方是說話師父是個出家人都說的是好看話兒我桑相公就恁地包羞忍恥被小人所肩罷了管賢士道正是正是出家人圖個安閒自在我俗門中要替父母爭一口氣自古道人爭一口氣佛爭一爐香恨小非君子無毒不丈夫大相公自己要張主若用我小管時上天入地亦所不辭桑皮筋大喜道今日聽了管見數句良言使我心中煩惱頓然消了一半道人見這光景心下暗想這桑皮筋額角上現了黑氣眼見得撞入太歲網裏正是各人自掃門前雪莫管他家屋上霜立起身來辭道小道有些薄事暫且告別晚上再會管呵脬已不得道人去了便道師父有事不敢相留送出門去回身分付渾家陪柔相公暫坐自卻去買些酒肴相待三人一面吃酒一面計較桑皮筋道無辜相抗甚是不當但擺佈得那廝方見盛情婦人道無物相待公子體怪管賢士道這般小事何須費心相公寫狀要把令尊老爺出名先去府中呈告說有虎棍積賭杜某叔侄二人專一妝局騙人開場肆惡有男某人素習儒業禍遭惡某網羅到家局賭誆銀五百餘兩某不忿令男理取反遭惡黨毒打垂危乞天剪惡維風上告這一狀准來不怕那廝不破家蕩産桑皮筋低頭將狀語想了一遍道承見教詞語甚佳但家君見了賭字不推不肯出狀兀有一番煩惱這事掣肘如何行得管呵脬道相公多少伶俐這用術之處卻不省得比如今日未告之先令尊老爺知道必然阻擋或加責駡亦未可知待我小管替相公在本府先告准了然後稟知老爺那時令尊自然承認誰肯把嫡親兒子去吃官司還有無窮巧妙不必細說臨期自見事妥之後只要公子將小管做一個人看覰便教小管吃屎也是甘心的桑皮筋笑道說那裏話事畢之後自當重謝但不知幾時可以遞狀管賢士道事不宜遲就是明日一應事務都在我小管身上不須挂念相公打點見官就是桑皮筋道千萬在心不可有誤管賢士道這是我自家的事不消分付二人再飲幾杯管賢士托故先出門去了桑皮筋當晚就與他渾家宿歇有詩爲證孚窒猶然訓惕中涉川何事侈謀工須知怨小宜容忍莫使青萍染落紅次早桑公子自回衙裏去這管賢士在鄰技家光了一餐早飯悄悄地闖入杜應元廳上來叫一聲杜老先生在麽杜應元正在家內閑坐忽聽得有人叫喚踱出來看乃是管呵脬二人聲喏坐定杜應元問道管兄早來有何見諭管賢士道小侄昨聞老丈惹出一樁天字第一號是非特來通知及早可以解釋杜應元笑道老拙一生守分兄所素知有甚是非相涉管賢士道這樁事不成則已若成利害不小杜應元問何事管賢士道昨與桑公子會酒公子說與兀誰賭博輸卻五七百兩銀子他父親知道寫了一紙狀子朱語是局賠殺命事要去本府告理恐字眼有不到之處特差人接小侄去商議斟酌卻原來是告老丈和令侄的小子思量都是鄰比之間怎下得這樣毒手若構訟時老丈畢竟要受些折挫故小侄特來暗通消息及早裁處方好杜應元道圍棋相賭無非東道相聚而已後來老朽因酒後輸卻一妾幸舍侄旋璧桑公子有甚銀兩輸與我處縱使告來他也要舍著自己對我管賢士道小子亦知老支忠厚未嘗與人爭競但不知當今世態惡薄只以勢利爲先俗言說貧莫與富爭富莫與官鬥儻對理之際官官相護偏聽一面人情老丈豈不受辱正是識時務者呼爲俊傑還須小心陪禮省了一場大禍古人道得好學吃虧多忍辱小侄亂言無非爲鄰比間情分任憑尊意杜應元心裏暗想這廝也說得是就問道承足下厚情見教但不知怎生小心陪禮管賢士道這有何難只要老叔費幾貫閒錢辦一個齊整東道請桑公子一酌以外還須一二十兩色銀使用這是非登時散了管教一座冰山化作半山雪水杜應元道東道是容易的一二十兩銀子卻在那處使費管賢士道老丈雖然齒德俱尊不知世情活法目今桑公子相處的朋友都是一班遊手好閒幫訟教唆的豪傑跟隨出入的都是一夥貪嘴圖利狐假虎威的悍仆假如桑公子肯息訟這一些人唆唆哄哄畢竟又生起枝節葉來故此要這些銀兩撮化與這夥人方得平風靜浪終不然小侄敢誤老丈大事杜應元謝道深感盛雅待舍侄回來商議踵門請教管賢士道晚上即求示下大抵還是收拾的好小侄就此告別杜應元相送出門管賢士又回頭道請早自裁度免貽後悔杜應元點頭領諾少頃杜伏威回來杜應元將管河畔的言語說了一遍杜伏威仰天大笑正是畫虎畫皮難畫骨知人知面不知心畢竟杜伏威怎的回覆且看下回分解第二十五回遭屈陷叔侄下獄反囹圄俊傑報仇詩曰嗜利凶徒駕禍殃暗中羅織害賢良英雄束手甘囚禁衰老含冤繼死亡怒激風雷驅魍魎重開日月創家邦從茲將士如雲集會見岐陽作戰場話說杜伏威聽叔父訴管賢士之言不覺大笑杜應元道賢侄如何好笑杜伏威答道我不笑三叔笑那管呵脬來說是非者即是是非人有了一二十兩銀子不會打官司反與光棍騙去使用若說圍棋賭勝人之常情我雖不合他也不應他說輸五七百兩銀子與我有何憑據任那廝告去不妨事杜應元見侄兒說得有理放下了心安坐不動叔侄二人且去備辦牲禮邀請親族同往祖墳將杜悅骸骨埋葬祭祖已畢杜伏威拜謝了叔嬸就要打點起程杜應元道賢侄初來未曾備得一杯酒相待嫡枝骨肉諒不見嫌怎忍棄我就去杜伏威道感承叔父嬸娘厚情本該在此侍養但來此日久恐林老爺懸念故欲拜辭孔氏道粗茶淡飯侄兒體得嗔嫌要去況小管之說未知真假賢侄稍停數日見一個分曉你也去得放心杜伏威道嬸娘恁地說時小侄再留數日夫妻二人歡天喜地款待著他杜伏威自去合那祖師救饑丹和神仙充腹丸再說管呵脬等至黃昏不見杜應元覆話心裏暗想這廝不來見我正好放心行事今番怪我不得當晚寫成狀子筆削了出門人戶的字眼次日黎明扮做桑參將管家投文隊裏進去遞了狀詞並帖子這岐陽郡太守覆姓諸葛名敬字秉恭爲官清正立性廉明當下見了帖子狀詞使喚管賢士上前問道你家主好沒來由自己兒子賭錢不能訓誨反告他人騙誘若市到賭博情由連你家公子也脫不去了管賢士稟道小的家主平素並無只字人公門今值不得已事于讀爺爺公子素習儒業足不出門今春偶遭惡鄰杜應元收一來歷不明之人假稱親侄凶頑狡猾又嫖又賭善語能言奸詐百出賺誘我家公子飲酒嫖要次後引入賭場叔侄二人妝成圈套設席騙公子飲酒一夜之中騙去金銀五百兩家主盤庫賞軍庫中錢糧卻沒了一千餘兩局賭之物即系朝廷錢糧不得不告伏乞爺台作主太守笑道若說是庫中錢糧爲何被公子竊出賭博是你家老爺不謹了狀子暫准待後審實再行議擬管賢士叩頭而出昔人有唆訟賦一篇以著其惡賦曰世道衰而爭端起刁風盛而訟師出橫虎狼之心懸溝壑之欲最怕太平惟喜多事靠利口爲活計不因而農倚刀筆作生涯無本而殖媒孽禍端妄相告汗聯聚朋黨互計舞文閥閱婚姻一交構遂違秦晉之好公平田地才調弄便興鼠雀之詞搬鬥兩下相爭捏證打傷人命離間同胞失好虛裝罷占家私寫呈講價做狀索錢碎紙稿以滅其蹤洗牌字而誤其迹價高者推敲百般惟求聳動乎官府價輕者一味平淡那管埋沒了事情顛倒是非飛片紙能喪數人之命變亂黑白造一言可破千金之家撈得浮浪屍首奇貨可居緝著詭寄田糧詐袋在此結識得成招大盜囑他攀扯冤家畜養個久病老兒攙渠跌詐富室設使對理則硬幫見證而將無作有或令講和則抵銀首飾面弄假爲真律條當堂可陳法令隨口而出茶罷聞言即鼓掌而歡笑曰老翁高見甚妙甚妙吾輩真個不及酒闌定計乃側首而沈吟曰學生愚意這等這等執事以爲何如以院司爲衣缽陸地生波藉府縣爲囗媒青天掣電朝來利在於趙乃附趙以斃錢晚上利在於錢複向錢以傾趙又能饣舌李客之言送于張氏之耳複探張氏之說悅乎李客之心剛強輩圖決勝則進囑託之謀愚弱者欲苟安則獻買和之策乘打點市恩皂快趁請托結好史書儻幸勝則曰非人力不至於此儻問輸則曰使神通其如命何或造不根謗帖以爲中傷之階或捏無影訪單以賈滔天之禍彼則踞華屋被文衣猶懷虎視之心孰敢批龍鱗撩虎須聲彼通天之惡故欲興仁俗教唆之律宜嚴冀挽頹風珥筆之奸當殺管呵脬徑奔桑參將衙內見了桑皮筋聲喏道大相公賀喜狀詞已准準備見官對理將狀抄與桑皮筋看了桑皮筋大喜留管呵脬書房裏酒飯取銀十兩遞與管賢士道煩兄衙門使費如少再來取罷對理之詞臨期還乞指點千萬用心莫誤管賢士道一應使費衙門上下都是小人承管對詞亦是不難只有一件令尊大人處公子宜早講明作速見官斷送那廝不可停留長智桑皮筋道多承指教管呵脬得了銀子作別去了晚上桑皮筋對父親說知此事求父作主桑從德大怒道畜生不腦心經史暗行賭博效下流所爲又生事告人大膽來對我說可惱可恨咄桑皮筋見父親盛怒不敢多言折轉身望內房裏就走見母親白氏細說前因今已告成父親又不肯管儻若訟事輸了被人恥笑只索往水中一跳倒也乾淨免得露醜白氏心中憂慮對桑參將道我和你夫妻二人只有一子雖是不肖豈忍坐視見官時受些叱辱不惟我與你失了體面儻畜生做些不測之事出來那時悔之無及桑從德道我也知道奈是賭博之事貽害最大今次若縱了他日後怎肯改過待他危急自有道理夫人道雖然如此父子之情還當覆庇他嚴加警戒下次便了這桑參將被夫人三言兩語說動了情只得打轎上府至迎賓館候太守相見禮畢茶罷桑參將將前事細訴一遍太守道老先生駕臨無不領教只是令郎公子人于賭場難分彼此學生若不整治一番縱其得志下次老先生愈難訓誨況錢糧乃朝廷重務令郎盜出賭博老先生亦失于檢點矣學生藥言老先生莫罪桑參將被太守搶白數句氣得閉口無言返身相辭回衙對夫人道知府反把錢糧誣畜生賭博怎生是好夫人道既太守作難只令家憧去對理嘉兒只不出官錢糧又不缺少彼亦無奈我何桑參將道此言亦可不去催他構提輕放那廝罷了因此兩下將這場訟事擱定了將及半月不期諸葛太守父親身故一壁廂申詳了憂文書一壁廂打點奔喪回籍將府印交與府丞掌管那管呵脬時常在府門前探聽一知太守了憂忙人桑衙通報桑皮筋大喜你道爲何原來這本府府丞姓吳名恢向與桑從德交往情密雖是儒林出身性兼貪酷一味糊塗有這個機會故此大喜當時桑參將聞此消息忙往府中將上項事和吳恢備細說了又道今得老公祖署事乞求清目感恩不淺吳恢滿口應允道既是令郎被人賺賭學生即時拘審究罪只消數位見諭何煩老先生大駕親臨桑從德稱謝而別管賢士和桑皮筋道這場官司幸落在老吳手裏有了令尊面情必然大勝但老吳有些毛病最貪財物儻杜應元叔侄爭氣用了見識先送禮物進去劈了令尊體面勝負之間未可必也依小管愚見還須先下手爲強將些財物送與吳公方是萬全之策大相公意下何如桑皮筋道見甚在行見識高妙但是家君不肯如之奈何管賢士道古人說得好孝順官司忤逆道場公子貫朽粟陳金銀滿庫何在乎三五十兩銀子就瞞著令尊將私蓄之物親自送入吳二府衙內自然老吳歡喜隨意奉承要問那廝一個死罪也是肯的桑皮筋笑道些須銀兩何足爲惜但告狀雖是家尊出名我亦是本府犯人豈有親自送銀之理足下著有門路煩勞轉送何如管賢士笑道吳公署印過龍的人我盡相熟只是銀兩重托小可不敢承當還要選一個能事的盛使自去方可桑皮筋將手指著管賢士道小人哉管見也我既托你做事豈有疑你之心我衙裏這班狗才都是懵糠躲懶的驢馬焉可托以機密重事足下不必多疑放心行事說罷走入裏面取出五十兩一錠大銀送與管賢士道煩兄即便行事停妥時複我一聲管賢士道不須大相公叮囑管取停當只恐少些說罷袖銀別去原來這五十兩銀子不是送與吳府丞的乃是管呵脬指官誆騙之法若是吳公這五十兩如何打得他倒管呵脬拿了銀子笑嘻嘻奔回家來遞與渾家渾家道這銀兩從何處來的管呵脬道連幾日賭輸了手中甚是乾燥幸遇著一場公事賺得這一錠銀子盡夠我數月滋潤渾家又問怎地有這若干管呵脬道那桑公子是個桑皮筋平日有些臭吝被我騙他告狀將這銀子教我送入吳府丞衙內我想桑參將正掌兵權炎炎之勢不愁吳府丞不奉承何必又送禮物被我一片巧言立刻哄得銀子入手你且藏下慢慢地受用渾家歡喜將銀子藏了不題再說杜應元與杜伏威道管呵脬所言之事將有半月怎不見動靜杜伏威道畢竟是那廝調謊杜應元道早是賢侄說破不然已被那廝哄賺二人正說話間只見門首走入兩個人來你道是誰原來是府裏公差有挂枝兒爲證著青衣進門來大呼小叫兩小弟奉公差那怕勢豪不通名單單的稱個表號有話憑分付登門只這遭明早裏拘齊也便要去點卯吃罷茶就開科道其來意有某人爲某事單告著伊莫輕看他是個有錢的豪貴摸出官牌看一字不曾虛急急的商量也莫要耽誤你吃酒飯假做個斯文模樣我在下極愚直無甚智獐他告伊沒來由真真冤枉說便這等說還須靠白鏹不信我的良言也請伊自去想酒飯畢不起身聲聲落地這牌生限得緊豈容誤期有銀錢快拿出何須做勢若要周全你包兒放厚些天大的官司也我也過得水接銀包才道聲適間多謝忙扯封估銀水如何這些我兩人不比那窮酸餓鬼輕則輕了已不送也由伊明日裏到公庭也包你爛只腿杜應元迎到廳上坐下問道二兄何事光顧那二人道兩小弟是本府公差奉吳爺鈞牌奉請二公講話杜應元心下已明白了一個公人腰邊取出一紙花邊牌票上寫著爲局賭事原告官宦桑從德抱告人桑聰被告犯人二名杜應元杜伏威幹證管賢等杜應元看畢即辦酒飯款待送了些差使錢公人約定聽審日期去了杜應元煩惱道悔氣沒來由惹下一場官司怎生區處杜伏威道三叔不須憂慮小侄自去分理諒這小小訟事何必介懷任他妝甚圈套我臨期自有主見過了數日公人掏了原被告幹證等齊到府中候審一同堂上跪下吳恢見了桑皮筋慌忙請起立在傍邊問道公子被光棍賺賭委實騙了幾多銀兩從實講來桑皮筋道罪人素習儒業不省賭博之事被惡鄰積棍杜應元叔侄二人百計引誘先入行院幫閒嫖耍次後引歸家內灌醉賭錢一夜之間輸卻五百三十四兩銀子妝局賺騙心實不甘冒讀公祖老爺乞求天判吳恢笑道黑夜飲酒又非貿易之時爲何帶這許多銀兩桑皮筋青了臉不能回答管呵脬見了心中想道決撒了連忙跪向前幾步答道黑夜飲酒公子委實不曾帶銀只因醉後糊塗爲小失大始初輸得不多公子忿氣相持落了圈套積輸五百餘兩公子欲回被杜伏威恃強相劫不放轉動直待家憧送銀完足方得回行這是小人親見並沒半毫虛謊吳恢喝道你是何人輒敢多言管賢士叩頭道小人狀上有名於證名喚管賢士吳恢又喝道桑公子在杜應元家裏相賭你爲何知其備細管賢士道小的與桑公子杜應元二家俱系貼鄰燈火相照當夜五更忽聞得有人喊叫仔細聽時是桑公子聲音大聲叫局賭殺人彼時小人恐連累排鄰急起來穿了衣服開門一看卻是杜應元家裏吵鬧小人敲開門入去問時桑公子與杜伏威扯做一塊一個要取銀一個不肯小人替他和解即忙著桑衙管家回去取銀來交足方得放回此乃目擊之事伏望爺台明鏡杜應元道小人世代儒門安貧守分嫖賭二字乃下流之事素所深戒只于閒暇之時和桑公子圍棋消遣或賭一二東道未嘗賭甚財帛怎麽就叫做局賭都是這管賢士唆哄成訟費老爺天心不要說五百銀子便是五十文錢也不曾見有管呵脬攙口道杜應元你在青天爺爺跟前尚要推賴眼眨眨見你雪白銀子擄了進去彼時你還道小管累兄了我和你都是鄰比之間護得那一個天理人心難逃公論吳恢手拈長髯笑道這老狗才還要胡賴著圍棋便是賭局之訛賽東道即是騙錢之法眼見得局賭騙錢了尚賴到何處去從實供招免受重刑杜應元道小人和桑公子委實未曾相賭並無錢物往來都是管賢士捏詞唆哄興訟又來硬證伏乞老爺明鏡燭冤救拔小人殘喘吳恢喝道老奴賤骨不經刑罰焉肯成招叫左右上起夾棍來兩傍皂隸吆喝一聲正欲動手杜伏威高聲叫道不必夾我叔叔賭錢賺物都是我一身所爲招承就是何必動刑吳恢將杜伏威看了幾眼笑道此子年紀雖小卻也老實快快招來省受苦楚杜伏威道五百三十四兩銀子是小人得了但不知桑家是那一個家憧送來的還是甚物包裹幾錠幾件幾十塊說得明白小人一一還他管呵脬道是一皮箱藏著五十三封零一小包是桑衙來壽進順兩個蒼頭扛到你家何須胡扯杜伏威道黑夜扛銀銀在箱內爲何你備知數目管呵脬道我將銀一封封打開遞與你叔子還上天平兌過方收進去是我當面交割的緣何不知詳細我處銀與你不過要息兩家爭鬧我與你是甚冤家苦苦昧