不知好否杜伏威道有甚計較快快說來及早打點走路那漢道小人雖沒甚武藝自小跟著一位穿窬師父學得一身飛檐走壁騰波躍浪的手段常在黃河出沒路徑頗熟這裏從旱路去是一條官路穿過金牙關數日間可到永寧關口下了黃河船若風順不一日到得孟門山了其次即從這裏盤過野人塢徑落黃河便是風順也要三五日到宜川地方還有一條小路踅過杜陽城往東南而走一路俱是山徑極其幽僻人迹罕到渡溪盤嶺也須十餘日光景方可到得宜川縣我等分做三路著幾個扮作客商幾個扮作乞丐或扮些走方賣藥的打卦耍拳相臉的陸續行動庶免官兵追襲此計若何杜伏威道這議論甚妙衆人聽我說如有要回鄉裏的各從其便要到孟門山去的分作三路而行都約至宜川縣驛前取齊快快決斷莫遲疑誤事衆好漢一齊道我等蒙爺爺脫離大難生死願從並無二心杜伏威道既然如此不可失信我在黃河渡口著人相等列位姓名俱乞留下以爲相見之證衆人歡喜都道好就由這一個識路徑的好漢姓名寫起原來姓朱名儉次後一一書寫明白共二百五十七人杜伏威將紙單兒收了發付衆人各自裝扮走路衆好漢俱拜別分頭起行杜伏威將前合成的丸藥散與衆人分付道攪不遇酒飯店吃此數粒可以耐饑又與朱儉商議道我本該從大路去奈有先叔之妾系累難行若有阻擋甚爲不便煩公指引從小路去罷朱儉道小人引導往小路去爲妥當時多人一半從大路而走一半攛過野人塢徑下黃河去了只有三十一人和朱儉勝金姐來福又有僮婢二人跟從杜伏威共三十七人同行小路一路果然幽僻走了數日並無個人煙杜伏威帶得有祖師丹藥充饑自不必說至第五日一行人正趲路間只見大霧漫空對面不見正是樵子不分柴徑老翁失卻漁舟漫天漫地怎辨南北東西如雨如雲罩盡江山社稷嘹嘹孤雁也不知何處悲鳴滴滴流泉那曉他何方漏溜進一步退一步渾如大海沒津涯聞其聲昧其形儼若夢中相聚會前途昏杳莫非誤入鬼門關後路模糊不是陽間花世界耳畔只聞山鳥叫面前不睹虎狼行朱儉道今日偏不湊巧前去正是鳳凰嶺極其險峻內多虎狼值此大霧怎生行走杜伏威道既然前途險峻暫且停步待霧息再行朱儉等道說得是衆人揀一潔淨之地坐做一處等候霧收再行正坐之間忽聽得有人聲不住的喊叫救命救命衆人細聽卻是個婦人聲音杜伏威道卻不作怪這深山僻嶺之處爲何有婦人叫喊朱儉道莫非是不良輩在此幹些勾當麽一齊起身四圍尋找此時大霧漸漸收起現出日光朱儉聽著聲音向北尋去不上四五十步只見山凹邊樹叢之中兩個胖大和尚將一個年少婦人赤條條背剪綁在一株大柳樹上在那裏淫媾那婦人哭啼啼的不住叫喊朱儉見了不覺怒從心起兩眼圓睜大踏步向前喝道賊禿驢怎地在此造這迷天大罪不要走看打抽出身邊鐵尺眼光頭上正要劈下不提防這一個和尚在傍隔開鐵尺只一腳尖將朱儉踢倒樹邊揮拳就打背後杜伏威等一齊趕到正是寡不敵衆猶如衆虎攢羊將兩個和尚打倒叫勝金姐替那婦人解了繩索穿上衣服即將那繩索綁縛了兩個和尚丟在樹根邊次後問那婦人你家住何處爲何隨著這兩個禿廝在這裏幹這般勾當那婦人一頭哭一頭訴道小媳婦住在前村地名朱家塢妾身程氏丈夫朱慶十日前來了這個爆眼紅珠的和尚拜求丈夫要借門首打坐妾身不容倒是丈夫道他是佛家弟子化緣度日與他門外坐坐何妨這和尚坐在妾家門首早晚誦經念佛且是至誠妾見他虔心或茶或飯丈夫不在時就自拿些與他吃一連十餘日不去今日五更妾因有孕腹痛丈夫起早進城贖藥出門之後聽推得門響只道是丈夫轉來忽見這打坐和尚同那個長腳和尚闖入房裏一個將妾綁住妾欲叫喚他將一把明晃晃尖刀擱在頭上喝道若叫一聲割落你頭一個收拾財帛驅妾出門來到這裏綁縛樹上淫汙妾無奈只得喊叫天幸老爺們來救了性命說罷就拜杜伏威大怒持刀正要砍這兩個和尚朱儉上前道爺爺且慢動手一刀一個他卻死得便宜將這兩個落地獄的狗禿我且教他慢慢受用些疼痛方好令勝金姐和婦人站遠些和尚見勢頭不好哀求饒命朱儉道你不要叫老爺親自伏侍你將兩個剝了下服扳轉身來仰面朝天尋些乾草及枯死的樹柯將和尚的坐褥兒割碎取出棉花夾草帶枝紮縛在和尚陽物上來福笑道原來這兩個小禿驢怕冷這般日色還緊緊的護這一身棉絮頭上又戴個棉搭兒衆人道體要取笑且看朱大哥做作只見朱儉身邊取一塊火石敲出火種將硫黃淬著那亂草樹枝與棉花且是枯燥易著一步步燒到陽物上來兩個和尚十分疼痛喊叫連天欲要掙扎被繩索捆縛衆好漢又把棍棒兩邊拄定動彈不得原來人的皮肉是有油的見火愈著況有那些引火之物直燒得皮焦肉爛臭氣熏蒸兩禿驢熬疼不過連聲哀告只求早死杜伏威拍手大笑道聞你這小和尚坐化特地替你下火又燒了半個時辰看看氣絕不能動了朱儉教衆人動手刀斧齊下砍爲肉泥可憐兇狠遊僧因色化爲野兔杜伏威領了一行人和那婦人同過嶺來走到午牌時分遠遠見煙光透起乃是一村人家約有三四十家那婦人指道前面正是我家了朱儉道你們且慢行待我先去探看你家還是如何說罷三兩步跑到村口只見鬧叢叢圍著數十人在那裏大驚小怪的叫嚷立住聽時一個後生跌腳哭道天呀不知怎地被那禿廝騙去了有的道和尚是色中餓鬼見你渾家有些姿色畢竟拐騙去了有的道朱兄你常不在家想是大嫂和那和尚有情勾搭上了通同走脫有的道朱大嫂是老實的人決無此事作速四下尋覓或者還走不遠哩三三兩兩議論不定朱儉分開衆人問道你們爲甚事在此喧嚷內中一個答道客官你自行路莫管這閒事朱儉笑道便與我說說我在下專一抱不平與人出力或者管得這事也未可知何必遮蓋又一個道客官一樁古怪之事門不開戶不開房中不見了紅繡鞋就是敞地朱兄五更出門往城裏贖藥他的渾家被一個打坐和尚騙去了房中金銀首飾細軟東西盜得一空故此煩惱又不知上南落北來蹤去迹那裏去尋覓朱儉笑道原來如此只要重出賞錢朱兄渾家在我身上包還他不須慘切衆人喧哄道這客官倒來取笑你既應承必要下落朱儉道拐騙之事報信不實者即爲通同豈可妄說將手向北指道那來的可是你渾家麽朱慶和衆人回頭一看遠遠見程氏來了朱慶喜從天降慌忙跑向前扶了譚家到門首問道怎麽你被那禿驢騙將去了又如何與客人們同回程氏將捉去姦淫幸逢這夥客人救了性命燒死和尚情由哭訴一遍朱慶忙向杜伏威朱儉倒身下拜便欲款留一行人酒飯杜伏威把那金銀包裹還了朱慶辭道我等是要趕路程買貨的恐耽擱誤了日子不必酒飯但有一事相托乞莫推故指著勝金姐道這是我的族中姐姐因丈夫在宜川縣爲客身故今隨我便道同往奔喪奈因嬌怯多病不能前進意欲寄居尊府留此丫環相伴待我一到宜川即在車兒來接那時並酬謝禮朱慶道若不是官人恩賜朱某怎能夠人財兩得今令姐路途不便捨下盡可安身常羹菜飯不嫌輕慢便好怎講這酬謝的話杜伏威甚喜將帶來細軟財帛交割與勝金姐收管附耳低言說了幾句要緊關旨的話別了朱慶夫妻即和來福等一行人匆匆趲路去了朱慶因款留不住心下怏怏不已滿村人盡皆感激程氏接引勝金姐到家內灑掃一間靜室安頓二人早晚殷勤相待不必細說且說杜伏威和朱儉沿途笑說遇此一樁奇事那和尚與這婦人無緣撞著我等打散了風流陣互相談笑不覺又走過了數十裏路天色已晚分投飯店安歇次日又同趲路一連行了數日看看將近宜川杜伏威問此去尚有多少路程朱儉道前面已近黃河渡口杜伏威道我先渡過寨裏去見繆公端你領衆人就在這裏候那兩路來的弟兄取齊渡河進寨不可有誤朱儉道小人理會得爺爺先去衆人一到即來參謁朱儉與一行人四散各尋覓飯店安身杜伏威單身行到黃河渡邊並無一舟來往心下焦燥只得脫了衣服泳過河去看官聽說伏威自小是泳水慣的又有法術所以這廣闊黃河不一時泳過對岸到得山邊只見遍地屍骸滿場血肉無一隻船來接應比前大是不同杜伏威心內疑怪且上了岸穿衣望前面進行至土牆邊柵門緊閉寂無人聲杜伏威高聲叫道柵內有人麽叫聲未絕柵裏一聲梆子響弩箭炮石亂射出來杜伏威吃了一驚忙叫不要放箭我是杜爺特來拜謁大王快開柵門守柵嘍囉上前細看了認得是杜伏威即忙開門放入杜伏威問道緊閉柵門坡上盡堆屍骸卻是何故嘍囉道爺爺說不得繆大王身被重傷臥床不起爺爺來得正好見了便知端的杜伏威忙趕進關奔入寨中合寨嘍囉盡皆歡喜急入帳中通報繆公端令接入臥榻前相見杜伏威隨入房內舉目看時有北寄生草爲證但見淒慘慘愁添緒急煎煎火燎眉渾身疲軟精神淬喘吁吁難統貔貅隊氣昏沈怎把官軍退咭冬冬怕聽鼙鼓振邊關撲籟籟揾不住英雄淚繆公端臥於床上呻吟道賢弟你緣何許多時方來杜伏威道從容細稟衷曲大哥爲何如此狼狽端的因著甚來繆公端請杜伏威坐於床榻之上嗟歎道自賢弟別後不及數日報湖上有一隻官船經過小嘍囉說是鹿阝州知州周陛爲官貪酷百姓受其毒害任滿朝覲滿載而歸當下我聞報即傳令頭目率領嘍囉將周陛一家老幼盡皆殺了取其金銀歸寨船上有逃得性命的飛報本州轉申延州府叵耐那太守蔣勵發軍數千駕舟圍逼水寨見陣數次勝負未分近日又添了一個勇將是鎮守高奴城軍官俞福前來助戰身軀雄偉使開山鉞斧勇不可當我與他廝殺連輸三陣身中數箭臥不能起嘍囉被他殺傷了一半寨子破在旦夕幸得蔣太守身發重疾暫收軍馬回去算他不日必要複來我正在此無計可施喜賢弟到來吾無憂矣就請賢弟爲山寨之主督理軍務杜伏威道大哥不須憂怖且自調理貴體那廝來時小弟先試一陣另有良計破之繆公端道賢弟作主有何懼哉二人談話間只聽得炮響鼓鳴人聲鼎沸探事嘍囉飛報入來蔣太守病痊率領將官俞福軍土數千駕舟圍逼水寨比前番更是浩大繆公端見說戰慄不安杜伏威笑道大哥不必驚惶待小弟挺身退敵即披挂提槍上馬帶領數百嘍囉開關迎敵只見河中數百隻戰船團團圍繞逼近岸口遙見一大將立于艨艟之上頭帶鳳翅金盔身穿白錦戰袍上罩魚鱗細甲手持大斧指麾衆軍呐喊攻打杜伏威見了下馬登舟將戰艦一字兒擺開擂鼓搖旗向前迎敵對陣俞福見有人邀戰把大船飛也似搖動直沖過來兩下鼓聲振天箭如雨發彼此射住陣角少刻兩船相合杜伏威厲聲道你等何處鳥軍敢擅攻大寨自來納命知進退的速返征旗不然教你立刻身葬魚腹俞福笑道大膽狂徒不思改邪歸正尚敢大言早早卸甲歸降免汝一死杜伏威大怒挺槍就刺俞福持大斧劈面砍來兩個在船頭上交鋒鬥不數合蔣太守恐俞福有失指麾衆軍助戰四面圍裹將攏來自古寡難敵衆小嘍囉如何抵得住撥轉船頭各自奔散官軍箭如飛蝗中箭落水者不計其數杜伏威立在船頭奮勇鏖戰並無半點兒懼怯太守跨落小舟親自擂鼓助陣大叫不要走了賊首衆官軍將船四圍攢繞把杜伏威困在當中搖槳駕舟的俱射下水去了單剩杜伏威一人那船無人駕馭便橫轉來杜伏威呵呵大笑照俞福面門虛搠一槍俞福側身躲過杜伏威棄槍跳入水中俞福忙令善泳水軍士三十余人下水來擒杜伏威見了賣一解數名爲鯽魚爆從水底躍起離水面丈餘懸空打一筋鬥直攛過數箭水面頭向下腳朝天複鑽入河心衆軍都沒入水底來拿被杜伏威拔出腰刀排頭見砍將過來幾乎殺個盡絕只見骨都都血水泛出河面俞福蔣太守看了情知著了手並跌足叫苦不提防杜伏威從水底鑽到蔣太守船邊將船梢盡力一搖太守立腳不住撲通的跌入水中俞福見了急令軍士救援蔣太守上船暫且收軍有詩爲證何處來飛將英雄壓孟門縱橫波浪裏官卒可平吞再說杜伏威從水底遊到河口上岸回寨來見繆公端繆公端又驚又喜道适才嘍囉報官軍勢大被他戰敗賢弟已投水中爲何得生而返杜伏威笑道官兵雖衆俱非精銳俞福雖勇亦非萬人之敵今日故意挫動一陣使官軍放心圍困山寨我這裏且謹守數日自有破敵之策兄長安心管取高枕無憂繆公端暗思今日一戰大敗而回又說甚破敵之策心下雖然疑惑不敢再問且傳下號令分付守關嘍囉添上插木炮石晝夜防衛不在話下蔣太守被杜伏威攛落水中俞福救起回寨心下大惱次日正欲調軍攻打山寨忽哨馬報岐陽府提營團練使葉榮引軍助陣此是桑參將因杜伏威反獄合家被害急欲報仇刻期發兵追襲見屠勝劉勳敗陣逃回將二人即時罷黜緝拿杜門親族勘究杜伏威去向原來那日反亂之時杜伏威恐禍貽親族已令人分頭通報盡皆棄家逃竄去了只有杜應元之舅孔竅遠房侄兒杜橛避在城外山中緝著被獲到官孔竅供稱杜伏威令來福招引欲同往黃河盂門山逃難等情桑參將把二人下獄監候複選步兵一千五百委葉榮統領星夜追至黃河渡口助蔣太守剿賊蔣太守俞福接見設宴款待葉榮細問賊巢虛實蔣太守道賊首繆一麟連敗數陣身中三箭閉關不出賊巢將破近來添了一個賊將不知何處來的年方弱冠十分驍勇日昨交鋒被俞將軍逼落水中令軍士下水擒捉反被殺傷不意賊將在水底將我戰船扳翻盡皆落水險些兒身葬魚腹今幸將軍駕臨必有奇策葉榮道看他山寨不過一窪之地況賊首殺敗破之甚易雖有乳臭小寇何足慮哉附耳道只須如此如此賊巢指日可破蔣太守甚喜當下葉榮傳令本部軍士每一人要聲柴一束初更取齊進發此時衆軍打點齊備盡皆銜枚輕舟前進二更盡直抵黃河上岸逼近木柵數處堆起蘆柴一面放火燒柵一面擂鼓呐喊關內嘍囉急放弩箭炮石官軍愈加攻擊嘍囉飛報寨裏杜伏威知覺忙披挂綽槍上馬飛奔關前只見木柵四圍皆已燒著杜伏威棄槍披發仗劍口中念動真言霎時月色無光驟雨大降卻是杜伏威運黃河之水澆滅大火衆官軍淋得衣甲透濕無處藏身少頃雨住狂風大起刮得衆人立腳不定個個驚慌亂竄葉榮禁遏不住也放馬落荒而走後面喊聲大振大隊嘍囉點起火把簇擁杜伏威追出關來葉榮回頭看時追騎已近平欺杜伏威年幼不以爲意帶轉馬舞刀接戰杜伏威槍尖早到額前葉榮躲閃不及面中一槍倒撞馬下杜伏威割了首級驅嘍囉四下搜殺官兵四鼓盡收軍回寨獻捷繆一麟鼓掌大悅方信伏威英勇前言果不謬也有詩爲證不識孫吳妙徒知用火攻烈煙隨火滅詭計已成空當夜俞福引本部官軍駕數十隻大船渡河接應初時見火光競起倏然又雨降火熄少頃又見火光明亮喊聲不絕心下驚疑催軍急急搖船前進忽見水中逃命官兵爬上船來報說戰敗主將已被少年賊將所殺俞福大驚即駕舟轉回南岸與蔣太守備言其事合寨驚愕不敢逼近寨柵只將軍馬隔河遠遠圍困緩緩攻打再說朱儉其一行人在飯店裏候了數日衆好漢陸續來到同至僻靜處照會了朱檢查點人數共一百三十餘人正要覓船渡河只聽見金鼓喧天喊聲振地朱儉驚問店主人這喊戰金鼓之聲卻是何處店主道客官不知離我這鎮頭五七裏路即是永寧關口黃河之中有一強盜姓繆名一麟號公端身長九尺武藝過人聚集千餘嘍囉倚山傍河創一大寨打家劫舍攔截客商數年無人敢近今因劫了鹿阝州知州的官船知州一家盡被殺死本郡太守蔣爺發軍征剿這喊殺之聲又是兩下交戰了朱儉聽罷大驚心中暗想道正欲投奔繆公不期與官軍交戰怎生過去見得杜爺心內憂煎且分付衆人密密四散藏頓不可被人識破自卻離了飯店沿河打聽消息遠遠見官軍撐舟駕櫓紛紛攻寨朱儉只得在河岸盡頭楓樹下坐地想道怎的得到寨裏通一個資訊也好當日不歸飯店擠著命走到路口茅店裏沽幾壺酒吃了複到河邊探望看看天色將晚官軍撤圍四寨月色朦朧朱儉獨自一個在堤上走來走去躊櫥不決又不知到大寨有多少路程又無船隻不敢下河泳水悶昏昏的再到楓樹下坐了一會不覺酒湧上來一覺睡翻在草裏卻說山寨裏每夜撥兩隻快船差十個嘍囉輪班出來巡哨當夜悄悄寂寂把船搖近對河聽得岸上大樹下打鼾之聲諒來是官軍細作輕步上岸將朱儉綁了扛下小船飛也似搖過河來到山下吹一聲哨子伏路的嘍囉自來接應朱儉兀自在醉中未醒直待扛上岸來方覺臂膊疼痛問小嘍囉你們爲甚事綁我到此嘍囉道不須多說請你去山寨中見大王講話朱儉暗想這必是大寨裏巡風的了且不做聲任他扛上山來早有人報知寨裏杜伏威升帳叫押進細作來杜伏威看見原來不是細作恰是好漢朱儉慌忙喚樓鑼開綁引進後寨見繆公端朱儉將上項事細說一遍又道急切裏要到大寨通個消息卻沒門路天幸得接診綁來見杜爺杜伏威道我正要著人接你衆人不期官軍催戰無暇及此朱儉道適見官軍勢大將軍未可輕敵杜伏威道數日前曾和官軍對陣被我殺一大將砍死官兵無數但俞福等恃衆欺敵一時未肯退兵你衆人雖拚命欲來救應這一二百人做得甚事況且又無大將統領怎生廝殺我雖有法術水面上難以施行今有密書一封煩你星夜趕到河東廣寧縣石樓山下張太公莊上送與林澹然師太如此如彼盡在書中速去速來不可遲誤此是要緊軍機足下莫辭跋涉朱儉道將軍差遣生死不辭事不宜遲即此便往杜伏威寫了書取白銀五十兩差兩個嘍囉掉船送出河港朱儉從僻路上岸沿河闖出大路不分晝夜努力賓士不日已到廣寧縣界一路訪問端的尋到張太公莊上見個道人在莊前灌園朱儉聲喏要道人引見林師太一面道人領入莊裏相見了呈上杜伏威書銀林澹然著行童安頓了行囊陪朱儉酒飯次後拆書看時那書上寫道自別恩師煢煢負祖骸骨途中奇遇不一而足未暇悉陳抵岐陽幸遇先叔賴完葬事繼聞先叔失妾略施小技立使壁旋無如構訟不肖亦陷縲絏問官糊塗害叔自剄嬸母繼死痛哉痛哉雖奮力報仇雪憤敵退追兵而一路阻滯不能徑運石樓繆公端者曾於中途結盟彼獨霸黃河投之庶可自庇乃今又爲官軍所迫恐其玉碎不肖亦難瓦全伏惟恩師俯憐小子速遣薛弟出奇計來援則闔寨幸甚事切燃眉翹首而待匆匆不盡使者能詳只候萬安慧照不一薄具白金五十兩作供佛之費叱存是幸伏威百拜林澹然掩書歎道小小年紀才出門就惹出大事來招動干戈如何布擺當晚在後園內細觀星象見東北上將星朗朗分外光明心中暗想這星象分明應在三個小子身上須索救他才是次早叫薛舉近前問道男子生於天地還是樂守田園安分的好還是能文會武顯耀的好薛舉承問不慌不忙躬身說出這句心事來正是寧爲世上奇男子不作人間小丈夫畢竟薛舉如何答應且聽下回分解第二十七回計詐降薛舉破敵圖霸業伏威求賢詩曰自古兵機仗詐行多於詐處立奇勳鳳雛昔日欺曹賊薛舉當年救綴君義人延州施沛澤仁翔宜縣解災囗雲龍風虎英雄聚繼迹桃園霸業成話說薛舉因林住持問其志向回言道人生天地若圖安逸畏刀避劍豈是頂天立地的大丈夫自古男子生而桑弧蓬矢以射四方須要建功立業顯親揚名以流芳百世成個鬚眉男子林澹然點頭而笑取杜伏威書與薛舉看薛舉看畢道杜大哥一路磨折又被官兵圍困小子愚意必須急去救他才是同盟之義不知老爺尊意若何林澹然道俺心下也如此想只怕你年輕力薄武藝未精放心不下薛舉道某承老爺訓誨論武藝亦不在人之下弟兄有難焉可坐視不救雖有官軍百萬何足懼哉林澹然道杜伏威雖然被困精通法術斷不至傷身但今離亂之際君不君臣不臣冠裳倒置賞罰不明貪官污吏安享榮華孝子忠臣反遭屠戮蒼天厭亂必然否極泰生汝等學成文武應天順人取功名正在今日趁杜伏威遭圍你可如此如此以解其困乘機創業早寄捷音俺即著張善相來贊助你還有一句創業捷法圖霸秘經你須記取天地以好生爲德聖人雲不嗜殺人者能一之凡攻城掠地奏捷之日切不可屠戮生靈傷殘善類除暴救民以安四方此是收拾人心的大機括若徒恃血氣之勇殺人放火自取滅亡耳戒之戒之又有秘符一道與汝珍藏設遇急難握符掌中即刻可以遠遁汝年已長且身軀雄偉明早加冠然後起行薛舉頓首受教有詩爲證禪機高出帝王師不與兵家共守雌筐內秘文神鬼泣直教三俠義聲馳次早林澹然打疊行囊焚香點燭對佛祝告爲薛舉冠帶已畢薛舉先拜天地諸佛複身拜了林澹然苗知碩等急急收拾與朱儉動身取路往延州郡來數日間已到永甯關口朱份去各店中引衆好漢來見了薛舉暗暗知會秘計准備潔問時回答的言語件件停當然後帶了衆人都投蔣太守寨前來只見槍刀密密旗幟森森管寨門將士喝道兩軍對拒此是何處汝等亂走薛舉道在下要謁見太府蔣爺煩乞轉報那將士道蔣爺正在此征剿孟門山大盜用軍之際你有何急事要見老爺薛舉道小人正爲軍情而來聞知府太尊圍困繆一麟月餘不能破其巢穴特來投軍以助一臂之力那將士忙進中軍通報蔣太守分付令入寨來薛舉向前參見蔣太守看薛舉堂堂一表人材豐標灑落甚是歡喜卻又心中疑惑問道少年壯士何處人氏姓甚名誰習何武藝來此投軍薛舉道小人姓趙名起鳳本貫河南人氏自小習成十八般武藝箭可穿楊聞知老爺征剿黃河巨寇特聚四方壯士百余願投麾下爲前部先鋒征剿賊盜以圖功績出身蔣太守笑道看你年紀尚幼焉能破賊立功況從遠方而來未審虛實莫非是繆賊奸細到我這裏探虛實的麽薛舉正色道小人是河南安陽縣中丞禦史趙成璧之孫常德郡別駕趙燮之子往歲父親解糧至京從黃河經過被此賊一箭射死盡劫糧米此賊與小人不共戴天之仇恨不能啖其肉碎其屍瀝血以祭先靈今聞老爺興兵征剿小人盡散家貲招集四方壯士特投麾下誓擒此賊以報大仇不意老爺反生疑惑可憐一片赤心使人目爲賊黨冤屈無伸此仇怎報不如尋個自盡以表真心說罷號啕大哭拔劍自刎蔣太守慌忙跳下座來止住道我特戲言以試壯士耳何遂輕生卿果能殺賊立功必當保舉重用薛舉拭淚謝道某傾心赤膽而來與此賊誓不兩立老爺如肯任爲前鋒破此小寨如摧枯拉朽耳若不能生擒此賊必投黃河而死蔣太守大喜即用爲本府領軍校尉其餘同來壯士逐名收入軍冊有詩爲證成功不厭詐謀深俠骨伺曾畏鼎烹太守座前輕白刃試看舌劍屈人兵少頃俞福進寨參見看見薛舉在寨外點名上冊問蔣太守道壯士何來蔣太守將趙起鳳投軍之事說了俞福道雖然爲父報仇未審其中虛實小將願爲前鋒將此人統領本部壯士爲後軍救援庶無他變蔣太守道我看此少年甚是驍勇其情真切諒非虛假此正用人之際不必多疑正欲使彼爲先鋒以觀其才能耳將軍何須過慮俞福不言而退再說朱儉引