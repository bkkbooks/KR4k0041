衣襟哭道母親養孩兒辛苦未曾孝順一日怎忍一旦分離即欲修行在任亦可何必抛棄骨肉遠往山中教孩兒如何割捨放聲痛哭令狐氏道我兒不必悲傷我名登仙籙非凡女可比若再戀塵緣必遭大譴只望你此去爲官清正愛軍惜民不負林太爺教育之恩得意處急急回頭尚有相逢之日張善相見母親去志已決哭倒在地張找悲苦不勝張太公亦嗟籲感歎令狐氏全無悲感扶起張善相道我兒吾愛已割吾志已決不拂我修真之心便是孝順緣盡於此哭之何益張找執手難分張善相嚎啕欲絕林澹然功道既然緣絕不可抗違古雲能養親之志稱爲大孝須索順母親便了張善相如何肯放只見令狐氏從從容容拜了太公又拜了林澹然然後與張找作別這張大郎哭得眼昏張善相寸腸欲斷正在難解難分之際忽然不見了令狐氏張善相撞跌而哭張找苦痛自不必言張太公流淚不已林澹然勸慰說事已至此令狐氏去修仙道又非死別後會有期不必爲無益之悲且理正事再三相勸三人然後收淚後來張善相與杜伏威薛舉棄職修真雲遊天下到獨峰山與令狐氏重得相會那時張找先已在彼令狐氏傳張找張善相吐納修煉之法不知所終此是後話只見張找亦拜辭張太公林澹然要往城外澹然莊上修行不願隨任暇時兼可進城覺察憧仆督理田産張善相苦苦哀求道母親既去不能事奉豈可又離父親膝下曠定省之情張找道汝母倏然分離我心內已成灰矣汝既順母志亦當順我之心但小心侍奉太公就如孝我一般不必多言張善相無奈只得從父之志拜別了只奉張太公林澹然含淚上前取路投常平鎮段韶府來段太宰已差人迎候一同進府段太宰與林澹然張太公行禮小姐請張太公至後堂見禮畢前廳設宴款待其家憧虞候將士軍校各有賞賜林澹然坐了首席其次張太公段太宰下席相陪張雕張善相兩傍侍坐酒席間張善相說起父母修行不欲赴任之事淚流滿面又說起後園靈應大王馬騰托夢之異今日果完親事兼得顯位日前小婿曾許下心願得諧願望重造廟宇再塑神像今有白金千兩乞嶽丈收下買一空地蓋造廟堂以酬此願段韶道賢婿有此善念老夫自當完就功成之日可差人前來拈香善相領諾林澹然張太公一行人在段府又住了數日張善相拜辭要行段韶道本待再留數日奈朝廷欽限已迫只得相送張善相令繆一麟王騏常泰黃松帶領軍馬同林師爺先行次後家眷起程段韶夫人贈小姐妝奩極其富厚錦繡盈箱金珠滿斛隨從十余個家僮使女又有春香爲妾張太公欣喜拜謝親家段小姐拜辭父母不忍分離十分哽咽夫人與琳瑛小姐皆大哭衆親族再三勸慰小姐一一拜別含淚登車前呼後擁而去夫人與球瑛拭淚回房段韶乘轎同張雕送了一程各自分別回府不題且說張善相一行人到延安府添上軍馬取路往青州郡來郡縣大小文武官員俱遠遠出郭迎接張善相差官蓋造帥府招募勇士延攬英豪士民相慶有詩爲證藍田種玉配鸞儔帥府談兵升虎帳仁民愛物奏清寧蜀地馳名張善相杜伏威娶了舜華各自到任皆勵精圖治撫養黎民所在無不貼服再表張善相所守地方一處名爲巴的甸屬漢嘉郡管轄有一洞主名羅默伽自漢末諸葛孔明收伏孟獲之後封其祖烏蠻鎮守其地子孫世居於此山崖險阝厄十倍蜀道洞丁數萬皆務農耕內有山田足以自食性勇狡猾剛狠輕生出入往來皆佩刀劍這羅默伽生得身長一丈大眼紅須滿身血肉橫生青筋盤繞兩臂有千斤之力慣使一件兵器甚是稀奇名爲鐵蒺藜上陣常騎大象部下有十萬蠻僚極其勇悍四遠無人敢敵因此附近土苗酋長畏其威力盡皆賓服受其統制但此人好酒重色性剛好殺當下趁陽和天氣二月花朝羅默伽改換衣妝帶領心腹蠻丁取路往牂牁郡桃源洞尋芳玩景隨路發弩放彈射獵爲樂早行至洞前遠遠見駿馬之上坐著一個年少秀士後面一乘山轎跟隨數個撞仆迤邐而來漸漸相近羅默伽仔細偷覰見轎中是一美人姿容絕世豔麗驚人珠翠滿頭輕羅襯體羅默伽不覺眉昏目亂神魂飛蕩當晚欲奪此女爭奈遊人如蟻不好動手心下暗想且隨他進洞去飽看一回又作區處原來那馬上秀士不是村民俗子乃漢嘉郡武陽宦族姓阮名繪宇本素是有名的一個才子轎內美人便是他渾家尹氏因患怯症禱于瀘州穆清廟中得痊夫妻二人雇轎馬跟隨僕從到廟還願隨便到桃源洞遊玩阮繪至洞口正欲下馬見羅默伽隨後而來心中疑惑問傍人那長大醜漢是誰傍人答道這是巴的甸洞主羅默伽爺爺在此踏青阮繪聽了心下大驚久聞此賊是個勇悍酒色之徒可知道頻頻覰我轎中甚非美事即分付渾家不可下轎自複跨上雕鞍慌忙乘馬起轎奔西南而去羅默伽走入桃源洞中回頭望這群人等了一會不見進來複身出洞口轎馬俱不見了忙問洞口之人有那好管閒事的苗酋指著西南道這一行人從那裏去了羅默伽分付蠻丁飛步追去尾那轎夫在何處停上快來回報正是有緣千里能相會無緣對面不相逢畢竟這人追去遇著阮秀士否且聽下回分解第三十七回羅默伽肆凶受戮尹氏女盡節還魂詩曰蜂蝶無知恣浪遊偶途而色起戈矛顛狂妄想同鴛帳烈節捐生誓柏舟魄返泉壤彰大節軀戕鋒鏑愧風流古今善惡須當鑒一點狼心好自收話說羅默伽複進桃源洞中觀玩景致見怪石玲瓏奇峰壁立蒼松翠柏交加白鶴青鳥飛舞何殊閬苑不異武陵羅默伽賞心樂事徘徊眺望取過酒樽食囗席地而飲漸漸金烏西墜見那蠻丁走得汗流滿面飛來覆道秀士一行轎馬穿過碧雲峰南下至一客店中進去了羅默伽暗暗分付蠻丁如此而行按下不題再說阮繪夫妻二人進了客館喚家憧將轎擡入後邊藏了將馬牽入側屋喂料自與洋家進內小閣中坐這店主原是舊相識令妻子出來相陪茶湯已罷擺下酒肴店婆作別自進去了夫妻燈下飲酒尹氏道相公向來要和妾身桃源洞中尋芳玩景今用了盤費到此爲何不進洞一看慌慌張張趕到這裏卻是何故阮繪道娘子不知晌午洞前那個長大漢子頻頻窺覰你原來是巴的甸洞主羅默伽久聞這人凶勇強悍不循道理貪酒戀色肆惡橫行娘子進洞遊玩這廝無狀起來如何與他爭執只索避他便了尹氏道原來如此幸是早早避他不然怎了說罷收拾杯盤上床歇息將至二鼓忽聽得門外人聲喧嚷一片亮光尹氏夫妻二人穿衣起來開房門出看見十餘人手執槍刀一擁入來阮繪慌忙問進房跳窗越土牆而走那夥強人搶入房中將尹氏攙出門推上小車複身牽出那馬一個大漢騎上點著十數把硫黃火草簇擁而去這店主人合家男女客商盡驚惶躲避見強人去得遠了才敢出來店主人關了門扇將燈四下照看並不失一些物件單單不見了阮秀士夫妻二人家憧轎夫等慌張無措店主道強人打入門來我只道放火殺人劫擄財物誰知只搶了阮相公夫妻兩個去了這事怎處一個轎夫道适才我躲在櫃身內板縫裏張那強盜頭兒就是日間桃源洞口遊玩的巴的甸洞主想是看上了大娘子美貌故此強奪去了相公擒去只怕性命難保衆人團做一處猜疑不定天色黎明只聽得扣門聲急一齊出來開門卻是阮繪蓬頭跣足奔入店來衆人歡喜相問阮繪道我見強人勢頭來得兇惡即忙越牆而走藏在樹叢裏今將天曉方敢回來我大娘子不驚壞了麽衆人道大娘子被那巴的甸洞主搶去了阮繪聽罷魂飛天外大慟一聲昏倒在地衆人攙起急用茶湯灌下方得蘇醒哽咽半晌哭道我那娘子稟性貞堅決不被強人玷污但此一去必然玉碎焉肯瓦全可憐賢哲嬌妻死于強賊之手今生安能再得相會也說罷又哭店主夫婦勸慰道大娘子被奪去未知生死若何相公須索保重身體設一計策救取回來方是道理阮繪滴淚道老丈不知我那荊妻博通書史謹守婦道此去必無生理羅默伽這廝凶頑無比又不能與之爭理怎生取救不如死休與我那賢妻相會于九泉之下罷了說罷跌足而哭店主道相公差矣大丈夫頂天立地豈可爲一個娘子就這般輕生強徒肆惡誓當報仇雪恥方是男子若與令正同死有何益哉目今新任張爺鎮守青州漢嘉等處地方爲官清正青年英武部下有精兵數萬猛將千員相公何不往青州擊鼓鳴冤求張爺起兵征剿或者大娘子不死還有相見之日未可期也阮繪聽罷點頭拭淚謝了店主吃些酒飯令轎夫和家憧回家報信只帶一小廝取路往青州來到得帥府前天色已暮阮繪顧不得天晚跑入府裏擂動大鼓此時林澹然已往峨眉山去了張善相在後堂與王騏飲酒猛聽得鼓聲如沸慌忙冠帶升堂把門將士將阮繪帶入跪下張善相喝問汝是何人有甚緊急軍情擅擊禁鼓阮繪稟道儒士姓阮名繪本貫漢嘉武陽縣人氏父祖皆叨仕籍遂將還願往桃源洞遊玩遇巴的甸洞主搶去妻子尹氏之情哭訴一番張善相沈吟半晌問道據汝所言事系搶劫自有本處衙門何必來此纏擾莫非有仇誣捏若果情虛擅擊軍門禁鼓難逃三尺阮繪道儒士世習儒書頗知禮法焉敢誣陷害人況儒士家住武陽羅默伽世守巴的彼此遼絕有何仇隙叵耐那廝見儒士妻子顔色一時起意明火執杖黑夜生生的強搶去了府縣衙門奈何他不得除是老爺天恩發兵征剿方能除此大惡不惟儒士感戴一方黎庶皆沐洪恩若有半點虛情甘受責罰張善相令阮繪且退府外俟候連晚聚集將士商議此事衆官吏稟道這羅默伽從來肆惡淫毒無窮遠近人民盡遭其害色心最重若見婦人有些姿色不論宦族村民強擄進洞淫奸不服王化一味強梁誰敢與之爭理所以人人切齒阮生之事諒非虛謬張善相聽了怒髮衝冠瞋目拍案道世間有此巨惡若不剿除使百姓受其茶毒張生之罪也分付宣令官曉諭諸將明早五鼓率各部軍兵赴演武場聽點言畢退堂衆人散訖次日平明張善相人教場將士俱已聚集迎接入廳參見張善相傳下將令繆一麟爲先鋒常泰黃松爲左右護衛領馬軍三千步軍一萬即刻先行自爲中軍主帥王騏爲參謀蜀將四員葛攀龍賈格葉重鄭凝晴統馬步軍一萬五千次日起馬以爲後應軍馬陸續起行殺奔巴的甸來再說羅默伽當夜搶了尹氏回洞不勝欣喜分付洞丁設席和美人飲酒取樂尹氏一路就欲尋死奈蠻丁緊隨無隙可乘及進洞坐於側廳又有人圍護定了心內十分焦燥淚下如雨只見數十苗女名爲烏男姑向前道洞主爺爺請娘子赴席飲合歡酒結同心帶娘子若肯順從不愁不富貴也尹氏低頭不應只是悲啼那夥苗女互相喝采道看這位倭男枯哇雲鬟撩亂玉頸低垂越顯出風流態度怎地教爺爺不愛齊向前勸慰尹氏垂淚不言亦不動身烏男姑等只得進去了少傾羅默伽改換衣冠搖擺進廳裏來叫烏男姑移席到此待咱與美人對飲霎時酒席移來羅默伽親捧金壺斟蒲萄酒於犀杯之內雙手送過來笑吟吟道美人請此一杯合歡酒與咱成親尊汝爲正夫人一生富貴不盡尹氏正在悲憤之際舉手將杯一格潑了羅默伽一臉一身酒罵道我乃女中丈夫豈與禽獸爲偶任你鼎烹鋸解休得亂思胡想我那丈夫是有名才子一朝風雲際會把你這苗狗碎屍萬段原來洞蠻最怪罵的苗狗二字羅默伽大怒喝左右將這惡婦綁了烏男姑等用繩索將尹氏背剪綁了羅默伽取出佩刀向前尹氏並不畏怯伸頸受戮羅默伽心中雖怒見他如花似玉不忍下手收住寶刀笑道咱將你一刀砍死卻便宜你了叫烏男姑押去鎖禁在後邊幽室中待咱慢慢擺佈這廝衆烏男始將尹氏去了綁索攙扶至一空屋內反鎖門兒去了尹氏尋思此處無人正好自盡又見三四個烏男姑捧些茶湯酒撰開門進來見尹氏坐在地上啼哭烏男姑齊聲勸了一番將酒撰奉過來與他吃尹氏悲咽不理衆烏男姑使性子閉門去了看看天色晚來窗眼裏透進一點蟾光尹氏暗思此時無人纏擾不如早尋死路以報丈夫之恩全我一生貞潔稍若遲延這廝強來侵逼此身一玷雖死何及四下一看空蕩蕩並無一物只得將裙帶咬下和膝褲帶兒接做一條從窗檻上立著乘月光將帶子丟過橫穿木上打了一個結頭意欲將頭套人心下又思阮郎從娶我入門情同魚水未嘗片言相逆詎料半路相抛未得相依一語婆婆待我甚厚恩同母子今夜長往不能奉養暮年輾轉思量心如刀割淚似湧泉悲哭道節孝不能兩全望南拜了四拜將頭套入帶圍兩腳墜下霎時間氣塞痰迷一命歸陰杳然而逝可憐貞烈青年婦七魄悠悠入九泉次早羅默伽又差苗女烏男姑看視見尹氏懸於橫木之上驚得屁滾尿流奔回羅默伽臥房報知羅默伽大驚親自出來看果然玉碎香消美人懸梁而逝雙手抱住放下索來雖然氣絕面色如生羅默伽心中不舍追悔道可惜美貌佳人是咱性急一時將他逼死試解開他衣服來看但見酥胸如玉香氣襲人愈加可愛羅默伽不覺欲心難禁想欲與死屍雲雨一回了此姻緣不枉爲人半世發付衆烏男姑都出去待咱用摩臍過氣之法救此婦人衆苗女皆散羅默伽正欲解開尹氏下衣一霎時烏雲罩地黑氣迷天電光四起霹靂交加雷聲似擂鼓一般屋宇四圍旋繞振得地皮也動屋子也搖羅默伽驚慌連忙跪倒磕頭禱告雷神爺爺雷部將軍饒恕默伽則個以後改過決不敢非爲了俯伏在地只聞雷霆震擊轟轟之聲不絕自辰時直到午候方止依舊天晴羅默伽立起身來出了一身冷汗道慚愧即令備辦棺木將尹氏收殮葬于洞側高崗之上默伽被霹靂驚壞肝膽臥病在床數日後掙挫起來悶悶不樂心驚肉顫坐立不寧一日晚間有一黑犬端坐於前堂椅上蠻丁報入羅默伽令將黑犬殺了棄屍河內又一日夜半羅默伽與夫人睡在床上那床忽然不推自動將二人滾進滾出不止羅默伽大怒與夫人起來將床砍爲粉碎移出洞外燒了又一日黃昏月上正飲酒間窗外有人張望問時不應羅默伽推窗一看見一個人身長丈二白臉微須三只眼灼灼有光頭戴金冠身穿白袍手執方天戟立於檻前看覰羅默伽大怒掣寶劍奔出來劈頭砍去那長人將戟隔開回身就走羅默伽飛步緊追直趕出幾層房子到花園亭子上鑽入土中去了羅默伽將劍尖劃地爲記令人掘土掘出大銅鑼一面竹片一條默伽不解其意次日聚集大小將佐說此異事衆各議論不一有西賓王好善聞此數事私對默伽之子羅統芒道爾翁貪財好色殘忍不仁上天示警再不悔過喪亡無日矣羅統芒請問其故王好善道黑犬升座以畜代人臥床自動夫妻分散鑼者汝家之姓也竹片者蔑也分明羅滅二字甚爲不祥羅統芒慌了乞求解救之策王好善道善不積不足以致福惡不積不足以滅身汝翁積率已久惡貫滿盈天示誅滅無可逃也只有勸尊翁作速悔過庶幾能轉禍爲福師徒二人談論間不提防被一家撞竊聽這家憧名喚雞孤撥在館中伏侍爲人狡猾奸佞每被王好善責駡因此懷恨在心竊聽了此言就到羅默伽帳中搬嘴又道王師父勸公子藥死爺爺暗襲官職小人恐事發連坐不敢隱瞞羅默伽分付雞孤好生守看那廝待至夜靜差人殺此二賊雞孤以爲中計歡喜應諾而去看官爲人在世生死自有定數當時先生與公子命不該死卻遇了一個救星羅默伽與雞孤說話卻好苗女瓦刺的送茶來立在帳外聽得二人言語不敢進帳捧茶複身入去對夫人說爺爺聽信雞孤之言要殺公子與王師父夫人大驚欲令人通知又恐泄露慌忙寫字一紙藏在蒸餅內令瓦刺的送入書房對公子如此如此說好瓦刺的領命忙送點心到書房對公子說此是夫人親手所炊公子與師父自食莫賞他人羅統芒陪侍王好善吃餅只見餅內微露紙角隱隱有字羅統芒取出看時上寫道適雞孤在汝父前訴汝欲殺父襲職許多言語又說與王師父同謀汝父大怒夜深要殺汝師徒二人作速躲避勿得遲誤至囑至囑羅統芒看罷驚得目瞪口呆王好善笑道悖逆狂徒不思改過反欲害人我與你走爲上著當晚師徒二人將雞孤灌醉了鎖于側房急急收拾銀兩衣服乘夜而逃往烏門山躲避去了卻說羅默伽當夜差一僚丁賈孤來殺公子只見房門反鎖賈孤掇開進去不見先生公子遍處尋看只有雞孤睡在房內打鼾賈孤搖醒問他只睜著眼不能答應賈孤提了雞孤轉入帳中稟覆道王師父公子不知去向只見雞孤醉倒地上拿在此間羅默伽問雞孤公子與師父何在再三詰問雞孤張目只是不言羅默伽大怒拔出佩刀將雞孤揮爲兩段即差賈孤四下緝訪王好善與公子二人下落又出告示有人擒獲二人投獻者重賞正在煩惱之際伏路洞丁飛報張元帥起大軍殺奔前來羅默伽大驚號令部下將士謹守洞門卻說繆一麟常泰黃松率領軍士殺至巴的甸離洞三十裏可渡河邊紮下營寨次後張善相軍馬陸續皆到左右結成二寨次日張善相今先鋒繆一麟率部下軍渡河將洞圍住只聽得洞內嗚嗚畫角之聲隨後喊聲大起羅默伽領五百洞丁殺出洞來繆一麟將軍馬約退半裏布成陣勢繆一麟當先左有常泰右有黃松各持兵器立馬陣前只見對陣畫角齊鳴擁出一員蠻將正是羅默伽頭戴三尖帽赤著身遍體垂挂瓔珞下穿鐵葉戰裙虎皮靴腰懸弓箭斜挂寶刀手執一根鐵蒺藜騎著灰毛大象前後圍護數十個身長黑面苗將部下洞丁俱是光頭披發赤腳裸身之輩手執利器羅默伽風擁騎象而來常泰手揮巨斧躍馬正欲交鋒不期戰馬驚嘶跳躍幾乎將常泰掀下馬來黃松見了忙出陣助戰那馬也長嘶驚跳不肯向前二人只得帶轉馬頭而走羅默伽隨後大驅洞蠻追殺繆一麟遮攔不住軍士大亂當不得羅默伽大象壯健疾走如飛趕上來黃松正走被羅默伽一蒺藜打中馬膊那馬負疼跌倒黃松跳在地上雜於亂軍隊裏而逃官軍在後的盡被殺死中槍著箭者甚多直追出二十餘裏卻遇張善相軍到羅默伽收兵回洞去了張善相接應繆一麟軍馬渡河回寨備問戰敗之由繆一麟道從來征戰未曾見此等異類那洞主生得醜惡無比騎著大象其行如飛正對陣常將軍出馬無奈馬驚不肯向前因此未曾交鋒即便敗走兼蠻兵精勇刀劍甚利難與對敵黃將軍幾乎喪命張善相道我自蒞任已來即知洞主勇悍肆惡蠻兵精銳善戰然而一勇之夫不知孫吳玄妙明日破之如擒犬彘耳傳令次日五更造飯平明進兵次早張善相令繆一麟常泰黃松三將領精兵一萬各帶火銃火箭火炮一應火器以沖前鋒若羅默伽騎象出陣即放諸樣火器象必驚走待他陣腳移動向前衝殺必獲全勝就乘勢攻進洞口我這裏隨後接應繆一麟稟道蠻僚勇鷙敢死惡戰恐火器不足以勝之張善相笑道公端何怯也常將軍率火軍三千在前繆公端與黃將軍率步軍七千繼後一半持長槍一半執短刀十人相間爲一隊連結而進長槍刺其上短刀砍其下焉有不勝之理繆一麟大喜即時起兵殺過河來逼近洞口鼓噪引戰羅默伽騎象擁衆而出兩下呐喊羅默伽奮勇當先忽聽得對陣連聲炮響火箭火槍如雨點般射將過來火銑火炮一齊發作那大象著了驚回身就走羅默伽腦中一箭翻身滾落塵埃被亂軍砍死蠻兵見主將被殺俱奮怒拚死殺過陣前官軍不能當抵退步且戰且走正趕殺間繆一麟黃松大軍擁至長槍大刀竭力向前這一陣殺得蠻兵屍骸滿地血肉成山隨後張善相軍馬又到合兵一處將巴的甸洞門圍住連夜攻打卻說逃得性命的洞蠻奔回洞中見夫人報說洞主被殺蠻兵大敗夫人大哭慌聚苗將商議衆皆說洞主貪暴不仁自取其禍如今官兵勢大難敵不如早降庶保性命夫人聽從豎起降旗親自綁縛出洞拜降張善相率請將入洞堂上坐了喚集近甸百姓細問洞中之事百姓稟道羅默伽貪財好色殘暴不仁百姓皆受其害今蒙誅戮村民得以安生部下還有一夥助惡凶徒烏蒙車等求爺爺一併誅之以除大害夫人最賢屢諫其夫不從公子羅統芒仁慈厚重秉性純雅乞爺爺宥之張善相聽畢令人解去夫人綁縛問羅統芒何在夫人道兒子因諫父父反欲殺之與師長王好善一同逃竄不知去向張善相問阮秀士渾家尹氏搶來今在何處夫人道尹氏遭妾夫所逼誓死不從自縊而亡葬於洞側崗上阮繪聽得妻子已死號啕痛哭張善相也覺傷感勸慰阮繪阮繪哭道感老爺天恩發兵剿賊今巨惡授首亡妻之冤已泄儒士欲見屍一面乞老爺矜憐張善相道汝妻落土將及一月屍已腐爛看之何益我代汝將此情申奏朝廷請旨建造貞烈祠受享血食以彰其節汝心下何如阮繪叩頭道若得如此亡妻之靈感恩於九泉之下但儒士一心要開棺見妻一面雖死無恨張善相見阮繪情切堪憐令軍士掘土開棺但使一見即掩軍士同阮繪去了張善相發放羅夫人回內收捕惡党三十餘人盡斬於洞口這阮秀士隨著洞丁同到尹氏墳上阮繪一見土堆哭暈於地軍士救醒掘開墳土拭淨棺蓋輕輕用鐵鍬撬開阮繪近前看時尹氏身屍不爛面色如生阮繪抱住屍首大慟將手撫摸其額微溫不冷阮繪大訝與衆軍士商議道亡妻尚微有暖氣何也衆軍士道想是土中氣旺故這般暖如今掘開泄他的氣了反爲不美阮繪心中不舍癡心望想又將右手輕輕弄其鼻邊只覺鼻中有一絲之氣自內而出心下駭然令一個軍士報知張善相張善相道死而復生世或有此事只是已一月了即親自上馬率諸將同來看視阮繪備說額上微溫鼻中有氣實爲異事張善相道汝妻貞烈完天地之正氣鬼神呵護或可回生吾聞林太師有言人屍不冷者親人擁抱同臥以口相哺授其元氣將還魂丹置口中以湯下之則可複生君試爲之萬一天鑒節婦重生未可知也阮繪領命張善相一行人自回阮繪借了民間空屋鋪設床帳遍熏蘭麝將尹氏屍首放於床上阮繪對面摟抱以口對口微微呼吸接引其氣許久尹氏忽然歎出一口氣來又一聞咽中有聲自上而下漸覺星眼半開玉脘微動阮繪不勝大喜阮繪輕輕詢問不能回答阮繪心下憂疑忽報張爺差人送丹藥至軍士道老爺分付將此藥用神妙湯調化灌之娘子若能受藥則回生了阮繪致謝忙煎湯調藥初用一匙送入口中慢慢的流下咽喉次後扶起身來緩緩灌下一會兒氣轉神舒便能說話將阮繪看了一回悲傷哽咽起來帶淚道妾與官人相見莫非是夢裏麽阮繪扶著娘子細細將張都爺發兵殺羅默伽開棺救醒之事說與他聽尹氏聽了扯住阮繪道我與你真是兩世重逢也阮繪又道娘子死去見甚神鬼安身何處焉能身熱而氣還尹氏道妾初死並無所見但昏昏沈沈如夢裏一般恍惚見一青衣童子口稱山神所差來救濟我與我一粒丹藥其味甚甘服之不饑得以再生皆張爺之德也阮繪道張爺德同天地恩若丘山細思無以爲報誰建祠塑像晨昏拜祝求其長命富貴福祿康寧子孫昌盛便了阮繪挽居民婦女伏侍湯藥自卻飛走到張善相營中拜謝此時張善相差人緝訪羅統芒消息土民報知在烏門山中著人喚來王好善羅統芒參拜已畢羅統芒叩頭請罪張善相道汝父積惡強奪阮秀士之妻活活逼死故起兵前來討罪本當族滅百姓說汝仁厚有德能規父失今使汝襲父之職以鎮此上昔日大禹之父綜治水無功舜殛之於羽山舉禹使續父績禹傷父之功不成而受誅勞心焦思居外十三年三過其門而不人由是水害皆息地平天成百姓安居玄功不朽願汝效之羅統芒稽首受教張善相又賜王好善冠帶職任參謀輔佐公子王好善拜謝羅統芒即襲職參拜了殺牛宰馬大排筵席款待張善相正飲酒間報阮秀士來拜謝張爺張善相喚入問其備細阮繪頓首說遵老爺接氣之法妻子漸漸醒轉又蒙老爺丹藥今已能言進得飲食特來叩謝張善相大喜令羅統芒王好善下席相見命阮繪坐于末席當日盡歡大小將土俱有賞賜話不絮煩次早張善相號令軍士班師回郡羅統芒饋送金帛珠王寶玩蜀錦等物同王參謀率領部屬人員直送出石駝關來張善相發放回去羅統芒雙膝跪下稟道卑職萬死不知進退有一事稟上伏乞海涵張善相問有何事講羅統芒流淚說出這件事來正是在世未歸三尺土爲人誰保百年身不知羅統芒說甚麽事來且聽下回分解第三十八回土地爭位動陰兵孽虎改邪皈釋教詩曰靈台方正可生蓮壘積陰功位上仙解脫便能超萬劫貪嗔端的墮深淵施仁下役歆民祀戀色山君返善緣苦海茫茫無盡處回頭即是大羅天話說羅統芒稟道先君肆毒害民已蒙都爺正法但屍骸暴棄荒野卑職心中不忍懇乞天恩得賜歸土萬代恩德張善相慘然道予幾忘了葬父人子之至情今賜爾父冠帶殮葬以盡爾心羅統芒叩謝而去張善相車馬行不數裏又見阮繪在前途跪送張善相令人扶起分付好生調理妻室速宜回家不可久淹於此阮繪領命拜辭不說張善相回郡再說阮繪複至寓所對尹氏說張爺分付早回之言尹氏道妾身雖狼狽幸飲食可進勉強支撐及早回家似免孀姑懸念阮繪即雇了一輛車兒一匹騾子謝了店主帶了小廝回武陽縣來一到家內老幼盡出相迎抱頭痛哭尹氏將盡節復活之情訴說一遍無不傷感次後親鄰族友俱來探望個個稱羨尹氏之節張善相之恩阮繪擇地伐木建一座大祠妝塑張善相全身備牲牢祭獻夫妻二人鎮日點燭焚香祈禱張爺位至三台壽登百歲不在話下且說張善相一行人馬回青州郡大小官員出廓迎接入府設筵慶賀筵間備言前事盡皆感歎張善相具表申奏朝廷又作書達知林澹然杜伏威薛舉三處西蜀百姓人人稱頌張善相的好處於是威名揚四海政績著千年話分兩頭再說杜伏威自娶了舜華帶惠氏蒞任楚州時亢旱已久從秋至春並無點雨禾稻枯焦草木黃落井幹見底溪澗斷流萬姓惶惶皆赴帥府呈告旱荒懇求賑濟杜伏威與衆官道自我蒞任適當此時如何賑濟得許多貧民只見報說安化侯張爺有書杜伏威喚入來人將書呈上杜伏威拆開看時書雲自別台顔倏爾逾月弟所轄巴的甸土官羅默伽橫行肆虐黎庶受殃偶于路次窺見阮秀士之室尹氏姿色強奪逼奸其婦自到而死弟起兵剿之托兄覆庇巨惡授首碎屍馬足之下遐邇稱快其子統芒頗賢弟立爲巴的洞主不意尹氏死後一月服林太師所賜丹藥複生重偕伉儷此亦千古異聞專人奉達餘俟面悉屏弟張善相再拜杜伏威看罷將書與衆官看了俱各稱賀杜伏威道張爺至任即能剿賊立功代民除害甚爲可喜我命蹇德薄遭此大旱使黎庶無賴何以處之查訥道主公初任楚州倉廒不足稅賦甚輕若欲賑濟難以遍及主公何不禱之於神求一場甘霖以活禾苗若得田稻成熟勝於賑濟百倍杜伏威然其言即命查訥領一千軍出西門外縉雲山下築壇求雨不數日壇場已完器用俱備杜伏威和大小官員盡皆齋戒三日上壇此時上自縉紳下及士庶都出城觀看求雨一齊到壇看時果然嚴整潔靜但見壇高一丈八尺上容千人橫闊數百余步階分三級正中央供奉風雲雷雨之神四周圍擺列龍鱷鯨鯢之像寶鼎香焚檀速金瓶滿貯清泉旗分五彩青紅白黑間真黃路設八門南北東西兼四極執香玉女著青衣捧劍金童穿皂服耳畔不聞人笑語壇前誰有鶴翩躍杜伏威披發跣足身穿皂袍腰系麻綜手執柳枝步至壇上次後查訥將軍士各分班次陸續上壇依方位站立軍士二十四人身著青衣足穿青履手執青旗立於東方二十四人著紅衣穿朱履執紅旗立於南方二十四人白衣白履執白旗立於西方二十四人黑衣黑履執黑旗立於北方二十四人黃衣黃履執黃旗立於中央各布方位已定只聽得權杖三響杜伏威執劍步罡撚訣念咒燒符噴水以劍尖指著風神念念有詞猛可地一陣風起拔木揚塵壇上燈燭暗而複明又一陣大風來得利害將壇中黃衣軍士盡皆刮落壇下卻將西方白衣軍士捲入中央衆人看了驚駭黃衣軍士又不跌傷但只口呆目瞪似睡魔時一般少頃杜伏威又將劍尖指著雲霄二神念動咒語霎時烏雲蔽合電光四起霹靂震天杜伏威然後將劍尖指著雨神敲動今牌燒符三道牌聲未畢霖雨大降倒甕傾盆壇下官民人等不惜衣裳跪於泥濘之中頂禮天神壇上杜伏威頂著權杖兩目直視西北自午至申足有數尺之水方才回神放下權杖漸聽得輕雷隱隱雲開而止依舊太陽出現衆官請杜伏威下壇束發漱洗冠帶已畢簇擁上轎進城一路上百姓稱揚大德歡聲不絕杜伏威一行人到府整酒相慶衆官問道大人作法時爲何將黃衣軍士推落台下又將白衣軍士移人壇中此是何意杜伏威道此乃生克之義也非我所使乃神力使然五行之理黃屬土白屬金黑屬水适才我燒符請神水星已至壇被土星所掩不能施行故請東方甲乙之神克伐中央之土拂勾陳於壇下運太白於壇中太白者金也金能生水故水星得以展布大雨遂滂淪而降此是五行相克相生之道也衆官悅服自此遍處田禾盡皆豐熟遠近百姓仰杜爺求雨之功再生之德家家感戴戶戶漚歌這消息傳入青州張善相差人報知林師爺原來林澹然自從同張善相上任之後即往峨眉山尋幽覓勝見連同疊嶂複澗重崖峰巒聳秀高入雲表長松夾道古樹參天兔鹿交行猿猱舒嘯其中洞天福地美景奇觀不能盡述遠觀山頂突起三峰其二峰對峙宛若峨眉故以名焉林澹然手扶竹杖足踏芒鞋後隨一仆援夢躡蹬窮岩盡穀遍處遊覽信步來到中峰之上只見有平地數十畝寬敞可居東傍溪流西連石洞背倚高崗前臨幽壑丹楓修竹青翠鬱然林澹然坐于石上徘徊顧盼甚爲得意坐了一會依舊下山回郡對張善相說此地可以結庵張善相欲興工大造林澹然不允只於中峰平地結成草庵三間中爲客座左爲靜室右作丹房留一仆名爲樵雲以供炊囗灑掃自此林澹然只在庵中靜養足迹不下山者數月自得靜中之趣道念日堅精神倍固前聞張善相征剿羅默伽有功次又聞杜伏威求雨救濟萬民心下暗喜道二子一能代天討罪一能興利濟民不負俺平日教誨之功一夕時值深秋林澹然見窗外月色信明如同白日扶杖出草庵立于修竹間仰觀皓月俯聽溪流清風徐來長空鶴唳覺神清氣爽非複人間世正觀想間忽聽得東北角上喊聲大舉似乎廝殺之意林澹然心下疑道此山連亙千裏又非城廓去處何故有此殺聲靜聽良久喊聲不絕只見陰雲四合月色漸晦林澹然回庵就寢次日夜間正人定靜坐聽得東北角上喊聲又起直交夜半方息數夜如此不知何故林澹然喚樵雲你往東北山徑一路尋訪看有甚蹤迹樵雲領命取路往東北而行攀藤附葛走了二十餘裏見嶺下一座廟宇不甚高大近前看乃是本山土穀神祠樵雲走得力倦人廟席地而坐一個道人從內捧出三牲祭禮擺列神桌之上點燭焚香道人跪下禱視道弟子廟祝名號自愚仰托神靈飽食安居不期近日夢一白須自稱新任土地向爺奉上帝旨來此山隅代老爺職管萬民居老爺應得托生陽區交代而去不必躊躕爲甚不忿戰爭無虛使我弟子日夜恐懼特備三牲豬首鵝魚水酒一壺伏望鑒諸享我微忱早駕雲衢讓向爺來兩下無虞祝罷禮拜化紙樵雲一一聽得明白抽身回庵對林澹然備說其事林澹然訝道如何有此奇事待俺親至廟中看是何等邪神爭鬥即扶筇步到廟中道人見了慌忙磕頭迎接進內坐下獻茶林澹然細問其情道人說數日前夢一老者鬚髮皓白衣冠濟楚乘馬而來後隨人役口稱姓向奉玉帝旨敕爲本山土穀之神前來交代小道覺來不信此事只見從此後一連五七夜廟前喊殺直至五更方散攪得小道不曾合眼林澹然道今夜俺在此過夜看是何神敢來廝鬥汝且回避道人辦齋款待看看夜靜林澹然仗劍坐於廟前傾刻間陰風驟起遠遠燈光閃爍白馬之上坐著一人數十鬼卒手執器械呼喝而來漸至廟前林澹然按劍大喝道汝是何處妖邪假稱天旨來此強奪正神之位馬上那人大怒驟馬向前見了林澹然即忙退避霎時人馬皆散寂無蹤迹林澹然進廟叫出道人說其緣故道人道新土地被太爺神威所懾不敢近前只得散兵去了林澹然道似此行徑不像妖魅所爲敢來代任必有來歷鬼神之事理實有之當夜就宿於本廟仿佛中見一人襆頭象簡角帶青袍向前施禮稱謝林澹然答禮道足下素未相識何故謝我願聞姓氏那人道小人非別本廟土地是也因與新任妖神相戰數夜未分勝負今得太爺所逐小神特來拜謝林澹然未及回答又見殿側走出一人青衣小帽皓鬢蒼髯向前跪下林澹然慌忙扶起道足下何人休行此禮細看來卻像曾有一面之識那人道小神乃向上是也昔日跟隨太爺在萬善鎮飯店分別太爺如何忘了林澹然方才認得是老蒼頭向上大喜道當日俺與你入梁之時分囊相別數十餘年並無音耗每每挂念汝今何故在此向上道小神昔日得太爺所賜金銀往洛川鞏縣村間買良田住宅耕種爲生每歲所獲利益頗爲豐裕除衣食外余銀穀帛盡數賑濟貧乏砌路修橋將三十年所施財穀數千今夏無疾而終上帝道小神正直無私敕封爲峨眉山土穀之神奉旨前來代任不期舊神抗拒不讓擁兵出戰小神不得不與之爭昨晚太爺在此欲上前稟知被太爺神威沖散誰是誰非乞太爺作主林澹然合掌道南無釋迦牟尼佛人有善願天必從之得汝爲正神不枉山僧一念即喚二土地近前對舊土地道此向上者是俺昔日從事之人上帝敕旨代汝之任非妖妄也汝若抗違必遭天譴速宜辭位不然即是貪位冒祿之鄙夫何以爲正神乎舊土地低頭不敢再言唯唯連聲而退新土地向上拜謝就位林澹然忽然驚覺似夢非夢暗暗稱奇次早道人來送茶湯林澹然細說其事道人驚異讚歎林澹然回庵寫書差道人往青州報知張善相張善相看了來意差官督工修蓋廟宇又差巧匠妝塑新土地向上神像一月之間工程完就林澹然親往廟中觀看匠人貼金彩畫已畢一個匠頭磕頭求賞道土地神像塑完今開光明求太爺賞賜林澹然看這匠人好生面熟聽其聲音十分舊識想了一會想得起來拍掌道你原來在此那匠人擡頭看了林澹然半晌也笑道爲何住持爺也在此間看官你道是誰自古無巧不成話這匠作頭兒不是別人乃金陵妙相寺中鍾守淨的行童來真昔日因鍾和尚在梁武帝駕前暗進讒言欲害林澹然卻虧這來真暗通消息得脫大禍後來被鍾守淨淩辱不過只得逃走還俗數年後報父之仇持刀殺入入縣自首縣官依律擬絞遇梁太子即位改元大赦減一等發配西蜀充軍因無生理習了這一行技藝奉官差遣土地廟中裝塑神像湊巧得與林澹然相遇兩下俱大喜乃邀入側房細談往事來真將日前曆過苦楚備細陳說林澹然亦以經過之事說與來真感歎不已來真道小人雖以手藝度日出家一念寢食不忘今得與太爺相會亦出意外望太爺與小人祝發以了終身之事林澹然道汝願出家前念不忘甚爲可喜擇日爲汝披剃在俺庵中過活便了來真磕頭謝了開了土地光明道人整頓牲禮祭賽並辦齋款待林澹然已畢打發匠人散了林澹然和來真同回庵中擇日替來真誦經落發法名印月與樵雲互相伏侍林澹然一面習學經典講談釋理朝暮依依漸識玄理宛然一物外僧也自印月入庵已來又早小春天氣林澹然吃罷午齋閉戶打坐入定之際見一老嫗身穿縞素與一個年少美婦身著青衣闖入庵中雙膝跪下叩頭求救林澹然喝道俺這裏是清靜法門閒人不得輕入汝二女人何由至此快快出去那年少女人匐匍向前滴淚道妾身黎氏小名賽玉因貪淫敗德觸犯三寶被丈夫沈全殺死一靈墮落已歸言道今日合有大難望林太爺救拔林澹然合掌道阿彌陀佛此皆汝一念之差致有今日之苦又問那老嫗是誰黎賽玉道這就是利口拔舌做牽頭的趙蜜嘴陽受一刀之慘陰罰六畜之報今日也有大難故同來求救林澹然又歎息道汝欲陷人而反自陷不過圖一時口腹之欲耳佯名佛頭暗裏騙人財物誘人淫欲非畜類而何今日受此陰報不差既有大難俺以慈悲爲主焉忍不救汝二人可避於庵後有難來爲汝解之二女人磕頭而起猛聽呀的一聲庵門開處一個和尚身披五彩袈裟手執利劍踴躍直入大喊道二淫婦何在若不殺汝誓不再生林澹然仔細看時卻是正住持鍾守淨林澹然迎住道師兄久不相會何故要殺二人此二人是師兄最喜者出家人戒殺爲先仗劍逐人非釋門之所爲也鍾守淨收了劍與林澹然稽首坐下躬身道貧僧不才有負吾兄大德向來謹守淨戒毫無所失師兄之所知也叵耐趙蜜嘴老狗誘人犯法騙我錢財設計定謀誘黎賽玉成奸承師兄對月諷言匡正彼時弟有悔過之心複被黎氏這淫婦蜜語相牽令我暗中譭謗逐兄出寺致我死於非命輾轉思量深爲可恨今欲刃之以泄大忿林澹然道噫兄言誤矣豈不聞不貪美色者閉戶不納秉燭待旦上人視色如蛇蠍智士視色如仇敵語雲水蕩舟行風揚幡動人若內有主持外欲何緣得人昔日趙婆設計黎氏姦淫由師兄一念之差彼方投隙而入兄不自責而責他人非悔過遷善之道也比如兄欲殺彼彼又欲殺兄冤冤相報何爲了期兄但存一念之正則道可進冤愆可滅何爲又動殺機鍾守淨低首無言長揖而別林澹然醒來對印月樵雲說知印月道太爺心有所思故見此境界林澹然道久不念及于彼何思之有但二女人說今日有難求俺救之不知何意汝二人不可出庵看今日有何事故師徒站在庵前閒談又早日色衡山忽然狂風驟起撼木揚砂風過處一隻白犬一個黑豬遠遠從嶺上跑將下來一直奔至庵前不知從何而至林澹然早已省悟即忙讓開放二物奔入庵裏去了只見又一陣腥風刮面大吼一聲振得山崗也動一隻斑斕猛虎咆哮而來聲如霹靂眼似明燈從嶺上直跳下山坡徑奔庵前林澹然忙取寶劍當門而立大喝畜生慢來有吾在此那猛虎剪尾刨蹄正欲向前撲人見了林澹然逡巡畏縮雄威頓挫低頭屈足蹲於地上林澹然收住寶劍笑道老鍾老鍾汝忘昔日之事乎但知戀色貪財不顧禪宗戒律生前害物死後戕人生死裏殊造孽則一今不思回頭歸正到此地位尚欲恃勇傷生汝恨此二人壞汝性命便欲報復獨不念滿寺僧人焦頭爛額中劍著刀死於非命爲著何人是何辜乎可憐可憐談及於此汝亦當恍然悟矣俺禪定時曾勸汝及早回頭秉教迦持一點靈光復歸大道不然失迷真性萬劫沈淪人身不可複得苦哉痛哉汝若肯聽吾言皈依三寶可盡釋往日冤愆以求再生之福放下一片雄心不失本來面目即當俯首屈足諦聽吾教那虎兩眼流淚雙足跪下低頭受教林澹然又道汝沈迷已久非朝夕提醒不能登于覺路俺庵側有一石洞幽僻可居汝當棲身於此聽俺講經說法漸歸正道但不可妄害生靈若傷一蟻之命必斬汝首終墮阿鼻難以超生汝若果有善願可三點其首那虎將頭點了三點擺尾伸腰似有喜狀林澹然將劍指著西首道離此數十步即是石洞乃汝安身之所天色已暮汝可速去那虎在庵前盤旋一會即往洞中去了印月樵雲驚道太爺與虎說了半日話使我二人擔著血海於系果然畜通人性低頭垂淚似有悔過之意古人雲道高龍虎伏今日方見太爺伏虎之能也林澹然笑道鍾守淨雖犯色戒頗有夙緣好行小惠亦是他的善根不斷雖墮畜道一點靈光未泯聞俺言亦能省悟此所謂一切衆生皆具佛性非降龍伏虎也印月樵雲稽首信受方悟性無不善之理林澹然進庵呼出一犬一豬令其回家二畜蹲踞於地不肯行動再三呵叱反鑽入禪床之下躲了林澹然笑道汝既知畏死何不早修即將二物留於庵內次日林澹然坐于竹林石上宣揚佛法開講涅磐印月樵雲侍立左右那白犬黑豬低頭聽講少頃只見那虎昂頭掉尾緩步而來走入林中向林澹然點頭三下似乎稽首之意即立於側首聽談禪理豬犬驚惶無措閃在林澹然座後直至講畢豬犬隨林澹然回庵大虎複歸石洞林澹然令樵雲至青州見張善相取飼虎領給每日豕肉一肩朔望則賜羊一囗自此後凡逢談經說法之日虎不食肉一虎一犬一豬相隨聽講初時豬犬見虎慌張躲避次後漸漸馴熟或並立顧盼或同行山麓間不復畏憚矣林澹然呼虎爲老鍾白犬爲老蜜黑豬爲小賽一呼其名馳驟而至山下居民互相傳說中峰有一長老每日講經一虎一豬一犬相隨並不侵犯遠近聞名皆說林大師是一個得道神僧故能降龍伏虎又有好事的都上山拜見活佛就求老虎一看果然虎見人低頭伏氣不敢轉動人人稱異個個道奇上山來看的人絡繹不絕卻說峨眉山下有一富翁姓趙名自宏業販生藥家道饒裕中年娶妾得孕臨産之夜夢一老僧雙手捧日立於床前其妾大驚而覺産下一子生得額高耳大面闊口方趙自宏大喜彌月後因夢取名叫昱兒漸漸長成至八歲見葷即吐啞不能言未嘗一笑不好戲耍時常面壁而坐趙自宏每每歎息道中年得子又是殘疾無用之人心下不樂聞得山頂有此伏虎聖僧竭誠齋戒令家憧抱了昱兒一同上山來見林澹然禮畢備道其事林澹然閉目定息半晌回神將右手摩昱兒之頂說偈道永清永清久陷幽冥倩吾償貸方轉法輪托生西蜀依舊光明不言不笑有何不平昱兒便開口答道今見吾師靈光返照割去愁城複能言笑說罷相視大笑趙自宏驚駭問故林澹然道天機不可泄漏難對君言日後自知也趙自宏不敢再問拜謝林太爺領了昱兒下山回家對妻妾備道始末一家歡喜擇日請師訓讀昱兒即名爲趙昱開蒙之後甚能讀書一目十行下筆成文年至十六舉孝廉每得暇就上山和林澹然講談玄理林澹然傳以水遁劍術後於隋煬帝大業三年授爲嘉州府太守時犍爲縣大潭中有一老蛟作虐害民興風播浪淹沒田禾或變人形誘民沈溺趙昱仗劍入潭與老蛟大戰一晝夜斬卻老蛟潭水盡赤百姓皆感其德數年後棄官修道後嘉陵水漲蜀人見昱於雲霧中騎白馬而下宋太宗敕封神勇大將軍此是永清長老轉世得道的後事表過不題再說林澹然見遠近士民拜訪者接踵心下甚是厭惡長歎道本欲求靜而反得擾豈非沽名釣譽之態乎暗令張善相挂榜文於山下禁止居民不許上山混擾犯者重究自此士民不敢上山林澹然方得一靜再說薛舉至南安郡添軍九千進發至信州所屬官吏遠遠迎接進城到任諸事皆畢薛舉體訪民情土俗頒號令約束軍民人等差心腹將土巡按州縣拿問貪官污吏訪察巨惡積奸只見探馬名爲夜不收來報爺所轄地方有上官猛姓者所生一女名爲姩蜚仙美貌絕倫英雄無敵領土兵數千橫行州縣已佔據了新寧建始栗鄉梁山通州五縣勢甚猖獗無人敢敵目今太平縣被圍乞爺爺早調兵救援薛舉聽了即差曹汝豐皇甫實領鐵騎三千征剿二將得令選軍出師星夜到太平縣來一路見百姓慌慌逃竄曹汝豐問汝百姓爲何如此慌張百姓口言被猛家姩蜚仙率兵殺至勢不可當只得棄家逃竄避他鋒刃言未已見塵頭起處姩蜚仙兵馬已到兩陣對圓曹汝豐與皇甫實並馬觀看對陣兩面百花旗開處擁出一員女將結束得十分標致但見眼如秋水眉似春山桃花臉撒幾絡青絲櫻珠口含兩行皓齒頭戴束發金箍後垂貝八貝手執方天畫戟上挂豹幡犀皮甲軟襯繹紅袍獅蠻帶緊籠繡裹肚背插飛刀兩口腰懸短箭一壺雙鳳靴斜挑金蹬朱文鏡半掩芳心弓袋中插一面小小杏黃旗雕鞍下跨一匹囗囗追風馬楊柳腰藏紅套索鴛鴦勒響玉鸞鈎曹汝豐看了誇獎不盡正欲回馬只見那女將手挺畫戟衝殺過來身邊緊護有三百女兵俱是蓬頭赤腳黃發黑面之輩後隨三千蠻兵一湧殺至曹汝豐急輪大刀抵住皇甫實挺鞭助戰兩邊混殺那女將猛然飛起一把刀來徑取曹汝豐曹汝豐眼疾側身躲過又飛起一把刀奔皇甫實頂上落下皇甫實急躲早削去盔頂鬥來大一顆朱纓皇甫實吃了一驚撥馬便走怎當得蜚仙的馬是千里龍駒飛馬趕上手裏紅綿套索上有七十二金鈎望空一撒將皇甫實套住拖下馬來蠻兵活捉囚送土官去了曹汝豐大敗折兵一半回見薛舉說女將猛勇難敵失了皇甫實薛舉大怒點起精兵五千令王驤鎮守信州自同曹汝豐領兵至太平縣見隔河一簇人馬往來如飛兩面百花旗招展飄搖曹汝豐指道那繡旗下的就是女將姩蜚仙薛舉聽了把馬一拍飛身跳過大河喝道何處潑婦敢如此橫行那女將以戟架住戟道吾乃洞主之女囗蜚仙是也平生慣使畫戟無人敢敵不知斷送了多少英雄有誓在先三合之中能敵得我畫戟者方與成親汝今亦使畫戟恐敵不過時頃刻即爲無名之鬼可通名來薛舉道女流賤婢誰與你通名挺戟便刺蜚仙躍馬迎敵戟對戟這一場好殺若舞神蛟如飄瑞雪戰八十合不分勝負蜚仙用計早擲起一把飛刀薛舉用戟撥了不能近身蜚仙見挪不著又飛起一把刀來薛舉用手接住回擲蜚仙蜚仙蹬裏藏身躲過急解下紅綿套索向空撒起薛舉馬已到身正待活捉不期那套索落下來將薛舉與蜚仙一齊套住你我牽扯團成一塊當不得薛舉力大將索扯斷輕舒猿臂把蜚仙提高馬鞍喝手下綁了曹汝豐見主兵得勝大驅軍馬殺去蠻兵大敗走不及的都被砍死薛舉收兵回城未及點視兵將忽報猛土官差人到來稟事薛舉叫令進來那差來的蠻官跪稟道小官奉本官差遣昨者囗蜚仙小姐無知擒了將軍皇甫實冒犯虎威罪該萬死本官不敢加害以禮款留不意今日又抗違天兵囗蜚仙親身被擄特差小官送皇將軍回城望元帥天恩釋放小姐妹蜚仙還家願進貢方物拱聽約束立誓不敢複反所據城縣盡皆奉還懇求姑恕薛舉道汝本官大膽鴟張本當踏平蠻洞盡正國法今既知罪姑恕這番我皇將軍今在何處只見皇甫實進堂請罪備說土官厚待送還求換其女之意薛舉道此女果然英勇吾亦幾爲所困汝力不及非戰之罪也命押過囗蜚仙來去了綁縛以酒壓驚盡還兵器鞍馬蜚仙上馬而去次日土官又差人來請皇將軍議事皇甫實稟知薛舉薛舉道汝試往不妨看他有句話說皇甫實領命而去直至日晡回來說土官只生此女年方二九未曾許聘英雄了得設誓在先有敵得過者願委身事之奈遇元帥實乃天神而女心悅誠服不負初言願侍箕帚浼某爲媒未知元帥鈞意何如薛舉道吾未有正夫人所隨侍者婢妾而已此女剛毅武勇吾甚喜之但此事必須作書達知林太爺若許娶時再作區處於是寫書問林澹然之安並言此事差官齎往青州不一日差官回來遞上林澹然回書書中說此女絕世無雙姻緣有在即當娶爲正室不必計其爲苗蠻土俗也老僧主張不差薛舉觀書大喜擇日令皇甫實爲媒將金珠蜀錦之類送至孟土官處爲聘土官收了大排筵席厚贈皇甫實回貢薛舉犀角象牙珊瑚玳瑁碧玉黃金奇珍異寶土産之物極其隆盛薛舉班師回信州擇定吉日差皇甫實率兵一千用彩輿鼓樂迎娶囗蜚仙至府成親合巹之後薛舉與蜚仙愛敬如賓蜚仙生一子名薛仁禹阝後爲世子薛舉所轄地方人人畏服處處稱揚化爲醇俗不覺光陰荏苒歲月如流又早過了十餘年當下值三月天氣杜伏威預發傳帖約薛舉張善相和文武將士同到江油大禹廟中郊天祀地大排筵席兄弟敘情飲酒正歡笑酬酢間忽探馬報周高祖發兵將鄴城圍困燒城西門齊人出戰周師進擊齊兵大敗後主帶百餘騎東走被周人所執聖駕已崩各地盡屬周主杜伏威弟兄三人聽罷即備祭禮望東南遙祭舉哀示諭大小官員軍民人等俱挂孝三日三人商議起兵爲後主報仇查訥道周高祖用兵如神勇略蓋世近得齊地國勢更張若與抗衡恐非萬全之策薛舉道我等受齊主厚恩今被周子所屏義當大興士馬踏平周上複奪城池訪後主子孫之賢者而立之方是臣子之道豈可束手坐視據土自安乎即使兵敗國亡捐軀何恨張善相怒道二哥之言甚當國家有難臣子不赴援非忠也速宜操練三鎮軍馬即日起程二訥道二主公但知爲國忘家全忠盡節不知兵猶火也不戢當自焚凡用兵之法必須知己知彼百戰百勝若欲以區區三鎮之兵與中國抗衡是猶以鄒敵楚也安能勝乎依臣之言不如據地稱王仍遭齊主年號養軍恤民以俟天時不然徒勞民傷財無益於事薛舉張善相堅執要起兵杜伏威道二弟志在報仇培植綱常近仁見機自玉亦通時變我等主張不定不如同見林師爺求其定策以立行止衆人齊道此言甚善車駕即日起程不數日來到峨眉山差官通報杜伏威等步行上山參拜已畢各敘寒溫列坐兩傍杜伏威先開言道目今齊後主被周高祖所執境土皆爲兼併薛張二弟決意起兵報仇查近仁再三勸據守勿動不才心無定主特稟師爺懇乞尊裁以決去就林澹然道汝等未來之先俺已預知齊國自武成以來驕奢淫佚大失民心國勢衰弱甚矣幸後主好賢勤政似有返治之機不期汝等歸附後複驕悖自恣耽於酒色信用讒佞屠戮忠良骨肉內殘百姓外叛所爲若此鮮有不敗俺夜觀乾象見周之主星亦暗昧無光非能久於人世者不數年必傾社稷汝等不必進兵當從近位自守之策以待天時各宜修緝城地操演士卒整頓器械廣蓄錢糧積德累仁候中國有變起而圖之進則可以兼併退則可以獨霸不宜妄動干戈傷殘民命薛舉道師爺之言誠是但周子貪得無厭既滅全齊必有取蜀之意若待他兵馬臨城豈不坐受其制林澹然道周主雖僥倖滅齊以俺度之必不敢遠圖巴蜀其論有三西蜀山川險阻道路窄逼糧食不繼進退甚難一也陳國見周人兼併齊土豈無覬覦之心若周師一動彼必乘虛直搗以襲其內二也大將軍楊堅奇偉有才略周主雖用之而多疑若委以國柄車駕自將西征則疑生內變若假以兵權統軍代蜀則疑有外交君臣猜忌焉敢輕動三也查近仁之見與俺暗合三子不必多疑杜伏威三人唯唯聽服再無他議杜伏威問道不才久聞師爺畜一虎一豬一犬俱有名號馴服伏教乞呼出一見林澹然令樵雲呼豬犬印月引虎樵雲走出庵後高叫老蜜小賽快來太爺呼喚只見庵後跑出一白犬一黑豬搖頭掉尾徑奔至林澹然跟前林澹然將手指著杜伏威三人道衆爺在此老蜜小賽可向前磕頭那豬犬向伏威等跟前將前足跪下頭拄於地杜伏威等拍手大笑只見印月逐虎而來叫道老鍾來了衆人舉目看時那虎輕身緩步走向前來向林澹然點頭三下林澹然道老鍾何不向衆爺行禮那虎亦向衆人點頭張善相對林澹然道此虎日費領給爲何羸瘦林澹然道老鍾初皈依時俺每日取豕肉一肩飼之遇朔望則賜羊一羥極其雄壯近來一載有餘斷葷守戒惟餐蔬菜淡飯而已故此羸瘦薛舉問道老蜜小賽爲何這等肥壯林澹然道此二者並不食葷但食山桃野菜凡聽講後似亦能解悟靜養所以壯健衆人驚異當晚庵中暫宿一宵次早拜辭下山三人相別各各取路回鎮正是將軍不下馬各自奔前程不知後事如何且聽下回分解
