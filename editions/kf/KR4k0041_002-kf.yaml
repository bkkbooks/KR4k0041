香笑道一時權宜之法何足挂齒但不可忘了夫人小姐大德將帕兒還了小姐張善相道帕且消停小生不知進退有一事相讀賤軀單衣寒冷欲煩姐姐在小姐處方便一聲夾衣乞借一件聊且禦寒不知可否春香道這有何難便轉身進去不移時提了一領夾花綾披風出來遞與張善相道這件綾衣是小姐極歡喜穿的今日偶然脫下我悄悄拿得在此官人可暫禦寒小姐若尋起要穿我便要來拿去張善相接了道多蒙盛情感恩非淺羅帕容日送還春香去了張善相暗想感夫人小姐厚意複得大王奇夢小姐遺了羅帕又是我擡著莫非姻緣有在看這春香妮子輕言巧語靦腆溫柔絕有幾分風韻況聞得他春心已動甚覺有情於我若得這妮子到手則藍橋之路通羅帕之媒成矣看看日午夫人另著人送飯來不覺天色又晚野寺鍾鳴紗窗月上春香提一壺茶捧幾樣細果點心擺在桌上道奶奶拜上官人尊體不健吃了茶請睡罷張善相笑道小生病體漸可奈何獨宿無聊這花園中有些害怕怎得一個人兒伴睡方好春香笑道官人又來取笑誰人伴你張善相一把摟住道姐姐在此何謂無人小生是高興的哥哥乞姐姐權賜片時之樂教你嘗有趣的滋味有詩爲證園中旅況甚淒其擁抱春香笑語私嬌豔野花偏色美小軒權作雨雲居春香雙手推開道官人不要吵皂這軒子內是丫鬟們出入之處倘有人窺見不惟賤妾受責官人亦成甚體面惱了夫人無容身之地了斷乎不可張善相道小生爲姐姐死亦不懼何怕人見何慮夫人乎你若堅執不從小生便縊死在此春香笑道好涎臉的話兒官人體要性急你既有心妾豈無意待妾進去伏侍小姐睡了至夜靜時卻來伴官人睡何如張善相道若如此更感美情你莫要說謊去了不來便不是知味的人兒了春香道妾若不來身隨燈滅張善相喜道既然姐姐有情且待你進去小生專心至誠相候尊駕春香得放手急趨出軒外搖頭道咦你好自在心性兒哩強逼人做事要我來就你豈有此理我不來也說罷嘻嘻地跑進去了張善相暗想倒被這妮子賺了多分是不肯出來罷罷展開衾枕解衣且睡緊閉了雙眼只是睡不著側耳聽得樵樓上鼓已二更月上花磚星移斗轉正煩惱之間忽聽得有人輕輕的叫喚道官人官人你好睡哩張善相翻轉身來卻原來就是春香姐當下一把抱住道姐姐你好失信人也等得我月轉西樓悶懷顛倒春香道我若是失信時今不來矣二人正欲解衣俄然驚覺乃是一夢張善相呼嗟長歎披衣而起步於月下偶見旁邊覺有一人閃來閃去再看時正是春香善相狂喜不禁摟抱進房脫衣解帶共枕而臥雲雨才罷張善相道感承姐姐厚愛适才等你不來所夢如此如此不期真得相親三生有幸但小生欲見小姐一面不識何如春香道你好似那齊入一般乞其餘不足又顧而之他張善相道你卻也曉得書典春香道奴伴小姐讀書頗通文墨官人要見小姐有何主見張善相道小生有一腔心事今蒙姐姐賜通宵之樂欲要相托諒必不辭春香道官人有話分付如可用力處奴無不盡心張善相將那夜間窺見小姐玩月拾得羅帕夢裏情由說了一遍春香道果有這般異事小姐不見了羅帕好生著惱因有這首詞並名字在上黑早著奴到後園來尋覓方見官人睡在神廚之下只想送官人出去罷了不期帕兒果在官人袖中事情巧合羈留在此奴得奉枕席之歡夙緣素定非是偶然日後榮顯之時不要忘了今日奴便做偏房也罷了張善相道若忘汝情小生前程不吉但會得小姐一面雖死無恨春香道早上夫人分付侍女們待官人病體稍痊即教送出小姐私自分付獨教奴用心伏侍不可褻慢即此觀之小姐有心于官人可知但是小姐待人雖寬持己甚謹非奴等之比毫不可犯奴有一計未知何如官人明日依舊裝病體沈重臥於床上不要行動再留得數日然後可察小姐動靜如容有可投之機賤妾隨機應變又作道理張善相甚喜道感卿之情小生銘刻不忘二人說罷相偎相抱貼胸交股而睡有詩爲證再赴陽臺之會重伸契闊之盟已作輕車熟路無煩羞澀神驚漏下五鼓春香急忙起來作別去了次早曹夫人又令丫鬟來東軒看視回覆說張官人病勢沈重不能離席夫人心下驚惶又不好對家憧們說知但暗中鬱鬱不樂只令侍女們送茶湯藥餌調治張善相將藥都傾於階下且說小姐自和張善相會面以來漸覺神思恍慨寢食不寧容顔消減心下未免有些想慕染成一病曹夫人跟前勉力撐持含糊遮掩春香因小姐不快一連數日隨身服侍不離左右因此不會張善相之面春香暗想小姐患病懨懨不爲著張官人卻是爲誰今乘此機會喚他進來假做送羅帕來還因而問安以圖一會豈不是一條活路遂乘便脫身走入東軒裏來見張善相善相道我的親親姐姐爲何數日不見你面悶死我也妝病晝寢度日如年汝好薄情數日不來看我豈不盼殺了人真要被你哄出病來春香道非我薄情只因小姐如此如此把留情抱病之事說與善相張善相聽了不覺手舞足蹈大喜道數日納悶今忽得此佳音倍覺精神舒爽小生就去問安送帕何如有詩爲證悶擁寒衾夢倒顛起來無意誦詩篇忽聞青鳥傳消息一似皇恩降九天春香道官人恁地性急青天白日侍女往來決撒了事情不幹我事必須待夜闌人靜後官人可從東廊而進由茶廳轉過清暉堂薔薇架南進畫閣內見朱簾垂蔽內露燈光就是小姐臥房了張善相道半夜三更人生路不熟我那裏認得這彎彎曲曲的路徑春香想了一會道我有計在此晚上我把棒兒香點著插在轉彎處爲記官人但看有香的所在就要轉彎妾身接引進去只是我小姐立志貞烈稟性端莊官人須要循循雅飭以禮相見切不可輕狂妄動觸犯其怒奴耽著血海干系引郎一見不要貽累妾身受責張善相道不須分付漢家自有制度春香道小姐不時呼喚不得久待便轉身進去了此時方是午牌時分張善相巴不得天晚不轉睛將日光盼望就如生根的一般難得移動果然是歡娛嫌夜短寂寞恨更長漸漸金烏西墜玉兔東升又早黃昏時候張善相整肅衣冠袖了羅帕步出東軒四圍觀望並無人迹往來惟見滿庭月色遍地花陰向來曹夫人家閨嚴謹一應蒼頭小仆無事不許擅入中堂若有差使先敲雲板然後進見未到黃昏俱先閉門睡了故此內外隔絕無人當下張善相徑進東廊見插香處便轉彎抹角行到薔薇架側遠遠見朱簾之內燈光燦亮一步步捱到簾子邊卻無門戶阻擋原來都是春香私自偷開放善相入來張善相到了帝外心中戰慄不敢進前正是難將我語和他語未蔔他心是我心不知段小姐在房中見與不見喜怒何如且聽下回分解第三十三回計入香閨貽異寶俠逢朔郡慶良緣詩曰幽閨寂寞暗傷神著雨嬌花力不勝蘭麝繞廊通秘室清芬滿座絕紅塵燈前眼角傳心事月下心同得異珍百歲良緣從此定何殊玉杵會雲英話說春香引張善相直入小姐臥房到得房前不敢進去閃在簾子外探頭張望春香和小姐正在繡幾上撫牙牌消遣小姐忽然擡頭見簾外似一個人影移動對春香道夜深之際爲何簾外似有人窺望你去看來春香丟了牙牌往簾外一覰假意失驚道呀張官人何故在此張善相道小生聞知小姐貴體不安特來問候就送羅帕在此春香忙轉身笑道小姐你道簾外的是誰小姐道甚是奇怪我聽得像一個男子聲音春香道就是那東軒下有病的張官人他說聞知小姐玉體不安特來問候就送羅帕來還小姐小姐道夜靜更深他何由得至此處你接了羅帕好好地快打發他出去春香道張官人特送帕兒來還況且求之不得今又爲小姐染恙竭誠而來也是一片好心小姐無一言就這等匆匆的打發他去似覺拂情太薄幸了也連小姐款待他的意思都沒了依春香說便見一面有何妨礙小姐道既然如此請他進來春香隨出簾請張善相進房向燈前深深作揖小姐答禮分賓主而坐張善相躬身啓道小生聞小姐貴恙如患在身不避斧鉞敬候起居小姐道聲多謝即教臘梅烹茶春香侍立於側張善相仔細看那臥房果然十分清趣但見紗廚籠碧幽幽檀麝襲入來繡戶凝香皎皎月華當戶自妝台無半點塵埃臥室有千般精潔雕花小幾膽瓶中丹桂一枝芳素白羅淡水墨點幾處梅花瘦博山爐觀音正面翡翠屏寶鴨斜飛案頭列詩韻錦箋壁上挂清琴古畫牙牌慢撫鴛鴦不刺剪刀用書史勤觀筆硯常親鸞鏡掩正是深閨那許閒人到惟有蟾光透瑣窗張善相看了頓覺精神開爽滿室春生坐了一會茶罷燈下偷覰小姐玉容更加秀麗張善相神魂飄蕩再啓道小生不才避難貴園偶拾羅帕感蒙夫人小姐錯愛如至親一般看覰恩同山嶽將何爲報小姐含笑答道些須小惠何以報爲張善相又帶笑低言道聞小姐玉體不安小生驚惶無地私祝神明願以身代只求小姐身心安樂小生雀躍不勝小姐道賤軀不安因惜花起早愛月眠遲感了些風露之氣今已稍可敢勞垂顧昨宵遺帕不意君收尊恙已痊合當擲還深感大德張善相謝道小姐分付焉敢不從香羅在此小生敬納妝台特申寸捆遂袖中取出羅帕雙手奉上小姐命春香接過來收於拍內張善相道佳詞雅逸清新非慧敏天成不能道只字小生自幼攻書博覽古今閱人多矣佳人世代不乏如紂之妲己桀之妹喜周之褒姒文公之南威芒蘿之西子臨邛之卓文君班氏之曹大家齊之莊姜晉之驪姬秦之蘇若蘭趙陽臺其餘楚娃宋豔趙女燕姬不一而足未更仆數然其間美色者未必有美才美才者未必有美德求其德色雙絕才情兼美如小姐者百無一二真絕代之嬌姿傾城之名媛所謂人眼平生未曾見者也小生何幸得拜蘭閨身親珠玉昨宵不寐偶占俚語敬和瑤詞並求小姐斧削倘蒙不鄙慨然指教感佩非淺說罷袖中取出片紙奉將過來小姐命春香接了展開香幾之上小姐舉目觀看也是一首蔔運算元詞兒和著前韻詞道閨怨寫幽窗筆筆銀鈞勁詞調清新泣素秋客況思鄉井恭荷美人憐不只離鴻影惺惺從古惜惺惺休怯鴛幃冷仲秋月夕廣甯張善相題和小姐看罷收於袖內時已更深回顧衆婢或坐或臥或蹲或倚盡皆睡著只有春香立在桌側翻白眼見那眼皮兒再也掙不起小姐看了微笑對張善相低言道偶寫俚詞蒙君雅和君今還是回家還往他處逃避視君才貌必非池中之物何不求取功名以圖榮顯張善相道承小姐美情小生家在城中世德坊下家祖張太公字完淳年已八旬家君諱找頗有萬貫資財但未曾出身榮耀小生今因誤傷人命懼禍斷不敢歸家某有結義密友二人杜伏威薛舉總角之交異姓骨肉三人立志共圖王霸之業他二人已先到河南去了我今欲去投他博一個封妻蔭子若不衣錦決不還鄉小姐道君已聘誰家之女爲妻了張善相道小生今年一十六歲未曾聘妻蓋因小生立誓在前若無才貌雙絕官室門桅決不成雙不是小生自誇我乃文武全才豈是尋常女子可配小生上識天文下知地理讀孔孟諸子百家之書習六韜三略孫吳之法力能舉鼎術可驅神若無小姐這般人物小生終身誓不娶妻小姐聽罷笑而不言張善相問道小姐亦曾受聘否小姐道妾今年亦是一十六歲未曾受聘張善相驚道某與小姐同庚且才貌相當真乃天緣奇遇然小姐雖有名門宦族公子王孫爲聘此輩惟知飲酒食肉醉舞謳歌那知惜玉憐香風流博雅可惜將小姐一生埋沒若不嫌貧賤與小生結張善相說到結字即閉口不言小姐聽了不覺潸然淚下張善相見小姐下淚勸慰道小生斗膽妄言實出肺腑望小姐莫責小姐拭淚道君言雖未終妾心豈不悟蘇季子豈常貧賤者乎但此事非妾所得專自有父母之命媒灼之言且郎君之言亦難全信張善相道小生並不會編謊且說何處是脫空小姐道其他亦是可信適所言力能舉鼎術可驅神二語恐未必然張善相道小姐不信請嘗試之此時春香靠著桌兒也睡著了張善相與小姐同出香閨至薔薇架邊天上月明如晝善相見傍有石鼓墩兒一個約重千斤善相默念助力神咒暗喝一聲疾將手舉那石墩一如無物離地四尺有餘小姐怕跌下來忙道是了張善相放下道若要驅神恐驚了小姐只喚一朵彩雲與小姐看便了乃撚訣念咒喝聲疾只見月傍登時雲氣聚合化成五色鮮明可愛如錦繡上托著明珠一般小姐看了大喜道君言非謬妾已知之只是富貴之時恐把妾身抛棄別偕佳侶耳張善相就對月跪下盟誓道小生張善相年一十六歲某月某日生若榮貴之後忘了段府琳瑛小姐恩倩願死刀劍之下葬於魚腹之中永不得還鄉誓畢亦挽小姐請其盟誓小姐道君放手妾自立誓便了張善相不敢囉唕拱手而立小姐從容斂衽向月萬福道妾段氏琳瑛年一十六歲某月某日生今夕星月之前與張生善相期百年結髮永效於飛苟有負心神明殛之誓畢張善相欣喜不勝便欲摟小姐之肩接唇小姐推開正色道今夕之誓亦爲君非凡品妾終身有托耳豈可作敗倫傷化之事妾果如此淫女子也君亦何取於妾妾異日何表於君倘事不偕妾願白首閨中永不作他人之婦一死以謝君耳張善相道小姐如此用情心堅金石小生粉身不足以報囗月在上如張生不得與段小姐同諧連理成合巹之歡亦願終身不娶永作鰥夫小姐道雖如此說妾與君皆是空言將何物表情爲異日合巹之證善相道小生逃難並無一物敢借小姐香羅各分其半小姐之詞小生收執小生之詞寫在那半幅上小姐收執何如小姐道妾與君皆因此帕得結同心如此甚好妾更有一物乃妾嬰兒時所弄珍藏至今是玉人一雙一作男形一作女相出自異域其香無比價值連城家君因征外國得來見妾心愛付妾珍藏今贈一與君永爲表證張善相大喜遂同進閨中春香兀自未醒小姐出帕剪爲兩半付張善相寫詞張善相磨得墨濃剔起燈煤寫那和的蔔運算元詞於帕上小姐開箱取兩個玉人出來有一尺長異香滿室果奇寶也張善相寫完送與小姐小姐將自寫的香羅半幅裹了女形的玉人付與善相道只此一言永無異說君功名成就早早遣媒的向家君議此親事切勿遲延使妾有白頭之歎作九泉怨悵之孤魂也善相雙手接了倒身拜謝小姐亦答禮兩個相憐相惜不覺漏下五鼓將次雞鳴那春香驚將醒來往下一塌撲的一聲把額角向桌沿上一磕登時磕起個大塊來春香負疼欲哭不得欲笑不得小姐與張善相看了俱各好笑小姐罵道這些賤人這等好睡快掌燈送張官人出去春香去叫起臘梅來臘梅骨都了嘴只立著不做聲小姐叫快去生竹爐烹茶來吃臘梅方才走去生火張善相指著壁上挂的古琴道茶尚未熟久聞小姐善此請教一曲何如小姐道久懶於此恐亦生疏張善相對春香道煩姐姐把琴桌兒移在月下太湖石邊春香只得移出天井中石邊口裏道露冷颼颼的做這等的事張善相將琴放在桌上掇個小機兒請小姐彈琴小姐道君亦諸此請先教一曲善相道小生寄指而已何敢弄斧班門然而將爲引玉豈憚抛磚乃轉軫調弦鼓雉朝飛一曲小姐道此乃無妻之曲君何鼓之今日正當鼓關睢一操張善相大喜於是改弦爲微音鼓關睢十段一段王睢善匹二段大鬧周召三段即物興人四段舉德稱行五段風化天下六段相與和鳴七段禮正婚姻八段德侔天地九段配享宗廟十段睢鳩和樂共十段曲終張善相彈畢請小姐彈小姐不得已改弦爲宮調鼓陽春一曲命春香將博山爐焚起一爐好香來彈一段氣轉洪鈞二段陽和大地三段三陽開泰四段萬彙敷榮五段江山秀麗六段花柳爭妍七段鶯歌燕舞八段錦城春色九段帝裏和風十段青黃促駕十一段春風舞雲十二段綠戰紅酣十三段留連芳草共十三段曲終張善相傾聽之餘自愧弗及低聲道小姐指法精妙音韻絕佳但此秋氣似與陽春不合小姐能鼓秋鴻否小姐道雖不盡善當爲君作之於是改弦爲姑洗清商之調鼓秋鴻一曲臘梅傾茶來小姐與張善相飲畢乃鼓雲一段淩雲渡江二段知時賓秋三段月明依渚四段群呼相聚五段傍蘆而宿六段知時悲秋七段平沙晚落八段延頸相依九段蘆花夜月十段南思浦水十一段北望關山十二段顧影相吊十三段沖入秋旻十四段風急行斜十五段寫破秋空十六段遠落平沙十七段驚霜叫月十八段知時報更十九段爭蘆相咄二十段群飛出渚廿一段排雲出塞廿二段一舉萬里廿三段列序橫空廿四段銜蘆避戈廿五段盤序相依廿六段情同友愛廿七段雲中孤影廿八段問信衡陽廿九段萬里傳書三十段入雲避影三十一段列陣驚寒三十二段至南懷北三十三段引陣沖雲三十四段知春出塞三十五段天衢遠舉三十六段聲斷楚雲小姐彈畢張善相不住口的稱羨忽聞古寺鍾鳴鄰雞三唱張善相道小生正欲請教指法奈何天色將明又聞小姐善於簫管不知肯略略見教否小姐道東方欲明請教有日簫管之音聞于內閣母親必加叱辱此非今日所宜也命紅蓮掌燈同臘梅快送張官人出外明夜再得請正張善相沒奈何勢不可留只得別了小姐怏怏而出心中好生留戀轉過了薔薇架走至清暉堂紅蓮道這一回磕睡上來身子困倦覺冷官人自出去我等進去睡也說罷與臘梅關了角門兒自進去了張善相獨自一個如失魂的淒涼寂寞就坐在堂中椅子上思量小姐情濃意合雖不能近身而脂香粉色領會已盡蒙賜玉人異香撲鼻只聞說海外有香玉實未曾見果然有此等寶物就如小姐一般何日得共枕同衾酬我心願展轉躊躇不覺頓足懊悔起來道我張思皇聰明了半世這會兒恁般愚懦適間小姐雖是假狠甚覺情濃趁丫環們俱睡熟之時把小姐緊緊摟住便是太湖石邊寒冷也說不得那怕他叫喚起來失此機會知道明夜何如倘明夜再得進見挨至五更定行此法不由小姐不從休得差了主意自言自語在堂中不住的走過東走過西心中好不能放下天色已明忽聽得呀的一聲門開處見小丫頭翠翹挾著一把笤帚出清暉堂來掃地看見了善相大驚道官人緣何起得這般早怎生樣進來的張善相道我薄衾單枕睡不著故等不得天明起來見這條廳門昨晚失關信步走進來一看正說間聞得老夫人叫翠翹張善相一溜煙跑出清暉堂過了茶廳由東廊至軒內坐了取出那玉人來細看實是碾得細巧眉發絲絲可數臉兒如活的一般標致得緊果然非中國玉工所能造也看了一會道如此奇逢豈可無題詠以記之乃調長相思一闕雲喜相逢美相逢羨入深沈繡閣中眉稍兩意濃彼心同此心同見處更親合處空愁聞野寺鍾情意不盡再成南鄉子一闕雲何似久參商昨夕桃源誤阮郎羅結同心雙帶挽鴛鴦贈個人兒有香夜短兩情長並下瑤階拜月黃海誓山盟牢記取分張坐對西風泣數行軒內亦有文房四寶張善相取幅箋兒寫了疊做個同心方勝兒顛倒寫鴛鴦兩字在上只待春香姐出來央他寄與小姐看小姐如何答我便知今夜的消息了正癡癡裏望春香不意倒是翠翹送漱水出來說道老夫人叫官人梳洗了請進清暉堂有話講張善相心內狐疑不知有甚麽話說於是梳洗畢緊藏了玉人羅帕帶了箋兒隨翠翹至堂中老夫人已先在彼了原來翠翹掃地與張善相說話時夫人聽得叫進房中問與誰說話翠翹答是張官人因茶廳門昨晚失關故進來一看夫人聽了心中大疑付道自東廊至此有許多門戶難道都是失關的況堂後就近著女兒臥房了張生緣何到得此間莫信直中直須防仁不仁做出些事來怎了不如打發他離卻我門便是因此請張善相進來相見禮畢夫人道幸喜貴恙已痊本欲再留數日昨相公有家報回來說朝廷欽差相公巡邊因便歸家一省倘一時到來難以回避即刻郎君可作速回府若欲遠行當具盤費相贈遂命雲娥捧出白銀十兩送與張官人聊爲路費莫嫌輕微張善相聽說如千刀刺心又如啞子吃黃連有苦說不出欲待承命滿望著今日夜間完成好事怎忍就去了況不曾與小姐一別欲不應允夫人明明趕我起身怎生延捱得出於無奈答道小子避難偶人貴國感夫人不行叱逐又蒙調治賤恙得愈此德此恩粉身難報今早正欲拜辭夫人往南訪一敝友以圖後報適蒙見呼即此告辭叨擾已多心實不安況賜腆儀決不敢領夫人道郎君不受薄禮即是見怪老身望勿推卻張善相不敢再推只得收下拜了數拜徑出園門心中思念小姐不得一面爲別怎忍得飄然而去含淚慢慢地走著有詩爲證花發妒狂風濃雲蔽月宮鏡分銀燭冷簪斷寶奩空楚館歌喉絕陽臺好夢終壁沈珠玉碎水漲路途窮走不數箭之地只聽得背後有人高叫張官人慢行且往我小人有話相稟張善相立住了腳看時卻是段府管大門的孟老兒向前問道老管家有甚話說孟老兒低聲附耳道春香說官人借了我外甥女兒一付梳掠他要用的如何將去了那裏去另買瞞著奶奶特叫我來喚官人轉去一問看看放在何處好收擡張善相道正是拜別夫人忙了些個失忘了還春香梳掠當得奉還孟老兒自去了張善相忙忙轉來一面走著心裏想道畢竟是那人有何言語假以梳掠爲名今番再見必有發付小生之話再說春香天明起來去老夫人房中伺候正走間聽得夫人在堂上打發張善相出門心下大驚展轉躊躇沒做理會處急急跑到小姐房內道不好了不知何故夫人如此這般打發張官人起身出門去了小姐慌道這等說張郎已去不曾與他一別可憐孤身落魄一時催逼出門不知何往你快去叫你娘舅悄悄通知張官人教他轉來傳示他篤志功名以圖姻事不可有負昨夕之情說我不能出來一面了如有歸鴻返北便中寄個信音來莫做了斷線的鷂子春香領命急急叫孟老兒追張善相轉來自己立於門內等候不多時張善相喘吁吁地走近前來二人上前攜手而哭張善相含淚道早上夫人發付我出門不知是何緣故一時如此催逼無奈拜別而行适才孟老喚轉小生小姐有何分付春香道不要提起昨夜郎君回軒之後小姐和衣睡了倏忽間天色大明我勉強掙醒起來去到老夫人處來夫人已在堂上打發官人起身我聞知心如刀割報與小姐知道小姐榜惶失措不曾與官人一別和我計議叫我娘舅老盂請郎君轉來托言失還了梳掠以訴衷曲小姐道郎君孤身落魄行色匆匆未曾稍盡微情恐夫人見疑又不能出來一面令賤妾傳示你野店風霜切宜自重玉女羅帕留作後日相見之證願郎君此去前程萬里早遂功名永諧姻眷不可負卻小姐一片至情若有鱗便專候好音誓不他適但不知郎君此一行卻往何處去也語未畢淚隨言下張善相揮淚道小生蒙小姐和姐姐如此錯愛死亦甘心小生此去尋那兩個契友共圖王霸之業斷不小就功名倘得進步必有音相報願小姐不負初心永堅帕玉姐姐休要棄舊憐新和小生再諧連理但我今要見小姐一面還可得見麽春香道老夫人坐在堂前誰敢官人進見官人富貴了切莫負卻小姐深恩賤妾薄意苟有變更必然斷送小姐性命張善相道小生若忘小姐和姐姐大恩死于萬刃之下春香道君出此誓足表真情速去莫遲慮人看破張善相將箋兒遞與春香道乞寄與小姐用伸鄙情灑淚而別有詩爲證本落難禁別思悲晚風吹月上征衣一灣流水孤村遠幾點歸鴉又夕暉不題春香含淚口覆小姐且說張善相別了春香心下悲切珠淚偷彈只得拽開腳步取路前進一連行了數日早到黃河地面當日天晚投一客店安宿正飲酒間對座有三個客商也在那裏吃飯一個道如今買賣做不得了天下變亂兵戈載道糧稅愈重盜賊日增如何是好一個道變亂之事何代無之但未知何日太平我等得不見兵革方才歡慶一個道目今新出那兩員年少大將有萬夫不當之勇部下數十員猛將四五萬精兵佔據延州朔州南安數郡稱爲正副元帥四遠無人敢當小弟向日發些糧食過河被他攔住自分一死不料那少年元帥寬宏大度將我糧食只抽十分之三又差軍士護送過河這樣好人定成大事非小可也張善相聽見心下暗想莫非就是杜薛二兄我今正要尋他不如問個端的省得一路尋訪當下便拱手問道尊客這兩位少年將軍怎生模樣是何處人氏姓甚名誰近日伺處住紮那客人答道一路聽得人傳說一個姓杜頂平額闊一個姓薛大臉長軀年紀俱不過二九但不知他是甚名字何處出身如今現在朔州屯兵張善相道承教了說罷安歇一夜喜不成寐次早算還了店錢取路急投朔州郡來不數日到得城外擡頭看果然好座城池城上追插旌旗密布鹿角張善相高叫開門城上軍士間了來竟忙下城入帥府報知把門官傳報進去有姓張的故人叫門薛舉道有甚姓張的故人莫非張三弟來到杜伏威道朱儉去久未見回音恐不是三弟二人同出帥府騎馬上城樓觀看張善相早已望見高聲道杜薛二兄別來無恙杜伏威薛舉見了大喜道賢弟遠路風塵不易令軍士李一匹駿騎開門迎接三人並馬入城同入帥府堂上拂了塵土相見已畢敘問契闊之情杜伏威道自與賢弟分手一路受盡艱辛曆遍苦楚不期變生肘腋身人囹圄上托林老爺法助又賴諸賢並力三弟福庇倉猝起兵連得數郡又叨薛二弟血戰之勞戰無不克攻無不取但寢食夢寐無一刻不思賢弟今得相見足慰平日鬱想之懷林老爺好麽薛舉道自別三弟來此杜大哥相挈連戰連捷智勇之土歸附加水兵精糧足眼見得有幾分成事前特差將佐朱儉齎書禮拜謁林老爺問安兼請賢弟同謀進取爲何不與朱儉同來張善相道林老爺身體康健的小弟爲一事逃難而來未曾與甚朱儉相會杜伏威忙問三弟有何事故張善相將騎馬踏人乘夜避入段府花園得夢夫人小姐相留事情從頭備細說了杜伏威道騎馬試劍是吾等分內之事不足爲過難得段宅夫人小姐如此相愛實是因禍得福天賜良緣旦夕間必爲賢弟成就此親事於是請查訥繆公端諸將上堂相見大排筵席慶賀連日飲酒歡聚忽一日朱儉回來徑入帥府參見薛舉道前差你去勾當爲何許久才回朱儉道小人承元帥嚴命廣寧縣公幹幸得一路無阻先見林住持老爺獻上書禮林老爺不勝歡喜看書罷問小人就回還是要往他處去小人道還要進城去參見張太公喬梓就請三相公同往朔州與二位元帥共贊軍機林住持笑道不必去了莊中即請出張太公父子來相見備說三相公走馬傷人地方告在本縣太公用錢捺案不行暫于莊內躲避三相公逃竄不知去向張太公晝夜思念苦楚淚眼不幹林老爺卜一神數說道在外平安有因禍得福之喜太公略覺心寬留小人住了數日方得拜別起行林老爺有回書在此再三拜覆二位元帥說罷將書呈上杜伏威等三人一同看書書雲視汝書已悉往事今聞連捷又兼戮仇葬父皆人子所當爲之事可喜可喜近者張郎因馳馬誤傷人命不知逃竄何方以致構訟太公父子幾被縲絏賴錢神著力暫爾寧貼吾料張郎必投汝處可同贊軍機共拯黎庶莫徒恃勇妄殺以爲愉快也只此至囑薛舉指著張善相問朱儉道這位將軍誠庵你可曾認得麽朱儉道小人正要動問此位將軍卻是何人未曾拜識杜伏威笑道這位正是張三相公也誠庵未到他已先來所謂不期而會朱儉大喜道張相公何不早言只是袖手而笑朱儉起身又拜張善相扶住道勞誠庵遠涉失訝爲罪老祖老父在林住持爺莊上不得盡情莫怪莫怪朱儉道承元帥重委何敢言勞尊駕已到亦不負小人走一遭也衆皆歡喜重設席慶賀忽探馬報武州郡刺史回龍秋用大將馮謙爲前鋒自爲後隊共起馬步軍兵二萬戰將數十員殺奔前來速請元帥軍師調兵迎敵杜伏威聚集大小將士商議查訥道田刺史爲人某所素知本貫河內人氏托親韓長鸞之勢而得顯位無才無德不足介意但馮謙這廝原是軍衛出身不推驍勇過人兼有奇幻之術若先得除此人田龍秋自然喪膽薛舉道古雲妖不勝德我等往往血戰非圖利祿不過除暴救民爲蒼生計也皇天祐我豈懼彼妖術我明日出軍務教大捷張善相道敵兵遠來利於速戰宜堅守何如杜伏威道三弟之言雖善然今敵已臨城若不接戰是示怯也必須大殺一場使彼膽落則後無人敢正視朔州矣計議未畢馮謙軍馬已到將城四面圍繞杜伏威道今日之戰衆將誰敢任前鋒先出只見一人攘臂向前威風可畏高聲叫道小將願爲前部先鋒衆人看之卻是繆一麟查的道公端爲先鋒允稱其職就著薛元帥曹汝豐爲左右救護率領精兵一萬大開南門出戰馮謙見敵軍出城號令衆軍退數箭之地排開陣勢鼓聲大振繆一麟一馬當先高叫道我老爺招集義兵上除暴虐下救生靈爾等匹夫大膽攻城是不知天命也對陣門旗開處閃出一員大將身騎劣馬手舞大刀正是馮謙怎生裝束但見韜略深明志氣高全憑法術善興妖護身鎧甲金星燦嵌頂盔纓烈火飄騎猛獸執鋼刀威風凜凜顯英豪袋中試取弓和箭曾向圍場奪錦標馮謙拍馬向前喝道無知潑賊蠢爾狂徒不知安分敢據城叛亂天兵壓境即刻化爲齏粉尚敢胡說繆一麟大怒躍馬挺槍就刺馮謙舞刀劈面砍來二人戰三十餘合不分勝負曹汝豐看見馮謙刀法愈精繆一麟槍法漸漸散亂心下想道先鋒若有疏失豈不大喪銳氣便舞起大刀拍馬殺出助戰馮謙接著交鋒並無懼怯三個鏖戰良久馮謙虛砍一刀帶轉馬便走繆一麟曹汝豐兩匹馬緊緊追來看看趕近馮謙斜放大刀取出寶雕弓搭上翎毛箭拽滿弓弦回身一箭卻好射著曹汝豐右臂曹汝豐棄刀于地繆一主麟單馬救護回陣馮謙拍馬趕來大叫潑賊體走將及陣門側邊惱犯了一員年少英雄騎著烏騅馬手挺方天畫戟大喝道逆賊慢來薛爺在此馮謙撇了繆一麟接住薛舉廝殺二人又戰五十余合馮謙架隔不住橫拖大刀撥馬而走薛舉繆一麟招動大兵隨後掩來不上半裏之地只見馮謙除下兜鍪披發仗劍口中暗念靈文霎時間天昏地暗日色無光狂風大作風過處只見無數的鬼兵紅須赤發頭如車輪身長丈八腰紮虎皮手執鐵棍亂紛紛空中打將下來繆一麟心慌也顧不得薛舉放馬先自走了衆軍士被風刮得站身不住大頭鬼又兇猛打下來陣腳大亂四散逃生薛舉見衆軍俱散也帶轉馬頭殺條血路而走後面馮謙率衆將蜂擁趕來薛舉見追兵甚急回身接戰圓睜虎眼喊聲發雷驟馬挺戟直沖入敵陣馮謙部下諸將一齊迎住薛舉手起一戟刺一將于馬下兩下正奮力交鋒半空裏大頭鬼拿鐵棍又劈頭打來薛舉急中省悟忙念降魔咒那大頭鬼隨風遠遠四散薛舉放膽大殺力敵衆將挑四將落馬馮謙慌了暗射一冷箭正中薛舉左膝薛舉帶箭回馬馮謙與衆將來追看看趕上薛舉大喝一聲轉身飛馬又沖過來勢如猛虎衆將不能抵當紛紛倒退馮謙大怒舞刀獨戰交手三合被薛舉戟尖刺著袍袖順手一拖馮謙險些兒拖下馬來幸得兩下用得力猛將袍袖扯斷馮謙受那一驚不敢戀戰拍馬回陣薛舉緊緊追來衆將要救馮謙只得抵死迎住薛舉一枝畫戟神出鬼沒若舞梨花遍身解數官軍看了個個魂驚膽顫都喝采道這小將軍是楚霸王再出世也後薛舉至蜀稱爲西秦霸王亦應衆官軍一時之識有詩爲證薛舉英雄不可當朔州今日賽當陽方天戟擺蚊龍尾到處人稱小霸王薛舉正酣戰間馮謙翻身殺回戰夠多時薛舉又挑一將下馬衆將心驚正要走忽然金鼓亂鳴大隊官軍來到原來是田太守聞報衆將戰不下一個年少賊將故親統大軍趕來指麾軍馬四面圍裹欲擒薛舉薛舉抖擻神威怒目挺戟盤旋鏖戰田龍秋見薛舉手舞畫戟諸將不能近身急令放箭四圍攢射薛舉見箭如飛蝗忙除下兜鍪抵箭右手持戟迎著兵刃敵軍殺近身的都被搠倒田龍秋愈怒親執號旗催督將士並力來攻薛舉毫無懼怯正大戰間喊聲又起一彪人馬殺入重圍勢不可當敵軍紛紛退避薛舉乘勢殺出這是杜伏威見前軍敗回薛舉單身衝突轉去恐有疏失急引一枝生力軍前來救應隨後張善相繆一麟等又引精兵數千繼進兩軍混戰互相折損直至日色將沈兩下收軍罷戰查訥接應入城解甲休息飲酒繆一麟舉杯道薛元帥真天神也敵將作法我與諸軍皆退元帥匹馬反殺進敵陣如入無人之境挑他名將十數員落馬全身而返今古之所罕見敬舉一杯薛舉接杯道乃大元帥與諸君福庇某何能之有今日這一場廝殺彼軍亦膽落矣邪鬼無蹤勇夫縮頸馮謙這廝被我一戟刺中袍袖幾乎墜馬不意袖斷適去彼軍圍散數次近身者刺死不計其數我左膝上中了一箭拔出箭簇猶覺微痛這會兒平復如舊矣查訥道某聞三國趙雲在長阪坡救主沖入曹兵重圍中退而複進者數次斬將奪旗無人敢當人稱虎將今日元帥大器不減子龍昔日之勇也薛舉道趙子龍吾何敢當但不折銳氣爲僥倖耳衆皆敬其不伐於是合席慶賀薛舉吃得酩酊大醉扶入帳中睡了不題再說官軍回寨田龍秋點將沒了十餘員心中不樂諸將甚稱薛舉之勇馮謙道賊將青年驍勇果然難敵法術不能侵犯或者彼亦能通法術今日可惜失計不用得那毒龍妙法放彼脫去明日交兵必須下毒手擒之田龍秋道全仗將軍妙用若擒得此人勝斬數十員賊將當晚不題次日田龍秋馮謙率大軍逼城搦戰只見城上掩旗息鼓寂無人聲心中疑惑不知是何計策正是雪隱鷺鷥飛始見柳藏鸚鵡語方知畢竟兩下怎生交戰且聽下回分解第三十四回善相破法斬馮謙士開解圍推段帥詩曰延州城外毒龍飛繞陣俄遭煙火迷左道謾誇施妙用真人應自有天機鷦鷯豈並囗霄翩螢火難爭麗日暉元老薦賢期奏凱行看虎豹出皇畿話說馮謙率大軍攻城見城上旌旗不整鼓角無聲心疑有計不敢逼近但遠遠圍困攻打將及午後忽然鼓聲振響城門大開一騎馬飛出城來後隨數千步軍馬上那將乃是正元帥杜伏威單搦馮謙出馬二將更不打話鬥至數合薛舉馬軍又到馮謙一人怎當得兩員虎將勒馬便退杜薛二將追來馮謙急了依舊仗劍作法驀然天昏日暗風砂大作杜伏威也默誦咒喝聲疾依然天清日朗風砂皆息馮謙見破了法又念咒語滿空中大頭鬼不計其數手持鐵棍劈頭亂打杜伏威口中也念念有詞只見半空中現出一尊金甲神人身長三丈腰大十圍手持降魔真幡拂拂面來大頭鬼見了真幡神不覺現出本相紛紛墜落塵埃原來都是紙剪的馮謙見又破了法心下慌張忙勒馬跑上土坡口念真言忽見黃雨如注從空而降杜伏威薛舉冒雨緊追猛然酸氣逼人渾身麻木一陣邪氣從七竅鑽入腹中肺氣上壅噴嚏不止霎時間頭暈眼脹腳軟手酥杜伏威連聲道好利害也忙招呼薛舉回陣衆軍馬都立腳不住一齊奔回勢如山倒背後馮謙率軍追殺查訥張善相在城上遠遠望見二人敗陣忙催軍接引進城馮謙又將城四面圍定杜伏威薛舉進了帥府喘息不已口渴欲飲只覺心隔作酸猛地噁心一陣吐出黃水鬥餘方才寬爽出陣軍兵盡皆大吐杜伏威心下煩苦張善相道大哥不須煩惱适才我在城樓上遙見有吸髓毒龍從下而上盤舞空中口噴黃水此是毒龍吸髓之法破之亦易薛舉道賢弟爲何知此法術張善相道林住持所傳兵書上有之大哥如何忘了杜伏威道賢弟既知此術适才何不破之張善相道今日不破其法正要使彼得勝以驕其志彼再恃法必墮吾之計中姑延數日擒此賊將衆雖稱善心下未服查訥亦懷猶豫不敢多言馮謙一連攻打數日城內無一兵出戰暫且解圍退去張善相見了當晚升帳號令諸將出兵令常泰引軍五千一更盡出城埋伏西方僻處黃松領軍五千一更盡出城埋伏東方僻處來日午牌時候只看霧起炮響抄出減入陣後盡力進攻又請薛舉領步軍二千離城東南十五裏井字弄僻處埋伏又著繆一麟領步軍二千離城西北十裏獨虎山埋伏明日午時但看霧起炮響殺出攔截兩下並力大戰不可退步又請杜伏威領馬軍三千步軍五千明日開城出陣對敵奮勇格殺他若又施毒龍吸髓法衆軍一面奔走一面口中暗念唵阿遊阿噠利野婆呵神咒自然無事誘彼追趕近城只看霧起放起號炮以待接應又著尉遲仲賢部領五百軍士各帶狗血蒜汁待馮謙危急作法欲遁時用血潑去查近仁率兵守城我自臨城樓作法必獲全勝查訥見張善相調撥軍馬井井有條暗中嘖嘖稱善黃昏時分常泰黃松薛舉繆一麟各自領軍出城埋伏去了次日平明杜伏威飽食嚴妝專等辰時大開城門引軍出戰兩下排開陣勢那邊馮謙出馬這裏杜伏威自迎更不打話一往一來槍刀並舉戰五十餘合杜伏威奮起神威惡戰馮謙拖刀敗下陣來杜伏威追趕馮謙依舊技發仗劍作法頃刻黃雨大降杜伏威和衆軍且走且戰口裏都念唵阿遊阿噠利野婆呵果然毒氣不侵人人無事馮謙只道衆軍著了迷追過陣來漸至城邊張善相在城上布起大霧頃刻間對面不見又聽連珠炮響馮謙心慌回馬便走早聽得霧中四下裏鼓聲大振西北上繆一麟殺來東南上薛舉殺來城東黃松從後殺來城西常泰從後殺來杜伏威招引衆軍呐喊來擒馮謙馮謙見四面俱有伏兵大將勢不可當況大霧昏迷部下軍士看看折盡甚是慌張幾次衝突不出只聽得四下喊叫道不要走了馮謙心下正慌將走到井字弄卻好撞著薛舉二將交手數合馮謙終是膽怯不敢戀戰撥馬便走薛舉放馬來追前面繆一麟挺槍攔住前後夾攻馮謙忙倚大刀拔出腰間寶劍口中暗誦真言只見劍尖上放出兩道火來火焰有三丈之長雙手舞劍就如兩條火龍蟠旋焰騰騰四面火光飛舞勢不可近薛舉正欲念咒張善相在城樓上早已見了即忙撚訣念咒將劍一指馮謙火焰霎時盡滅馮謙見破了法馬上又念靈咒駕起一朵紅雲騰空而起直上青天尉遲仲賢看見便教軍士將狗血蒜汁亂灑上去馮謙從空跌下塵埃薛舉照喉一戟刺死于地其餘軍士盡皆投降果然殺得屍如山積血流成渠有詩爲證幻法能教上九天何期一旦破真禪馮謙自恃人無敵至死方知學未全張善相收了霧仍舊天色明朗號令諸將馬不停蹄連夜擒捉田龍秋攻破武州郡方許回軍諸將一齊乘勢來擒田刺史再說田龍秋領軍來接應馮謙路遇敗殘軍士來報馮將軍被敵將誘入陣中一戟刺死田龍秋聽說驚得魂飛膽破放馬逃生又見背後塵頭大起追兵到來不敢入城單馬從小路抄往徑州去了杜伏威領衆將一直來到武州城下不見了田龍秋杜伏威道田龍秋乃釜中之魚不必追趕若得此城勝田龍秋多矣當下催軍將城固定金鼓之聲遠聞數裏此時已是黃昏城外火光照耀如同白日守城官府丞秦伯建是儒士出身連晚聚集本府大小官員計議守城之策幕賓孫是梧道田刺史不知利害偏聽馮將軍之言倚恃法術將軍士盡行出征空城而戰不料全軍皆覆如今孤城難守軍不滿千盡老弱之輩百姓們號哭糧食缺少此城破在旦夕城若一陷玉石俱焚百姓盡遭塗炭依小生愚意不如權且投降以救一郡生靈之命秦府丞道受國厚祿一朝背之是爲不忠只宜堅守以盡臣節孫是梧道不然事有經權不可執一大人盡忠報國固是臣節殊不知當今天心不順直道難容盡棄仁義競於勢利連歲兵戈不息盜賊蜂起繼之稅繁賦重田土荒蕪眼見得時運兩窮自杜伏威起兵已來佔據數郡勢甚猖獗各處求救表文至京並不見朝廷發一軍救應皆是燕雀處堂上下偷安豈知桑土綢繆之道我等若不早決去就禍必旋踵而至不若降之以免一郡生靈之苦此爲權變之策秦伯建低頭不語衆官一齊道孫參謀之言甚當大人須當從之以救一時之急秦伯建道明早就著孫參謀前去通說投降之事若待以禮即便投降如若驕慢另作區處衆官商議已定次日城上豎起降旗杜伏威見了令軍士撤圍暫退一箭之地少頃孫是梧出城步行到寨見了杜伏威行禮已畢獻上降書杜伏威大喜待以上賓孫是梧道卑職無才賤士何勞將軍重禮杜伏威道久仰參謀盛德大名今得一見足慰下懷孫是梧道秦府丞使卑職歸降非貪富貴實爲一城生靈將軍進城勿傷百姓將軍之大德也張善相道古人雲行一不義殺一不辜而得天下不爲也我等興義兵以除暴亂正爲救百姓于水火今參謀以此見教足征愛民隨即號令三軍進城時不許驚擾百姓若妄殺一人妄取一物者定按軍法孫是梧拜辭杜伏威複入城內將杜伏威待以賓禮號令三軍之事說了秦伯建大喜率領大小官員一齊白衣素冠步行至杜伏威寨裏拜降杜伏威設宴款待宴罷進城秋毫無犯百姓安靜如故當日捷書到朔州郡查訥委王騏掌領郡事自卻單馬來見杜伏威道今日兵威大振元帥可將得勝之軍攻掠旁郡管取兵不血刃唾手而得不宜遲緩杜伏威道軍師之言甚善隨遣薛舉領兵五千取靜甯州常泰領兵五千取固原州繆一麟領兵五千取高平縣杜伏威自領馬步軍三萬隨後取岐陽郡其餘軍馬盡隨查訥守城薛舉繆一麟常泰分頭領軍攻取三處城池俱望風而降果然不動張弓只矢連得二州一縣三將回兵都隨杜伏威一同往南進發來取岐陽郡一路裏軍威整肅黎庶安然軍馬已到岐陽當晚離城二十裏地名杜陽山紮下營寨次日率領大軍攻打城池此時桑參將已死岐陽郡新任刺史姓和名用行乃和士開之族侄士開特引爲岐陽刺史爲官清廉正直愛民如子輕徭薄賦百姓樂業更是謀略沈毅常不滿其叔和士開之所爲當下見城外軍威甚銳圍繞攻城與部下一班將士計議都各要請軍出戰和用行道賊兵方來其勢甚銳久聞杜伏威等俱是萬夫之敵難與爭鋒堅守爲上爾衆將士受了朝廷厚祿都要用心固守城池待我申聞上司轉奏朝廷若得救兵到來方可退敵衆將無言而退和刺史做成文書連夜申了上司具表差人星夜偷出水門徑到京都樞密院參見了和士開穆提婆二人原來此二人是小人出身因逢迎皇上得位升爲左右二仆射執掌朝廷大權自杜伏威起兵之後失了幾處城池遍處求救表章到樞密院都是二人留下竟不奏聞連日有數十道求救表文申到二樞密也有些驚駭在堂上議論此事又見岐陽郡表章來到二人知和用行被圍不敢隱匿此時齊世祖湛禪位於其太子緯即位稱爲後主改元天統元年次日五更後主升殿和士開穆提婆進朝三呼舞蹈畢後主道今日無事二卿可在側殿陪朕弈棋以消長晝和士開奏道臣有軍機重事奏聞陛下遂將杜伏威起兵連奪數郡之事一一陳奏目今岐陽刺史和用行被圍甚急破在旦夕有文表申到本院轉達天庭臣等不敢隱匿乞陛下聖鑒速發兵征剿庶解此危後主展開奏章看了大驚道這杜伏威何等之人輒能聚衆爲亂佔據城邑爲何州郡官不合兵剿滅養成到今穆提婆奏道臣聞杜伏威年不過二十力敵萬夫部下糾集數十員大將皆是勇猛之士因此府縣官每每征討不能取勝反致失陷城池陛下速宜差大將出兵不然岐陽亦不可保矣後主道可調諸路軍兵十萬再選老將智勇足備者一員爲帥其餘將士任二卿選擇即日起兵不可遲滯和土開奏道臣舉一人現爲都督府右都督將軍段韶此人才兼文武智勇超群況且曾征服海外諸蠻老成持重若使爲帥剿賊管取指日成功後主道朕知此人乃智勇兼全老將賢卿所舉得人今日可在朝否只見武班中走出一員老將但見清奇古俊腹中有數萬甲兵勇毅沈雄聞風則千人辟易名馳海外諸蠻莫敢不來王譽動齊邦是處人聞皆起敬果然單刀如入無人境只手能擎半壁天那老將正是段韶金帶紫袍襆頭象簡白髯碧眼相貌威嚴俯伏金階口稱萬歲後主道今有賊將杜伏威聚集亡命攻掠城邑勢不可當郡縣屢失近又圍逼岐陽勢甚危急和仆射薦卿爲主帥統領三軍征剿賊寇卿可用心掃除邊境朕早晚專望捷音段韶俯伏道臣樗櫟庸材感陛下知遇寵祿過分敢不效犬馬之力後主又問衆臣之中有誰敢任副將之職爲朕分憂只見武將班內又走出一個大臣生得闊面長須身長體壯文材拔萃膽量過人乃是鎮西將軍齊穆當下俯伏道臣雖不才願爲副將以解宵旰之優助段都督一臂之力後主大喜當殿各賜禦酒三杯錦袍玉帶段韶加升爲太宰兼都督大元帥齊穆爲副元帥二人謝恩出朝次早齊到演武場聚集將士操練三軍就行文書遍處調遣軍馬旬日間共集有十萬精兵選大將四員爲左右羽翼虎賁將軍趙銀洪修廉孔囗馬信又選驃騎將軍嚴敬爲先鋒當下辭了後主率領三軍浩浩蕩蕩殺奔岐陽郡來再說杜伏威攻打岐陽城一連圍困二十餘日城內並不放一人一騎出來杜伏威心下煩惱見報查軍師張元帥率諸將來到不勝欣喜見畢備言城堅難破張善相道此城堅固一時攻打不下城中又無動靜彼必有計查訥道久聞和刺史深通謀略他見我軍勢銳不敢交鋒攖城固守以待救援早晚必有救軍到了張善相道查近住所見最明若他救軍來時城內必出軍接應前後夾攻我等腹背受敵不若趁未交鋒之際且將軍馬暫退讓彼合兵後另設良計破之擒其主帥城可得矣正商議間探馬來報朝廷封段韶爲正元帥齊穆爲副元帥嚴敬爲先鋒勇將百員馬步兵十萬殺向前來離此不遠杜伏威聽報整頓軍馬迎敵再說段韶奉旨帶領大軍十萬征討杜伏威果是族旗蔽日殺氣遮天一路無話看看來到河東府地面已近本家宅院委副元帥齊穆先鋒嚴敬部領軍馬先行自領親隨軍健回府探望曹夫人迎接入內相見了夫人道相公蒞任數年不覺須鬢皓然容顔蒼老如今杜伏威等一夥賊寇軍威整肅勢不可當非尋常盜賊之比聖上何不差少年之將前來征剿卻委相公重任相公年過六旬精神衰憊軍旅之事三軍性命社稷安危非同小可何不力辭君命歸享林泉之樂段韶道老夫年雖高大壯志未消既受朝廷知遇之恩食祿萬鍾官升極品奉命剿賊正臣子報效之日豈敢以年老拒辭諒此小夥草寇焉能成得大事管取一戰成功夫人見說不敢再言段韶四顧不見女兒問道女兒琳瑛爲何不見夫人道女兒臥病在床將及月餘請醫調治不痊段韶驚道女兒既是得病爲何不差人報與我知今得何病如此淹纏夫人歎道女兒這病醫生們俱說是七情所傷段韶道嬌養深閨焉有此症夫人道這病來得奇異自八月十五賞月之後便不茶不飯思病懨懨服藥無效臉兒漸漸的黃瘦了腰肢兒漸覺小了又不疼不痛只是思睡問衆婢時都說不知其故我好不心焦與決不下段韶道我向來分付春香這妮子貼身伏事你緣何不問他可喚他過來見我夫人遂命翠翹快到小姐房中喚春香來見老爺翠翹跑至小姐房中說老爺回了問及小姐的病要喚春香去打哩春香慌了道小姐老爺要打時如何說好小姐道你千萬莫說出張官人來十分問得緊時只說我不見了一個玉人因此煩惱成病再問別的言語只推不知只見雲娥又來喚了說老爺大怒春香姐快走那春香驚得何如但見面如土色唇若蒂青面如土飛下了兩朵桃花唇若蒂摘去了櫻珠一點春心吸吸氣喘噓噓心吸吸乳旁撞鹿如雨打雞兒氣噓噓腳下越趄似雷驚孩子搔頭不知癢處食物不辨酸鹹罪責目下要承當竹片眼前饒不過春香來到堂前磕了頭段韶道我且問你小姐這病是因何起的春香道不知段韶大怒叫取板子過來春香跪下道老爺息怒待春香說自八月十五玩月之夜小姐拿那一對玉人兒出來耍弄忽然次日不見了一個不知是貓兒銜了去不知是老鼠銜了去小姐思想這玉人遂此得病到今段韶道深閨之中玉人緣何得失去必定別有緣故春香只言不知段韶怒起來打了春香十下只言不知段韶無奈只得自到小姐房中問他夫人與春香等都隨在後邊那臘梅丫頭先去報知小姐說春香被老爺打了十下只招成不見了一個玉人兒故此得病如今老爺自來問小姐了小姐聞說叫臘梅將香幾兒過來靠了包了頭裝做十分沈重的模樣段韶親自來到小姐房中見小姐靠著香幾睡紅蓮報道老爺來了勉強立起身來低低道聲爹爹萬福段韶道我兒爲何得此病症小姐道不知怎地染這重疾不肖女多分不久於世了聞爹爹奉旨討賊奏凱回來不如致仕樂享天年免貽母親之憂女兒身死之後願爹爹保重莫增傷感說罷哽咽淚下段韶垂淚道我兒寬心調養這病的根由說是不見了玉人兒待我平賊之後定要緝訪這玉人出來還你不可憂鬱傷神拿那一個玉人來我看小姐叫春香在描金梳妝內拿出來遞與段韶段韶看了玉人道不見的是女身怎生樣不見的小姐道一同安放床頭不知怎生次早就不見了一個孩兒著了驚因此成病段韶將玉人放于袖中道我兒寬心調理我不日就回來看你與你追尋這玉人兒小姐道願爹爹早早得勝回來段韶出了繡房叮囑夫人好生看視女兒即上馬帶了健將趕著軍馬一同殺奔前來離岐陽城地名雍山紮下營寨先鋒嚴敬入中軍稟道前去讀陽郡不遠只隔六十裏之程即是喊寨還是連夜進兵或是屯兵暫歇以待明日交戰請元帥將令段韶道黑夜之間難以交鋒權且安息一宵明日平明進兵放起號炮使城內知覺出軍夾攻方保全勝又分付諸軍密布鹿角帶甲假寐以防賊軍劫寨當夜無話次早五鼓埋鍋造飯平明進兵先鋒嚴敬上馬帶領步軍三萬當先鼓噪殺進後面齊穆中軍放起號炮段韶後軍陸續繼進城內和太守聽得城外連珠炮響已知是朝廷救軍到了慌忙上城看時只見塵頭蔽日殺氣迷空漫山塞野皆是軍馬遠遠見中軍帥字旗隨風飄動旗上書著都督大元帥段六個大字和太守急率領大小將校步軍五千大開東門殺出杜伏威見兩下殺來即將軍馬分做兩處薛舉張善相領軍一萬五千迎敵來將杜伏威查訥領軍一萬五千押後以防城內沖圍薛舉之軍卻好與先鋒嚴敬軍馬相遇更不打話嚴敬便向薛舉挺畫戟二將戰無數合薛舉例拖畫戟落荒而走軍馬四散奔開嚴敬率軍四下撲趕這邊杜伏威未及動兵城內和太守軍馬已到兩下混戰查訥大叫寡不敵衆元帥可避其鋒遂帶馬先走杜伏威也拍馬挺槍衝殺出陣去了部下軍士各自散開和太守親自督軍衝殺一陣只見抛槍棄劍頭盔衣甲糧草器械塞滿道路和太守鳴金收軍段韶傳下將令於城外傍城紮下三個大寨中寨是大元帥段韶東南寨是副元帥齊穆西南寨是先鋒嚴敬分爲犄角之勢和太守先進了城急令整頓酒席一面差官犒賞三軍次後迎請元帥等一行人入府堂參見禮畢次序而坐和太守謝道卑職牧守此郡不期巨寇臨境困城月餘破在旦夕若非元帥親臨城陷必矣段韶道賊寇擾民本郡州縣官即當征剿爲何養成賊勢然後用兵豈不遲了數月並不見州郡一道表章誤卻朝廷大事公等責有攸歸和太守道卑職新蒞任前官不知何以致此但這夥大盜非比等閒自侵擾以來連下了十數座城於勢如破竹擁兵十萬戰將百員薛舉力敵萬人杜伏威法術高強張善相查訥深通韜略熟諳兵機非鼠竊狗偷之輩勢如泰山壓卵卑職死守此城連上表文方得二位元帥駕臨向來各郡州縣無不行文告急並不見朝廷遣一軍救應故此失了許多城池非郡縣官之罪也段韶歎道當今皇上初禪大位寵用和穆二樞密只是吟詩吃酒不理國政表章至京必被隱匿以致如此齊穆笑道和刺史何其懦也只說得杜伏威英雄自卻畏刀避劍保全首領安坐城內欲待虜之自退乎和太守道卑職力有不能非敢保全身家以負朝廷這夥賊寇委實智勇足備難與爭衡元帥須用計調兵方保萬全齊穆怒道都是你這些尸位素餐無能之輩誤國家多少大事我看這夥毛賊不過烏合之衆有何智勇材能不是齊某誇口明日一陣決擒此賊若不取勝非丈夫也和太守低頭不敢言語當日席散閒話不題次早五更齊穆預先傳下將令衆軍平明造飯巳時出軍自到段韶寨中相見齊穆道昨日和太守誇獎賊寇英雄今日齊某自領本寨軍三萬剿賊不須元帥和先鋒助戰預先稟過然後出軍段韶道元帥不可造次須要三寨參酌一同出戰以觀賊勢強弱庶可萬全不宜輕敵齊穆道某雖不材曾替朝廷建多少功績何在乎這夥無名草寇也若不取勝生擒賊首誓不回軍段韶道元帥所言正是英雄本色但要用心莫作等閒挫動銳氣齊穆得了段韶將令回寨整頓器械全裝披挂騎一匹銀鬃白馬手提丈人蛇矛帶領大將二員馬信孔囗一同出陣看我獨建頭功有詩爲證齊穆小兒曹徒矜志氣高不思螳臂力欲使泰山搖再說杜伏威張善相薩舉查訥佯輸逃竄鳴金收軍相隔杜陽山二十餘裏紮定營寨當晚張善相計議道來將元帥段韶正是那美人的父親交鋒之際須生擒此人方好成事若損其命只恐一段姻緣空付與東流逝水懇求近仁良計何以萬全杜伏威道三弟我與你金戈鐵馬與天下爭衡而溺志於女色恐非豪傑之襟懷也但愁不作奇男子何患世無美婦人何必戀戀于段小姐張善相揮淚道大哥有所不知弟與段小姐月下深盟神前誓約若不成雙彼願白首香閨一死以報弟願鰥居沒世永不別諧故以玉人羅帕爲記此天下女中之丈夫非等閒可比況此女窈窕溫淑知書達理才識兼高德色兩筆真有一無二之賢內助也弟若不得此女爲妻情願一死以相從于地下何羨稱孤道寡南面而王哉查訥道將軍不必悲傷欲與段小姐成親亦是易事但不知段元帥果是美人之父否擒得敵將便知分曉若果是另設奇計爲將軍完此姻事杜伏威道既如此說全仗軍師妙算當夜無話次日平明探馬報敵軍已到杜伏威薛舉繆一麟一齊上馬出陣對陣門旗開處錦鞍戰馬上擁出一員大將正是副元帥齊穆左首孔囗右首馬信三將立馬門旗之下杜伏威一馬當先喝道佞臣奸賊誤國之徒保守身家兀自不穩輒敢虎口捋須自送死耶齊穆大怒罵道無端草寇敢爾倡狂天兵已到頃刻化爲刀下之鬼杜伏威大笑手挺長槍殺過陣來齊穆舉槍架住二將奮勇大戰七十合不分勝敗虎賁將軍馬信見齊穆槍法緩慢怕有疏失手提宣花大斧拍馬助戰這邊薛舉挺戟接住廝殺官軍隊裏惱了一員虎將姓孟名孔放開戰馬舞動大刀橫殺過來這邊繆一麟拍馬挺槍迎住六匹馬盤旋馳騁六員將抵死相持酣戰之際馬信被薛舉一戟刺著右臂翻身落馬部下牙將拆死救回齊穆見馬信落馬心下慌張不敢戀戰敗陣而走杜伏威薛舉二將緊緊追來看看趕上齊穆回馬斜按長槍將流星錘照杜伏威臉上打來杜伏威側身躲過薛舉一馬飛到面前齊穆措手不及被薛舉輕舒猿臂生擒過馬衆軍向前綁縛官軍陣內數十員將校並力來救被杜伏威刺死五七個其餘只得退去孔囗單馬奔走繆一麟拍馬後追孔囗見遣將已近撥轉馬頭用力一刀砍來繆一麟一閃那刀砍了馬頭跌倒地上繆一麟跳在平地步戰孔囗欺他無馬咬牙齧齒裹殺來十分危急正是路逢狹處難回避事到頭來不自由不知繆一麟性命如何且聽下回分解第三十五回元帥兵陷苦株灣衆俠同心歸齊國詩曰老將西征膽氣雄旌旗蔽日馬嘶風長驅勁卒如貔虎藐視英豪似稚童計墮受圍幽谷內兵窮觖望邃林中結姻靖國降三傑轉敗爲功拜九重話說繆一麟被孔贅砍中馬首立地步戰漸漸勢危卻好杜伏威一馬飛到衝開將士救出繆一麟直取孔囗孔囗不敢交鋒撥馬便走官軍四散奔逃繆一麟換了戰馬同薛舉杜伏威一齊率軍掩殺殺得孔囗頭盔倒挂弓箭皆落正進退無路幸遇先鋒嚴敬軍馬已到救了性命嚴敬接住杜伏威兩下混殺一場俱備收軍回寨嚴敬救得孔囗到段元帥寨內來段韶發放回營又著醫生調治馬信金瘡查點陣亡軍士折有七千餘人段韶大怒恨道齊穆小畜生不諳軍務恃匹夫之勇輕敵取敗折了許多軍士自又遭擒喪盡銳氣若不剿除賊寇難回京都見皇上之面即傳將令差先鋒嚴敬次日帶領步軍二萬馬軍一萬衝突前鋒又差趙銀領軍一萬爲左翼洪修領軍一萬爲右翼辰時取齊進兵段韶在後督陣拔寨都起誓擒此賊方許回軍將令一出三寨軍兵各各打點次日出戰正是一更傳號令將卒要齊心二更刁鬥響專防賊劫營三更星月冷喝號與提鈴四更齊束甲嚴妝準備行五更皆造飯平明大出征話分兩頭再說杜伏威得勝日寨查訥分付將齊穆且收入陷車監禁教軍士看守好好待之就在寨內殺牛宰馬設宴慶賀犒賞三軍杜伏威和查訥等商議今此一戰挫動彼軍銳氣既擒彼將軍師不殺是何主意查訥道今日不斬齊穆也爲著張將軍親事就中用計緩急可圖故留此人以待後用杜伏威等同道軍師所見非常人所知查訥又道段韶見我們擒了副元帥必然激怒明日決起傾寨軍馬來了某聞段韶素有謀略非齊穆可比明日軍勢正銳不可交鋒緊閉寨門暗伏弓彎防備數日之外待其少懈如此如此用計何如張善相拍手道軍師妙計人不能及當日盡歡而散次日官軍先鋒嚴敬領馬步軍三萬一直哨到杜伏威寨前不見動靜就逼寨空闊處排下陣勢呐喊挑戰次後左右二翼洪修趙銀軍馬都到與嚴敬相見嚴敬道賊寨內不發一卒未知虛實如何不敢太逼趙銀道小將二人在此拒住先鋒可稟知元帥再行征進嚴敬慌忙到後軍見了段韶備言其事段韶道賊軍不出必有詭計不可輕動墮其計中汝選三千精銳馬軍徑沖賊寨若有變動隨即進兵若賊寨安然不動不可妄進只可擂鼓挑戰待其軍出然後交鋒嚴敬領了將令到前軍選精壯久戰馬軍三千擂鼓呐喊直沖到杜伏威寨邊只見緊閉寨門寂然不動自已呐喊到午亦無動靜又不敢衝殺入去馬軍暫且退後嚴敬又教步軍裸體辱駡誘戰至晚只得收軍回寨票覆段元帥元帥今夜間謹守鹿角以防劫寨次日段元帥又差嚴敬引軍搦戰自早至晚緊閉不出嚴敬又只得空回一連三日按兵不動段韶和諾將商議躊躇不決十分憂悶忽見巡哨牙將報入中軍口稱有機密事稟知段韶喚入帳下問之那牙將道末將昨夜帶數十小卒巡哨至東南僻路一上山之上遙見樹林中有族旗搖動軍士絡繹不絕又見本村百姓東奔西竄小將拿住問時都說杜伏威乏糧不戰只待黃昏帶領軍士近村擄掠殺害百姓因此人皆逃竄小將探得此消息特來稟元帥爺段韶道賊非無糧不戰必有詭計今夜再去哨探來報牙將領了將令當夜又差精細軍校分頭遍村哨探次早回覆都一般說鄉村百姓遭害賊黨到處雞犬不留擄得些少糧食只彀營中一日之費因此日搶日吃無心對敵段韶心中暗想此等烏合之衆以劫掠爲生或者糧草不敷是實不趁此時破之更待何日暗傳號令差先鋒嚴敬領馬步軍二萬申時動身往西北村一帶幽僻去處埋伏但遇賊軍擄掠鳴金爲號盡數剿除得賊首者爲上功嚴敬得令整頓軍馬去了又分付心腹牙將分頭把守三寨自帶趙銀洪修二將馬步軍二萬申時起馬往東南一帶僻靜鄉村去處埋伏等候捉賊卻說嚴先鋒領軍馬往西北上來到一個去處高山峻嶺樹木叢雜問土民說是地名虎嘯崗此正是強盜打劫糧草聚會之處嚴敬聽了分付衆軍各處埋伏只聽鳴金爲號會合殺賊看看天色晚了黃昏時分嚴敬和一班牙將立在虎嘯崗山頭觀望見遠遠塵頭起處火把亂明有一二千強盜提槍執棍背駝包袋喊笑而來嚴敬忙鳴金聚衆拍馬下山來擒這夥賊那一二千人見鑼聲響追兵齊集都棄了包裹糧食打黑火把盡投東山凹裏逃竄去了官軍一齊來搶糧食嚴敬禁止不住又見西山凹邊有千餘人皆駝包裹手執器械火把大喊而來嚴敬喝道瓦的不是劫賊來也忙催軍士趕殺也俱丟下包裹打黑火把亂紛紛走了嚴敬拍馬催軍追趕未及半裏又見一夥強人沖道而來慌忙殺時卻又四散去了此時已是更盡嚴敬分軍四國趕殺奈何路徑不熟又是崎嶇山路追趕了兩個時辰遇著數夥強人都皆走了不曾殺得一個嚴敬心焦領軍殺過虎嘯崗西首十餘裏已是半夜地名鐵檠嶺卻是一條小路兩邊都是蘆葦沙地嚴敬勒住馬看了一會喝軍馬不可前進且回舊路話未完只聽得一聲炮響如半空中打下一個霹靂驚得嚴敬等手足無措擡頭一看四圍蘆葦盡皆火燒此時正是初冬天氣西北風甚急火趁風威燒得遍地通紅如同白晝官軍被火所逼煙霧騰空立腳不住各顧性命自相踐踏死者無數嚴敬挺槍躍馬冒煙突火而走不上兩箭之地聽得炮響振天鼓聲動地山田內突出一員大將錦袍金甲白馬長槍喝道嚴敬中吾之計杜爺在此下馬納降嚴敬並不打話挺槍就刺二將交鋒只見漫山塞野皆是軍馬殺得官軍星落雲散嚴敬膽怯奪路便走杜伏威亦不來追趕嚴敬回頭看部下只有十數個軍士兩個健將隨著嚴敬問道這條山路可以到得大寨去麽健將道此路寂靜無人攔阻且從此撞出去再尋歸路嚴敬聽了拍馬先走行無半裏聽得鑼聲振地喊聲起處嚴敬戰馬早被絆倒樹林中走出三五百壯士將嚴敬健將等盡皆捉住不曾走了一個背剪綁了解入大寨來有詩爲證按劍挂征袍將軍膽氣豪今爲階下虜悔不熟龍韜此時杜伏威大勝一陣嚴敬部下二萬軍士大半被傷小半走脫再說段元帥和趙銀洪修二將部領二萬精兵往東南村來到得時已是黃昏段韶將軍士分爲十隊遍處埋伏等候捉賊自領一枝兵到一土山邊四面看時卻無樹木光蕩蕩的一座土山山上有一座土地廟段韶叫軍士人廟搜檢並無一人就在廟裏坐地軍士埋伏廟之左右候至更盡軍士報道山下西南火光中是一夥劫賊來也段韶慌忙上馬果見山下三百餘人手執器械點著火把推著三四十輛車子呼哨而來段韶指麾衆軍呐喊殺至山下那三百餘人棄了車子並火把四散走了又見西北首也有三四百人推著車子走來官軍趕殺時卻又四散去了頃刻之間有十數隊軍士推著車子徑到土山邊卻又走散段韶看了一會猛然省悟跌腳道誤中賊人詭計了分付軍士不可妄動動者立斬排成長蛇陣一字兒列在土山之下軍士立腳未定四下鼓聲震天火光竟起喊聲大振軍馬不知其數火光中見馬上坐著三員少年大將正是薛舉繆一麟查訥指點衆軍四面遠遠把土山圍了只聽得一聲梆子響話如雨發那十數處糧車箭到處盡皆火燒原來車中俱是疏黃焰硝引火之物火箭到處焰騰騰火勢沖天風煙亂卷段韶在土山上驚得魂飛魄散無計可施三千軍士與十數個護身健將俱被火逼得沒處安身著箭死者甚多只聽得一片聲喊叫道不要走了段元帥段韶和健將道勢已危迫不如拚死冒火殺下山去決一死戰一個健將應道賊兵甚衆火勢正炎若殺下山去必然有失小將看西北角上火勢稍緩賊軍略稀山坡下又有一條白路不如從此處殺下去方有活路段韶依言挺身一馬當先健將軍士隨後俱拚命並力殺下西北角來山坡下百余個壯士攔路段韶大喝一聲挺槍拍馬殺散衆軍下得山坡又是一將攔住卻是薛舉手挺畫戟喝道段元帥何不早降段韶大怒放馬就戰戰了數合薛舉賣一破綻撥轉馬放開一條大路段韶拍馬沖過奔山徑而走只帶得千余軍士數個健將其餘盡被薛舉軍馬擋住降者甚多段韶奔入山徑走無數裏擡頭一看只叫得苦原來這去處地名苦株灣是一個死坳裏從土山邊進來只有得這一條路兩邊都是崇巒峭壁前面又是一帶大闊溪並無船隻只可進來不能出去段韶在月光下見了大驚慌忙回馬不期路口已壘斷外有軍馬重重壘壘把守定了正是羊觸藩籬進退無路當下只得和軍士團團屯紮歎氣道一世英名不期喪於此地我死不足惜可恨誤卻朝廷重托遺憾九原衆軍健道元帥休慌權且捱過今宵明日我等打探再尋生路各吃些隨行乾糧揀空闊處暫且歇馬將息卻說趙銀洪修和七個總管帶領九隊人馬分頭埋伏擒賊不期遍處俱有伏軍暗弩陷坑大半皆被擒捉只有趙銀逃得性命原來這一條計策喚做調虎離山之計都是查訥軍師和張善相兩人商議定下的段元帥是馳名的一員老將萬夫莫敵軍馬精壯若與盡力相持必致有傷只教軍士故意到鄉村鎮市遍處搶劫引誘敵軍打聽得段韶部領軍馬到東南村來嚴敬軍馬到西北村去都預先埋伏兩處軍士等候段韶嚴敬果中其計當夜要擒段韶亦是容易只爲惜著張善相親事查訥分付薛舉臨戰不可相逼放開一條生路火車火箭只遠遠圍住施放驚他趕段韶入了苦株灣慢慢又做區處有詩爲證軍師妙算果通神變幻風雲計畫深少女不因成契合老夫應亦被人擒此時天色已明杜伏威軍馬得勝奏捷回寨衆將士各自獻功杜伏威一一論功犒賞已罷將嚴敬洪修等同齊穆一處監禁降軍萬數編人隊伍大排筵宴弟兄們慶賀功績杜伏威道查近仁妙算入微有神出鬼沒之機吾之孔明也查訥笑道微末小計何足爲奇今夜之戰只爲張將軍姻事如今把段元帥困在苦株灣插翅亦不能出明日釋放齊穆嚴敬洪修三將以禮相待浼三人爲媒去見段元帥求其令愛琳瑛小姐完張將軍這段姻緣若彼慨然應允必先送女完親方放他出穀兩相和解以待天時如其推託只消數日必餓死於山徑間矣張善相拱手稱謝杜伏威薛舉擊桌歡笑喜不自勝當日席散卻說趙銀與逃回軍士棄了三個寨柵奔入城內對和太守說知此事和用行大驚道段元帥被困吾等休矣只索嚴督軍士謹守城池杜伏威次早在中軍安排筵席一面差將校到監取出擒將齊穆嚴敬洪修三人相見齊穆等見有令箭來取都歎氣道我等今番休矣只見來人傳令盡去綁縛相見三人不知是何緣故只得隨著將校入中軍帳來查訥見了喚軍校捧過冠帶錦袍替三人穿戴了杜伏威薛舉張善相繆一麟等一齊迎入中軍行禮分賓主而坐齊穆道某等被擒之人將軍不加誅戮已爲萬幸何故待此重禮杜伏威道杜某弟兄三人因朝廷昏亂百姓倒懸起義兵除暴安民非爲私也義氣深重故爾豪傑同心公等皆朝廷大臣不忍加害今有一事敢煩齊元帥和二位將軍一臂之力不識可乎齊穆三人齊躬身道某等蒙將軍不殺放回就赴湯蹈火亦所不辭不知將軍有何使令杜伏威指著張善相道此位張將軍字思皇是吾弟也幼年曾聘段元帥次女琳瑛爲室不期段韶那廝倚貴欺貧負盟悔約今已被吾用計困於苦株灣內死在旦夕看張三弟姻事之面不忍加害敢煩三位將軍權爲媒妁以畢良姻如段元帥慨然聽從則佛眼相看將擒獲軍士器械盡數交還我等撤圍而退兩下罷兵若段公推阻不從休想再得生還煩公等善言贊助必當重酬齊穆三人同聲道這親事管取在某三人身上好歹成就以報將軍大德杜伏威大喜開筵相待互相勸酬並大吹大擂盡歡暢飲直至日暮齊穆道某等承將軍厚情叨此盛宴已酩酊矣恭承所命即便告行去見段元帥將張將軍親事講成然後再領盛情查訥道得齊元帥慨然深感厚意權且散席送出寨門叫軍士牽過駿馬三匹請齊穆嚴敬洪修上了馬作別而行卻說段韶當夜困在苦株灣四圍觀望無路可通見西南是一條闊溪心下想道這就是一條活路了明日令能慣水軍士沒過對岸去求取救兵或可出此重圍次日天明只見對岸旗幟飄揚已有重兵守把心下大驚正在納悶之際軍士報山嘴邊又有一隊軍馬來了段韶急整兵馬正欲迎敵近前來只得三匹馬卻是副元帥齊穆先鋒嚴敬總管洪修見了段韶一齊下馬段韶又驚又喜道三位已遭賊擒爲何得到此間齊穆等頓首道某等三人仗托今愛覆庇得留殘喘不然已爲泉下之客段韶呆了半晌問此話卻從何來小女在敞宅深閨之中焉能救得三公性命齊穆道有一段情節奉告聞令愛小字琳瑛今庚一十六歲果然是否段韶點頭道果是公何以知之齊穆道某等遭擒囚于陷車之內今早忽傳令箭取我三人入中軍某等自諒決死不期杜伏威等一班將錦袍冠帶加我等之身遜某三人帳中上座大排筵席款待酒席間談及令愛親事座中一少年將軍生得面如冠玉相貌清秀姓張字思皇說是令坦幼年間曾納禮聘第二位令愛琳瑛爲室不料元帥恃貴欺貧悔了親事目下起軍發馬也只爲著這一段姻緣以致如此杜伏威說若不看小姐之面我等俱爲齏粉就浼某三人爲媒求令愛與張君完此舊姻元帥若慨然允諾即時放出送還軍馬器械罷兵休戰儻若執迷決不幹休定交寸草不留如今沒奈何了段老爺救命的段菩薩段父母看生靈百姓分上送令愛小姐與那廝做親全國家大事救我等性命實乃萬代再生之德洪修嚴敬俱磕頭禮拜懇求道小姐完親上全國家之事下救數萬生靈未爲不可段韶聽說大怒氣得目瞪口呆手足俱冷道鼠賊以此挾我乎誓不俱生閉目坐了一會歎口氣道罷罷拼此老朽一命以報皇上知遇之恩大丈夫視死如歸豈有堂堂大臣與賊人結親之理有詩贊曰節義棱棱綱常秩秩豪氣淩雲精忠貫日齊穆又勸道事已至此無如奈何只得從權罷了比如元帥爲國而死乃臣子分內事死何足懼但無益於國家徒招禍害殺戮生靈干戈不得寧息儻賊党得勝以數千亡命之徒圍住貴宅豈有放過令愛之理令愛果能死節而亡足繼元帥忠烈之志倘或屈身從賊玷辱清名豈不成一場話柄元帥上不能爲朝廷掃除賊寇自經於溝讀之中下不能保守身家使妻女陷於賊人之手徒然一死無益於事爲今計不若將小姐暫許賊人勸其歸服亦是爲國忘家之心不失濟變之哲忠臣之所苦心智士之所獨斷豈不聞漢元帝以王嬙和番之事乎堂堂大國之君且不以此爲屏只爲宗廟社稷計耳元帥還宜三思段韶低首不語半晌道齊元帥所言雖似有理但有三件事賊人若允即送小女成親如其不然寧死而不辱齊穆道是那三件事乞元帥明示段韶道第一件小女琳瑛實未曾受聘賊所言皆虛謬也某昔日征海外諸國服六十四島蠻夷盡來朝貢方物一國極遠去古城國三萬七千里土産香玉進貢之余亦貢老夫玉人一雙一男形一女身精工奇妙其香特異老夫攜回家下次女琳瑛愛之老夫就與了他不意數月之前失去女玉人一個杳然無覓小女以此得病未痊如今張郎欲求親事我聞其深通奇術必須覓得這女玉人來配以完雙璧方可成就第二件必要張郎先來拜見待我觀其材貌果足相當不辱門楣方才事妥第三件更是要緊吾等奉命出軍不能剿除賊寇反遭詭計陷害逼勒成親一死尚不足償敗軍之罪況與結親則爲通同謀叛矣不推貽譏千古抑且取禍目前若賊人要娶吾女必須卸甲投降隨我至京面聖封官奏過聖上然後成親若能依此三事我亦不惜一女不然寧全家盡斬以報國任君等與賊行事也嚴敬洪修俱拱手道足見元帥慷慨全忠之大節某等三人去見杜張二人若能從元帥三事之命不必言矣如其不然某等亦願與元帥同死于此盡臣子之道豈肯婢膝奴顔以事賊耶段韶大喜道先鋒此言方合吾意三公早去早來吾拔劍以待死齊穆嚴敬洪修別了段韶上馬徑到杜伏威大寨來杜伏威迎入帳中坐定杜伏威道適煩三位將軍所言親事可曾諾否齊穆將段韶言語並要從三事之情備說一遍杜伏威笑道第一件要張三弟玉人爲聘此事最易這玉人張三弟藏之已久今獻與段元帥爲聘物正合前盟第二件既結絲蘿未有翁婿不相識面者亦宜拜謁但第三件實難從命我等起義兵以來所向無敵何等自在乃大海之龍沖天之翼任吾放蕩不受樊籠今一歸服便要拘束儻君心有變死無地矣齊穆道某久聞諸位將軍大名馳于四海朝廷用人之際若得衆將軍歸服必授顯官厚祿豈有加害之理某等三人願以全家之命保將軍安若泰山查訥道齊元帥與二位將軍暫退待吾等商議定了再報齊穆等退入後寨杜伏威道查近仁有何高見查訥道某雖不才叨元帥與諸位將軍陶熔頗知天文星象之理每於清夜仰觀足知天下變亂之故紫薇星昏而無光直待五十年後方有真命者出以定天下目今朝廷與陳周二國不過是紫薇駕下列宿而已杜元帥與我等輩又爲次之欲取天下不合天時甚爲難事自古道成則爲王敗則爲寇今齊後主雖非真命而高歡父子相承恩及百姓地廣民稠一時未可覬覦只可暫相依附不如且將計就計曲從段韶之言解甲休戈受了招安一來歸服齊主取功名于正路身居榮顯名垂竹帛亦是風雲際會之時不可錯過二來爲張將軍完此姻親諸君所慮者朝廷有變耳以愚度之決無害也當今後主株守西北之地陳周二國屢相侵擾是爲強敵在外國家又連年歲歉國用不支敵擾於外兵疲糧盡於內自救不暇焉能害人若得我等相助如困龍得水枯木逢春欣喜無限有何慮哉區區愚見若此乞大元帥諸位將軍酌之杜伏威薛舉張善相齊道近仁之言確乎不可易也只索歸服不必多疑查訥又道今當先以黃金千兩異錦千匹白璧二雙明珠八粒爲聘先令齊元帥洪總管送與段元帥處行納采請期之禮次後張將軍即便加冠令嚴先鋒陪至苦株灣拜謁岳翁就達歸降之意並獻玉人我寨中一壁廂整備筵席再差將官邀請段元帥並衆將到寨飲宴再議朝京杜伏威一一依查訥所議次早備牲禮祭獻天地張善相冠帶畢請齊穆等三將到中軍杜伏威備說段元帥三事我等一一皆依不敢違命齊穆大喜道將軍若能如此乃留侯之從漢高吳漢之歸光武不惟貴顯終身還得名垂不朽可欽可敬杜伏威道張將軍親事全賴元帥二位將軍贊襄之力今有菲薄聘儀納采請期煩勞先送上段元帥轉達愚弟兄微忱少刻勞嚴將軍陪張新郎即來拜見岳文矣齊穆道不須將軍費心某等必當盡心爲之杜伏威差健將八員隨齊元帥送禮到苦株灣內來見了段韶齊穆備道其事送上禮帖段韶笑道諸少年既識大義歸服朝廷便是一家人了受之何害下官豈惜一女但不知張郎人物何如學識何如齊穆道張郎人材自不必言且洞識天文深明韜略少刻即來拜謁元帥矣正說間將校報道山口有數騎擁一少年大將來到齊穆看時卻正是張善相帶著錦衣武士蜂擁而來齊穆對段韶道此正是令坦腹東床段韶舉目看那少年將官但見長軀秀骨白麵重頤目如點漆唇若塗朱頭戴束發金冠足登挽雲珠履身穿繡文龍錦大紅袍腰系雕鳳穿花白玉帶騎一匹追風趕電五花馬拿一條四綹攢絲豹尾鞭果然風流不下周公瑾倜儻還如呂奉先段韶看了心內大喜有詩爲證遙瞻來將真都麗善武能文多才技裘馬翩翩美少年這回不負風流婿嚴敬同張善相來到面前張善相跳下金鞍納頭便拜道張某蓬茅下士山僻村夫無知妄作冒犯虎威蒙岳丈天恩寬宥謹拜尊顔不勝惶驚段韶答禮道久聞足下大名果然才貌雙絕雖是一念之差且喜改邪歸正隨我回朝富貴永保張善相拜罷袖中取出羊脂白玉美人一枚雙手上獻段韶接了看時與那失去的玉人無二暗暗驚異笑道天賜姻緣夙成兩美今得賢婿如此不惟小女終身有托亦不負老夫向來擇婿之心張善相頓首稱謝少頃數員將官飛馬而來稟道杜薛二元帥排下筵宴專候元帥爺赴席送上請書當下段韶齊穆洪修嚴敬張善相衆人一齊上馬帶領部從出了山口迤邐行來正是殺氣轉爲和氣暖愁顔相逐笑顔開不知後會如何再聽下回分解第三十六回雙玉人重逢合巹三義俠衣錦還鄉詩曰玉人漂泊久無憑今日相逢兩遂情龍燭插金來鳳闕紫袍籠玉出宸京羅幃密綰同心結錦帕重傳舊日盟衆俠承恩歸故里共傾赤膽報明廷話說段元帥一行人出了山口行不半裏便遇著杜伏威等衆將遠來迎接齊到寨前下馬前遮後擁入中軍帳來杜伏威扶段韶居中坐了率衆將啓居參見段韶答禮道蒙衆將軍盛雅曲從愚意歸命朝廷老夫不勝慶倖何敢當此隆禮杜伏威拜道某等皆因勢豪所逼以致謀動于戈無非濟困扶危替天行道不敢妄爲蒙大元帥赦宥納降情願執鞭墜授以報殊遇張三弟又蒙俯賜良姻既爲結契之尊親實乃超拔之恩主也段韶道衆將軍年雖弱冠各負雄才文武兼通正堪爲朝廷之股肱廟廊之梁棟今能順天知命解甲而降准擬青史標名流芳千古下官見皇上備奏將軍等情由保諸位恩榮媲美稍或虛言有如此酒言畢以酒瀝地爲誓杜伏威等叩首拜謝請段韶居了正席齊穆次之其餘次序兩榜排列而坐奏動軍中得勝鼓樂酒過數巡段韶舉著金杯對衆道老夫獲此佳婿事爲偶然老妻曹氏向來無子只生小女二人長女球瑛適今朝內國子監祭酒經筵講官張雕目下因告養親回家其家與寒舍只隔裏餘次女琳瑛年方一十六歲小長女五歲因老夫久宦在朝未曾受聘今得與張郎永侍巾櫛小女終身有托光我門楣世間有這般巧事長女之婿姓張爲文章領袖次女之好亦姓張乃將帥班頭兩家一姓文武聯襟天下最難得者也非諸將軍福庇老夫安得有此快婿哉杜伏威等舉杯躬身道此太宰大元帥閥閱之福小將等何與之有段韶又問張善相道賢婿以玉人爲聘諧此姻事但這玉人老夫昔日征異域得來乃是香玉非中國諸玉可比次女琳瑛見而愛之遂與玩弄不意中秋之夕小女拿出一玩次早不見了一個小女著驚因而抱病至今未愈此玉人出此萬里之外縱使錢如山積何處去買素聞張郎善於法術故以相難不意果得此玉人又系舊物不知張婿何術所致從何處得來張善相躬身道承岳父明問小婿不敢不以實告小婿因走馬踏死人命棄馬脫逃至檀府花園後門見園門半開時已二更無奈潛身入園躲避蹲于靈應大王神廚下尊婢春香姐適來鎖園門小婿以苦情訴之蒙不趕逐匿小婿於園之東軒次早瞞著夫人小姐私竊飯食救濟小婿小婿深感其德遂與訂盟異日寸進必娶爲妾春香姐遂薦枕席有一宵之愛小婿問及檀府姓氏家門春香姐備與小婿言姓段老相公在朝爲都督之官夫人曹氏在家有小姐琳瑛年方一十六歲與小婿同庚美麗無比未曾受聘於是促小婿出門恐夫人知覺小婿以乏盤費告之春香竊小姐玉人一枚相贈雲此乃無價之寶貨之可得千金因此小婿得這玉人珍藏至今乃岳丈之舊物也豈有法術可致但小婿既與春香訂盟必報其一飯之德若非春香救援小婿焉有今日悖之不樣今得結絲蘿爲岳丈之半子望成就兒女之私遂小婿得隴之望並賜春香爲妾俾私情信義爲兩全也岳丈大德銘刻不忘段韶笑道可知小女不見了玉人更無覓處乃春香這妮子竊去老夫要加刑罰他一味左支右吾原來是他竊與賢婿但這妮子是廝役賤婢豈堪與郎君爲妾既有所約老夫必當奉贈只是大便宜了這妮子也張善相大喜頓首致謝衆皆歡悅盡醉方休是夜段韶等一班就在杜伏威寨裏安歇部下兵另屯一寨次早升帳諸將聚立段韶道諸位將軍既已歸順朝廷不可在此羈滯幸早早入京面聖杜伏威道某等願隨大元帥朝京但各處城池守將俱是某等部下乞元帥鈞旨定奪然後起行段韶道各處所委守城將士皆依舊職不宜更動奏過朝廷論材升擢杜將軍隨行一班將士同赴京師所有十萬餘衆可分撥各處守衛城池將軍等略帶軍士朝京杜伏威與薛舉張善相查訥計議此事查訥道今觀段元帥乃誠實長者所行之事盡皆合宜決無他變我等選三千精銳軍士隨行防護足矣查訥當下分調軍馬令常泰等一班戰將守衛各郡城池王騏王騋王驤弟兄三人監守諸郡以防不測杜伏威薛舉張善相查訥繆一麟五將帶三千鐵騎隨段韶班師分撥已定拔寨起行不數裏已到岐陽驛刺史和用行預於驛內辦下筵席邀段韶杜伏威等赴宴一面犒賞三軍此是慶賀太平筵席各無疑慮開懷暢飲當晚皆宿館驛中次早起行和知府送了十餘裏拜別自回一路無話直抵晉陽段韶和齊穆商議發付杜伏威等軍士權在城外梵天寺中屯紮著嚴敬趙銀馬信洪修廉孔囗五將相陪遊玩段韶齊穆二元帥進城到五鳳樓前早是午牌時分後主尚未退朝黃門官啓奏段都督得勝班師在朝門外候旨後主大悅即宣二元帥進朝俯伏金價三呼萬歲已畢後主道巨寇猖獗失陷許多城池賴二卿智勇一戰成功朕心嘉悅段韶將交戰中計招降之事陳奏後主驚道二卿老成持重反道賊人奸計若非以忠義感動其心幾乎喪師辱國今得歸附皆二卿之功也段韶叩頭道臣等僥倖成功陛下洪福所致臣等何功之有但杜伏威等俱少年豪俊萬夫之敵原非叛逆皆緣貪官污吏肆志暴虐克剝小民激起英雄之氣以致震驚乘輿今知天命解甲來歸乃社稷之靈陛下天威所懾乞陛下待以優禮賜以厚祿團結其心足爲朝廷重鎮管取周陳二國聞風畏懼不敢輕覰本國矣後主准奏又問杜伏威諸將今在何處宣來面朕段韶奏杜伏威一行軍馬權在城外梵天守中專候聖旨後主禦筆手詔赦杜伏威等之罪差近臣二員飛馬召來兩個天使奉聖旨立刻往梵天寺來杜伏威等五人見聖旨到了忙排香案開讀已罷隨即同天使進朝黃門官引入金鑾殿前山呼舞蹈後主見五將人材表表相貌堂堂喜動龍顔頒下玉音道朕聞段太宰所奏足知卿等忠義之心所有過犯盡皆赦宥杜伏威等叩頭謝恩後主又道朕嗣位以來道時不造干戈競起強敵侵淩卿等盡心爲朕出力必不有負杜伏威當先奏道臣等蓬茅賤士韋布愚夫幼讀詩書頗知大義因見國家多事賊寇蜂起故聚義兵爲陛下除亂奈守土官不察反以外盜相禦勢不由己以致驚動天兵罪當萬死感蒙天恩臣等肝腦塗地不足以報萬一也後主聞奏大喜著光祿寺賜宴議封官職五將謝恩出朝領宴不題段韶當駕又將次女琳瑛許配張善相之事俯伏奏聞後主道此卿家事得婿如此汝女終身有托任卿爲之段韶叩頭謝恩天子退朝衆臣皆散次日早朝百官拜舞罷大司馬韓長駕出班奏道杜伏威等雖受招安部下將士數千原系亡命之徒屯聚梵天寺中切近皇城設有不測何以禦之乞陛下聖旨先將他人馬調散然後授杜伏威遠方官職伺彼有隙緩緩除之庶免後患後主低頭不語尚書仆射和士開向前道韓司馬之言深達國計陛下不可不從臣觀杜伏威諸將年少英雄抱負不凡終非久屈人下者不如及早圖之以免後患後主躊躇不決只見段韶連聲道不可不可和尚書韓司馬所奏誤國非淺當今時世亂離干戈不息周陳二國屢侵邊境疆圍日促萬民塗炭國家急務惟在收羅豪傑延攬英雄固結其心藉彼勇力以保社稷乃爲上策今杜伏威等俱有文武全才得來歸服國家之大幸也陛下苦委以重任賜以厚祿彼必鞠躬盡瘁以報陛下何故欲調散其衆疏遠其身以啓彼攜貳之心儻一時有變是激之反也若說俟彼有過殺之誅降戮順又非朝廷待賢之典苟慮杜伏威諸將有變臣敢以全家保之後主聽罷大悅道聆卿所論使朕豁然杜伏威等當授何官方稱其職段韶奏道臣觀杜伏威薛舉精通法術力敵萬人可當大將軍之任張善相查訥深明天象善曉兵機智勇足備可居藩鎮之職繆一麟弓馬熟閑善撫士卒可居邊隅保障之職今西蜀一帶地方自楚州至蒲原滬雅蠻僚錯雜朝變夕更每每殺害官長劫掠賦稅甚且稱王建號大肆淫毒從晉末迄今二百餘年殆無寧日非智勇足備者不能鎮之陛下宜授杜伏威等三人鎮守西蜀得專征伐則西北一帶地方必然無事可免朝廷北顧之憂後主允奏禦筆親封杜伏威爲鎮安侯靜國大將軍帶領本部軍馬一萬鎮守西蜀楚州江油二郡管轄三州二十一縣地方封薛舉爲信陵侯定國大將軍帶領本部軍馬一萬鎮守信州牂牁昌城三郡管轄一州二十縣地方張善相爲安化侯護國大將軍帶領本部軍馬一萬鎮守青州蒲原漢嘉蒙山滬州等處管轄三州十七縣地方查訥繆一麟爲顯武將軍查訥輔佐杜伏威鎮守楚州繆一麟輔佐張善相鎮守青州各賜黃金千兩錦段三百匹廄馬千乘其餘常秦諸將等皆授武德將軍分隨杜伏威等蒞任待後有功升賞外欽賜張善相龍燭一對金花二朵錦袍一襲玉帶一條擇日段府成親段韶加爲太宰總督大將軍齊穆升爲副總督將軍嚴敬升爲昭勇將軍其餘出征將士皆升一級又著樞密院差官查視延州諸郡縣所少官員量材擢用補缺拾遺如奪任者照舊供職段韶率杜伏威諸將赴闕謝恩杜伏威又上表陳奏臣等感陛下天恩寵賜爵祿富貴極矣懇恩乞賜臣等暫回故鄉省親祭祖以彰陛下寵榮伏乞聖旨後主允奏賜五臣衣錦馳驛還鄉五將謝恩帶隨行軍馬與段韶即日起行有詩爲證身惹禦爐煙將軍衣錦還聲名馳故里譽望振邊關再表段小姐琳瑛自夫人遺張善相去後病體懨懨漸加沈重四肢無力諸事慵親未免害了些目傍木日下心的症候春香再三勸慰說小姐張官人決不負心榮歸有日何苦愁損玉容小姐蹙著雙蛾長籲了一口氣道春香你那知道我心事來老爺與老夫人許大年紀並沒一個子嗣只生我姊妹二人大小姐嫁了張翰林十分貴顯甚是得所只我一人未聘夫人嘗說要將我招個贅婿奉養天年只待老爺回來我嘗思張官人之言這些公子王孫佳者能有幾人儻招了一個不尷尬的不如姊夫豈不誤了我終身之事所以看得張思皇這人英俊天成紋犀貫頂乃大貴人之相抑且與張姊夫同姓又與我同庚一時不思與他月下有羅帕玉人之約然事不三思終貽後悔平白地遇個男兒怎麽就把千金之軀相托想此人豐標多情一朝貴顯豈無佳人求配那時別娶嬌姿那裏還記得月下之約我若永守前盟夫人逼嫁必然是死我若從了父母之命又背了月下深盟禽獸不如進退兩難因此日加沈重春香道小姐且自寬心若老夫人逼小姐改嫁時春香就對夫人直言說小姐已與張官人月下私期成了親事難道又好贅得別人小姐嗔道呆丫頭倒說得好太平活兒羞人答答這事如何好提今張官人一別杳無音信不知他蹤迹何如安否何如功名何如好生教人放心不下昨日心緒無聊偶然制得羅帕玉人回文絕句二首念與你聽題羅帕詩曰羅香一幅半題詞月囗盟深刻漏遲何奈可沈魚與雁夢入愁念系人思回文雲思人繫念愁人夢雁與魚沈可奈何遲漏刻深盟繳月同題半幅一香羅題玉人詩曰雙成再面郎如玉獨處堅心妾比金香玉遠分人異地鳳鸞交拆兩同心回文雲心同兩拆交鸞鳳地異人分遠玉香金比妾心堅處獨王如郎面再成雙吟罷淚如雨下春香道小姐好詩顛倒回文兩韻俱和小姐可寫在錦箋兒上待張郎來時索落他也和兩首小姐道知道他來與不來多應是九泉相見春香道我倒忘了與小姐賀喜小姐問喜從何來莫非張官人有書寄回春香道不是張官人寄信卻是老爺殺賊得勝回朝早間有報子來說老爺升官加爵即便回家那時玉人必有分曉小姐請允愁煩不說小姐病害相思再說段韶與杜伏威等回家不一日已到常平鎮段府門首段韶留杜伏威等在客廳安歇每日大排筵席款待衆軍士各給口糧分投寺院客館權駐段韶初到之夕對夫人細言出征被陷張善相獻玉人求親招安之事目今欽賜龍燭金花錦袍玉帶擇日與女兒完親夫人驚道果然有了玉人真大奇事心中暗思前者園中避難郎君名爲張善相如何賊中亦有個張善相莫非就是他這玉人來得有些蹊蹺沈吟不決段韶見夫人不言又道還有一段奇事夫人未知遂把張善相避難入園春香丫頭瞞著夫人與他東軒私合偷玉人贈張善相欲娶爲妾之事細細說與夫人因此這玉人原是故物夫人聽罷畢竟疑心那日黑早張善相誤入清暉堂之事終未釋然只得含糊應道原來是這丫頭偷了蒙聖恩欽賜榮歸了此良姻又加大爵正爲雙喜只是女兒病體十分狼狽如何合