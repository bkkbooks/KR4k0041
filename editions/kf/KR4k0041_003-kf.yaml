body:
  text: 第三十九回順天時三俠稱王宴李諤諸賢逞法詩曰宦遊西蜀已多年深感齊君德二天聞訃調兵非浪戰稱王據地豈從權暴君失位仇先斃聖主臨軒詔入川虎鬥龍爭神變化各施幻術實高賢話說杜伏威一行人馬自回楚州即于帥府前豎起一面黃旗上書盡忠二字自立爲天定王封查訥爲總管大元帥都督內外諸軍事王騋爲護國軍師副元帥尉遲仲賢爲鎮國大將軍其餘官員各加官職薛舉回鎮打探得杜伏威消息亦豎起黃旗一面上書全忠二字自立爲西秦王封王驤爲總鎮大元帥都督內外諸軍事朱儉皇甫實曹汝豐俱爲鎮國大將軍以下將士皆升官爵張善相知道亦豎起黃旗一面上書精忠二字自立爲萬壽王封常泰爲總鎮大元帥都督內外諸軍事王騏爲護國軍師副兀帥繆一麟黃松爲定國大將軍以下文武將士俱加官職三處俱蓋王府宮殿立宗廟社稷招賢納士積草屯糧聚集軍馬整頓器械依舊尊奉開王承光元年年號各殺牛宰馬郊天祀地祭享宗廟後賢有詩爲證快氣淩霄漢精忠貫日月先後如一心始終盡臣節再說周高祖滅齊之後聚集文武官員計議取蜀大都督楊素奏道臣聞西蜀杜伏威等國富兵強山川險阻近知陛下滅齊他即據地稱王其志不小非智勇足備之將不足以當之邇者陳人窺我滅齊心必妒忌徐充二州與彼境接壤豈無垂涎之意若陛下親征提兵遠出彼必乘虛而襲內難不靖焉能外攻臣愚不如先陳後蜀以次蠶食方可一統山河內外無慮周高祖心下猶豫不決忽探馬報陳國差鎮南將軍吳明徹督領大軍十三萬侵犯邊界周高祖笑道不出楊都督之所料也即授楊素爲大元帥總督軍馬彭城王宇文軌爲副元帥一同迎敵楊素率精兵五萬出間道絕吳明徹糧草要路不及半月吳明徹無糧軍士盡皆潰散宇文軌乘機攻進吳明徹大敗身中流矢被周兵所擒部下軍馬器械輜重盡沒于周因此結怨戰爭不息兩下牽制周主不敢興兵入蜀建德七年五月周高祖疾篤駕崩群臣奉太子贇即位是爲宣帝建號宣政未及一年傳位於太子闡稱爲靜帝改元大象靜帝寵用一員大臣職居首相權傾內外此人姓楊名堅小字那羅延弘農華陰縣人也漢朝太尉楊震之後其父名忠出仕東魏後東魏禪位於周世宗楊忠又事周爲司馬屢建功績封爲隋國公忠死楊堅襲父之爵執掌朝綱位居塚宰總督內外軍馬革周朝苛政更爲寬大選拔人材躬履節儉天下大悅未及一年進爵爲王是時乃周大象三年春二月也周靜帝下詔遜位於隋自居別宮楊堅遂即皇帝位建號開皇元年文臣有高熲蘇威李林李諤輔佐武將有楊素韓擒虎賀若弼統兵天下疆日隋國已得其七此時陳後主叔寶年幼無德溺於酒色光昭殿前起造臨春閣結綺閣望仙閣各高數十丈連延數十間門窗欄杆妝飾皆是沈檀異木外施珠簾內有寶床寶帳玩器寶貝堆積如山每微風漸至香聞數裏其上積石爲山引水爲汕雜植奇花異卉晝夜飲酒作樂嬪妃彩女皆爲女學士與詞人才子共賦詩互相贈答選其新豔者編爲樂府新聲擇宮女千余習而歌之其曲有玉樹後庭花臨春樂等君臣酣歌暢飲自夜達旦諫官皆遭殺戮奸佞濫叨爵位天下大亂盜賊蜂起隋帝遣賀若弼自北道韓擒虎自南道水陸並進伐陳軍威大振沿江守將望風而遁陳國驃騎將軍任忠迎降引韓擒虎直入朱雀門來擒陳主宮中大亂君臣各不相顧陳主慌迫自投禦國井中軍人窺見將繩索引之而上執送長安自是陳亡隋家混一區宇隋文帝與文武群臣議道朕今日成一統四夷賓服只有隴西一帶地面被杜伏威薛舉張善相三人所據朕欲發兵討之衆卿以爲何如賀若弼道杜伏威等小寇疥癬之疾耳臣請得精兵一萬數月間必斬三賊之首獻于陛下只見一大臣紫袍金帶象簡烏紗出班諫阻文帝視之乃諫議大夫阮繪也原來阮繪自同尹氏回家一載後奉母命往長安訪親與司徒高熲是兩姨兄弟高熲薦之于隋公授漢陽縣令曆有政績後陷公即位欽取爲諫議大夫直言敢諫不畏權幸文帝重之當下見帝有征蜀之議出班道賀將軍雖然英勇不知杜伏威薛舉張善相三將非等閒小寇可比杜伏威深通天文兼精法術施仁好義甚得民心薛舉勇力超群萬夫莫當張善相抱負奇偉精通韜略況路程險阻糧食不繼彼若深溝高壘自守不戰則進難與交鋒退又恐其掩襲徒費錢糧空勞兵力無濟於事依臣愚見只宜遣一介使臣賜以優詔厚幣誘其歸服此爲上策如彼倔強不從然後加兵此乃先禮而後兵攻無不取也隋文帝道卿言甚善隨寫三道詔書各賜黃金千兩彩段千正差侍中禦史李諤即日起程李諤陛辭文帝齎詔取路來到信州地界卻是西秦王薛舉所轄李諤先差部下種將進城通報薛舉差官上城探望回覆道只有李禦史一人部下種將數員僕從數十人而已薛舉宣王驤朱儉皇甫實曹汝豐上殿商議王驤道臣聞李諤乃隋文帝第一個直臣文武全村此來決爲說客下說詞誘主公降隋之意必帶詔書禮物主公不可收之詔書亦不可開讀且先問了來意厚禮相待安頓驛中差官星夜迎請林師爺天定王萬壽王查近仁會議定了然後見機而動庶無差失薛舉依言即差王驤曹汝豐二將迎接李諤入城留在館驛安歇次日薛舉差官迎請李諤相見薛舉降階相迎至殿上相見賓主而坐薛舉躬身道久仰侍中大德關山修阻不克領教今幸光臨足慰渴想李諤道區區一介儒生何足挂齒久慕大王英名蓋世德政遠敷素所畏服但大王懷不世之才抱孫吳之略戰勝攻取若能輔翼英主以定天下雖古良將莫能過也何乃竊據一方僭稱年號位非天子爵非諸侯雖然雄霸一時終非久長之業今我主上仁明雄略重賢禮士天下歸心四海賓服山河一統只大王等未曾歸附耳吾聞識時務者呼爲俊傑以一隅而欲與全隋抗衡如螳臂之捍泰山多見其不敵也今主上聞大王等素稱忠義不忍加兵特差李某送黃金幹兩彩段幹正詔書一道禮請歸朝伏乞大王改邪歸正名垂千載莫以某言爲迂實有益於大王也薛舉道承天子洪恩感侍中大德本宜拜命趨朝奈孤等兄弟三人同盟一體凡有事務必待天定王萬壽王相會之後方有定議詔書未敢開讀幣禮未敢擅收伏乞侍中海涵乃大設宴款待送於賓館安息過了十余日林澹然杜伏威張善相查訥陸續皆到信州薛舉迎入一一相見備言此事林澹然道俺夜觀乾象隋帝亦非真主聞其爲人猜忌苛察聽信讒言子弟如仇多疑好殺惟以詐力取天下諸子皆驕恣無德非久遠之基也聖人雲得之易失之亦易只三十年必爲亡周之續矣但當今已成一統豈容汝輩各據一方若不歸服必起戰爭生靈塗炭率爾投順又非保全之計進退皆難未可造次查訥道某仰觀天象與師爺所論相同隋帝無德而居大統加以子孫自相戕賊亡可翹足而待也今賴文臣武士協忠相輔得以夷陳滅齊禪周主之六位被不加兵取蜀而反以禮聘是先禮後兵之術也拒絕之必起傾國之兵而來又恐寡不敵衆一旦以土地歸之又慮不能保其始終爲今計彼以禮來吾且以禮答厚待李諤贈之金帛隋帝聘幣加倍還之以爲貢獻暫奉其正朔托言西蜀一帶地面蠻僚錯雜不時變亂三主鎮守數十年民夷貼服四境安寧若一旦擅離恐僚蠻依舊作亂百姓遭殃爲害不小懇乞天恩欽賜舊職鎮守以爲西北保障歲貢不廢朝廷有事必來赴援隋帝若知機從吾等所請且暫稱臣牧兵自守待時而動如其不然遣軍發馬遠來蜀地險峻糧草不繼我等守險塞要堅壁不戰待被師老糧盡退軍之時然後出奇兵以撓其後雖不能全勝亦可使隋軍喪膽又有一計秋收之際佯征軍馬聲言掩襲彼必屯兵守衛足以廢其農時彼兵既聚我即解甲彼兵已退我複進軍虛虛實實使其不得安逸我再陰蓄精銳收錄英傑俟隙而舉則天於大事未可知也林澹然道近仁陳說大計深合玄機天數已定非人力所能斡旋不如屈節降之再圖後舉杜伏威張善相俱備拱聽商議已定次日排香案迎接李諤進殿開讀三道詔書奉天承運皇帝詔曰朕承天命撫有輿圖四海擴清妖氛淨掃惟爾西蜀杜伏威等竊據一方尚未納款朕念生靈塗炭不忍加兵特遣殿前侍禦史李諤齎到黃金百鎰彩段千端遠聘賢豪委以大任詔書到日爾其悉將所蒞土地甲兵歸附朝廷無廢朕命則明良會合寵渥有加欽哉故詔開皇二年七月日詔衆人謝恩畢林澹然上前和李諤相見次後一一行禮李諤坐了客席林澹然坐了主位杜伏威等次序列坐李諤見林澹然是一個老和尚三王以師禮事之心下疑惑又看杜伏威薛舉張善相查訥等人材魁偉相貌英雄心下十分欽敬躬身問道老禪師高姓尊號壽齡幾何林澹然道老僧姓林法名太空別號澹然今庚已是九十一歲矣李諤驚道觀吾師尊顔不過半百詎料壽近期頤非全真內養何能致此林澹然道老朽雖生已無益于人世指著四人道這是天定王杜這是西秦王薛這是萬壽王張這是護國軍師查皆出老僧門下頗識兵機亦通武藝適見天子詔書足感皇上洪恩又聞西秦王達侍中鈞言銘刻肺腑本當赴朝面聖奈其中事有委曲老僧只得稟明當初蒙齊後主大恩封天定王等三將留守西蜀蒞任以來屢遭蠻僚叛亂王等再三征討方得貼服數十年幸而安息今若擅離此地猶恐變亂複生殘民擾境爲禍匪輕乞侍中轉達聖聰三王願稱臣奉貢遵天子正朔歲歲獻納不廢朝廷如有差調無不竭忠用命懇求天恩錫以王爵願爲國家西蜀之保障若得允俞皆出侍中之賜也李諤道皇上久聞三位大王英名故差李某聘請並無他意今若稱臣貢獻遵奉正朔足見大王等高明遠見應天順人聖主良臣共成喜起李某回朝必當爲三王轉奏林澹然等同聲稱謝說話間筵席已備邀李諤赴宴酒至數巡樂供幾套李諤辭道下官天性不飲感禪師諸位盛雅不得不領數杯今已酩酊即此告辭杜伏威道粗肴薄酒非待天使之禮儻蒙不棄盡醉爲感李諤只得又飲數杯正欲推辭只見座中查訥起身道自古酒以合歡非選伎征歌不足以鼓豪興鼓樂之類皆系尋常仆幼年頗諸音律亦嘗歌詠今有小詩意欲獻笑侑觴不識可乎李諤道承不吝金玉下官拱聽查訥擊節而歌道西蜀宣威百萬兵將軍號令自嚴明旗穿麗日雲霞燦山倚秋寶劍戟巾曾鼓角聲催巫峽曉弓旌影照錦江春九重恩澤從天降悉秉丹衷拜紫宸查訥歌罷清音繞梁李諤大喜稱謝查訥命內侍進酒李諤立盡三觥少頃薛舉張善相起身道適查近仁奉歌勸酒侍中不拒愚弟兄不能歌但舞劍以助一笑李諤辭道焉敢勞二位大王李某實不能飲矣薛舉道侍中休笑試觀一擊以侑三觴說罷和張善相即於筵前卸下錦袍金冠換卻紮巾繡襖手持雙劍拽步出席到殿中對舞李諤看了目炫神驚有詩爲證雙龍飛躍雲霓泣六尺潛驚鬼魅愁試看二王相對舞直須斬卻佞臣頭張薛二王舞罷李諤喝采道二王劍法天下無敵四海不足定矣薛舉張善相遜謝內侍即忙進酒李諤又飲三觴林澹然道李侍中誠爲酒海杜郎可無侑酒之物乎杜伏威道有惟恐侍中不可口耳林澹然道他物不足爲奇惟鮮桃庶幾下酒杜伏威走入殿中步罡撚訣口誦真言只見風過處現出兩個青衣童子躬身道吾師有何使令杜伏威道今有天使李大人在此飲酒無以爲敬可取仙桃二枚麻姑酒一壺獻來童子唯唯騰空而去少頃一個童子捧桃一個捧酒從空而下杜伏威接了桃酒送與李諤發付二童子去了李諤驚異問道童子何人何爲桃酒從空而得杜伏威道此乃仙桃非凡果也侍中食之可以延年此酒亦是仙酒侍中飲之可以除病二童子仙童也適從蓬萊至此今已歸彼處矣李諤謝道下官有緣得大王賜此仙品感激不盡吃桃之味香美異常飲酒下咽神氣清徹心中大喜內侍們又欲進酒李諤再三推辭杜伏威分付撤席此時已是二更天色晴朗月明如晝林澹然一行人邀李諤入殿后花園亭子上坐下閒談玩月李諤指月道這一輪玉鏡不知照遍了古今多少豪傑正是皓月照今古英雄何在哉正歎息間見微風漸起彩雲數道蕩漾中天李諤道雲氣變幻無窮倏忽如龍似虎人情世態大率相同林澹然道龍行雲護虎嘯風生此皆世間氣物相感侍中曾見之乎李諤道下官自幼曾一見活虎若龍乃神物絕不可得一睹也林澹然道張郎試取神虎與傳中觀之張善相承命袖中取出一小葫蘆長有三寸許右手執之左手撚訣口中默誦咒語喝聲道疾只聽得呼呼風響葫蘆口內跳出一虎大如桃核躍在地上乘風把頭一搖就地滾上數滾變成一個斑斕錦毛大虎咆哮可畏李諤仔細看時但見錦毛遍體脊上閃一帶金絲俐爪四舒口內排兩行劍戟雙睛炯炯電光閃爍逼人寒鐵尾班班雷震咆哮諸獸恐須通道風中隱豹真個是氣可吞牛南山白額人皆懼東海黃公見必愁李諤看了暗暗稱奇林澹然喝道孽畜還不皈依那錦毛虎就伏在亭子西首不動林澹然又顧薛舉道張郎取虎爾試取神龍以助一笑薛舉承命即于張善相手中取葫蘆過來亦撚訣誦咒又一陣風起葫蘆口內飛出一龍大如蚯蚓乘著風盤旋數轉變成一條大黃龍飛舞於園內李諤仔細再看但見雷霆乘變化風雨助驅馳頭角崢嶸黃森森滿身鮮甲爪子峻利赤耀耀兩道虯須來海嶠千里奔騰過禹門只須一躍明珠藏頷下有翻江攪海之威喉內隱逆鱗具旋乾轉坤之勢若非大禹舟中見定是延平澤內飛那龍盤舞了一會林澹然喝教收斂那龍龍昂頭蟠於亭子東首柱上這時節已有五更只見斜月挂山玉繩低轉李諤道天將曉矣二位大王可發付二靈去罷薛舉張善相又念真言見兩個神將乘雲而下一個三眼四臂一個三頭六臂奇怪可畏立於亭前道吾師有何法旨薛張齊道今夜李大人賞月無以爲樂遣水族山君召二神一戲伏虎者騎虎降龍者乘龍各逞神通毋得怠慢那兩員神將應諾一個乘龍者三眼四臂一個跨虎者三頭六臂各使器械共有十般槍刀劍戟鏟杵叉鈀鋼鞭大斧在花園內空中一來一往大殺一場但見陰雲蔽月殺氣漫空騎龍的怒咨青臉銅鈴眼放萬道金光騎虎的倒豎赤須血盆口吐千條火焰一個盤旋轉踅劈開山嶽伏龍神一個跳躍奔騰掀轉乾坤降虎將刀對斧叮噹音響鈀擊杵嘩剝聲鳴天王見了也躬身地煞遇時須拱手李諤看得眼花驚得神竦稱羨不已那神將鬥了一會林澹然喝聲住手只見這兩員神將乘龍騎虎騰空而去一陣狂風過處都不見了李諤不住口喝采林澹然道二王戲術耳不足爲奇老俗也取一物相贈命內使打掃淨室內置大紙二幅文房四寶閉上房門三王並衆人俱拱立以觀聖作只見林澹然手拿蠅拂口中念念有詞喝聲疾將蠅拂柄兒擊門一下聽得房中擱筆之聲澹然令開門進看原來畫成兩幅好畫一幅畫群龍在雲霧中波濤洶湧名爲群龍出海圖一圖畫高崗之上梧桐之下鳳凰一隻對日長鳴名爲丹鳳朝陽圖上俱題僧繇寫乃晉朝張僧繇畫龍不點睛之人真仙筆也林澹然對李諤道此幅丹鳳圖若久雨不晴不必諸般祈禱只把這幅圖挂起即刻雲收雨散紅日當空若挂一月一月不雨挂一年一年不雨要雨時必須收起此畫不然再不能得雨也這幅群龍圖若久暗不雨但把此畫挂起立時烏雲蔽空猛雨如注若要晴時須收起此畫查訥問道師爺此畫實爲奇寶倘兩圖齊挂豈不又晴又雨乎林澹然道不然要雨處方挂群龍圖要暗處方挂丹鳳圖若兩下齊挂則晴處自晴雨處自雨不相妨礙所以爲妙若挂作一處又不大晴又不大雨是爲陰天其應如響不可輕褻將丹鳳圖裱起進貢皇上爲鎮國之寶將群龍圖裱起贈與侍中爲傳家之寶聊伸老僧芹意李諤大喜頓首拜謝說話之間不覺城市雞鳴已是天曉李諤身子困倦就在花園書室裏憑凡而睡午後又整筵席相待一連住了數日李諤拜辭告行林澹然等再三款留不住只得置酒餞行杜伏威薛舉張善相共修三道表章稱臣貢獻各進金銀二車明珠十顆白玉屏風四架珠簾二挂蜀錦千端壁玉圭一方仙畫一幅李諤又各各厚贈寶物仙畫林澹然等直送至南陀驛分別李諤帶了僕從一路無話直到京都朝見隋文帝舞蹈畢文帝道勞卿遠使西蜀事體若何李諤奏道托陛下洪福入蜀不費辭說西秦王薛舉天定王杜伏威萬壽王張善相接了聖諭情願稱臣奉朔歲歲貢獻不廢但言西蜀蠻僚錯雜朝更夕變性若犬羊不服王化一自三王出鎮蠻僚盡皆畏服若一旦擅離惟恐生變百姓遭囗懇乞天恩賜以王爵複鎮西蜀誓不更變朝廷有事出軍相助陛下不如將機就機待以優禮賜以王位恩結其心亦足爲西北一帶地方之保障還有一個老僧年逾九十德行清高姓林法名太空一個軍師查訥字近仁上知天文深通韜略二人皆精陰符變幻之術他言上觀天象陛下乃真命之主所以輸誠納款有表文進獻外貢金銀珠王仙畫等件將丹鳳圖陳說一遍文帝看了大悅分付內帑宦官將寶貝金珠收貯仙畫鎮庫李諤又將夜間酌酒歌舞桃酒龍虎變幻之法逐一陳奏文帝即敕禮部鑄造天定王西秦王萬壽王金印三顆造金冠三頂玉帶三條蟒龍錦袍三襲珠履三雙寶劍三口外又敕封林太空爲通天護國普靜正教禪師賜一品服差行人官魯醜爲使齎奉旨意禦賜等物往西蜀欽賜三王有詩爲證昔日三齊僞今朝三俠真不須親納陛聲譽振神京話說林澹然送李諤起程後即要歸山薛舉苦死留住先送杜伏威張善相查訥回鎮撥宦官十人伏侍林澹然在後宮花園內晨昏問候殷勤孝敬曲盡定省之道過了數月忽報朝廷差官來到薛舉迎接入城開讀聖旨魯醜捧過西秦王金印和冠帶錦袍珠履寶劍薛舉謝恩已畢請出林澹然拜受皇封禦服厚待天使魯醜作別起行到杜伏威張善相兩處去了三處俱差官上表謝恩林澹然在西秦王宮中將及一載一日要回峨嵋山薛舉只得送別差內官將士數十餘人直護送至青州張善相處善相迎接入城重賞人衆發付回鎮林澹然在張善相宮內又住了數日要回山上張善相命擺鑾輿自簿奉送林澹然止住不用只取山轎一乘宦官人役送至峨嵋山而返樵雲印月接入庵內稽首問候起居林澹然坐下只見小賽擺耳前來搖頭跳躍林澹然問樵雲老蜜爲何不見樵雲道大爺去後不及一月老蜜往山後澗中吃水失腳跌下崖去登時跌死已埋在山凹之內林澹然又問老鍾一向好麽樵雲道老鍾向來愈加贏瘦近有十餘日不食每向太爺禪座前蹲踞瞻望悲號長吼似有望太爺不來之意昨日午時死於洞內适才和師兄正欲葬之不期太爺回來林澹然聽罷兩目垂淚長歎道老鍾雖墮畜道俺一言點化即能解悟此去必歸正道可惜臨死不曾與之一訣可憐可憐老僧這等命薄數年已來張太公苗知碩沈性成胡性定相繼西歸幸有老鍾相伴亦爲兩世之交今又長逝深可痛惜歎罷令印月樵雲擡虎放於庵前四圍堆積柴薪林澹然端坐於虎屍之側先念一卷消罪解冤懺又念一卷楞嚴上品經後誦往生淨土咒親自下火口中念動偈語雲虎虎虎眼射金光威耀武身披文彩斑斕腹布刀槍旗鼓三生孽障相牽兩世空來辛苦一言點化之後解悟皈依西祖咦從今脫卻奧皮囊萬道霞光歸淨土念罷舉火點著四圍火焰騰騰林澹然向西合掌念佛頃刻間虎已焚化只有心不毀爛樵雲將柴棒去撥林澹然止住道不可待其自化方現靈光說話未畢只聽囗爆之聲心花分爲六瓣五道青煙從中而起直透半空結爲一處盤旋半晌往西漸漸而散再看時心已成灰林澹然大喜高誦南無釋伽佛南無無量壽佛印月問道老鍾之心久煉方開中有青煙沖空旋繞此是何意林澹然道此乃老鍾返本還元處心開六瓣者六根俱淨煙分五道者五蘊皆空印月樵雲一齊合掌同聲念佛次日將虎骨葬于石洞之前疊土成墳疊石爲基至今虎潤遺迹尚存有詩爲證生前何事戀煙花變畜須知一念差幸悟良言持釋戒靈歸西境樂無涯話分兩頭再說隋文帝得杜伏威等歸服一統天下風調雨順四海清寧倉庫充盈萬民樂業國家全盛太平無事文帝有東宮太子名勇爲人柔懦樸實無智次子名廣小字阿摩爲人資辨敏捷貪虐荒淫初封晉王貪心不足欲奪其兄之位與總管宇文述商議謀害之策宇文述道殿下欲謀東宮何難之有必須得這個人輔佐事必成也廣問何人宇文述薦右仆射楊素大有權謀殿下何不求之晉王召楊素密謀此事楊素道殿下欲謀兄位只是承順父心曲盡孝道自然此位可得自此宇文述楊素每每見文帝稱羨晉王仁孝恭儉謙己下士有人君之度東宮懦弱無才不足以承大統文帝果然聽之開皇二十年春文帝下詔廢太子勇爲藩王立晉王廣爲皇太子晉王既立未及數月暗將太子勇毒死至仁壽四年正月晉王弑父文帝于大寶殿自登大位號爲煬帝改元大業元年煬帝登基之後縱恣爲樂日夜歌舞不理朝政欽差舍人封德彜宇文愷二人營造洛陽顯仁宮南接皂澗北跨洛濱起自大江以南五嶺以北採取奇材異石納於其中又求海內奇花瑤草珍禽異獸充入苑囿自長安至江都造離宮四十餘所又遣黃門侍郎王弘往江南造龍舟數萬艘官吏督促嚴緊役了日夜營造死者相望于道開永濟之渠引沁水南達黃河北通涿郡穿江南河道起自京口直至余杭八百餘裏置治口倉于鞏城周圍二十裏內穿三千窖造興洛倉于路陌北城周圍十裏內穿三百窖每窖內皆藏米粟以防急用五月間築城西苑周圍二百里內開大海方圓十餘裏造成方丈蓬萊諸山高百餘尺台觀宮殿錯落山上苑內亦種奇花異卉四時遊玩到秋冬樹木凋落剪雜彩爲花綴在枝條之上顔色被風吹壞複加更換池沼之中亦剪綵爲荷晝夜笙歌不徹每遇秋夜月明縱宮女數千俱跨駿馬遨遊西苑作清夜遊曲馬上歌舞國政廢弛無日不治宮殿苑圃兩京至江都苑囿亭殿不知其數久而益厭總管字文愷揣知上意選天下山川勝景之日獻上煬帝遍覽圖景知汾州地勢坦平可以蓋造宮殿手詔工部官員即于汾州地界造成宮殿瓊樓綺閣極其光彩腸帝竟在汾州快樂此時朝廷重斂有司官員更是貪酷不仁百姓受苦輾轉流離胡曾先生有詩歎曰千里長河一旦開亡隋波浪九天來錦帆未落干戈起惆悵龍舟更不回隋煬帝篡位一統山河海外四夷年年朝貢只有高麗國王屢歲不來貢獻煬帝大怒于大業六年春下詔討高麗差幽州總管元弘嗣往東萊海口造大船三百隻官吏督役甚嚴民夫晝夜立在水中不敢停息腰腹之下盡皆生蛆死者數萬調發天下軍兵皆會於涿郡江淮一帶船隻首尾連接千有餘裏來往人役不絕死者相枕正是萬姓遭殃黎民塗炭有詞爲證詞名蔔運算元煬帝急差徭萬姓遭塗炭夫妻手足盡分離父子不相見未畢城郭工又欲興宮殿髑髏朽骨積如山激動英雄變隋煬帝調發天下精兵征討高麗詔書到西蜀杜伏威薛舉張善相兄弟商議不定張善相車駕到草庵參見林澹然以求良策林澹然道隋煬帝弑父之賊加以荒淫無道不理國政上幹天怒下結民怨眼見得喪亡無日但不知鹿死誰手如今又動兵遠出是自取敗亡爾等若助軍馬徒送衆軍性命如不遵調遣又背前言激逆賊之怒高麗未征旌旗先指西蜀矣不如各鎮且助兵五千糧米三千石托言邊郡四散鎮守一時難以畢集三鎮共先進軍一萬五千然後陸續進發待彼征高麗敗創之餘自守不暇豈能問罪於他人連月來俺占雲氣見太原分野王氣極盛帝星明朗此地必有真人十餘年後天下大定隋朝氣數隻此而已張善相辭了林澹然回青州發檄文知會天定王西秦王三處厚贈天使各助軍士五千糧米三千石天使帶領軍馬回朝覆奏煬帝煬帝禦駕親征高麗詔征天下軍馬皆會聚於平壤共一百十二萬三千八百人車駕渡遼高麗王見隋帝大兵聚集不敢出戰分兵堅守暗遣沙壘鄧五鬥武洞駱思德四將帶領精兵四山焚劫隋軍糧草隋軍乏糧自相變亂諸將皆無戰心各思退步高麗王大發軍馬追殺隋軍大敗衆將只護得隋煬帝而逃全軍敗沒大業八年京城地震五番六月朔日有黑氣千餘丈飛入太極殿中七月有虹光現于玉堂原城外高山盡皆崩裂天下大亂盜賊如林各據一方稱王道帝共有六十四處煙塵先說一人姓竇名建德貝州人氏軍官出身聚集勇將孫安祖張金稱高士達招兵買馬共得五萬餘人打州劫縣據地稱王又有一人姓李名密字玄邃遼東襄平人輔佐楊玄感爲王有大將翟讓李世囗王伯當起兵黎陽占據滎陽郡所向皆捷據興洛倉複駐紮鞏城聲勢大振朱仙起兵南陽稱爲楚帝郭子和起兵榆林號永樂王王須拔起兵恒定號漫天王又有劉武周林士弘李子通邵江海劉元進江華徐圓朗左才相梁師都各各佔據城池互相征伐遍處表章不絕到樞密院來煬帝聞報驚慌無措禦筆親寫詔書欽差右驍衛將軍唐國公李淵爲太原留守虎賁中郎將王威虎牙中郎將高君雅二人爲副留守調遣關右十三郡軍馬征討群賊卻說李淵字叔德隴西成紀人氏其祖李虎仕魏有功封唐國公父李昞襲封其爵生淵于長安胸生三乳立性仁厚襲封唐公取竇毅之女爲夫人生四子長名建成次世民三玄霸四元吉李世民年方四歲有書生見而異之歎道此子龍鳳之姿天日之表其年及冠必能濟世安民李淵厚待書生既而辭去李淵懼其語泄使人分頭追殺竟無蹤迹因以爲神故采其語名世民有詩爲證龍姿鳳表自天成首出能教海嶽清濟世安民真帝主行看四野息煙塵再說李淵奉旨率領高君雅王威二將長子建成次子世民起馬步兵五萬征討衆賊雖然屢戰屢勝爭奈盜賊甚多朝降暮反只有山西河南附近地方略爲平靜忽報邊城軍士結連胡虜作叛勢甚猖獗官軍屢敗求兵救拔吏部侍郎裴矩力勸煬帝親征煬帝敕虞世基爲總兵都督大元帥帶領馬步軍兵三萬爲前隊煬帝自統精兵七萬戰將百員禦駕親征大軍將到雁門虜王突厥撤圍而走誘隋煬帝軍馬入關親督鐵騎四十萬攻打雁門劫駕金鼓之聲振動天地正是龍遊淺水遭蝦戲虎入平林被犬欺不知煬帝如何退敵再聽下回分解
