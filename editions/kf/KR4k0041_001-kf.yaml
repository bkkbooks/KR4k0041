日如何死於此處正是才脫得虎穴龍潭又遇著天羅地網不知林澹然性命何如且聽下回分解第十一回彌勒寺苗龍敘情武平郡杜帥訪信詩曰讜言遭謗即宵征苦曆高崗複陷坑古刹款留情意洽離亭酌別酒杯傾固辭孽地行吾志運厄關津受爾擒帥府談言逢故舊卷舒如意人都京話說林澹然正行山路被絆馬索絆倒一夥嘍囉將繩索綁定解上山來林澹然心裏暗想這班人決是綠林豪客俺做了半世英雄不期將性命送於此地漸漸走到山頂月光之下擡頭細看乃是一座大寺院衆嘍囉將老林押入寺門那個提包裹的先跑入殿裏去了不移時走出來道二位大王爺正吃酒哩見報拿著一頭行貨二大王大喜叫快解進去衆噗羅聞說喊一聲將澹然推入殿裏林澹然偷眼看時上面左首坐著一籌好漢生得虯髯碧眼大臉長軀身上穿一領赭紅囗絲襖子頭上戴一頂軟翅紗巾右邊坐的一個漢子生得微須白臉短小身材身上穿一領遍地金鴉青百花錦襖頭上戴一頂彩繡紮巾左首那個好漢問道你是甚人輒敢大膽夜靜更闌在我山中行走明知山有虎故作采樵人右邊那個喝道大哥問他只甚使兒們拿去剝了皮砍做肉丸子將來下酒兩邊嘍囉齊喊一聲得令把林澹然叉腦揪出殿外來卻將氊帽揪落露出光頭那些嘍囉同喊道原來是匹禿驢林澹然大喝一聲賊奴體得胡講那虯髯大王聽見喝叫拿這廝轉來衆嘍囉又將林澹然擁上殿去虯髯大王大怒道這禿驢大膽你敢罵誰你是何處寺院來的村鳥無知先割去舌頭然後剖腹剜心犒賞衆孩兒們林澹然也大怒喝道胡講俺出家人視死如歸要殺便殺你這廝何必恁般鳥亂那第二位好漢聽了聲音跳起身來令嘍囉移燭近前細看失驚道這和尚好生面熟卻像在何處曾會來想了半晌問道長老莫非曾在建康妙相寺出家麽林澹然道俺原在炒相寺裏爲僧只因與本寺正住持不和逃難至此有犯虎威乞賜一死那二大王聽了慌忙喝退嘍囉親解其縛脫下百花錦祆披在林澹然身上謝罪道我的爺何不早講大名險些兒害了恩人性命大哥快過來相見這就是小弟時常講的英雄林住持長老是也雙手扶在交椅上坐了納頭便拜林澹然躬身答禮衆嘍囉見了各各搖頭伸舌那虯髯大王向前和林澹然施禮罷分賓主而坐問道在下向聞二弟說林住持英名蓋世智勇無雙久懷企慕今日爲何事幸臨敝地真乃千載奇逢也林澹然道一言難盡從容奉稟二位將軍高姓大名小僧平生未曾拜識荷蒙大義實感再生那個白臉漢子道小人姓苗名龍排行第二向日曾合幾個弟兄侵犯寶刹一番意欲苟圖富貴不期被住持爺知覺施側隱之心釋放我等又賜諸弟兄財物至今感佩不忘小人切切在心報恩無地日前爲與鄰豪構訟縣官受賄誣盜下獄小人得便越牆逃難打從這裏經過遇著此位結義弟兄收留在此今得恩人到來實出望外正應小人昨夜之吉夢林澹然問道此位將軍尊姓苗龍道這哥哥是小人總角之交姓薛雙名志義人見他虯髯黑臉都叫他做黑判官兩臂有千斤氣力學得一身好武藝爲報父仇殺了惡宦康刺史全家逃到這裏做這本分生理此處卻是定遠地方此山名爲劍山此寺名彌勒寺甚是險峻寬闊逐去僧衆聚集一二百人打家劫舍攔截客商數年官軍不敢正眼兒相覰留小人坐了第二把交椅果然快樂甚是英雄小人時常和大哥講妙相寺有一位恩人林住持智勇足備小人受恩未敢少忘今日得會誠爲天幸分付嘍囉整頓酒席相待飲酒間苗龍又問及出寺遠來逃難之故林澹然潸然淚下道小僧不幸受盡囗囗屢經坎坷自從東魏與高丞相世子高澄結怨削髮爲僧走入中國挂錫指望尋一個終身結果蒙聖恩敕爲妙相寺副住持不期撞著那凶徒正住持鍾守淨貪財好色不守釋門戒行以念佛拜懺爲由著做佛頭的趙蜜嘴同謀賺騙寺後鄰人沈全渾家黎賽玉通姦來往情熱因俺責善反生仇恨十月十五日值聖駕臨寺聽講涅槃經那廝乘隙暗進讒言說俺譭謗朝廷不守清戒酗酒兇狂私通東魏皇上信了便要擒俺置於死地虧了行童來真潛通消息俺只得乘夜而逃撞到雞嘴鎮李秀店中李秀亦如苗兄一般認得面貌說起昔日之情抵死留住不放那時俺也昏債失了計較不合在他家藏躲了幾日官司緝捕得緊一日捱查數遍到處張挂榜文說拿得小僧獻上者官給賞銀三百兩店內有一酒生貪利生心待要首告幸李秀識破將那廝灌醉放俺出門逃竄晝伏夜行受盡苦楚致令驚動二位將軍幸蒙不賜誅戮複承厚款感激不勝苗龍離座大怒道有這等事不殺這負義忘恩的孽畜空做人間好漢薛志義道二弟且莫性急當今世上直道原是難容的林住持只是太直了些惹出這場奇禍知恩報恩仗義的事除是豪傑才做得來這一班狗男女人面獸心焉可以此望他今日幸會林住持且請住持爲了山寨之主緩緩用計剿除這廝不知住持允否林澹然合掌道俺出家人生死聽天隨緣度日恩怨之間寧人負俺毋俺負人多蒙二位將軍盛情暫借一宿明早拜辭歸於東魏以終天年薛志義道住持何出此言既離虎窟又入龍潭自禁城到得敝山已是萬分之幸離這裏到東魏路程遙遠關隘阻隔況住持名聞遠近聖旨畫影圖形那一處不當心盤詰前去乃是河南地界城市中人煙稠密不比那深山僻路所在住持今要前去若遭羅網那時悔之晚矣還在小寨暫且安身將圖後計林澹然道多承美意本該尊命但小僧久甘恬澹最厭繁華意欲歸魏尋一搭兒僻靜山崖結個茅庵修焚念佛以終天年無心再戀塵俗設被擒獲是亦命也數也苗龍道住持爺執意要去小人亦不敢強但求寬住數日另作商議林澹然謝道若得如此足見厚情苗龍又問李秀哥哥近來生計何如林澹然道頗爲富足儘是清閒小僧在他家藏避數日那酒生要行出首放俺奔逃兩下必成仇訟苗兄可念平昔交契之情乞著人打聽消息方知下落薛志義道既是苗二弟相識明日必須差人打探苗龍道事不宜遲明早即行三人盤桓說話間不覺星移斗轉野店雞鳴林澹然道賤體困倦望乞隨便借宿苗龍二人又勸了數杯令嘍囉打疊床鋪伏侍林澹然歇息有詩爲證昨宵得脫虎狼窩今朝穩臥中軍帳不數古今豪俠流綠林高義雲霄上次日又排筵席款待傍晚時林澹然辭謝要行苗龍薛志義苦苦相留只得又住了一夜次早侵晨起來相別苗龍道小人有兩樁心事要留住持爺停當了即便送行林澹然道兄有甚事望乞見教苗龍道我這位薛大哥武藝雖精韜鈐未諳今欲拜在門下求傳授些兵法二者小人正要差人打聽李大哥消息如平安無事卻也放心設或落難時亦好同住持商議救他的門路故此要屈留數日方敢送別林澹然道既爲此二事相留便往數日兄可差能事心腹之人齎帶銀兩往建康去倘李季文有事即可隨便上下使用以留性命從容救他俺這裏一面和薛君開講兵法待尊役回時告行薛志義苗龍二人大喜隨差兩個精細會事的嘍囉帶了百餘兩白銀往京都打探消息去了三人在寨中討論兵法演習武藝酌酒高歌談今說古不覺又早半月有餘一日嘍囉回寨稟覆道小人兩個一路打聽去只見城市通衢鄉村戶落處處張挂榜文圖形畫影尋獲林住持爺爺小人抄得榜文在此苗龍接過三人一同觀看其榜文雲某府某縣某官遵依樞密院行文欽奉聖旨爲追剪奸僧以杜國患事照得本朝在京妙相寺副住持林太空者不守清規通謀外國將爲城社之奸搖惑軍民之志十月十五日譭謗朝廷抵觸乘輿反情已著不可姑留即欲拿問明正典刑不意知風逃竄今特遍行國內遠近畫影圖形疾速追拿不論軍民人等如有擒獲者該地方官給賞銀三百兩本官連升三級若窩藏在家知情不報故意縱逃者不論貴賤一概處斬事同風火頃刻毋違須至榜者右榜諭衆通知年月日結沿路聽人傳說李某被陳阿保首告窩藏林住持本縣拿去三拷六問招成死罪現監在獄小的們到江寧縣中認作李家的親戚凡一應衙門上下人等並獄中禁子俱各用銀買求寬釋見了銀子都已應允又用計見了李官人他分付轉謝住持爺和二位大王爺再三致意得空便要越獄而走也來入夥小人們特來回覆三人聽罷大喜重賞嘍囉設筵相慶當晚林澹然起身作別道將軍韜略已精貧僧在此終不爲了薛志義道今日已暮還乞草寨荒宿明日決然送別但住持爺這條銅禪杖似非凡物出家人提此行路動人疑忌何不留於敝寨另奉寶劍護身庶爲穩便林澹然道蒙諭良言感戴無盡但此杖乃故人所贈山僧朝暮不離今在顛沛之中棄之是背故人也生死與俱豈忍輕棄薛志義歎息道當今之世面交者多飲酒宴樂情若同胞利害相關視如陌路此輩真犬彘耳豈能如住持于患難之中不忘故人也倍加敬服苗龍道我有一計在此管教路中無阻便令嘍囉砍一株斑竹來截去頭尾打通了節將鋼杖藏於竹中兩頭鑲嵌堅固對林澹然道住持爺此法何如澹然道妙甚又可防身又可挑行李深感深感衆皆大喜痛飲通宵次日薛志義大排筵席請林澹然餞別歌舞吹彈二人殷勤相勸林澹然吃得酩酊乘著酒興辭別要行薛志義親手捧出白金一盤贈爲路費林澹然收了兩錠其餘銀子賞與日前打探的嘍囉苗龍薛志義令嘍囉駝了竹禪杖背上包裹二人親送下山數裏林澹然再三請轉苗龍只得將竹杖包裹速與林澹然三人灑淚而別不說薛志義苗龍回寨且說林澹然拽開腳步取路望西進發走了三十多裏酒卻醒了遠遠見人煙揍集屋舍相連乃是個市鎮去處此時正是早春天氣但見六街三市上來來往往盡村民門面店肆中濟濟捱捱皆貿易也有綾羅段鋪也有米麥油行賣魚賣肉鬧嚷嚷買菜買蔥喧哄哄沽酒樓前扶醉漢秋千架上坐嬌娃林澹然不敢行動即閃入山坳裏幽靜所在躲避直到夜靜方才走路一路夜行曉住賓士數夜早到了武平地面此時日色將沈林澹然心裏暗想前去已是睢陽郡武津關口此是緊要去處惟恐盤詰難行過得此關即是東魏地方可脫網羅矣行近大梁城門口思量無計只得大膽拽步前行忽見一個山東漢子背著一搭褳氈貨在城門外出賣林澹然忽然自想除是恁般方過去得便取錢買了一個敞口大暖帽戴了拽下簷來遮著臉取路進城行不數步劈頭一夥公人攔住去路當先一人問道你這廝是何方人氏那裏住居作何生理快放下包裹杖子待我查檢方放你過去林澹然道在下姓張排行第三北平人氏因出外經商被盜沒了資本欲到貴城合親處借些銀兩以作盤纏何必盤詰那人道我自不曾見做客的嘴邊剃去鬍鬚必是奸細趕向前將林澹然暖帽劈頭揪下拍掌笑道饒你乖是鬼難脫這場災你這狡猾禿驢走得好遮了頭須遮不得口叫衆人動手將繩索綁縛了這廝再做道理可憐蓋世英雄撞入天羅地網一個公人劈手將竹杖搶去向前一撲幾乎跌倒把竹杖抛在地上爲頭的那人慌忙扶住這公人搖頭道好古怪好利害杖子如何竹有這般重莫非是外夷出的那人伸手取杖也不能移動用力兩手提起卻有百餘斤心下大駭道這條小小竹棍就使是實心的未必這等重得狠必有緣故便在腰邊拔出短刀劈開竹棍裏邊露出銅禪杖來那人哈哈大笑道好奸滑的和尚恁般做作到我老爺手裏自然雪化見屍令衆公人鷹拿雁抓將林澹然縛綁定了正是單絲不線孤掌難鳴躬身道列位知俺是誰將俺縛綁卻爲甚事來那爲頭的指著手喝道你這禿廝兀自要強嘴爲你受盡艱苦用煞心機慚愧也有今日見你的時節且講大名於你聽著我乃江寧縣中馳名的緝捕使臣刁爺便是當日你這廝誹謗朝廷潛地奔逃我這一班一輩的人爲你不知受過多少限責你卻躲在賣酒的李秀家裏快活那李秀被你拖累擬成大罪監禁獄中你卻又走了教我腳底也趕穿諒你也飛不過關去故先到這裏卻好等著圖形在此這番走往那裏去林澹然閉口無言刁應祥喝衆人帶這廝元帥府中監禁待造下陷車解到京師請貨便了衆人擁著刁應祥將林澹然解到元帥府來有詩爲證千里馳驅策杖行豈期窄路遇軍兵早知今日風波險何不山營且暫停當日那都督正升晚堂審理軍務猛聽門外擂鼓聲急把門將官進來稟道門外有一夥緝捕公人擊鼓因拿著一個和尚口稱朝廷重犯要見老爺乞台旨原來這都督姓杜即令放進來刁應祥發付一夥公人門外俟候自帶林澹然隨著把門官徑入跪下杜都督問刁應祥道你是何處緝捕人役拿這和尚擅入我軍門擊鼓刁應樣答道小人是建康江甯縣緝捕人員刁應祥領本縣公文奉聖旨追捕犯法逃僧一名林太空一路追來至此方才擒獲本欲就解入京一來要稟過老爺方敢解去二來這禿廝甚有勇力路上攪有賊黨劫奪乞老爺鈞旨賞一輛陷車差軍護送到京庶無失誤杜都督道這和尚就是妙相寺副住持麽刁應樣道正是此人杜都督道日前連接兩道旨意都爲這廝因此遍處著人搜捉盤詰不想今日你擒獲得來這廝有甚麽器械行李麽刁應祥道止有禪杖一條包裹一個別無他物杜都督教取進來當廳檢看收入後堂令將士將林澹然松了綁取一面鐵葉長枷枷了押入牢中監禁發付刁應祥一應人役都在府門外相近去處歇息待我審問情由後然寫表申奏著軍士護衛汝等入京刁應祥聲諾而退杜都督退入私衙著虞候往獄中取林和尚去了長枷進來林澹然跪下杜都督道久聞人說京都妙相寺中副住持林和尚爲人剛直武藝高強人人契慕遍處傳揚如今卻爲甚事觸忤朝廷以致逃竄汝可一一從實說來毋得隱諱林澹然滿眼垂淚道僧人本欲隱迹逃名不料反投羅網念貧僧原是東魏人氏將門出身姓林名時茂在高丞相麾下爲將替國家東征西討屢立汗馬功勞與高丞相世子高澄不睦慮惹災囗愁無結果因此削髮爲僧遂把那入梁怎生遇著丘縣尹薦舉爲妙相寺副住持怎生與正住持不睦暗進讒言激怒武帝欲正典刑又怎生逃躲夜行晝伏欲歸東魏之事備細說了一遍豈知災囗難脫複被擒拿送在老爺台前伏乞大恩原情鑒拔再造之德重于山嶽杜都督又問道你既是東魏高歡部下將官可知有一位杜旗牌麽林澹然道姓杜的將士也有但不知貴表尊名杜都督道單諱一個悅字的綽號石將軍如今年已高大過於七旬是我至親可曾相識麽林澹然道有有曾有一個杜悅號爲石將軍日前原在高爺麾下爲旗牌官失機當斬是僧人一力救釋免死充軍後來僧人雲遊入梁之時又於沁州旅邸相會因魏主降恩得赦還鄉相別之後未知在否社都督道你既與他旅邸相會他曾有甚言語囑付你入梁否林澹然道彼時杜公曾和小僧說來他有一子在梁投托傅統制麾下十年不知音耗日夜縈懷待要入梁尋訪奈何年老難行乃借酒肆中筆硯寫下家書一封付小僧帶來倘得邂逅轉寄此信小僧一向羈留妙相寺中欲訪無由那一晚慌慌逃竄匆忙之際不知曾帶得否或者在包裹中未可知也杜都督即命取包裹付與澹然澹然打開檢看卻在護書中雙手呈上杜都督接書拆開看時上寫著父書付男成治知悉自汝離家出外家中事變多端我爲你淚不曾幹終朝思念你母親病傷去世使我形孤影只滿目荒涼骨肉摧殘可歎可歎不期我運蹇時乖失機當斬自分今生與你永無見期感得大恩人林爺一力申救得全殘喘此恩此德重若丘山我今已老無由補報倘天不絕人或有再得盡心之日也不可知今因林老爺出家法諱太空別號澹然雲遊中國偶于旅邸相逢草此數位寄與你知倘得一會須不要忘了林爺大德當效犬馬之報不必說得你也須知父母養育之恩十月懷耽三年乳哺推幹就濕容易得撫你成人你竟飄然出遊不思父母爲你哭得腸斷望得眼穿實是悽楚我今年近八旬風中之燭你若稍有人心見書即日一面使我九泉之下也得瞑目書不盡言總宜知悉年月日書于沁州邸中爺字再囑杜都督看罷書失驚站起身來雙手扶起道恩人你何不早言小侄獲罪多矣慌忙躬身行禮林澹然忙忙答禮道小僧是提督案下死犯何故相敬若此都督道恩人不知其詳且請坐了細訴根由這杜都督是誰原來不是別人乃東魏人氏姓杜名成治就是杜悅的兒子自別父親走入中國尋著娘舅總兵都統制傅惲收在部下爲書記因他能文會武精通韜略常隨傅惲出征屢獲奇功升爲參謀又數年傅惲陣亡武帝見他無嗣即敕杜成治襲封總兵都統制之職統領傅惲大軍欽賜武平城內蓋造府第居住後伐齊有功複升爲帥府都督大元帥上馬管軍下馬管民假節鉞管轄十三州三十四縣人馬鎮守西北一帶地方先斬後奏極有威權當下替林澹然換了衣服賓主坐下忙點茶湯林澹然不安又謝道僧人何福蒙都督如此厚待杜成治道論恩人乃是父執這杜悅就是家尊小侄名成治自幼不才每好騎馬試劍頗通韜略愛客重賢以致家業凋零只得遠遊梁國投入家母舅傅統制麾下幸得皇天庇祐聖上洪恩濫叨重位不想父罹軍法幸蒙吾師大恩救拔小侄屢屢差人打探家尊消息十餘年杳無音信每每在心今日方知端的此思此德銘刺肺腑小侄真不肖之罪人也言畢淚如湧泉悲不自勝有詩爲證獨憐父子各西東猶喜逢恩患難中莫道蜉蝣真似寄人生何處不相逢林澹然驚道卻原來是令尊大人小僧不知惶悚無地杜成治即命在後堂整酒飯相待林澹然道令尊大人與小僧相處數年情同骨肉後因問罪兩下暌違幾載後來又於客舍相逢今日偶然又會著都督正爲亙古奇聞人間罕遇杜成治道小侄幸逢老叔但不知家尊何日相見哀哀父母生我劬勞小侄身享富貴母死不得奔喪父親年邁不能奉養使飄零道塗流離失所小侄不孝之罪實無可渲說罷又哭林澹然功道都督今日身享萬鍾位居極品顯親揚名正是大孝處何必悲苦待後差人打探必有相見之期杜成治拭淚相謝再坐吃酒林澹然辭酒道小僧不幸遭此不赦之罪蒙都督雅愛心實不安小僧算來這場大禍決難回避乞都督明早打發解京了此孽冤免致貽累杜成治笑道老叔何出此言小侄豈忘恩負義之輩今日必當盡力救援管取平安無事送回東魏聊表寸心林澹然合掌道多承都督厚情只怕貽累反爲不美杜成治道不必介懷且請放心寬飲幾杯林澹然謝了又飲數杯不覺大醉就在側房睡廠杜成治當夜和夫人蔣氏商議要救林澹然一節夫人道君爲督撫統握大權欲救一個和尚有何難哉如此如此救他便了杜成治道夫人言之極當事不宜遲連夜差心腹幹辦到司獄司喚獄官來議事那獄官姓戚名錦正在睡夢中聽得報杜爺呼喚忙起來整冠束帶隨著幹辦進私衙裏來正是欲知心腹事但聽口中言畢竟杜都督與獄官有何話說且聽下回分解第十二回都督巧計解僧頭守淨狼心驗枕骨詩曰綠林豪客困圓丘午夜承恩出禁囚視發豈知重正法臨矛方悟中機謀神鼇脫同歸滄海鬼蜮多疑驗髑髏自古庇人番累己杜君喜處變成愁話說這戚司獄夜半進見杜都督稟道老爺呼喚有何台旨社成治道我有一機密事和你商量你還不知日間所獲那林和尚卻是我的故舊恩人因與本寺正住持不睦暗進讒言謗他私通東魏故聖上震怒欲拿究罪不期逃竄至此遭擒我想朝廷重犯不可私放若解去又遭誅戮如何救得他思得一計可以周全特喚你來計議大獄之中重犯何止數百或有與林和尚面貌相像者煩爾將罪犯面貌簿上逐一查看如有相似的則此僧有可生之路切不可泄露事成之後重加薦拔戚錦道老爺台旨怎敢有違但是這林和尚初下獄來獄官未曾看得詳細乞再賜一見方好查檢杜成治道此言有理命掌燈親自和戚錦到側房裏來近床掀開帳幔林澹然酣睡不醒戚錦仔細看了一會笑道這長老有福有緣眼見得老爺是他救星大難可脫此面貌與一個囚犯儼然無二只是多了一部鬍鬚若剃去了胡須活現是個林和尚了杜成治大喜道有這等湊巧事快快取來戚錦道領鈞旨卿和幹辦到監房裏叫禁子取出一名重犯姓王名喚歪七原是得財強盜生得魁偉長大也是一條好漢因打劫赴任官員事杜擬成死罪在牢吃了數年官飯當下戚錦分付禁子道老爺軍令取此重犯外面不可聲揚若漏泄必按軍法禁子應諾戚錦帶著王歪七徑到後堂來杜成治一見發付衆人回避戚錦和衆人散去杜成治道那犯人上來你可是王歪七麽王歪七是睡夢中提醒來的不知甚地來歷蒙矓答應小的是是是杜成治道向來聞你與我有親今細查果然是我姨党枝派我念姨公一脈心下欲放你去你可去得麽王歪七道小的罪犯重辟法在不赦每思改惡從善奈無門路今老爺若肯釋饒得命實天地重生之德不敢認親只願爺爺萬代公侯杜成治道放爾何難只有一件礙手處縱放你去畢竟又遭擒捉王歪七道爺爺位尊權重令出誰敢不從若肯釋放小的何人又敢攔阻杜成治道汝知其一不知其二假如今夜放你去了有人見你這鬢髮蓬鬆舉止觳觫豈不是獄中重犯在逃誰肯放過必要擒來請賞那時我仍放你不得豈不辜負我一片親情王歪七磕頭道老爺神見高明小的決難逃脫空費了老爺一片天心杜成治道不難有計在此了將你剃去鬚髮賞你褊衫一領僧鞋一雙空頭度牒一紙扮作遊方和尚待五更將曉之際放你出去只要賺出城門自然無人看破我這裏又不差人追捕汝好放心前去依然蓄發可立功邊塞報效朝廷莫忘我今日之情也王歪七磕頭道謝爺爺深思使小的重見天日何惜粉骨碎身以報大德杜成治令虞候取刀剃下鬚髮取出僧鞋褊衫僧帽穿戴了杜成治在燈下細觀時卻與林澹然面貌相同規模無二心下暗喜分付王歪七在衙後小房暫歇著人守護又蚤隔鄰雞唱天色黎明外邊吹打兩次堂上傳了雲板杜成治山堂該房書吏都捧過文案牌票等項來稟金押銷繳杜成治道這些文卷暫且消停有一大事和汝等商議昨晚江寧縣緝捕所獲僧人林太空系是朝廷重犯聞說此僧有萬夫之勇況系東魏出身解去路途遙遠倘有疏虞關係匪輕我意欲就這裏斬了將首級付與緝捕傳入京師再進表中奏此情庶無失誤你衆人心下何如衆書吏同道老爺鈞旨甚明傳首京師實爲思便省了許多干系杜成治即教寫下犯由牌辰時三刻取斬一面分付管本稿的書吏備細寫下奏章次後金押牌票印發文書已畢堂上又傳雲板三聲只聽得門下大吹大擂放了三個鐵吆喝開門陰陽官傳報辰時杜成治親出轅門傳令著監斬官轅門外俟候四圍軍卒擺齊一聲炮響軍士們將王歪七綁下王歪七驚得魂飛魄散心裏想道杜爺說念親情要放我去爲何反綁我出來此時魂已不在身上衆軍校將王歪七擁出轅門口內塞了麻核頭上插一面黑旗旗上寫著譭謗朝廷通謀魏國叛僧一名林太空杜成治判了個斬字在王歪七臉上但見人人嗟歎個個膽寒都言此去幾時回盡道這番逃不脫負冤屈何處聲言含苦情只堪跌腳有人說這的是沒頭鬼和尚自做誰將甘露施孤魂有人說這還是刀劍獄削禿自當誰啓陰司蘇餓鬼劊子手提刀何異牛頭馬面監斬官捉筆儼如地主閻君此時莫想重生頃刻仁看命喪監斬官讀罷犯由牌王歪七聽了不能叫屈鳴冤突地一聲鼓響頭已落地劊子近前獻頭杜成治分付將頭用石灰戧了木桶盛貯屍首令扛出郭外自上轎回衙再說緝捕使臣刁應祥帶領著一夥公人往元帥府聽候發解林和尚及到轅門方知杜都督已將林澹然斬了刁應祥暗疑杜爺不將活人與我解去請功卻先取決這是何意單身撞入轅門進元帥府稟這一樁事杜成治道汝等昨日所擒林和尚本待差軍護衛解京聞這和尚勇力異常黨類甚衆倘或路途有失豈不誤卻大事故就在此取斬將頭解京庶無失誤另有表章差官與汝等即刻起程同至建康進上朝廷自知分曉刁應樣只得領命杜成治差官一員幹辦二人齎了表章當堂將林澹然首級用了封皮和包裹禪杖付與刁應樣又賞銀十兩以爲路費刁應祥收領首級等物磕頭謝賞和差官公人等取路回京一路無話直至建康當日到得晚了刁應樣留差官幹辦在家招待酒飯自先趕著晚堂徑入江寧縣裏來見祝鵾向前聲喏祝鵾見了問道我日前差你去緝拿林和尚爲何去了這多時曾有些消息麽刁應祥道林和尚被小人一路直追至武平城外方才獲著本該就解回京恐怕路途有失當下進城至都督府杜爺處報知求杜爺差軍護送進京杜爺也慮路上或有差失就在本府將林和尚斬了傳首級解京另差官責本上聞故此遲延耽擱祝鵾聽了十分大喜賞了刁應樣發付回家明日五更伺候次日四鼓刁應樣領著杜府差官捧了妻章差兩個做公的擡了頭桶同列縣門隨著祝鵾進朝衆官朝見罷祝鵾俯伏金階奏道臣江甯縣知縣祝鵾啓奏陛下爲緝獲逃僧林太空一事前蒙玉旨頒降臣兢兢業業晝夜用心差人捕捉不期林太空走離京都逃至武平地面被臣縣中緝捕使臣刁應祥所獲即往都督衙門討軍護送都督臣杜成治慮路途有失就彼處取斬送首京師資有實封表章申奏乞陛下聖鑒武帝叫接本到禦案前拆封宣學士高聲讀表表曰武平總制都督臣杜成治奏爲預誅僧犯以杜變逆事某月日江甯縣緝捕人員習應祥見獲逃僧一名林太空赴臣所請軍護解臣思林僧素稱勇悍力敵萬夫矧內東稅相通機詐叵測設若中途有變邊釁複生臣謹於次日便宜行事斬首付與刁應祥並包裹禪杖解京奏上庶不爲奸宄之所算而國家永永無患矣乞皇上原臣擅殺之罪臣不勝戰慄惶驚之至武帝看罷笑道這禿廝藐視朕躬今日英雄何在倚著能言舌辯難逃命喪刀頭當殿傳旨升祝鵾爲吏部郎刁應祥爲都捕使臣仍給賞銀三百兩又將林澹然首級包裹排杖付與習應祥傳入妙相寺中令鍾住持相驗的實然後懸挂寺門示衆祝鵾等謝恩出朝不說祝鵾蒞任且說刁應樣領旨徑往妙相寺來見鍾住持這鍾守淨自從逼林澹然出寺之後一向心事不寧寢食俱廢後聞得捉了窩主李秀稍覺心安還只慮林澹然走脫致生後患日夜懸懸亦無心與黎賽玉取樂當日正在方丈中間坐管門道人傳報朝廷差官到來鍾守淨慌忙出迎殿上相見禮畢刁應樣道小可是本縣都捕使臣刁某奉聖旨追捕逃僧林太空至武平地界已經擒獲當送求杜府護解杜都督慮有走失梟首解京今奉旨將首級包裹禪杖傳與住持檢驗敕挂寺門示衆說罷令從人擡過交與住持鍾守淨掀開桶蓋看時驚得毛骨竦然呆了半晌方才神定將手指著首級點頭道林長老林師兄咦偏你能文會武說短論長爲何也有今日正謂舌劍自誅老兄還能講話否一面說一面翻轉頭來細看不看時萬事皆休只因這一看卻又重興一段風波費了多般周折有詩爲證得好休時且罷休老鍾何苦結冤仇直交滿寺葫蘆骨個個他年似此頭看官你道爲何那林澹然腦後另生出一塊三台骨圓溜溜就如肉瘤一般自有記認林澹然和鍾守淨日常閒話時嘗說自己日前頗得際遇全虧腦後這一塊三台骨故此鍾守淨記在心中當下翻過頭來看這頭顱一似刀削平的沒有這三台骨凸出心下大疑連聲道怪哉怪哉又仔細看了一會道不是不是真不是也刁應祥道住持此話卻是何故鍾守淨笑道這頭卻是假的刁應樣失驚道鍾住持不要看錯了何以見得不真鍾守淨道小僧和林澹然相處非止一日他的頭顱豈不相認他腦後有一塊三台骨就如三個雞子也似凸出來常時戴僧帽剛剛頂著帽口如今這頭腦後卻是平平的無一毫腦骨豈不是個假的刁應樣道那日擒拿林和尚時衆多做公的同我送入杜爺府中次日梟首誰不見來只看這包裹禪杖豈是假的住持不要錯認了此事非同小可鍾守淨道小僧爲何得錯這包裹內物件與禪杖俱是真的林澹然拿獲焉得是假多分杜都督處有甚緣故未可知也今日不須爭辯明日早朝面聖自有道理刁應祥初入寺來何等歡喜聽了這話就如分開八片頂陽骨傾下一桶冰雪水若果然是個假頭誑君之罪安達垂首歎氣半晌無言心下暗想這事卻也作怪分明是林澹然的頭怎講不是終不然杜府有甚機謀穩穩一個都緝捕白雪雪三百兩官銀無福承受這事尚小若說誑君便要斬首如何是好對鍾守淨小心道既是如此住持爺明日面聖時懇乞方便足感大德暫且告辭鍾守淨也不款留止將頭桶物件留下相送而別鍾守淨回方丈中聚集徒弟們商議道這廝得了林澹然賄賂賣放去了卻將假頭獻與皇上請賞自古道斬草不除根萌芽依舊發後來林澹然倘做出事業來豈不反受其害明日早朝必要講明再差人緝訪驅除這廝方免日後之患內中一個徒弟姓雷法名履陽向前道師父等不得明早那緝捕已受恩賞倘和本官老祝計較今日預向駕前遮飾或另生枝葉我和你又成空說不如趁早寫下表章連晚陳奏庶不有誤大事鍾守淨道賢徒之論最是忙取筆硯寫成章疏換了冠服徑投朝房裏來當日卻是謝仆射輪該接本和鍾守淨施禮罷問住持何事乘晚來此鍾守淨卻將林澹然事告訴一遍道今日這一封奏章乞仆射速速進呈聖上至緊至緊謝仆射收下表章送鍾守淨出朝而去當晚謝舉將鍾守淨奏本送入宮中武帝正在禪床上打坐入定醒來中貴官捧上表章武帝拆封看時寫道妙相寺住持臣鍾守淨奏爲奸臣狡役受賄縱凶假首誑聖誤國放君事臣奉聖旨檢驗逃僧林太空首級視其面貌似真細驗枕骨實假太空原有腦骨三塊凸然而起名爲三台骨合寺僧衆皆所目睹今腦後平削無骨非林僧之首可知矣再驗禪杖包裹又系太空之物臣細諒度必是祝鵾刁應祥等通同作弊受賂賣放複將假首誑上冒功請貸情迹顯然乞皇上差官勘問再即遣軍兵搜捕真犯庶免後患臣不勝優怖惶懼之至武帝看罷龍顔大怒罵道這尸位素餐的犬彘敢來誑朕明日鞫問明白焉可輕恕即禦筆親批旨意連夜發出樞密院來敕左個射謝舉同三法司提拿吏部郎祝鵾緝捕使臣刁應樣二人勘問誑君之罪謝舉接了聖旨忙差錦衣衛武士帶了鐵索手杻立刻拘祝鵾刁應樣至樞密院審問卻說習應樣自別鍾守淨回家悶悶無言渾家問道丈夫目今捉了林住持朝廷賞賜不小爲何反生不樂刁應祥將鍾守淨認首級不真的情節說了渾家勸道不必愁煩凡事自有天理終不成將真作假誣害有功之人縱有事端當官理辯何必恁地煩惱刁應樣聽了渾家相勸勉強飲酒排遣睡了半夜未及雞鳴聽著叩門聲急刁應樣披衣而起開門看時只見四個人走入來向前相問方知是衛中武士刁應樣已知鍾守淨那事發作不敢動問一個武士取出鐵索將習應樣鎖了又上了手杻口裏道奉聖旨拘拿到樞密院去不可羈遲速行速行刁應樣隨著武士至樞密院來此時祝鵾青衣小帽已先站在門首兩人見了祝鵾埋怨刁應樣幹事不切刁應祥無言可答不多時天色已曙升堂鼓罷陸續官員皆到衆武士將祝鵾刁應祥帶入堂上二人擡頭看時見正堂中間放著聖旨側首三張公案左邊上首立著左仆射謝舉下首立著刑部尚書王明右邊立著大理寺卿黃相祝鵾習應祥向前俯伏謝仆射開口道奉聖旨勘問吏部郵祝鵾通同緝捕公人賣放妙相寺犯僧林太空一事因甚枉害平民將假頭誑君冒功請賞依直供招祝鵾道原來如此實實屈死人也自林太空逃亡奉聖旨追捕甚緊微臣日夜用心差人緝捕幸使臣習應樣訪出窩主李秀微臣立刻拿來拷打李秀供招窩藏是實知風逃竄料他要回東魏微臣就著刁應樣一路追捕使盡心機不辭勞苦追至武平地界密密緝訪幸而得獲怕有疏虞拿到都督臣杜成治處取軍護送不知杜成治爲甚事故就彼處梟首將頭解京此一節事情是實並無私曲況有杜成治表文及資表官和林太空禪杖度碟等物可證乞三位大人明鑒正卿黃相道這也講得是再問刁應樣時刁應祥自始至終備細說了一遍與祝鵾言語相同黃明道據汝講來似乎無弊但當初在武平杜元帥處斬林澹然時你可曾當面看斬否刁應樣道小人當時送林澹然到都督府中杜都督發付小人在府前附近伺候次日差軍護送解京小人至次早正欲往府催軍解送不期杜都督已將林和尚綁出轅門斬了呼喚小人分付道這林和尚勇力絕倫黨類甚衆路上慮有疏虞故此梟首解京那日斬林太空之際小人實不曾見謝舉笑道這等說眼見得那杜都督有些情弊了黃相道不必多疑一向聞得杜公原系東魏人氏冒籍中原這林和尚也是東魏人或是相識舊知豈無救援之意朝廷頒例殺人有時必日午施刑彼今不待時而取決又不使緝捕眼同見斬只此兩事情弊顯然他倚著先斬後奏之權僞將他人首級解來影射縱放林太空走了未可知也王明謝舉俱道此言甚明不可屈陷了有功之士刁應樣磕頭道青天明鏡適聞爺爺之言使小人如夢方醒若不是爺爺超生這屈事那裏去辯謝舉發付祝鵾暫回衙門將刁應祥收下刑部天牢監禁明早候旨定奪審罷各自散訖謝仆射三人次早入朝將刁應祥口詞逐一奏陳武帝大怒禦筆手詔差武士人員內官二員墾夜往武平郡捉拿杜都督成治進京勘問這武士內官接了聖旨即忙起身各騎快馬不分晝夜到武平郡來捉拿杜都督有詩爲證脫難還罹難銷愁又結愁報恩遭大辟留與子封侯卻說林澹然當夜被杜成治殷勤勸酒飲得大醉一覺直睡到巴牌時候方醒虞候等捧著茶湯伏侍林澹然道生受你們感你家老爺厚情相待奈小僧名已登於鬼錄何以奉報虞候笑道住持爺賀喜适才轅門外已斬了一位林長老也諒住持爺決不妨了林澹然道又來取笑怎地世間更有一個林長老與俺一般當斬的虞候道我家老爺爲住持爺費了一片神思已將獄中重犯扮作住持模樣綁出轅門斬首豈不是住持爺賀喜林澹然驚道可憐爲著小僧卻害了他人性命正歎息間報杜爺來了林澹然慌忙起身迎謝道小僧受都督再生之德將何酬答杜成治道此乃住持大福天假其便得脫此難小侄何功之有緝捕公人等已齎假首級包裹禪杖回京止留下書簡之類諒今者關隘防閑已懈住持可作急打點行程管取安然至魏林澹然道盛情感激不盡只是外面傳揚數月小僧突然而出豈不動人耳目惟恐聲張起來難以前進杜成治笑道小侄已預備在此了令人取出青絹幔成的敞口大帽一頂紗眼罩一方青布直身一件黑油皮靴一雙憲牌一紙白牌一面黃絹包袱一個鋪陳弓箭食箱雨具等物放在面前杜成治道住持可知此意麽林澹然道小僧已會其意但勞杜爺神思何以爲報杜成治道住持可將此一套穿戴起來小侄差兩個能事虞候幫襯住持妝做打差出使人員模樣一路去決無攔阻設或有人盤詰又有小侄憲牌路引爲證放心前去若至東魏遇家尊乞爲轉達得賜一資訊更感大恩林澹然道都督不消叮囑小僧決然留意說罷頭上戴了大帽身上穿了直身腳著油靴腰纏板帶杜成治看了大喜道住持如此妝扮卻竟不像和尚了兩下大笑此時筵席已備杜成治舉杯勸酒盤桓一會不覺天暮杜成治分付虞候好生伏侍林爺前去虞候整頓行囊帶定駿馬預在後門伺候林澹然作別起身杜成治道小侄本宜運送惟慮外人知覺有所不便耳住持莫罪林澹然再三拜謝杜成治送出私行側門相別林澹然出了後門戴了眼紗上馬連夜起行馬不停蹄走了二十餘裏昏黑難行就在官亭客館安歇五更雞唱即忙上馬趲路已過了武津關口一路並無阻滯三人行了數日又到梁州地界虞候將手指道前面即是梁州乃東魏地方小人們難以前去住持爺可于僻處換了衣服依舊釋門打扮穿過古崤關即是東魏了林澹然策馬走至倉頡墓上甚是幽僻樹林中下馬除了大帽眼紗脫下直身油靴換了僧鞋僧帽褊衫打送了一個包裹自己背了將以外行囊物件盡數交與兩個虞候乞致意杜爺作別分路而行徑過梁州至次日已到古崤關口遙見關門半開鬧叢叢人衆報名盤詰過關林澹然也混在人叢裏報名管門官道我看你這和尚形容古怪舉止異常莫不是做奸細的麽林澹然道俺原是東魏人中年出家雲遊天下隨處挂搭今複回敝山焚修關主不信只看俺度牒路引便是說罷打開包裹取出度牒路引遞與管門官管門官接過看時度牒上寫著是本國問月庵披剃路引上面又有梁魏兩國印信心裏方知是有來歷的和尚忙陪笑臉道師父衝撞了請自行路林澹然笑道小僧是個奸細怎好過去管門官也笑道出家人不直得便回話我這裏梁魏交界處檢點來往之人是這般嚴緊休要見罪林澹然呵呵大笑拱手而別拽開腳步徑入關內有詩爲證才脫火坑便遊清淨意適心閑功行圓映話說杜成治自送林澹然出門之後重賞獄官心下大悅縱樂飲酒醉後不謹染成一疾寒熱大作忙喚醫官進行診脈醫官稟是內傷證候又感冒了風邪表裏受虧須服發散兼補之藥杜成治一連服了數劑反覺發起顫來變成瘧疾暫且在私衙裏養病數日後送林澹然的虞候回來稟覆林住持已過關至東魏地方了杜成治心內放下一件大事覺病體稍寬正欲出堂理事忽飛報朝廷差人員武士兩個內官齎聖旨到來杜都督明明曉得事情決撒了心內驚惶病體舉發無奈勉強扶病出堂排香案迎接聖旨中貴官出武帝手詔高聲開讀皇帝詔曰忠臣許國竭志奉公烈士殉君赤心報主但爾武平郡杜都督元帥杜成治當東南一面之寄宜克勤天日之誠不思盡悴鞠躬反致欺君罔上擅縱僧犯林太空脫逃假斬他首欺誑朝廷律有明條法所不赦特差內臣傳責殿前錦衣武士錢程等速至任所杻械來京著三法司嚴究擬罪施行特旨年月月手詔杜成治聽讀到欺君罔上杻械來京驚得魂不附體面如土色一時間手足噤顫口眼歪斜跌倒堂上咽喉中不住的疾響兩班將士人從慌忙擡入衙裏急灌湯藥口已不受牙關緊閉醫官急入看時脈息沈沈四肢不舉一時痰壅而絕合衙老幼悲哭帳下將士無不垂淚痛傷內官與武士商議道有恁般異事莫非是奸計假死齊到衙內看驗杜成治果然氣絕而亡有詩爲證生在東朝仕在梁功勳汗馬勒旅常只因故釋林和尚致使英雄一命亡昔賢又有詩歎曰匹馬縱橫宇宙間將軍仗劍鎮邊關知恩欲報身先死朝裏無人莫做官這詩單說世間做官的身任外職必須朝內有門生故吏或親戚相知薦揚保舉雖胡行亂做反升美任富貴榮華若無人扶持之時你便一廉似水愛軍惜民也要旋鄉歸裏杜成治若朝裏有大汲引就再多幾個武士來也不在意只因他是魏國人氏梁朝並無親故又自倚著功高望重平日間不肯結識朝中宰執雖有謝仆射黃正卿這班正人只好說兩句公道話罷了誰人肯舍著身家保舉他算來禍烈難解安得不驚所以說朝內無人莫做官是實實的話閒話且打疊起再說內官武士等見社成治死了都歎息怨恨道我等這般福薄欽差至此指望一場發迹誰知空自驅馳只得素手還京回旨這杜都督夫人蔣氏未有所出一面安排棺木貯殮停柩私衙又請釋道誦經超度俟候聖旨發落搬喪卻說武士等徑四建康進朝複旨將杜成治身死情由備細陳奏武帝降下聖旨著樞密院官查按杜成治家產依律擬繳左仆射謝舉和右仆射牛進大理寺鯽黃相接了旨意一同會議謝舉道杜都督久經汗馬屢立功勳雖不合私放逃僧今已身故理應將功折罪何故聖上又欲籍沒他家產右仆射牛進素與杜成治不睦因昔年任福州參軍時克減軍糧被杜成治參劾因此懷恨今幸成治之死乘機報仇便道這杜都督擅放逃僧事小私通東魏事大況欺君罔上罪所不赦今日身死不論亦當流其妻孥籍其家產庶不廢了朝廷法律謝舉道論法度則杜公以私情而忘公義罪應遠戍然非叛逆不軌之比何至抄沒家產流徙妻孥有傷公道大理黃相道目今朝廷正缺軍餉據聖意似欲抄沒家財以充國用慮人議論故發下旨來令我等擬議陳奏若從公道論之杜公雖然私放林僧依律僞首誑君知情故縱者與犯人同罪當擬如律今既身死罪人不孥必欲盡法亦仁政之所不忍只合查盤倉庫錢糧充爲軍餉以外田産之類留還家屬贍養終身以見國家待功臣之意如此則可以濟國家之用而無傷聖主之仁公道昭矣愚見如此乞二位先生大人酌之牛進笑道如公所論卻便宜了老杜謝舉道不然黃先生之言情法兩盡依此複奏皇上諒無他議三人議論已定次日早朝將所議之言面奏武帝武帝降下旨意令樞密院選才能官二員往武平郡查盤杜成治倉庫錢糧盡解來京充餉這右仆射牛進得了玉旨即選本院心腹人署丞周乾院判史文通密密囑付了率領三十餘能事軍校即刻起程星夜趲發不一日來到武平郡本府太守程星馬探知親出城迎接並馬入城同入府堂排下香案程太守跪聽聖旨院判史文通開讀詔曰奉天承運皇帝詔曰爵祿者君所以待賢忠藎者臣所以報國有功之士必旌紊法之奸必治朝無幸位律有明條茲爾武平郡都督杜成治受贓枉法賣放逃僧假首欺君律應不赦今已身故削去原職追回敕浩外復查庫所有錢糧盡行解京充餉嗚呼賞罰明而官箴無玷功罪當而輿論允諧旨意到日主者奉行欽哉宣旨已畢留入後堂設宴相待史文通周乾程星馬同到都督府中衆將士書吏俱來參見程太守口傳聖旨要查盤杜府錢糧解京公用將士書交俱吃一驚庫官庫吏等向前稟道杜爺一向清廉庫中並無餘蓄乞爺台作主周乾笑道執掌錢糧官居都督怎說庫無餘積今奉朝廷聖旨盡抄入官豈容虛誑庫官道杜爺委是清官並無一毫積蓄縱有羨餘即賞有功將士故此將士皆肯出力庫藏實是空虛程星馬道那庫官不須多辯你只取本府庫藏冊籍來看便知分曉庫官取出文冊當堂揭開逐一看過果實不多共算來止有五千三百余兩錢糧藏於庫中本府共有五千軍士倒有月余不曾支給請受史文通周乾二人看罷心下懊悔思量杜成治好沒見識官至都督管轄十三州三十五縣錢糧我只道有幾百萬堆積原來也只有這些須怎地是好周乾把眼一瞥立起身來淨手史文通會意也出門來周乾附耳道當初牛恩主怎地分付你我來眼前如此光景我等怎生回覆史文通道老兄不必心忙小弟自有措置不怕牛思主不歡喜二人依舊坐下史文通道程老先生在此這庫內錢糧是朝廷國課自宜充餉不必說得但聖意要抄沒杜公家産入官亦須交割明白程星馬道聖旨上明明說盤倉庫錢糧不曾提甚家產怎好沒抄入官史文通笑道程公與杜都督必是厚交故此事事迹庇諒林澹然脫難之時程公決知消息程星馬道史天使不必多疑凡事自有公論庫中錢糧學生照冊交割杜公家産不敢與聞說罷上馬而去周乾史文通大惱將杜成治家憧幹辦盡數拿出逼取財物産業家憧你我互相推託史文通大怒將一個老幹辦上起夾棍逼他招認老幹辦受苦不過只得將杜公産業財帛一一呈明周乾依言謄寫將杜成治家產盡行抄沒卻如洗蕩一般並不存留毫忽收拾星夜回京參見牛進備言其事獻上財物牛進大喜帶領二人進朝面駕牛進奏道臣等領聖旨籍沒杜都督錢糧今已回京專候聖旨武帝道將此銀兩照冊給賞邊軍牛進又道樞密院署丞周乾院判史文通俱有才能毫無私曲可差此二臣齎銀賞邊決能服衆武帝准奏即差周乾史文通貨邊二人奉旨徑往邊地去了武帝降旨吏部郎祝鵾複降爲江甯縣知縣緝捕刁應祥釋放出獄陳阿保舉首得賞應給賞銀一百兩祝鵾欽奉聖旨複理縣事差人拘喚陳阿保領賞這阿保自從地方保領出監聽候發落因這場官司費用了些銀兩反致衣食不敷換了一個店家做酒當日被公差拘提至縣祝鵾當面照數給與賞銀陳阿保謝賞口至店家備辦牲禮燒了利市紙請店主人和酒坊內弟兄們散福夜深酒罷阿保進臥房內將門兒拴了臺子上點著一盞燈盤膝兒坐在床上腰邊裹肚裏取出銀子對燈細看無限歡喜心下算計要娶渾家買田産討奴僕辦傢夥做衣服掐指頭兒左思右算不能同備猛可裏惱將起來篤這皇帝老兒恁地可惡說謊賺人我若得了三百兩到手豈不件件完成一時發迹如今不三不四難以擺佈恨了一會又將銀子逐一稱過點頭自解道也罷譬如不出首要十兩也不能夠的今有了這一百兩雪花官銀不是窮鬼了且將這銀子做起生理來一年兩倍兩年四倍四年八倍數年之中亦可做財主了又思忖把這銀子暫托與主人藏頓猶恐他放心扌肯賴欲待帶在身畔行動不便要埋於土內又怕有人瞧見暗中竊去千恩萬慮無計可施緊緊將銀子摟在胸前閉目靜想算計了半夜漸覺精神疲倦和衣睡倒忽聞有人叩門側耳聽時乃是姐夫巴富聲音慌忙開門迎入姐夫道貨已齊備今日湊著順風正好開船過海數日可到女真大舅利市決有十倍利息阿保歡喜催促起程同到海口下船扯起風帆只聽得潺潺水響舟行如箭忽地裏狂風驟起大浪滔天將船掀翻水面阿保落水扳著一片船板遊至海邊爬上岸來樹林中閃出一條大漢手持鉞斧攔住喝要買路錢放你過去阿保磕頭哀告因渡海翻船身邊並無財寶那漢持斧劈頭砍下阿保大呼饒命脫身就走那漢隨後趕來阿保追得心慌拚命奔走失足跌下糞窖內過頭沒腦浸在糞裏蛆蟲滿身鑽入口鼻阿保喊叫救命奈何聲啞極力掙不出聲魘將起來幸隔房聽得叫他方醒阿保連聲啐道呸呸呸心頭兀自躑躑的跳驚得一身冷汗忙將銀子們摸喜得尚在翻身朝壁再睡朦朧合眼去覺自己挑了一副水桶往溪邊汲水忽見水底一群魚遊阿保脫衣跳入水中捉魚猛聽得掌號聲見上流頭一隻大官船船頭上擺列族旗劍戟金瓜鉞斧傘蓋之類桅杆上懸一面黃旗閃出六個大金字船兩傍站立著戎妝將士那船一面吹打順水搖將下來阿保鑽入水底只聽船中一人道水下爲何有惡氣沖天是何怪物船傍軍上覆道是一個凡夫倉裏叫抓上來那軍士用撓鈎將阿保赤淋淋鈎上船頭用索捆了丟在旗下阿保偷眼暗覰倉裏虎皮椅上坐著一位官長修眉紅眼白臉長髯頭戴朝冠腰橫玉帶紫袍象笏相貌威嚴是一王者模樣兩傍侍立青袍角帶數個官員陳阿保心下大駭扯住執旗軍士問道是何老爺那軍士道你不見桅竿上旗號麽阿保道我一字不識乞你說與我知道軍士道俺大王乃水府正法明王是也阿保不敢做聲少頃傍岸執事前導次後儀從人等簇擁那大王進一大衙門阿保意欲逃遁被軍士拖入二門吊在左廊簷柱上阿保擡頭四看正中五間大殿殿前一帶朱紅欄杆欄杆外遍插槍刀旗幟殿中珠簾半卷燈燭熒煌東西兩廊一字兒排列著黃巾力士前後皆有兩道四圍齊豎木柵正似總制衙門一般忽然三通鼓罷將士齊聲吆喝大王升殿喝令拿那惡人過來一個赤臉獠牙使者將阿保倒提入殿跪於案前大王道這廝惡氣甚重必犯天條令罰惡判官檢查簿籍左班青臉判官將簿子逐一看了覆道此人姓陳名阿保和州人氏年二十七歲近因出首林禪師致於死地害家長李秀禁錮大獄夫妻拆散妄受賞銀一百兩損人利己犯陷害忠良之條律應陽世處斬陰受刀劍地獄之報大王又令注生判官看這廝原注祿壽何如右班白臉判官展開簿子看了覆道此人前世業屠恣行殺戮寵妻逆母言清行濁轉生陽世孤貧愚蠢艱苦伶仃壽元四九大王道論這廝犯此大罪本定依律斷發姑念無知下愚減他一等舉筆離座判十六字于阿保臉上正是雨露豈滋無本草橫財不富命窮人不知那大王所判何字且聽下回分解第十三回桂姐遺腹誕佳兒長老借宿擒怪物詩曰一紙丹書下九天忽聞司馬已歸仙魂隨鶴駕升彤闕子得麟胎繼大賢變幻妖狐迷秀士英雄僧俠救青年從茲意氣相投合白石樓前穩坐禪話說陳阿保夢入水府正法明王殿中十分恐怖明王今判官查看簿籍阿保罪犯天條舉筆書十六字於其臉上雲福善禍淫神目如電寶歸二春祿終一練寫畢令判官讀與阿保聽了喝教趕出去那赤臉使者將阿保提起來隔牆一撩阿保大叫一聲忽然驚覺天已大曉暗詳夢中境界悶悶不樂起來梳洗吃了早飯複將裹肚藏貯銀子拴系腰下徑往姐夫巴富家內來巴富留住吃午飯阿保把夢裏言語細細告訴巴富心下暗付這狗呆常是調謊不要理他但答道朝廷賞銀不容易得是你天大的造化可作速娶房妻室做些務實生理不可浪費了阿保應諾作別出門一路閒蕩信步行至玉華觀前見一人引相招近前聲喏乃是本觀道士杜子虛與阿保有親原是表叔侄之稱杜子虛道賢侄許久不面近聞你大是得彩愚叔正要來作賀阿保道惶恐有甚喜可賀杜子虛邀入觀中後房飲酒二人開懷談笑漸漸醉了杜子虛道賢任出首林和尚得了若干銀兩好福氣也阿保歎氣道小侄爲這樁事受盡了醃臢閒氣昨日方得賞銀入手又止得三分之一害得我通宵不睡即將夜間之夢備細又告訴杜子虛子虛道此是春夢有何靈應不必介懷且與你說正經話如今升元閣前有一土妓十分標致我今作東送賢侄往彼處一樂何如阿保笑道尊叔是出家人怎講這嫖妓的話杜子虛道你怎知我們傳授朝廷設立教坊正爲著我等比如俗家他自有夫妻取樂我道士們豈無室家之願沒處泄火嫖妓取樂乃我等分內事當官講得的故和尚喚做光頭道家名爲嫖頭阿保大笑道這話兒小侄平素未曾聞得杜子虛道此話是我道家秘訣你怎麽知道嫖頭二字有個來歷假如和尚光著頭去嫖被鴇兒識破連了光棍手打詐得頭扁方休我們道家去嫖任從妝飾頭上戴一頂儒巾就是相公換了一個大帽即稱員外誰敢攔阻故叫做嫖頭又有一個別號和尚加了二字叫做色中餓鬼道士添上二字名爲花裏魔王阿保道色中餓鬼是誚和尚無妻見了女人如餓鬼一般道家花裏魔王這是怎地講杜子虛道我等道士看經打醮辛苦了一晝夜不過賺得三五錢襯儀若去嫖耍不夠一宿故竭力奉承那妓者年壯的精元充足力量可以通宵年老的根本空虛須服那固元丹蝦須丸澀精散百戰膏助壯元陽鏖戰不泄因此妓女們見了我道家個個魂銷人人膽怯稱爲花裏魔王阿保道據老叔所言做和尚不如做道士但道士貧富不同富足的方有錢嫖耍貧苦的那話兒怎生發泄杜子虛呵呵笑道俺們窮的道土另開一條後路不怕你笑話我當初進觀時年方一十二歲先師愛如珍寶與我同榻而睡一日先師醉了將我摟定親嘴幹起後庭花來怎當這老殺才玉莖雄偉我一時啼哭先師忙解道這是我道教源流代代相傳的若要出家做道士縱使鑽入地裂中去也是避不過的太上老君是我道家之祖在母腹七十餘年方得降生這老頭兒金皮鐵骨精氣充滿善於采陰補陽百戰百勝後過函谷關見關吏尹喜丰姿可愛與之留戀傳他方術修煉竟成白日飛升幾道家和婦人交媾爲伏陰與童子淫狎爲朝陽實系老祖流傳到今人人如此愚叔只得忍受這喚做道教旁門富足的徑進正門不入旁門了阿保聽了這話引動心猿意馬笑道小侄已醉了天色又晚了适才老叔所言的妙人乘此時去看一看何如杜子虛道相陪同往但賢侄這般妝束不是那嫖客的行徑待我打點嫖具方好去得道士頭上戴一頂撮頂羅巾身穿一領霞色潞綢道袍陳阿保頭戴大頂帽子身穿橘綠囗絲旋褶一樣換了鞋襪令道童阿巧帶了拜匣同出觀門取路往升無間來一路分付阿巧道汝到彼處不可露出道士腳色稱我爲相公陳大叔爲大官兒凡事要幫襯阿巧領諾到了升元閣前轉入小巷進了一座牆門踅過竹屏方是妓館門前挂著斑竹簾兒二人進客座內坐了咳嗽未畢屏風後轉出一人怎生打扮但見頭撮低眉尖帽身繃狹領小衫酒肴買辦捷無邊燒火掇湯最慣嫖客呼名高應指頭這口輕言夜闌席罷洗殘盤歸縮行中好漢那湯保站在街下問二位爺從何處來巧兒道我家大相公和大官兒特來拜你家姐姐怎不出來迎接保兒慌忙磕頭陳阿保也要跪下答禮杜子虛忙把手扯住道生受你了姐姐可在家麽保幾道姑姐昨晚接了一位山東氈貨客人蒿惱得不耐煩方才出門去了故此貪睡未起阿保拍手笑道這又是個花裏魔王了不顯你道家手段阿巧連忙丟眼色方才住口杜子虛道