body:
  text: 第一回高丞相直諫辟邪林將軍急流勇退詩曰魏帝逃禪建法幢譖臣媚主激忠良縱橫鐵騎人難敵婞直金鑾氣莫當不肖遊畋殘稼穡英雄肮髒厲剛腸急流勇退真豪傑樂道逍遙雲水鄉話說梁武帝即位以來酷信佛教崇尚虛無長齋斷葷日止一食輕儒重釋朝政廢弛至天監十六年詔宗廟用牲牢有累冥道今後皆以面易之識者知其爲廟不血食遍處建立寺廟改元大通捨身同泰寺群臣以錢億萬贖之後賢有詩譏之曰梁武不知虛寂道卻於心外覓真禪弑君篡國皆甘忍煦煦求仁奚稗焉梁武帝於大通十一年正月敕禁城內造一大寺名曰妙相寺極其壯麗寬敞頒詔天下文武官員薦舉材德兼全高僧二員爲本寺正副住持消息傳入東魏來時魏主臨朝聞奏梁主建寺招僧捨身作善一事暗暗稱羨問侍臣道朕亦欽洛陽城外仿梁主所爲也創一個大刹築起浮圖召高僧廣行法事上祝皇太后聖壽無疆下亦可祈黎民之福卿等以爲何如衆臣等一齊俯伏讚揚道陛下立此善願上延聖壽下庇蒼生乃天地仁孝之心也魏主大喜頒詔工部知道擇日興工朝內大小官員見了旨意盡皆不悅同聚集渤海王府中商議此事卻說渤海王乃是東魏大將軍左丞相姓高名歡因立清河王世子善見爲帝有功故封王爵賜袞冕九錫劍履上殿當下衆官見了高歡禮畢共稟此事高歡低首無言沈吟半晌正與決不下只見班部中閃出一員大將高聲稟道皇上新登大寶衆心惶惶正宜澄心窒欲求賢禮士官衣旰食以副民望以保金頤今乃不明君道反信異端建寺築塔勞民傷財甚非治體主公爲朝廷柱石若不極言諫阻則社稷險危恐非大臣事君之道也衆官視之卻是鎮南將軍林時茂也這將軍身長八尺五寸碧眼虯須狀貌魁偉膂力絕倫猿臂善射箭不空發使一枝方天畫戟無一個對手能騎劣馬上陣如飛立性鯁直臨事不苟妻戈氏甚相恩愛蚤亡誓不再娶昔曾隨高歡出征與爾朱世隆大戰高歡兵敗爾朱世隆率軍趕來林時茂匹馬截住世隆部下六員健將嶽銘程廷錫王驕陶釗爾朱世甯爾朱敬一齊來戰林時茂獨戰六將一戟將爾朱敬刺死回陣五將奮怒力追林時茂又回身一箭將程廷錫射于馬下翻身又戰四將爾朱世隆在土山指麾衆軍重重圍裹林時茂撇了四將一馬奔上上山勢如猛虎之人羊群無人敢當被他直殺上山頂爾朱世隆措手不及林時茂話到早中左足翻身落馬衆將校拚死救出四將亦不敢戀戰救護主將而去因此高歡得脫大難班師之後重加擢用升爲鎮南將軍參贊軍務次後屢建大功不能盡述當日高歡聽了林時茂之言心下大悅道將軍所言甚合孤意明日早朝必當面諍皇上如不聽孤言只索挂冠而去衆官俱各歡喜散訖次日魏主臨軒百官齊集有詩爲證龍煙日暖紫重重宣政門當王殿風五刻閣前卿相出下簾聲在半天中文武臣僚皆隨著渤海王高歡朝見已畢高歡俯伏金階奏事魏主令內侍扶起欽賜坐下其餘宰臣侍立丹墀高歡道臣昨見聖諭欲建寺築塔延召僧衆不知陛下聖意將欲何爲魏主道皇太后年高多恙朕欲創寺召僧廣修善事爲太后祝壽以盡人子之心耳高歡道陛下爲皇太后祝壽此乃堯舜之心但壽算在天非釋氏所能延孝道在人亦非佞佛所能盡皇上聰明睿智豈不聞帝王之孝有虞舜可師文武可法布衣之孝有聖門曾閔賢士奇萊皆未嘗諂佛修行以爲善事若夫持齋誦佛造寺妝金乃異端惑民之術非聖主所宜留心也若尊釋教以爲孝則舍本而務末矣魏主道朕聞藏經有雲一人成佛九族升天往生淨土能超萬劫又雲帝王相繼以治天下皆緣羅漢托生可見佛力無邊爲三教之首相國反言其異端惑民恐非確論高歡道陛下身登九五務要清心寡欲親賢遠佞成就聖德何故信此虛浮妄誕之教以爲修善也必有奸黨蠱惑聖聰者臣請爲陛下解之夫佛氏崇尚虛無絕滅人倫悻逆天理誤天下之蒼生者也人稟阻陽之氣則生生化化終始不窮理所必有假令盡皈佛法則滅而不生人無遺類成何世界世俗子女難育故借佛老之教以冀延旦夕之命出乎不得已諒非其本心也雖雲披緇削髮而男女之欲人孰無之不能遂其所願輕則欲火煎熬憂患病死甚且逾牆窺隙貪淫犯法而不之顧至於佛會之說其惡尤著科斂人財聚集男女陽爲拜佛看經暗裏偷情壞法傷風敗俗紊亂綱常莫此爲甚其罪一也天地生物以滋養人群若從釋氏戒殺之說則獸蹄鳥迹充斥宇宙魚蟲鱗甲填滿江河人生又何賴焉此堯舜之所焦勞而治者也坐關實無罪之四講經爲聚物之藪持戒者是貪官污吏懺悔之私削髮者乃強暴奸頑避罪之活路聖人爲民立教仕祿于朝農耕於野商趨於市工習於藝莫不盡心彈力以資國家之用惟此緇禿暖衣飽食遊手好閑口誦彌陀心藏荊棘蠹國害民又莫此爲甚其罪二也凡人既脫紅塵以皈淨覺則宜布衣蔬食隨緣而足今之沙門貪鄙萬狀有如叩頭乞食剜肉點燈屈膝橋欄匍匐途路沿門打坐送渡求錢此喪廉失恥僧而乞丐以求富者也書符咒水請聖參禪慣分緣簿善說因果搖唇鼓舌此僧而幻術以求富者也談禪說法塑佛印經築寺建庵修橋砌路此又假公營私托善緣以濟所欲者也至於涉險履危梯山航海賤人貴出貿易開張能思善算以罔天下之利此又僧而商賈者也更若鑽倉掘洞鼠竊狗偷據山擄掠謀財害命喪心肆惡此則僧而賊盜者也又若鬼計神謀爭日奪産倚官托勢賄賂公行爭訟以求必勝圖謀以期必得博弈賭錢酗酒宿娼逞無厭之欲以爲師徒衣缽計此則僧而貪婪奸險持詐力以亂天下者也僧爲世蠹又莫此爲甚其罪三也負此三大罪重佛何爲臣素奉教于賢人君子振綱肅紀崇正辟邪乃聖帝明王相沿之法釋教之謬實所未聞臣愚戇冒瀆天聽伏乞聖涵魏主聞奏微笑道朕聞相國所言已洞見緇流之妄但佛稱三教之魁何也往往顯靈護國闡法濟民亦似有益于人世相國不可不察也高歡道臣聞上古聖主禦世惟以仁義爲重君臣敦睦於上人民親愛於下故熙皞之治成焉彼時佛老不尚何助國濟民之有世祖永平年間專尚釋氏遠近承風無不佞佛十數郡中共有壹萬三千餘寺後梁將陳慶之進兵榮陽一路縱火燒掠殆盡佛苟有靈何不顯身救護而使濟民利國之身化成灰燼可笑世間愚夫愚婦不辭跋涉艱難遠出燒香邀福求祥至於登山遇虎狼之噬渡海道風濤之溺損軀喪命悔恨無及佛若有靈又何不預先警覺以救之乎設以此二端問彼愚人彼必委之以數夫既有一定之數則事佛又何益焉蓋禪教易以惑人者生前談果報之國死後論地獄之苦富貴而修行必獲來生祿壽貧窮而敬佛能消往昔冤愆女可轉男禍堪爲福猶恐智士達人不尊其說故謬雲謗經毀佛必墮阿鼻立此危言以愚心志舉世受其迷妄籠絡而不覺可勝歎哉固亦有英雄傑士功成名遂而懷鳥盡弓藏之慮者寄迹禪林遨遊雲水效子房之辟穀仿蓮社之參禪此明哲以保身非實崇事於三乘也陛下萬民之主社稷安危所系正宜肅綱紀正百官承天順民創制立法垂訓百世以爲子孫不拔之業豈可尊奉夷教勞疲弊之民靡費脂膏構無益之寺乎臣切爲陛下不取焉魏主大悅道若非相國良言幾被衆佞所誤煩卿傳示諸臣朕即繳旨不復建寺矣高歡謝恩出朝當晚聖旨批黜近臣二員田有思鄔泮削職爲民永不錄用朝野盡皆相慶遍處播揚高丞相林鎮南有回天之力因此林時茂名聞四海人人敬仰止有高歡世子高澄心下不足暗成仇隙看官你道高澄爲何不足林時茂原來高澄爲人狠毒性如烈火酒色財氣博弈遊獵無所不至侍妾數十稍不如意輒致之死家丁憧仆打死無算高歡每每教訓只是縱性不改極好阿諛奉承凡是逃亡死命無籍之徒投他府中盡皆收用這一班人狐假虎威殘虐百姓遠近人民無不嗟怨因父親稱揚林時茂材能暗裏不服偏要滅他威風忽一日正逢初夏天氣四月初旬到處村鄉田麥成熟高澄帶領一班棍徒擎鷹逐犬擊鼓鳴鑼騎著高頭駿馬徑往東門外打獵作耍凡是高山峻嶺無不遊遍哄至一山名系舟山乃大禹治水時曾系舟於此山邊有一石如環軸故名系舟嵬滿山樹木遍嶺藤蔓十分險峻但見巍巍萬丈疊疊千層四圍翠柏參天遍嶺蒼松蔽日翠柏上但見猿呼蒼松頂推聞鶴唳昏沌沌雲封山岫黑沈沈霧鎖山巒蓁棘裏虎狼逐隊草叢中狐兔成群嗚嗚咽咽山禽鳴古樹高枝習習瀟瀟嵐氣吐巉岩幽壑深林蔚秀從教健翮飛騰大麓寬平一任良材馳騁驚心處無非水怪山妖觸目間儘是閑花野草只見潺氵爰飛瀑布屈曲路囗囗不聞雞犬之聲罕見行人之迹正是攀藤附葛猶難上涉險登危路怎行卻說衆人打攢趕上山頂放鷹逐犬正打圍之間見一隻大白鹿睡在草內衆人呐喊捕捉那白鹿失驚跳起來衝開人徑往山下奔走真個是疾同鷹隼快似流星高澄喝衆軍士放箭內中有一個善射的弓弩手連忙彎弓搭箭覰清射去正中白鹿背上這鹿帶箭負疼沒魂的亂竄一直趕到山下田畈裏高澄與衆人騎馬一齊趕來追得這鹿慌了一味地亂滾將這田內結成的麥子盡皆滾倒約有一二十畝寬闊衆人那裏肯舍不顧人田麥呐喊圍將攏來鋼叉苦竹槍長刀大棍並力亂戳登時將這白鹿結果了性命高澄即教軍士將索捆縛扛去正要擡起只見一人蓬頭跣足叫苦連天兩腳似碾車兒一般飛也趕來這人是誰原來此人姓齊名德就是本村農夫正在沙溝裏籪蟹鄰近牧童報說此事慌忙跑來看時衆人兀自未散見了這景象不覺心內火生腮邊淚落捶胸跌腳痛哭道天呀這幾畝田麥將已成熟一家男女十餘口性命全賴此過活如今被你衆人踏倒了怎生是好高澄怒道汝是甚人敢這等撒賴無狀軍校們著實打這廝衆棍徒聽得公子喝打一齊動手卻如衆虎攢羊將這齊德打得皮開肉綻面腫血流橫倒地上高澄還嚷道將這廝鎖了送到縣衙去此時過往人衆見齊德受虧俱忿忿不平奈是渤海王世子何等勢耀誰敢向前只得遠遠站立觀望互相唧噥道沒天理這時候雷公那裏去了正在喧鬧之間只見林時茂騎一匠黃馬隨著蒼頭因往城外訪友打從系舟山前經過見這夥人喧嚷問蒼頭這是甚麽人在此廝哄蒼頭打一看時覆道高公子領著軍士打一個村夫林時茂就下馬來見高澄禮畢問公子爲何打這村人高澄道林將軍你不知道這狗才無狀不識尊卑導言穢罵因此打這廝林時茂又問齊德道你這村人爲何不知上下辱駡高爺若送官司罪責不小齊德大哭道老爺呀你只看這些田麥就是了林時茂擡頭看時見滿田麥子盡皆踹壞驚道這卻爲何齊德道小人滿家男女全靠此田麥過活被高爺帶這夥不達事的軍士因捉鹿放馬將小人麥子盡情踹壞如今麥已成空又被痛打不如就死也罷不然日後免不得做個餓死鬼也說罷號啕大哭林時茂聽說激得怒氣衝天嚷道高公子忒沒分曉他的田禾被你人馬踏壞了人若無糧豈不餓死他來哭訴出乎不得已你們知事的就當賠償安慰他才是爲何反打他這般模樣忍心害理不體民情高澄罵道你這狗職也與村牛一樣汝在我父王麾下爲將是何等樣擡舉你得到今日不思報本反與村牛分疏抵觸俺可惡可惡衆棍徒一齊嚷道這是甚麽鳥官敢來觸犯公子林時茂罵道都是你這夥無籍棍徒引誘公子明日對丞相面講把你這幹人盡行驅逐方豁俺胸中之忿高澄喝衆人與我打這廝衆軍士見說素知林時茂手段高強都不敢動手林時茂發話道今日不與你角嘴明日早朝後同你到會議堂高爺處說個明白回頭分付齊德道你且去俺明日將些銀兩賠償你便了齊德磕頭道深謝老爺恩德爬起來一步一跌叫苦連天的自回去了林時茂策馬帶蒼頭向西而行這高澄帶領軍士扛著大鹿慢不爲意一頭笑一頭罵也進城中去了衆人領賞散訖次日林時茂同衆官早朝已罷齊赴會議堂參見高歡共議朝政至已時皆散高歡將欲退堂林時茂向前道總參有事稟上主公高歡問有何事說林時茂將高浪打獵踏壞民田打傷齊德之情循頭至尾細說一遍又道公子終日遊蕩不理正務淫人妻女僭人産業爲害不淺不知何處尋來一夥無籍惡少引誘公子無所不爲若使聖上聞知主公面上須不好看速宜把這班棍徒流徙邊遠曉諭公子改過不惟主公之幸天下亦幸甚矣高歡聽罷道孤已知道將軍請回林時茂拜辭自回高丞相上轎回府廳上坐定喚管門官進來問公子在外一向作何事業管門官道公子在府則攻書史出外則習弓馬並無他事高歡怒道總是你一班蠢材蒙蔽引誘若不直言先斬汝首管門官見丞相發怒懼怕只得跪稟說公子近來與一夥花拳繡腿無賴之徒終日飲酒樂出獵遊戲常打鄉村百姓壞了田中禾稼吃了人家雞犬這些百姓一來感老爺德政二來懼老爺法度敢怒而不敢言街坊上亂紛紛說公子的過失此事是實餘者不知高歡將管門官喝退當下怒髮衝冠坐在堂上午牌時分只見高澄醉醺醺回來了高歡罵道你這畜生在外做得好事若非林總參稟知幾被汝所誤喝令軍士拿下斬首原來高歡的軍令極嚴衆軍士不敢不遵只得將高澄松松縛了且未動手早有人報入衙裏只聽得當地一聲雲板響傳出堂來夫人請老爺議緊要話高歡帶怒退入私行原來這高歡的夫人婁氏所生四子獨愛高澄當下聞報驚惶無措急請高歡勸道丞相差矣父子天性之恩況兒子不犯軍法何故致之死地只是訓誨一番教他改過便了高歡道夫人不知這畜生帶領一起棍徒在外生事害民非止一端爲禍不小異日幹出事來孤與夫人爲他所累今日不若早除免致後悔言罷即傳令刀斧手速斬報來婁氏雙膝跪下道看妾薄面饒他死罪但重責這言生戒他下次把這些無籍之徒重治連夜配發遠方無人引誘便沒後患高歡思想一會道夫人請起孤自有處即出堂叫軍士拿轉不肖子來開了綁跪下喝道你這畜生罪不勝誅且看夫人之面把你這頭權寄在頸以後再蹈前轍必然誅戮今日死罪既饒活罪不恕教軍士行杖衆軍士跪下道公子雖然犯罪小的們焉敢行刑高歡喝散軍士令虞候帶進衙裏自打至數十餘下怒氣不息夫人又力勸方才住手隨將高澄監禁在書房不許足迹出門當晚升堂凡是高澄平日親近的軍士相隨的棍徒盡發有司問罪驅遣刺配又著虞候齎白銀十兩送與齊德因此鄉村百姓互相傳揚感歎林時茂的恩德且說高澄監禁在書房中悶悶不已又無一個心腹人在身旁咬牙切齒深恨林時茂痛入骨髓只待身子掙扎些決尋釁隙害他性命方泄此恨不題再說林時茂已知高澄被父責打棍徒俱已趕逐心裏暗想是我一時路見不平將此事對丞相說知這夥凶徒趕逐卻也罷了只是他父子至親高澄雖然被責日後相合時必進讒言終須有禍不如及早尋一個避禍計策心下躊躕半晌點頭道是了是了俺如今妻妾雙亡又無男女單只此身平生不知害了多少生靈性命罪業深重今此一計一者避禍保身二者消魔解瘴想這魏國裏安身不得了聞知梁武帝最重佛教不如走入中國削髮爲僧逃災躲難免遭暗害當下預將金銀財物藏頓區內隨身衣服包裹停當又修下一封辭職的文書次日聚集本行虞候軍士人等分付道俺今日要去訪一親故路途遙遠來往須費月餘若辭丞相必定羈留不放俺今不辭而去汝衆人須要謹慎各守執事如丞相爺差人問時有書一封著個精細的去呈上自然明白不可有誤分付畢即改換衣妝扮做道人模樣令一蒼頭向上挑了行囊一主一仆悄悄離家出了城門徑望東南而進且不題林時茂主仆二人遠行再表往事梁朝建康城外有一村民姓鍾名子遠娶妻朱氏兩口兒極是好善年至四十餘並無子嗣典因賣地齋僧塑佛不吝施捨願求子息接續香火梁武帝普通二年朱氏忽作一夢夢一猛虎入宅因而有孕於十二月初五日丑時産下一子生得眉清目秀相貌奇俊人人稱羨可愛就取名叫做愛兒年至七歲聰明乖巧無所不知讀書過目成誦只是稟弱多病一日鍾子遠在家無事與朱氏商議道我與你兩個年紀許大求神拜佛生得這個兒子雖然聰明卻是常有疾病未知養得成人否畢竟我夫妻二人命裏不該招子以此多恙聞得過繼在外改姓移名便養得大不如將愛兒送與近村寺院出家爲僧不但他有所傳靠抑且我和你存這點骨血死亦瞑目未知你心下何如朱氏道兒子是你生的由你張主但是千難萬難止得這點骨血如今送他出家心下一時怎地割捨倘有緣遇得個忠厚的師父庶可度日若撞著不知冷熱的人朝捶暮打教我如何放心得下子遠道渾家你的言語也說得是且不必性急慢慢地打聽擇一個忠厚老成的師父送與他便了若無好的且留在身邊另作區處也是這愛兒命該出家子遠夫婦商議之後未及半月一日子運往地上灌種將及已牌朱氏閉上門正要到廚房內整治午膳只聽得有人敲門朱氏笑道老人家終不耐饑出門不多時就回來吃午飯了走出來開門看時原來不是丈夫卻是一個年老的和尚朱氏看那長老時生得眉長耳大體健神清手持小磐項挂數珠身穿一領不新不舊褊衫腳著一雙半黑半黃僧履卻似阿難降世猶如彌勒臨凡原來這和尚是本村圓慧寺中法主姓閻法名智覺每常來鍾家打齋米的這長老合掌向前叫一聲施主問訊了朱氏連忙回禮道師父請坐智覺坐下擊動小磬誦了數卷經念了幾句咒吃了茶問道鍾檀越那裏去了朱氏答道他去地上種菜還未回來智覺又問道二位施主都一向安樂否朱氏道仗托三寶庇祐近日而已正說之間只聽得笑聲漸近卻是愛兒讀書回來對和尚唱個喏智覺回禮道好位小官回來吃午飯了愛兒道師父猜得著這智覺定睛看了一會猛失聲道咬咬可惜朱氏問道師父爲何歎惜智覺道施主莫怪貧僧有一句話不好出口怕施主見責朱氏道師父有話但說不妨智覺道令郎相貌甚清只嫌額角上多了一塊華蓋骨此爲孤相若在俗門中恐無受用又且壽夭貧僧有一個救他的道理但恐施主見怪故此失聲歎惜朱氏道多承師父好意指示迷途焉敢見怪正說話間鍾子遠回來了智覺即起身問訊袖手相別而去子遠吃飯畢依舊往地上種作直至天晚方回臨睡時問渾家道日間曾有人來尋我麽朱氏道並無人來有一事說起到也湊巧子遠道甚事湊巧朱氏道就是日間看經的長老把愛兒相了半晌驀然歎道可惜我問他爲何歎惜他說好一位清秀賢郎只嫌額角上多了華蓋骨大抵壽少恐無受用貧僧有個好方子救他只是怕怪難說我正欲問時你卻回了隔斷了話頭他就相別去了察他的念頭想是要愛兒出家的意思我正欲與你議此一事如何子遠道這機會卻也湊巧我前日與你商議正沒個好師父出家倒將這位長者忘記了譚家你不知這智覺是個篤實老成的長老況且寺又鄰近不如選個吉日送愛兒與他爲徒孫絕好夫妻二人商量停當次日侵早鍾子遠徑行圓慧寺中來進了山門只見殿門半開半掩靜悄悄並沒個人影子遠咳嗽一聲也不見有人答應子遠就佛殿門檻上坐了一會心裏想道這些和尚著實快活日高三丈尚兀自安睡未起正想之間猛聽得哈的一聲響子遠吃了一驚也是機緣輻揍遇著響這一下正是有意種花花不活無心插柳柳成陰畢竟響的甚麽東西且聽下回分解第二回鍾愛兒圓慧出家梁武帝金鑾聽講詩曰削髮技緇作野僧止因多病入空門無緣歌舞三更月有分修持一卷經誦梵罷時知覺路參禪靜裏悟無生偶逢武帝求賢詔引向金鑾面聖君話說鍾子遠聽得伽藍案前一聲響急擡頭看時見一個老鼠在琉璃上偷油見了人跳將下來不偏不斜卻好跳在籤筒上將籤筒撲倒響這一聲子遠思量道這寺裏伽藍甚有靈感不如將這事求一簽問愛兒出家日後成得功否就跪在伽藍案前通誠求一靈簽以卜凶吉求得第二十四簽子遠看時簽上四句詩道枯木逢春月至秋他鄉遇故喜相投求名問利雖成就未若禪林更好修子遠看了詩正合其意甚是歡喜坐在門檻上念誦只聽得有人叫一聲鍾施主爲何大侵早到我敝寺中閑坐口裏念些甚麽子遠回頭看時卻是管園的矮道人子遠慌忙起身道阿公要見你閻長老說話有煩轉達矮道人笑道我去即忙進去不移時閻長老出來迎子遠到方丈裏坐下智覺問道鍾老丈久矣不到敝寺中來今日甚風吹得到此子遠道小子不爲別事就是師父日昨到舍誦經相小兒無壽說有甚麽計較可救今日特造寶刹求教智覺道一向看令郎容貌是一孤相在俗門中惟恐壽薄若空入門爲僧必成正果又且可以延壽這便是救他的方子雖如此說只恐你夫妻二人未必割捨子遠道小子正爲這事而來適間問伽藍求一簽在此請看一看智覺看罷道不必說了這一簽是上吉的只怕施主心下恍惚若出家時必有收成結果子遠道有何恍惚既承師父美意肯收留小兒即選吉日送來智覺道施主再要和你今正商議不可造次待貧僧揀一個空亡日子辦些盒禮過來請令郎出家方是道理子遠道這也不消了亦不必和賤荊計議師父揀定日期小於送來便是子遠茶罷起身告別而回一一與渾家說了過了數日智覺著行童送柬帖到子遠家裏來說道本月十二日是華蓋空亡日子果肯不棄此日回成更好話不絮煩真個是光陰迅速倏然又是十二日到了這智覺長老著道人挑些盒禮送來不過是蔬菜點心之類子遠即央貼鄰當裏長的孔愛泉寫一張將子情願捨身出家文契叫愛兒過來別了娘送你到寺中快活去這愛兒對朱氏唱了一個喏叫聲娘我去呀只見兩淚交流不忍離別朱氏放聲哭將起來道我兒不是我做娘的心毒只爲你多災多病我爹娘命裏招不得你不得已送你出家從此去切要向上學好勤謹聽教訓不比在父母身邊撒嬌說罷悲咽不勝子遠亦垂淚道愛兒呵寺若遠時也不捨得你去了今幸喜寺院鄰近閻住持老師又且純厚的你去決然快活不必苦切可憐母子二人牽衣難舍連這道人鄰合亦各垂淚免不得拭淚而別子遠攜了愛兒手往寺中來這智覺和尚出來迎接到方丈坐下子遠將文契雙手奉與智覺智覺看了收於袖中吃茶已罷即辦齋供佛子遠叫愛兒先參拜佛像次拜師父凡寺中和尚俱備相見行禮畢長老取法名喚作守淨衆人坐下吃齋齋罷子遠在寺裏東西兩廊前後佛殿閑玩到晚齋畢又囑付了愛兒幾句方回閑話不題且說這鍾守淨自到圓慧寺出家之後真是緣會精神倍長災病都除智覺請師訓讀果然穎悟異常記作兩絕年近十四經典咒懺念誦樂器無不精妙更兼性耽詩畫善於寫作寺中和尚四五十衆盡皆敬服智覺長老甚是愛惜年至十六歲長老與他討度牒披剃爲僧好一個清秀俊俏的和尚凡是宦門富室之家有佛事者請得鍾守淨去方才歡喜自王孫公子以至騷人墨客無不往來交遊說這金陵城裏有一公子姓謝名循乃是有名才子其父謝舉現任梁朝左仆射之職武帝甚相親信爲人惇厚家資巨富這公子謝循酷好詩畫與鍾守淨文墨往來情義稠密聞得妙相寺工程已完朝廷頒詔要文武官舉薦和尚爲寺中住持謝循意欲父親薦