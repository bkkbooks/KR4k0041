都來聽經參見活佛俱各載米齎錢遠來佈施燒香的人隆寒盛暑絡繹不絕施捨的錢財米麥不可勝計真個是富堪敵國不要說鍾住持受用過于國戚王親便是鍾子遠夫妻二人享用極其豐足子遠常對渾家說也不枉了教兒子出家一場此時村民俗子看了鍾守淨的樣子個個羡慕爲僧天下習以成風出家者甚衆不在話下再說林時茂主仆二人自從離家避難行了數日不覺已到沁州沁陽驛地界了看看天晚過了綿山投一村店安息蒼頭放下行李向廚下炊飯林時茂客房暫睡蒼頭正炊飯間有一個老者也在那裏燒火坐於竈下將蒼頭不轉睛的窺覰蒼頭見了心下疑惑問道老丈爲何瞧著小人那老者道我看見有些面善見莫非在太原府中來的麽蒼頭道我正在太原陽曲縣內住老者又道兄尊姓蒼頭道在下姓林住升仙院前老者思想了一會嚷道我想著了兄莫非是林將軍尊使麽蒼頭道是也老文何以相認那老者歡喜道我當初在高丞相麾下犯罪轅門臨斬時你拿酒飯與我吃至今不忘爲河至此蒼頭道老丈莫不就是杜旗牌麽老者笑道然也原來這老者姓杜名悅綽號石將軍因他有些膂力頗通武藝投在皇親王驃騎麾下爲旗牌官因隨高歡出征失機當斬虧林時茂一力救解免死充軍在邊塞上十餘年逢赦回鄉不期在村店相遇當下杜悅問道你家老爺好麽蒼頭道如舊現今要遠出訪甚麽親戚喚我跟隨出來想是途路辛苦身體困倦睡在客房裏等我炊飯吃哩杜悅道爺爺你便早說些也好隔了十餘年不想恩人在這裏相會跳起身就往客房裏來口裏叫道林爺在那廂林時茂問道是什麽人叫且低聲這杜悅走到床前跪下道老思主小人受了莫大之恩未得銜結之報詛料今日在此相會說罷納頭就拜林時茂起身道老丈請起素不相認何勞重禮杜悅拜罷起來道老爺你可記得十年前失機的杜悅麽林時茂驚道你既是杜旗牌當時俺救了你性命免死出配邊方何以至此杜悅道一言難盡思主請睡待小人去沽壺村酒來酌一杯以表孝心慢慢的告稟即出房門問店家討一個酒瓶兒徑往市上去沽酒不多時提了一瓶酒買了幾味肴撰回店叫蒼頭燙起酒來就在客房裏桌上擺下肴撰請林時茂上面坐了杜悅侍陪兩個吃了數杯林時茂道公在邊塞受盡風霜俺常時思念今日得赦還鄉萬千之喜杜悅答道小人自從老爺救拔之後即往邊上一路曆盡多少艱難苦楚不可勝言今得赦回故土依棲著一個故友過活因他借些資本與這店家左右鄉民時常令小人來收些帳目不意得遇恩主小人得獲殘生實賴老爺再造之德小人雖粉骨碎身不足以報萬一說罷又吃幾杯杜悅道老爺如今欲往何處請親林時茂道俺非是訪親因有一腔心事難對人言今與公談諒不泄漏將高澄打獵害民被父責罰的事情備細說了一遍俺如今意欲走入梁國削髮爲僧潛身遠害故此全真打扮以辭故國杜悅道老爺一生忠孝真乃豪傑丈夫若入菩提必歸正道正是知機避害明哲保身出人頭地之處有何不可只是一件老爺這般打扮雖似道家但這些英雄氣概畢竟是一個將門模樣未免被人識破況且又無文憑路引梁魏兩地關隘防閑甚緊惟恐有阻難以過去老爺有心出家不如就在這裏近處寺院削髮爲僧討了度碟消停幾時然後往梁國去豈不美哉林時茂道此論甚高但這裏近處寺院大概廝認者甚多或看破時反爲不美怎地得一偏僻幽靜的寺院方好杜悅一面勸酒笑道小人有一親弟自幼出家在澤州析城山成湯廟側首問月庵內爲僧這庵甚是僻靜此去卻是順路數日可到自小人問軍之後彼此並無消息明日小人就陪老爺同去那裏訪問一來爲老爺大事二來就探望舍弟一遭儻或在時就彼削髮技剃甚爲便也林時茂道若得如此足感盛情二人商議已定叫蒼頭收拾杯盤同榻抵足而睡次日三人雞鳴起來別了店主一同往東隨路而進夜住曉行不一日已到澤州析城山下問月庵前林時茂舉目看時真個好一座清幽庵院但見松篁交翠灣一帶流水小橋殿角巍峨顯幾處鐘樓古刹門臨山岫隔溪每聽野猿啼址靠崗巒絕頂時驚斑虎嘯伽藍殿樹懸薛荔梵王宮爐噴旃檀兩廊彩壁畫菩提倒座觀音隨龍女經翻貝葉禪床老衲響全鈴花供優曇精含沙彌稱佛號果然景致清幽須信一塵不到不聞貴客來相訪惟有僧敲月下門當下三人徑進山門只見金剛殿上有一個小頭陀掃地杜悅問道小沙彌動問一聲寶庵有一位永清長老可在麽小頭陀道永清師太在禪房裏打坐三人聽說不勝之喜杜悅道相煩你通報一聲說是一個姓杜的弟兄特來相訪小頭陀丟了掃帚忙進禪房通報這永清長老聽得即忙出來迎接見了親兄杜悅十分歡喜笑顔可掬請二人進禪堂內相見禮罷坐下兄弟間別十餘年一旦相會免不得敘些寒溫說些離別相念之意當下永清長老分付辦齋管待問杜悅道這一位道者是誰與兄同來光顧杜悅道我正爲這道者特來見賢弟這就是高丞相部下鎮南大將軍林爺永清長老慌忙起身稽首道失敬失敬問道林爺正好享福爲何這般打扮做雲遊的模樣杜悅即將林時茂出家情由細說一遍永清長老道原來林爺爲這個緣因既要出家貧僧敝庵極是僻靜人迹罕到況貧僧還有幾張空頭度牒抄化文憑路引待明日早晨替林爺齋佛削髮便了林時茂拱手稱謝當日晚齋已罷各自安歇次日永清長老辦齋供佛看經誦咒林時茂跪在佛前摩頂受戒削髮已畢長老代取法名名爲太空別號澹然即將空頭度牒一張填上法名又有抄化文憑路引俱付與林澹然收了在庵盤桓了旬余林澹然思欲投梁即便告行永清長老弟兄二人苦苦留住又過了數日林澹然辭長老堅執要行永清長老和杜悅款留不住只得辦齋送行永清長老捧出一條熟銅打成的禪杖一領緇色褊衫一頂純綿頭褡一個金漆缽孟笑嘻嘻道這條杖子卻也古怪兩月前有一禪和子長眉赤腳來此挂搭齋供臨去時道無以爲謝願留此物貧僧再三不肯受他道權且收下日後可轉法輪施與一個蓋世英雄佛家領袖不想今日卻好遇著尊駕正是法緣伏乞笑留林澹然收了稽首稱謝杜悅又贈白金二十兩以爲路費林澹然道老師所賜小僧不敢不領老丈之贈決不敢領既已出家要此何用杜悅道些須之物不足以報大恩聊爲路途薪水之助林指然堅辭不受杜悅亦不敢強道既然不收薄禮小人相送一程林澹然道如此足感厚意當下拜辭永清長老林指然道日後得有進步必不忘吾師大德永清送出山門稽首而別林澹然同杜悅蒼頭三人一齊取路行了一日投店歇了次日行至河內地方萬善鎮前三人腹中有些饑了見一村店酒旗招揚三人進店裏坐下叫酒保拿酒來這酒保燙熱兩壺酒鋪下些魚肉菜蔬三人正吃之間杜悅忽然淚下林澹然道杜公爲何垂淚杜悅道小人非爲他事悲傷一來今日與恩主拜別老朽年近七旬風中之燭朝不保暮不知與思主還有相見之日否二來老朽止有一子名成治頗讀兵書亦通武藝自我未犯罪之前令他去梁國投母舅麾下圖一個進身誰知去後古無音信十餘年不見一面未知存亡若何常懷悒怏有此二事系心所以慘切林澹然道俺爲僧道的雲遊四海與你雖然暫別也有相逢日子便是令郎遠投令舅精通兵法必不落於人後但不知令舅尊姓大名目今爲梁朝甚麽官職杜悅道妻弟姓傅名惲向來聞得人說守邊有功官爲總兵統制鎮守南陵郡管轄十三州四十五縣軍民到梁朝問時便知端的林澹然道既如此老文不必慘切快修書一封待俺帶去慢慢訪問令郎消息若遇得機會送書與他必然回來父子相會杜悅拭淚稱謝即借店主筆硯寫了書封固已畢送與林澹然澹然收了道古人雲送君千里終須一別承君相送已是數日足見厚情就此告別再留後會杜悅算還酒錢蒼頭挑著行李馱了禪杖三人走出店門行至三岔路口杜悅道今此一別實覺心中戀戀不捨未知何日再相會也林澹然道君今年老不可憂鬱以傷天和相會有期即此告辭二人垂淚而別話分兩頭卻說高歡一連數日不見林時茂來參心下疑惑差值日虞候往參府衙門查問此時參府軍士一同虞候進高丞相府中回話呈上文書高歡拆開放在案上細細展看書雲部下末將林時茂薰沐叩首狀上大思主明公大王麾下竊以茂乃一介征夫常蒙國士之遇區區武弁更叨提拔之私學不請於韜鈴身不通乎謀略常懷垂轡之情未效銜環之報數茂之罪擢發難窮感王之恩粉身莫罄茲者茂有眷屬系瓜葛之至親遠處遐方歎鱗鴻之久絕欲行一心探訪敢惜半載途遙意欲叩別軍門恐妨靜攝遽爾潛離政府罪律難逃錐恩主大德海涵使茂感恩嶽重冒死狀上統冀垂憐回首故鄉可勝眷戀年月日部下沐恩小將林時茂狀稟高歡看畢失驚道林總參去訪甚親爲何有數月路程汝等可知道麽軍士道參爺臨行只說這親住得囗遠不曾說甚麽地方去處小的們故此不知高歡發付軍士去了暗中思忖林鎮南是個知機烈士慮那畜生尋他釁端故此不辭而去可惜沒了一員智勇足備的大將心下鬱鬱不樂部下將士一齊稟說林鎮南此去多分投于梁國我這裏軍情虛實他盡知之況他智略過人勇力蓋世若爲梁朝所用異日爲患不小丞相可速差精騎追趕轉來免生後患高歡道汝等不知這林時茂爲將隨孤多年遇戰敢前有功不伐立性鯁直想他此去不過是知幾隱遁而已焉肯事二主以爲不忠之人爾等毋得多言孤自有處衆人無言而散次日早朝高歡將林時茂辭官探親之事面奏魏主不題卻說林澹然自與杜悅分別之後同蒼頭向上往東南進發迤邐行了數日一路無話看看走近梁魏交界地面到晚投飯店安歇次早蒼頭正欲挑擔出門林澹然道向上慢著俺有句話與你說自你隨俺以來勤謹老實衆仆之中不能如你俺故帶你出來如今俺已爲僧況前面是梁朝地界出家人僕從同行甚爲不便今日與你分手拿這行囊過來蒼頭雙手遞過皮匣林澹然取出兩封散碎銀兩藏了次後只取禪杖缽孟褊衫便服余者金銀財物盡數交與蒼頭道不是俺今日無惰撇你只是俺既跳出紅塵便要雲遊天下自此之後你當隨便揀一個好去處將此財物買些田産自耕自種足以養老終身不必記念俺了向上聽罷拜倒地上放聲痛哭道小人自從老爺收錄之後養育深恩未嘗忘報今日又賜小人許多財物老爺今日孤身出外野店風霜路途勞苦正當小人跟隨伏侍雖使上天入地粉骨碎身死而無怨何故老爺今日不用小人畢竟還要隨老爺同去林澹然道俺主意已定何必多言就此分路不須啼哭只是前途謹慎平安俺亦放心得下說罷手持樣杖缽盂背馱包裹出門欲走這蒼頭苦痛難禁趕出門外拖住林澹然衣服跪在地下悲哭不忍分手林澹然含淚假意發起怒來喝道可惡這廝胡纏向上只得在地上拜了幾拜起身挑擔滴淚往西而去林澹然獨自一人到武津關口即是戰國昭關伍員適陳處也守關吏見是個遊方僧人也不甚盤詰況林澹然又有度碟抄化文憑路引大落落地徑闖進關裏就關口飯店坐下叫店主辦飯來店內後生即忙鋪下蔬飯林澹然吃飯之間問店主人貴境到建康還有多少路程店主道敝地到京師尚有千里之程只是有些阻礙惟恐難行林澹然道清平世界浪蕩乾坤怎麽難去店主道我說起來委實驚心果然駭異正是烏鴉與喜鵲同鳴吉凶事全然未曉不知店主人說出甚地艱難話來且聽下回分解第三回林長老除孽安民丘縣尹薦賢禮釋詩曰古道荒涼人影絕紅顔土穴遭磨折天生俠士逞神威叱吒一聲妖獸滅賢良縣宰能鑒別薦引雙雙朝鳳闕聲名遠播鬼神欽千載流芳林俊傑話說林澹然在店中欲往京師問店主人路程店主道建康有千里之遙但此去百餘裏地名嵇山乃睢陽地面向來太平不知怎生近日出一野人虎頭熊掌身長丈餘專一吃人本府太守差獵戶土兵山前山後日夜用心剿捕反被他傷損多人因此行人難過大都輾轉往別路走了若過得此山一路平坦直到建康林澹然笑道不信此畜有這般利害店主道師父你不知這野人口邊露八個獠牙長三五寸一雙臂膊一丈有餘那十個指頭就如鋼鈎一般利似霜鋒腿上粗毛硬如針刺跳一跳有三四丈遠渾身黑肉似鑌鐵打成刀箭不能人人若撞見就騎著快馬也難逃脫一手揪來先摳眼珠次剜胸膛吃了心肺然後受用四肢身首哩縱是八臂哪吒也近他不得師父若去時早晚切不可行直待午牌前後等有夥伴聚集了數十人方可去得林澹然道多承指教但俺出家人一心以救人除害爲念前途有此妖畜若不驅除怎顯得慈悲救物之意除他不得死而無怨不知這畜巢穴在於何處那裏是他出入路徑店主道我一向聽得人傳說在嵇山正南路上一座土地廟裏藏身廟前是走路廟後是一條闊溪東南兩邊都是山村東邊還有幾村百姓西首人民都被他吃得慌搬移別處去了師父若要去切須謹慎今日天色將晚且就荒店暫宿明早起程罷林澹然稱謝就在店中歇了次早算還飯錢辭別了店主澹然初入梁國路徑不熟只望大路而走一路無話至第三日午牌時分看看走到嵇山並不見一個行人遠遠望見正南路口一座古廟果然寂靜真是荒涼趲步上前看時但見屋宇皆傾壞門窗四下空雕梁塵滿積畫壁已通風亂草生階道瞅瞅吟砌蛩神廚無頂板案桌沒籤筒左廊懸破鼓右廡缺鳴鍾土地脫鬚髮夫人褪臉紅判官靠壁北小鬼拄門東燭臺堆鼠糞爐內可栽蔥屋檐蛛網絲瓦片似飄蓬蕭條真慘切四顧絕人蹤林澹然將包裹除下和禪杖放在土地神座前對土地稽首將包裹內所餘乾糧吃了手提禪杖周圍廊下前後細細尋看並不見一毫蹤迹也沒一個人影只見土地櫥座下白雪雪幾堆骨殖櫥左邊側首一塊石板滑溜溜卻似水洗磨光的一般其餘都是些灰塵亂草並無別物林澹然暗忖道這孽畜在此棲身敗得廟裏光蕩蕩的只有這幾堆骨頭甚是可憐忖了一會無處搜尋提起禪杖在這光石板上繳了幾下嗟歎數聲只聽得石板底下嚶嚶的有人做聲響林澹然道卻不作怪麽莫不這孽畜在石板底下存身也不可知拄著禪杖將石板四圍看了一轉原來是搖得動的將禪杖雙手用力撬起來只見底下是一土穴穴內甚寬兩個少年婦人鬢髮蓬鬆形容憔悴坐在石條上內有一張床兩頭是石中間數根亂木橫擱爲床上面鋪些亂草餘外山禽野獸堆積滿地林澹然喝道你兩個婦人是人是鬼爲何在這石板底下安身好好對俺實說那兩個婦人一齊哭道佛爺呀我兩個是本村居住的百姓一姓唐一姓宓丈夫都是倚靠田莊過活一日丈夫出去耘田我兩個在門口閒話猛然起一陣狂風風過處見一怪物走到面前把我二人驚倒在地被他一手一個拿到石板內只疑命盡誰知不分晝夜輪流淫媾每日采些山桃野果與我們度命就如在陰司地獄一般苦不可言今日遇著活佛望救蟻命言罷雙膝跪下淚如湧泉林澹然道你且說這畜物怎麽樣出入婦人答道每常間夜裏出去日間躲在洞中近來卻又早晨出去傍晚方回止有些野獸山禽之類拿來今日天色陰暗這時分已晚將次回來了望乞佛爺怎地救得我兩人性命實是再生父母林澹然道你二人且不要慌只躲在這洞裏待俺把這孽畜斷送了然後方救得你二人出來三人說話未完忽然一陣腥風刮得塵飛滿廟林澹然忙將石板仍舊蓋了手提禪杖立在廟門內張望時又見一陣風起這風比前更大腥氣觸人遠遠望見野人雙手提著一隻大鹿走將來了林澹然閃在門後定睛細看這野人果然生得利害但見身軀怪異分明野獸又如人狀貌猙獰卻像魔王疑似鬼光閃爍眼射兩道金光亂蓬鬆頂撒一叢黃發兩條臂膊渾如靛墨妝成十個指頭一似純鋼打就腥氣難聞行動處陰風匝地雄威可畏哮吼時霹靂喧天且體言勇力超群果然是吃人無厭虎豹見伊魂魄散豺狼撞他命遭傾只見這孽畜眼觀著他處看看走入廟中不提防林澹然在門後舉著禪杖大喝一聲道畜生體走將禪杖劈頭打去野人吃了一驚側身閃過就丟了鹿大吼一聲舒兩隻黑爪向前撲來林澹然舞動禪杖滾將入去那畜物並不懼怯摣手舞腳向前撲人兩個鬥了一會林澹然暗想和他這等相鬥怎能除得心思一計倒拖禪杖往東山凹裏便走這野人伸開長腳箭一般趕來林澹然覰他來得近了扭回身將禪杖照肩膊一掠說時遲那時疾野人即忙躲過澹然卻不打他肩膊就勢往下毛腿上用力一掃正掃著他臁兒骨只聽得啯的一聲這毛腿早已打折野人就挫倒地上掙扎不起林澹然隨即照頂門著力一下打得個發昏章第十一就連肩帶脊不住手的打了數禪杖那消半頓飯時除了一村大害有詩爲證野獸無情勢莫當村民數載盡遭傷賢僧試展屠龍手一杖當頭命即亡話說林澹然仗平生武藝沒頓飯間將野人打死見他氣絕了用得力乏即走到廟裏門檻上坐了半晌喘息已定跳起來仍將禪杖橇起石板叫道這孽畜已被俺打死你兩個且上來說話這兩個婦人歡天喜地答應道謝神明原來也有今日佛爺且住待我們取些物件上來林澹然道卻又作怪土窟裏有甚麽東西只見兩個婦人在洞裏將些竹木搭起你我相扶爬將上來手裏各提了一個破衣包見了林澹然只是下拜口裏齊叫救苦救難的佛爺重生的父母再世爺娘救我二人性命何以報答磕頭不止林澹然道你旦起來不須拜了你二人趁早尋路認回家去貧僧自在廟內暫過一官明早取路要上京都這野人可叫人來燒毀就是了那兩個婦人道佛爺說甚麽話你今舍生拚命除此畜物救了婦人與滿村百姓恩德如天如何便去今晚佛爺同村婦到家裏用些晚飯就在草舍權宿一宵明早著地方報縣官知道辦些香花燈燭禮物即謝佛爺留下大名以便各家供奉這兩個包裹內都是這畜生吃了人遺下的金銀首飾乞佛爺收下權爲路費林澹然道俺出家人要此金銀首飾何用你兩個自收去養活或者與丈夫做些資本也不必報知縣官亦不勞衆人酬謝俺今晚在此廟中暫歇一宵你女俺男若到汝家甚爲不便你兩人自去罷兩個婦人再三道佛爺這古廟中甚是荒涼並無人影怎地在這裏安歇還是到我們家裏去不妨林澹然道貧僧斷然不去的不必多言天色已晚快去快去若再夜深難以尋路兩個婦人見林長老堅執不去只得背了包裹拜辭出廟尋路去了喜得七月中旬正值皓月當空兩個婦人趁著月光一步步捱到家時但見空閨冷落四壁歪斜推門一看屋內止有破桌破凳傢夥數件而已兩個只得在破凳上坐了商量道今夜且將就坐到天明門前俟候若有人行過教他去報地方知道請這活佛轉來謝他便了且說林澹然獨自一人在廟裏神廚內睡了一夜不覺天色已明心內忖道若再遲延必被這地方人等纏住不如及早收拾動身慌忙將包裹裝束手提禪杖拽開腳步往東南而走這兩個婦人等不到天曉五更時就站在門首伺候人過將及天明有一夥近村菜戶約十數人口唱山歌挑著菜擔到城內去換柴米手裏都拿著一條槍棒也是防備這野人的兩個婦人連忙叫道你衆位那裏去的內中一個答應道我們都是進城裏去做買賣的你問我們怎地婦人道列位生意且請暫歇起有一樁喜事與你計較煩你們到村前村後獵戶保正人家通個消息那夥人問有甚喜事要我們通報婦人道你衆人手裏拿著槍棒做甚那夥人道你豈不知這村裏土地廟中野獸吃人故用槍棒防備他你這兩個女人好大膽在這孤村破屋裏住又沒個男子好險也婦人道我們正被野人擄去昨晚賴一位進京的活佛不消幾禪杖除了這畜救我兩人性命故煩你們通報好叫地方得知重重謝他這夥人聽見說野人被個和尚打死了個個伸舌搖頭道有這等事必是佛來下降了各各丟下扁擔四面八方飛也似跑去傳報少刻間各村居民若大若小扶老挈幼都奔到土地廟裏來喧天震地鬧叢叢何止五七百人將野人屍首圍住了看內中有一人道衆位不要看這孽畜且理正事同到廟裏拜謝活佛要緊衆人都應道說得是一齊擠到廟裏並不見個人影衆人四下搜尋亦沒蹤迹一齊笑道又是異事這長老想是有翼翅的騰空去了有的道此長老決非凡人必是甚麽神靈下降殺這畜生救了我滿村百姓依舊上天去了不然如何除得這般惡物又有的說道不要慌先著兩位保正去縣裏報知方才聽得報事的說這長老要往建康去料他去亦不遠我們一齊趕上畢竟追著拜求他轉來如何衆人齊道此論甚當有幾個保正裏長忙忙的到縣裏報去了這一班後生村民獵戶一窩風同望東南趕來原來林澹然從早辰走到午時走不上三十裏之路看官你道爲何一者路上沒了飯店未曾飲食腹中饑餒二者對付這野人費了氣力因此精神疲倦慢慢的挨著走不多路被這夥人一霎時趕著了一齊喊叫師父慢行林澹然聽得叫喚立住腳看時只見一起人搶向前來拜的拜扯的扯不由澹然做主平空地攙將轉來再說睢陽縣尹乃浙東人氏姓丘名吉字祥甫是一清正之官當日才坐早堂見這幾個裏老慌慌張張撞到堂上知縣道你這幾人爲甚事的裏老道小人是嵇山保正等爲報喜事蒙老爺德庇嵇山土地廟裏野人幸遇一位遊方長老打死了故此特來報知乞爺鈞旨丘吉道這野人是獵戶相助打死的是這和尚獨自一人打死的裏老道昨日晚間是這和尚一人打死的今早衆人方才知道比及奔到廟裏這長老已自去了故小人等先來報知另著人追趕去了未知追得著否丘吉道與地方除害合當重酬既然去追諒他也去不遠必追轉來叫跟隨的快備馬我須親自去迎他一遭丘吉上馬急急望土地廟來未及到廟遠遠見人聲喧哄打團團圍住一個和尚在廟裏跪拜丘吉即下馬步行到廟衆人見縣尹來都一字兒排列兩邊林澹然起身合掌問訊丘吉回禮叫裏正快備座來賓主坐了丘吉道吾師高姓大名仙鄉何處今欲進京貴幹怎麽遇著這野人被吾師所斃林澹然道貧僧姓林法名太空賤號澹然北平人氏遊方數年爲到建康訪一故友打從貴境經過昨晚偶在廟前遇著這孽畜被貧僧數排杖斷送了性命此乃些須小事何勞大駕親臨丘吉道敝治嵇山出此異獸吃人無厭勇不可當滿村百姓來往人民盡遭毒害下官屢著土兵獵戶捕捉反被所傷今日得遇吾師除此大害真乃神人下官與百姓皆叨覆庇矣林澹然道出家人慈悲爲主佛祖尚捨身以利物今日替民除害乃貧僧分內事何勞尊官過譽丘吉即攜手同出廟外看這野人驚得毛髮皆豎道好利害之物不知傷了多少生靈看了半晌依舊到廟裏坐下分付各村裏老保正百姓人等都要打點幢幡香燭笙簫鼓樂迎林老師到縣中去這些百姓聽得縣尹分付各自去備辦齊整縣尹叫該房書吏一邊辦齋款待頃刻村民聚集稟覆一應鼓樂幢幡等項俱已齊備丘吉請林澹然上馬令獵戶等一面放火燒毀野人屍首只聽得一派鼓樂之聲前面開導後邊一班百姓焚香點燭簇擁而行不一時已到縣前丘吉同林澹然下馬上堂重新施禮分賓而坐次後衆百姓書吏皂甲人等都到堂上拜謝林澹然澹然各各答禮丘吉發付衆人且去明日裏長保正等率衆人早來伺候衆人答應散訖請林澹然後堂飲酒不覺天晚令人送至縣前安惠寺中歇宿當晚丘吉與六房書吏商議道我看這林長老一貌堂堂儀錶出類決非凡俗僧流必是一籌豪傑近聞京都妙相寺已有一員正住持了因寺內錢糧廣大屢遭盜賊偷劫朝廷頒旨要天下官員人等薦舉一員有材德兼武藝者爲副住持我欲親送此僧到京以充乃職汝衆人心下如何衆書吏道老爺主意甚好小的們也看這長老磊落不凡若爲此寺住持決替朝廷出力老爺必定高升丘吉心下歡喜次日天色黎明門皂跪稟各村裏老保正領衆百姓捧著金銀段匹在門外候老爺發落丘吉隨即上馬率領百姓到寺中來本寺和尚撞鐘擊鼓迎接丘吉入殿參佛畢林澹然出見平揖坐下茶罷丘吉令承直與衆百姓捧過金銀彩帛道昨蒙吾師大德無以爲報今有官給銀壹千貫並敝治百姓備得些須薄禮相酬乞笑留萬幸林澹然合掌辭謝道貧僧雲遊四方托缽爲生隨緣度日要此金銀何用身上破袖足以避寒要此段匹何用昨承大人款留叨領盛齋足矣今早正欲登堂叩謝又蒙大駕光臨乞尊命發付衆人各收金帛回去將官給賞銀周濟貧窮被害之家即貧僧之受惠矣丘吉再三苦勸林長老堅辭不受丘吉只得教衆百姓拜謝領禮物回去將官銀散給百姓安惠寺住持安排齋供款待林澹然起身拜謝告行縣尹道吾師請坐下官有片言相告适才衆人謝禮吾師堅執不收下官亦不敢強今愚意欲伴吾師同往建康未知尊意若何林澹然道大人理攝縣事豈可離境運行上司知道亦不穩便貧僧隨路抄化而往豈敢勞車駕也丘吉笑道吾師有所不知本朝京城之內敕建一妙相寺極其廣大費了偌大錢糧今已有一員正住持在彼卓錫近因寺內施捨者衆廣有金銀財帛屢被盜賊偷劫聖上降旨捕獲並無下落連朝廷也無如奈何敕下各省官員人等舉薦才德武藝兼全長老爲此寺副住持如舉稱其職薦官升擢重用儻或受賄妄舉薦官一體究罪下官看吾師臨財不貪有力不伐立身謹慎膂力過人堂堂一表乃材德皆優之高僧也野人肆毒吃人無人敢近吾師隻身除害此萬夫之勇也薦與朝廷必稱此職下官已動文書申明上司矣明日吉辰即與吾師同赴京都林澹然稽首道貧僧有何德能當此大任況今年邁力衰經典未諸這妙相寺住持不比尋常設或差池有累尊德此實不敢奉命丘吉道下官主意已定吾師不必太謙即叫本寺和尚分付道好生管待林大師不可怠慢明日起程林長老再三辭謝丘吉堅執敦請相別回衙安惠寺和尚將林澹然敬奉款待酒肴茶飯極其豐盛誠心服侍一官無話次早丘吉升堂令該房書吏寫了文書差押司皂快分投各上司去了將縣印交與縣尉權管收拾行囊帶了幹辦徑到安惠寺接林長老並馬出城取路往京都進發路中閒話不題不一日已到建康地面當下兩人進金川門來林澹然仔細觀看這建康城中果是皇都氣象繁華富貴與外郡不同但見皇都壯麗時看玉燭之調紫禁巍峨永奠金甌之固六街三市肩摩毅擊盡王孫八相九卿展采分欲皆髦士庫藏中錢如山積倉廒裏粟似泥沙家家戶戶盡笙歌往往來來俱禮樂聚八方之玉帛會四海之珍奇隨他儉嗇也奢華任你貧窮都飽暖當日尋覓客館安歇次日五鼓丘吉同林長老齊赴早朝遠遠見午門外燈火熒煌文武官員聚集于侍班閣子前等候朝見只聽金鍾響罷卻早天子臨軒衆文武鴛序排立山呼舞蹈畢丘吉出班俯伏奏道臣乃堆陽縣知縣丘吉有事奏陳黃門官道汝是縣尹爲何不理縣事又非朝覲之期擅離本縣所奏何事丘吉道臣奉聖旨特薦一員智勇足備沙門爲妙相寺副住持親送至此懇乞轉達天聽以陳備細黃門官啓奏武帝傳旨宣丘吉上殿丘吉隨至殿階俯伏武帝道卿所薦之僧何方人氏是何法名何以知其智勇足備一一詳奏朕當選用丘吉道臣叨聖恩除授睢陽縣知縣到任之後喜得歲稔年豐民安物阜近來離縣四十裏有一村名爲嵇山出一異獸虎頭熊體身長丈餘爪似鋼鈎行如飛鳥滿身鐵肉專一吃人村民過客盡遭其害臣屢差士兵獵戶捕捉皆被傷損滿村百姓驚惶逃走無人敢近忽於七月中旬一遊方僧人姓林法名太空別號澹然從東魏來經過嵇山土地廟中遇此惡獸被僧數杖剪除酬以金帛堅辭不受臣見其廉而且勇非尋常細流可比特薦爲妙相寺副住持伏乞聖裁武帝聽罷道這僧今在何處丘吉奏道此僧在午門外候旨武帝即傳旨宣林和尚面君林澹然隨著黃門官進入殿上山呼舞蹈已畢武帝看林澹然一表人材威風凜凜心裏大悅有蝶戀花詞爲證炯炯雙眸欺閃電態度雍容喜色春風面滿頰蒙茸星萬點達摩飛錫來金殿破袖離技隨體轉雲水爲家不把功名戀俠骨天生金百煉芳聲遍處人欽羨武帝道卿是自幼出家還是中年技剃通何經典習何武藝睢陽害人之言怎生剿滅可詳言之林澹然奏道臣乃將門之子自幼頗習武藝因見閻浮世界功名富貴到底無根生死輪回纏劫無盡中年猛省回頭削髮披緇以了生死經典咒懺尚未精習棄家雲遊導師訪道偶從嵇山經過一路聞人傳說野人兇狠吃人臣奮死除害以救地方百姓今因丘縣尹得瞻天顔若爲妙相寺之住持臣實不稱乞賜臣雲遊方外自在逍遙祈保陛下萬壽無疆皇圖永固武帝道朕視卿堂堂儀錶必是英雄豪傑可惜出家爲僧經典之類卿試習之自然通達何慮不精今能除害救民其功不小妙相寺正少一員副住持朕訪求久矣得卿爲之大慰朕心朕意已決卿勿因辭既著光祿寺辦齋敕禮部侍郎程鵬光祿卿吳繼宣薦官丘吉三人陪宴丘吉林澹然二人謝恩而退正是不因漁父引怎得見波濤畢竟林澹然果肯爲妙相寺副住持否且聽下回分解第四回妙相寺王妃祝壽安平村苗二設謀詩曰作善從來是福基堪嗟世道重囗黎三乘未祝皇妃壽萬鎰先爲快士窺紙帳漫驚禪夢覺黃金應使盜心迷變生肘腋緣何事只爲奢華一著非話說丘吉薦林澹然于朝梁武帝大悅即敕光祿寺大排蔬筵款待丘吉澹然謝恩出朝光祿寺中已差人迎請衆官見禮畢分賓主登筵奏動一派鼓樂互相酬勸至晚不散丘吉同林澹然在會同館驛中安歇次日五更樞密院官傳出聖旨著禮部官送林長老進妙相寺中封爲僧綱司副法主妙相寺副住持普真衛法禪師欽賜袈裟冠杖等項有差升丘吉爲晉陵郡丞又差僧綱司僧官率領人衆各執寶幢細樂一同送到妙相寺來正住持鍾守淨率領本寺僧衆來迎林澹然一行人進寺俱人佛殿參佛謝恩次後一一行禮坐下禮部侍郎程鵬道此位排師姓林法諱太空別號澹然祖居東魏才德兼全智勇足備在嵇山除了惡獸救濟萬民睢陽縣尹丘先生廉得薦爲寶刹副住持奉聖旨令下官送登法座伏願二師同心闡教合志修持互相翼贊大轉無量之法使佛日增輝皇圖鞏固勿負朝廷恩典是幸鍾守淨道早晨聖旨到來山僧已知其詳目今寺中屢遭賊寇爲此日夜索心今幸林住持飛錫光降敝寺增輝多矣敢不盡心聽教林澹然道小僧本意雲遊方外托缽隨緣不期偶逢丘縣尊薦拔得面朝廷又蒙聖恩欽賜爲本寺副住持小僧一介鹵夫不通文墨惟慮才不稱職有負聖思或有不到乞師兄海涵指教爲幸鍾守淨遜謝畢排下蔬筵邀衆客進禪堂飲宴酒行數巡食供幾套衆官起身告別鍾林二住持送出山門上馬相別而去其餘人從各有賞賜不說丘吉辭朝臨任特表妙相寺自從林澹然入門之後光陰迅速又早月餘二位住持打渾過日我看你動靜你看我行藏二人都冷眼偷瞧無所長短林澹然終是將門出身度量寬大器宇沈雄不以財帛介意待寺中衆僧人等一團和氣本寺僧衆俱各悅服鍾守淨畢竟是個小家出身胸襟窄狹吝嗇貪鄙愛的是小便宜待人時裝模做樣待著自己有些才能不以他人爲意僧衆外雖敬懼內實不平凡寺中一概錢糧財帛出入皆是鍾住持掌管林澹然毫不沾手惟坐禪念佛而已又過了數月時值初冬天氣黃菊籬邊甲褪芙蓉江上裝殘寒威逼體邊關戍卒整征衣冷氣侵膚山寺老僧修破袖當日卻值十月初三日乃是梁武帝寵妃王娘娘壽誕之辰聖上欽差內監太尉齎捧香燭紙馬錢米蔬菜到妙相寺來令鍾守淨林澹然主壇又差二十四員僧官做七晝夜預修功德免不得敲鍾擊鼓誦經念佛滿寺僧衆各守執事循規蹈矩毫不紊亂城裏城外來看道場的堆山積海早惹動了一夥強人看官你猜卻是何故原來鍾住持欠了主張每常寺院做道場所用都是碰漆器皿這鍾住持以爲朝廷寵妃生日與尋常不同供桌上都用那禦賜的赤金香爐燭臺金絲果罩供佛奉僧碗盞之類皆用金銀還有那古銅玩器花瓶動用之物儘是金鑲玉碾人間罕見世上希聞極其華麗奢侈果然財動人心內中引動了一個歹人姓苗名龍排行第二離禁城三十裏地名安平村居住祖父出身微賤全憑奸狡成家創立田莊頗爲富足父名苗守成中年無嗣也是祈神拜佛求得這個兒子就如掌上珍珠只因溺愛不明失於訓誨任性縱欲撒潑放肆長成來惟愛結交花哄飲酒宿娼秉好賭博苗守成夫婦訓治不落鬱鬱成疾相繼而亡自此家業凋零田園賣盡這苗二嫖賭不止後來漸漸無賴習了那飛檐走壁東竊西偷之事前村後舍人人怨惡故取他一個綽號叫做過街老鼠村坊上人編成一出曲兒互相傳唱老苗兒費盡了平生辛力一味價剜肉成瘡經營貨殖可憐見破服纏身齏鹽充口何曾見錦衣玉食虧著這些兒儉嗇成就了百千萬億呀劃地裏祝生不測老閻王肯容時刻小苗兒忒煞風流鎮日介舞榭歌樓花朝月夕浪夥貪歡那知稼穡霎時間將銅鬥兒家私盡歸他室幸投了明師暗傳藝術欲上高牆平生兩翼這的是替祖宗推班出色方顯得沒來由爲兒孫做馬牛的樣式老天呀要後代興隆須修陰德此時苗龍也挨擠在寺中看這道場見了殿上白雪雪銀器皿赤光光金爐臺心下暗忖我一向偷偷摸摸縱得些財物那裏夠我受用今日殿中這些金銀傢夥算來將及萬金若糾合得十餘人劫將去豈不是一場富貴睜著眼仰著天自思自想站了一會即抽身離了寺中取路回家奔出通濟門外已是申牌時分行不數裏到一鎮上地名雞嘴村卻也是人煙按集去處內中有幾家開賭坊的閑漢與苗龍亦是相識當日苗龍正走到鎮上只聽見背後有人叫道苗二哥那裏去來這等忙忙的走苗龍立住腳回頭看時乃是相識舊友姓韓雙名回春是個積賭閑漢苗龍財物不知被他騙了多少近時遭了一場官事弄得手裏無錢身上甚是襤褸苗龍見了答道韓大哥許久不會一向好麽韓回春道小弟一言難盡今日二哥爲甚事進城去來苗龍道本月初三日是王妃壽誕欽差二十四員僧官在妙相寺做七晝夜預修功德又著鍾林二住持主壇好生齊整好生富貴今日起早特地到城裏去看一看忙回來天色已晚小弟有樁事正要見大哥商議不期湊巧相遇卻喜利市韓回春道二哥有甚事要與小弟計議苗龍正要說時又複閉口韓回春道二哥有話便說何故半吞半吐苗龍道這裏不是說話處尋個幽僻所在方好韓回春口中不說心下暗想這果老鼠來得蹺蹊有甚心事計議且聽他說出來便知應道二哥小弟一向疏失正要尋你酌三杯今日偶湊這鎮市後面山坳裏有一座冷酒店甚是清楚並無閒雜人往來店主人又與我廝熟我和你且去那店裏沽一壺酒慢慢說話何如苗龍道恁地恰好只是擾兄不當韓回春道相知弟兄何妨二人廝拖廝扯腳趕著轉入山坳裏來奔到酒店內揀一副座頭坐下叫酒保打幾角酒有甚麽好下酒之物拿幾品來酒保燙了兩角酒切了一盤熟牛肉煎了一碗黃豆腐搬來放在桌上擺下杯箸二人篩酒來吃吃過數杯韓回春道适才二哥說有甚事見教這裏頗寂靜無人試說何妨苗龍道再吃數杯了講兩個又吃了五七杯苗龍道大哥平素是個快活人無拘無束極其脫灑近日爲何衣衫襤褸面色無光蹙著兩道眉頭這般狼狽韓回春歎口氣道不要提起若說將來羞死人罷了苗龍道兄爲甚事可與弟說知韓回春道不怕二哥笑話小弟這樁事應了兩句俗言賣酒的淹壞了溪邊田湯裏來水裏去小弟一向虧這幾個骰子弄的是酒頭贏的是全籌真實豐衣足食薄薄地成了些家業近來被一個砍驢頭的神棍姓周渾名醉老虎是當朝周太尉之侄最慣妝局詐人不知怎地聞知小弟的大名故意叫一家中人拿些財物奔到合下來與小弟賭小弟不省其意這一雙手毛病不改何消三擲五擲弄些手段兒把那廝囊中之物贏得罄盡不期這醉老虎暗帶伴當立在人叢裏見那廝輸了即向前搶去骰盆籌馬叫破地方我家這些相識朋友慌了手腳各自逃散醉老虎將小弟與他家中人一條繩子縛了著落本圖總甲登時送入縣堂暗中用計那縣官不由分說先奉承我三十大竹片押入牢房監禁那廝將家人保出賄賂了縣主上下縣主聽人情將小弟三拷六問定要招成二百兩贓銀小弟受刑不過只得一筆招了央人變賣産業傢夥不夠還他又借貸了一半盡數當官賠納那縣官狗情又枷號我一月折鈔免配方才脫得羅網自從吃了這場苦官司門面被他破壞鬼也沒得上門半年之間曆遍苦楚衣不充身食不充口又要還債幾番待懸梁自盡又捨不得這條窮性命思量別尋生計手中缺少本錢正是羊觸藩籬進退無路二哥你怎地帶挈得小弟些兒也好苗龍心下暗喜道此事有幾分機括了便道大哥遭此飛禍小弟一些也不知自古說苦盡甜來否極還泰兄長不須煩惱目前有一場大富貴若要取時反掌之間只怕兄長不肯向前韓回春笑道二哥又來取笑貧困之人那裏去尋富貴若果有些門路二哥提挈小弟得一日快活水裏水裏去火裏火裏去上天入地皆所不辭苗龍拍著手道這一套富貴非同小可若弟與兄長取得來時可知道一生受用韓回春陪著笑臉道好阿哥委是何等富貴便實與小弟說說可行可止自有權變何故欲言又忍藏頭露尾的苗龍道大哥不要性急這一樁事不比尋常兄長若對天立誓不露消息方好盡心相告韓回春道今日苗某與韓某計議一大事若有不同心協力別存他意以致敗露者天雷擊死必遭橫禍身首異處苗龍聽罷即移身近前與韓回春一凳坐了附耳低言道不瞞兄長說這一場富貴遠隔著萬里近只在目前就是適間所說妙相寺中佛殿上擺的白銀器皿古銅玩物金香爐金燭臺等項細算來約莫有萬兩之數這些物件都是妄費的錢財怎地劫得到手尊駕與小弟今生快活不盡韓回春搖著頭道這卻是難這卻是難這一樁財寶勸二哥休要想他不必費心免勞算計苗龍道小弟略施小計手到可擒大哥何故出此不利之言韓回春道二哥有所不知妙相寺新添了一員副住持叫做林澹然原是將門子弟有萬夫不當之勇好生了得若遇著他空送了兩條窮命二來這皇城地面不比鄉村去處我等若明火執杖打將進去免不得驚動人衆縱然劫得金銀巡城軍卒追上之時怕你飛上天去這叫做竹管煨鰍直死故此難以下手只索留了性命二人正說話間忽然一人趕近前將苗龍劈胸揪住喝道我這裏是甚麽去處許你二人在此商議做劫賊我先出首免受牽累驚得苗龍面如土色目瞪口呆韓回春也嚇得發顫定睛仔細看時大笑道李大哥休得取笑不是小弟在此苗兄幾乎被你唬死那人放手笑道苗二哥不必驚惶前言戲之耳苗龍方才心定二人聲喏而坐那人叫酒保再燙酒來另添肴撰點上一盞燈重新酌酒韓回春道苗二哥未曾與李大哥相會苗龍道未曾拜識尊顔韓回春道這就是店主人姓李諱秀號季文是一位仗義疏財的傑士小弟自幼與他莫逆之交苗龍道有眼不識泰山未得親近今日幸會李秀道不敢動問苗二哥适才說妙相寺這一套富貴小弟在間壁房裏聽了多時盡知其事但不知果是實麽苗龍道李兄既與韓大哥相知都是個中人說亦無害這寺內金銀物件皆是小弟親眼看見豈有虛詐正在這裏計議若依韓大哥所言只落得眼飽肚饑空成畫餅李秀笑道苗兄無謀老韓太懦依著小弟愚見管取這金銀財物唾手而來苗龍道足下有何妙策見教爲幸李秀道適間二兄商議之時小弟竊聽說到金銀二字不覺熱血攢心手舞足蹈恨不得飛去抓來好機會如何錯過若依韓兄畏刀避劍之言到老不能發迹我也聞得林澹然武藝高強也知道禁城中軍卒嚴謹如依我行事萬無一失韓回春欣然道李兄你且說甚麽妙計李透道我店中有三個做酒後生前後有四個相知有手段的莊客連我們三個共是十人明日卻是第七日道場圓滿我與你計議停當陸續進城到寺中看了動靜且四散在近寺幽僻處藏身待到三更道場散時諒這些禿廝辛苦了七晝夜豈不熟睡苗二哥須放出那飛檐走壁的本事來我們如此如此這般這般一齊照會入去不用明火執杖亦不許呐喊殺入徑到鍾守淨臥房裏將守淨捉住綁起逼他金銀物件出來叫他不敢喊叫得了手挑出門時將守淨又如此而行只不要驚動林澹然便是高手卻是五更時分城門開了我們捱城而出若路上撞見巡城軍卒也不怕他了比及地方與寺中知覺時天已大曉我們到家安頓還可睡一覺將息二兄此計何如苗龍拍掌笑道好妙計好妙計雖然不上淩煙閣也賽過諸葛與張良我們幾時去韓回春笑道看兄不出倒有此賊智我們就安排起來依此而行美哉妙哉李秀道二兄謹言隔牆有耳不可造次被人知覺反成大害三人計議已畢放懷盡興而飲此時夜色深沈李秀道我們且去睡覺養養精神明夜方好行事苗龍韓回春就在李秀家下歇宿次日直至日午起來梳洗這做酒後生並莊客李秀早間預先照會都到李秀家中伺候李秀叫渾家炊了一鬥米飯煮一個大豬首宰了一隻鵝開了一大罐酒苗龍爲頭洞洞之聲念了幾句燒了利市紙衆人一齊狼饗虎食享了福物吃得醉飽收擡了杯盤打點進城器械苗龍李秀韓回春都暗藏一把腰刀帶了一根鐵尺先取路入城次後酒生莊客各暗藏利刀短棍一個個闖進城裏卻說苗龍韓回春李秀三人到得妙相寺時又早紅日將沈天色將晚三個走入佛殿上細細遊玩一遭果然熱鬧實是繁華比尋常道場不同但見三尊大佛尊尊頂嵌夜明珠侍刹諸天個個眉攢祖母綠文疏貴重上印著舞鳳飛龍經典莊嚴外護的繡衣錦套齋供般般精潔都盛在白玉雕盤器皿件件新奇俱系是良工巧制香爐金鑄上面有萬壽回文燈架銀妝下蟠著雙螭交尾淨瓶奇特烏金界道獻珊瑚香盒玲瓏雕漆爲胎鑲瑪瑙鐃鈸純金打就笙簫碧玉碾成桌圍經袱盡銷金禪氅袈裟皆織錦磐聲嘹亮原來是千載古銅鈴杵輝煌正不止百年舊物淨水注三爵每爵重四十余金盂蘭只一盆滿盆貯鎮國之寶正柱上貼一對萬花異錦春聯祝贊皇妃千萬壽山門外挂一張四六對仗文榜開陳佛事許多般真賽過金谷國中說甚麽臨潼會上人言白酒能紅面我道黃金解黑心再說三人看見金爐燭臺銀器之類各各暗喜細細看了半晌走出殿外閑立只見莊客酒生也都在人叢裏閑看挨擠李秀見了把眼一瞥各各點頭會意前後四散往臥房庫房看門路去了不一時敲動晚鍾佛殿上兩廊左右側殿禪堂點上燈燭照耀如同白日鍾守淨林澹然二住持上壇誦咒念經與王妃解冤釋劫普度群生壇下僧官奏動細樂做大功德此時看的人挨肩疊臂越發多了將近更盡管門道人報道聖上差王妃親弟王太尉來寺中送聖已進山門二住持即忙下壇迎接到佛殿上參佛見紮畢王太尉分付虞候凡一概閒雜人等夜深之際不許在寺混擾都教趕出山門外去這一班虞候拿著藤條只顧趕逐看的人漸漸散去苗龍李秀只得門在山門外面僻靜去處看看二更盡經事功德已完衆僧吹打一通卻早化紙二住持款王太尉吃齋少頃齋散又聽得樵樓已打三鼓二住持率領僧官送王太尉上轎回衙次後僧官各各拜辭回守而去鍾守淨叫道人閉上山門發付行童執了幾盞燈籠分頭前後兩廊殿上殿下遍處照過方才回房收拾金銀器皿藏頓滅了前殿后殿兩廊燈燭二住持與僧衆各自回房歇息不題再說苗龍李秀韓回春莊客酒生都在近寺左側幽僻處藏躲側耳聽時已是三更將盡苗龍摸到寺前咳嗽一聲李秀韓回春俱會意上前和苗龍輕輕商議道四鼓起了不動手更待何時三個走到寺後牆邊看時酒生莊客都在那裏探頭張望苗龍查點人數十個仍是五雙一齊塗黑了臉李秀道苗二哥你可先進牆裏去開了後門我們好進來韓回春道這一帶上牆打緊又高又厚二哥怎地過去苗龍一面笑著一面將手腰裏去摸摸出一對熟鐵尖釘光溜溜有一尺餘長一隻手撚著一個釘左手將釘插在牆上左腳蹲上牆去右手將釘插在牆上右腳蹲上牆去卻似猢猻溜樹一般眨眼間早扒上牆頭知會了衆人往下輕輕一跳跳在草地上摸著牆門扭開鐵鎖開了後門李秀見了照會一干人闖入牆內將牆門依舊閉上一齊摸到裏面耳房邊聽時只聽得鼻聲如雷正是夜眠如小死這寺中僧衆道人一連辛苦了數日才得著枕卻早都睡思昏沈苗龍聽了一會見沒動靜雙手去撬門撬得門咯咯地響驚動一隻黃犬鑽出洞來亂吠苗龍提起鐵尺照頭一下已是半死又複一尺但見四腳朝天見閻王去了韓回春驚得寒抖抖地道不好不好黑魆魆不辨東西鍾和尚臥房不知在那廂哩苗龍道不要慌日間我已看得備細西首那土庫裏卻是林和尚的臥室東邊黑牆內卻是鍾和尚的臥房我們徑往東首闖將入去就是苗龍將門扇一重重都撬開了一齊穿過廚房閃出禪堂又摸過穿堂卻到黑磚牆外苗龍扯過一株曬衣竹竿靠在牆上溜進牆裏將石門開了衆人一同閃入裏面苗龍又將房門撬開悄悄地閃入房中李秀向前捱到鍾守淨床邊只聽得鍾守淨夢中說道我的活寶放撒手些定要拿班做勢弄得我一身熱汗李秀笑道好和尚在這裏做春夢騙小沙彌哩即身邊抽出火草點起火來苗龍搶到床前將守淨一手按住鍾守淨夢中驚醒嚇得魂不附作急待掙扎早被李秀韓回春將繩索背剪餛飩樣捆了鍾守淨叫道不好了行者快起來這行童正在睡中聽得叫喚急忙跳起身來一雙眼再也睜不開不知住持叫些甚麽拿了褲子作布衫穿左扯右繃只是穿不上也被莊客酒生向前捆了苗龍腰間掣出一把明晃晃腰刀擱在鍾守淨項上喝道不要做聲若叫喊時便殺了你我等衆好漢不爲別事只要那日間佛殿上金爐燭臺銀寶器皿還要借白銀三五千兩使用好好獻出佛眼相看留你禿廝性命儻若執迷不悟先教你一命歸陰然後將這寺中大小禿驢盡皆砍死鍾守淨哀告道大王爺爺乞饒草命金銀物件都在側首庫房內地窖子裏任從大王爺爺拿去只是乞留狗命苗龍聽罷著酒生看守著鍾守淨行童自同韓回春李秀莊客一齊動手攝開側首門扇奔入庫房裏來正是不施萬丈深潭計怎得驪龍頷下珠畢竟苗龍衆人果然劫得金寶去否且聽下回分解第五回大俠夜闌降盜賊淫僧夢裏害相思詩曰財物從來易動人偷兒計劃聚群英窖中覓寶擒奸釋杖下留情遇俠僧談佛忽然來活佛觀燈故爾乞餘燈夢中恍惚相逢處何異仙援人武陵話說李秀苗龍韓回春等一同搶入庫房撬起石板果然香爐燭臺金銀器皿都在地窖子裏又見側首一個皮匣扭開一看約有數百兩散碎銀子苗龍等不勝之喜叫莊客打開帶來的細布叉袋將香爐燭臺皮匣物件都裝在袋裏酒生莊客韓回春每一人駝了一袋李秀將房側懸挂的舊幡扯下兩條把鍾守淨行童兩個口都包住了李秀挾了行童苗龍挾了鍾守淨一夥人悄悄地走出臥房徑奔前門而來卻說林澹然從夜深送佛化紙吃齋收拾已罷回到禪房正脫袖衣要睡猛然想道這道場做了七晝夜城裏城外不知引動了多少人來看耍佛殿上供奉擺列的都是金銀寶貝自古財物動人心倘有不測不可不防且在禪床上打坐待到五更睡也未遲閉目定神坐了一會只聽得東首後門邊犬哰哰地吠響側耳聽時又不見動靜心內疑惑跨下禪床手提銅杖步出臥房徑往東首佛殿後廊下穿堂看時只見一帶門直到廚房都是開的林澹然大駭急走後牆來看後門依舊關閉複翻身踅出來鍾守淨土庫邊見石門大開林澹然走進石門禪房裏覺有些燈亮此時苗龍等正在房中動手隱隱地聽見一個低喝道好好獻出寶來饒你性命一個道乞饒貧僧狗命寶物任大王取去林澹然心裏想道是了必有劫賊日間看見金銀器皿故深夜來此劫取怕俺知覺悄悄地在此做事俺若趕入去反要傷了鍾守淨性命諒這夥毛賊決不敢從後門出去後路窄狹難以轉動況又近俺禪房必從前門而走俺且坐在山門側首等他不怕他飛上天去了有詩爲證浩氣淩霄貫鬥牛無知鼠輩起戈矛夜深不遇林時茂守淨資財一旦休這林澹然終是將官出身心下甚有見識輕輕閃出佛殿禪堂徑到山門右邊一株大楊柳樹下坐了將禪杖倚在村邊等了一會只聽得金剛殿側門開處黑影裏一夥人走將出來前頭兩個漢子挾著黑魆魆兩樣物件後面七八個大漢都馱著布袋看看走近前來林澹然躍起倒提禪杖大喝一聲道狂賊劫了金寶待往那裏去李秀苗龍聽得吃了一驚即撤鍾守淨行童掣出腰刀向前砍來這韓回春莊客酒生都慌了膽戰心寒沒奈何丟了布袋也拿著短棍鐵尺上前助力林澹然一條禪杖擋住交手處卻早一禪杖撩著李秀手腕撲的倒在地上又一個溜撒些的莊客要搶功提起鐵尺望澹然頂門上打來林澹然把禪杖望上只一隔將鐵尺早隔在半天裏莊客右手四個指頭都振斷了負著疼也倒在地上苗龍看見風勢不好心裏已知是林澹然了撇卻手中腰刀跪在地下叩頭叫爺爺饒命則個這韓回春見苗龍跪了與衆人也一齊跪下叩頭乞命林澹然是慈心的人見衆賊跪下求命即收住禪杖喝道俺這裏是甚麽去處你這夥毛賊輒敢恣行劫掠莫說你這幾個鼠賊俺在千軍萬馬中也只消這根禪杖諒你這幾個到得那裏大膽來捋虎須今日你自來尋死如何輕放得過說罷舉起禪杖正欲打下這苗龍是個滑賊有些膽量他雙手爬向前來寒籟籟地哀告道爺爺待男女稟上再打未遲男女等也是良家兒女只因命運淹蹇又值惡薄時年賣妻鬻子家業凋零出於無奈只得做這偷摸的勾當日間窺見爺爺佛殿上金銀寶玩動了歹心實欲劫取圖半生受用不期冒犯虎威乞爺爺開天地之心施好生之德佛門廣大饒恕則個說罷衆賊哀哀的只是磕頭林澹然躊躕一會遠遠望見草坡上圓混混兩件東西滾來滾去因黑夜月色朦朧看不明白林澹然喝道那草坡上滾的是甚麽物件苗龍磕著頭道爺爺不敢說小人等罪該萬死這是東房正住持鍾法主老爺和一個行童林澹然失驚喝道你這一班該死的潑賊快快救起鍾老爺來衆人即忙點起火草向前將守淨行童解了繩索去了布條脫衣服替他穿了林澹然上前看時兀自口呆目瞪動彈不得林澹然怒道潑賊既要饒命好好將器械納下這班賊都將腰刀鐵尺戰兢兢納在林澹然面前澹然又喝道都脫衣服俺看一齊都脫衣解帶赤條條的待林澹然搜看身邊並無暗器林澹然道著兩個好好地扶鍾法主行童進房去苗龍道若爺爺不打情願服事鍾老爺隨令韓回春扶了鍾守淨一個酒生扶了行童一直送到鍾守淨臥房裏去了餘賊低頭伏氣跪在草裏喘息也不敢動這李秀和莊客兩個倒在地上哼哼地捱命頃刻間韓回春酒生兩個帶一個道人出來稟覆道已送鍾老爺回房了林澹然分付道人快去辦些茶湯調理鍾老爺那道人飛也似去了原來這兩個賊恐怕林澹然生疑故叫這道人出來回話衆賊跪在地下面面相覷沒作理會處欲待棄了李秀莊客奔走又慮明日扳扯出來進退兩難猶豫不定林澹然道俺已饒你爲何不走還指望些甚麽哩這夥賊都哭將起來苗龍道小人等今日窮極幹了這犯法的事萬死尤輕蒙爺爺慨然赦有正是死裏重生感恩無地只一件小人等雖然得生終久難脫羅網這兩個被爺爺打傷的掙扎不動須是小人們扛他回去路上若撞著巡軍盤詰定遭擒拿終是死數若小人們各自逃去丟下這兩人爺爺雖大發慈悲饒了鍾老爺受虧必然不肯甘休著落官府拷問這兩個必定扳出小人們也是個死算來算去左右是死不如各人受爺爺一杖落得乾淨不枉了做英雄手內之鬼說罷只是磕頭林澹然笑道你這潑皮倒也有些志氣也罷汝等且打開袋子皮匣與格看衆賊將叉袋皮匣開了林澹然一一檢過喝道快將袋裏金銀物件送到鍾住持臥房裏去交割明白這皮匣內銀兩賞與你衆人拿去均分做些本分生理不許再生歹心有害地方若蹈前非撞到俺手裏時這番休想得活衆賊聽了一齊磕頭跪拜拜罷起來將叉袋照舊馱到鍾守淨房裏交割了又帶那個道人出來回話林澹然又道汝衆人輪流背這兩個打傷的人俺自押送到城門邊以免攔阻保全汝等去罷衆賊不勝感激苗龍等抹去臉上煤黑兩個酒生扶了莊客兩個扛了李秀苗龍背了皮匣一齊都出山門林澹然押後幸得一路無人知覺直送到城外衆賊倒身拜謝悄悄都去了林澹然獨自個揚了禪杖回到寺裏卻早鄰雞三唱天色黎明澹然走到鍾守淨房裏探望鍾守淨行童被繩索縛傷了四肢渾身麻木都睡在床上叫疼叫痛一見林澹然來即以手挽住衣服扯澹然坐在床上口裏不住聲叫師兄是貧僧重生的爹媽恩若丘山今夜若非恩兄解救幾乎命喪黃泉此情此德銘刻肺腑林澹然笑道師兄體得如此說俺與你義同手足蒙聖恩受了偌大供養愧無以報況俺與師兄職任不小聖上欽賜許多金銀爐臺等物若被劫去查點怎了今幸佛力浩大得以完壁萬全之喜乃師兄鴻福何謝俺爲鍾守淨睡在床上合掌稱謝不已林澹然又道這件事不可播揚於外就是寺裏知覺的人須分付他不可傳說出去聖上知道只說你俺無一些才幹适才皮匣裏銀兩俺已賞與衆賊去了若少錢糧待後補上師兄可將息貴體內外牆壁門扇小僧自著人修葺暫且告別晚間再來探望鍾守淨道多承活命之恩誓當補報外邊若有動靜乞師兄遮蓋則個林澹然道這個不必分付當下辭了鍾守淨自回房中歇息有詩爲證揮金施劇盜耀武教同袍思義須兼盡威名泰岳高卻說鍾守淨口中不道心下思量林住持好沒分曉盜已擒獲爲何不送官誅戮以警將來反饒放去了將這一皮匣銀兩賞他自古道莫信直中直須防仁不仁莫非自己藏匿過了假說賞與賊人未可知也有心不在忙慢慢地看他冷破便了後人看到此處單歎這人心最是不平落水要命上岸要錢這八個字真道不差有詞爲證詞名重疊金昨宵見你炎炎熱今朝倏爾成冰雪今昔一般情如何有二心急裏閒人貴閑外親人贅搔首自評論從來無好人話分兩頭再說苗龍等一行人自城邊別了林澹然抱頭鼠竄都到李秀家裏閉上店門放下李秀並莊客卻好天色已明隨即打開皮匣將裏面銀子取出看時一齊歡喜苗龍做主將一半自與李秀韓回春三人分了這一半莊客酒生七人均分畢都坐在李秀房裏苗龍先開口道我們這十個弟兄幾乎到閻王殿前陰司地府走一遭若不是遇著這仁慈慷慨的林爺爺如何得有今日實系再生好險好幸韓回春拍著大腿道罷罷罷古人說得好知過必改我弟兄們今日在萬死裏逃得性命重見天日從此後將分的銀兩各尋生理圖一個長進莫辜負林爺爺一片好心李秀睡在床上道自古及今也沒這樣好人我适才手腕上被打血暈在地實料命歸陰府那思再活人間今得性命重見妻兒一面實出望外這思爺大德如天報答不盡誰承望又賞這若干銀兩自今日爲始各人家裏安立林澹然爺爺一個牌位上書著姓名把赤金貼了每日早晚侍奉拜禱願他身登佛位早證菩提若遇每月朔望四季節序之辰各出分子做功德保他壽年千歲福享無疆你衆弟兄們道我這主意如何衆人一齊道好受了他莫大之恩正該如此報答衆人吃了些酒飯各自散了這李秀並莊客有了錢鈔自去尋醫療治不在話下再說林澹然在妙相寺中趕散了盜賊救了鍾守淨性命又是隆冬天氣幸喜防閑得密內外人等並不知覺鍾守淨趁林澹然不在時幾次到他房裏搜檢並無蹤迹鍾守淨方才心裏信林澹然是個好人自此後凡寺裏一概錢糧財帛等項與林澹然互相管轄有事必先計議然後施行不時烹茶獻果講法談禪就似嫡親弟兄一般寺裏僧衆見他兩個如此也各心裏喜歡光陰荏苒疾似流星但見爆竹聲中催臘去梅花香裏送春來當日是正月十三上燈之夜家家懸彩戶戶張燈怎見得好燈古人有一篇詞名女冠子單道這燈的妙處帝城三五燈光花市盈路天街處處此時方信鳳闕都民奢華豪富紗籠才過處喝道轉身一壁小來且住見許多才子豔質攜手並肩低語東來西往誰家女買玉梅爭戴緩步香風度北觀南顧見畫燭影裏神仙無數引人魂似醉不如趁早步月歸去這一雙情眼怎生禁得許多胡覰貼近妙相寺有一員外姓周名其德也是金陵有名富戶因染了瘋疾歲底許下本寺伽藍船燈一座又許下經願數部疾痊之後酬還心願雇匠人造下一隻木船五彩油漆外邊俱雕刻小小人物撐篙架櫓掌號執旗吹打樂器槍刀劍戟悉具四圍懸挂彩結珠燈船裏供養伽藍神像兩邊排列從人船燈之前又結一座鼇山燈上將絹帛結成多般故事寺裏寺外都懸燈結彩哄動了滿城士女那一個不來妙相寺裏看船燈因此上惹出一個妖嬈適償了前生孽債說這佳人住在本寺後門東首小巷裏丈夫姓沈名全乃是個舊家子弟自小生來好穿好吃只耽遊玩懶讀詩書況自幼嬌養不會生理不尷不尬的有一夥惡少起他個渾名叫做蛇瘟街前街後貼上數十張沒頭榜文名爲蛇瘟行狀寫道雙眼斜驗不亮兩袖低垂不揚語言半吞不吐行步欲前不上貪睡假鼾不醒生理佯推不慣飲酒鍾兒不放吃食著兒不讓凜無粒米不憂囊有千文不暢腹中乾癟不饑肚裏膨脝不脹滿身風癢不搔遍體醃臢不蕩巧妻侮弄不親鄰族情疏不向憑君炙烤不焦任你烤煎不爛先君克衆不良生下賢郎不像編成不字奇文好做蛇瘟行狀這沈全早年父母雙亡娶個渾家也是富戶之女姓黎小名賽玉生得甚是飄逸嫁與這沈全數年家業漸漸凋零奴僕逃散田産填了債負止留得一義男小廝名喚長兒虧這黎氏十個指頭挑描刺繡專一替富貴人家做些針指賺來錢米養著沈全當日沸沸地聞得人說妙相寺裏船燈鼇山甚是好看黎賽玉是個少年情性又值閑月當下對沈全道這妙相寺裏船燈人人說好我這裏止隔一兩重牆甚是近便遠處的若男若女兀自來看耍怎地不去看看來沈全道你要看自和長兒同去我在家裏尋個覺好睡黎賽玉見丈夫應允隨即梳頭插花戴簪換了衣服叫長兒執些香燭步行到這寺裏來遊玩進得山門到了佛殿上點了香燭拜了幾拜次後同長兒到廊下看了船燈又到山門邊觀看鼇山在人叢裏捱來捱去看了半晌長兒道娘回家去罷黎賽玉笑道寺雖近便卻也難得來的今既來此遊玩一番你可引我往禪堂後殿兩廊小殿裏左右看一看去長兒引娘回步同到後殿禪堂廚房周圍觀看忽聽得一夥人道東首法堂中鍾住持在那裏講佛法我們也去聽一聽不脫人身黎賽玉聞得也同長兒到東首法堂裏來聽這鍾住持開講佛法兩個立在人叢背後聽了一會鍾守淨端坐在壇上開講那南無阿彌陀佛六個字義正講到第六個佛字道善知識欲解佛字只不離了這些兒把手指著衆人之心衆人把身一開鍾守淨猛擡頭忽見黎賽玉站在人後鍾守淨斜眼一睃見他生得十分標致有臨江仙詞爲證寶髻斜飛珠鳳冰肌薄襯羅裳風來暗度麝蘭芳緩移蓮步穩笑語玉生香微露弓鞋纖小輕攜彩袖飄揚天然丰韻勝王嬙秋波頻盼處佛老也心狂鍾守淨不覺神魂飄蕩按納不住口裏講那個佛字一面心裏想這個女菩薩正謂時來遇著酸酒店運退撞了有情人這鍾守淨到也是聰明伶俐的不知怎地看了黎賽玉一點風情就是十八個金剛也降伏不住了一時錯了念頭鎖不定心猿意馬這婦人也不轉睛的將鍾守淨來覰鍾守淨只得勉強在壇上支吾完了行童進上茶果鍾守淨道貧僧今日困倦了衆施主暫且散去明日再來聽講衆人見說一齊散了黎賽玉領著長兒同衆人出了山門取路回家有詩爲證從來女色動禪心不動禪心色自沈色即是空誰個悟反教沙裏去淘金卻說鍾守淨初次見這婦人雖動塵心不知婦人姓氏住居又不好問得只自心裏亂了一回也只索罷了不想臨出門時這婦人領著一個小廝同走鍾守淨心裏想道這小廝好生面熟想了一會猛然省道是了這小廝時常到我寺中井裏汲水得便時間他端的便知分曉當下寺裏鬧叢叢地早過了兩日至第三日卻是正月十五元宵佳節鍾守淨林澹然早上齋供了神佛令管廚房的和尚備齋慶賞元宵至晚擊動雲板聚集合寺僧衆禪堂裏點上燈燭擺下齋席鍾守淨林澹然二人爲首餘者依著年歲序坐兩傍內中也有吃酒的也有不吃的或談玄理或講閒話直至更闌才散鍾守淨對林澹然道貧僧數年不曾看燈今宵幸得風和月朗天色晴明況令歲之燈比每年更盛雖然夜色深沈諒此良宵殘燈未徹欲與師兄同步一回何如林澹然道承師兄帶挈本當隨行但有一件目今寺裏看船燈鼇山的士女甚多黑夜之中或有不良輩乘隙偷盜如前番故事或是非火燭於系不小師兄若要看燈帶一小童隨去貧僧在此前後管理以防不虞鍾守淨道師兄見教極是小僧略略遣興即回乞照管則個鍾守淨戴了一方幅巾穿了一領黑線緞子道袍著一個行童小名來真提了燈籠出山門取路到禦街大道看了又轉過於家市口遍處觀看只見香塵滾滾士女紛紛燈月交輝果是人間良夜有賦爲證絳蠟光瑤千百種花燈競放皇州景麗億萬家弦管爭鳴飛複道以連雲淩星橋而渡漢鼇山炫彩聚四方五嶽之精瑤島增輝竭人力天工之巧龍盤玉樹收羅水族之奇珍鳳舞梧桐畢獻羽翎之幻像毛蟲燈麒麟作長走獸燈獅子居先張異域之屏圍挂名人之手筆珍珠燦爛縱然鮫客亦神驚錦繡輝煌便是離婁須目眩萬卉中牡丹領袖百果內文杏樞衡行行技藝盡標能物物雕摟俱極巧又見衆仙試法更有百怪呈靈玲瓏燈架飾珠鞏皎潔燈球妝翡翠說不盡繁華世俗接不暇富貴民風金鞍玉勒有王孫翠囗朱帷咸貴戚綺羅隊裏多少花容月貌足驚郎冠蓋叢中無數墨客騷人堪動女正是濃情樂處香盈路遊倦歸來月滿庭鍾守淨和行童趁著燈月之光也不點燈籠兩個穿東過西走遍了六街三市看之不足又早樵樓鼓響卻是二更天氣家家燭燼戶戶收燈看燈的漸漸散了但見條條街靜處處燈收蟾光斜向禁城傾銀漢低從更漏斷笙簫絕響踏歌人在何方鑼鼓聲稀逞技郎歸那院王孫公子收筵席美女佳人下繡幃鍾守淨喚行童點了燈籠前導自卻徐步而行取路回寺與行童一頭走一頭講道夜已深沈若往大路回去一發遠了不如抄路往後牆小巷去到也省走幾步即取路往小巷裏來卻好轉得彎時一遠遠的聽得一個小廝在月下唱吳歌唱道好元宵齊把花燈放捱肩擦臂呀許多人遊玩的忙猛然間走出一個臘梨王搖搖擺擺妝出喬模樣頭兒禿又光鼻涕尺二長虱花兒攢聚在眉尖上乾頭糯米動子個糴糶行把銅錢捉住了就纏帳何期又遇著家主郎揪耳朵剝衣裳一打打了三千棒苦呵活冤家跌腳淚汪汪明年燈夜呵再不去街頭蕩鍾守淨擡頭一看見個年少婦人一隻手扶著斑竹簾兒露著半邊身子兒探頭望月似有所思守淨促步上前細看那婦人就像十三日來寺裏聽講經的冤家那唱歌的原來就是隨行小廝這黎賽玉因當日元宵佳節見別人家熱熱烘烘開筵設宴張燈酌酒慶賞燈夜自己夫妻二人手中沒了錢鈔寂寂寞寞的吃了些晚飯沈全原是懶惰之人早早先去睡了黎賽玉無可消遣因想昔日榮華目前悽楚心下不樂不欲去睡冷清清立在門首扳著臉兒看燈望月聊遣悶懷不期鍾守淨卻好走來撞著黎賽玉眼乖月下便認得是鍾和尚即抽身閃入簾裏鍾守淨走了幾步心裏不舍故意將燈籠一腳踢滅了轉喝行童不小心爲何把燈籠滅了快到那家點一點燭好走路行童即忙轉去到黎賽玉家裏借燈點燭鍾守淨隨即跟著行童走到簾兒外站立窺覰黎賽玉叫長兒忙替行重點燭鍾守淨在簾外假意罵道叵耐這畜生將燈籠打滅半夜三更攪大娘子府上賽玉笑道住持爺怎講這話鄰比之間點一點燈何妨鍾守淨忙進簾裏深深稽首謝道混擾不當賽玉慌忙答禮道不敢請便行童提了燈籠鍾守淨又作謝了而行不住的回頭顧盼迤邐回寺林澹然與衆和尚都在排堂等候見鍾守淨回來各歸臥室去了鍾守淨進房裏禪床上坐下吃了一杯苦茶行童鋪疊了床烘熱了被伏侍鍾守淨睡了方才自去熄燈安歇鍾守淨雖然睡在床上心裏只是想著這婦人如花似玉怎地能勾與他說一句知心話兒便死也甘心翻來覆去再三睡不著直捱到五更神思困倦朦朧在太湖石畔憑著欄杆看池裏金魚遊戲正看間道人來報佛殿上一位女菩薩來許經願要接住持爺親自懺悔鍾守淨至殿上看時卻是這聽講經的美人鍾守淨打個稽首扯著風臉問道施主娘子今日許經願還是擇日接衆僧到府上誦經還是在敝寺包誦那美人答道妾有一腔心事特來寶刹拜許經懺以求早諧心願寒舍不淨敢煩住持爺代妾包誦此經敬奉白銀二兩以爲香燭之費說罷伸出纖纖玉指將銀子一錠雙手遞將過來鍾守淨雙手去接卻是一枝並頭蓮欽兒藏在袖裏此時鐘守淨心癢難抓又問施主高姓貴宅爲甚心事許願那美人道住持欲知奴家姓字住處乃田中有稻側半初人下小小是阿奴寒頭貝尾王點汙出沈帝主爲丈夫爲有一段因緣特許良願以求如意者鍾守淨聽罷不解其意即請美人到佛堂裏用齋那美人並不推辭就攜著鍾守淨手到佛堂中守淨愈覺心癢忍不住挨肩擦背輕輕問道施主适才許願實爲著甚的一腔心事來那美人雲鬟低軃星眼含嬌微笑道實不相瞞賤妾身耽六甲常覺腹痛不安故煩許願以求一子鍾守淨趁口道和尚有一味安胎種子靈丹奉與娘子吃下去管取身安體健百病消除臨盆決生男子美人歡喜道若蒙賜藥有靈必當重謝鍾守淨道我釋門中郎中非世俗庸醫之比先求謝禮然後奉藥美人道倉卒間未曾備得怎麽好鍾守淨笑道娘子若肯賜禮身邊盡有寶物美人道委實沒有守淨道貧僧要娘子腰間那件活寶勝過萬兩黃金美人帶笑道呆和尚休得取笑鍾守淨心花頓開暗思道今番放過後會難逢顧不得了即將美人劈胸摟住腰間扯出那活兒笑道這小和尚做郎中十分靈驗善能調經種子活血安胎著手的遍體酥麻渾身暢快那美人掩口而笑二人正欲交歡忽見壁縫裏鑽出一個紅臉頭陀高聲道你兩人幹得好事待咱也插個趣兒一手將美人奪去親嘴鍾守淨吃了一驚心中大怒按不住心頭火起將一大石硯劈面打去頭陀閃過趕入一步把鍾守淨劈領掀翻大拳打下鍾守淨極力掙扎不得大聲喊叫頭陀殺人地方救命行童來真聽得喊叫諒是鍾守淨夢醒慌忙叫喚鍾守淨醒來卻是南柯一夢掙得一身冷汗喘息不定心下暗暗嗟籲不已少頃天色黎明行童請吃早膳鍾守淨披衣而起漱洗畢舉箸吃那粥時那裏咽得下喉即放下箸止呷兩口清湯叫行童收去自此之後恰似著鬼迷的一般深恨那紅臉頭陀又想夢中四句言語不明自言自語如醉如癡廢寢忘餐沒情沒給把那一片念佛心撇在九霄雲外生平修持道行一旦齊休合著眼便見那美人的聲容舉止精神恍惚懨懨憔悴不覺染了一種沈屙常是心疼不止林澹然頻來探望請醫療治並無效驗林澹然也沒做理會處凡平日縉紳故友來往的人並不接見寺中大小事務都憑林住持一人管理鍾守淨只在房中養病這病源止有伏侍的行董略曉得些也不敢說出終日病勢淹淹又早過了一月忽值三月初三日乃是北極祐聖真君壽誕本寺年規有這一夥念佛的老者和一起尼姑來寺裏做佛會當下衆士女念佛誦經哄哄的直到申時前後化紙送聖畢吃齋之際內中有一個老尼問今日爲何不見鍾法主出來衆和尚答道鍾住持有恙在身久不出房矣那尼姑失驚道怪道久不相見鍾住持出家人病從何來既有貴恙須索進去問安則個齋也不吃袖了些果子起身徑入鍾守淨臥房裏來原來這老尼姑姓趙綽號叫做蜜嘴早年沒了丈夫在家出家真是俐齒伶牙專一做媒作保好做的是佛頭穿庵入寺聚衆斂財挑人是非察人幽隱中年拜一位遊方僧爲師法名妙本街坊上好事君子撰成一出無腔曲兒教閑要兒童意熟了每見趙尼姑行過時互相拍手歌唱以成一笑曲雲妙妙妙老來賣著三般悄眼兒垂腰兒跳腳兒嬌見人拍掌呵呵笑龍鍾巧扮嬌容貌無言袖手暗思量兩行珠淚腮邊落齋僧漫目追年少如今誰把前情道本本本眉描青黛顔鋪粉嘴兒尖舌兒快心兒狠捕風捉影機關緊點頭掉尾天資敏煙花隊裏神幫襯迷魂陣內雌光棍爭錢撒賴老狸精就地翻身一個滾這趙尼止有一個兒子名叫乾十四又無生理倒靠娘東拐西騙覓些財物以過日子還要偷出去花哄哩因食用不足常得鍾守淨周濟些錢米故這尼姑是受恩過的人見鍾守淨有病怎得不驚急急走入去探望一遭只因此去有分教正是遊魚吞卻鈞和線從今釣出是非來不知見了鍾守淨有何話說且聽下回分解第六回說風情趙尼畫策赴佛會賽玉中機詩曰詼諧利口若懸河術秘機深識見多活計擺成花粉陣芳名播滿而春窩甜言蜜語如鋪錦送暖偷寒假擲梭古誡諄諄人莫悟至今猶說重尼婆話說鍾守淨正坐在禪椅上納悶見趙尼姑來到便問道趙菩薩許久不見今日方來望我趙蜜嘴蹙著眉頭道我的爺爺誰知道你染成這等貴恙若早知道時忙殺也偷一霎兒工夫來問安這是老身多罪了若果實知道不來望你呵阿彌陀佛我頂門上就生個盤子大的發背鍾守淨笑道但你講話就脫空頂門上可生髮背哩媽媽你是個貴冗的我怎的怪你向來尊體健麽趙蜜嘴道靠佛爺洪福老身卻也窮健如今貴恙有幾時了恁地面皮黃黃的瘦做這般模樣鍾守淨道從正月裏得了賤恙淹淹纏纏直到如今不得脫體趙蜜嘴道我的佛呀怕少了錢少了鈔怎麽不接個醫人療治鍾守淨道名醫也延過十餘人並不見一些應效只落得脾胃燙壞了因此久不服藥趙蜜嘴道自古養病如養虎輕時不治重則難醫還須另請良醫調治便好鍾守淨歎口氣道我這病體不爭這兩個時醫便醫得好的縱使扁鵲重生盧醫再世亦恐勞而無功趙蜜嘴道佛爺怎地就講這沒脊骨的話你正在青春年少又不是七十人十歲的人怎的便醫不好還自耐煩調理則個鍾守淨道我這一種心病比諸病不同不要說吃藥無效便是衆醫生診脈時先不對症了故此難療趙蜜嘴口中不說心下思量這個和尚話語來得蹺蹊甚麽一種心病其中必有緣故又問道貴恙若說是心病這病源區人那裏參得透昔日染病之初還是受風寒起的嘔氣起的傷飲食起的憂愁思慮起的辛苦起的病有根源佛爺必自省得自古明醫暗蔔必須對醫人說明了起病根由方好服藥自然有效鍾守淨又歎口氣道說他怎地趙蜜嘴哈哈地笑道佛爺只管諱疾忌醫那個是你肚裏的蛔蟲有詩爲證老嫗專能說短長致令災禍起蕭牆閨中若聽三姑語貞烈能教變不良鍾守淨道我這病症難對人言你是我的意人講與你諒亦無妨從正月元宵夜間得一奇夢忽然驚醒自此以後漸覺精神恍惚情緒不寧就如失魂的一般飲食無味夢魂顛倒更是一樣心疼最不可當常是虛寒乍熱口渴心煩日間猶可夜裏最難今將兩月漸加沈重只恐多是不濟了趙婆聽罷搖著頭道古怪古怪這病體應了一句話道心病還將心藥醫我是個不識字的郎中不診脈的醫士附耳低言道佛爺你這症候有一個陰人纏擾故此日輕夜重若要病痊除非服那一貼藥才好哩我這猜何如快對我講待我替你尋這個鬍子郎中鍾守淨道休得取笑趙蜜嘴道取笑取笑各人肚裏心照佛爺體要瞞我要知山下路須問過來人我當初丈夫初歿得一奇疾與你貴恙不差分毫病了半年懨懨將絕畢竟也去尋了一條活路救得性命我趙婆不是誇口說憑你說風情作說客結姻親做買賣踢天弄地架虛造謊天下疑難的事經我手不怕他不成自有千般本事只是手中沒了錢被人鄙賤故此動掉不得一向承住持爺厚意賀錢送米不知受了多少深思未有絲毫報答設若用著老身雖生人頭活人膽也會取將來鍾守淨滿腔心事被趙婆一言道著點醒了念頭心裏熱雜雜的把嘴一呶叫行童點茶行童自去廚房裏燒茶去了鍾守淨起身關上房門紅著臉將趙婆納在交椅上雙膝跪下趙婆失驚道我的爺老子我只可請醫年紀老了做不得醫人了慌忙雙手扶起鍾寺淨來守淨道待小僧拜了乾娘然後敢講趙蜜嘴笑道休要如此尊體不健有話但講果有著得力處無不盡心事成之後拜亦未遲把鍾守淨拖起來納在椅上守淨道适才乾娘所說句句鑽著我的心如今瞞不過了正月十三那日在東廳裏和一夥道友正講佛法只見一個女人立在人叢後聽講生得十分美貌粉膩膩一個俏臉兒筍纖纖一雙玉手兒身材窈窕性格溫柔那一雙翹尖尖小腳兒更是愛殺人儼然活觀音出現臨去時頻以秋波送情一時心動難制這也只索罷了過了兩日正值元宵之夜我見今年燈盛隨著一個行童到大街三市看玩不想回來夜深抄路打從後牆小巷裏過忽見這個冤家立在門首竹簾邊看月我已走過了心中不舍以借燈爲由回步在簾外細看半晌月下更是俊俏得緊回到寺中越發難過一夜睡不著捱到五更方才合眼夢見冤家來寺許願講道我是田中有稻側半初人下小小是阿奴寒頭貝尾王點汙出沈帝主爲丈夫我不解其意誘到房中調戲他正在妙處被一個紅臉頭陀瞧破鬧將醒來出了一身冷汗心中耿耿不樂自此得病直到於今不知他夢中四句是何解說小僧也不思量這塊天鵝肉吃只求得見一面講句知心話兒死也甘心趙蜜嘴聽罷瞑著眼道好個出家人要思量幹這沒天理的勾當我若替你圖謀連老身也要落阿鼻地獄快體指望老身那裏耐煩管這等閒事撤開撒開抽身就走鍾守淨慌了將衣袖一把扯住哀求道媽媽你方才說的十能九會許了小僧故訴衷腸你若不許小僧時小僧也不敢央煩乾娘了若恁地變卦真真害殺我也趙蜜嘴笑道且不要慌我假唬你一唬就如此慌慌張張若要與那活兒成就時他必有許多做作或打或罵假怒佯嗔都是有的像你這樣膽怯怎能成事自古說色膽大如天若要幹這事須是膽包著身方才好我已思量定了這女人宿緣有在夢中那四句話正合著這個人住持與他前緣宿分故此夢裏泄漏真情鍾守淨見他說話有些來歷連忙跪下求告道乾娘你且猜是兀誰待小僧快活則個若果有門路我小僧可是辜負乾娘的人趙婆攙起道我是猜詩謎的慣家你若叫別人猜十年也猜不出須是我一猜就著他夢中對你道田中有稻側半初人下小小是阿奴這兩句是拆白的話講出他那姓來田中有稻是禾字側半初是側邊加半個初字人下小小是囗字湊完成卻不是個黎字他與你講道他姓黎鍾守淨點頭道是了是了後兩句如何解趙婆道後兩句是他的小名寒頭貝尾是個賽字王字汙一點是個玉字他小名喚做賽玉出沈者沈字出一出頭帝主者人之王也他講沈全是他的丈夫住持爺你這般聰明如何不省得鍾守淨聽罷拍手突將起來道原來如此你真是個活神仙若是讀書賽過聰明男子是便是了不知這小巷裏竹簾中的那人果是沈全妻子黎賽玉麽乾娘密爲之計救拔小僧倘得事諧必有重謝趙蜜嘴道佛爺講那裏話老身平日受了多多少少恩惠些須小事反講起酬謝來這牆外小巷中果是沈全家他妻名爲黎賽玉但請寬心調養待貴體平復方可行得此一節事托在老身不怕不成只一件性急不得緩緩圖之自然到手鍾寺淨道這黎賽玉只怕幹娘不曾與他相識趙蜜嘴道老身昔日曾替他家換些珠翠如今許久不曾相會這女人的父親叫做黎缽頭一生本分家裏亦頗過得生下這個女兒嫁與沈郎爲妻沈郎出身到也好的不想是個蛇瘟不務生理弄得家業凋零虧這女人做得一手好針線賺些錢米養活丈夫雖在不足之中卻也不見有甚閒話俗語道得好世間無難事只怕有心人男子人性婦人水性須用些精細工夫慢慢摶弄他心隨意肯你不知這份風情要隨著性子兒走也有愛錢喜物的也有貪酒好色的也有重人物的也有聽哄騙的我到其際隨方逐圓一步步兒生情透路便是鐵石心腸我這張蜜嘴一哄就要軟了你也要用些心機第一來惜不得錢財二來顧不得面皮三來論不得工夫依此三著而行好事決然成就鍾守淨聽罷喜不自勝笑道小僧聽了乾娘這話不覺病體寬爽了一半這三件別人須不能在小僧都依得我有的是錢有的是工夫面皮要老也容易乞在意早日不可爽信趙蜜嘴道你但放心不必叮囑今日天色晚了老身暫且告回待靜夜再思良策捱身做事好歹後一日來覆你說罷起身鍾守淨道今日本該留于如一飯只是西房林住持有些夾腦風不通世務若知道必生疑忌因此不敢款留有慢乾娘莫怪趙蜜嘴道我與你怎講此話慢慢的有得吃哩你且寬心睡一覺兒打個稽首相別而去鍾守淨隨即著一個道人提了一壺好酒兩盒蔬菜送到趙尼姑家裏去說住持爺送來與老菩薩做夜菜的趙蜜嘴收了不題卻早過了兩日鍾守淨眼巴巴望這趙婆覆話自早至晚並不見他蹤影心裏惆悵了一夜次日巴不得天明絕侵早起來著行童悄悄到趙尼姑家裏去分付道住持爺立刻等老菩薩講話請他就來行童到得趙婆門首時大門兀自未開行童叩門趙婆問是誰行童道是我等了半晌只見趙乾十四蓬著頭出來開門問道小官那裏來的清早敲門做甚行童答道我是妙相寺鍾住持爺差來請老菩薩講話的趙婆兒子聽罷也不做聲自在地上擡了一把亂草去尋茅廁去了有詩爲證婆子刁鑽不是癡鍾僧須索自尋思入門欲問榮枯事觀著容顔便得知話說這趙婆故意做作上身穿了一領破布襖下把一條舊裙子挂了腰扶牆摸壁走將出來問道小官莫非是鍾老爺差來的麽行童應道正是趙婆道請坐我昨日早間正要煮些粥兒吃了來見住持爺不期竈下無紙櫃中缺米因此將兒子罵了幾句反被他嚷我一場飯也沒得吃倒咬了一場大氣餓得眼花氣得頭暈昨日睡了一日不曾來望得住持爺小官煩你轉達待老身尋得柴米踐體略略掙扎些來拜覆住持的話頭便了有詩爲證利口伶牙拿班做勢柴米送來方能了事行童道住持爺立等老菩薩講話同我到寺中吃早飯去趙蜜嘴道這個卻使不得成甚體面況且身子狼狽寸步也移不動多分明日來見住持爺相煩申意打發行童國寺此時鐘守淨眼巴巴等候回音忽見行童來到便問趙媽媽怎地不來行童將趙婆與兒子爭鬧少柴沒米的事情說了一遍鍾守淨笑道這老婆子卻也沒些轉智既無柴米何不著人到我這裏借掇卻在家裏尋鬧看官聽說趙婆這些做作正是騙財物的圈套鍾守淨那裏省悟著兩個道人馱了五鬥白米挑了一擔大柴送到趙婆家裏來這趙婆與兒子料得鍾守淨決然著套都不出去燒茶專等果然見兩個道人挑柴送米來了趙婆接了歡天喜地陪道人吃茶罷送出門道拜上住持爺承惠柴米午後面謝道人自去了趙蜜嘴午飯後換了一身衣服徑往妙相寺裏來進得寺門見那一個挑柴的道人正在殿上點香一見趙尼姑來到丟了香先進房裏通報去了鍾守淨分付廚下預先燒好茶伺候只聽得腳步響趙婆哈哈地笑入房裏來見了鍾守淨連連的打問訊謝了又謝鍾守淨道小可的事何必致謝且請坐吃茶就問乾娘你原約昨日來見小僧的使我懸懸地望了一日望得眼穿盼得腸斷好失信人也趙婆笑道不要提起只爲家裏少長沒短嘔了一場鬧氣踐體不快故此失約不合又在行童面前老實告訴了蒙住持爺賜柴賜米正謂卻之不恭受之有愧暫且收了再留後報特來拜謝目前貴體比往先好些麽鍾守淨道賤恙頗覺有一分兒好意只是心裏熱焦焦的過不得前日所求事體曾有些良策麽趙婆道老身費了一夜神思設下一條妙計今日特來商量鍾守淨道既有良策即便施行小僧無有不依趙婆低聲道耳目較近難以言語鍾守淨發付行童出房去了趙婆將椅子移近前來附耳低言道如此如此這計何如鍾守淨聽罷跌腳道妙妙果然是個女張良趙婆道不要先歡喜若言容易得便作等閒看還須密用心機到手時方才是穩鍾守淨帶笑叫行童換茶趙婆起身告行鍾守淨道且坐小僧有一件粗物相贈就在箱裏取出一匹茶褐色絕細的綿綢對趙婆道權送與乾娘做件衫子穿趙婆推辭道此綢老身決不敢受未有寸功焉受重賞鍾守淨道乾娘不要嫌輕推卻若收去小僧心裏才安另有計較趙婆接在手裏謝道常言講得好長者賜不敢辭老身只得權收了後當補報作謝而別鍾守淨獨坐思量這趙婆計較果然有些妙處越想越有滋味隨著他此計而行當晚分付廚下道人磨起一鬥糯米粉來做成豆沙餡子明早候用當夜睡不安枕天未曉便穿衣起來著道人買了兩個豬腿將那隔夜磨起的米粉裹了餡子做下一盒京圓蒸熟了用兩個朱紅盒子盛著又取象牙梳子一副名人詩畫檀香骨子金扇二柄藏於匣內使道人挑了行童引路送到元宵夜裏借點燈的那一家去分付道如此如此他若不肯收時不要管他怎的只出了盒子就走行童領了分付和道人一徑到沈全家裏來卻好沈全不在家那婦人坐在軒子內做針指忽聞簾外聲喚步出看時見一小廝和道人挑著盒子走入來賽玉問道你兩位是何處來的行童答道我們是妙相寺鍾法主差來有些薄禮奉送那婦人道妙相寺雖然鄰近日常間未有往來何故有禮相送二位莫非差了行童道大娘子你記得正月十五夜更深時分有一位長老同小人來借燈點燭麽黎賽玉道正是那元宵夜裏長老來借燈我想著有些像妙相寺裏的鍾住持果然是他行童道那長老正是鍾法主因攪了大娘子府上心裏不安次日要來拜謝爲染了些小恙一向失禮昨日聖上差一員中貴官責此圓子賜寺中二位住持鍾住持想那夜攪擾無可奉謝特著小子送這幾個聖上欽賜的圓子來與大娘子做點心望乞笑留黎賽玉笑道何須住持爺如此費心這禮物怎好受得煩二位帶轉去行童道住持說一定要大娘子收的小人們怎好帶得轉去劄雖菲薄到是住持一點敬心若大娘子不受時教我們不好回話黎賽玉道佛門中的東西難以消受況且無功受祿決不敢領兩下推遜了半日長兒向前道娘既是鍾住持送來的也是一點敬意收了待後回禮就是何必恁般推卻黎賽玉笑道蠢牛你省得甚麽子道人趁口道還是這位大哥講得有理行童把眼一瞅道人即將盒子遞與長兒長兒接了順手倒在桌上就搶一個圓子丟在口裏吃黎賽玉再欲推託時行童又將這豬腿也出放桌上道人接了空盒先挑出門行童開了拜匣將金扇牙梳放於針線筐裏三五步也跳出門去了黎賽玉勉強收了道有勞二位多拜上住持爺另日奉謝行童和道人回寺而來鍾守淨倚門癡癡的專等回話見行童回來忙問何如行重把初時推卻次後收留的話說了鍾守淨不勝之喜即著行童通知趙尼姑去了話休絮煩卻說黎賽玉雖然收了這些禮物他是個伶俐的人有些瞧科終是不安也不去收拾就放在桌上心內自想自猜不多時丈夫回來了進得門見桌上放著兩個豬腿又有許多圓子筐籃上金扇牙梳驚訝道此物何來黎賽玉道我不講你不知道也是沒要緊的事正月元宵夜間我在門首看月耍子見一和尚同一個小廝行過我門首偶然燈籠黑了問我借燈點燭原來就是妙相寺裏鍾住持他道打攪了我們今日特送這些禮來相謝我再三不肯收被行童定要放在這裏我正等你回來計較沈全笑道有甚計較他好意送禮物來反怪他不成只顧收下吃了再處這和尚到也是知趣的正爲雪裏送炭我昨晚到今午時點了一日肚燈早上出來尋相識借錢捱破面皮並無一人肯借只得空手回來今放著許多現成之物不討自來不吃待怎地俗言說得好看了米囤到餓死長兒快燒起鍋來煮豬腿先將圓子來點饑黎賽玉見丈夫如此說心下也放寬了沈全看了肩上詩畫十分歡喜正在誇羨之際只聽得簾外有人咳嗽賽玉門眼裏張望見是趙婆忙迎出來笑道老媽媽許久不來寒舍要耍今日甚風吹得到此趙婆道一向窮忙不得工夫望你今日因便特來相拜大娘子你近日好麽黎賽玉道有甚麽好日用不敷苦守薄命媽媽你到更覺清健了趙婆道兒子沒掙扎終日淘氣怎得清健今有一串上好滾圓雪白珠子是一宦家侍妾央我貨賣幾百貫錢鈔我想起大娘子是識貨的故特來問一聲或要時倒也便宜黎賽玉道苦也那得閒錢換這珠王受用媽媽你不知我家艱苦只看我身面上布草兀自不充焉能夠想這富貴的道路趙婆道大娘子又來太謙了你是不要他用若要時打甚麽緊黎賽玉道恁般光景今生休要指望趙婆道青春年少家體講這話大官人發迹時正要受用哩黎賽玉笑道莫想這地步趙婆即起身道大娘子既不要老身告別另日再來看你黎賽玉道且請坐用幾個點心了去趙婆道不消了黎賽玉道又不是爲你買的有現成的在此不嫌時便吃幾個何妨趙婆道大娘子恁地講時只得吃了去長兒用盤托出圓子來趙婆接上手吃了兩個問道這圓子是何處買的恁般細膩好吃黎賽玉笑道是妙相寺鍾住持送的爲元宵夜間問長兒點燈他道是打攪了我們今日著道人送兩柄金睛一副象梳兩個豬腿一盒圓子來相謝趙婆道天呀你自不吃倒先請我吃這鍾和尚莫不就是那正住持鍾守淨麽長兒答道正是正是趙婆拍著手道這個天殺的和尚好不富貴好不受用不知怎地結得當今皇帝的緣法欽賜他許多金銀寶貝封做天下都法主四海聞名那一家皇親不欽敬那一個仕宦不結交等閒的和尚只好比他腳上毫毛兀誰趕得他上黎賽玉笑道講他怎的這也是宿世修來福分故今生有這般受用趙婆點頭笑道大娘子講得有理我和你只是前生未曾種得福根今世裏卻有許多磨折如今再不結些善緣一發墮落了正謂人身難再得作善是根基黎賽玉道我也曉得只因手裏少了錢要行行不得的苦趙婆道不是這等講他富貴的行那富貴的事我貧窮幹我貧窮的事比如那修橋砌路塑佛造殿這是有錢的所爲我和你行些方便積些陰德燒些香念些佛聽經拜懺也是修行的道路還有那千人會若去得幾次人身不脫只怕大娘子懼官人攔阻不肯出去燒香赴會哩黎賽玉道不怕甚人敢來攔阻只愁沒人引路況兼年幼怕惹人笑話故此一向未敢出門趙婆道大娘子舊家兒女誰敢笑話古人道公修公德婆修婆德臨欲回首之際丈夫兒女也替不得你怕甚麽外人談講下次或遇做佛會時我來相請可也去麽黎賽玉道媽媽若肯帶挈時怎地不去趙婆又坐了一會講笑談天作謝出門自此以後趙婆時常到沈全家裏來或央黎賽玉補些衣服做些壽鞋或是拿絨線來挑花刺繡不時送些柴米資助或將酒食來同吃這都是鍾守淨的錢財要趙婆交結他好引進幹事這黎賽玉夫妻二人那知趙婆奸計只道是他好意甚是感激趙婆若來時就如嫡親父母一般不離口的親娘媽媽冷水也燒做熱茶款待卻又過了月餘早是四月初八日乃釋迦牟尼佛生日不拘大小庵觀寺院都做盂蘭盆大會當日卻是初六趙婆預先和鍾守淨計議定了卻到黎賽玉家裏來賽玉燒茶殷勤相款趙婆道今日特來相請大娘子去赴佛會哩不知有工夫去麽黎賽玉道終日清閒耍子怎地沒工夫但不知是何處佛會望媽媽帶契則個沈全道老媽媽又來多事了做佛會有甚好處男女混雜惹是招非的與我撒開別尋道路克勞挈帶趙婆變了臉正言作色道阿彌陀佛大官兒講這等落地獄的話虛空過往神明鑒察著你哩詩佛的罪孽深重佛偈講得好人生將相與公侯累劫皆從三寶修種瓜得瓜種豆得豆就如大官兒生得五官周正不啞不聾得這樣一個男身與女人先差五百劫豈是容易又配著這等如花似玉百能百會的一位娘子皆是前生種成善根修行得來今世方能受享還有些兒修不到處止是一個平民若前世修行念佛結緣種福苦行精進得到時今世就做那榮華富貴福壽雙全的人了你看又有那貧窮孤苦殘疾夭折的這都是前世謗佛行兇不登三寶地不赴千人會不修不積未曾結緣種福故此今生受苦少年人正要惜福延壽不可講這墮落的話佛阿佛大官兒還不知道哩沈全笑道自盤古到今也有修行的並不曾見何人做佛空白吃了一世苦也有作惡的不曾見誰人落地獄俗語雲黑心人倒有馬兒騎落得快活老媽媽據你這般說時富貴的有金銀佈施做會就代代富貴貧窮的口也糊不來那得銀子佈施做會就代代貧窮這樣看起來世上人不消爭名奪利只消去做佛會便世世富貴了我不信我不信人死就罷了四生六道憑你去投股有伺報應趙婆道大官兒你雖是聰明那曉得我佛門中的奧妙比如你們讀書的尊孔聖人道家尊太上老君我們尊佛各尊一教其實三教總是一教惟有我佛教最大不生不滅變化無窮包得那儒道兩教來盤古皇帝未生先有我佛出世太上老君是我佛的化身就是孔夫子也是我佛的化身故此孔夫子也修行也吃蔬沈全大笑道老媽媽專會扯謊孔夫子可是信佛的人麽他爲何肯吃蔬修行趙婆道我貼鄰有一學堂常聽得學生讀書讀道夫子在齊三月不知肉味這不是吃月蔬又讀道齋必變食飯蔬食飲水這不是吃短頭蔬苦行修行我皈依的師父嘗說愚夫謗佛猶如醉漢罵人都是迷而不悟大官兒放省悟些不可口孽造罪這沈全呵呵地笑起來跳起身伸一伸腰口裏道妙妙妙三般俏我不管你們閒事遂一面走一面唱出去了趙婆也起身要行賽玉留住道老媽媽不要理這失時的短命我自與你講講兒趙婆道我怎與這蛇瘟計較他男子漢只說得男子漢的話不知我們做女人的苦處哩三綹梳頭兩截穿衣上看公姑臉嘴下憑丈夫做主最可憐我等五漏之體生男育女污穢三光罪孽不小若不生育老來無靠身懷六甲日夜耽憂及至臨盆死生頃刻幸而母子團圓萬分之喜倘有不測可憐就登時三魂渺渺歸陰府七魄悠悠入九泉那時萬孽隨身一靈受罪閻王老子好生利害查勘孽簿叫牛頭馬面叉落血污池裏不得出頭又有那鷹蛇來囋惡犬來咬此時丈夫兒女都替不得好苦楚也若有錢的陽間做做功德超度還有托生日子如夫主無情別偕姻眷不修佛行這一點陰魂浸在池裏永劫受苦不得翻身皆因不曾在佛地上走過以致如此若走過佛地的雖落池中無諸苦楚池裏便生蓮花接引他托生不受惡纏了黎賽玉聽罷不覺聳動心腸眼淚紛紛的滾下來趙婆道大娘子不必垂淚若能及早回頭念佛來世便女轉男身如今四月初八是西方佛祖釋迎如來的壽誕妙相寺年規大雄寶殿裏做會男女僧俗道衆柯止千人本寺兩位法主會議男女混雜不當穩便今年改了舊規兩位住持各管轄一處東首敞廳裏是鍾住持爲主接引女眷們念佛西首廳裏是林住持爲主接引男客燒香這規矩甚是有理省了許多是非老身在東廳裏簿子上寫了一個爲頭的名姓要我拉請三五十位女眷同去赴會我想這鍾住持是有德行的老爺行事極有法度誰敢不服況且女衆們一處兒拜經念佛極其清淨又沒半個閒雜人敢來混擾故勸大娘子去走一遭免些罪過比那小去處勝過百倍講便是這等講大娘子你自主意別人勉強勸去念佛是沒功德的黎賽玉道恁地時必然去走一遭媽媽千萬挈我同去只是不知要多少齋錢趙婆道齋錢不必在意都是老身一力包辦今日就要吃蔬淨身初八日起早梳洗我來接了你同去切不可二心三意不志誠反造罪孽黎賽玉道念佛是一樁正事豈有二心三意只是媽媽須索早來相伴同行趙婆道不必講決然早來同往講罷相別而去黎賽玉到初八日五更便起來點燈梳洗一面著長兒煮熟了早飯預先吃了只等趙媽媽來就行不多時聽得敲門趙媽領著幾個女伴進到家裏約了同行黎賽玉穿了一身齊楚衣服分付長兒晚間寺中來接和這趙婆一行人取路往妙相寺來進了兩重山門果見紛紛人衆往來一應遊僧長老道人野老都尋著男子隊裏徑到林住持西首禪堂去了一概尼姑女衆都隨著女伴到這鍾住持東首廳裏來只因這個佛會有分教面壁禪師沈欲海守貞良婦煽淫風正是酒不醉人人自醉色不迷人人自述畢竟聽經後做出甚麽勾當來且聽下回分解第七回繡閨禪室兩心通淫婦奸僧雙願逐詩曰念佛人圖種福田反爲奸禿結良緣巧言一片憑婆儈刺佛千尊賺王仙桃浪乍翻津莫問草廬三顧水成歡終須仗得彌陀力極樂西方在目前話說黎賽玉隨著趙婆等同到妙相寺東廳裏來誇不盡禪堂精潔鋪設整齊這些燒香念佛的女眷約有三五百人普同打一問訊就坐不移時行童道人等捧茶出來女衆們吃茶已罷道人焚香點燭上了琉璃諸佛供桌上都擺列果品蔬