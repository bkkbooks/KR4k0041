李秀家分了銀兩跳出賭博場溷入煙花寨分撥水錢放債取利因與媚春相交情密當早路便進來一望媚春邀入軒裏吃茶媚春道小妹有一事正要與大哥計議來得卻好韓回春道有甚事計較媚春道昨晚有二客來我家一個是道士一個是酒生那道士飲酒至更深去了留這酒生在此豈料這廝身邊藏著一裹肚銀子我看起來約有百餘兩決是歹人偷盜來的日後儻露出事來牽累我吃官司怎了韓回春道有我在此怕他怎地此人今在何處媚春道睡著未醒韓回春悄悄上樓仔細看了一時間兩眼直視跳下扶梯奔入廚房拿了一把廚刀飛身出來媚春見這般凶勢諒非好意一手扯住衣袖拖出軒外道大哥這卻使不得須帶累我韓回春道待我殺了這廝再與你講知端的媚春慌了哀告道我的親老子害殺我也抵死抱住不放韓回春道你不知這殺材是李季文店中酒生陳阿保因貪官賞出首林住持害彼乘夜而逃存亡未保又累李大哥監禁在獄我幾番要開除了這廝無處下手今日狹路相逢豈可輕放待我砍這廝驢頭替恩人報仇然後自行出首便償他命如所甘心決不累你媚春道好癡漢子人命關天豈同兒戲你爲思人雪恨殺他抵命雖是丈夫氣概少不得貽累我吃官司好沒分曉凡事要慮始慮終方才行得豈可如此燥暴韓回春躊躕一會點頭道殺人償命我所不辭但貽累於你中心不忍然事已至此放之亦難與你怎生作個商量媚春附耳道只消如此如此足可雪浪韓回春甚喜擲刀去了媚春暗與保兒照會少頃陳阿保醒來移桌傍床羅列肴撰對坐飲酒正飲間忽有人扣門媚春停杯下樓不移時複上樓來滿斟熱酒殷勤相勸阿保一連吃了五七杯推辭不飲了正欲舉箸吃飯一霎時頭暈眼花跌倒床上原來媚春令韓回春買了蒙汗藥藏于酒內把阿保麻翻昏迷不醒媚春解下他腰間銀子收拾細軟衣飾先上轎去了其餘粗重傢夥盡皆棄下隨後韓回春與保兒反閉大門徑往韓回春家裏和媚春將銀子兩下均分另取三兩散碎的賞與湯保乘夜雇船渡江往和州而去再說陳阿保被藥迷倒至次日午後方才蘇醒甚覺口中煩渴呼喚茶湯並無一人答應腰邊摸時裹肚也不見了急忙奔下樓來只見竈下無煙神前缺火媚春湯保等皆不知何處去了阿保心知被賺捶胸大哭一腳踢下大門喊叫賊婦盜銀逃遁地方快來救應奈此處是一條冷巷四圍空地高牆又無人家那得人來勸解阿保獨自叫了一回猛然省道這事分明是杜道士害我且去和他講理蓬頭跣足氣咻咻走入玉華觀裏來見了杜子虛一手扭住喊屈連天衆道士圍將攏來問其緣故陳阿保將同嫖失銀之事哭訴一番隔房一個殷道士最有識見怕到官壞了本觀體面將阿保功進本房寬解道雖然杜伯實不合同你去嫖兄亦欠了主張豈有帶百餘兩銀子至囗囗中作耍的道理那妓女們心腸比強盜又狠三分見財起意用藥迷人竊銀逃遁這是常事兄也有一半的不是假使當官追究起來令表叔只須求謝仆射老爺指頭闊一條紙兒送與執行官天大的事也就罷了你那時叫做失賊遭官重受其害不如在小房消停數民待我勸令叔出幾兩銀子暗囑能幹積年緝捕人役查訪娼歸去向若有了消息這一百兩銀子穩取還你不須愁煩涉訟陳阿保聽了也不答應卻如木雕泥塑呆呆的坐著不動一日茶湯並不入口傍晚殷道士整酒相待阿保只是不飲滾到床上睡了衆道士叫聲慚愧各自散去獨阿保睡不著暗恨命薄至此不能消受待要與杜子虛結扭到官又慮勢不相敵待要尋娼婦下落並無一些蹤影可問只索拚此一命對付這道士罷了嗚嗚咽咽的哭到三更解下束腰帶懸梁自縊一次早殷道士進房只見陳阿保懸于梁上急急放下已氣絕無救鳴呼哀哉死了殷道士將門鎖上徑奔杜子虛房中報知杜道士驚惶無措忙求解救之策殷道士問陳阿保有甚嫡族至親否杜子虛道他止有姐夫巴富別無至親瓜葛殷道士歡喜道只消恁般如此必然瓦解一面令杜子虛去尋巴富一面暗中打點衣棺伺候不多時巴富來到殷道士滿面春風迎入三清殿後側軒內盛設酒肴款待酒至半酣殷道士方說出陳阿保身死之故巴富驚訝流淚道有此不測之事何不早言顯見得謀財害命是實了殷道士笑道休恁般說銀子偷去了或能再來死者不能復活明人不須細講今日之事並無欺蓋一則一二則二守與戰任憑尊裁巴富道有何見諭亦求明說殷道士袖中取出六錠白銀指著道這是三十兩銀子在此實是我等所出足下若肯海涵不到官告理奉此爲謝不然真只還真假只還假留此銀子衙門使用不到得問了杜伯實的死罪兩下準備打官司便了自古財動人心巴富見了這六錠大銀心就軟了一半笑道據公所言似非謀害但是一條人命豈止於三數而已杜老丈又系至親在下不敢較論乞添至五數就罷了殷道士道寶劍贈與烈士便添十兩不與了別人再有他說兩下和議定了殷道士方開鎖進房巴富向阿保屍首放聲啼哭忽擡頭見門枋上有一個小匾寫著一練居三字巴富收淚歎息道天定之數不可逃也告訴阿保夢中大王批十六字於臉上福善禍淫四句适才聞那妓女名爲媚春今觀仙居名一練正應著寶歸二春祿終一練大數前定祿命難逃不必講了巴富還不知韓回春同謀故爲二春的話當日收殮屍首殯葬延僧超度畢殷杜二人送那四十兩銀子上門相謝兩下歡天喜地而散街坊上人聞陳阿保身死個個講說沒福承受賞銀出首好人的看樣有詩爲證朴囗窮簷壓酒徒橫心願外獲青蚨煙花巧計猛於虎財盡囊空一命無話分兩頭再說杜都督夫人蔣氏因朝廷籍沒家財和妾馮桂姐抱頭痛哭夫人暈絕數次救醒桂姐道老爺不合放了林長老害卻性命又抄沒了家產早知今日悔不當初蔣氏哭道死生由命成敗在天不必怨他只索苦守罷了程刺史回府一路心下不平差公人到都督府打聽已知抄沒情由心中大怒道朝廷好沒分曉用這班狼心狗行之徒殘害忠良眼見得國家將亡了悶悶不樂於是擇日買地將杜都督棺木安葬已畢時常差人饋送些禮物周濟杜夫人一家賴以度日但二人形影相吊淒涼萬狀自古道世態炎涼人情冷暖自杜成治死後親戚故舊漸次疏了家憧奴僕盡皆散了昔賢觀至此有行路難古風一篇歎道金卮九醞鬥十千玉盤三品輕萬錢投杯推案不復禦吞聲躑躅賓筵前人生運命本在天賤貧貴富總適然雨雲何事易翻手自古誰人能獨久九華七彩簇黼帷便持紅顔欲長守青霜一旦委天衢桃李紛紛今在否君不見昔日柏梁銅雀台豪雄漢魏爭崔鬼梁傾雀墮複平地黃昏白日飛塵埃又有古風一首勸世雲炎涼態君莫訝春深草木俱獻妍秋殘枝葉皆凋謝天道一似趨勢利達人勿將冷暖詫廷尉屬張吏部何賓客門前日覺多一朝罷官居寂寞車馬不來烏鵲過只有明月超世情不照綺筵照綠莎績筵有銀燭蓬戶仰隙光勸君勿作錦上花渴時一滴等滄浪光陰迅速頃刻過了月餘馮桂姐覺容顔清減精神恍惚終日思睡每作嘔吐蔣夫人急請醫人調治醫士診脈稱賀是喜蔣氏歡喜道老爺在時每爲無子不樂幸得桂姐遺腹坐喜皇天有眼可憐見杜門不該絕嗣倘生得一男半女也不枉了都督爲人一世及至臨月又不見動靜夫人心下憂疑不決日日愁煩直待到十七個月乃是太清元年二月初七日亥時方才産下一個男兒生得面方耳大目秀眉清此夜紅光繞室異香不散夫人心下大喜彌月之後取名叫做過兒夫人撫惜他勝似親生不題按下一頭且說林澹然自賺出關門之後回到東魏舉目見民物如故風景依然心下感歎不已一路曉行夜住隨緣抄化不比在梁地驚惶這一回安心走路但是心中計念杜都督不知回覆武帝事體若何一連行了數日卻好來到河東府廣寧縣地界當日看看天色晚了登至石樓山下前後打一看並無客館飯店況值微微雨下路滑難行一步步捱著尋個人家借宿走了數箭之地遠遠見竹林中閃出些燈光來林澹然近前看時卻是一個莊院但見一周遭矮矮粉牆三五透低低精舍後面有濛濛茸茸柳岸橫連芳草徑前頭見蒼蒼翠翠竹屏相傳小柴扉幾灣流水滔滔不竭統圍牆一帶石橋坦坦平鋪通例路籬邊露出嬌嬌媚媚野花開戶內忽聞咕咕哰哰犬吠房廊不大制度得委曲清幽空地盡多種植的桃梅李杏果然渾無俗士氣惟有讀書聲林澹然放下包裹上前扣門柴扉開處走出一個童子來問道誰人在此扣門林澹然稽首道弟子是雲遊僧錯過宿頭大膽欲借寶莊暫宿一宵未知容否童子道我這裏是讀書之所房拔窄狹不敢相留師父別處去罷林澹然道今晚天雨難行如貴莊不能相容就借簷下捱過一宵明早即便去了童子搖頭不允正說話間屏風後轉出一個老者來生得蒼顔古貌鬚髮皓然手扶竹杖問道何人在此說話童子未及回答林澹然向前深深稽首道老訥是雲遊僧家要往太原進香打從貴地經過因貪走路程錯過了客館暫借貴莊歇宿一宵盛使不容在此閒話老丈休怪那老者笑道師父何出此言出家人著處爲家暫宿一宵有何不可書童咕噥道遊方和尚做強盜的極多太公不可留他老者喝道胡說遂留林澹然進側廳內坐下茶罷老者道適間小奴不知事體出言唐突老師莫罪林澹然合掌道山僧攪擾心下不安焉敢見怪請問老丈高姓尊號老者道村老姓張賤字完藻請問吾師高姓貴鄉何處林澹然一一答應張老命安排晚飯相待畢命書童執燈送到廂房內歇息次早林澹然起來立欲謝別書童又送出茶湯來少頃又請到廳上吃齋太公出來相陪林澹然起身拜謝欲行張太公道師父慢行老朽觀師父是一位有道行的高僧意欲屈留尊駕盤桓數日請教樣理萬勿推卻林澹然道感蒙老丈萍水相逢如此厚愛豈敢推託但是無故攪擾檀府於理不當太公笑道四海之內皆兄弟也只是有慢休怪自此留林澹然一連住了三日太公朝夕相陪或談佛法或講坐功相待甚是殷勤林澹然每於靜夜打坐時聽得西首軒子裏叫疼叫痛呻吟之聲不絕心中疑惑又不好相問當日正和太公午後閒話只見書童攙著一個黃瘦後生從側軒步出草廳上來林澹然看那後生年可二旬生得容顔清麗器宇不凡只是身無血氣病勢懨懨頭上包著一個皂絹包頭身上穿一領白綾綿襖白絹裙拴著腰手扶了書童肩膊走出來林澹然起身問訊太公扯住道老師不敢勞動小兒病驅不能見禮二人拱手太公道大郎且睡睡將息爲何又出來閑走後生道我心煩體倦睡著轉覺難捱暫且閑步消遣林澹然道好一位郎君爲何患病如此狼狽急急醫治方好太公垂淚道老朽年過六旬止有這一子名爲張找生平樸實溫雅頗肯讀書有志上進未定妻室尚未畢姻寒舍在城中居住那日節屆中秋小兒在書室夜間玩月因觸景吟詩一首道銀漢冰輪滿娟娟萬里輝桓娥如有意弓哦上雲梯朗吟數遍貪看月色至夜靜欲睡倏見一女子推門而入生得千嬌百媚年方二八貌賽西施對小兒道郎君獨自寂寥妾乃姮娥引君上雲梯去也小兒年幼不能定情與之繾綣朝去暮來約有兩月不期容顔瘦減舉止異常老朽再三究問方知端的因此心慌諒是妖魅所迷打發在此小莊避之不想那女子複來纏擾鎮夜如醉如癡半迷半醒這幾日身子愈覺沈重多是不久于人世了老朽不舍特出城來伴他連日因心緒不甯屈留尊駕閒談排遣說罷流淚不止林澹然聽說不覺傷感答道這一位好公子怎忍被妖邪所迷老丈何不請術士遣他一遣太公道前者在城之時何日不燒符念咒遣送並沒一些靈驗無法可處林澹然道山僧從來不信邪祟今間老丈所言世間亦有此輩妖魅乎老丈不必愁煩這妖孽小僧定要結果了他救大郎性命方顯區區手段太公拱手道若得老師法力救命感恩非淺但這妖怪亦有神通急忙裏怕收他不得反遭其害林澹然笑道不妨臨時自有妙用太公口雖稱謝心中還疑惑不定當晚林澹然問太公取利劍一口銅鈴數個令扶大郎別室安寢分付合莊僮仆不可大驚小怪暗暗藏燈伺候只聽房中鈴響便可進房來看太公聽說一一措辦了自和幾個家憧各執器械等候命書童掌燈引林澹然進大郎房裏來澹然到房裏挂了銅鈴床頭藏了利劍停燈幾上掩門和衣在床假寐放下帳幔暗暗念佛等至夜靜不見響動心裏想道莫非這怪物通靈預知俺在此不敢來了漸交三更時分正當萬籟無聲忽然起一陣冷風逼得透骨生寒風過處呀的一聲門響一個女子嫋嫋娜娜走入房來林澹然隔帳看時那女子如何但見丰姿絕世豔質憐人渾如膩粉妝成宛似羊脂琢就鳳眼朦朧勾引人魂無定娥眉淡掃巧傳心事多般輕盈態度低頭微曬有餘情娜嫋腰肢叉手抱來無一撚津津檀口相傍處私語生香脈脈春心偷送時嬌羞婉轉聲音細嫩分明似金籠裏學語雛鸚性格聰明合當似繡榜上風流女史便是畫工須束手縱令巧筆也難描這女子熄了燈款款走近床邊低聲問道可意的哥你今夜爲何不待我先睡了雙手掀開帳幔來摸林澹然身上道怎地不脫衣裳和衣而睡林澹然只不做聲那怪又道親哥我和你同心合意似漆如膠並不曾有半點兒差池你爲何今日有不瞅不睬之意莫非是怪我今夜來得遲了些個一面說一面解衣摸上床來將身子逼著林澹然伸手來替林澹然解衣帶林澹然將手摸著那女人左手就如春筍一般纖纖指甲滑潤如脂那怪笑道我也道親哥決不嗔我又將手來摸林澹然胯下林澹然大喝一聲孽畜休得無禮即將那怪左手中指嗗的一聲掐斷了一手緊緊捺住一手搖動銅鈴那怪掙扎不得門外人聽得鈴響一同持燈執棍呐喊奔進房裏來近床看時那怪卻現了本相是一個玉面狐狸生得毛光爪利兩眼灼灼有光衆人大驚看官你道這狐狸精既能迷人必會變化爲何被林澹然拿住逃遁不得原來這狐狸屬陰感受月華積累成精每遇月夜戴死人骷髏拜月則能變化爲人雄者變男雌者變女全憑前爪捧頭化形脫體當夜卻被林長老掐斷了中指一來十指連心負著疼急忙裏捧不得頭二來心慌膽落當不得林澹然力大如山威風凜凜用力捺住故此逃遁不去此時林澹然令人將燈向前用左手將狐狸提起來右手仗劍喝道你這孽畜不知迷害了多少人的性命碎屍萬段不足以償其惡說罷正欲砍下那狐狸雙爪捧住寶劍的棲兒口吐人言哀求道老爺饒命小畜雖犯淫條合當斬首但有一樁大事未曾完得負真人付託之重雖死亦不瞑目林澹然聽了真人二字便收住劍將劍尖兒指著狐狸笑道孽畜害人萬死猶遲有何大事未完負誰人之托編這般巧言騙俺指望逃生俺斷不是屈殺你也狐狸垂淚道小畜受生已來壽延五百餘年了朝暮吐納修煉不是一日功夫到得這變化地位老爺聽我細訴衷曲且莫動毛三十年前在本地獨峰山五花洞裏藏身洞前有塊大青石光潤潔淨每常在上跳要至夜間石上便有三道金光從中沖起小畜諒下邊有寶欲擊碎來看將石擊至千下不損分毫驚駭不敢再動後來山前土地廟裏來了一個年少的全真小畜不合化爲女子夜去調戲欲采他真陽修煉鉛汞那全真毫不拒卻留我吃酒談笑至更深小畜正欲近身迷謔被那全真將手一指小畜便露出原身無處逃躲全真對我道汝亦是成氣之物了我豈害汝不必驚惶我有一事托汝汝須牢記小畜叩頭問故全真道我有書一封與你藏著等我一個道友來即當付與他小畜問道友是誰全真道是一位釋門中人姓林法名太空號澹然生得魁梧磊落見時切切不可有誤就替小畜摩頂受戒敕我不許亂性迷人異日再來超度說罷化一道清風而去原來是一位仙人小畜整整待了三十年不見有甚麽林長老相遇不覺舊性複萌又做出這般行徑撞在爺爺手裏小畜破戒迷人一死不辭可惜誤卻真人重托不曾會得林長老送得書也林澹然和太公等聽了甚是駭然太公便道這位長老正是澹然林爺狐狸方敢擡頭一看失驚道阿呀今日方遇得爺爺萬幸萬幸林澹然釋劍放手道那封書可在何處狐狸道神仙所托緊緊藏在身旁不敢少離就於胯下小袋中取出來獻上林澹然澹然接過看時一個小小封兒封筒上寫著褚真人傳示拆開看裏面甚麽話說卻是一幅箋紙寫著八句詩道混沌生伊我同修大道身無羈登昊闕有欲滴凡塵曆盡風波險遷歸清靜真天書藏璞石入手可淩雲後又有符一道下注雲依此符樣畫於五花洞石上將左手叩石三下此石即開天書可得林澹然看罷心中暗暗稱奇正是踏破鐵鞋無覓處得來全不費工夫畢竟林澹然果得天書否且聽下回分解第十四回得天書符救李秀正夫綱義激沈全詩曰天道任奇幻丈夫自俠烈片紙燃死灰一言蹶跌鼈直可死回生能令懦成傑血性不委蛇綱常寧玷缺話說林澹然得了仙傳詩句發付狐狸道看真人之面饒汝一死向後改過自新不可複蹈前非明早俺同太公到你洞中相會狐狸叩頭而去倏然不見太公大喜拜謝吾師真天神也夙世有緣得遇恩師救了小兒之命林澹然道此乃老丈洪福山僧何功之有但不知獨峰山五花洞在於何處太公道離此不遠有人認得隨教家憧安排蔬菜整頓酒飯吃罷安歇次早太公和林澹然率領憧仆一同到獨峰山裏來尋到五花洞口靜悄悄並無人迹但見兔鹿成群鴉鵲亂噪張望洞裏時又深又黑不敢走入去只在外面東張西望轉過一個山嘴遠遠見一女人年可三十以上身穿白絹衫兒下面系一條綠紗裙子不施脂粉雅淡梳妝容顔嬌豔飄逸動人手執鐵鍬獨自個在山灣裏掘草藥有詩爲證狐魅從來不惑人人心狐魅自貪淫淫除貪釋存忠正邪亦歸真奉秘經林澹然向前問道娘子借問這山五花洞裏可有人麽那婦人道長老問他做甚林澹然道有一個相識在此修行特來相訪那婦人笑道長老快行不要問他山洞裏誰人敢來修行裏邊都是些山妖野怪蛇魅豬精豺狼虎豹狐狸魍魎不計其數你這五六人若進洞去不夠與這夥妖一食點心快回去罷不要當要要吃人哩家憧聽了驚得魂不附體牙齒相打兩腳都是軟的急即奔走林澹然止住道太公不必心慌有俺在此又問那婦人道既然洞中有精有怪俱要害人娘子爲何不怕獨自一人在此掘草婦人道我們久居於此和這洞中卻是比鄰古人道兔兒不吃窩邊草故此不妨內中一個家撞埋怨道昨夜剛剛搗了半夜鬼老師父只是殺了那精怪才是反被他脫空扯謊逃遁去了林澹然笑道不然箋紙上仙筆猶存豈肯相戲這都是婦人一片胡言不要理他俺們再去找尋定要見個明白太公阻道那裏去尋他多是搗鬼老師不如且回另日再來罷那婦人介面道正是老人家更要作急回去這些妖怪常說後生的細皮嫩肉腹饑得快不如老頭兒皮堅骨硬有些咬嚼專要吃老的你們若撞見妖精時老人家卻先到口太公聽罷心膽皆落扶著拐杖轉身便走後邊家憧也一齊都跑了止有林澹然立定腳不動只見那婦人拍手呵呵大笑現出原身卻就是夜間迷張大郎的狐狸林澹然喝一聲道畜生好大膽輒敢狐假虎威如此來侮弄俺狐狸跪下道非敢侮弄小畜絕早即在此等候爺爺不知太公等俱來故斗膽作戲耍他一耍不想認了真就慌張走了林澹然忙招手叫太公轉來太公和家憧正走聽得林澹然叫聲轉來站住腳回頭看時林澹然遠遠引手相招太公等回步轉身近前見是這個狐狸立在身旁太公問道老師小狐狸倒來了婦人何處去了林澹然帶笑指著狐狸道這不是扯謊的婦人太公怒道這畜生到會扯空頭諒我老人家快伸過腿來與林長老打三五十杖消我這口氣林澹然笑道他是真正畜生且饒這一次衆人都笑狐狸引著一行人進洞裏來可煞作怪外面看洞裏時甚是黑暗進到裏面反覺明亮原來是山岩倒照故此外暗內明一望時峭壁奇峰果然是洞天福地看不盡奇花異卉仙草靈芝澗水澄清重山疊翠實是好景但見閬苑名山蓬瀛福地隱士避人之境神仙修煉之鄉層層疊疊重巒聳翠分明是華嶽三峰突突兀兀峻嶺橫空那數廬山五老進一洞又進一洞倒挂的怪石玲瓏轉一灣又轉一灣壁立著青松蓊鬱高高下下懸崖峭壁呦呦麋鹿銜花纏纏綿綿附葛攀藤兩兩猿猴獻果山岩裏幾處琳琳琅琅如敲金擊玉數道清泉噴雪浪頭頂上一聲咿咿啞啞似龍笙鳳管一雙白鶴唳青空夾道上瑤草奇花浦路中紫芝貝葉清清淨淨不染著半點塵埃杳杳冥冥那識有人間甲子仙鵲噪枝如報喜浮雲出洞本無心這狐精引林澹然走入洞天深處不異仙境裏邊有無數小狐狸見人來慌忙竄避狐精請林澹然張太公石凳上坐了自奔入小洞裏去不移時獻出仙桃異果蜜酪杏仁林澹然同太公吃了幾個餘者令與家憧林澹然問那一塊寶石在於何處狐精指道那西南上青青潔潔兀的卻不是也林澹然上前看覰果然好塊青石方圍高四尺有餘四邊俱蔓紫苔石面平如明鏡光潤細潔倚著一株大柏樹頂上覆著柏葉團團如蓋林澹然叫老狐你站開用左手石上依樣畫符一道輕輕扣了三下只聽得豁刺地一聲響此石分爲兩下就如刀削一般兩塊裂開太公狐精等也都上前來看中間有一石匣匣內有書三冊林澹然頂禮三匝然後取出怕狐精有變不敢開看即藏於抽中和太公等徑出洞門老狐叩頭自去了一行人回到莊裏太公歡喜無限道老朽根生土長在此只知這獨峰山未曾曉得有洞天福地如此仙境若非吾師提挈何能一見適間石中之書是甚名色林澹然道小僧也不曾開看當時在廳上焚香展開原來第一冊面上書著天樞秘笈內中俱是觀星望氣排兵布陣驅神役鬼之法第二冊面上書著地衡秘笈內中卻是奇門適甲堪輿地理陰陽術數之法第三冊上面書著人權秘笈內中卻是補陽煉陰降龍伏虎超天縮地變化之法林澹然看罷不勝之喜張太公道人有善願天必福之吾師廣行陰德兼有宿緣得此天書非同小可林澹然謝道此皆托太公福庇感謝不盡有詩爲證靈符秘笈鬼神愁妙徹三天入九幽諸葛當年扶蜀主林僧今日證真修卻說林澹然自得天書每日默誦書符念咒心下自覺靈通又在張太公莊上住過月餘張大郎病體漸漸全愈容顔複舊飲食起居如故太公父子二人深感林澹然之德款待如父母一般殷勤周密一日林澹然思念故鄉辭別張太公父子要行張太公與大郎再三留住不放林澹然道小僧在貴莊攪擾多時感恩不淺但小僧久遊方外今欲歸故園暫且告別而圖後會太公心下不舍道小兒被魅名已登鬼籙幸吾師救拔得全性命恩若丘山老朽久懷修行之心恨無接引之路今得吾師早晚教誨受益實多豈忍遽別況狐精畏吾師威德故不敢來倘吾師去後此怪複來小犬之命又難保矣吾師不嫌小莊鄙陋改爲佛堂在此修持朝夕相處勝如雲遊遠方賓士辛苦乞老師三思幸勿推阻林澹然辭道貧僧在此叨擾已久今日之別非是無情實欲歸故鄉一探父母墳墓以終天年耳張找道敝境亦是東魏地方又非他鄉外國小莊雖窄頗可容身粗茶淡飯足供朝夕吾師出家人隨處爲家何必如此堅執林澹然道大郎恁般說時使小僧措身無地矣非有他說只因在此攪擾心實不安張太公道吾師此別相會未卜何日使老夫戀戀不舍心實黯然小兒無福不能終獲庇祐說未畢淚隨言下林澹然道貧僧何德感承賢喬梓如此相愛何以克當使小僧不忍相別願在此朝夕聆教張太公父子大喜自此林澹然住在張家莊內擇日妝塑佛像改造禪堂方丈後面另起臥室廚房修緝牆垣完固撥三四個家憧伏侍灑掃炊囗張太公使人饋送不絕時常往來談禪講道荏苒之間不覺寒來暑往又早一載有餘林澹然朝夕演習天書自天文星象以至術數陰陽無不精妙雖然安逸清閒但朝夕計念杜成治和李秀放心不下後聞得傳言杜成治受驚物故朝廷抄沒家產暗中垂淚歎息寢食不安繼後又聞得梁國人來說杜都督妾生一遺腹之子心下私喜恨不能一見只是難返梁國怏怏而已當下時值隆冬天氣彤雲密布白雪飄揚自早至午看看下得大了怎見得好雪宋賢有賦爲證時惟歲暮序值隆冬擁紅爐而不暖披重裘之蒙茸靉靆雲氣凜冽陰風瞻昏霾之四合睹冰霰之集空始焉飄飄灑灑頃之霏霏芃力芃如鵝毛之細剪似玉甲之零空張君無由會鶯紅於月下郝子何能曬詩書於腹中程門佇立盈尺彌恭山陰訪故半道運蹤謝蘊之才高不言飛絮子卿之節勁獨矢孤忠翳邊城之逋寇銀夏忽喪夫黃屋蔽潮陽之請夫藍關漫擁乎青驄披鶴氅而繞竹神翁興逸指白馬而作賦子建才充以至漁人獨釣學子勤攻寒江披一蓑于蘆獲庭除映萬卷之雕蟲腴梅花於嶺上折竹梢于修叢號猿聲于谷口印虎迹于林東亂曰兒童喜而埏爲人獸兮且幻出夫奇峰詩人感而形諸吟詠兮擬麻衣之色同農慶爲瑞士征爲豐唯寒素之怨尤兮苦裂膚于陶穴羌成卒之甲冷兮悲墮指于胡風彼華堂歡宴檀板兮覺猶嫌乎酒薄況山僧獨宿紙帳兮又何堪寂寞之情棕林澹然策杖獨立柴門內竹屏邊看雪只見一個黑瘦漢子頭帶卷簷氊帽身穿青布道袍腳著多耳麻鞋背上斜馱包裹手裏撐著雨傘張頭探腦望著門裏林澹然正欲問時那漢放下傘走入門來對澹然聲諾問道師父這裏可知道有一位林長老麽林澹然道俺這裏不知別處去問那漢道原來京都妙相寺中爲副住持的因觸犯了梁主逃奔出來一路打聽消息尋到此間聞說在這地方左近處藏頓師父豈有不知林澹然怒道俺出家人那管閒事快出去不要在此纏繞那漢又仔細看了半晌把傘柄頓一下笑道幾乎錯了林老爺休得相瞞老爺正是林住持雖不認得詳細卻也曾在圖像上記得明白今日相逢他鄉遇故也不枉了小人一場跋涉林澹然驚道足下是誰那裏相會爲何認得林某那漢道暫借一步告稟二人同到佛堂上來那漢放下包裹納頭下拜林澹然扶住道足下何姓從何處來此敢勞重禮那漢拜罷道老爺與小人是舊鄰曾相見數次爲何忘了林澹然思了一會道雖然而善實失忘了尊姓那漢道小人姓沈名全渾名叫做蛇瘟便是住在妙相寺後牆小巷內每常寺中往來老爺卻也曾會面林澹然笑道原來就是沈兄黎賽玉娘子就是公渾家麽沈全道正是小人妻子林澹然道向聞人說你出外爲商怎地不回家去卻來尋俺有何話說沈全道一言難盡小人被趙蜜嘴老豬狗將些資本借我賺我在外生理只道他一團好意不期出門之後將我渾家引誘與那野驢鍾守淨通姦今春小人回家聽得街坊前後人誹誹揚揚講這鍾守淨反怪林住持好言諫諷朝廷處暗用讒言逼他走了小人初時不信數日之後試探妻子果有外情欲待殺了這淫婦姦夫又一時難以下手欲待捉姦告理爭奈這廝結交豪貴上下情熟況朝廷寵他勢焰滔天又教人暗中害我故此棄家出外別作良圖不想行至定遠劍山下過被夥強人擄歸山寨小人哭訴其冤幸得苗寨主認是同鄉收留帳下爲一頭目苗寨主懸念住持林爺單身奔竄不知下落故差小人從梁至魏遍處尋訪前村問著樵夫說張太公莊上有一長老如此模樣故尋至此間果是林老爺苗寨主有書在此說罷打開包裹取出書禮雙手呈上林澹然接書分付道人陪沈兄方丈中酒飯拆書看時書上寫道苗龍頓首百拜睽違師範倏爾一春遐想大恩無由仰報前者偶爾相逢私喜倘能得效犬馬不期又成離別使人悵然近聞李季文雖蒙寬縱不能得脫囹圄實是度日如年今春正月十三夜某私闖入牢欲救李兄逃出不料被人識破幾乎兩命俱傾幸帶得錢多隨處賄賂逃脫今憤氣招集人馬已得精銳數千糧草俱足意欲整頓軍馬攻破城池殺盡奸僧淫婦救出李兄與天下吐氣然而智短力綿未敢輕舉特懇恩師駕臨指揮以成義舉萬乞留神倘慨然飛錫枉顧則慰藉不獨在龍實天下之共望也專候回示外奉赤金二錠白珠百顆聊中薄敬希叱人爲荷林澹然看罷暗想道苗龍一介鹵夫亦知大義然俺既人禪門豈可複行軍旅之事欲救李秀吹毛之力何必興兵動將自惹禍胎當晚留沈全宿了燈下修書封固次日贈沈全盤纏二兩並回書一封發付回寨沈全道薛苗二大王差小人接住持爺同歸山寨怎地不去林澹然笑道俺出家人恰情山水久耽疏懶不涉世務矣煩你拜上二寨主多謝厚禮凡事須行方便不可恣害生靈相會有日你須一路小心謹慎關津盤詰甚嚴書可藏好不宜耽擱速回山寨沈全拜辭而去一路無詞徑到山寨裏卻值薛志義苗龍在殿上飲酒沈全唱喏苗龍道差你去尋林住持可曾見麽沈全道小人費盡心機得到東魏廣甯縣石村山下張太公莊上尋見了林住持住持十分之喜書劄俱已收下有回書在此薛志義道一路辛苦叫嘍囉賞沈全酒二瓶肉一腿且去將息沈全叩頭謝賞自和一班兒弟兄接風吃酒去了苗龍當席拆書與薛志義同看上寫道客春叨擾感激不勝今屏厚儀叨惠更重二兄各負雄才堪爲世用而據山擄掠恐非良謀日者朝廷佞佛變亂漸生上下焚修盡崇釋教老僧仰觀天象不十年間國家將爲他有二兄可招集士卒多蓄糧草廣行仁義延接四方豪傑待時而動輔佐明主以圖大業留名青史此大丈夫之所爲也第不可損害賢良妄行殺戮耳李兄一事足見苗兄仗義任俠可敬可仰竊思皇都守衛甚嚴軍將如蟻以三二千烏合之衆敵數十萬精勇之師如驅羊搏虎鮮有不敗者也仆得異術可救李兄敬畫靈符一紙煩差精細健卒潛入獄中付與李秀救他歲終除夜乃丁亥日辰六了神將聚于巴時可貼符額上寫路徑于符下作速遁出自有神護並無阻礙半日間可相會於山寨矣密機勿泄至囑至囑老朽無能習懶成癖已無意廛寰事非敢忘夙雅也統希情諒不一薛志義苗龍看罷感歎不已藏符匣內次日苗龍差一本鄉心腹嘍囉原來是個縫皮待詔曾與李秀識熟分付如此如此而行嘍囉謹藏了符挑了一副皮擔傢夥取路進京不一日已到京都進得城門挑著皮擔一直奔清甯衛大獄裏來此時卻值年終歲逼之際這些囚犯亦都要修補舊鞋過年倒也忙忙的修補不叠嘍囉一面縫鞋一面張望李秀只見李秀拿著一雙新鞋出來道待詔替我縫一雙主跟嘍囉接了鞋子見身畔無人輕輕問道李季文一向好麽李秀記得起道在下與兄闊別許久何期今日得見嘍囉腰邊摸出一個封兒來暗暗遞與李秀附耳低言道靈符一道如此如此速行莫滯快到山寨來相會李秀接符藏於袖中喜從天降走入裏面湊些散碎銀子謝了嘍囉嘍囉急急縫了幾雙舊鞋慌忙挑擔出獄取路自回山寨去了且說李秀得了靈符心中暗喜看看又是除夜李秀預先收拾銀兩寫路程在符下額角上貼了靈符試行幾步看心裏就如撞小鹿兒相似慌張起來果然好神符妙術李秀兩腳即有神鬼擁護走不上十余步已近監口見獄門半開大著膽索性撞將出去並無人見直出清甯衛衙門亦無一些攔阻取路飛奔北門外來卻似雲推風卷耳邊只聽得颼颼地響足不沾地那消三五個時辰已到山寨關口天色傍暮李秀擡頭看時關門早閉隨即高聲叫門關上嘍囉喝問是誰李秀答道是我李秀嘍囉道是李將軍來了麽李秀道正是來了嘍囉道既是李將軍爲何不見形影李秀道我站在這裏爲何不見一個嘍囉道卻不作怪只聽得人聲不見人形莫非我和你著鬼了李秀道二位壯士一個人站在關前講話休得取笑兩個嘍囉四圍張望不見人影齊嚷道不好了何處來這一個屈死野鬼假名托姓在此纏擾快進去進去一面嚷一面念太上老君急急如律令敕管二門嘍囉聽得處邊喧嚷一齊擁出來只見兩個嘍囉在那裏喊叫有鬼問鬼在那裏這等大驚小怪嘍囉道适才有人叩門開關問他說是李將軍越牢而來仔細看又不見人再問時照前答應東撈西摸不見一些卻不是鬼怎的衆嘍囉不信喝道胡說那有此事正要趕出來問忽聽得面前有人道李秀已在此不須出去衆嘍囉失驚道李將軍你在那裏說話哩頭頂上應道我在你面前立的不是衆嘍囉住目細看又不見人俱各呆了內中一個乖覺的道不要慌此事來得蹊蹺且去報與二位大王得知再做理會管門嘍囉報入寨中薛志義苗龍親自來看一路點著燈火照耀如同白日李秀見苗龍來到慌忙迎著施禮道苗二哥間別久矣好享福也苗龍道李大哥既來到此爲何躲了不近前相見李秀道小弟在這裏拜揖卻怎生皆言不見苗龍叫嘍囉高執火把四圍遍處照燎只不見人苗龍低頭一想拍手笑道聰明一世失智一時李大哥你額上靈符可曾揭去麽李秀道未曾揭去苗龍道是了快揭符相見李秀即伸手將額上靈符揭下不覺滴溜溜在虛空跌將下來睡在地上有詩爲證李秀一村夫遙聞近卻無不因靈秘術怎得出囹圄衆嘍囉向前扶起一同歡笑入寨裏上殿李秀下拜道小弟監禁大獄自分死期將近今蒙寨主與苗二哥救拔得以出獄實再生之德也薛志義苗龍答禮道大哥下獄使小弟等寢食不寧幸得聚義實出望外此非二弟之力乃林住持之妙法也邀入後殿飲宴三人談笑歡喜至夜深寢了次日殺牛宰馬祭賽天地三人在殿上焚香歃血拜爲兄弟薛志義年長爲兄立爲寨主李秀坐了第二把交椅苗龍坐了第三把交椅次序而座小嘍囉都來參拜了新大王大吹大擂飲酒慶賀苗龍說及林住持近來得了異術遠寄這一道靈符救李二哥出來實爲奇異李秀道林住持別後不知逃往何處去了他是萬夫之敵又兼能行術苗三弟既知他蹤迹何不接他上山天下無人敢當矣薛志義道賢弟不知林住持向日逃難之時亦曾經我這裏過再三款留不住堅辭去了目今在魏國石樓山莊上爲賢弟受苦又去求他上山同舉大事欲要攻破皇城救取賢弟出來林住持再三推託止傳授靈符一道以救賢弟果得相會我山寨中若得此人何愁四海群雄正說話中適值沈全執壺斟酒李秀看了道這人好生面熟那裏曾相會來沈全道小的好幾次到大王店裏吃酒耍子又來賠錢大王卻忘了苗龍笑道兄豈不知這就是鍾守淨那話兒的對頭渾名喚做蛇瘟沈全李秀拍掌道這廝真實是個蛇瘟男子漢一個渾家也管不得容他去相交和尚罰一大觥酒衆人撫掌大笑沈全徹耳通紅自斟著酒吃稟道三位大王止念感恩不思報怨林老爺大德因當重報鍾和尚大惡不可不誅就是小人們也是有氣性的見淫婦奸僧通情來往忿忿懷恨怎能夠一刀砍死才消些氣可奈身單力弱孤掌難鳴沒奈何暫且含忍今三位大王如此英雄有了軍馬何不殺至妙相寺將這些淫禿盡行誅戮也教江湖上好漢傳說一聲豈不是留芳百世李秀拍著桌子道這人也講得是蛇無頭而不行大哥三弟何不擇日起兵殺這些和尚以消林住持之恨苗龍笑道薛大哥與小弟每每在心要發軍馬誅此惡僧因無良謀不敢興兵日者已曾請林住持上山商議此事他有回書在此二哥一看便知分曉令管文房頭目取書出來李秀看罷笑道據林住持所言皇都地面一時難以進兵依小弟愚見殺這鍾和尚只在反掌之間耳薛志義道二弟何計可以殺之李秀道若依我這一計不必興兵發馬廝戰爭持止用我兄弟三人管取結果了一寺和尚苗龍道這妙相寺殿宇廣闊僧衆極多不比小的去處本寺和尚何止五七百衆外有遊方挂搭僧人不計其數怎地只我三人就能殺得許多和尚李秀道大哥勇猛三弟聰明卻不知兵行詭道比如寺中和尚要我等一個個親手殺過畢竟有些漏網安能盡絕必須如此如此而行管教他一寺禿驢盡遭毒手走了半個不算好漢薛志義道此言暗與韜鈐合初出茅廬第一功苗龍道倘有追兵不放出城如之奈何李秀道這又有計了只消恁地這般若有官軍追來殺他片甲不回方顯我弟兄們英雄手段薛志義大笑道有如此妙計何況殺這幾個禿驢便與梁主爭衡又待何如三人大悅酣歌暢飲盡樂通宵李秀自差人到雞嘴鎮搬取渾家和伴檔上山歡聚不題再說鍾守淨自從在梁主駕前暗用讒言逼林澹然離寺之後放心大膽晝夜和黎賽玉取樂本寺大小和尚暗暗怨罵只畏鍾守淨財勢滔天又見林澹然的樣子因此鉗口結舌無人敢諫有正氣些的都離寺雲遊去了便是行童來真通了消息又有奉承鍾守淨的背地說他搬嘴弄舌以致林澹然知風逃竄這鍾守淨聽了大怒把來真朝捶暮打受苦不過也逃亡去了次後沈全回家暗中又著人去害他性命有人通風沈全得知棄家逃命鍾守淨又在本府用了錢誣告沈全做竊盜在逃人犯疊成文卷做了一個照提自此拔出眼中釘挑卻肉中刺果然朝朝七夕夜夜元宵恣意淫欲往來無忌後來賽玉有孕鍾守淨央趙婆贖一帖墮胎藥打下了冷子宮再不孕了光陰似箭不覺又早過了三個年頭此時正值太清二年正月元旦之日年規拜懺齋天當日鍾守淨率領寺中大小僧衆在大殿中拜誦水懺將近午後霎時間狂風大作燈燭皆滅滿殿擁起煙霧鍾守淨大驚道這是何故言未畢只見正梁上飛下一條大蟒蛇來遍體皆黃亮如金色雙睛閃爍口中噴火身長二丈有餘昂著頭張開大口徑奔鍾守淨守淨慌張無措拚命往東首羅漢堂跑躲衆和尚丟了經卷各自逃生那蟒蛇不奔別人怒目切齒飛也似來追鍾守淨守淨趕入羅漢堂裏卻無去路蛇將近身踴身一跳跳上壽亭侯關爺神廚裏法身之後做一堆兒蹲著那蛇見了關爺聖像昂頭張望不敢上廚只在四圍盤繞鍾守淨躲在廚裏身子驚得軟了牙齒捉對兒廝打顫慄不住暗想這蛇奔上來之時性命卻在頃刻間了心裏越慌猛聽得一人高聲喊入羅漢堂來道住持不要慌有我在此聽聲音時卻是徒弟雷履陽這雷履陽原是弄蛇的乞丐出身虧著族叔在寺做道人薦這侄兒與鍾守淨爲徒因他能言會話隨機應變守淨最是聽信他待爲心腹當下見蟒蛇來趕鍾師父他還倚著舊時手段撩起半截道袍伸拳裸臂大踏步搶向前來捉那蟒蛇那蛇見了雷和尚昂頭噴火徑奔過來雷履陽伸開大手吐出涎唾將手擦了跳上一步來捉蟒蛇卻好蟒蛇直攛上來被雷履陽一手抓住七寸意欲提起來溯死不期這蛇重的厲害雙手也提他不起被蟒蛇調轉尾梢豁刺地左臉上打了一下雷履陽打得昏暈欲待掙扎那蛇又調起尾梢右臉上複打一下雷履陽叫一聲啊呀不好了手已撒開睡倒地上那蛇昂起頭來將雷履陽脖頸上緊緊地盤繞住了圈將攏來抵死不放鍾守淨在神廚裏張望看見雷履陽被蛇盤住大聲喊叫快來救人這台寺和尚道人行童各持器械呐喊上前那蛇見衆人來的凶湧放了雷和尚攛起羅漢堂半空盤旋了一會滿身是火光焰射入看得衆和尚眼都花了又聽得一聲響亮如山崩地塌之聲那蛇衝破兩扇格子門攛出去衆僧一齊發喊趕出後殿花園裏來那蛇口頭將衆人看了幾眼徑溜入荷花池裏此時臘盡春初雨雪甚多水平池岸衆人無可奈何只得回身計論道且去救了雷師兄再作理會複進羅漢堂來鍾守淨已在那裏啼哭雷履陽七竅血流而死僧衆驚得面如土色鍾守淨哭了一會衆僧講蟒蛇溜入池中去了守淨分付打點棺木盛殮擡出門外權厝待春盡下火焚化當晚鍾守淨和滿寺和尚俱心驚膽顫不敢就枕聚做一處商議鍾守淨道有此異事實是不祥一個和尚道這黃蛇鑽入池內諒無窟穴可出乘今夜無人知覺車幹池水除了這孽畜也省得住持與我等懸懸挂膽鍾守淨道此言論得是即忙取出三架水車裝起車頭水軸選十數個後生和尚精健道人傍池邊架起三道車來一齊踏動戽起池水剛剛車了一夜方才水幹只見池心裏插著赤亮亮直逼逼的一條物件半截埋在土裏半截露出土上衆人看了指道兀那黃的不是蛇也鍾守淨向前觀看卻原來不是蛇是林住持那一條熟銅禪杖俱各大驚有一個勇健膽大的和尚脫了上衣躍身跳入池內來拔這禪杖就如蜻蜓推石柱一般莫想分毫搖動招呼衆人相助有幾個興高的少年和尚都跳下池中一齊搖拔不搖時尤自可衆僧用力搖拔之時更是作怪那禪杖一步步縮入土內去一霎時不見了衆人面面相覷鍾守淨分付道人取幾柄鋤鍬來掘下去看衆和尚呐一聲喊並力掘土正是從前作過事沒興一齊來不知掘下去見些甚麽異物且聽下回分解第十五回佞子妙相寺遭殃奸黨風尾林中箭詩曰崔巍寶刹聳雲端頃刻俄遭烈火燃佛骨塵埋沙土冷香魂飄泊劍光寒萬鍾公子今何在百計貪夫此夕殘豪俠神謀真莫敵陡教名姓震區寰話說鍾守淨令衆和尚盡力掘地掘深丈餘並不見禪杖蹤影衆僧用盡氣力都疲倦了道住手罷尋他則甚鍾守淨那裏肯歇大喝道胡講務要掘見禪杖方才罷手衆人沒奈何只得又據下去七尺有餘掘著一塊石碣豎立土內衆人見了並力掘起石碣擡上岸來細看時碣上卻有兩行大字被泥壅了不甚明白用水洗淨方見上面篆著二十個字道少女樹邊目人馱二卵哭善者福自生惡者禍相逐鍾守淨看了輾轉尋思默然不語衆和尚心下也都省得林澹然是個剛直好人鍾守淨是個姦淫惡輩銅杖化蛇預先警報乃不祥之兆見鍾守淨面龐變色低首無言衆僧勉強解功道林澹然謗君叛逆豈不是個惡人逃竄遠方眼見得旦夕遭殃了住持老爺是個修持積德的善人將來壽同山嶽福並吳天豈不是果證菩提上天告戒乃住持之善報也雷師父乃前定之數住持爺不必憂疑鍾守淨聽了自心裏護短也是這般解說稍覺心寬笑道汝言正合我意汝等勞碌了一晝夜各去歇息待後補做道場便了衆人收拾水車鋤鍬各各歸房不題忽然又是初八日了鍾守淨分付管廚房和尚整辦香齋初九日齋供玉皇壽誕次日五更寺中和尚都起早執事道人行童等在殿上焚香點燭供獻齋食請鍾住持上殿拈香參拜玉皇請佛次後衆僧俱來焚香參聖敲動鐘鼓誦經念佛直至平明殿上來燒香的士女絡繹不絕擠滿殿中念佛之聲聞於數裏將近日午鍾守淨正在大雄寶殿高臺上宣揚經典忽見殿前雨道上的人紛紛卻立兩傍讓一位官長入來前面罩著一柄黃羅傘後邊隨從著一二十個虞候側首一匹白馬上騎著四五歲一個孩童看看走近殿側鍾守淨認得是樞密院右仆射牛進原來這牛仆射年過五旬無子曾在妙相寺玉皇案前許下七晝夜水火煉度醮願祈子後來夫人馬氏有孕生下一子寄與玉皇案下名叫玉仙滿月後還了此願自此凡逢玉帝生辰必領王仙來妙相寺拈香拜夀直至道場散後方回當下鍾守淨忙下臺來接進迎殿焚香拜聖又領玉仙到臺上拜了玉帝方和鍾守淨見禮留入方丈待齋鍾守淨陪著牛進王仙進後殿穿堂花園內閑玩半晌複上臺念佛看經不覺紅日將沈天色已暮遍處點上燈燭至初更天氣鍾守淨穿了千佛法衣戴上毗盧帽沐手焚香上壇撚訣誦咒散五穀接引餓鬼超度亡魂已過半夜化紙送聖鍾守淨發付衆徒弟陪著一班兒平布施主後殿吃齋又托趙蜜嘴陪伴一夥女檀越在禪堂吃齋自卻陪牛進和縉紳在正殿上吃齋少頃衆人皆散牛進謝了鍾守淨令老都管抱公子玉仙同回這玉仙看道場頑要身子困倦卻睡著了鍾守淨道公子既睡不可驚動就在小僧房內暫宿一宵明早送回夜靜更深去亦不便牛進稱謝自回卻留老都管和一家憧伏侍公子在寺內安歇鍾守淨送罷香客分付道人等好生前後照管小心火燭謹閉門戶自回臥室脫衣而睡此時已漏下四鼓鍾守淨正睡思朦朧忽然夢中驚將醒來只聽得人聲喧嚷呼呼地就如雷轟潮響兼有囗爆之聲不絕守淨急開眼一看只見火光透室四下皆亮驚得渾身發顫慌忙披衣起來開門外面火光大起道人飛跑來報道住持爺不好了正殿上火起風勢甚猛快尋出路逃生鍾守淨喝道胡說快快教合寺僧衆運水救火說話未完只見後殿火光焰焰黑煙競起鍾守淨正慌之間又見側首禪堂屋上攛起煙焰來心下大慌急忙欲複奔入臥房庫房門首早見火焰飛騰驚得手足無措顧不得金銀寶貝翻身搶出庫房門外幾乎被門檻絆倒忽見幾個和尚喊叫道住持爺快往後門逃走前門去不得了山門外一夥大漢執刀攔殺奔出去的都被砍倒我們特來報知速奔後門還有生路鍾守淨聽了唬得心膽皆碎回身隨著這幾個和尚一齊趕到後門來剛剛走過穿堂將及後門門口轉過一條大漢手拿樸刀喝道賊禿往那裏走一刀砍來砍倒一個和尚余者四散逃走鍾守淨見了不敢出後門抽身轉入穿堂此時穿堂四圍皆已著火周圍火光亂舞烈焰飛騰寺中沒一處不著果是山搖海沸地塌天崩可憐這些光頭和尚東西亂竄喊哭之聲不絕鍾守淨欲向前被火煙隔住不能向前欲退後怕人攔殺不敢退後心下惶惶無計進退不得正急迫戰兢之際只聽得霹靂一聲震響穿堂側首磚牆崩倒將鍾守淨壓於牆下這一場大火真好利害但見濃煙匝地烈焰烘天千千匹火馬噴紅雲萬萬道火龍飛赤電三尊銅佛蓮花臺上放光明四下泥神黑霧叢中消色相觀世音焦頭爛額說不得美貌莊嚴韋馱神有甲無盔安在哉英雄猛勇房房鼎沸喊聲一片似轟雷處處奔騰炎燭半天如白日真不異火牛複國田單毒計保齊城又何下赤壁鏖兵公瑾施謀焚操賊焰到時盡成灰燼風卷處皆作塵砂由你鐵柱也都熔便是石樓須粉碎奔逃無路衆和尚葫蘆爆碎似椰瓢叫殺連天衆好漢鐵面無情如黑煞只有些兒好處靈魂隨佛到西方更是分外便宜師祖徒孫同下火金碧諸梵天須臾一火燃只因小和尚毀卻大莊嚴再說薛志義李秀苗龍三人定計火焚妙相寺乘這玉帝生辰苗龍等預先在鍾山蔣侯店後埋伏嘍囉次後陸續進城候道場已散苗龍等在大雄寶殿四下裏放起火來弟兄三個來往殺人寺外嘍囉攔截和尚此時正月天氣甚寒夜深火起人人都在睡夢中驚醒身子寒抖抖地兀自把捉不住誰敢前來救火更值春初東南風大發風催火焰火趁風威遍寺火光飛舞這近寺人家俱備慌張你我不能相顧但見兒啼女哭棄家撇産各自逃生況這妙相寺殿宇甚高火光照耀滿城一片通紅地方人等飛也似分投各衙門報知比及官府知覺催軍救火時火勢正旺山門口金剛殿上被風卷得煙火萬道滿空亂舞火氣熏灼逼人立腳不住誰敢上前救火只是遠遠地站著呆看叫苦不叠又見山門口殺死和尚血流滿地諒得有歹人放火一發不敢入寺內來了再說沈全隨薛志義進得城內自尋僻靜去處藏身至四更盡放火趁著火勢沖天帶了同伴嘍囉徑奔到自家門首只見門裏點著兩三盞燈聽得趙蜜嘴叫道大娘子快些火燒出牆外來了賽玉和長兒無心答應口中只是求神喚佛一面收拾箱籠物件原來趙婆因赴玉皇會夜深了就在黎賽玉家借宿未曾著枕寺中火起慌急打點出門奔走被沈全一腳踢開大門搶入屋裏大喝淫婦這番無處去了黎賽玉見丈夫提刀趕進料來不好驚得魂先沒了手腳麻軟跌倒地上沈全提刀欲砍見了渾家姿色臂膊不覺酥軟了舉刀不起傍邊轉過一個嘍囉喝道蛇瘟真沒伎倆故此淫婦做出事來見了如何不殺說罷一刀將黎賽玉砍死趙婆見勢頭不好欲待走時被沈全攔住照頭一樸刀砍倒又複一刀結果性命長兒也被嘍囉殺了沈全將細軟物件和嘍囉束縛身邊也放起一把火來一齊出門到寺前趁著苗龍等只管攔路殺人因此寺外救火的不得進寺裏逃生的不得出可憐只爲鍾守淨一人連累了多少生靈性命這寺中和尚走不出的三三兩兩互相擁抱焚死於火內或有逃出寺外來的又被苗龍等邀截殺了或被房屋牆垣壓死或你我捱倒被人踏死寺中和尚十死八九這火內逃得性命的真是天大之福薛志義苗龍李秀率領嘍囉正放火殺人之間遠遠見救火官軍漸次來了不敢停留招呼嘍囉等一同取路出城奔到城門邊已五更將盡城門開了一齊大喜湧出城外嘍囉已備三匹快馬路口等候薛志義苗龍李秀跨上雕鞍火速加鞭率領嘍囉取路而回話分兩頭再說牛仆射自道場散後留公子玉仙在寺中安歇自回府中只覺心驚眼跳坐立不安心下疑惑正欲脫衣去睡家憧飛報妙相寺火起驚得手足皆顫忙差虞候幹辦一二十人趕到寺中救公子出來牛進府衙離妙相寺有二裏之遙虞候等約莫去了半個時辰不見回報牛進如坐針氈心忙意亂自騎一匹快馬帶領家憧縱馬加鞭奔到寺前來只見火勢奔騰黑煙大作欲急走入寺裏時傍人報說寺內有歹人放火殺人若進去決遭其害牛進聽了不敢入寺只得停馬喝教大小軍士一齊救火這些軍士口說救火如同玩耍一般敲了一聲鑼一齊扒上屋去立住腳看火但聽得搖旗呐喊那裏敢上前牛進看了氣得爆燥如雷教家僮等四圍打聽公子消息不見下落心內空焦直到五更風勢漸息火光漸衰軍士們方敢向前救滅餘火天大一座寺院頃刻變成白地燒死僧衆臭不可聞牛進才知兒子玉仙和老管家等皆死於火內仰天頓足嚎啕正悲切間守門軍土飛報北門有強徒數百奪門出城去了一連數次飛報又見貼寺居民來說有鄰人沈全渾家黎賽玉和趙尼姑小使長兒三口被人殺死放火燒屋幸得鄰居地方等救熄牛進想道我一向聞人傳說鍾守淨和一婦人有奸我也不信今日放火殺人強徒兇惡豈不是爲著姦情來諒這夥賊決然是林澹然爲首京城內輒敢大膽橫行若不早除必爲大患此時去尚未遠調軍急急追趕一鼓擒之以泄此恨當下忙回樞密院一面上本奏聞一麵點選精兵二千馬軍五百差院判史文通驍騎校目馬瑞率領衆軍立刻起程追趕強寇並力向前論功升賞史文通馬瑞得了將令火速驅軍出北門如風捲殘雲一般追來再說薛志義等一行人離城不遠山僻處埋鍋造飯才吃罷正欲起行猛見後面塵頭大起薛志義看了指道二位賢弟你看後邊塵起處必有追兵到來都要並力迎敵殺敗來軍方顯豪傑苗龍道追軍若到誘他至埋伏處前後夾攻可獲全勝矣說話間喊聲漸近薛志義將嘍囉一字兒擺開縱馬向前候戰史文通馬瑞率領軍馬旋風般追來看看趕上只見前軍擺開一將生得十分勇猛騎著一匹黃驃馬頭戴一頂青紮巾身穿綠錦襖手持大斧背後馬上二將一樣打扮兩傍一字兒列著數百嘍囉二人看了馬瑞道觀此強寇不可輕敵他已有準備可將軍馬布成陣勢然後挑戰史文通大笑道將軍素稱英雄今見幾個小寇何心怯也就此衝鋒過去我當助戰有何懼哉馬瑞被史文通言語一激即提刀躍馬大喝道大膽狂賊快下馬受縛免汙刀口薛志義罵道你這一干害民的死囚直來我老爺手中納命馬瑞大怒舞大杆刀劈面砍來薛志義橫蘸金斧攔頭劈去兩個一來一往一上一下戰到十數合薛志義提斧往馬瑞面門劈來馬瑞急忙閃過薛志義倒拖大斧撥馬便走馬瑞喝道潑賊奴逃往那裏去縱馬趕來薛志義領著苗龍等一行人落荒而走後面馬瑞緊緊追來史文通見馬瑞得勝大驅馬步軍兵搖旗呐喊殺奔前去薛志義約走五裏之地回馬又戰數合撥馬又走馬瑞殺得性發那裏肯住一直追過鍾山正到風尾林埋伏之處苗龍放起號炮馬瑞吃了一驚只聽得金鼓齊鳴山田裏突出人馬來不知多少將馬瑞人馬沖作兩截前後不能相顧薛志義苗龍李秀牽轉馬頭喝教衆嘍囉一齊奮勇衝殺前後夾攻馬瑞見有埋伏況薛志義武藝高強料不能取勝不敢戀戰拚死殺條血路便走史文通逃不脫身被亂箭射死馬下薛志義驅嘍囉截殺官軍就如砍瓜切菜殺得屍橫遍地血流成渠奪得馬匹器械無數薛志義見馬瑞去得遠了也不追趕收兵取路徑回山寨一路上鞭敲金鐙齊唱凱歌無人敢阻望風而避到了寨中殺牛宰馬犒賞嘍囉整各筵席慶賀原來這埋伏計都是李秀定下的官軍果然中計殺得大敗虧輸只剩得馬瑞匹馬逃生進得城門把吊橋高扯分付緊守北門奔入樞密院來正值謝牛二仆射聚集大小官員議論此事探子飛馬報說官軍殺敗回來衆皆大驚馬瑞進堂上叩頭請罪牛進喝問汝等怎不用心以致兵敗馬瑞道非小將不用心乃史院判之過牛進怒道汝乃武士史院判只系文臣汝今大敗而回反推他人之過馬瑞道不知何處來這一夥強寇甚是猖獗爲首一將武藝高強手提大斧驍勇無敵以下嘍囉人人精銳小將追及之時彼已預有準備小將欲排陣交鋒史院判執定說不須布陣小將奮勇先出和那賊廝戰那賊敗逃催軍追趕不期趕至鍾山突出大隊人馬將我軍分作兩截前後夾攻首尾不能相顧史院判死於亂箭之下小將獨力不支只得回馬牛進大怒道慣戰之將不知兵法須信佯輸詐敗必有伏兵如何不小心提備反遭賊寇之敗又喪了史院判性命這分明與賊通謀反歸罪於他人敗軍之將有何面目來見喝左右將馬瑞梟首示衆謝舉急止道不可不可勝敗兵家之常不知虛實誤敗一陣非故縱也且未可自殘手足但削去官職待後立功贖罪我等且議大事以覆朝廷牛進道本該斬首謝大人勸免削去本職待立功之日另行區處當下叱退馬瑞謝舉道皇城內地前清甯衛申報牢中逃脫死犯一名李秀系林和尚窩主今又被賊盜放火殺人傷了官軍殺了院判一員我等樞密院官體面安在聖上問及何以答之牛進道不知何方來此強寇如此猖獗或就是逃犯李秀勾引來的亦未可知若不早除國家大患我思非林澹然那禿廝不能如此大膽橫行謝舉道那林和尚雖然觸駕而逃倒也是一個剛直漢子這一場事分明是鍾守淨自取其禍既爲僧家不守戒律貪淫敗德反怪同袍之諫誣林澹然私通外國逼得他無地容身故此嘯聚亡命強徒放火殺人害了許多無辜生靈又複損官殺卒其勢不小奏過聖上必須發精兵能將征剿事不可緩牛進道大人所見正合吾機只索速奏請發兵征討二人說話間忽報一人飛馬而來近前下馬入內相見卻是內宦洪侗懷內取出手詔道萬歲爺聞知妙相寺被火僧人道變速速宣二位樞密商議大事謝舉牛進急具朝服上馬入朝到金鑾殿拜舞已畢武帝道五更時分朕聞有火披衣起來見火光沖天喊聲震耳朕心駭然今早方知是妙相寺被盜焚劫卿等豈不知之鍾守淨生死若何牛進道滿寺僧人不留一個鍾守淨壓死於牆下屍首尚存臣中年止有一子幼小因到寺中燒香亦遭焚死寺院盡爲灰燼臣已上表奏聞即差驍騎校尉馬瑞領軍追剿叵耐那賊乃是昔日逃僧林太空爲首劫去窩犯李秀率領凶徒數百精勇無敵馬瑞反遭其敗院判史文通監軍亦遭陣亡被他脫逃而去伏乞聖旨興大勢人馬揀選良將征剿此賊方除國患武帝聽罷潸然淚下道何期鍾守淨仁善真僧不能圓寂歸西可憐橫死於岩牆之下敕命合龕好生焚化建塔又道皇城去處有寇如此邊隅之地更當若何若不早除誠爲腹心大患二卿職司樞密速宜遣將出師捕此惡僧斬爲萬段以消朕恨賜卿便宜行事不必奏請牛進謝舉謝恩而退回樞密院將妙相寺被焚及官軍殺傷情由備細行下文書各府州縣查檢深山僻嶺邊海沿湖如有賊寇潛藏本郡官員速宜申奏以便本院發兵征剿如本境官員有能剿捕賊寇擒獲解京者連升二級倘知而不奏縱賊養奸者拿問治罪這文書雪片也似行下各府州縣去卻說鍾離郡太守姓邵名從仁字德甫爲人慈祥清慎蒞任未及一月當日升堂理事接得樞密院文書看畢對承行書吏商議道目今建康妙相寺被寇放火殺人恣行劫掠不知何方盜賊如此強梁今樞密院行下文書來著各府州縣捱查申奏汝衆人可知本郡所轄各縣地方何處險峻幽僻可藏賊寇一一查報以便申奏內中一個老成書手稟道本府所管州縣一帶都是西北偏僻之境其中山嶺甚多嘯聚剪徑的不止一處只有定遠縣劍山極其險峻周圍百里山頂有一寺名彌勒寺內藏一夥強人尤爲兇險爲頭三個大王智勇兼全部下聚集千余亡命之徒專一打家劫舍白日搶擄本府與各州縣老爺屢次招軍剿捕不能取勝近日招軍買馬其勢愈大數日前人傳皇城被盜焚寺殺人沿路劫掠都諒著是這夥強寇今日詳樞密院發下的文書亦爲此事必是此盜無疑邵從仁道前官好無見識既有大寇橫行即當申委征剿何故懈玩縱盜爲虐養成賊勢今日不速征剿更待何時衆書吏稟道這一夥強盜不比別的小賊雖然劫掠梟勇中間多存仁義因此小民悅服官軍難捕邵從仁道胡講既爲劫盜無非是殺人放火劫奪不仁有何好處衆書吏道老爺不可輕看了此賊這寨主姓薛名志義生得虯髯黑臉兩臂有千斤之力人皆叫他做黑判官初上山爲盜時縱性殺人無所不爲近來不知怎地改過只取人財不害人命這遠近地方窮苦百姓反賚助些銀兩得以過活邵從仁笑道你等爲賊所愚這是他誘人之法窮苦百姓不得衣食的有些賚助都從這廝爲盜了書吏道不是順他爲盜老爺管下二州六縣地方風俗習頑恃強欺弱倚富淩貧豪貴之人暴戾者多屢爲不公不法之事欺壓小民及至興向告理反是貧民受苦這薛志義專一憐貧濟困剪戮豪強小民或被豪富所欺到他山寨中訴冤反贈銀兩或送米布不拘遠近親自帶領人馬將恃強爲惡之人登時殺戮放火燒屋擄劫一空良民善士毫無侵犯過路單身客商並不加害百兩之內一絲不取百兩之外十取二三英雄落難之士必贈盤纏故此遠近盡皆悅服本郡各縣老爺幾次差兵擒剿這些士兵捕卒見了他誰敢交戰望風而走因此官軍不能捕捉邵從仁聽罷發付衆人散去退入後堂寢食俱廢心下躊躇這一夥強寇所爲意不在小如此假仁借義除暴憐貧乃是收買民心之計目下朝遷專信釋教持齋看經不理國政四方盜賊蜂起干戈日興倘或旦夕爲亂百姓附之豈不我處先遭其害彼時玉石俱焚涇渭莫辨不如及早申明省院調遣名將起大隊人馬來方可除得此寇連晚修成文書差一個老成幹辦星夜進京樞密院申報當日牛進謝舉二仆射接得鍾離郡公文拆開看時道鍾離府知府邵從仁爲剿寇靖國安民事卑職所轄郡縣地界俱西北山僻之境盜賊易於潛匿目今朝廷專重釋教滑賊益多無事則結黨爲盜事發則削髮爲僧雖加嚴緝而緝捕人員眼見是盜不敢擒獲只礙皇上敬信之故也本府所屬定遠縣劍山彌勒寺中巨寇姓薛名志義綽號黑判官有萬夫之勇部下健卒嘍囉約有數千餘人橫行劫掠假仁借義買結民心度其所爲非止劫盜而已本郡官兵收捕屢爲所敗近奉明文妙相寺火焚殺戮僧衆一事非此大寇不敢如是橫行卑職夙夜乾乾偵查的確已行募集鄉兵操演訓練專候奏請天兵檢選大將並力剿除若更遲延切恐釀成大患伏乞照詳施行二仆射看畢謝舉道此賊巢穴離皇城頗遠來往亦須數日爲何一路並無攔阻警報任彼進退自如牛進笑道鍾離郡至京城路程雖遠然一路無人阻擋皆是這一班貪位無能鼠輩各保身家畏刀避劍故此賊得以毫無忌憚目今既有下落速宜征剿謝舉道我國自聖上創業以來又早二十餘年銷兵偃武人不知戰老成之將俱已凋謝目今將士雖多止可充數而已智勇足備者略無一二征討賊寇所任不得其人多至喪師辱國愚意奏過皇上大開教場聚集大小將士演試武藝壇上挂先鋒印一顆選弓馬熟嫻武藝出衆者爲先鋒領軍剿捕庶可奏凱大人尊意若何牛進道尊論甚善二仆射一面奏請聖旨一面出榜曉諭諸將約於正月二十七日聚集教場操演武藝如原在軍伍而不到者必以軍法從事至期黎明上自總戎都督下自部卒小軍齊入教場各各戎裝披挂皆依隊伍而立甚是嚴整專待謝牛二仆射到來少頃聽得炮聲響處前呼後擁謝舉牛進已到衆文武官員一齊打躬迎入演武廳上行禮罷同上將台左位謝舉右位牛進其餘官僚文東武西各依職位序坐衆多將士一字兒排列兩旁果然是弓上弦刀出鞘旗幟遮雲刀槍燦雪衆將躬身聽令三通鼓罷宣令官上將台跪請樞密老爺將令謝舉傳令教合營各衛軍士擺成五方陣勢宣令官執著令旗飛也似下將台上馬遍傳將令只見號旗麾動衆軍士隨著隊伍紛紛繞繞排下五方陣勢金鼓喧天演陣已畢牛進傳下將令道目今朝廷多事變故日生武備久荒將士不堪任用近日妙相寺被定遠劍山大寇焚劫一空本院奉聖旨發兵征剿今日操演將士擇日起兵奈無智勇之士爲前部先鋒特于諸將中挑選武藝拔萃者挂先鋒印統領三軍征討賊寇功成升賞出令罷教軍士在演武廳東首遠一百八十步地上插一長竿將先鋒印挂在竿頭演武廳西首也遠一百八十步地上插一長竿將一領細錦團花戰袍挂在竿上先射印後射袍有能兩箭射落袍印者即授先鋒之職軍士打點完備金鼓震天號聲未畢右隊門旗影裏閃出一員少年大將生得面如冠玉唇若塗朱眉清目秀狀貌魁梧身穿一領綠門紅錦戰袍頭戴一頂風翅金盔腰系袖花金帶腳穿花村戰靴騎著一匹白馬躍馬而出道小將無能試取此印不知這將官姓甚名誰正是主帥壇前施號令將軍馬上逞英雄畢竟這員將官奪得先鋒印否且聽下回分解第十六回奪先鋒諸將鬥勇定埋伏陳玉鏖兵詩曰旗幟鋪雲刀燦雪將軍陣上分優劣力堪舉鼎顯彪熊箭發穿楊馳駿鐵揮戈上逼星斗寒投鞭下使江流絕恃強不識有陰符錦袍應濺英雄血話說教場中演武一少年將官出馬衆軍視之卻是將門子弟姓夏名景官拜金吾衛驍騎將軍慣使長槍武藝精熟衆軍都道這將軍必奪先鋒夏景縱馬向演武廳東首來立定彎弓搭箭颼地一箭先鋒印早已墜下衆軍士一齊喝采鼓角齊鳴夏景霍地下馬取了先鋒印挂於帶上飛身上馬跑過演武廳西首來一眼覰著錦袍扳滿弓搭上箭口裏喝聲道著一箭射去性急了些兒射不著錦袍只聽得刺地一聲響亮卻中在竿上衆軍士也一齊喝采謝舉牛進在將臺上看的分明笑道好箭雖不中不遠矣問宣令官那射落先鋒印的是誰宣令官稟道是金吾衛驍騎將軍夏景其父夏振宗現在朝爲直殿將軍牛進笑道不枉了將門之子即傳令夏景雖射不下錦袍一箭也中竿上先鋒印已奪宜任此職言未畢只見左隊門旗影裏閃出一員大將身長九尺腰大十圍方臉闊額粗眉大眼相貌堂堂威風凜凜攘拳奮臂嚷道夏將軍可將先鋒印留下讓我來挂夏景道此印我已奪了二位樞密大人鈞令委我本職汝何敢來攙奪那將道適間樞密大人將令原說先射印後射袍印袍俱落方爲先鋒今你止射得印豈可便充此職你不見那長竿挂的錦袍還在竿上飄揚麽有詩爲證莫訝區區一錦袍先鋒陣上顯英豪弓弦響處隨聲落方信將軍武藝高衆人視之乃是鎮國將軍施大用原是遼東軍衛出身因剿苗寇有功官至三邊守備歷年守邊平靜升爲本職當日在教場中見夏景射了先鋒印卻射不下錦袍故來爭奪夏景道你雖說得有理且看你手段如何你就先射錦袍射得墜時就讓印與你射二者中式奉讓先鋒只是射不中時休怪笑話施大用喝道不必多言先鋒穩取我做將臺上二樞密見二將爭論忙傳令道諸將不許爭競但能射得袍印者即是先鋒夏景聞令不敢做聲立馬觀看施大用得令縱馬到演武廳西首帶住馬轡挽起袍袖左手彎弓右手搭箭一眼覰得分明對錦袍射一箭來只聽得弓弦響處錦袍隨箭而下衆軍士喝一聲采鼓角齊鳴施大用縱馬取袍披於身上夏景見施大用射卻錦袍只得把先鋒印交與宣令官依舊挂在竿上施大用道馬上放箭何以爲能且看我平地取之說罷下馬走過演武廳東首離長竿一百八十步拈起寶雕弓搭上狼牙箭對著長竿射去只見先鋒印滴溜溜跌落塵埃金鼓大震有詩爲證百步穿楊技果奇從今再見養由基弓開滿月流星墜奪取先鋒金印歸施大用放下弓拱手道慚愧只聽得一片聲喝采施大用取了先鋒印飛身上馬向將台上聲喏道謝樞密大人袍印夏景看了心下不忿大叫道先鋒印本是我挂了如何你攙越奪去好好將袍印來分了袍是你得印是我挂施大用道將令已出誰敢有違你爲何不學我將錦袍射落夏景怒道你偶爾得中乃分內之事何足爲奇你敢和我比試武藝麽施大用笑道就和你見個高低惟恐動手處有傷和氣耳夏景大怒於挺兵器欲戰施大用謝舉牛進見了忙傳將令禁止道今日操演將士揀選先鋒正要出軍剿賊不可自相爭鬥二虎相角必有一傷倘有疏虞於軍不利施大用袍印俱得准爲先鋒夏景武藝精通即令押後監管糧草待日後論功升賞施大用聽令即棄槍下馬夏景只是不服喊叫道印是小將先射落怎地反被後射的奪了去死也不服今日定要和施大用分個強弱爭嚷不已牛進怒道吾令已出誰敢執拗叫軍士捆下重責四十謝舉忙功道軍法團當如此只是壞了他父親夏君體面我有主意在此依前另取一件錦袍著夏景再射如射得袍墜再定先鋒射不中然後以軍法治之使他無怨傳下將令夏景聽說複射錦袍心下暗喜宣令官將一領戰袍系在竿上夏景也不上馬也離竿一百八十步站定不轉睛的看著錦袍抖擻精神看清射去錦袍隨箭墜地鼓角喧天軍士齊聲喝采夏景忙上將台聽令謝舉和牛進商議道此一節亦爲難處二人皆射中袍印定誰爲先鋒是好定了一人這一人未免不服豈不復起爭端牛進低頭想了一會笑道有處了傳下將令施驃騎夏驍騎二人箭法皆精武藝俱熟手段相等難以定奪先鋒戎事以勇力爲先今將台側首插帥旗的石墩重有千斤二人之中有能雙手舉起離地三尺者即挂先鋒印若再不遵仍前爭竟者定按軍法施大用夏景得令都各卸下盔甲錦袍摩拳擦掌賽勇鬥力夏景抄起襯衣奮勇先向前雙手來攝這石墩掙得滿面通紅掇起石墩離地尺餘力不能勝只得放下施大用見夏景舉不起石墩高聲道小將軍請開待我老施來舉大踏步向前將石墩仔細看了幾眼八字腳立定用盡平生之力雙手掇起石墩足有三尺余高上下將士齊聲喝采大用左右顧盼然後輕輕放下牛進對謝舉道這將的氣力恰也看得過了謝舉未及回答只見黃旗隊裏擁出一員壯士但見頭戴綠錦襪額紮巾身穿滾袖蜀錦戰襖腳登黑色戰靴腰系繡衣裹肚生得面如囗血身似金剛一部落腮胡兩隻銅鈴眼眉生殺氣目射金光虎一般擁出來大叫這石墩重不上千斤舉不過三尺何足爲勇也教衆人喝采待我舉與你看以奪先鋒將臺上牛進看見問這將官是誰現居何職宣令官下將台問了名姓上臺稟覆道這勇士姓樊名武瑞是國舅王騾騎將軍麾下聽用旗牌官牛進喝道無名下將輒敢來爭奪先鋒與我亂棒打出謝舉道用人之際何分貴賤看他勇力超群即當拔用牛進默然不語即傳令教樊旗牌試舉石墩看取勇力如何樊武瑞得了將令摳衣上前雙手將石墩輕輕掇起就如提瓦片相似離地五尺有餘自將台南首走過北首自北首又轉南首周圍反覆三次依舊輕輕放下面不改色氣不喘息滿場將士都看得呆了不知這勇士有多少氣力西江月詞爲證試看精神抖擻謾誇膂力豪雄將軍八面有威風提起山搖地動一似卞莊打虎猶如蒯聵誅龍子胥舉鼎振秦公武瑞英名堪共謝舉牛進大喜差宣令官叫樊武瑞上將台來樊武瑞隨宣令官到將臺上跪下謝舉笑道看你儀錶不俗果是勇力過人不減伍明輔舉鼎之威你平日精熟那一件武藝樊武瑞稟道小旗牌慣舞大刀兼能使飛叉百發百中牛進令取大刀飛叉與他試看能否樊武瑞叩頭講了飛身下將台跨馬提刀在教場中賣弄手段初時刀法尚緩後來精神抖擻前沖後搠左旋右盤就如花錦相似看的人都看得眼睛花了人人稱羨樊武瑞舞罷大刀又使飛叉舞了一回將叉往空中一擲約高三丈翻身接入手中滿場人盡皆喝采真實手段高強舞罷下馬聽令謝舉道樊武瑞武勇絕倫足稱萬人之敵賜金牌一面錦袍一領取印與他挂了定爲先鋒之職施大用夏景爲中軍左右羽翼各賜銀牌一面花紅金鼓迎回次後二樞密上轎回衙大小將士各自散訖不題次日早朝謝牛二樞密將所選之將面奏武帝擇定本月吉日出軍先遣先鋒樊武瑞領馬軍五千步軍一萬克期進發次後點牛進心腹之人左將軍陳玉同左右兩翼大將施大用夏景共領馬步軍兵三萬一同討賊當日起程但見旌旗招展繡的是神虎神龍彩幟飄礬畫的是飛熊飛豹震居甲乙重重疊疊翠攢青離屬丙丁焰焰烘烘紅簇繹乾臨壬癸騰騰黑霧鎖天涯兌守庚辛陣陣白雲升碧漢中央戊己高標著金纂杏黃旗繡祆親軍手執定皇封傳令劍前面擺千千隊畫戟鋼刀後面列萬萬行銅錘鐵斧亮錚錚漫天兵刃密匝匝遍地干戈鞍上將雄赳赳勇猛勝蚩尤步下兵氣昂昂英雄欺項羽壓倒韓侯臨趙地絕勝王翦出秦關牛進親自送別分付陳玉施大用等用心剿賊早獻捷書陳玉道不須恩相費心小將穩取破賊奏凱而回當下陳玉衆將等辭別牛樞密上馬領軍士取路徑渡大江陸續進發一路征旗蔽日殺氣漫空大刀闊斧殺奔鍾離郡來再說薛志義苗龍自從救了李秀放火燒了妙相寺殺死和尚回到山寨終日飲酒慶賀不覺十餘日一日正飲酒間薛志義提起殺鍾守淨一事苗龍道托二哥妙算把這些醃臢禿驢殺得盡絕也替林住持報了冤仇也泄了我弟兄們不平之氣但只是壞了許多官軍又殺他一員主將朝廷知道焉肯罷休必然發兵征剿儻一時官軍掩至我這裏若無防備難以抵敵須是整頓嘍囉準備廝殺薛志義掀髯笑道賢弟素稱量大今日何以自怯自古道水來土掩兵至將迎那廝被我們殺得片甲不回心膽皆碎誰敢再來縱有軍馬直教他一人一騎不得回鄉李秀道三弟之言大哥不可不聽皇都去處殺傷官軍在你我做皇帝也容不得豈肯幹休罷了大哥你看早晚必有大軍來也須要定計待他先入一著庶不臨期慌亂薛志義道既如此說二位賢弟有何良策苗龍道大哥一面操練嘍囉打點器械安排擂木炮石緊守山寨待小弟去東魏林住持那裏走一遭一則報說燒寺殺鍾和尚之事二則求請他來山寨裏幫助解圍大哥心下何如薛志義道若得林住持來甚好只怕他未必肯來徒勞往返李秀搖頭道不穩不穩那林住持若肯來時當初不苦苦要去了近來他得了異術神通廣大但求他的妙計或是法術兒傳來退敵助助軍威也好了苗龍道你說得是待我親去求他或來或不來臨機應變再作道理薛志義道若賢弟肯去明早就行苗龍道事不宜遲明早就動身次日苗龍吃了早飯換了一套衣服扮做客商模樣藏了銀兩禮物問了沈全路程辭別薛志義李秀下山取路往東魏地界來一路饑饗渴飲夜住曉行他原是飛檐走壁的人不愁關津難渡已過了梁魏交界關隘又行了數日早到石樓山下苗龍訪問林澹然住處遇一個土人道甚麽林澹然我這裏不省得但過此上南去一裏多路張太公莊上有一位遊方和尚德行清高莫非是他你去問看苗龍謝了拽開步徑尋到張太公莊上來走入柴門裏面靜悄悄並無一人苗龍在佛堂門首立了一會又不見人出來移步進佛廚邊咳嗽一聲廚後轉出一個黃胖道人問道是甚人在此苗龍拱手道這裏莫非是張太公莊上麽道人道正是公有何話說苗龍道貴莊裏有一位林長老可在麽小子特來拜望有煩轉達道人說林老爺雖然在莊只是今日有些薄事不暇接見足下另日來罷苗龍道小子不遠千里而來求見長老豈有不見空回之理煩乞引進道人道足下高姓既是遠來且在佛堂側首廂房裏暫坐待晚上替你通報苗龍謝道若得如此甚好在下姓苗建康人那道人開門領苗龍轉入佛堂東首廂房裏坐下道人進去不多時捧出一盞茶來苗龍吃了道人接盞依舊進去了苗龍獨自個坐了一會甚是寂寞暫且踱出廂房外來閑看轉灣抹角走入禪堂穿過西廊直出香積廚外見一個小小弄兒苗龍走進觀看踅出弄口只聽得隱隱喊殺之聲暗想道卻不作怪麽這莊子裏爲何有喊殺之聲來得蹺蹊擡頭一看只見弄側有牆門一座門兒緊緊閉著苗龍捱近在門縫裏張時驚得魂飛天外原來牆內有空地一大片約五六畝開闊中間一座土山上坐著林澹然身披火焰褊衫赤著一雙腳右手仗一口金鑲寶劍在那裏作法指麾五百余個壯士廝殺身穿紅綠二色全副披挂手執青白旗號各分隊伍奮勇鏖戰因此呐喊苗龍悄悄在門縫裏張望埋頭伏氣不敢轉動看了半晌只見林澹然將劍尖指著口裏喝道兩軍暫歇這些大漢各依號色分立兩邊林澹然又口中念念有詞喝道五雷真君律令敕倏忽之間衆軍士無影無形盡皆不見有詩爲證秘籙有威靈能藏百萬兵胸中多武庫試動鬼神驚苗龍暗想道這法術實是玄妙不要衝破了他抽身複進弄裏依原路走入廂房等候傍晚方見道人出來問道适才足下何處去了教我遍處尋你不見苗龍道方才我去閑玩故此失候殿主可曾通報麽道人道林老爺看經完了我已說知足下就隨我進來苗龍隨著道人同行道人先入廳裏稟道外面姓苗的遠方人特來訪老爺等候半日了現在門外林澹然知是苗龍教請進苗龍走進廳門便拜林澹然忙扶起道不須行禮苗龍立起來唱了諾稟道久別恩爺心常懸念今得一面足慰渴想敢問林大爺向來安樂麽林澹然道踐體粗安常感你弟兄們厚情每恨無由相見前承厚禮受之未答今日爲何得鬧到此苗龍道小人弟兄們久仰大恩未伸孝敬日前差沈全問安蒙賜華劄今有一事特來拜求兼有些須禮物奉獻聊表微意說罷打開包裹取出一個赤金缽盂來雙手捧上道別樣金銀寶物諒住持爺是不受的小人費了一片心尋得個巧匠打就這缽盂送恩爺早晚盛齋供佛伏乞笑留林澹然接了道貧僧本不該受難得你一片好心若不領時反拂了你的美意權且收下苗龍見林澹然受了不勝之喜林澹然令廚下辦酒飯相待自己陪著飲酒苗龍問道向蒙恩爺靈符救出李季文來今已在山寨中坐第二把交椅感激恩爺不盡這法術果然靈驗不知還有甚奇術使小人一見麽林澹然笑道這過街老鼠又來調慌了适才在牆外門縫裏張望的是誰卻假來問俺苗龍失驚道這等說恩爺已看見小人了林澹然道貧僧早已覰見是你故演完了這場戲法若是他人窺覰俺即收了不與他見矣苗龍道好妙法此是撒豆成兵之術林澹然笑道此乃小術何足爲異日前李秀若不是俺用那法兒救他怎到得你山寨裏來入夥如今山寨中興旺麽苗龍道感承住持大德敝寨甚是興旺錢糧頗有只是目下惹出一場大禍小人特來見恩爺求解救之策林澹然道老僧再三囑付待時而動爲何又惹甚大禍出來苗龍將放火燒妙相寺殺了鍾守淨及滿寺僧人沈全殺了黎賽玉趙尼姑又殺敗了官軍備細說了一遍林澹然大驚埋怨道你這一夥鹵漢忒也大膽皇都禁城內好去放火殺人的真是尋死之事怎地逃得出這龍潭虎窟苗龍道都是李季文定下計策離城鍾山風尾林蔣侯廟中埋伏嘍囉內外夾攻因此官軍大敗殺了他主將一員林澹然道鍾守淨這廝貪財好色謅佞小人自取其禍殺之不足爲過可憐這一寺僧人賢愚不等盡皆死於非命這冤孽如何解釋又殺死官軍若干朝廷必用大軍至了苗龍道山寨中兵卒雖精不過數千怎生樣敵得官軍保全得性命方好林澹然思了一會對苗龍道這山寨幽僻去處前後並無接應又無城廓可據大隊軍馬一到如泰山壓卵倘團團圍住放火燒山如何處置只絕了汲水之道也是死了如今沒甚麽妙計三十六著走爲上著你快回去教薛判官衆人收拾金銀財物燒毀寨柵打發嘍囉散夥汝弟兄三個快逃入東魏來再圖事業庶免此禍苗龍道小人來而複去往返路程遙遠倘官軍已至如之奈問林澹然道這也說得是待俺揲一蓍以占凶吉何如遂乃焚香點燭請聖通誠揲得高卦之九四爻看爻辭雲突如其來如焚如死如棄如象曰突如其來如無所容也林澹然大驚拍案道罷了罷了此大凶之象九四臣位也與六五君位相逼恃強淩主猝制君威是以陽迫陰剛而犯上非順德也過剛太激取禍必慘故焚而死死而棄何所容其身乎正應在下數日之中主衆人喪身殞命苗龍驚惶無措慌道此事恩爺怎地設個法兒解救得麽林澹然道大數已定雖諸葛複生不能救矣苗龍道既然如此待小人急急趕去探看消息何如林澹然道去亦遲了若去必遭其禍此數應在七八日之間決有資訊你只在梁魏交界地方緊要路口等候必有人到切不可過界口去若有人至即可同到俺莊裏來再作計議苗龍聽罷兩淚交流跌足痛哭林澹然勸道哭亦無用今夜且安宿一宵明早起程打聽消息苗龍只得收淚在廂房裏安歇那裏睡得著翻來覆去眼也不合巴不得雞鳴正是歡娛嫌夜短寂寞恨更長捱到五更起來梳洗道人已打點飯食停當伏侍苗龍吃了辭別林澹然出了莊門依舊取路而回不在話下再說薛志義李秀打發苗龍起身之後即在寨中親自操練嘍囉打點器械分付緊守四面隘口整頓迎敵官軍不數日之間探馬飛報朝廷發軍五萬漫山塞野殺奔前來薛志義也自預先準備即分撥嘍囉下山對敵卻說陳玉施大用等軍馬已到鍾離郡將軍屯紮城外分立五營太守邵從仁迎接入城到公廳相見設宴相待陳玉問道劍山乃本郡所轄地方既有大盜爲何不早驅除以致蔓延日久恣行殺害目今天威震怒欽差下官等前來剿戮郡守有何良策乞請見教邵太守道卑職無能濫叨厚祿臨任未久民情不能盡諸軍旅之事一無所知只是此盜假仁借義買結民心其志不小故卑職請天兵早行除剿幸得老大人列位將軍到來此賊合體必在指日奏凱矣陳玉道大軍初臨未知此盜虛實明日先著樊先鋒試探一陣然後用計破之邵太守道大人主見甚明正當如此調遣當夜席散送陳元帥等諸將出城回寨次日陳玉出令著樊武瑞先領馬軍五千步軍一萬進兵定遠直搗劍山賊寨樊武瑞得令催軍奮勇殺奔劍山來陳玉等大軍隨後進發伏路嘍囉早已報入大寨薛志義分付李秀謹守寨柵自領三千嘍囉全身披挂殺下嶺來兩邊排成陣勢射住陣腳樊武瑞立馬於門旗下只見對陣門旗開處鼓聲震天擁出一員賊將怎生打扮頭戴鑌鐵鳳翅盔身披鎖子連環甲騎一匹高頭烏錐劣馬拿一杆鐵柄蘸金大斧那將出陣大叫那一個討死的賊敢來挑戰樊武瑞驟馬當先大叫道吾乃陳元帥部下先鋒大將樊奉聖旨特來擒汝這夥小賊天兵到此不下馬納降更待何時薛志義大怒汝等無道百姓遭殃可惡你這班不思盡忠報國老爺正要興兵吊民伐罪今日卻自來送死快下馬免汝一斧樊武瑞大怒舞刀躍馬殺過陣來薛志義橫醮金斧迎敵兩個一來一往戰了三十餘合不分勝負樊武瑞暗暗喝采二將又鬥了數合樊武瑞虛砍一刀撥轉馬佯輸而走薛志義不舍趕入陣來樊武瑞看薛志義來得漸近背取飛叉照心窩一叉刺來薛志義早已看見側身躲過遂不再追回馬跑入本陣樊武瑞大喝潑賊走那裏去放馬趕來薛志又笑道我放你去罷了如何又來納命兩個又鬥四十合薛志義回馬便走樊武瑞趕來薛志義斜拖大斧拈弓搭箭看得清切射一箭來正中樊武瑞的馬頭那馬就回跑到門旗邊負疼前足跪倒將樊武瑞掀翻地上薛志義飛馬輪斧攔頭便砍卻得牙將奮死救了性命薛志義大殺一場施大用夏景左右兩校救軍到接應去了薛志義得勝收點嘍囉回寨李秀接著大喜設宴慶賀樊武瑞進入中軍請罪陳玉道據你武藝不在那賊之下爲何挫動銳氣樊武瑞道小將和那賊交戰也不見高下正追趕間不提防戰馬被他射倒故有此失明日再戰誓殺此賊以報今日之仇陳玉笑道勝敗兵家之常何足爲罪我向聞人說劍山大盜薛判官英雄無敵今日果然必須施計擒獲此人其餘小寇不足破矣發付樊武瑞回寨將息謹守營寨不可出戰待我設計破之衆將聽令各自回營按兵不動次日黎明薛志義領嘍囉下山挑戰陳玉傳令衆將士不可出營妄動者斬薛志義教嘍囉裸衣屏罵至日晏方回一連三比不見一軍出來薛志義心下疑惑和李秀商議李秀道大哥不可輕敵彼大軍到此按兵不動必有詭計況苗三弟往林住持去求計未見回音我和你深溝高壘謹守四面關隘待三弟回時另作良圖不可挑戰落他機阱薛志義笑道二弟說話太懦看彼先鋒不過如此其餘將士可知總有雄兵百萬吾何懼哉我只要殺得他一人一騎不回方遂吾願昔賢有詩歎曰兵驕必敗從來有將在謀而不在剛蓋世英雄何所恃試看項羽喪烏江薛志義不聽李秀之言次日平明又率嘍囉擂鼓呐喊殺下嶺來不見敵軍嘍囉依舊裸衣赤體千般辱駡巳時直至未末衆心已懈正欲回軍只聽得一派鼓聲振地官軍寨中旗幟皆起萬余軍士擁出一員大將乃左翼將軍施大用也大叫何等潑賊輒敢大膽罵戰薛志義定睛看時卻不是樊先鋒另換一將生得猛勇但見頭戴銷金獸口紮巾身穿團花綠錦戰袍外罩鐵葉龍鱗鎖子甲腰系钅及花柳葉黃金帶左脅下挂一張雀畫鐵胎弓繡袋內插數枝利鎰狼牙箭身騎慣戰棗騾馬手執純鋼丈八槍那將躍馬而出薛志義並不打話橫斧殺來兩員將戰至數合施大用架隔不住撥馬而走薛志義驟馬趕來約走裏余施大用回馬戰了幾合撥馬又走薛志義怕有埋伏不敢追趕正待抽馬轉身只聽得鼓角齊鳴夏景從東南上斜刺裏殺來手執方天畫戟縱馬喝道狂賊至此快下馬受縛薛志義大怒挺斧來迎兩個戰上三十余合夏景力怯虛刺一戟放馬往西而走薛志義殺得性起大喊一