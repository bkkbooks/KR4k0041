則個常言道婦人水性黎賽玉被鍾守淨纏了這一會又見他少年聰俊是個富貴有勢力的和尚不覺欲心也動按捺不住當下雙手亦抱住鍾守淨同到床上正欲脫衣解帶共枕歡娛黎賽玉猛然腹中絞痛起來一霎時唇青面紫手足皆冷鍾守淨驚惶無措抱住道我的奶奶這是甚麽緣故唬死我也佛爺保祐人命關天怎了怎了賽玉忍著痛推手道不妨這是我的舊病速將姜湯我吃守淨方才心定忙推開壁門奔入廚房取了姜湯複進閣中來賽玉呷了數口轉覺腹中作響一股氣從隔上卷至臍下疼痛不止鍾守淨攙扶摹撫不住的茶湯調理直至四更將盡方才疼定賽玉和衣靠在幾上弄得鍾守淨神疲力倦連珠箭的打呵欠也倚著桌兒睡去了頃刻間晨鐘聲響遍處雞鳴鍾守淨醒來摟定黎賽玉道我的娘這會兒玉體好些麽賽玉道好了鍾守淨歡喜雙手捧走賽玉臉兒在燈下細細看覰依舊如花似玉非複病時模樣摟過來親了數個嘴一手摸入懷中弄乳一手替解衣帶複求雲雨賽玉推辭道今日斷然不可守淨笑道晚上已蒙娘子慨允脫衣就寢因病發阻了高興今已無恙正好與小僧一樂爲何又言不可賽玉道我自幼愛吃冷物積成一病每月行經之期必先腹中絞痛然後經通凡經次不忌房事要成血淋況住持早晚佛前行動若穢汙了身體罪過不輕連我也難逃罪孽守淨笑道我們佛祖是大慈大悲的那裏管這等閒事此時鐘和尚欲火難禁興發如狂正是火燒眉毛且顧眼下一手將賽玉摟住一手持入褲裏賽玉慌忙推時也被他摸著那活兒守淨忽失聲道我的親親爲何這等著慌尿皆溺出來了賽玉笑道呆和尚你且將手看一看可是溺麽守淨伸出看時滿掌鮮血淋漓心下大駭道這是何故終不然原有血淋病症的賽玉道适才我與住持講過女人家經水每月通流一次人人如此你這只手只索罷了有一個月點不得香燭近不得佛像經典哩守淨一面取湯洗手一面將元宵夜間之夢講了一遍笑道我向來恨這個紅臉頭陀阻住了巫山雲雨大娘子今夜經通敗了一場高興只是我和尚福薄不得消受賽玉道佳期有日不必愁煩二人談講之間不覺天色已曙賽玉猛然省道昨早我出來赴會近晚長兒必來接我不見空回我丈夫怎不生疑倘問我時教我如何回答鍾守淨笑道娘子放心小僧和趙乾娘計較定妥方好放膽做事昨日傍晚長兒果來接你被我騙進後邊房裏將酒灌醉扛在床上將房門鎖了只怕這早晚還未醒哩你丈夫處晚上我使趙乾娘先去講了說大娘子和幾位女衆們在寺裏看鍾住持上壇放焰口老身和長兒在那裏陪伴直到明早方回你自去睡不消等候這事已預先調停定了娘子何必憂慮黎賽玉聽罷方才放心取鏡梳洗畢二人對膝而坐細談衷曲守淨道荷蒙娘子錯愛小僧感恩無地今日別去又不知佳期在於何日講罷潸然淚下賽玉道男子漢好沒見識既有長情但問趙媽媽求計便是俟個機會即可相見何必如此苦切鍾守淨流淚不止賽玉再三溫存安慰了一會忽聽得人叫開門賽玉已知是趙婆聲音令守淨開門趙婆走入來哈哈的笑道大娘子住持爺你兩個雙賀喜也鍾守淨道多謝乾娘作成黎賽玉不覺面皮通紅低著頭翻書不應趙婆道大娘子許大年紀還害羞哩這個何妨齋僧佈施倒有大功德的鍾守淨道乾娘休要取笑可吃些早飯麽趙婆道早飯不用了大娘子可作急回家免被傍人瞧破鍾守淨令行童拿鑰匙到後邊小房裏叫那長兒來講話行童開了門叫長兒時兀自齁齁酣睡不醒行童將手搖了幾搖長兒方才醒來一頭伸著腰口裏還道好酒好酒行童笑道好酒再吃一杯長兒起來睜眼看時吃了一驚我怎的吃醉了卻在這裏宿了一夜娘知道決要打哩呆瞪瞪立著行童道不要慌且隨我來鍾老爺喚你講話長兒跟著行童到小間裏來只見趙婆同娘鍾和尚三個坐在那裏長兒失驚問道娘怎地昨夜不回家去黎賽玉罵道蠢才你怎的貪這口黃湯吃得濫醉虧了住持爺著人扶你進房裏睡了這等長夜尚兀自不醒若不著人叫你時明日也睡得去哩昨日夜間鍾住持做焰口道場累趙媽媽在此陪伴一夜不然教我獨自黑魆魆怎地回去長兒立在側邊不敢做聲趙婆笑道大娘子罵他怎的我和你左右是念佛看道場耍子便等他睡睡何妨只索打點回去不消絮聒了講罷斜著眼看著長兒把眼一瞅即起身走出閣子外長兒會意即隨出門外來趙婆衣袖裏摸出個紙包兒遞與長兒輕輕的道鍾住持講你老實至誠日後有擡舉你處因見你衣裳襤褸與這三錢銀子做件襖子穿回家去大官人問時只隨著娘的口講便了長兒接了銀包口中不講心下思量道這鍾住持爲甚的昨日灌我醉了今日又有銀子與我必有緣故該不與娘有甚麽不伶俐的勾當麽且收他銀子再做道理答應道我理會得二人複身到閣子來桌上又擺下點心茶果因恐賽玉臉紅不敢用酒鍾守淨陪著趙婆黎賽玉同坐吃茶長兒也吃些點心黎賽玉即起身辭謝鍾守淨告回守淨欲留不敢留欲別不忍別一步步掩淚送出閣子門外黎賽玉亦有留戀之情因礙長兒在前勉強忍淚道請住持爺自便不勞送了鍾守淨怕人看破只得包著兩眼珠淚回步怏怏而別有詩爲證情投愛篤兩留連頃刻分離意黯然鬱結相思多少恨低頭含淚間無言黎賽玉同趙婆長兒徑出後門悄悄穿小巷而回卻值沈全坐在門首看見渾家回來進得門即問道昨日念佛怎的晚上不回直念到今日這時候才來少年女眷被人談論成何體面黎賽玉笑道昨晚道場圓滿正要回來女衆們都勸我道千難萬難出來一次夜間鍾法上放焰口超度衆生極有功德怎的不看看去因此在寺裏念了這一夜佛卻有甚事談論趙婆介面道談論他娘的鳥寺裏多少妙年女伴在那裏做會看道場偏你有人談論終不成我老身也在那裏打和尚大娘子不要理他我曉得你熬了這一夜精神困倦且去睡睡兒不要淘氣沈全聽罷呵呵大笑自走出街上閑耍去了黎賽玉送趙婆到門首自去房裏尋睡這趙婆別了賽玉複轉身取路又到妙相寺鍾守淨禪房裏來只見鍾守淨坐在禪椅上打瞌睡但見四體渾無力昏昏常似夢中面上失了神處處可爲臥榻腰酸腿軟低著頭微露眼睛骨痛筋麻開半口斜流津唾鼾聲不作原來睡思正濃兩手低垂無奈精神疲倦趙婆走近前悄悄道住持爺好睡也鍾守淨驚醒開眼看時卻是趙婆忙起身聲喏道言謝乾娘費心無息可報趙婆笑道老身此計果然百發百中住持爺怎地謝我鍾守淨道感承乾娘妙計小僧自當重謝但夜來好事將成誰料又成畫餅空費了乾娘一片心機趙婆道怎地講來沈娘子在你房中一夜不知受了多少摩弄和尚們手段老身平素知道的咦住持爺你好受用卻又來講鬼話了守淨道乾娘跟前小僧焉敢調謊昨晚乾娘去後小僧徑入閣中那些溫存風臉不必講得直至烏江自刎方得玉人回心將我抱住那一時小僧的魄靈不知飛在何處去了趙婆笑道妙呵後來怎地作樂守淨歎口氣道不要講起有何樂處剛剛上床誰期平地風波那人突然肚中作痛面青唇紫十分危迫小僧服事慌了一夜不得著枕直至天明方才平復意欲求歡那人講行甚麽經決意不允小僧無奈只得罷了你道晦鳥氣麽隨後乾娘已到小僧這會子覺賤體不快莫非舊病又發作了趙婆搖頭道不信不信貓兒見腥無有不吞我爲住持爺用盡了機神千難萬難勾搭得他到這裏怎麽就輕輕地放過了老身只要你事成不是那蒼蠅見血的饞眼謝與不謝出乎住持一點本心爲何將這隔靴撓癢的話來班門弄斧鍾守淨氣得滿面通紅道乾娘講這話教我有屈難伸委實和那人不曾沾身如一字虛謊小僧落拔舌地獄萬劫不得超生趙婆笑道阿彌陀佛何必立這樣香只是住持爺忒也軟弱你兩手又不是瘋癱的他的又不是鐵皮包著的爲何不曾到手我想那沈娘子是一個人尖兒他到此地步無可解救故假妝病發脫身而去咳咳正是鼇魚脫卻金鈎去擺尾搖頭再不來可惜這個好機會錯過了下次怎生能夠守淨聽了懊恨無及跳起身歎道罷罷罷留此性命何用對柱上一頭撞去趙婆兩手扯住勸道住持爺怎地這等性急啊呀頭皮也撞破了什麽要緊守淨道玉人已去後會難期恁的福薄不如死休趙婆道一宿姻緣皆是前生注定不可性急慢就是快适才老身自是取笑怎麽住持爺就認起真來俗言道由你奸似鬼吃了老娘洗腳水隨你賣殺乖也出不得我老娘手裏住持不必心焦鍾守淨回嗔作喜道若得乾娘如此小僧感恩不盡但那人乖覺不肯複上鈎來了如之奈何趙婆道不難雲裏千條路雲外路無數除了死法另有活法憑著我老身一張口管教他複上釣魚鈎只是一件住持爺惜不得破費方能好事回成守淨道錢財小僧盡有恁憑乾娘調度趙婆道可有甚麽首飾麽守淨道有有目今打得一枚金簪做就數件襖子要送與老母的乾娘要用任從拿去趙婆道我若自用就是起發你了我如何要這簪子自有用處守淨歡喜無限忙取簪子送與趙婆道感乾娘厚恩決不忘報趙婆指著金簪道這一件東西又是一個冰人了住持爺寬心安睡耳聽好消息講罷作別而去再說黎賽玉直睡至午後方起做著針指心裏暗想這鍾和尚溫柔布靦腆十分情愛便與他往來諒不負心自此以後眠思夢想只是念著鍾和尚隔了數日忽見趙婆來到賽玉迎進軒子裏坐下叫長兒廚下燒茶趙婆道大官兒何處去了賽玉道不過在外廂閑耍趙婆附耳道鍾住持念大娘子情意甚是感激浼老身特來作謝賽玉笑道謝媽媽作成幾乎露出醜來羞答答還講他怎的趙婆也笑道和尚房裏睡了一夜醜也醜不去了委實那夜怎地行事可與我講賽玉道小鍾畢竟對媽媽講來何必問我趙婆道不要提起那膿包一味的長籲短歎怨恨啼哭我那裏有氣力問他特來問你賽玉道那晚媽媽進去久了我正等得不耐煩忽見壁門裏小鍾鑽將出來將我摟住被我變起臉來一頓搶白抵死不從媽媽你道天下有這樣不要性命的呆和尚襪統中抽出一把利刀就欲自刎驚得我魂不附體將刀奪了他反把我抱住苦死胡纏此時無計可施幸得救星又到趙婆道敢是有人衝破了賽玉道不是人來卻是我的病來一時間經水大至幸得全璧而返趙婆笑道真人面前講假話如今鍾和尚還俗了習成一樣手藝做了染博士賽玉道爲何做了染博士趙婆道他不做染匠何故指手都是紅的引得賽玉嘻嘻大笑趙婆袖中取出簪兒送與賽玉道這根簪子樣範好麽大娘子是識貨的可值幾換賽玉看了道真是赤金樣式更好多分也要十倍之價趙婆道好眼睛估得不差大娘子用得著買了罷賽玉道阿彌陀佛那有家計買這般首飾除非將我身子去賣趙婆大笑起來道我自說要這是你心上人浼我送來的可收了戴在髻子上也顯他一團美情賽玉推辭不受趙婆道金扇梳子也都收了何必假惺惺大娘子以後倒不須恁的做作賽玉收了笑道鍾住持有甚麽話講趙婆道要知心腹事盡在不言中大娘子是個聰明的人何必細講賽玉道媽媽跟前焉敢賣乖他既有我情我豈無他意目今十九日是我外祖壽誕我打發蛇瘟去賀壽喜得路遠次日方回那夜可教小鍾來我家相會趙婆道娘子若肯如此一生受用不盡切莫失約誤事賽玉道一言既出豈有變更留住趙婆吃飯相別而去趙婆入寺將此話覆知鍾守淨守淨聽了抓耳撓頭喜得發瘋晝夜懸懸盼望佳期央趙婆探聽消息果然沈全被妻子攛掇十九日早上整備盒禮出城賀壽去了趙婆預先兩下照會定了當晚鍾守淨對行童來真講知此事分付如此伺候不可泄漏風聲日後有擡舉你處來真應諾至更盡守淨頭戴一頂紗巾身穿一領石青綺羅道袍悄悄出了後門徑到沈全家裏來輕輕將門彈了三下賽玉親自開門迎進兩個敘禮攜手同入軒子內坐定賽玉謝道蒙惠厚禮何以克當守淨道些須薄禮聊表寸心自從娘子相別自分後會無期何幸今宵燈下重逢恍惚還疑是夢賽玉道感住持不嫌醜陋過蒙鍺愛但恐恩情一時容易久處爲難向後不忘今日妾身死而無怨守淨雙膝跪下對燈立誓道燃燈佛祖護法韋駝爺爺作證弟子守淨若負了沈娘深思異日必死於刀劍水火之下賽玉扶起道奴自戲言兄何設此大誓只見長兒走出來對娘輕輕講了幾句賽玉就請守淨登樓二人對席促膝而坐賽玉露纖纖玉指舉起杯兒來將衫袖拂拭潔淨滿斟佳醞敬與守淨守淨接了放在桌上另取杯篩酒回敬賽玉賽玉接酒一飲而盡守淨停杯不飲賽玉道哥哥爲何不飲守淨道小弟自幼出家葷酒未曾破戒賽玉笑道葷且莫破這談酒便酌一杯何妨守淨堅辭不飲賽玉令長兒烹茶相款二人細談往事歡笑不勝賽玉自斟自酌吃了十數杯漸漸臉暈桃花分外風情可愛有詩爲證從來傾國最撩人故把妖顔攝魄魂醉後海棠輕帶雨無由采得一枝春黎賽玉酒已微醺欲心萌動顯出那妖嬈態度星眼含嬌酥胸半露起身剔燈就將身坐在守淨膝上右手摟定守淨頸子右手舉壺斟酒自先呷了半杯將剩酒奉與守淨道哥哥請此半杯以表奴家敬意此時鐘守淨神魂飄蕩張主不定再欲推託不覺唇已接杯被賽玉順手一傾咽的傾下咽喉去了賽玉又斟一杯相勸守淨道吃下酒去心裏如火燒一般這一杯不敢飲了多謝美情賽玉將酒自飲了半杯與守淨親嘴吐在守淨口中守淨接了酒聞得脂香不得不咽下去一連被賽玉口哺口的度了數杯兩個摟抱頑耍了一會守淨道小弟一時頭暈乞賢妹見憐可睡了罷賽玉道你且請先睡待我洗澡即來奉陪此時天色炎熱守淨卸了衣巾赤身臥於床上賽玉叫長兒提浴盆上樓傾了湯發付長兒廚房收拾去了賽玉浴罷掀開帳幔和守淨並頭而睡乘著酒興正欲倒鳳顛鸞不期鍾和尚初開酒戒勉強吃了幾杯酩酊大醉只見他沈沈睡去推搖不醒賽玉無奈唧唧噥噥罵了幾句沒福分的賊禿不知趣的和尚也漸覺酒意融融身子困倦將欲蒙曨睡去此時正是三更忽聽得街上喊叫有火失驚跳起來開眼一看滿室通紅原來是隔鄰王凹鼻家失火這凹鼻性極好酒醉後回來渾家已先睡了凹鼻失忘滅燈和衣睡倒樓下燈花落在草裏一時火起街坊上鼎沸起來賽玉急急推搖叫鍾住持間壁有火快快起來守淨含糊應了又複睡著賽玉十分著急顧不得私情恩愛將守淨左臂上著實咬下一口守淨負疼驚醒只見火光透壁守淨驚酥床上不能動身口裏還叫行童道人快來救火賽玉忙扯道活冤家這不是寺裏快走快走鍾守淨方才醒悟躍起身披衣逃命亂慌慌的滾下樓去開了大門一溜煙走了有詩爲證可怪鄰家不徙薪致令熒惑肆威神假饒避得茶毗禍滅卻燃燈拜世尊話說這王凹鼻家失火幸巡更軍車地方人等打進門去救滅了火將王凹鼻一索子鎖了送入本縣去了不題且說鍾和尚被火驚得心膽皆顫光著頭跑出沈全門外將道袍袖子速了光頭飛也似奔回寺來只恨爹娘少生了兩隻腳急忙忙推開後門奔將入去不提防黑影裏一個人劈頭撞將出來見了鍾和尚遮著頭臉不認得大聲喊叫有賊有賊將鍾守淨劈胸揪住鍾寺淨是個驚慌奔路的人喘吁吁氣做一團一時不能言語兩個扭做一塊滾倒地上當夜林澹然和合寺僧人因牆後有火都起來看視忽又聽得喊叫有賊點了火把一同搶出後園來卻是矮道人將鍾守淨捺倒在地衆皆失驚原來這道人姓古名瀆因他生得矮小衆人都叫他做秤砣爲人本分勤謹只是性子倔強當時因著火趕出後圍見了守淨錯認是賊扭結不放林長老喝開秤砣將鍾守淨攙起一個和尚揪了古瀆耳朵同進方丈細問其故鍾守淨扯謊道适才爲牆外有火親自開門去看不知甚麽物件吹入眼內眯了眼疼痛難禁故將袍袖掩面誰想這狗才撞出來不分皂白將我結扭做賊仔細思量實爲可惱衆僧嚷道這矮殺才無狀吊起來打他三五十杖細問他住持爺可是賊麽林澹然笑道不然黑夜之中那裏認得此爲失誤非是犯上饒他打但罰汲水一月罷了守淨自知心病乘機道林老爺講方便恕了他罷秤砣咕噥道古怪鍾老爺未嘗破戒爲何口裏噴出酒氣來實是蹊蹺衆僧聽得慌忙喝出門外簇擁守淨回房各自歇息鍾守淨歎息了半夜次早令來真接趙蜜嘴來備細告訴一番趙婆寬慰道好事多磨自古如此住持爺請寬心這一節事在我身上包你完就守淨道沒奈何再煩乾娘撮合重續姻緣早圖密約誓當銜結趙婆道且住我想昨夜光景寺僧豈不生疑再倉卒行事反爲不美今有一計在此住持依我決然圓就守淨道乾娘分付無有不從趙婆道五月十三是我先夫七旬生忌老身措辦香燭之資煩住持爺做些功德超度他就裏延接親鄰女衆們拜懺沈娘子也邀他來那時任憑住持爺做作豈不是一舉兩得守淨大悅笑道那日道場之費都是小僧包辦不要乾娘破一文錢只要期得定打點行事便了趙婆道如此多謝住持爺破費了老身臨期再來相會講罷相別自回再說黎賽玉那夜被人驚走了鍾守淨心下不樂見桌上放著紗巾拿起來扯得粉碎就在燈上燒毀了自此鬱鬱不樂舊病復發一連數日不起直至端陽方離臥榻起來梳洗整備酒肴角黍請趙蜜嘴同過佳節排遣悶懷趙婆進得門來即對賽玉丟了眼色賽玉會意夫妻二人一同坐下舉杯勸酒趙婆停杯道老身每來擾鬧未曾有一毫答禮欲屈大娘子捨下一敘奈蝸居陋室不敢仰攀今月十三日是亡夫七旬忌日委曲措置得數兩銀子送與鍾住持包做道場請十數個女道門拜懺欲屈大娘子素齋望乞同去甚好賽玉道媽媽見招本該相陪同往但少年婦女穿庵入寺甚爲不便故此不敢奉陪趙婆笑道這般說時我那乾十四三分不像人七分不像鬼講的話倒也中聽沈全道令郎講甚話來趙婆道我昨晚和他商議接大娘子寺中一住他阻我不要來接我問他爲何他道如今的人只有錦上添花誰肯冷竈中發火我們窮得這副嘴臉那個與你往來勸君休結高頭壁我若無錢也不親今大娘子不肯光顧果應其言賽玉道媽媽休如此講是罪我的話了怎當得起沈全笑道承媽媽相招你便去走一遭只是傍晚即回不可耽擱趙婆大喜道還是大官人有趣大娘子切莫推託賽玉見丈夫肯了連忙應允至晚趙婆作別而去兩下暗通關節定了至十三日沈全備辦兩個蔬食盒子令長兒挑了打發渾家同趙婆等進妙相寺來鍾守淨已在禪堂內鋪設齊整令本房心腹僧六衆誦經拜懺趙婆等同聲和佛拜懺照常齋供不必細講申牌時分道場將散黎賽玉忽然叫聲頭痛漸漸坐立不住起身作別先回趙婆假意款留煩惱道這怎麽好難得大娘子隨喜偏遇尊體有恙齋也不曾用得先去了另日作東補禮賽玉道長兒又不在此煩媽媽送我回去趙婆道我陪你從後門去也省得走幾步賽玉和衆尼作別扶著趙婆肩膊一步步捱出禪堂穿過側門從小路周折行至閣前鍾守淨笑臉相迎攜手同入趙婆言道這回穩取得荊州莫忘我黃忠老將少刻就來暖房賀喜講罷轉身出外去了二人笑吟吟將門兒掩上同入羅幃兩酬心願有西江月爲證守淨色中餓鬼黎娘歡喜冤家兩人不必自嗟呀從此彩鸞同跨一任翻雲覆雨何妨戀酒貪花胭脂韶粉染袈裟敗壞門風不怕當時鐘守淨黎賽玉兩人交合之際說不盡綢繆態度正謂乾柴逢烈火久旱遇甘霖這鍾守淨是未經女色的長老那黎賽玉是好風流的婦人直至力倦神疲方得雲收雨散二人整衣而起守淨道承親娘盛情得諧枕席之歡若得朝暮相親小僧雖死無恨賽玉道朝朝暮暮妾之深願但寺中僧衆繁雜鄰舍耳目切近倘頻相往來難保不露風聲或惹禍端悔恨無及此事還求趙媽媽另作良策方保久長歡樂守淨道親娘良言字字金玉說話未畢趙婆已到推開門催促道天色將暮大娘子作急行動我送你回家然後來化紙送聖賽玉別了守淨同趙婆踅出小弄悄地出後門回去了趙婆複入寺中候道場完畢陪女衆晚齋散訖數日後趙婆闖入鍾守淨禪房守淨款留趙婆提起日前許謝之言守淨道感承乾娘妙計小僧得遂此願已銘心刻骨不敢有忘只是還有一件片時之樂終不暢意乾娘沒奈何怎的再設一個計策兒使我兩人得長久歡樂那時並酬重禮趙婆笑道也罷你講將甚物講我講得開我自又有妙計鍾守淨即開箱取出一錠雪花白銀約有十餘兩雙手遞與趙婆道些少薄禮先送與乾娘買果子吃待計就之時再容後補趙婆見了這一錠銀子心花也是開的滿臉堆落笑來假推辭道老身自是取笑怎收得住持銀兩鍾守淨道乾娘不要推卻了只管收下但有妙計便見美情趙婆道住持爺如此講時只得收了就是這一段事情不必住持講得老身一向也思量在心裏圖個久長之計方見手段算起來卻也不難只有一樁兒礙手故此尚費躊躇鍾守淨道卻是甚事礙手小僧力量可辦亦是容易趙婆拍著手道容易容易略差些兒遮蔽若得這路通時可保百年歡會正是計就月中擒玉兔謀成海底捉金龍畢竟趙婆說出甚麽礙手的事來且聽下回分解第八回信婆唆沈全逃難全友誼澹然直言詩曰五戒之中色是矛愚僧何事喜綢繆情輕結髮生離別愛重沙門反作逑俊逸小童傳資訊真誠君子獻嘉猷姦淫不識良言好計密煙花暗結仇話說鍾和尚求趙尼姑設計趙婆道天臺須有路桃源可問津你要長久快樂有何難處這鍾守淨聽了喜不自勝雙手揉著光頭笑嘻嘻的道我的乾娘委實是甚麽路數博得這長久歡娛此計若成你便是我重生父母趙婆指著牆外道這沈全住宅正在住持爺牆外東首小巷裏我時常用心看來與你這禪房止隔著一重土牆與牆外這所空房子就是沈全家裏了若怎生買得這一所房子牆上開了個方便門兒就通得黎賽玉家任意可以往來朝歡暮樂有何阻礙只是這房子恐一時難入手故此狐疑鍾守淨道這房子卻是兀誰的我也忘了趙婆道若講起這個人住持爺也有些眉皺他是當朝皇上第一個寵臣侍禦王珙此人最是貪婪鄙嗇誰敢惹他鍾守淨道這房子是王侍禦自居的還是賃與人住趙婆道住持爺真是個不理閒事的人牆外這一所小小廳樓王侍禦怎地自住得向來租與人居因有鬼魅來住的便搬了去故此常是空的無人敢住鍾守淨笑道恁地時卻也容易小僧自有處置只有一說這沈全終日在家守著老婆又不出外縱然用計得了這房子怎地能彀與他長久歡娛趙婆道若說這沈全又好計較了他混名叫做蛇瘟只圖自在食用並無半點經營今正在不足之中老身用些嘴沫假意勸他生理他必回說無資本難以行營住持爺多少破幾兩銀子待我打發他出外經商那時要早要晚任從取樂有何不可有詩爲證紅粉多情郎有意暗中惟把蛇瘟忌堪嗟好色少機謀算來不若貪財計鍾守淨聽罷搖著頭喝采道乾娘你真有意思我枉自聰明半世到此處便擺撥不來乾娘在意者若得恁地全美乾娘送終之具都在小僧身上趙婆笑道如此饕餐住持爺了須看手段還錢告辭而去鍾守淨不出門在禪房中將息倏忽又過了數日看官你道天下有這般湊巧的事當日乃是六月朔日王傳禦爲夫人病痊親自乘轎責香燭至妙相寺還願先著于辦通報管門道人忙到裏面報說侍禦王爺來還香願請老爺迎接有帖在此守淨展開帖子看了心下暗喜忙整衣冠出迎敘禮邀入方丈待茶焚香點燭對佛懺悔酬願畢王侍禦送了禮物要行鍾守淨一片巧言苦死留住吃齋王珙見他意思殷勤只得到禪堂坐下鋪設齋席十分齊整二人吃齋閒談今古鍾守淨滿面春風一味足恭餡諛這王珙是個好趨承的見鍾守淨如此款待言語相投心中甚喜鍾守淨將手指著東廂道牆外那一所廳樓聞說是老大人貴産果然否王珙道果是學生薄業住持何以問及鍾守淨笑道有一異事小僧懷疑數日今喜駕臨故敢動問王珙問有何異事鍾守淨道貧僧於四月初八日釋迦如來聖誕設盂蘭盆大會夜半會散小僧禪定見一金甲神手持柬帖與小僧道本寺伽藍傳示爾六句偈語爾宜用心偈雲王公之宅鄰於垣牆內有冤魅潛生火殃預宜防避毋輕傳揚小僧看罷夢裏雙手扯住金甲神求他免禍金甲神道不必愴惶只看柬帖後面便是小僧急看後面時又有兩句道欲攘此難改爲佛堂小僧再欲問之被金甲神一推而覺心下憂疑著人問那牆外房子說是老大人貴産又是空的不知何故彼時就欲奉達不敢造次欲待不言猶慮禍及今得面晤斗膽奉達天幸天幸王珙聽罷心下半信半疑含糊答道陰陽之事不可不信若論伽藍顯聖此事亦須提防待學生從容再做道理鍾守淨道小僧多口莫罪又勸了數杯王珙起身告辭鍾守淨送出山門相揖而別看官聽說鍾守淨欲圖這房子一時編此大謊說有火殃豈知後來火燒妙相寺果應了這句讖語莫非前定不在話下且說王珙上轎回衙一路暗忖這和尚講的話不知是甚來歷且到家和夫人商議原來這侍禦夫人宋氏平生慈善酷敬佛道吃齋念佛看經佈施每勸丈夫行些好事是個好善的女人王珙回府下轎香火前燒了回頭香卸下冠帶夫人從後堂迎出來道相公如何在寺許久方回還願是何僧懺悔王珙道就是正住持鍾守淨懺悔還願畢留住吃齋閒話以此耽擱夫人道爲何又去擾他王珙笑道擾這和尚且不在話下卻有一事要和夫人議之夫人忙問有何事故王珙道這鍾守淨是個真誠的和尚見我去千萬之喜齋宴齊整善於講談說話間他猛然問及貼寺那一所房子爲何空的他講道四月初八夜夢伽藍令金甲神傳柬與守淨上有六句偈語道王公之宅鄰於垣牆內有冤魅潛生火殃預宜防避毋輕傳揚鍾守淨心驚求懇金甲神說不必慌張且看帖子背面又有兩句續道欲攘此難改爲佛堂我想起來有什麽冤鬼作禍若鍾守淨無此夢兆又何苦調謊我心半信半疑猶豫不決特與夫人商議未知虛實若何夫人道一向聞人傳講鍾守淨是有德行的長老莫講那仕府鄉宦敬重便是今上兀自把他如活佛一般供養他焉肯打誑語鬼神之事自古有之這房子不要說目今有祟無人敢住相公你不記未第之時住在此屋遇天陰雨或黑夜常聞啼哭之聲撒泥擲瓦每欲謫僧道驅遣只因乏錢蹉跎過了後來相公貴顯遷居卻就忘了驅遣一事今有這夢想必是那些鬼魅作祟至今未除但後面兩句改爲佛堂方免此災若改佛堂必須召僧看管焚香侍奉了安思與相公托上天福庇保護富貴産業盡多那在這所小屋不如將這房子舍與妙相寺供佛罷了可以免此火難又且我與你老景做一香火院常好去燒香念佛免得又召僧人看管不知相公意下何如王洪道夫人言之極當只一件白送與他太便宜他了我自有道理不題再說鍾守淨雖然講了這一片脫空大謊心裏也蹀躞不下未知事體成否何如次日午時時候正在佛殿上亂想胡猜遠見一人慢慢地擺入殿上來對守淨聲喏鍾守淨答禮道兄從何來那人道小人是王侍禦府中幹辦敝主差來見住持爺有事請教鍾守淨即邀於辦人側廳坐下於辦道家主王爺差小人來稟知特爲寺後牆外這所房子昨日住持爺說有甚夢兆鬼火之異家主與夫人計議欲奉與住持作個香火院特使小人來達知不知尊意若何鍾守淨聽罷笑逐顔開十分歡喜道承貴主王爺美意救了敝寺與前後人家此乃莫大陰騭福德無量小僧領命但不知房價幾何乞明示奉上於辦道原契價銀一百三十六兩修理在外這也說不起了鍾守淨即令道人整治酒肴款待著一個心腹徒弟陪坐自卻忙忙的到庫房裏秤兌房價銀子停當又取一錠白銀藏於袖內依舊鎖了庫門走至側廳道老都管寬坐甚是有慢幹辦道打攪住持爺實爲不當鍾守淨著行童斟酒陪著笑臉再三苦勸幹辦吃得酩酊大醉辭道小人實不能飲了只此告辭鍾守淨道都管且坐既不用酒不敢苦勸叫道人拿出天平來放在桌上袖裏取出銀子一封封當面兌明鍾守淨道煩老都管多拜上老爺深蒙厚情今照原價兌足紋銀一百三十六兩理合親奉到府但恕小僧有些賤恙煩足下收明送上並此回帖拜覆小僧另日竭誠踵府面謝又取出袖中那錠銀子連與幹辦道些須薄意奉都管以告慢簡之罪幹辦千歡萬喜收了作別而去回到府中見了王侍禦覆道鍾住持甚是歡喜待小人酒飯將屋價依原數奉上有回帖在此王珙接了銀子看了回帖笑道這鍾守淨不枉是一個能僧果是富足有餘做事幹截又問道還有甚麽講話幹辦道鍾住持多拜上爺另日還要面講王珙即取原契謝帖再差於辦往妙相寺中交與鍾和尚有詩爲證思探太樓春吞房計畫深古今多異事天亦助奸人鍾守淨和黎賽玉偷情之後日夜心裏憂思無計可圖長久卻得趙婆大開方便之門點醒了念頭用計賺了王侍禦這所屋子心中欣喜無限忙著道人去接趙婆來計較趙婆正在家思忖鍾和尚和黎賽玉這段事情緣何數日兩處不見一個人來正閑想間卻好道人來接隨同取路到寺進鍾守淨禪房相見趙婆密問日前所說房子曾深得些門路麽鍾守淨道正爲此事來接乾娘計議這房子貧僧略施小計王傳禦雙手送來原契已入我手明日就開牆門過去修整改爲佛堂好快樂也再要做些功德遮掩外人耳目這都是乾娘所賜但怎地得那沈全出去方好趙婆失驚道住持爺用甚計就賺得屋子這等快鍾寺淨將那還願吃齋假夢賺騙的計一一說了趙婆跌腳笑道天殺的活賊說我乖你更滑倒有這般手段如今既得了活路還愁些甚麽明早老身就去把言語激他包得沈全離家遠出鍾守淨道不瞞乾娘說小僧和這冤家一會之後半月有餘日夜牽挂寸腸欲斷寢食之間無一時不想他念他正謂一日如三秋乞乾娘作急遣他出門感恩不淺趙婆道不必叮囑老身自有道理吃罷茶就起身出寺也不回家取路徑到沈全家裏掀開竹簾咳嗽一聲驚動了這個前世冤家黎賽玉在軒子裏和沈全閑坐心裏正想著鍾和尚欲見無由忽聽得有人咳嗽認得是趙婆聲音慌忙出來看正是這撮合山兩個道了萬福各自心照趙婆道一向久違黎賽玉道親娘有甚見怪許久不到寒舍走走趙婆搗鬼道老身窮忙失望今有一緊急事情特來通報你大官人在家麽黎賽玉道在軒子裏閑坐乾娘有甚話講趙婆道須見大官人方可講知沈全聽得便出來唱喏同到軒子內坐下沈全便道媽媽要見小生有何急事趙婆故意張惶低聲道大官人你兀自睡在鼓裏哩目下禍事臨頭全然不曉沈全夫妻二人失驚問有甚禍事趙婆道午前老身到普照寺前余太守衙裏賣些珠王正和夫人講話只聽得太守在前廳發怒大嚷幾個丫環忙走入來稟道大相公被老爺著縣裏公人押去了老身驚問夫人歎氣道惶恐難言我與相公年過半百上有這一個不肖之子指望他成名顯達誰想不務讀書終日只好吃酒嫖賭老爺教誨不改半月前被一夥潑皮賺去賭錢賭得輸了暗將兒婦一雙金馴偷去賭又被這班棍徒局騙了去老爺知道故此發惱昨晚已縛起來打了數十我也勸不住招出幾個積賭光棍姓名一一錄寫明白今早具一紙呈子連這畜生送到縣裏要縣尹捉拿這班賭賊追贓究罪縣尹不敢監禁我畜生依舊送回講明早出牌提拿賭賊老爺發怒仍要押這畜生去我也沒法處置難以向前勸解這都是前世冤孽老身又開口問道這一班賭賊卻是兀誰敢來賺騙公子夫人道一夥共有十餘人爲頭六個第一名積賭姓都名盧插號叫做都酒鬼第二個叫做朱拐子次後張絆頭郝極鬼沈蛇瘟李小猴共六人說都是鄰近住的老爺俱要問他個大罪哩老身聽得沈蛇瘟三字吃了一驚含糊答應幾句生意都不做別了夫人急來報你你可作急計較不要臨渴掘井墜馬收繮沈全聽罷驚得目瞪口呆手足無措有詞爲證詞名長相思坐如癡立如癡何異雷驚孩子時心頭裹亂絲饑不知飽不知平地風波悔恨遲躊躕暗自思看官你道爲何趙婆說這席話這等圓穩能驚得沈全動原來這蛇瘟一向在賭博場中著腳和余公子素相交往每常贏他些財物回來用度平日間黎賽玉曾告訴與趙婆故生出這段枝節來唬他沈全驚得面如土色頓足道怎地好若送到官司受刑不起卻不是死黎賽玉心裏卻明白知是趙婆的詭計假意慌張道老親娘真有此事麽趙婆道呀這是老身親見的爲好特來通知無故哄你做甚黎賽玉掩面假哭道我一向勸你莫賭不聽好言致有今日此事怎了沈全道趙媽媽在此我若果得他的金鑰便吃官司也是甘心不知是那個橫死的忘人賺了去牽我吃屈官司若手裏有錢也不愁他如今雙手撲塵一文也沒倘若發下牢中監禁豈不活活餓死不如尋個自盡罷了趙婆道你夫妻二人不要慌趁今日縣裏公差未出不如作急爲計俗言說三十六著走爲上著及早逃出遠方避難自古罪人不孥大娘子是好計較的何必自尋死路沈全道縱要逃竄身邊缺少盤纏便去時又怕渾家獨自一人支援不來教我怎的丟得出門說罷兩淚交流黎賽玉也幫著假哭趙婆道你兩個這樣哭豈是哭得無事的連我也沒主意了老身蓄積數年藏得八九兩散碎銀子要防老景結果送終之物如今幸得賤體還健且暫借與你救急一來出去避這官司二來隨便做些生理出一出景且在外邊躲避半年三個月打聽得官司散了你再回來完聚未遲沈全納頭便拜道若如此多感乾娘扶持天幸避得過這場大禍必效犬馬只是渾家早晚間望乞照管周全則個趙婆道我念佛人慈悲爲本這都在我老人家身上不消挂意你今且在家裏隱身不可出門露影待我回去取了銀子就來趁今晚人不知鬼不覺早早趕出城外尋客店安歇了明早長行說罷抽身別了黎賽玉徑往妙相寺裏見鍾守淨說沈全被我如此如此哄動今晚就要動身出外老身慌忙趕來快取散碎銀子十兩拿去與他做盤纏出外快殺也有三五個月才得回家哩鍾守淨大喜忙忙的銀包裏撮了十數塊銀子也不用秤約莫十兩有餘遞與趙婆聲喏道千萬煩乾娘玉人面前替我申意好事只在目前了趙婆藏了銀子別了鍾守淨山寺到一僻靜去處將銀子練好的撮出一大塊約有二兩余藏過了止將八兩放在衣袖裏一口氣跑到沈全家來進門把門關了沈全忙問乾娘銀子拿得來否趙婆道在這裏了袖中取出一大包碎銀子遞與沈全道這是八兩紋銀你可收好利息由你不論路上小心在意不可造次老身告回你可作急離家遠去惟願官司消散財喜十倍而還沈全和黎賽玉拜謝不已趙婆作別開門而去沈全即打點包裹於糧將銀子藏頓已了天色將暮分付賽玉道你在家早晚謹慎缺長少短可問趙媽媽借貸些待我回來本利一總送還黎賽玉道這都不消記挂但願你早去早回省我朝夕懸望路上小心水陸保重講罷夫妻二人揮淚而別有詩爲證堪笑區區一沈全美妻不庇送人眠