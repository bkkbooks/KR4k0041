不知住持爺容納否林澹然道善哉善哉汝等肯悔前愆回頭是岸一念之悟便證菩提何所不容也苗龍胡小九沈全聽說滿心歡喜林澹然道今日湊巧是個吉日分付道人安排素食齋供天地諸佛又請一個剃頭待詔來林澹然教苗龍等三人跪於佛前宣揚懺悔摩頂受戒削髮已畢對佛取名苗龍法名知碩沈全法名性成胡小九法名性定三人拜罷諸佛轉身又拜林澹然爲師當日齋宴盡歡而散次日備辦祭禮設薛志義李秀神位望空遙祭苗知碩等痛哭一場自此已後苗知碩三人在張太公莊上出家隨著林澹然修持將這佛兒如掌上真珠一般看待正是寒暑代催晝夜相趲不覺又是三個年頭了有詞爲證鍾送黃昏雞報曉昏曉相催世事何時了萬慮千愁人自老春來依舊生芳草忙處人多閑處少閑處光陰幾個人知道獨上小樓雲杳杳天涯一點青山小這佛兒年已五歲極是聰明伶俐百般乖巧張太公父子常到莊上來探望閑耍向已備知佛兒和苗知碩等來歷敬重他們能仗義救主佛兒又生得容貌異常必大有福氣甚相愛惜每每饋送布帛錢米果品點心來撫養他忽值殘冬已過又遇新年張太公和大郎同到莊上來與林住持賀節相見禮畢林澹然留住張太公父子飲酒佛兒出來閑耍林澹然叫佛兒過來見了太公並大郎佛兒即過來唱喏張太公父子回禮笑道佛兒不要去頑要在此陪我吃杯酒佛兒就和太公一凳兒坐了太公問道佛兒新年卻是幾歲林澹然道交新年是五歲了太公合掌道阿彌陀佛日子這等過得快向年小兒幸遇老師救了性命就是那年冬底完親娶媳令狐氏感神天護祐至次年秋間生一小孫新正卻好也是五歲了正與這佛兒同慶南無佛南無觀世音菩薩林澹然道向日令郎恭喜添丁不覺又是數載正是只愁不養不愁不長令孫好麽貧僧未得一面太公道托賴老師福庇小孫亦頗聰敏且是生得面龐豐厚體態魁肥不似小兒懦弱林澹然道生此好令孫皆出長者積德所致太公稱謝又道今春老朽意欲延一師長在舍教小孫讀書如成館時佛兒可到捨下與小孫一同攻書飲膳之類寒家甚便林澹然道如此甚美惟恐攪擾不安太公笑道說那裏話既是相知何擾之有說罷吃齋而別閒話不題光陰荏苒又見青梅如豆桃李爭妍早是二月初旬有古詞爲證燕子呢喃景色乍長春晝睹園林萬花如繡海棠經雨胭脂透柳展官眉翠拂行人首向郊原踏青恣歌攜手醉醺醺尚尋芳酒牧童遙指孤村道杏花深處那裏人家有林澹然手扶藜杖莊前閑看花卉遠遠見一個童子走近莊來卻是張太公家僮林澹然問道大哥遠來有何話說家憧道太公拜上老爺目今家下請得一位門館先生特著小人傳簡來接佛官進城和小官同師學業林澹然道日前太公已曾說及此事果蒙見招煩你拜上太公待俺選擇人學吉辰送他來也留家憧吃些酒飯寫一回帖發付回城裏去了林澹然細查曆日二月十五是個開心入學吉辰選定此日備辦酒菜帖禮之類著道人挑了喚苗知碩送佛兒入城又囑付佛兒不可頑劣要聽先生訓導佛兒隨知碩來到張太公宅上太公迎接進去領佛兒拜了先生送上禮物留苗知碩宿了次日方回佛兒取名薛舉張太公孫子取名張善相兩個年紀雖然止有五歲卻喜天資穎悟聰敏過人讀書經國成誦言辭答對如流先生與太公說令孫和薛舉皆是非凡之器異日必當大貴太公暗喜將這薛舉看待如至親骨肉不覺又是半月忽一日薛舉思念林住持猛然啼哭起來定要回去探望張太公令一老仆送回城外莊上來二人攜手迤邐行出城門陡然陰雲四合驟雨傾盆老仆抱了薛舉閃入涼亭避雨亭側有一玄武閣閣前有一頭陀赤眼大鼻黑臉兜頤身披破袖胸挂戒刀耳墜金環足穿草屨盤膝坐於蒲團之上手擊木魚口裏誦著番經老仆問傍人道這師父在此打坐佈施些甚麽一人答道這頭陀是個番僧來此月餘了不化米糧齋供布帛金銀要化一位真施主衆人問他化甚麽真施主又笑而不答疑他是癡顛的人並無肯齋供他的雖然數日不食亦不勝饑卻也是一樁怪事二人正說間那頭陀誦經已畢忽擡頭見了薛舉猛然驚駭熟視一回歡喜道在這裏了即收拾木魚經袱藏於抽中立起身來對天呆看少頃雲開雨散現出一輪紅日老仆撩起衣服將薛舉背在肩上赤著腳乘濕而行隨後那頭陀也出了亭子跟著同走行至蕭侍中莊前老仆覺走得力乏放下薛舉街坡上坐了暫歇那頭陀忽然突至面前對臉上吹了一口氣老仆仆倒地上半晌方醒開眼看不見了薛舉心下驚慌四下叫喚尋覓杳無蹤迹只得複進城來見太公備言此事舉家驚愕太公同老仆連夜出城到莊上來見林澹然告訴薛舉被番僧攝去情由苗知碩沈性成胡性定三人張惶痛哭垂淚林澹然道不妨這番僧既有如此手段必是個法家等閒不肯害人性命明蚤俺親自尋訪決有下落寬慰太公等安寢次日黎明林澹然一行人同到玄武閣中詢問消息原來這閣內止有女尼師徒二人師名碧霞徒名自解碧霞貌美多能與鄰僧私通淫欲過度雙目失明朝夕悲啼嗟怨忽聞自解說閣前打坐頭陀生得奇異特設盛齋相待頭陀送藥點眼三日後兩目複明敬之如神當下師徒二人迎林澹然等入靜室獻茶澹然細問頭陀來歷碧霞道頭陀在此月余終日危坐誦經數日不食亦不饑醫目如神等閒不與人說話不知何故攝去小官林澹然道俺已諒這僧家是一異人但不知他在何處挂錫自解道昨傍晚時我點佛前琉璃聽得閣外二人私語說可到葉貴人香火院來莫非是他的安歇處張太公道有一個葉貴人香火院又叫著永齡庵離此西南上十數裏地名半畝塘便是但此院本來興旺近來出了妖怪白晝迷人因此僧衆散了屋宇僧房無人敢住林澹然道若如此說時可以推尋這頭陀畢竟是個妖怪無疑快去快去衆人別了二尼回莊令苗知碩胡性定兩個藏了短刀到半畝塘打探二人至院前日已流西但見四圍牆垣坍塌房屋歪斜山門緊閉十分寂寥苗知碩對胡性定道你往前進我從後人裏面相會看果有人否苗知碩抄路到院後來後門也是關上的一帶土牆甚高卻不甚壞損苗知碩用出那舊時手段跳入牆內一望茅草過人分開草莽而進便是廚房轉過天井將近方丈忽見裏邊隱隱燈光聽得有人言語苗知碩暗想這樣荒涼去處何人敢在此藏身悄悄捱近壁外張望只見薛舉和頭陀兩個席地而坐薛舉居上頭陀侍側一個黑臉行童手執酒壺站在邊傍那頭陀斟酒雙手高擎道主公請酒薛舉推開不飲頭陀笑道主公寬懷臣自錫蘭山國泛海南來尋覓真主共圖大業十載不能際遇豈料主公在於此地今日君臣相會莫大之喜臣等行囊已備明早隨主公渡海去也薛舉垂淚道我只要回莊去見林老爺誰和你去渡海苗知碩見了暗喜算計道不要衝破了他且去與林住持商議乘夜間來取人遲必行矣輕輕溜出牆外急至前門來塘口被物一絆過頭跌了一交爬起看時卻是胡性定橫睡在地苗知碩扶起問時胡性定搖頭道唬死我也幾乎與師兄不得相見适才我從牆缺裏踅入去行至金剛殿側突然跳出一隻錦毛大虎撲將過來我擠命急走躍出牆外幸那虎追至牆邊便回去了多分膽已驚破手足酥軟故睡在這裏等你苗知碩扶著同行把所見之事亦說一遍二人急急回莊見了林澹然備說前事林諸然道既如此事不宜遲冷衆人吃罷酒飯留太公主仆二人管莊點起十數個火把帶了槍棍刀杖弓箭原來澹然初進莊時已打下一條渾鐵禪杖防身當下一同取路往半畝塘來到時五更已盡林澹然手持鐵杖和胡性定守住前門苗知碩沈性成率領道人撞仆圍定後門將次黎明只聽得門環響處一個行童開出門來見了林澹然跌轉身跑入去了胡性定就欲趕入去林澹然止住不許進去只見裏面托地跳出一隻錦毛大虎來擺尾跑蹄徑撲林澹然澹然倒拖鐵杖望後跳退數步那虎卻撲了一個空複揚威大吼撲來澹然側身閃過便雙手直挺鐵杖向著虎口那虎又掀起兩爪一撲澹然乘勢舉鐵杖戳入虎口借力一捺那虎撲的便倒胡性定舉刀亂搠近前細看卻是一隻紙虎二人大笑林澹然持杖撩衣大踏步踏入院門高喊道何處妖僧輒敢白晝攝人快快送還看佛面饒汝殘生不然杖下無情死期頃刻一路喊將入去只見殿內閃出一個番僧生得十分勇猛有醜奴兒令詞爲證臉如鍋底眉如劍眼似銅鈴手似鋼針怪肉橫鋪處處筋耳帶金環頭捲髮醜賽幽魂猛賽天神叱吒風雷頃刻生那頭陀奔出甬道上來手舞兩口戒刀直取林澹然澹然見他來得凶不敢輕敵將鐵杖架定退出門外空闊平坦處方才交手二僧鬥上百餘合不分勝敗胡性定心驚又不敢助戰忽聞人聲喧嚷苗知碩等將行童綁縛了繞出前來那頭陀看見萬分惱怒奮力惡戰又鬥四五十合頭陀逞生平手段將兩把戒刀幌一幌擲起半空徑從林澹然頂門上劈將下來勢名二虎投崖林澹然見戒刀飛起忙搶向前一步斜挺禪杖接著戒刀咭叮噹皆打落塵埃勢名單龍攪海頭陀見刀砍不中急取流星錘飛擲過來林澹然用杖隔開滾將入去頭陀棄錘而走澹然飛步趕上頭陀奔至半商塘口踴身跳入塘中倏然不見隨後胡性定等拾了戒刀一同追來澹然說頭陀已跳入水中苗知碩道塘水甚淺這廝決無去處便要下水去捉澹然道這頭陀休小覰了他入水必然遠遁任彼自去且押了行童回轉永齡院來問行童討取薛舉行童道主公藏在方丈中籠子裏衆人齊入方丈打開竹籠果然薛舉在內薛舉見了澹然扯住衣袖啼哭澹然垂淚忙喚苗知碩抱了林澹然將行童拷問頭陀來曆行童供招道咱名馬哈篤師父麻囗刺原系西番錫蘭山國僧因見國王無道上下離心國中皆欲推尊咱師父爲主師父自言福薄難以承受又說本國氣數未絕不可妄舉親至中華覓一有大福者立爲國王以安百姓遊方數載未得真名昨見薛主公不勝歡喜故請至院中意欲渡海回國共舉大事不知沖犯太師法駕乞留草命澹然又問麻囗刺通何武藝精何法術馬哈篤道師父上通天文下知地理陰陽術學無所不精善能役鬼驅神呼風喚雨深明遁甲平地能飛戒刀兩口靜夜常鳴削鐵如泥又有連珠箭一枝並不空發遊遍九州未逢敵手澹然笑道今日俺是個敵手了令道人帶了行童同出院門取路回莊行有二裏之路猛聽喊聲如雷大叫道還我行童來喊聲未絕只聽得弓弦響林澹然急擡頭箭已飛到忙將禪杖撥去未及回射又複一箭來正中眉心澹然望後便倒右手已將箭接住麻囗刺見澹然跌倒放心趕來不提防林澹然暗扯弓弦一箭射去射中麻囗刺左耳穿入金環麻囗刺吃那一驚帶箭而走林澹然不趕一行人徑從官道而行約至十餘裏前阻一條闊溪過溪來就是張家莊了溪上有一根木橋林澹然正要上橋忽然陰風慘慘黑氣漫漫迷了去路耳中只聽得神嚎鬼哭大浪洶湧之聲衆人心慌林澹然大笑道衆人勿驚無事手仗寶劍口中念念有詞喝聲道疾一霎時雲開風息依然日色光明澹然率領衆人過了木橋回至莊前遠遠見莊門大開苗知碩抱著薛舉先入門裏轉過竹屏只見張太公和老仆皆背剪綁了吊在樹枝上張太公高聲叫快來救我林澹然看了大惱急向前解下太公苗知碩將老仆放了太公說适才莊外走入一個黑臉頭陀來把我二人吊在這裏那頭陀撫掌大笑見老師來了將身一閃不知何處去了澹然扶著太公道可惡這廝若還拿住也請他在樹枝上一耍正說話間禪堂裏閃出頭陀手持利劍喝道林和尚快來納命澹然撇了太公舞鐵杖攔頭打去頭陀杖寶劍砍來二僧惡戰良久頭陀劍法漸緩被澹然一杖破了劍法頭陀心慌收住寶劍踴身一跳躍起屋檐寂然不見澹然令道人閉上莊門將馬哈篤帶入後園關鎖同太公等進方丈酒飯張太公道天下有這樣怪人若不是禪師法力浩大怎麽是了林澹然備將賭鬥奪回薛舉一事與太公說知太公甚喜苗知碩道頭陀雖然敗去必要複來纏擾這番林爺施大法力開除這廝便了太公道老朽看這番僧亦有神通急切恐擒他不住林澹然笑道看此僧還能複來否來則必入俺圈套矣大家商議一回倏爾天色已晚令苗知碩等陪侍太公禪房安寢二道人停燈守護林澹然帶劍坐於佛堂之內秉燭誦經將及初更只見一隻紫燕從窗眼中撲將入來飛鳴數聲倏忽變成利劍二口初長不過一尺佛堂中旋舞漸漸長至丈餘二刀衝擊錚錚有聲疾如飛電閃爍生光只在澹然跟前盤繞澹然端坐不動看看逼近身來將次刺及咽喉澹然大喝一聲二刀鏗然墜地化成兩股青煙飛空而散澹然暗暗發笑猛地裏起一陣怪風佛堂門無故自開倏地一聲響見黑叢叢匾大一個蝙蝠飛將入內眼射金光口吐黑氣展開兩翅撲向前要傷澹然澹然暗念神咒伸開右手二指將燭焰剔將過去落在蝙蝠身上焰騰騰燒著毛羽蝙蝠便回身飛出門外林澹然仗劍追將出去蝙蝠撲落天井中現出原相卻是一領蓑衣被火燒毀半幅澹然複進佛堂依舊禪椅上盤膝坐了凝神靜養一時間禪椅咯咯地動將起來似有人擡的一般移下天井中又移進佛堂內往來數次搖得澹然坐不安穩幾乎跌下澹然由他自移只不采他忽然椅邊立著一個死屍披發赤身面色醜惡雙眼反上舌頭吐出數寸捱近澹然身邊澹然正欲拿他被那死屍一把抱住緊緊扣定不放又且腐爛臭氣難當此時澹然雖言不怕也覺心內有幾分悚惕連忙默誦靈咒喝聲值日神將何在忽有兩個黃巾力士手持燒紅鐵煉來擒死屍這死屍鬼叫一聲忽然不見澹然分付道有勞二位神將侍立吾側爲俺護法凡有邪魅來侵即便擒拿勿使近吾法座二力士應諾立於兩傍澹然正欲安心跌坐不覺連椅便倒椅後忽有一大深坑黑洞洞氣騰騰的澹然連椅陷於坑內虧了兩個力士將澹然提出黑坑頭臉都磕傷了澹然大怒命力士下坑捉怪力士正欲下坑倏然地裂複合澹然也無如奈何仗著劍念了一遍淨法界真言發付力士且去力士領法旨去了澹然凝神靜養一會早聽四野雞鳴於是垂目低眉返觀內照坐至天明令道人汲水烹茶邀太公等同坐禪堂內談說夜間變化之事衆皆驚懼又聞莊外人聲喊叫澹然急出莊來見幾個鄰舍哭啼啼道侵早有一醜臉頭陀一面行過村口口中喃喃的罵著林爺猛可裏將於一招不知何處來了幾隻大蟲當路哮吼我等不能行走乞林爺救命林澹然道不妨走進沸堂取紙畫符十余張密念真言付與鄰人將符去緊要路口貼了人家門前並轉彎處俱把石灰畫成大白圈子自然無事鄰人拜謝依此而行群虎果然不見至今有虎處都畫白圈是這個傳流故事林澹然送衆鄰出莊回轉方丈正要舉著吃飯忽聞臭氣逼人原來碗中飯粒變成大蛆澹然怒道叵耐這廝無狀被他吵惱一夜俺不與他計論罷了他反戲弄於俺正惱怒間猛然一陣心疼幾乎暈倒澹然定神正性急誦驅邪梵語方得疼定忙開書筐取出一個花紙做成的蝦蟆頭上四足俱畫了一道符將針釘於地上大笑道俺本不欲與這廝相鬥奈何屢犯於俺不得不報之耳於是赤胸裸身仗劍作法口中念念有詞將劍尖指著蝦蟆那紙蝦蟆忽然自動張太公苗知碩一班人正在那裏看澹然行法猛聽得大喊救命這頭陀從屋脊上骨碌碌滾將下來跌在天井中頭與四肢如有繩索縛縛的一般向上趨做一團高聲叫痛懇求饒恕澹然正色道汝從何處盜來邪術妄欲害人白日拐騙紙虎攔截五穀變蛆種種不善俺與你素無仇隙何忍盅毒相欺無端降禍若非俺正法自持險些兒命遭毒手爾且講這幻術是何人傳授初入旁門輒敢與俺賭鬥今已被困有何解脫之術任汝施展麻囗刺道咱家神通俱系天心正法乃護法韋馱尊者傳授遍遊四海未遇對頭今逢高手破了咱法命懸禪師之手乞看禪門共教之情大發慈悲寬恩赦宥林澹然笑道這廝又來胡講那韋馱佛是釋門護法顯聖正教辟邪尊者豈有傳法於汝妖僧之理這不是打誑語了麻囗刺道咱家西番並無誑語禪師如不信時可放咱禮請尊者即刻現身林澹然道汝果能請得尊者金身下降即便與汝拜爲兄弟張太公阻道老師不可輕信其言彼是脫身之計若放他時又要作怪澹然道不妨任彼騰那變化出不得俺手裏便拔起蝦蟆之針口中念瞭解咒麻囗刺依然好了立起身來對澹然稽首澹然答禮麻囗刺整衣肅容叩齒念咒踏罡步鬥觀想凝神倏忽之間數道金光從西而至半空中彩雲之上現出韋馱尊者法像有西江月爲證鳳翅金盔耀日連環鎖甲飛光手中鐵杵利如鋼面似觀音模樣腳下戰靴抹綠渾身繡帶飄揚佛前護法大神王魔怪聞之膽喪林澹然見了尊者金身欣喜無限率領太公等焚香頂禮麻囗刺亦俯伏于地齊聲念佛半晌後漸漸彩雲散去韋馱不見林澹然邀麻囗刺同入禪堂對佛立誓拜爲兄弟忙整素齋款待放出行童同坐吃齋二僧各訴衷曲互相敬服澹然又問永齡庵內向有妖怪迷人賢弟可曾見否麻囗刺道有一小怪弟已除之張太公問是何怪物麻囗刺道咱初入庵夜間打坐忽聽小徒馬哈篤叫喊急出瞧之見一黃鼠嘴尖耳大其形若豕遍體黃毛光亮追逐小徒幸小徒有些膂力拿一條木棍與他廝鬥被咱一劍斬之小徒剝其皮剔其骨炙其五臟烹其肉其味似飴其色如玉飽食一月便宜了哈篤衆人撫掌大笑方知是老鼠作怪當晚留住麻囗刺莊內宿了次蚤麻囗刺作別林澹然捧出戒刀還了勸化道俺等皈依三寶但宜謹持道法以作梯航豈可恃此妄行輕慢衣缽況爭王圖霸非俺僧家之事一有差跌難免輪回賢弟速宜灰卻雄心滌除舊染逍遙西土無滅無生也不枉出家人證果麻囗刺感悟稽首道承禪師良言敢不佩服自此打破迷關永不受惡纏矣林澹然送出莊門麻囗刺師徒二人飄然去了後來麻囗刺隱居西番山島中修道將法術武藝盡傳與俠士徐洪客扶助張仲堅裏應外合奪了扶余國做了國主數年之後張仲堅複舉大兵助徐洪客殺入錫蘭山國逐出國王自立爲主此是後事別有傳記不題且說張太公主仆別了林澹然入城去了這近莊鄰人個個讚歎林澹然法力無邊自此遠近傳揚名馳四海有詩爲證大道從來不可貪貪嗔正亦入邪關慈悲卻乃真威武蕩滌魔心上法船林澹然自此無事一日見天色晴和春光明媚備辦了酒果素食令道人提壺挈盒和苗知碩帶了薛舉一同出城北踏青遊玩但見士女往來紛紛不絕正是香塵逐車馬美酒醉笙歌有詞爲證郊原春透花壓垂堤柳滿目繁華如舊正是清明時候轟轟寶馬雕輪紛紛翠袖紅裙一樣尋芳拾翠何妨僧俗同倫三人閑玩沿溪信步而行同進一座花園內石凳上坐了舉目觀看端的好景致也但見新篁池閣花霧樓臺幾多曲徑護幽欄數處小橋通活水假山高聳下面有石洞玲瓏亭榭精奇中列著翠屏寶玩色鋪錦繡生香不斷樹交花韻奏笙簧樂意相關禽對語轉過了桃花徑杏花塢梅花莊李花弄方走到雕簷鬥角百花亭穿過這牡丹台芍藥欄薔薇屏茶囗架才顯出淨幾明窗千佛閣雙雙白鶴長鳴兩兩鴛鴦交頸荷花池內魚翻玉尺戲清波來鳳軒前鸚吐人言稱佛號爛柯嶺囗囗寂靜春宴堂金碧交輝陰陰古木欲參天灼灼嬌花齊向日果然在在堪歌舞正是人人可舉觴林澹然等三人坐于石凳之上門首忽見一人頭戴逍遙巾身穿豸補鶴氅隨著十餘個家憧牽著一匹白馬吆吆喝喝走入花園裏來衆人見了盡皆回避林澹然心裏已省得是個舊相識了只是不動身看他怎的正是一葉浮萍歸大海人生何處不相逢不知這人是老林甚麽相識且聽下回分解第十八回梁武帝愎諫納降虞天敏感妻死節詩曰忠言逆耳拂君機暗裏藏奸國祥移納土降書初上獻漁陽鼙鼓即相欺旌旗蔽野飛禽絕殺氣橫空煙樹迷抗守孤城弓矢竭虞公大節感賢妻話說林澹然北郊遊玩偶於花園內遇一故人對苗知碩道這人來得蹺蹊俺們偏坐著不動看他如何施展知碩道弟子也看這人不得林澹然故意眼觀他處只不動身那漢走近石凳邊見林澹然等三人端坐不動發怒道官長至此誰不回避汝兩個醃臢禿驢恁般大膽兀自坐著不動林澹然道你這官人好生多事俺們出家人雲遊至此花園一樂與汝有何干涉要回避你甚不知趣那漢愈惱喝家憧打這禿廝你還敢光著一雙賊眼看我決是不良之輩挖出他這一雙眼珠家憧正要動手林澹然笑道且住有話講俺出家人遨遊四海那一個英雄豪傑貴戚朝紳不欽敬俺來誰似你這廝油嘴花子反來呼喝人那漢大怒喝教跟隨人與我痛打這禿賊一頓鎖了去家憧向前來打被林澹然雙手架住一個趕入來的澹然飛起右腳踢中肩窩倒在地上又一個撞近身來澹然將左手一點翻觸鬥又跌倒了其餘人役不敢向前那漢親自動手伸拳攘臂趕近前來提拳便打苗知碩見了正要放對林澹然呵呵大笑道侯大哥不須如此你記得當初在太原高丞相府中相聚時麽那漢聽了即忙住手將林澹然仔細再看拍手道足下莫非是林參爺麽林澹然道小僧便是大哥久違顔范了那漢不是別人乃高歡部下一員大將姓侯名景自幼習文屢因不第棄文就武投于高歡麾下爲謀士最是貪婪凶暴詭譎多謀習學得一身好武藝屢立功勳高歡用他爲帳前管糧大使奮威將軍因思林澹然英勇出衆每每虛心交結林澹然見侯景心術不端惟是面交而已侯景自從林澹然避難離魏之後用錢賄賂朝中臣宰不數年升爲尚書左仆射南道行台總督大將軍與高歡品職上差一級甚有權勢以前高歡在朝時侯景畏其材智不敢妄行當時高歡已死無人制禦縱意橫行位兼將相勢傾朝野高澄襲父之職名行素虧又且短於材略欺侯景是他父親部下出身屢屢侮慢侯景侯景又恃官高爵大不以高澄爲意因此有隙兩下結怨不願同朝侯景賄囑近臣蔣旌在魏主面前贊襄奉旨差往河南鎮守掌握兵權以觀內變當日便道赴任卻遇清明令節乃穩住人馬獨與家憧輩郊外尋春取樂偶至花園遇著林澹然此時候景炎炎之勢把誰人放在心上況酒後糊塗林澹然又做了僧家將言語激惱著他怎生認得因澹然說出舊交方省得是林時茂不勝之喜笑道林大哥許久不會竟不相認了別後心常感念今得相會實出偶然向聞大哥雲遊梁國何幸又得在此林澹然道一言難盡從容細訴衷曲久仰足下執掌兵權名重東魏今日爲何閒暇到此遊玩侯景道小弟之事亦容細剖大哥如今寶刹在於何處林澹然道貧僧不居寺院亦非庵廟暫棲止在本縣城南張太公莊上因見景物撩人故往郊外踏青遣興幸會吾兄侯景道既然大哥寓處不遠小弟畢竟要到貴莊奉謁林澹然不好推辭答道尊駕枉顧蓬蓽生輝二人攜手而行同到莊上來後面知碩佛兒家憧等衆牽馬隨入莊裏林澹然侯景重復敘禮辦齋款待侯景問及林澹然到梁朝出家事林澹然將妙相寺爲副住持因鍾守淨貪淫忤諫反生讒害逃難至張太公莊上情由細說一遍侯景歎息不已林澹然問道目今高丞相辭世公子高澄比乃尊德政何如侯景搖頭道大哥不要提起高澄那廝說起來令人切齒他那已往的姦淫惡迹大哥盡知自從高丞相捐館之後無人拘束縱意妄行把父親向日趕逐去的無賴棍徒依舊招集部下放僻邪侈無所不爲有一個奸險膳奴姓蘭名京原是衡州刺史蘭起之子高澄待爲心腹生殺于奪之權皆出其手其弟高洋屢屢勸諫不聽目今招軍買馬積草屯糧其意要篡魏以圖大業只畏小弟一人不敢輕發況兼宰輔台諫各爲身謀朝廷大事悉委高澄見弟掌兵心懷妒忌暗暗勸主上削去小弟兵權小弟諒來終須有禍故此暗用賄賂謀差出外鎮守河南離卻此人以圖後舉高澄這廝度量淺狹我雖出鎮外延料他不久必然生情害我小弟渴欲請教不知大哥蹤迹何在今日偶爾相逢實乃天賜其便今者梁武帝朝政何如臣宰才能比東魏何如林澹然道梁魏之政兄弟也當時武帝初登大寶勵精圖治恩威兼著朝中文武各展其材甚有可觀自天監已來皈依釋教長齋斷葷布衣蔬食刑法太寬文臣武將俱從佛教小人日親君子日遠四方變故漸生據險爲亂者難以屈指況兼歲歉國虛民不聊生梁國不日爲他人所有矣侯景聽了拍手大笑不止林澹然心裏暗想梁朝無道此人鼓掌而笑決非好意就問道足下聞武帝政亂而喜何也侯景四顧無人低言道小弟有一樁大事存心久矣因無機會不敢妄行今聞大哥談及梁主酷信佛教變亂日生諒此事只在反掌間故不覺喜形於色弟之出鎮河南本欲據地叛東魏以歸梁國只慮武帝拒而不納故一向猶豫今聞梁主可以蒙蔽正合我進身之機會我魏主寵用高澄不日必有內禍小弟別兄而去即差使獻土降梁以圖大事事成之後發兵滅魏剿除高澄然後迎請大哥同享富貴豈不美哉林澹然道足下此計雖妙只是背主降仇非大丈夫之所爲也既與高澄不和不若棄職歸山守田園之樂恰養天年清名垂於不朽何必驅馳名利之場以爲不忠不孝之人也侯景道大哥不知當今之世顧不得名節說不起忠孝桓溫道得好大丈夫不能流芳百世亦當遺臭萬年若是膠柱鼓瑟眼見得家破身亡林澹然暗想這人平素奸巧勸之無益就隨口道足下才猷素著德譽日隆況能駕馭群雄保安黎庶何慮大事不就但俺與兄間別多年今幸一會只且開懷暢飲重聚舊情不可言及世務以混高興侯景笑道大哥見教甚妙且盡今宵之樂另日求教二人說罷稱觥舉爵吃得酩酊當夜就留侯景在莊宿了次日侯景吃了早膳辭別林澹然之任早已車馬駢集澹然送出應外侯景附耳道小弟昨晚所言之事只可你知我知切莫輕泄於外林澹然點頭道不必叮囑後會有期再得請教二人分袂而別侯景跨上雕鞍帶領人衆往河南蒞任整理軍務撫巡地方甫及數月忽探馬飛報朝廷有旨到來天使已臨驛館侯景忙排香案迎接大使開讀聖旨侯景聽讀到念卿汗馬之功更兼才堪鼎鼎豈可出鎮邊隅旨意到日馳驛回京同理朝政大事心下已知是高澄之計暗想我未蒞任之先預料有此宣召今果然矣謝恩畢整備筵席管待天使飲宴之間侯景問道皇上差下官出鎮河南南及數月爲何又宣下官回朝這是大臣薦舉還是皇上聖意天使道是高丞相推舉老大人回朝同理國政故特旨而來老大人急整行鞭趨朝面聖侯景道邊關要害不比尋常去處軍糧未散且無鎮撫代職之臣待下官調停了此兩樁即便回京天使道君命召不俟駕而行老大人就行才是侯景高聲道將在外君命有所不受這裏是邊關緊要去處不時敵人侵擾若委託不得其人必誤朝廷大事豈可造次去得天使先回下官在各衙門考選有才能者權掌本鎮即便趨朝使臣不敢再言告辭去了侯景心下不安請心腹謀士丁和商議這丁和是一個辯士極有膽量亦通武藝在侯景帳下爲參謀官向前見了道主公喚小官有何使令侯景道我有一件大事不決和汝商議目今朝廷重用高澄遣我出鎮邊地未經數月仍複召回此是高澄那廝定計害我了若口京有凶無吉若不回又逆了君命這事何以區處丁和道先發者制人後發者制於人既是高爺要害主公不如先下手爲強明日即矯詔稱說高澄有篡位之心發本省軍馬殺奔京城先除高澄後滅魏帝主公身登大寶小官執掌兵權誰敢抗拒豈非一舉兩得之計侯景道舉兵圖業亦是一計但魏朝人物還多兵糧尚廣只恐擁一鎮之兵以敵通國之衆猶如以卵擊石豈能萬全此計不妙再尋萬全之計方好丁和道主公之言甚當小官另有一計除非是據守本境遣一辯士到梁國獻土納降梁武帝決然重用主公那時從容定計待時而舉有何不可侯景大笑道參謀此計甚合吾機事不宜遲明日即煩卿齎降表輿圖往梁朝納降以避此禍次早寫下降書收拾金珠寶貝並地圖交與丁和取路到梁國來把關將認得是侯總督部下將官丁和不敢攔阻過了關隘梁國守關將問了來歷亦不阻擋一路無話直至京師丁和一路打聽得武帝寵用的心腹大臣卻是大司農朱異司空張綰二人當權朝廷聽信丁和藏了金珠等物先闖入朱異府裏來見朱異朱異問其來意丁和道敝主是東魏總督大將軍候景久仰老大人盛德欲見無由今因與本國高澄不睦特差小官獻上河南十三州地境歸降大國猶慮聖主不容先差小官懇乞老大人鼎贊玉成其事必效犬馬之報無甚孝順有些須薄禮獻上望乞笑納即奉上金珠禮物朱異見了大喜道你主將既有美意歸順大梁此是背暗投明知機之士明日早朝待我先奏聖上引你朝見丁和叩頭而退又將了金珠到張綰府中來同前一般獻了說侯景納降一事張綰也大喜收了發付丁和早朝伺候丁和次日五更齎了金珠寶物降表地理圖到閣子門外等候朱異張綰會見先議定了少頃武帝臨朝衆文武朝見已畢朱異執簡當胸俯伏金階啓奏道東魏鎮守河南尚書左仆射南道行台總督大將軍候景差使臣一員獻土投降未得聖旨不敢擅便以臣愚意鄰國之臣納土來歸乃我朝一統之機也伏乞聖鑒武帝令宣和入朝至殿前山呼舞蹈俯伏階下武帝道卿是何官侯總督何故叛魏來降未審真僞難以准信丁和奏道臣姓丁名和職居侯總督部下參謀主將因見魏主昏蔽聽信丞相高澄讒言屢屢殺戮大臣主將慮禍及身故有此舉竊計良臣擇主而事方今大梁皇帝聖武仁慈德過堯舜不歸何待專遣微臣敬獻河南十三州地上以爲進身之階伏乞聖仁容納武帝道卿且暫退待朕商議丁和謝恩而出武帝與衆臣道今東魏侯景獻土來降朕意得景則塞北可清窘宇可平此機會亦爲難再卿等以爲何如尚書左仆射謝舉出班奏道近歲以來與魏連和兵甲不興邊境無事若納叛臣又生釁端非國家所宜也言未畢大司農朱異上前奏道皇上聖明禦宇南北歸心今若拒而不納後來賢路閉塞裹足不入梁矣今天下無不賓服止有東魏跋扈不臣彼國材兼文武者惟有高歡侯景二人幸高歡已死侯景來降魏國虛無人矣得景則彼國虛實我盡知之乘隙加兵東魏之地反掌可得此正一統天下的大機括豈可不納侯景之降司徒蕭介連聲道不可不可武帝道卿主意若何蕭介奏道臣素聞侯景爲人不忠不孝奸佞讒謅雖有微才受高歡大恩而致重位高歡初喪墳土未幹即懷叛心假鎮關西宇文泰不容故複投身於我此等奸佞之徒不可使之人國收用必生後患武帝道也見得是正欲聽信不受降表又見左班中一員大臣踴躍而出衆人視之卻是司空張綰近前奏道聖主馭世惟以收攬人材爲先久聞侯景才優學富智勇足備東魏如重用之非我國家之利也邊境豈得安寧今幸彼君臣不和上下猜忌侯景來降天假其便此是至難得之機會古雲天與不取反受其咎能臣輸赤來歸天下可指日一統若不收其降表不受其土地彼必轉而投獻於他國土地非我有能臣爲彼用生起釁端我國焉得太平失算甚矣陛下受其降表任之大爵景必盡心竭力以報陛下臣斷以納降爲是武帝道朱卿與張卿之言其理最勝若不納其降是閉賢路也當下命收了降表輿圖禦筆親書聖旨封侯景爲大將軍爵河南王又賜錦袍玉帶宣丁和進朝發付回河南約日來降丁和叩頭謝恩出朝拜謝司空張縮大司農朱異齎了聖旨欽賜袍帶取路回到河南進府參見侯景先將見朱異張綰之事說知武帝欲待不受降表甚虧朱張二人竭力贊襄武帝方允封主公爲河南王細說一遍即將錦袍玉帶呈上侯景大喜戴了金冠穿了錦袍緊了玉帶拜謝天地祖先升丁和爲左軍耀威將軍河南十三州地界俱差心腹將士把守不服魏朝統轄話分兩頭卻說高澄要害侯景屢次在魏主駕前讒言侯景擁重兵在外必有歹意速取回朝誅戮以除大患故魏主頒詔召回京師此時使臣已回說侯景要給散軍糧擇官交代方得回朝高澄心下疑惑差人打聽消息不數日邊郡官表章雪片也似到來奏陳侯景據河南十三州叛魏歸粱乞聖上早發兵擒剿次後打聽的將士俱還說侯景果實歸梁早晚必興軍馬犯境高澄心下驚惶忙集衆文武同會都堂商議此事衆官齊道既是侯景反叛宜奏過主上作急調遣人馬征討叛逆此爲上計高澄道發兵討叛固不必說但衆將之中無侯景敵手況連年饑饉軍糧不足何以處之使軍司社粥離座道吾有一計管教東魏有泰山之安不必興兵發馬只消一紙書到梁使梁主與侯景自生猜忌邊境無足慮矣高澄道先生有何妙計離間梁國杜粥道東魏西梁兩相侵擾因此結仇近十餘年梁武帝皈依佛教以清淨慈悲爲本不樂征伐故久不動刀兵兩國無事丞相莫若一面發兵侵他邊境一面遣人致檄于梁以求通好武帝若肯仍舊議和則落我圈套中矣高澄道兩國相和莫非武帝便不受侯景之降了麽杜粥笑道非也丞相明燭天下些須詭計怎麽不知侯景那逆賊包藏禍心據守河南意欲自圖大業非真心降梁也若武帝與我國連和景意不安必生變亂彼時梁國與侯景自相攻殺我這裏高枕而臥坐觀成敗以逸待勞有何慮哉高澄道先生高見甚明當下奏過魏帝一面資詔命邊塞統兵官發軍攻梁次後修書差護軍都尉鄭梓臣往梁國來再說武帝當日臨朝樞密院司農卿傅岐奏道目今東魏發數萬之衆侵犯邊界攻打城池甚急文書申呈本院伏乞聖旨武帝道既魏國有兵犯境卿等檄本處官員謹守城池若軍馬缺少錢糧不敷卿等斟酌調停亦須添軍增餉何必奏請傅岐領旨正欲退朝只見近臣奏東魏丞相高澄差官齎檄午門外伺候武帝即傳旨宣魏使進朝鄭樣臣到金鑾殿山呼舞蹈已畢將高澄檄文獻上近臣接了展開禦案之上武帝看檄雲侯景自生猜忌遠托關隴憑依爲奸獻土僞降狼子野心終成難養今陛下乃授之以邊缺假之以兵權未有不忠于魏而盡忠于梁者也時堪乘便則必自據淮南亦欽稱帝但恐楚國亡猿禍延林木城門失火殃及池魚不若梁魏修和使景無隙可乘誠爲兩利之術願陛下察之故檄武帝看罷對衆臣道适才傅司農奏說魏兵犯境今高丞相複有檄來以求和好或戰或和卿等以爲何如傅岐道高澄起兵侵我疆土軍強馬壯兵未交而奉撤求和必是離間之計因陛下重任侯景侯景必竭力以輔我朝故發書連和欲使侯景懷疑必生禍亂若許通好正中其機陛下斬其來使傳檄侯景令謹守邊城何慮高澄人寇武帝道卿言甚善喝軍士簇下鄭梓臣斬首報來武士正欲動手朱異忙止住道不可便奏道臣聞兩國相爭不斬來使今高澄雖然侵邊未曾損我一民寸土又奉書求和是以禮來講信修睦我堂堂大國反不能容物使陛下失禮于小邦召天下人非議是何道理自古靜寇息民和好爲上何必靡費錢糧驚擾百姓以興兵結怨哉況兵家勝負難期攪有挫失反傷中國氣象依臣愚見連和者久安常治之策也伏乞聖鑒武帝躊躇了半晌道卿言有理豈有大國而反失禮於小邦和之是也遂不聽傅岐之言教光祿寺辦宴相待修下國書發付鄭梓臣回魏於是兩下罷兵息戰不題卻說侯景自從降梁之後心下不安不住使人打探梁魏兩國消息當下有人報說東魏發兵十萬攻打邊城緊急侯景正欲調兵出關拒敵不數日又見探子報說高澄有檄文連和中國梁主已許和好魏國回軍兩邊罷戰侯景心中驚疑忙請丁和商議道我當初叛魏降梁只指望梁主東征我好於中取事不期高澄那廝移檄連和中國武帝許諾兩國和好梁主必然生疑不重用我了儻奪我兵權削我爵祿那時進退兩難豈不坐受其斃請君計議何以處之丁和笑道主公熟諳韜略區區小事何足爲慮當今之時主公掌握兵權擁數十萬之衆扶魏則魏捷助梁則梁勝如韓信在齊之時成敗之機系此一舉武帝重釋輕儒賢人隱遁承平日久武備荒疏主公乘此兵精糧足武士樂用猝起大軍直搗建康迅雷不及掩耳勢如破竹攻破京城奪其大位那時再除東魏一統天下乃帝王之業也若遲延不決梁魏同心或左右夾攻則我進退無路豈不束手待死侯景大笑道先生陳說利害使我頓開茅塞事不宜遲就此點兵前進只有一件前叛東魏今又反梁名分不正難以服人怎地設一個名號才好丁和道目今臨賀王正德貪婪犯法得罪于朝廷武帝屢屢責罪因此臨賀王憤恨陰養死士蓄積糧草專待內變主公何不修書一封奉之爲主誘他同起軍馬共伐武帝事成之後緩緩圖之這是臨賀王爲亂首罪不在我何慮人心不服大事不成侯景大喜慌忙寫下雲箋差丁和星夜去見臨賀王正德分付如此如此丁和領了言語辭別侯景而行不則一日已到京師日間不敢進見捱至夜間叩門請見管門官道黑夜之間大王飲宴有事明早來罷丁和道有機密重事要見大王煩乞通報管門官見說是報機密事的只得通報臨賀王即教丁和進密室裏相見丁和參拜已畢將侯景書雙手奉上正德拆開細看書雲臣河南王侯景敬啓殿下今天子年邁政荒所爲顛倒大王屬居儲貳仁政遠乳四方景仰執掌權衡聲名赫奕反被一二奸臣所譖重遭廢黜人心共憤四海稱冤大王何不乘此天與人歸之時奮勇除奸早正大寶以副億兆之望景雖不才願效一臂之力若有驅役萬死不辭誠千載一時之機會也臣景執鞭以待正德看罷未能決斷差內臣連夜召長史華一經議事華一經承召來見正德禮畢臨賀王訪華一經至後殿將侯景之書與之觀看一經觀畢臨賀王道此事還是如何華一經道殿下尊意若何正德道孤屢被朝廷叱辱此恨未消患無羽翼暫且隱忍今得侯景相助正孤揚眉吐氣之時如何不允所請華一經道殿下尊意雖然如此自臣觀之乃是侯景誘殿下之術耳正德道何以見之華一經道侯景叛魏歸梁非其本意正欲使梁魏交兵就中取事不意魏與我國連和侯景大失所望事梁不屑歸魏不能手握兵權焉肯俯首聽命於人之下意欲大舉又恐人心不服故借大王之名以自行其志殿下不可爲侯景所愚臨賀王道孤與侯景素未相識彼焉知孤心中之事敢來愚惑今孤正欲借侯景兵力雪我心中之忿長史不必多疑華一經見正德之意已決不敢再諫唯唯而退正德不聽長史之言出殿對丁和道孤有此心久矣親無隙可乘今得侯將軍相助深遂孤願多拜上你主早晚發兵孤當內應機事在速不可遲誤教內庫官賞丁和銀五十兩彩緞四匹發付回去丁和領賞拜辭臨賀王徑回河南見了侯景將上項事備說一遍又道臨賀王專等主公早晚起軍彼爲內應侯景遂調選人馬擇日起軍馬步軍兵共三萬七千戰將五十員用丁和馬之俊二將爲左右羽翼浩浩蕩蕩殺奔建康城來是時承平日久民不習戰聞得侯景起兵壽陽軍馬驟至遠近驚惶一路守城官將望風而逃侯景兵不血刃奪了二十餘處城池當日丁和率領軍馬殺到睢陽城下只見城門緊閉城上四圍遍插旌旗丁和回馬至中軍報說睢陽城有人把守難以前進侯景大怒號令衆軍用力攻城金鼓喧天喊聲大振卻說本郡刺史姓虞雙名天敏舉孝廉出身爲人廉能清正已知侯景作反殺進關來一面急申朝廷請兵教應一面調撥軍兵把守城池當日聞得侯景軍到分付軍士四門謹守自上城樓觀看只見侯景騎著黃驃馬穿繡錦戰袍金盔金甲耀日光明領一班部將在南門下耀武揚威攻打其餘將士分攻四門團團圍住真個是殺氣連天旌旗蔽日虞天敏見兵威甚銳心下憂道我這城池是緊要地方若被他得了到京都如破竹之勢欲要出戰兵微將募力弱難支待要固守奈何錢糧缺少米穀不敷又恐堅守不住心裏煩惱不決只得回衙和夫人史氏計議夫人道相公主意還是如何虞天敏道拒敵不能守城無力不如棄城而走再做區處夫人大怒道相公素讀聖賢之書不知忠孝之道朝廷大俸大祿除你爲一郡刺史身享富貴蔭子榮妻今一朝賊至即欲棄城而走豈大丈夫之所爲也妾不忍見君爲不忠不孝之人請先死以報國恩虞天敏所夫人所說滿面羞慚謝道承夫人指教下官豈敢背國忘君無奈孤城難守食君之祿自當死君之事史氏道相公此言才是爲臣之道城中糧食尚可支半月朝廷若知侯賊作亂早晚必發救軍君當盡力守城激勵軍民或者可以保全不可知也虞天敏大喜親自巡城督軍守護城外軍士臨城攻打者皆被擂木炮石打傷因此不敢逼近遠遠固定放炮呐喊不息虞天敏晝夜不得寢息嚴督守城侯景見數日攻城不下遣一辯士進城來說虞刺史投降大封官職虞天敏大怒將辯士斬首擲下城來侯景見了大惱號令將士奮力晝夜攻城務要打破虞天敏多方守護一連又困了十餘日城裏糧米已盡百姓啼哭忍餓守城心堅不變虞天敏只指望救軍到來終日懸懸而望那裏見有一個軍卒原來表章到樞密院都被朱異張綰藏下並不奏聞因此無人救應虞天敏見勢已危迫百姓惶惶盡皆餓倒城池將陷對夫人慟哭道賊勢甚大城內絕糧軍民餓困城必破矣下官早尋自盡豈可受辱於狂賊之手奈何累及夫人怎生是好夫人道相公差矣此時正是你我死節之秋盡忠報國成萬代之美名有何慮哉夫婦兩個抱頭大哭一場雙雙懸梁而死李府跟隨人役半日不見刺史出來料理都到內衙看問只見家撞丫環等哭做一處說老爺夫人同縊而死見者無不垂淚外面軍士並百姓聞本官和夫人已死都棄槍撇劍各顧性命城內一時鼎沸城外將士見城裏哭聲震天已知有變三軍一齊奮勇攻破城門殺入城來殺入如切腐草放火焚燒擄劫睢陽一空軍威大振遂殺奔丹陽郡來前有橫江阻截去路雖有舟船俱小不能渡江侯景著人從旱路抄過丹陽見臨賀王正德說無大船難以過江正德即發大船百餘艘詐稱載獲渡江來接侯景侯景大喜即時渡江至採石歇馬次日率領三軍搖旗呐喊殺奔丹陽將城四面圍住卻說城內公卿士庶見侯景兵至個個驚駭人人惶惑臨賀王正德於晚間寫密書一封紮在箭上射下城來軍士拾得獻與侯景書上說明日午時可領軍攻打東南二門自有內應次日平明侯景號令衆將午時三刻一齊並力攻打東南二門先上城者爲頭功退後者斬平明呐喊攻打看看午時將到只聽得城裏一片聲喊東南二門大開侯景策馬先入隨後諸將一齊進城滿城士女軍民亂竄逃亡之聲山搖地動囂擾之間恰好到張侯橋邊遠遠見橋左三五百軍士簇擁一員大將坐在馬上兩邊排列牙將俱全身披挂刀劍森森甚是嚴整侯景縱馬向前迎敵那邊牙將高聲問道來將莫非是侯總督麽侯景答道孤親身在此前面大將是誰牙將道三殿下臨賀王是也既是侯將軍何不下馬侯景聽得是臨賀王正德慌忙跳下馬來上前相見臨賀王迎入府裏朝見已畢一面出榜安民諸軍不許妄殺禁止擄掠謹守城門號令一出安堵如故一面擺列筵宴款待侯景當下臨賀王坐了上席侯景側坐二人酒至數巡臨賀王道孤才菲德薄屢被主上之辱久欲雪此冤忿奈無羽翼今得候將軍大材輔佐是天以將軍賜孤也今日之事富貴共之但主上軍馬尚多錢糧廣大孤與卿軍不滿數萬將不過數十人只慮大事難成反招類犬之誚賢卿有何高見侯景笑道臣在東魏聞殿下尊名如雷灌耳故不避斧鉞冒死來歸以輔真主殿下今出此言何太懦也臣從壽陽起兵至此兵不血刃先聲到處望風而降所謂兵家勝敗在主帥之謀略不在士卒之多寡此處至台城不過咫尺取天下只在旦夕殿下早正大位移詔各處歷數武帝昏聵以致天下大亂之罪伐暴吊民奠安四方臣等分兵守住險要不順者夷其三族則反掌之間天下定矣臨賀王大喜道孤之大事全仗卿運籌決策斷不負卿二人盡歡而散次日即改造皇殿大賞三軍諸事完備臨賀王就於丹陽城即皇帝位建號龍平元年衆臣朝賀封侯景爲太宰壽陽王總督中外諸軍事丁和爲樞密院右仆射王朝爲左司農其餘文武官僚各各開用下詔旌表死節忠臣虞天敏夫婦命建祠立祀春秋二祭諸事已畢侯景奏道陛下已登大寶梁主雖然年老無用天無二日民無二主須及早攻破台城除卻外患方保萬年天位貴富無疆倘再遲延各鎮勤王兵至豈能無慮伏乞聖鑒正德道卿言最當有煩卿率領三軍前去朕爲後應務要萬全必勝君臣二人商議已定隨即起兵前進一路殺奔建康軍勢浩大無人敢當將城圍困卻說梁武帝改元太清三年壽已八十六歲此時謝舉等一班老臣俱已挂冠致仕去了朝廷政務盡委朱異張綰自惟終日念佛修行持齋吃蔬而已當初在妙相寺講經說法自從被薛志義燒毀複在同泰寺談經念佛時值正月中旬武帝在同泰寺和道衆拜懺誦經只聽得隱隱金鼓之聲問近臣何處喧聲不絕近臣道萬歲不問臣不敢奏一向聞得侯景作反與臨賀王正德同謀臨賀王已僭稱帝號這金鼓之聲想必是侯景軍馬來也武帝怒道何得妄言若侯景爲亂如何鎮守官員無一通表章奏來近臣道自從東魏高丞相差使移檄與陛下連和之後侯景就作亂起兵河南至京都一帶地方告急表章雪片也似到樞密院來請發救兵急如風火張司空朱仆射二人只是隱匿不問瞞昧陛下以至如此陛下急宜差官探聽消息武帝道焉有此事朕待侯景不薄豈敢造反況來異張縮朕之社稷臣焉肯爲欺君罔上之事正不信之間又聽得方丈外人聲喧鬧原來是司農卿傅岐見侯景圍城飛馬到寺撞入方丈裏來俯伏地下連稱禍事禍事武帝大驚道有甚禍事卿且平身說來傅岐道日前臣曾諫陛下東魏求和是反間之計陛下不聽以至侯景逆賊作反自河南起兵殺至丹陽勢如破竹無人阻擋各鎮請救表章皆被朱張二仆射隱匿不聞臣雖聞得消息恐皇上不信未敢妄奏今侯景輔臨賀王正德登了帝位僭號龍平軍馬不知其數喊聲震天已將京城圍得鐵桶早晚城已將陷陛下還在此念佛看經如何是好說罷大哭武帝道事已至此哭之何益自我得之自我失之亦複何恨忙上鑾輿與傅岐等還朝升殿召文武百官商議戰守之策衆官齊集殿庭武帝宣朱異張綰當面叱道向日侯景歸降是汝二人勸朕收納後來東魏高澄求和通好又是汝二人力主連和以致侯景逆賊心疑作亂各處告急文書申院二人又藏匿不聞今日賊軍圍城破在旦夕你二人有何退敵之策速宜裁處不然不必見朕矣張綰朱異二人滿面羞慚頓首伏罪半晌不敢回言傅岐道朱仆射張司空瞞蔽聖聰招引叛賊本宜問罪但今賊寇臨城勢若泰山且理戰守之策退賊之後再行區處武帝怒氣不息叱退二人宣傅岐近禦座前道今日之事全仗賢卿籌畫救朕危急傅岐俯伏道臣才淺識薄惟恐獨力難支伏乞陛下速選大將統領羽林軍士背城一戰以決興亡豈可束手受困武帝道朕聞兵戈之聲心膽皆碎方寸亂矣不能主持擇軍選將任卿爲之生死存亡決於天命說罷兩眼垂淚口中念阿彌陀佛不輟衆臣怏怏而散傅岐辭了武帝出朝徑到教場中調遣軍將選施大用爲先鋒樊武瑞陳勝爲左右救應使自爲主將督軍打點出戰正是馬臨險地收繮晚船到江心補漏遲畢竟此一陣勝負若何且聽下回分解第十九回司農忠憤大興兵梁武幽囚甘餓死詩曰憤發捐軀報國恩何期天不祐忠貞山河指日歸他姓社稷須臾沒虜塵幽閉深宮愁莫識節裁禦膳渴難禁最憐一代興邦主至死方知佛不靈話說傅司農奉旨發兵出戰侯景次日平明全身披挂手持長槍坐下烏騅馬率領先鋒施大用等馬步羽林軍三萬大開北門迎敵侯景見城裏有兵出敵即退一箭之地排成陣勢立馬於門旗之下左首丁和右首馬之俊兩陣對圓傅妓亦排成陣勢爭先出馬怎生打扮有鷓鴣天爲證金甲金盔襯錦袍烏雅馬上騁英豪忠貞貫日三秋烈壯氣如虹萬丈高藏豹略隱龍韜赤心爲主敢辭勞只因不忍金匝壞雙手擎還歸聖朝傅岐大喝侯景逆賊何在侯景縱馬出陣應道你是何人大膽罵陣傅岐見侯景身軀魁偉相貌堂堂盔甲鮮明聲音響亮乃喝道看你一表非俗受朝廷大恩不思盡忠反爲叛賊今日天兵在此快下馬投降姑饒一死侯景大笑道你等狂徒不知天命主上佞佛煙塵四起百姓受其塗炭西北有倒懸之危我今日應天順人特來吊民伐罪誅戮奸邪神人共快速宜倒戈卸甲迎接大軍入城不失封侯之位倘或執迷打破城池玉石俱焚悔之晚矣傅岐大怒回顧道誰人與我擒此逆賊已見鸞鈴響處先鋒施大用舞刀躍馬出陣大喝道小將誅此狂賊侯景更不打話挺起長槍直取施大用施大用將大杆刀劈面砍來兩個一來一往殺至三十餘合不分勝敗樊武瑞在陣前見施大用贏不得侯景舞動渾鐵九節鋼鞭拍馬夾攻那邊丁和見了手持大斧喝一聲躍馬接住樊武瑞廝殺四員大將奮勇鏖戰只聽得金鼓之聲震地施大用陣後大亂軍士奔走卻原來是臨賀王正德率領三萬餘軍抄過城西傅岐首尾受敵不能救應只得單騎奔入城內臨賀王不追傅岐催督三軍抄施大用樊武瑞陣後殺來殺得梁兵七斷八續施大用見陣勢已亂不敢戀戰敗陣而走侯景不舍奮勇趕來施大用兜住馬拈弓搭話覰侯景來得漸近一箭射來正中侯景左腿侯景大怒帶箭驟馬趕來施大用措手不及被侯景一槍刺于馬下樊武瑞見施大用敗走也牽轉馬頭奔回本陣丁和背後緊緊追趕卻好兩個馬尾相連樊武瑞回身將鞭照頭劈下丁和躲閃不叠一鞭打傷左臂丁和棄斧而走樊武瑞見兵勢已敗不敢追襲鳴金收軍進城背後侯景擁大軍壓來勢如山倒樊武瑞只領得一半軍馬入城將城門閉上其餘盡被殺散降者不計其數侯景大勝一陣依舊將皇城四面困住喊殺之聲震動天地卻說傅岐單騎進城入朝到了金鑾殿上喘息不定武帝驚道賢卿爲何如此狼狽莫非出兵不利麽傅岐俯伏哭道臣力竭矣被逆賊侯景叛臣正德前後夾攻因此大敗施先鋒等不知下落武帝道朕從早至今日已過午不退朝以待卿報捷卻原來大敗而回此天亡我也傅岐道臣初督軍出戰施大用與侯景捨命廝殺未見勝負樊武瑞奮勇助陣那邊一少年將迎敵正廝殺之際不期臨賀王領生力軍從城西抄路殺來將臣軍馬沖作兩截鋒不可當因此抵敵不住臣只得退回施樊二將陷在陣內不知生死若何武帝跌足道早不聽賢卿之言以致今日衆寡不敵非卿之罪實朕之過也快打探施樊二將消息速來覆朕只見飛騎來報施大用陣亡樊武瑞戰敗而回俯伏午門待罪武帝教快宣進殿樊武瑞進得殿上大哭道施先鋒被侯景所殺軍馬三萬折其大半非臣不肯盡力奈彼衆我寡勢不能當以致大敗武帝歎道此乃天敗非人力所能支也朕今已年老死不足惜只是遺笑於後世豈能無恨目今賊勢猖獗城內軍少難以再戰勤王之師一時未集傅司農與卿等用心督軍守護待朕靜思良計以破此賊衆卿暫退傅岐樊武瑞和衆文武俱辭帝出朝分頭守城不在話下卻說侯景殺敗羽林官軍刺死施大用軍威大振丁和打傷左臂侯景著人擡入營中醫治親督軍士晝夜攻城不息守城軍士因賞罰不明糧食不繼漸漸逃亡去了傅岐又在陣上吃了驚回衙嘔血鬥餘臥床不起梁武帝只在後殿彌陀閣上吃齋誦咒看彌陀經消災懺拜鬥禳星以求佛力護祐觀音菩薩救苦止望暗退敵兵保安社稷再無他計卻說朱異張綰被武帝面辱一番心懷慚忿當下見侯景布雲梯飛炮攻城甚急看來城已將陷勢不可支兩個私身計議朱異道即今賊勢浩大國祥顛危城破只在旦夕我兩個見機而作守些甚麽不如令人出城暗通消息獻了城門迎接軍馬入內庶不失富貴不然城破之日不見得你我爲侯景出力的好處徒死無益張綰道仆射主見極高宜速爲之連晚寫下降書差一個心腹健兒裝做賣柴村民夜半吊下城去被侯景軍士捉住送入寨裏來健兒道小人是朱仆射差來見大王的有機密大事相報侯景見說即教去了繩索問朱仆射差你來有甚話說健兒在頭髮裏取書獻上侯景拆開看時寫道君候起仁義之師吊民伐罪四海引領而望孰不歸心今城內兵糧兩盡惟賴傅岐籌畫守禦又遭病劇不起君侯可于明日辰時驅兵大進不佞開宣政門以迎大駕非爲身謀特救滿城生靈之命耳薰沐恭候切勿失期以誤大事樞密院左司農朱異司空張綰再拜侯景看罷大喜重賞健兒分付道拜上你主人明早攻城不可失約事成之後不愁富貴健兒叩頭謝賞出得寨門到原吊處已有人在彼伺候複吊上城來見了朱異張綰將侯景言語說了二人大喜次日平明侯景號令衆軍搖旗呐喊金鼓震天攻打宣政門甚緊只聽得城裏炮聲響處城門大開朱異張綰驅家憧並本院軍士助力迎接侯景軍馬入城侯景縱軍擄掠放火殺人滿城百姓盡遭茶毒侯景率領猛士五百徑入朝堂正殿上不見武帝急搜太極殿中此時武帝盤膝坐於禪床上合掌念佛見侯景來到安坐不動侯景稽顙拜于殿下武帝道朕待卿不薄何以至此朕年已九十視死如歸卿欲篡位何不斬朕首去侯景俯伏地上不敢擡頭汗流滿面連聲道臣該萬死今日臣起軍馬非敢爲叛欲斬不忠負國之臣以清殿陛並無他意武帝道賢卿如此忠孝雖周公伊尹何以加焉朕年邁力衰不能理政得卿輔佐實愜斯懷侯景道臣暫告退清理軍務明日早朝再見陛下說罷叩頭退出朝門外來正走之間禦道上遇著朱異襆頭象簡身著朝衣足穿朱履見侯景來到慌忙跪下道小臣失迎大王龍駕伏乞寬有侯景雙手扶起笑道朱仆射不須如此孤與公總是朝廷大臣何出此言使孤含愧多矣將土簇擁侯景同入樞密院中堂上坐下即出號令救滅城中餘火禁止軍士剽掠犯令者斬軍令遍示城中稍得寧貼侯景又聚集滿朝文武如有一人不到梟首示衆文武官僚畏懼侯景威勢悉到樞密院中聽令侯景在衆官中看了一遍問道司農卿傅岐怎麽不見張綰道傅司農不知進退抵拒大王戰敗受驚今早大軍入城之際病重身故侯景呵呵大笑道卻便宜了這廝先鋒樊武瑞何在朱異道想已逃竄乞大王遣軍追獲明正其罪侯景道這廝乃網中之魚無能鼠輩何足介意你衆官在此孤有一事和爾等商議不知合衆論否衆官齊躬身道願聽大王鈞旨侯景道孤興兵到來非有他意只因主上重佛輕儒朝政廢弛境外于戈日競盜賊蜂起國家危在旦夕孤故不遠千里欲除君側首惡選諸太子中有才高德尊者早正大位主上聽其修行自便衆官以爲何如朱異張綰當先諂佞道大王之論極是乃伊尹霍光之舉名正言順大合人心有何不可衆官也只得齊道隨大王主裁誰敢不服侯景又笑道孤欲除君側之奸汝等以爲何人衆官面面相覷不敢回答侯景正色道朱異張綰背主忘君濫叨爵祿賣國市恩苟圖富貴天地間第一罪人也此等奸臣留之誤國喝軍士將二人綁出梟首示衆號令才出只聽得一聲喊將朱異張綰簇下綁出斬了須臾間兩顆首級獻上衆官驚得股栗不安俱面如土色侯景道諸君不必驚惶孤除此佞臣以儆其餘與衆官無預當下大小公卿盡皆散訖侯景暫於樞密院中住紮聚集一班兒將官謀士商議丁和向前道主公今欲何如侯景道孤自從征戰以來千軍萬馬之中槍刀密布劍戟如林生死須臾不以爲懼今見蕭公使人自懾不敢仰視豈非天威難犯自今以後不可再見之矣丁和王僧貴一齊道主公攻破京都取天下已在反掌何不殺了武帝早正大位侯景道孤有此心久矣奈武帝牙爪未除須索緩緩圖之衆人道主公所見甚明臣等不及自此之後侯景將心腹親近之人布滿諸路據守各處緊要關隘朝廷政務皆自掌管故舊大臣黜退不用從正月至五月將武帝幽囚于靜居殿中撥四名親隨牙將看守凡富人侍衛一概不許近前飲食衣服之類亦各裁節不能應用武帝每日暗暗垂淚只是念佛以捱朝暮侯景擁甲士橫行街市每出外家家閉戶爲之罷市入朝百官俯伏以待武帝受盡淒涼苦楚萬狀當下卻值太清三年五月十八丙辰日武帝受餓數日了早晚止吃得一碗糜粥並無他物心下忿怒只覺心隔飽脹咳嗽不止又無一個心腹之臣問候亦無一個官人伏事武帝歎氣道朕當初多少英雄赤手打成天下身登九五威傾朝野也只爲孽海無邊冤愆有報故此皈依我佛要目圓寂後徑歸西方淨土極樂世界蓮花化生誰想遭遇侯景逆賊將朕幽閉在此求衣不得衣欲食不得食曆盡艱難昔日英雄何在想必天地有所不容佛教亦無益也說罷淚如雨下愈覺心頭飽悶咳嗽喘息不止倒在禦床上回頭問庖人道朕口甚渴有蜜水可將一碗來暫解庖人道宮中止有血水焉有蜜水陛下要止渴只有一杯濁水在此武帝道就是濁水聊且將來解渴庖人將半碗濁水遞與武帝武帝喝了一口但覺穢氣觸鼻仔細看時卻是半碗渾泥漿內有兩頭蟲盤跳一時怒氣攻心將碗擲於地上憤怒道一代帝王卻被小人困辱早知今日佛無靈悔卻當初皈釋道再欲說時神氣昏聵口已含糊舌頭短縮不能言語但道荷荷荷遂氣絕而崩可憐立國英雄餓死于台城之靜居殿中有詩證梁君崇釋斥儒風豈料身空國亦空作傀已無君與父又何執法責臣忠後賢又有詩歎曰干戈四境尚談經國破家亡佛不靈覆轍滿前殊未警浮屠猶自插青冥當下庖人傳出外來言聖駕已崩侯景聞知一面委官整理喪事親率群臣入殿奉太子世贊即位是爲太宗簡文皇帝改號大寶元年加侯景爲相國封二十郡侯景心下不足自稱漢王自此朝政皆屬漢王所掌文武百官凡事先稟過漢王然後奏知文帝臨賀王正德見侯景奉太子即位心下大怒聚集衆文武商議道叵奈侯景這賊將書激朕起兵原說誅戮主上事成之後朕登大寶共用富貴不期逆賊破城以來不得一面今又立世贊即帝位全不是起兵初意朕被其所賣甚爲可惱不諱此賊何以泄忿但恐衆寡不敵衆卿有何妙策長史華一經道昔日侯景致書陛下臣己諫阻莫墮其術中陛下不聽以致今日此賊不久必篡大位臣聞鄱陽王賢能英武有精兵數萬謀臣極多陛下何不修密書連合鄱陽王兩下起兵共誅國賊何愁大事不濟臨賀王大喜道卿言甚善朕當從之逆賊合當授首於是修成密書差心腹都尉羊琰賈書送至鄱陽王處暗合連兵以剿叛逆羊琰藏書發內徑出南門行不數裏只見前面一簇人馬遠遠行來羊琰立定看時乃是漢王侯景帶著數百軍士吆喝而前羊琰路次難避終是心虛慌張不定急閃入路口庵院中回避侯景坐在馬上遠遠看見一個將士探頭張望行步愴惶心下疑惑正欲查問只見閃入庵中去了即著軍士喚出來看卻是羊琰跪于馬前面色變異侯景問道汝爲何事慌張如此羊琰戰慄不能答應侯景笑道必有奸謀令軍士搜檢發內搜出書來呈上漢王侯景拆開看時書雲叛賊侯景凶狡奸僞欲圖篡逆反以弟爲奇貨初誘合兵以除君側之惡不期城破之後幽上于靜居殿中絕其飲食餓死台城此賊懷不良之心久矣終必篡位今特致書於賢王求起一旅之師共誅逆賊碎屍滅族以祭先靈乞兄早正大位副兆民之望國家幸甚天下幸甚侯景看罷大怒雙手加額道感皇天庇祐得獲奸謀不然孤三族皆休矣即將羊琰斬了帶領軍士火速進城當晚發精兵三千部領家將徑將臨賀王府門圍住親自殺入府中滿門良賤盡皆誅戮席捲財帛寸草不留又將臨賀王押入景陽樓內絞死有詩爲證宗黨陰謀骨肉欺豈知一旦亦誅夷從來善惡誰無報爲子爲臣宜鑒之話分兩頭再說林澹然自從侯景相別之後光陰迅速不覺又更了幾遍的寒暑終日修樣煉性返本還元容顔倍加光彩身體更覺精神苗知碩沈性成胡性定三個不離左右早晚隨著林澹然看經念佛薛舉依舊送在城裏張太公家和張善相同窗肄業共習詩書當下年已十歲二生天資相等性格不同這薛舉悟性最高只是不肯讀書候先生不在翻筋鬥打虎跳扯拳拽腳嬉耍喊叫年紀雖小氣力頗雄舉一二百斤之物如同等閒這張善相秉性聰明讀書三五遍即能默誦古書墳典過目不忘下筆成章雅愛清淨先生每每責罰薛舉致書與林澹然說薛舉不肯用心比初進學時大不相同林澹然已識他是個好人只是護短不十分拘束閒話休題卻又是初夏天氣但見乳燕飛華屋新篁遙麗園林澹然和苗知碩在莊後小園中槐下閑坐苗知碩問西天天竺國我佛如來修行得道根源林澹然將如來辭父歸山苦修證道的事細說一番自下午講起不覺紅輪西墜冰鏡高懸並無纖毫雲翳林澹然道初夏光景清和可人難得這般皎潔的月色良宵美景莫要辜負了教道人移桌椅在茶蘑架邊擺出酒肴對月而坐苗知碩側坐相陪二人飲酒談笑玩月遣興怡情許久又早夜深更靜林澹然正舉酒杯在手仰面看月忽見東南上一星其大如鬥自南而西色煌煌欲墜林澹然道知碩你看此星爲何如此苗知碩擡頭看時失驚道住持爺此星卻也大得利害爲何一步步流過西來林澹然道此星不比諸星乃北極紫蔽之象今自南向西其光將墜多應在梁武帝身上有些不祥或被侯景所弑未可知也知碩再欲問時只聽得一聲響亮大星已墜其光四散兩個驚駭歎息林澹然道紫薇星已墜武帝休矣只是百姓遭于塗炭何時四海清平歎息了半晌苗知碩將手指道那月邊隨著這兩顆星其光閃閃爍爍比諸星大而且朗正照本城之內是何星也林澹然笑道天機玄妙非汝所知此二星乃大貴諸侯之象正照本城應出英雄豪傑然而星光帶殺黎民必遭荼毒天下安得太平林澹然又將星象一一指點與知碩道凡星者精也萬物之精上列於天各屬分野二十八宿以經之金本水火土五星以緯之如星宿一離次舍即有災難又如流星入鬥口主有刀兵五星入鬥秦地不安天烏星現上人失德輔臣爲禍干戈離亂三台爲辛輔妖彗來侵主大臣謫貶小人得志天蓋星現國有陰謀君弱臣強天下兵亂天漢星地漢星若有光芒人主宜修德以禳之毛頭星其光燭地大水爲災夷狄侵中國太白人南斗君王下殿走若經天主變亂毛頭星有七八名一名攙槍一名煞星一名武聯一名掃帚一名文班一名招搖此星總不宜現現必有災辰星原在月後若在月前期年之中防兵革天獄星現兵火立應天雁星其光青色三四丈長現必生殃主兵荒堿盜天獸五星不宜明亮若還皎潔天下刀兵若賊彗同現十年方可安寧天秤亦七星如仲夏之夜明朗主大雨平地行舟年荒米貴南箕老人六星立夏半夜起看如皎潔年豐太平如昏暗歲歉亂生不能盡述大凡天下將治文宿當空天下將亂惡煞出現成敗興亡皆由大命星象先呈其兆貧窮貴顯存乎其人俺與你曆盡艱難受遍險阻在死生關裏逃得出來亦是氣數不絕非關俺輩之能也苗知碩點頭嗟歎道承住持爺指教頓開茅塞二人一面吃酒一面談說又早見鬥柄橫斜月輪西轉三更已盡林澹然令道人收擡杯盤各回房歇息次日著苗知碩胡性定二人到梁國去打聽武帝消息順便訪問杜都督家眷安否如何二人辭別起程不在話下一日林澹然因天氣炎熱在莊前竹陰中乘涼見一個婆婆年逾七十頭鬢皓然但見蒙頭霜雪瘠體龍鍾眼昏不見光明耳重那間談笑面皮多皺荷包打就折紋多牙齒全無口癟何曾言語朗欲啖未沾先出唾無固獨自只搖頭這婆子領著一個小童生得面闊口方身軀雄壯攜手徑入莊裏來林澹然看時是近鄰專做媒的潘媽媽走近前來對林澹然萬福道住持老爺一向不會尊顔越發清健了林澹然答禮道媽媽貴冗許久不面一向興頭得利麽今日有何事到俺敝莊來這小官可是你的令孫麽潘婆道老身窮忙不曾到貴莊望得住持爺這小廝不是我孫子來路遠哩小兒日前在梁國帶來的今日爲這冤家特來見老爺林澹然笑道見俺有何話說潘婆道這小廝今年十一歲了自小父母雙亡寄養在鄰居因侯景作反擄掠民間子女財帛自河南直到京都盡遭焚劫這小廝收留的人家也被劫掠一空只得將這小廝出賣小兒爲商打從那裏經過見他生得有些古怪就買他回家使用不期這小廝憊懶鎮日和小孫們廝打相鬧幾番欲要趕他出去又可憐是外國人伶仃孤苦欲要留他又被他同吵不過老身淘不得這許多氣想著住持老爺曾說少個掃地閉門的童兒老身思這清閒去處沒有與他一輩的廝鬧可以安身故將這廝送與老爺使用若說起粗用卻也做得不知老爺肯收留麽林澹然道難得媽媽一片好心小廝兒俺這裏盡可用得若是這等頑劣不肯服性惟恐難以教訓或有逃亡走失如之奈何潘婆道老爺但放心雖是拗劣慢慢地訓誨得好走失之事決不妨的目今離亂之世柴如珍寶米如金嫡親父子瓦自不能相顧那有閒錢養別人不怕他飛上天去了林澹然道媽媽說得是貧僧便收他不妨但不知多少身錢潘婆道小兒買來時說道身錢連盤費共用了三兩有餘又養了他兩個多月這也提不起了任憑老爺見賜罷林澹然道豈有此理公平交易如何少得你的即抽身到房裏取出白銀三兩遞與潘婆又留住吃了酒飯潘婆幹歡萬喜作謝別了林澹然就行那小廝將潘婆衣裳一把扯住睜著兩眼道老媽媽好呀你得了銀兩把我撇在此間就去了咦潘婆道我兒我送你在住持爺這裏快活只像落在蜜缸裏好不受用哩那小廝道我只同媽媽回去不要這光頭受用潘婆喝道胡說你在住持莊上享的是清福住的是高屋穿的是好衣吃的是陳穀小心伏侍老爺大來決有長進日子我另日再來看你那小廝道寺院中有許多不好處媽媽要錢卻將我斷送在這裏潘婆道寺院中百伺不好小廝道光頭們吃的是冷齋飯咬的是硬饅頭穿的是破袖衣嚼的是蔬菜食不見葷腥面那裏討酒喝若有些兒差錯處還要打兩個大頭搭若還俊俏些就要把沙彌來解渴只是同媽媽回去的好林澹然笑道這頑皮卻會油嘴一發溜撒你只見庵觀寺院的和尚貧財好色明蔬暗葷遮人眼目俺莊內須與他們不同葷酒俱有待人甚恕只是你肯小心勤謹管得你暖衣飽食逍遙快樂那小廝才笑道若恁的說時將就可以度日慢慢再尋出頭日子林澹然道媽媽請回小廝留在這裏不和他一般見識潘婆道老身告回這猢猻拗劣時住持爺不須打得只拿去剝皮揎草便了那小廝喊道老豬皮止可將去鞔鼓那裏還揎得哩潘婆怒道今日既送與住持爺就是住持爺的人不好打你快快改過休得如此尖嘴傷人那小廝瞅著眼道酒醉食飽騙了錢鈔只怕你尿急那廂去放問是好引得林澹然也忍不住笑起來潘婆惱道這小潑皮胡言亂語我騙了誰家的錢鈔我是走千家踏萬戶的老實爲本誰與你小猢猻放屁辣臊說罷提起手中扇子劈頭就打林澹然攔住相勸那小廝笑嘻嘻地鑽來鑽去躲避潘婆有幾分酒醉被小廝混了半晌卻有些眼花了倒將林澹然打了一扇那小廝一直跑進佛堂裏拍手笑道媽媽忒也憊懶上門來打和尚林澹然怒喝道你再如此胡纏我就要開棒了快進去那小廝見林澹然發怒把舌頭伸了一伸走入佛廚後面去了潘婆氣得喘吁吁地道小不死氣殺我也林澹然教行童拿一杯苦茶請潘婆吃了送出莊門潘婆作謝別了自回林澹然轉入方丈裏坐定令道人叫那小廝過來小廝聽喚即忙走進方丈裏站著問道老爺叫我有何分付林澹然道适才你衝撞潘媽媽甚是該打初次饒恕一遭以後改過不得如此無狀言語要謹慎行動要小心小廝道老爺分付下次再不敢了只是氣這潘媽媽不過他的兒子何曾將銀子買我來原是個專一設騙的拐子坑害人家兒女拐我來時瞞著我家只費得兩個燒餅麻了我嘴說不出就領來了在他家過了兩個月做了許多事還要小猢猻小短命不住的罵並不曾吃得一餐飽飯今日將我賣與老爺他又白白地騙了銀子去細想其情甚爲可惱林澹然聽罷心裏暗想道看這小子容顔古怪相貌稀奇言語甚有經緯決非落後之人當下因他生得面闊口方取名叫做阿醜至晚苗知碩胡性定從梁國而回放下包裹雨傘對林澹然稽首畢苗知碩擡頭見側首立著一個小廝生得異樣便問道住持爺這小廝是何處來的林澹然道适才潘媽媽送來賣與俺莊內使用難得他老人家一段好情收留在身畔伏侍說罷就叫阿醜過來見了苗師父和胡班首阿醜向前唱了兩個喏林澹然令苗知碩胡性定且去洗了塵土吃些酒飯慢慢地來講話二人出方丈去了阿醜走近林澹然身邊問道方才來見老爺的那一個矮和尚老爺快燒一道黑符遣他出去林澹然喝道這狗才又來胡講以後不許叫和尚二字喚那矮的長老做師父那瘦長的長老做班首你初進得門怎麽就教俺遣苗師父出去只見阿醜將手指著自己的眼睛說出這句話來正是有智不在年高無智枉活千歲不知阿醜識得苗知碩是甚麽人且聽下回分解第二十回都督冥府指翁孫阿醜書堂弄師父詩曰人生如夢寄塵中夢覺塵緣總是空浪蕩形骸同泡影浮沈蹤迹似飄蓬魂遊地府方知父宿借禪門始認翁戲術弄師堪絕倒將軍原不類兒童當時阿醜將手指著自己的眼睛道老爺那個矮師父何處來的卻是一雙鼠眼有些要偷東摸西挖牆撬壁的勾當儻日後做出事來豈不連累老爺林澹然喝道咄你小廝們省得甚麽如此胡說師父知道活活打死快不許多講阿醜拍著手呵呵地笑出方丈去了林澹然暗想這小廝恁般乖覺爲何就識苗知碩會做賊這都是他的靈根宿慧處自此以後遂縱放阿醜頑耍不甚拘束苗知碩吃罷飯走入方丈裏來林澹然問打探梁國消息和杜都督家眷下落何如苗知碩道侯景自別住持即投梁國不期東魏高澄用反間計與中國連和激變侯景反人台城將武帝活活逼死朱仆射張司農臨賀王等俱遭殺戮目今是武帝太子世贊即位封侯景爲相國兼平章事又稱爲漢王這天下不久是侯景篡了那杜都督身喪之後其妾馮氏耽孕十七個月生下一子甚好豈知不數年間大母次母俱患疫症相繼而亡家業又被火焚其子不知下落果然是家破人亡實爲可憐林澹然聽罷潸然淚下悲歎不已且說這阿醜無拘無束每日山前山後頑耍沒興時跳在溪內洗浴千般百樣在水裏嬉戲不覺月餘當下時值炎天十分酷熱薛舉在城內張太公家讀書先生見天氣暑熱告別回家去了張太公著人送薛舉回莊上來林澹然教他早晚溫習書史薛舉那裏肯讀終日和阿醜耍拳舞棒踢飛腳跳四平莊前莊後左右鄰舍家家攪遍有幾個村老走到莊裏告訴林澹然道貴莊這兩位小官十分頑劣村前村後幾家鄰舍被他攪得不耐煩溪邊魚網時常扯破園中花果屢次偷吃若小廝們阻擋他就尋相打況兼力大誰敢抵手狗若吠時即提起尾來搠死便是我們老人家說他幾句他也不聽一味鳥娘鳥爹的亂罵村老們因住持老爺的人又不好傷觸他只得忍氣今日特來見住持望乞美言教誨戒他下次省得壞了鄰舍之情村老無知斗膽冒讀林澹然道貧僧隱居於此競不知這兩個畜生在外如此生事乃貧僧之罪也列位老丈請息怒待山僧重責這廝容日清罪衆老一齊道住持如此忠厚卻是我等得罪了起身告別林澹然留茶送出莊門去了澹然自回禪堂裏念佛直到天暮方見薛舉和阿醜笑嘻嘻地回來林澹然喝教二人跪下兩個不知是何緣故在禪堂佛廚前跪了林澹然提竹片在手裏罵道好兩個畜生呵一個不成主一個不成仆相呼廝扯那裏去生事來打攪得村坊不寧大膽衝撞鄰里父老先打這狗才後打這畜生薛舉道我一向不曾頑阿醜指引道東園果子好吃西池魚兒好摸打人罵人都是他教我的沖激鄰舍也並不於我之事阿醜爭道大叔你在城讀書不曾回莊時我也鎮日價遍處閑耍爲何不曾有一個人來告舌自你回來日逐引我去打攪東鄰西合就有許多唇舌如何卻都推在我身上林澹然怒道這狗才還恁般花嘴巧舌如何說得過提起竹片將阿醜打了十數下次後來打薛舉打得兩下苗知碩胡性定沈性成一齊來勸林澹然罵道以後若再如此兩個俱是一百竹片今晚不許起來直跪到天曉才放林澹然帶怒入方丈裏去了薛舉阿醜跪在禪堂裏你我互相埋怨未及一更天氣苗知碩自悄悄來領薛舉進去睡了阿醜卻獨自一個跪在那佛前不見有人出來放他心裏煩惱想道悔他娘鳥氣麽薛大叔引我惹了鄰合卻把我兩腿兒熬打雙膝兒受跪他卻苗師父領進去睡了留我一個冷清清跪在這裏守著琉璃燈呸這都是那潘婆害我不如趁今夜無人知覺悄地到他門首放起一把火來燒得那廝人離財散淨淨光光才消得我這一口怨氣忙忙的尋了引火紙劄帶了火種溜出莊前爬起靠牆楊柳樹上往外一跳出了莊門取路徑奔潘婆家來走過村場又過了兩重崗子正落山坡猛地起一陣旋風豁喇喇樹葉如雨點般滿頭飄下行不數步又起一陣風刮得滿山樹木颯颯地響阿醜打了一個寒噤遠遠見兩盞燈光從側首山坳裏閃閃爍爍射出來阿醜笑道月色不甚明亮正好借此燈光順路同下山去低頭急走忽然平地起一個霹靂振得地動山搖原來是一隻吊睛白額大虎見了阿醜將口拄地吼這一聲揚威豎尾徑來撲人阿醜見了叫聲阿呀急轉身複跑上山回頭看那虎時已撲近身邊阿醜就鑽入樹林中那虎也趕入來阿醜慌了急急溜上一株大松樹蹲在頂上那大蟲昂頭向上看了半晌兩爪揎地將頭拄著樹根猛地吼了一聲樹枝振動阿醜險些兒跌下來兩手緊緊抱住大枝看著下面那虎又將樹根啃齧阿醜暗想這畜生若咬斷樹根如何是好心生一計扯開裙褲放出溺來口裏念道撒了驚尿免生疾病那尿熱騰騰澆將下去大蟲仰面看上阿醜取出腰間火種點著紙劈頭丟下剛剛撒在大蟲的左眼裏那虎燒得眼疼打個滾跳過對山去了阿醜歡喜忙忙溜下樹來不期踏著枯枝括地一聲響樹枝連人滴溜溜跌落塵埃樹高勢重阿醜跌得昏暈而死一點靈魂縹縹渺渺獨自而行一望時儘是荒郊曠野但見陰風慘慘冷霧昏昏並無一人來往阿醜心下驚疑這這光景不是潘家去的路了放著膽趲向前去行了十餘裏前面見一座城池城頂上數道黑氣沖起四周並沒屋舍人煙看看走近城邊驀然城門開處突出數個夜叉生得鬼形怪狀面目猙獰種種奇異之像手執鋼叉刀棍將阿醜擒住道這廝來得甚好大王的福也造化造化阿醜心慌要走奈何掙扎不脫兩下正自扯鬧忽見一老者皂衣幅巾須長鬢白手拄拐杖飛奔前來喘吁吁喊道留入還我留入還我夜叉喝道爾是甚處毛神敢在此大呼小叫老者道我是小蓬山土地有一大貴人誤來汝處我一路追尋原來在此快快放他轉去免受天譴夜叉道我這枉死城無屈死的鬼無放還的人這小子既已到此再無放理說罷扯著阿醜驅入城去土地一手拖住不放兩下裏扯來拽去終是雙拳不抵四手你道矮矮一個白須老子怎能扯得過這幾個長大凶鬼弄得這老兒一面咯咯地嗆拖著阿醜滿地打滾阿醜心中大惱奮力躍起奪過夜叉鋼叉向前亂搠土地挺拐杖沒頭沒臉打將過去夜叉一齊舉兵器相迎倏然一騎馬飛到馬上那員大將口稱是直日巡察功曹奉東嶽並城隍之旨特來留杜貴人回去夜叉大吒道我等奉五殿閻羅天子聖旨守此城中豈有容易轉去得的功曹大怒拔出腰間寶劍也殺將過來夜叉不能抵敵奔入城內去了功曹將阿醜抱於馬上策馬而走只聽得後面喊聲大振回頭見數百牛頭馬面鬼卒夜叉簇擁著一員鬼將騎著黑龍來追旗號上書無厭大王四字怎生模樣有西江月爲證但見疙瘩臉澤如潑靛獅子口一似朱砂銅鈴突眼露獠牙赤發蓬鬆可怕頭戴金冠耀日身穿繹服飄霞手持大斧跨龍蛇聲若巨雷叱吒功曹忙將阿醜放下交與土地道這鬼王極是兇惡若貴人被他搶去萬元生理汝等急往南走我自單身迎敵汝等去遠我才回馬說罷截住鬼王廝殺這土地引著阿醜急往南走後面鬼卒又飛步來趕二人十分危迫忽聽得阿道之聲自東南而來見百余戰士旌旗羽蓋相繼擁至中央彩輿之間端坐一位王者又有數十個軍士肩馱錢串跟隨車後土地正欲喊叫那大王早已先知喚土地領阿醜相見又令戰士大呼功曹停戰功曹撥馬去了鬼王厲聲問來者是何冥官阻我戰陣大王道孤乃冥曹總司掌案忝居王位足下豈不相認孤家九世積德蒙上帝恩賜一子今偶誤來至此足下河相迫乎鬼王聽說意欲收兵衆鬼卒一齊喧哄道大貴人誤來正大王代生之日我等亦好出頭千載奇逢非同容易若一錯過後會難期大王豈可輕輕放過鬼王聽了又複來搶阿醜大王喝車駕退後令軍士將金錢百餘串撩擲過去那鬼王見了錢笑嘻嘻忙將手接堆疊滿肩回身入城去了衆克卒喧嘩不息軍士將銀錢四下抛撒鬼卒們攘臂爭奪亂搶一空盡皆滿面堆笑而散功曹土地等隨車駕回府進了大殿大王慰勞二神側殿設宴相款手抱阿醜垂淚道我兒這般長大了今日若非東嶽碟文傳報此時汝已墮落孽城之內阿醜道大王你是何人這樣愛我救我大王道我非別人乃汝親父杜都督名成治的便是阿醜聽了扯住杜成治衣襟大哭道你既是我父親在此做官快活如何將我流落伏事別人杜成治亦吳道我兒可憐你命薄遭此流離顛沛幸喜林禪師收養在莊不致受苦頃者遊弈大使接得岳府碟文報稱汝入冥司已近枉死城故我親來救你又賴土地功曹已先在彼相援阿醜道我要到潘婆家去路遇大蟲上樹躲避不期失足跌下心忙意亂錯走路徑撞見這夥凶鬼纏了這一會那生得醜惡怕人的是甚麽大王十分可惡杜成治道這魔王自從有地獄即據枉死城收錄一切橫死傷亡魂魄暴虐貪利凡冥府諸曹官典殃滿轉生陽世爲官清正惟此魔罕得托生數百載間儻有大貴靈魂自人枉死城者方可代位然後此魔得生陽世位極人臣欺君罔上蠹國害民若吳之伯嚭秦之商鞅漢之董卓皆是此魔轉世茶毒生靈自漢末到今將及四百餘年彼大數又當轉生陽世故今要搶汝入城代職但此輩小人惟利可動故我不惜數百萬冥錢救你性命阿醜道我聽得人說世上惡人死後決落地獄受諸苦楚不知真假若真有我要看一看耍子杜成治道地獄陰險汝不可觀但人心一念善在在天堂一念惡種種地獄比如我爲父的生前正直死後爲神上帝複憐忠義賜汝爲子以昌後嗣這是做好人的報應阿醜道我今只跟你做官接續後代不去伏事那林和尚了杜成治道我兒你不知這林彈師乃是救你公公的大恩人我爲報恩救了林禪師性命反把自己性命送了我生前不曾孝養得你公公故今不能托生有一事囑付你月餘之後你公公到莊來你可認他留公公在莊上小心孝順就如孝順我一般阿醜道我並不曾見公公面如何認得杜成治道你公公名喚杜悅今年八十二歲了鬚髮皓白手拄拐杖的便是阿醜道莫非方才同我來的老頭兒麽杜成治道不是你公公生得瘦長清健左手背上有三點壽癍右腳面上有一顆黑痣以此爲認決然不差你的生日可記得麽阿醜道我從小沒了爹娘那裏知道杜成治道你是太清元年二月初七日亥時生的乃遺腹之子因你生母馮桂姐耽孕十七月所産故名過幾你今快快回去阿醜扯住不放哭道我只是隨你在此快活不回去了杜成治道此處是陰司地府你不知道況是梁國地方你若不去就不得活了阿醜方才放手垂淚欲行社成治道我兒且住還有一句至緊言語幾乎忘了若你伏侍公公歸天之後你已成人千萬將公公骸骨歸家葬於祖墳上盡我之心我的骸骨已沈埋梁國須日後還鄉族中尚有親人你可歸宗認取暫時落籍久後必然發迹我陰靈暗中護你你當切記於心不可忘了父子們正要分別忽殿后轉出二位夫人將阿醜抱住號啕痛哭阿醜認得兩個母親也放聲慟哭起來功曹土地突至殿上道天色酷暑日已過午貴人作速回陽遲則房舍欲壞有誤大事社成治也催促快去這母子三人牽衣執袂不忍分離杜成治將手指著殿外道兀的不是鬼王來也阿醜急回頭看時倏然不見了父母但見一片長江阻住去路滔滔大浪從腳跟邊滾來功曹搶阿醜上馬騰空而起但聞風雨之聲遠遠見山頂上人馬攢繞喧嚷功曹對阿醜道爲你一人驚動了諸處神扶都在此守護言畢驟馬奔至山頂土地將阿醜撮著腳顛下馬來阿醜大叫一聲顛死我也此時林澹然合莊人都在那裏看守原來當日林澹然因莊門不開不見了阿醜著人四下尋覓有人報說有一小廝如此模樣跌死在山上澹然帶了人從親自來看果然是阿醜跌死在松樹之下一齊啼哭澹然將阿醜渾身撫摸一遍忙拭淚道不妨不妨此子相貌端厚決非囗折者汝等不必悲啼忙打點茶湯藥餌又令人倚樹張蓋遮蔽衆皆環立看守將及申刻忽然阿醜大叫一聲顛死我也衆人驚喜胡性定忙將阿醜扶起澹然即調定神散灌下咽喉漸漸回神手足活動開眼看了衆人方知是死去還魂此時村鄰過往來看的人甚多都與林澹然賀喜澹然謝別衆人雇轎擡了阿醜回莊用藥調治數日後阿醜精神復舊依然好了澹然細問跌死根由阿醜將前後事一一訴說只不講出父親分付之言澹然方才放心阿醜依舊頑耍心下只恨那大蟲幾乎喪命對薛舉道我這條性命險些兒落在那山貓口裏怎麽拿住他打死這孽畜方泄此恨薛舉道不難我幫你去捉只是沒器械難以近他又不識大蟲穴在何處惟恐尋他不著阿醜道那山貓諒只在此山前後容易尋的若要器械也有薛舉道器械在何處阿醜溜人茵知碩房裏偷了一條鐵尺一把短刀又問鄰合借了兩枝筆管槍兩個徑到小蓮山上來只向峰巒曲坳樹木叢雜之處尋了一遍不見蹤迹看看天晚阿醜將器械寄在山下人家取路回莊次日二人吃罷午飯複往山上來穿東過西走遍深岩窮穀又尋不見二人疲倦暫在石磴上坐了欣力阿醜道那夜毛蟲被我燒傷了眼睛看他攛過隔河山上去了莫非窩穴在對門山裏薛舉道既然如此決有下落快快尋去二人下山頭頂衣裳手拖槍桿渡過河去爬上岸拭幹了身上穿了衣服飛奔上山老過山頂恰是一片平陽地周圍都是大竹二人穿入竹林只見地上一帶鮮血兩個隨著血迹而走行不上一箭之路忽見血淋淋一隻人手吊在樹根上阿醜道大叔你見麽薛舉道這毛蟲又在此傷人決在左近了二人直尋出山弄不見有虎複回原路走出竹林下山行近洞口猛聽得淙淙水響急擡頭看時正是那大蟲口裏銜著一隻黑犬渡河過來二人抖擻精神挺槍布定那虎不知爬上岸放下黑大把身子抖了幾抖雙爪按住狗頸正要動口不提防阿醜大喝一聲一槍刺來大蟲急舒右爪一搶那枝槍桿早被搭折阿醜例接下去跌在坡下大蟲欲張口來咬被薛舉一槍戳去大蟲棄了阿醜兜轉身來撲薛舉薛舉刺不著忙閃入樹傍大蟲撲了一個空薛舉複挺槍亂刺大蟲將前爪按一按向前撲來被阿醜跳起身拔刀向虎臀上亂砍大蟲哮吼翻身來撲阿醜薛舉乘勢盡力一槍刺人虎頰那虎兩爪向上一搭刮地一聲又將槍桿斷爲兩截反把槍頭擊人肉裏那虎負疼振怒奮力躍起從半空撲將下來薛舉乖滑忙轉入樹後躲過此時心下也覺有些慌張急招呼阿醜下水回去二人跳入河內那大蟲也踴身跳將下來沒水撲人對岸樵夫見了喊叫那兩個孩子快設上流逃命不知這兩個頑皮是一雙水葫蘆大蟲落水正中了二人之機阿醜見虎趕來鑽入水底抄轉虎後浮出水面雙手將虎尾囗住大蟲雖然力猛水中四足懸空不能著力反被阿醜拖住薛舉走水如登平地從側首劃攏飛身跨上虎背兩手揪定虎耳盡力按下水去大蟲性發吼一聲翻身亂滾將二人滾落水底岸上人跌腳叫苦呐喊驅逐那虎昂頭掉尾浮水奔轉東岸只聽見潺潺水響二人翻波踏浪跳出水面一齊跨上虎背阿五緊抱虎頸薛舉例扳虎尾用力按住大蟲不能轉動又複鑽下水去二人複滾落虎背大蟲躍出水面奮力沒近岸邊又被阿醜薛舉趕上拽定長尾倒拖轉河中虎掙去人扯來兩下掙扎多時那大蟲頭垂爪慢骨都都水灌入口內頃刻間沈落河心這二人兀自死命扯住不放兩岸的人都看得呆了有幾個漁翁膽大的下水來沒人水底摸那虎時四爪拳攏側臥水內忙喚二人放手一同遊過河西上岸取兩件好衣與二人換了送酒食壓驚本村鄰近人聽說兩個孩童打死了一隻大虎都來圍住了看個個搖頭咬指喝采衆漁戶駕舟搖至河中打撈死虎令四個健漢扛擡隨後有一二百人同送阿醜薛舉回莊此時日已平西林澹然正立在莊前見這一夥人鬧叢叢擡著一隻大蟲前來驚問其故衆人將阿醜薛舉打虎之事說了合莊人盡皆駭異林澹然又驚又喜即令獵戶將虎開剝了虎肉五臟散與衆人虎頭四爪送與張太公止留虎皮自用鄰衆作謝散去後人有詩單贊杜薛二子幼年打虎之勇詩雲天生豪傑年幼沖徒手格虎人中龍此日崢嶸露頭角四海烈烈揚英風阿醜自打虎之後每每思念冥中父親所囑公孫相會之語不敢遠出只在莊前伺候一日午飯後身子困倦坐在槐樹陰下打盹一覺睡去直至將晚未醒正鼾睡間被人叫喚驚覺站起身擦著眼睛口中咕咕噥噥罵道是那一個鳥娘養的驚醒我的睡頭可惡可惡只見一個老者立在面前笑道小官兒這等嘴尖罵人我老人家因貪趕路程天晚遇不著飯店到貴莊借宿一宵因此驚醒你體得發惱阿醜仔細看時這老者生得白淨面皮長髯似雪身軀瘦健修長容貌清古頭戴一頂漆紗道巾身穿青絹沿邊黃布道袍腰系絨縧腳著多耳麻鞋手執龍頭拐杖阿醜心下大驚道異事陰府父親所言果然不虛忙應道老公公裏面請坐适才睡夢裏失口衝撞莫怪老者道多謝多謝好一個乖覺官兒阿醜領老者進莊內禪堂椅上坐下走入方丈見林澹然稟道外有一位老者來借宿不知老爺肯容他麽林澹然道是單身還有伴當阿醜道止是一個老兒生得極其清健像道人打扮並沒甚伴當林澹然道既是孤身老者留宿一育不妨你去掌起燈來待我出去接見阿醜即在佛面前點琉璃又燭臺上點起一對紅燭林澹然步出禪堂看時兩下俱吃一驚原來老者不是別人就是杜成治之父杜悅是也當時林澹然認得是杜悅杜悅認得是林澹然兩下不期而會心下大喜敘禮已畢分賓主坐定林澹然道自從老丈分別之後經今十餘年貧僧深感厚恩未嘗頃刻敢忘不意今日偶爾相逢真是奇遇老丈一向何處棲身目今爲何事打從小莊經過杜悅道一言難盡老朽自與老爺拜別後屢屢在邊庭打探小兒成治消息聞人傳說小兒已爲都督老朽打點行裝欲赴梁國任所希圖一會不期命蹇染了瘋疾滿身麻木不能行動幾乎命染黃沙又虧永清僧弟接入庵內請醫調治整整在床睡了數年不意客歲永清又已棄世聞人傳說小兒爲救遊僧被朝廷提究一時驚死人離家破老朽恨不得身生兩翅飛去尋覓無奈染此惡疾止好朝夕悲哭而已去冬方得病體痊安可以行動今措置盤纏要到梁國訪問的實下落不想得遇老爺實出望外說罷兩淚交流林澹然亦垂淚道令郎官爲總兵都督仁威遠播朝野皆欽小僧向年曾與相會言及老丈傳與家報都督見書大慟臨別時托小僧傳上老丈或得會面速至武平圓聚不期令郎爲釋放小僧貽累身死是小僧害了令郎每思及此肝膽皆裂日前已著小徒到梁打聽寶眷消息都說道令郎身死之後有妾馮氏生得一子不幸令媳夫人和妾相繼而亡家業又遭回祿令孫不知下落小僧拳拳在心正欲著人尋訪令孫蹤迹今得老丈至此實爲天幸但可傷永清老師早已歸西未及一吊貧僧負罪實多老人家不須遠涉風霜只在敝莊安養罷了杜悅聽罷苦切不勝哭道我那兒我那孫子呵卻從何處得見你也閃得我老骨頭無投無奔說罷跌足痛哭正哭間屏風後轉出阿醜來將杜悅衣襟一把扯住叫道我的公公今日方才得見你面杜悅悲苦不禁被這阿醜扯住沒作理會處林澹然喝道這畜生又來瘋顛作怪甚麽模樣阿醜喊道阿醜不顛今日認公公也林澹然怒道這畜生誰是你公公不放手時活活打死杜悅道老爺且慢打其中必有緣故小官你爲何就認我是你公公阿醜放手道前月那夜跌死見我父親杜都督哭說林老爺救我公公杜悅性命如此這般細細囑付說公公月余後必來莊上教我相認又說我是遺腹子妾馮桂姐耽孕十七個月生的名叫過兒适才公公和老爺說及借宿緣由與冥府父親說的無二不是我公公是誰杜悅道莫非你聽得我與林老爺所講就捏出來的阿醜道我自小不認得爹娘又不知前前後後的事如何捏得出公公你不信時將左手出來看父親說公公左手背有三點壽癍杜悅笑道這小官忒也靈變見我左手拿著拐杖有三點癍就說是父親教的阿醜爭道這壽癍是我看見了父親還說公公右腳面上有一顆黑痣難道也是我看見了謊說的杜悅聽了愕然大驚對澹然道果然老朽腳面上有此黑痣真是我的孫兒了林澹然笑道世間有這樣異事阿醜初來時俺便覺有些心動不想公孫今日于此相會真乃千古奇逢杜悅將阿醜細看聲音笑貌實與杜成治有幾分相似不覺撲籟籟淚如雨下一把將醜兒抱住悲喜交集阿醜也扯住杜悅叫公公林澹然道老丈不鬚髮悲公孫奇會莫大喜事杜悅謝畢林澹然教道人擺下酒食賀喜杜悅上坐林澹然下陪阿醜打橫仍舊改名過兒三人盡歡而飲林澹然道一向感承令郎救命之恩奈無門路可報今得老丈與今孫在此實愜俺懷杜悅稱謝不已林澹然心下大喜酒闌席散著道人掌燈送杜悅耳房安歇當夜林澹然想起杜成治釋放致死情由今幸公孫相會於此養其老撫其孤亦可以報其德了但永清長老代俺視發皈禪複贈禮物心常感激欲見而不可得今又仙遊不勝傷感一夜不能安寢次早起來備辦祭禮香燭設立神位請杜悅爲祭主向西遙祭林澹然跪下親讀祭文雲維大齊天保八年七月望日沐恩剃度弟子林太空謹以香花蔬食清供於圓寂大恩師永清住持之靈曰唯師菩提早證彼岸先登舍慈航而普度群迷轉法輪而弘施戒律念太空塵俗武夫荷蒙濟拔棒喝之下收轉雄心摩頂之餘頓開覺路恩同天地以無涯欲報涓埃而莫罄敬陳菲供用展鄙私尚饗讀罷涕淚交流慟哭一場杜悅過兒和苗知碩等無不垂淚祭畢杜悅拜謝方才散了祭餘是夜三更林澹然入定之際恍惚見兩個青衣人帶著一個和尚項上系著鐵索向前稽首道承法師盛祭特此相謝林澹然跨下掉床看時正是永清長老林澹然執手悲咽問道吾師戒行清高立心正直既已謝世即當往生淨土何至於此永清道貧僧出家以來謹守清規毫忽不敢妄行只因昔年蓋造觀音堂缺少錢糧寫一紙借契往山下萬員外家貸銀二十兩那員外是一位好善長者不收文契照券兌銀與我說道不取利息止要還本不期那長者半載之後抱疾而亡其子幼小貧僧延捱未還負此一件錢債臨終之後將我押至冥司閻羅天子大怒喝罵出家人不持戒行瞞心昧己負債不償本當押赴阿鼻幸不犯酒色尚有可解暫禁本獄待填還此債方轉輪回托生陽世貧僧久系囹圄無便可出昨感法師祭禮閻羅天子放我出來道普真衛法禪師祭汝乃是汝一條托生門路著這二人弓我至此叩謝煩法師令家兄往問月庵對徒孫卜了性說取我那一紙北山弄口的田契原田五畝價值四十餘銀送至萬員外家裏說此一段因果其院君必然收領若得如此則貧僧有托生之機乞法師留神萬萬莫誤林澹然聽罷惕然驚駭應允道明日即使令見前去不必憂慮又與青衣人役道看山僧薄面去了繩索那二人道禪師嚴命焉敢有違即取下鐵索永清長老千恩萬謝作別回去林澹然方才醒悟次早就對杜悅說知杜悅悲慘不已打點行囊就央苗知碩作伴即刻起程不一日來到澤州析城山下徑進問月庵卻好蔔了性迎著見禮問道杜老太貴恙痊可說往武平郡尋覓令郎何以至此杜悅將永清長老負債托夢與林澹然取契情由說了一遍蔔了性大驚一面整飯管待一面取契與杜苗二人同至萬員外家對院君拜還說此情由院君歡天喜地收了田契再三留住酒飯杜悅等辭謝回庵與蔔了性作別取路回莊覆了林澹然林澹然大喜夜間又夢永清長老來作謝眉開眼笑不是以前愁苦形像向前道貧僧荷蒙法師教度今將托生四青州府中富家爲男向後還有相見之日林澹然再欲問時早已驚醒自此以後杜悅留在莊裏過活時序易遷光陰迅速又值仲秋天氣城內張太公著家憧來說先生開館接薛小官讀書林澹然即打發過兒與薛舉同進城去攻書杜悅歡喜自送孫子到館中來與先生相見禮畢獻上禮物求先生與過兒取名先生即取名爲杜伏威杜悅自回莊去不在話下卻說這杜伏威行動百般伶俐但到讀書磕睡就來況兼甚是頑劣只待先生回去就和薛舉撲交要拳攀梁溜柱先生頻頻責罰二人煩惱暗中商議薛舉道叵耐先生無狀屢屢責我兩個此恨何以報之杜伏威道有一妙法弄這老殺材管教他命在須臾薛舉道這老猾賊焉能彀擺布得他死杜伏威道要他死何難但系師長於心不忍止令他死去還魂泄我二人之氣我識得一種草藥甚青翠可愛是一牧童教我的生在城外一座土山上他說這藥名爲鬼頭塞腸草第一厲害譬如怪這個人將這草抹在他溺桶上那人放溺時這草的毒氣就鑽入肚裏去立刻肚腹作腫前後水火不通不消三二日斷送一條性命或擦在他褲子上也好我問他害人性命也不是妙藥牧童說另有解藥如若騙人脹了一二日要解時用糞清汁吃下登時可解我把這藥草緊緊記在心裏如今老死囚苦苦與我作對不如將此草奉敬他一奉敬即報了此恨了薛舉道藥草卻在城外怎地一時取得杜伏威道趁今晚趕出城明早取了藥草登時奔進城來尚不爲遲薛舉道果然如此甚妙快去快來杜伏威即抽身執開腳步臨晚闖出城外時天氣尚熱在山凹裏蹲了一夜待天色微明上嶺拔了草藏在抽裏依舊取路奔入城來卻說先生侵早起來不見杜伏威問張善相杜伏威何處去了張善相道不知問薛舉也道不知直到辰牌時候杜伏威喘吁吁地來了先生喝道你不讀書卻往何處去閑耍杜伏威道學生昨晚在門首見莊內道人來城裏買水果說我公公身子不健學生心下計念公公年老連晚出城探望幸而已好今早林師太著我進城來昨晚心忙不曾稟過先生乞饒恕這一次先生道瞞我出城本該重責聞公公有病連晚問安尚有孝順之心今次饒你快去讀書杜伏威將脖項縮了幾縮舌頭伸了兩伸且去哼哼地讀書捱到日午先生吃飯杜伏威踅入先生臥房裏掀開馬桶蓋將袖中藥草揉爛塗在馬桶四圍沿上依舊蓋了複身人學堂來心中暗想這草藥未曾試過不知有靈應否且看何如再做計較半日無話看看天色將晚先生進房裏去方便坐在馬桶上只覺得腿和陰子屁孔就如有物辣的一般刺得生疼先生立起身來看時馬桶又是潔淨的複坐了欲大解時掙了半晌掙不出一些要小解時掙得面紅耳脹撒不下一點先生心下大驚道這又是作怪爲何水火俱閉了不多時陡然陰囊脹大如鬥腰腹作疼兩腳移動不得只得上床睡了捱至更深愈覺疼痛不止漸加沈重正是天有不測風雲人有暫時禍福畢竟先生性命何如且聽下回分解
