即至西房回覆林澹然澹然微微冷笑道今夜天清月朗又是中秋他必和那淫婦登樓玩賞做個人月雙圓故此推託不來我有主意在此了分付廚下蔬食整備完時來對俺講看看天色漸暮但見紅日西沈冰輪初湧宋賢蘇東坡有詞一首名念奴嬌單道這中秋明月的妙處憑高眺遠見長空萬里雲無留迹桂魄飛來光射處冷浸一天秋碧玉宇瓊樓乘鸞來去人在清涼國江山如畫望中煙樹歷歷我醉拍手狂歌舉杯邀月對影成三客起舞徘徊風露下今夕不知何夕便欲乘風翻然歸去何用騎鵬翼水晶宮裏一聲吹斷橫笛管廚道人來稟蔬食果品俱已齊備林澹然分付送過東房鍾住持花園中去道人即忙打點送到鍾守淨花園裏來擺定鍾守淨吃了一驚隨後林澹然也到二人稽首林澹然道小弟今日辦得一味蔬菜請師兄玩月聞貴體不安故送至此閒談片時慶賞佳節兼得問安請教玄理鍾守淨道多承厚愛但賤體染疾專好靜坐故勞枉駕心實不安林澹然笑道弟兄之間何出此語二人坐下林澹然叫行童斟酒鍾守淨道師兄忘矣小弟向來不曾開戒何勞賜酒林澹然笑道師兄請此一杯小弟有片言請教鍾守淨笑道如來五戒以酒爲先小僧自來不飲豈可擅破佛戒此酒決不敢領若有見教處但講何妨林澹然道小弟不知釋教戒酒之義乞吾兄見教鍾守淨道師兄又來取笑小小童子一空入門便知五戒師兄乃高明上人怎麽反下問於小僧林澹然道五戒之說小僧豈不知之但酒乃先賢所造天有酒量地有酒泉人有酒聖雖仲尼亦道惟酒無量但不及亂耳酒可以和性情合萬事饗天地格神明怎地如來反以爲戒鍾守淨道原來師兄有所不知人之敗德亂性莫酒爲甚出家人一耽此物焉能煉性參禪故我佛以爲首戒林澹然道這個極戒得是了經雲色即是空空即是色色之一字正合空字之義如何我佛反又以爲戒這個只恐戒得不是些鍾守淨口中不講心下暗忖道畢竟此事被他識破言語來得蹺蹊只得硬著口答應道彼大菩薩六根清淨四大皆無如蓮花出污泥中亭亭不染方可具色空空色之解我輩初學立腳未定一犯色界永墮阿鼻然各人自作自受我與你莫要管他林澹然拍手笑道師兄講得是管甚閒事且和兄看看月色何如鍾守淨道最妙林澹然命將桌子移在太湖石邊林澹然自斟酒鍾守淨自啜茶兩個坐了一會一面玩月一面把閒話支吾看看坐到更深皓月當空並無一點雲翳果然好個中秋良夜鍾守淨心如刀刺不能脫身與黎賽玉並肩玩賞有詩爲證素影映秋山滿天風露寒樓頭空悵望禪室淚潸然林澹然不用行童斟酒自釃自飲吃得興豪將鍾守淨這一樁心事接納不下欲要講破又不好明言心下想了半晌眉頭一蹙計上心來問道師兄那做佛頭的趙蜜嘴一向來麽鍾守淨道許久不見師兄問他則甚林澹然道小僧久聞這趙婆是個女張良今有一事欲要見他偶爾問及鍾守淨滿面通紅心頭撞鹿只得把他事胡遮林澹然又道向日師兄講有甚麽夢兆買得王侍禦房子又做了攘災功德這夢兆果是實麽鍾守淨道已往之事不必提起且與師兄玩月林澹然佯醉拍手笑道師兄你看好月色呵明而且清真賽過玉也鍾守淨聽了這話愈覺坐立不安心下思量這樁事諒來瞞他不過了不如和他講知省得如此點綴消遣立起身來也笑道小弟之事正欲告罪于師兄法座不才一時被色欲所迷陷入火坑急忙擺脫不下師兄諒已覺照適間見教使小僧愧赧無地這也小事容小弟懺悔望師兄海涵誓當重報林澹然摸著肚子笑道兄言差矣俺和你義同手足禍福共之兄今幹下這壞法的事來外人豈有不知小弟不言便非同宗之義你俺受朝廷眷顧大恩上及公卿下及土庶人人敬仰個個鐵尊都只爲這德行二字兄今一旦惑於女色儻若今上知道取罪匪輕不惟進退無門抑且把僧家體而喪盡王法無情地獄難免十餘年戒行一旦成灰徒貽話靶小弟不得不苦口直言兄勿見怪一席話講得鍾守淨默默無言呆了半晌謝道小僧知過了承教承教勉強又坐一會林澹然令道人收拾杯盤作別回房有詩爲證幾句良言利似刀姦淫禿子律難逃受恩深處多成怨禍福無門人所招林澹然自回西房去了月色沈西滿天風露卻說鍾守淨走入禪房裏也不思睡點著一盞燈和衣而坐心下輾轉思量林澹然所言憂疑不決欲要棄了這婦人改行從善心裏實捨不得如花似玉美嬌娃欲待不聽林澹然之諫又恐聲揚起來難以自立千思萬想躊躕一夜不睡比及天明又睡著了直至巳牌起身茶飯也不吃只在禪堂裏走來走去就如中酒的一般好悶人也不覺天色又晚吃了一盞清茶精神困倦正在尋睡心下又想著黎賽玉昨夜必然等我去賞中秋見我不去必生疑恨且往牆外佛堂中一看再睡不遲悄悄地走入王侍禦的房子裏一眼看著樓上立了好一會猛聽得呀的一聲樓窗開了鍾守淨急擡頭見那人兒在窗口將手相招鍾守淨一見卻如攝了魂靈去的一般不覺手舞足蹈掇過梯子來依舊爬將上去賽玉纖手相扶走入樓中連罵道好負心的賊禿昨宵教我整整等了一夜今日好不耐煩怎地這等時候要我招方才上來莫非你心變另敘上個人兒了鍾守淨道豈敢心變焉有他情講起來令人煩惱殺人黎賽玉道端的爲何你且細講來鍾守淨歎了一口氣不做聲黎賽玉道我曉得了想是你口兒不謹或做事不密被人知道了故此欲言不語你對我實說何妨鍾守淨點著頭道不必講了你聰明人猜的不差正爲昨晚我安排肴撰只等候人睡靜了來和你取樂以賞中秋月下佳期畫樓雙美不想西房住持林澹然天殺的邀我賞月你想我有何心緒與他扯淡推病不去他又移了酒果到我花園裏來閒話之中反被他頻頻譏諷我與你被窩裏的事情依他講就如眼見因此我被他消遣忿氣難當一夜不睡今特來與你商議一個長便不知怎的是好黎賽玉笑道何必愁煩男子漢家好沒主意你若怕他言語時只索與我分離罷了若有心和我久情相處何慮他人議論鍾守淨道不然承娘子相憐垂盼小僧雖粉身碎骨難忘美情只要地久天長豈懼閒人說話只是林澹然這廝娘子還不知他極是剛直比諸人不同我倒有幾分畏他況是聖上敕賜的副住持倘或暗中構釁那時奪了我的權壞了我的事以此心下憂疑豈有抛撇娘子之理黎賽玉道我豈不知他是副住持向來做人執傲剛愎不得人意如今你須假意趨迎比前更加親密委曲奉承不要忤著他便是已下行童使用之人也須好意相看倘遇著個便兒你在皇上前暗用讒言逐他出寺若得除了這人寺中已下之人再後誰敢多口我再和你任情快樂複何慮哉鍾守淨快活道還是我的妙人兒大有見識使小僧如夢方覺自古道無毒不丈夫待我暗裏用些計策趕他出寺便了正是明槍本易躲暗箭最難防畢竟鍾和尚用何計策逐林澹然出寺且聽下回分解第九回害忠良守淨獻讒逃災難澹然遇舊詩曰萬乘巍巍勝法王翻持異教壞綱常奸婪禿豎居華屋忠讜真僧竄遠方沽飲酒家逢故舊燒燈窗下訴衷腸通宵說到知音處暫向幽閨躲禍殃話說鍾守淨聽了賽玉之言不勝快樂重剔銀燈再整酒肴並肩而坐你一口我一杯直吃到更盡興濃脫衣交頸二人大展酒興有三字句爲證個中情不可說連理技雙鳳穴軟如綿白似雪嫩過酥光如月雨自來雲自接又不泄又不歇又不疲又不說兩般人各有悅所以然心固結夜既分情難竭鍾守淨天未明即起來穿衣回去來往既久寺中僧衆無一個不知其間有幾衆老成囗黎每每向林澹然告訴鍾住持做下這般非禮聖上一知爲禍不小乞住持做主勸化他改過方好林澹然道汝衆人毋得多言自古眼見是實耳聞是虛鍾住持是個有操行的人恐無此事縱或有之亦須隱晦不可播揚漏泄壞了本寺體面衆僧見林澹然分付皆不敢多言嗟籲而退林澹然屢問來真打聽消息知鍾守淨不改前非心下暗忖道俺若再阻他時反招其怪是不知機了姑待數月如或不俊俺只索離了這寺雲遊方外免使禍及有何不可閒話休題卻早秋殘冬到又是十月天氣十五日乃是下元令節解厄水官聖誕前一日梁武帝差兩員內官至妙相寺傳旨知悉次日禦駕親臨本寺燒香鍾守淨預出曉諭令合寺大小僧衆次日五更沐浴焚香整肅衣冠打點迎候禦駕次早鍾林二住持在寺中焚香點燭懸花結采灑掃殿堂撞鐘擊鼓打點齋供俱已齊備到辰牌前後飛馬來報禦駕出五鳳門了鍾守淨林澹然忙出山門一箭之地迎駕俱頭戴五佛毗盧帽身穿蜀錦采繡袈裟足穿僧鞋率領寺中衆多和尚排列得斬斬齊齊少頃禦駕已到遠見前列扈駕羽林軍後是文武百官擁護梁武帝端坐龍車頭戴沖天嵌寶金冠身穿素色袞龍袍腳踏龍鳳履腰系碧玉帶宦官儀從不計其數緊隨鑾駕望妙相寺而來鍾守淨等遠遠伏道迎接武帝至山門下了輦步行鍾守淨等衆官都跟隨入大雄寶殿來衆僧多官侍立兩班儀從屯紮丹墀羽林軍屯於寺外武帝上了殿即命脫下龍袍換了禪衣卸下朱履換一雙素鞋除下金冠戴一頂素絹軟翅巾腰系一條黃絨雙須縧手上圈一串明珠穿成的念珠乃是道家打扮頂禮諸佛已畢殿中擺一張素木交椅方才坐下鍾林二住持率領衆多和尚正待朝賀武帝開言道今日下元令節朕專爲齋供諸天開講佛法衆僧不必行君臣之禮鍾守淨等謝了恩俱各向前稽首行釋教禮左首一個繡墩欽賜鍾守淨坐右邊一個竹墩欽賜林澹然坐二僧俯首不敢就坐武帝道朕正要與二卿談論佛道毋得如此拘束賜卿坐下無妨二住持稽首謝恩即脫了錦繡袈裟換卻禪衣然後坐下文武官員與衆僧皆兩旁侍立鍾守淨獻茶已畢武帝問道今日乃水官大帝壽誕可曾齋供否鍾守淨合掌答道請佛尊天侵晨俱已齋供過了武帝又道朕于先年曾在同泰寺設四部無遮大會聽道林支長老開講佛法甚合朕心朕幕釋理玄微凡欲出家修焚與支長老傳其衣缽無奈衆卿以錢億萬苦苦奉贖表請還宮朕彼時立志不回群臣再三上表朕不得已姑且還朝理政切思身爲萬民之主富貴極矣光陰迅速苦海無邊不早回頭後悔何及朕一心只要皈依佛法往生淨土衆臣苦諫將朕身羈絆至今躊躕未決二卿可爲朕指迷使朕早登覺路鍾守淨躬身道陛下貴爲天子富有四海享無疆之福萬民樂業天下升平此雖是德政所孚亦由前生種成善果所以今世爲太平天子先覺有雲欲知來世因今生作者是陛下雖洪福齊天然亦不可不修如來雲帝王人中尊貴自非宿福何以能然若比轉輪聖王猶是鄙陋陛下欲證菩提回頭是岸群臣之諫無非各盡其道而已陛下何必躊躕武帝聽罷大喜點頭道卿言句句慈航甚合朕意右邊林澹然低頭不語武帝道朕特爲與二卿講道而來卿獨無言何也林澹然頓首奏道臣愚不諧禪理但聞開闢以來歷代明君聖主皆以孝弟治天下名垂不朽聲施無窮未聞皈依釋教而成佛者也臣等子然一身內無父母妻子之累外無天下國家之寄故可以出家了此本身事業陛下爲萬乘之王宗廟社稷子孫黎民萃於一身當法先王之道親賢遠奸行仁政以覆育蒼生使天下樂堯舜之世子子孫孫瓜瓞雲仍萬代繼統豈可披緇削髮效匹夫之所爲乎況今東魏存覬覦之心南齊生侵掠之意陛下不理國政倘百姓叛于內敵國乘於外臣恐金質之國家非複陛下有也臣愚不識忌諱冒死上言伏乞聖鑒武帝聽罷俯首沈吟鍾守淨見林澹然話不投機心裏暗想不趁這機會挑動皇上趕他離寺更待何時即合掌上前道林太空之言差矣萬歲欲皈依如來棄富貴而避輪回割恩情以歸覺路這正是智過百王勇超千古廣大智慧登彼岸也我與你合當贊瓤爲何反出此言以阻聖意甚非臣子愛君之心武帝原有幾分不樂又聽鍾守淨諂佞了這幾句愈加不喜拂衣而起林澹然再欲分疏武帝已移步看佛像去了有詩爲證忠言逆耳不堪聽朝內無人敢諫爭身死國亡天下笑披鱗餘得一真僧林澹然心中暗思鍾守淨這廝好生無理适才言語分明是離間之意暫且容忍看他怎生排陷俺若再苦苦諫時眼見得落他圈套之內一面忖度一頭觀鍾守淨動靜只見武帝步入側殿裏去止有鍾守淨緊緊隨侍並內監數人武帝問殿后還有甚麽殿宇鍾守淨躬身答道殿后就是後殿次後是排堂香積廚方丈各僧房庫房東西兩戾之內俱有太湖石假山園林花卉池閣武帝道朕今日不回宮了且在寺中一玩夜間還要與卿講參悟之訣卿代朕傳旨發放衆臣明日早朝俟候鍾守淨領旨出殿傳諭衆裏散去明早候駕止留宦臣等侍衛衆文武官員儀從聽了聖旨各各嗟籲而散這寺裏管廚和尚午齋已備稟知鍾守淨守淨迎武帝至禪堂進午齋武帝分付衆僧各自回房止留卿一人伴朕林澹然和衆僧各自散了武帝在排堂坐定獨鍾守淨一人侍陪內監等侍立兩傍道人行者紛紛獻上齋來武帝一見盡教撤去原來盛蔬食的俱是金銀器皿況品數又多武帝不悅都教搬去止用瓦器盛一味素菜瓷碗盛一著粗飯鍾守淨領旨陪侍吃罷君臣二人又談經說典看看傍晚晚齋已備武帝止住不用只呷了一碗清湯林澹然率領衆僧同在禪堂外侍立武帝又分付道朕與鍾卿在方丈中打坐究竟些靜裏禪機衆卿各自方便不必在此伺候衆和尚依舊散去林澹然自回西房心裏想著鍾守淨做下若大犯法之事不思改過反欲譖俺日間之言奸心畢露設或暗中再進讒言俺老林必遭奇禍須令人打探消息預先準備方好著一個道人往東房密尋行童來真計議來真向前聲喏道住持爺有何分付林澹然道俺與你商量就是鍾住持那一段隱情俺于中秋賞月之夜苦口相勸彼不思自悔反怪俺言日間在聖駕前當面搶白俺一場幸聖上慈善寬容罷了倘是個急躁量窄的豈不登時受禍故俺心下不安特煩你去打探消息或有甚話頭你須急急報俺知道自有重賞來真道不須住持爺費心小人已在意了早上鍾住持對聖駕誹謗老爺小人甚是不忿适才又講許多碎話但含糊不甚明白我如今去用心竊聽倘有緊切言語即來報知講罷慌忙去了再說鍾守淨和武帝在方丈中細談細講武帝問及之言鍾守淨一一分剖對答如流武帝甚喜看看問到寺中之事武帝道朕創這妙相寺敕卿爲住持卻又早三四載了寺裏錢糧出入事務紛囂賴卿料理但不知本寺除卿與林太空之外還有能事有德行的和尚幾人鍾守淨道臣托陛下天恩寺中大小僧衆各守法度雖無出類高僧卻也循規蹈矩無敢壞事者向來肅然自從去年來了這員副住持林太空寺中法度盡被他紊亂了武帝驚問卻是怎生被他紊亂鍾守淨道陛下不知這林太空倚陛下敕賜封爲副住持又恃著有幾分武藝目中無人每每欺臣特甚臣怕失了體面亦不和他計較時常酗酒撒潑殺狗偷雞尋人廝打攪得衆僧不安臣苦勸反遭叱辱臣與他講我等出家人該清修戒律毋作非爲佛門不飲酒不茹葷不使氣才是僧家法度爲何飲酒食肉醉後淩人聖上知道必取罪戾他卻呵呵大笑起來道不妨不妨無事時佛眼相看設或聖上有一些兒傷著俺只消一紙書到東魏結連高歡要早要晚起一枝軍馬殺奔前來俺卻做個裏應外合反掌間梁地可得何況你這一干和尚乎臣聽了此言心膽皆墮屢欲奏聞陛下卻無指實不敢妄言早間阻撓陛下修焚又將東魏來壓陛下這豈是出家人的心腸奸險之極難逃陛下聖鑒今陛下問臣臣不敢隱諱伏惟早賜驅除免生後患有詩爲證不禿不毒不毒不禿顛倒是非覆亡人國武帝聽罷大怒道這廝直恁無禮卿何不早言清淨法門怎容得這般無賴所以日間出言唐突侮弄朕躬明早即差校尉拿下著樞密院官好生勘問果得實情必當梟首君臣二人說話卻被來真立在板壁後句句聽得明白驚得魂不附體急抽身奔到林澹然方丈裏卻被門限絆了一跌林澹然見來真來得慌張已知消息不好忙問你去打探有甚說話來真道住持爺不好了這場禍事比天還大忙將鍾守淨對武帝講的話及武帝大怒要拿問的言語細說一遍林澹然大驚道不期直如此害俺低頭暗想無計可施來真道住持爺不可耽擱快尋生路林澹然因這句話陡上心來便道俺趁今夜無人知覺不如及早闖出城門逃竄他鄉暫避此禍留得五湖明月在不愁無處下金鈎只是忿這鍾禿驢不過罷罷罷向後有對付他日子開箱取一錠銀子賞了來真道虧你報知救俺性命今與你一錠白銀拿去做幾件衣服鍾守淨跟前切不可露一些風聲若走透消息俺命休矣來真叩頭道住持爺此去路上保重這裏我自理會決不露風這銀子住持爺帶去路途正要盤費小人決不敢受林澹然道不必推辭了你收去俺倒放心來真道恁地只得收了老爺可作急遠離此地不然必遭羅網林澹然道俺已揣度定了你快去那禿驢尋你不見反要生疑來真道老爺講得是小人且去但不知日後還有得見住持爺的日子麽說罷垂淚叩頭而去林澹然咨嗟慨歎閉上房門急急收拾金銀書劄將幾件布帛細軟衣裳拴成一個包裹馱在背上手裏綽了禪杖走出房外將房門拽上悄悄地從側殿小弄闖出山門卻已是一更將盡這些和尚道人都在東首禪堂內俟候鍾守淨並沒一人知覺林澹然出得山門拽開步取路徑奔北門而走卻幸城門未關此時太平無事守門兵卒都去吃酒頑要並沒人來盤詰澹然忙忙如喪家之狗急急如漏網之魚趕出城外乘著月光不住腳走了半夜漸覺腳步酸軟身子疲倦心內暗思那裏沽得一壺酒來接一接力也好一步步捱到一個市鎮上還有幾家酒飯店不曾收拾但見不村不郭造一帶瓦屋茅房夾舊夾新排幾處櫃頭案子壁上挂亮爍爍明燈數盞鍋裏燙熱騰騰村醞數壺靠邊列著酒缸只只香醪滿貯正中擺開客座處處醉客酣歌照壁間畫水墨仙人招牌上寫家常便飯林澹然待要走入店裏又慮被人認得走漏消息只得耐著饑渴一直且走看看行至市稍頭見側首山坳裏影影有一道燈光射出來林澹然暗想這山坳裏燈光莫非也是個酒店且向前打一看再作道理拽步奔入山坳裏來只聽得三紅四開人聲喧嚷在那裏擲色賭錢近前細看前面數間平屋粉壁上寫著零沽美酒四字一帶門扇都是關上的後邊靠著山崗四圍土牆內藏著一所宅院門上格子眼裏射出這燈光來林澹然踮著腳格子眼裏張時看見五六個大漢靠著一張桌子賭錢哩但見一個蓬著頭饑寒不管一個舒著臂痛癢不知一個極口喚三紅一個連聲呼一色這個輸籌未討那個奪子便來睜雙眼決不轉睛擲五子只賭手快一個說還我順盆來一個說且將三亻當去大面小方隨起落鉗紅坐綠任施爲側邊一個瘦臉黑漢手裏拿著骰子正要擲下去聽得門外有人走響就在門縫裏張見是個胖大和尚站在門首慌忙丟了骰子喊叫門外有賊有賊衆人一同開門趕出看時果然是個長大和尚齊向前道你這和尚黃昏黑夜手裏提著禪杖閃在人家門首張望欲作何事林澹然合掌道貧僧不是歹人是去武當山進香的爲因貪走路程錯過了飯店宿頭一時饑渴欲求施主沽一壺素酒解渴因此驚動了列位莫怪衆人道恁地時天下人間方便第一便去叫大哥出來賣壺酒與他吃也罷衆人依舊入去賭錢林澹然立在門首等了一會內中一人叫道大哥你好睡也門外有個長老要買酒吃哩你快去賣與他只見應道來也來也腳步響一個瘦小漢子走到門外道長老要買酒請裏面來坐林澹然走入店裏側屋中揀付座頭除下包裹倚了禪杖坐下那漢子一見林澹然已自認得因衆人賭錢未散不好動問且叫酒生起來燙熱了酒傾在壺裏擺下三四個蔬菜碟子放下碗箸林澹然自斟自飲巴不得吃了起身遠遁忽見那漢子挨入賭場把一個人的衣服扯了一下那人會意便把籌馬收了走來與店主講話兩人在暗處附耳低言講了數句那人口裏道原來如此便走入場中來搶骰子那擲色的睜著眼道是我的順盆你如何來搶那人嚷道方才我與店主講得幾句話你就把我順盆奪去反講我來搶你的那擲色的道誰教你不擲且去講話待我擲這一回過去了還你盆那人大怒劈手來奪這人抵死不與二人爭鬧起來險些兒將骰盆打碎店主人勸道弟兄們不可如此破面傷情今已夜深衆人且暫歇了明日再要不明白的管頭並籌馬都交與我收著列位請回衆人道有理有理我們且去明早講話遂一哄而散止有店主與那人閉上門走近林澹然座頭邊來澹然吃酒已完正立起身取禪杖包裹要還酒錢出門二人道且莫還錢你是林住持老爺爲何半夜三更獨行至此必有大故且請到裏面講話即把林澹然直扶至後頭內室裏坐下澹然道我是過往行腳僧人武當山進香去的那裏是甚麽林住持你二人素不相識卻差認了店主道住持爺你記得昔日夜間來寺中打劫金銀爐臺的這夥賊麽澹然聽了這句話猛然省起道足下莫非亦在其中敢問高姓大名李秀道小人姓李名秀這個兄弟姓韓名回春去歲十月初九夜間同臨寶刹蒙老爺大恩饒恕又承賞與諸人銀兩小人買得這一所房屋移在此間開酒店今日豐衣足食皆出老爺恩賜某等無以報德各家俱立牌位寫思爺大名早晚侍奉香火祈保恩爺壽年千歲身康體健不想今日親身降臨實是天字第一號的喜事快叫渾家來拜了恩爺林澹然止住道不必如此慈悲救度乃出家人分內之事何勞過謝李秀又道恩爺實爲何事背包提杖黑夜獨行必有變異林澹然道若他人跟前也不敢實講既是二兄相知在此講也無害將鍾守淨奸黎賽玉及勸諫招怨鍾守淨讒言嫁禍今欲遠逃避難之情訴說一番李秀失驚道有這等事不要講別的好處只那夜恩爺救了他性命此思此德重若丘山一世也報不盡哩爲何反生讒言要害爺爺性命這貪財好色背義忘恩的禿賊小人實是容他不得若依小人之意先開除了這賊然後逃避不遲林澹然道不然這廝乃聖上所寵若殺了他即是欺君逆主反爲不忠且今日殺他不及了不如遠避潛身天理自有報應李秀道雖然如此小人心下只是不忿一面叫渾家整治現成酒肴請澹然上坐二人兩邊側坐相陪酒過數巡李秀問道如今恩爺欲往何方避難林澹然道俺欲依舊回魏國去只愁路上阻滯難行李秀道老爺不棄不如且在小人家裏暫住幾時再做區處林澹然道你這去處怎的藏得俺身明早皇上不見俺時必然差官著落地方人役遠近搜捕風聲一露禍及於你今夜趁未有人知覺急離此地便了韓回春道爺爺既執意要去時小人兄弟兩個護送爺爺到魏國何如林澹然道這更是昭彰了俺單身走路欲行即行要止便止縱遇關津盤詰自有路引文憑遮掩若和爾等同行動人耳目如何脫身李秀道小人今日得會爺爺喜從天降不意匆匆又欲離別惟恐後會難期還留爺爺在此暫避數日看一個下落然後去的是不然怎地放心得下小人這所在雖近官衢頗爲隱僻一時沒人尋得著若有差錯小人舍一家性命救恩爺出去尊意若何林澹然笑道承兄好情甚是感激只怕六耳難謀終須露泄況且你這裏窄逼無藏身之所怎生教俺坐立得穩李秀道小人等雖在賭博場中生活倒也個個重義疏財同心協力不要講爺爺是我們大恩人便是萍水相逢落難的人瓦自都有扶持他的心腸今日爺爺恁般大事誰敢走透消息若這裏沒處藏身時小人也不敢相留我引爺爺去看一個所在盡可藏躲莫講三五日縱是三五個月也躲得過林澹然道既如此這所在且待俺一看李秀執燈領林澹然同進臥房裏叫渾家過來拜了將燈放在桌上對林澹然道爺爺要藏身避難這大廚下極妙林澹然笑道這廚下何以容身又來取笑李秀韓回春將廚擡開廚下有一塊四方青石李秀用棍撬開林澹然細看原來是一個地窖子韓回春執燈李秀扶林澹然走入裏面四圍都是磨磚砌就並無一點塵穢側首有洞通著地氣不拘晝夜常要點一盞燈動用傢夥床帳桌椅窖中全備林澹然看了點頭道這所在亦可安身但只是悶人些個怎生過得李秀道這也不難如朝廷差人捱查搜捉得緊爺爺只得在這裏藏身不然只消在小人臥房裏坐地待事體寧靜後從容定計遠行卻不是好林澹然道承見教甚好但攪擾尊府不便李秀道我的爺爺怎地講這攪擾二字便是將小人身子與渾家賣了供奉恩爺也是甘心的韓回春作別要去林澹然分付道兄去可傳知諸友凡立俺牌位者速宜燒毀不然殃必及身韓回春領命而去李秀在側房內鋪疊床帳服事林澹然睡了有詩爲證從來積德是便宜人善人欺天不欺疇昔若非恩惠普何能到處免危機卻說武帝和鍾守淨談了半夜覺得困倦就在排床上閉目假寐次日五更鍾守淨已聞報林澹然走了未敢奏聞武帝醒來只聽得鐘鼓之聲滿朝文武擺下鑾駕都來寺裏請武帝還朝武帝步行至大雄寶殿衆臣朝見已畢一同跪奏道陛下皈依佛道雖爲美事但國不可一日無君社稷爲重請陛下還朝理政臣等不勝俊驚之至武帝道朕修行之意已決煩卿等協忠輔佐太子登基以理國事便了衆裏又懇懇奏道千歲雖然聖哲奈未禪大位未告天地宗廟未詔天下軍民臣等焉敢造次擅立新君乞萬歲回朝再議此事鍾寺淨向前俯伏道陛下暫且回朝綜理國政萬機之暇仍可修持三寶此乃兩全無害待萬歲壽過八旬然後禪位削發以完正果伏乞聖裁武帝道卿言甚善朕今暫且回朝衆文武齊呼萬歲尚衣監進上冕服武帝卸卻紗巾依舊戴上冕旒著了袞袍穿了龍鳳履稽首佛像上輦起駕卻忘了拿問林澹然一節事鍾守淨急俯伏駕前奏道副住持林太空昨夜逃竄不知去向武帝驚訝道這廝卻緣何知風逃了鍾守淨奏道蒙聖旨要拿問這廝不知怎生便知風連夜逃竄臣料此去必投東魏乞陛下及早追擒尚未去遠武帝立刻傳旨差駕前軍騎飛馬追捕梟首只見一大臣襆頭象簡金帶紫袍移步向前連道不可不可衆人看時卻是禮部侍郎程鵬諫道這林太空素有德行秉志堅貞侃直敢言剛勇不屈陛下豈可因一言而即加擒戮恐非待賢之初意也乞少息雷霆緩緩追究諒亦不敢爲害急則速其入魏矣武帝不語鍾守淨高聲道程侍郎何故縱賊養奸以資敵國這林太空原系東魏武夫因得罪于魏主削髮逋逃到此聖上不知降天恩敕這廝做個本守副住持實已過分進寺以來舊性不改誇己英雄欺壓僧衆常誇魏主的賢能暗通書信今日逃回東魏我國虛實他已盡知若助魏主興兵侵擾邊界爲害不小況這廝有萬夫之勇正宜趁他孤身獨行離此未遠差鐵騎追上剿除去卻心腹大患若今不殺任彼遠逃是縱虎歸山放龍人海日後悔無及矣有詩爲證去讒並遠色二者原相關古來貪色者未有不工讒武帝原是沒主意的官家聽了鍾守淨讒言反責程侍郎道卿言幾誤朕事叱退程鵬差驃騎將軍王言帶領鐵騎五百限一晝夜要追林太空轉來過限究罪不貸又敕翰院頒詔自京城以及外郡州縣各衙門官畫影圖形捱家搜捕逃僧一名林太空又著中書省官寫下榜文遍處張挂有能拿得林太空投獻者官給賞銀三百兩如窩藏在家搜出全家處斬又特旨差官提晉陵郡郡丞丘吉勘問舉薦失人之罪武帝頒旨已罷起駕回朝正是饒君走遍焰摩天腳下騰雲須趕上不知林澹然這番怎地脫身且聽下回分解第十回貪利工人生歹意知恩店主犯官刑詩曰跬步之中有戈矛小人之中有君子神蛟失水欲張羅野豕突籬鹹齧指一介村夫胡不驚周旋甘以身爲市夫寧爲私不畏公詢是土爲知己死話說王驃騎領了聖旨將馬軍五百分爲二處自領二百五十軍徑出北門另委部下家將盧德鄰領二百五十軍奔出西門分頭追趕再說各郡府縣官員見了上司批文奉聖旨追捕逃僧一員林太空系謗君重犯十分緊急即忙發下六街三市各村裏保鄉正捱查捕捉如風火一般搜捕將來這江寧縣乃建康所屬縣分縣尹祝鵾聞知此事心下慌張當堂點委緝捕使臣巡兵民壯至京都內外遍處捱查不拘庶民官宦國戚皇親庵觀寺院捱家搜捉果然是山搖地動鬼哭神愁惱得滿城百姓遍村入戶不安生理但見做公的成行逐隊手內拿器械麻繩傳令的快馬如飛一路上鳴鑼擊鼓家家搜檢那管臥房內室徑入來揭帳翻床戶戶捱查縱是宦族富家也要去敲門擊戶睜著眼到處行兇倚著勢隨方嚇詐中意的飲酒食肉起身時還索鈔取錢拂意的擄袖揮拳動口處是窩家賊黨攪得六家沒火種都來四境不平安再說林澹然被李秀苦苦留住在家雖然坐在房裏心下憂驚不決侵晨捱到午午捱到晚度日如年只聽沸沸地門外有人捱查尋究軍馬之聲喧嚷不絕林澹然如坐針氈十分憂悶忽見李秀奔入房中連聲道恩爺禍事了朝廷頒下聖旨附近郡縣村坊市鎮張挂榜文限三日內務要尋獲爺爺投獻窩藏者全家處斬又差王驟騎帶領鐵甲軍五百四散追趕半日之間伺止三五起人搜尋過去事已至急爺爺暫且在窖子內藏躲待後再尋活路林澹然道俺已分定一死奈何貽累足下一家耽驚受怕怎生是好李秀道且不要講這話急忙撬開石板點了燈林澹然走入裏邊李秀拿些乾糧餅食付與澹然充饑依舊將石板蓋上移過大廚放在上面一連兩晝夜不住的有人闖入李秀前後房屋搜檢自古說官無三日緊這各處官吏巡捕軍兵一連辛苦了兩晝夜人人疲倦個個懈弛也不比在前緊急了這王驃騎兩處人馬皆渡大江一枝往和州追趕一枝往揚州進發一晝夜馬不停蹄追上三百餘裏不見一些蹤迹只得收回軍馬進朝覆旨待罪話分兩頭且說李秀酒店中新換了一個酒生姓陳小名阿保做人狡猾不端從進店之後便偷摸物件況又躲懶貪嘴被李秀搶白了數場當日因店內缺少酒藥李秀取一二十貫錢令陳阿保進城去買酒藥陳阿保吃了早飯馱了一隻舊袋取路進城行到通濟門邊覺得有些倦了就在城門側首一條石凳上坐了歇一歇力有兩個賣草鞋的後生也坐在石塊上閑講一個道我今日偏不利市自早到午了草鞋一雙也未曾賣去好生煩惱這一個答道大哥正是偏不湊巧甚難脫手卻也惱人情緒仔細想起來我與老哥賣這些草鞋止好度日怎的得個出頭日子那一個道沒幹自古說得好囗蹺的不吃跌八字腳捉定的我和老兄命合貧窮只索苦守罷了這個道目今有一場大富貴只是你我沒福那個笑道大哥又來笑話那裏有甚麽大富貴輪得到我們這個道你原來不知如今妙相寺裏逃走了副住持林太空各門張挂榜文講有人曉得林太空投獻者官給賞銀三百兩我思量怎地待我撞得林和尚獻官這三百兩卻不是我的了那個道你我有這樣造化不賣草鞋了只好做夢二人大笑陳阿保細細聽得明白起身提了叉袋到鋪中買了酒藥取路出城回家一面走一面心裏暗想道我替人家做酒生理起早落夜終日勞碌吃的是粗茶淡飯一日所得工錢幾何那裏討得幾百兩銀子的快活我想日前那胖大和尚夜深沽酒主人一見就叫他是林住持散了賭場令我先睡和小韓邀他入內室講甚麽鍾守淨這不是林太空是誰決與主人有親將他藏匿在家叵耐主人無理常常欺罵我不如趁這機會往縣裏首告把這廝且去受些刑法我便得這三百兩雪花銀子娶一個標致渾家買一所齊整房子置幾十畝好田地花園討幾個丫鬟小使終日風流一生快活豈不樂哉煞強似在這裏傭工受苦又算計道且住我如今就去縣裏首告何如倘或林和尚走了去時豈不害煞阿保不如去與姐夫酌量先著一個守住了這廝然後去出首方才這三百兩是穩穩的一頭走路一頭忖度不覺行至店門首口裏兀自喃喃的自講自道李秀看見問道阿保你回來了口裏念誦甚麽鬼話除阿保方才省悟忙應道不不不我自算酒藥帳走入店裏將酒藥算明進與李秀李秀收了道你饑渴了快去吃些酒飯陳阿保進側房吃酒飯去了有詩爲證妄想錢財意不良自言自語貌張惶若非李秀機關巧俠士何由入魏疆李秀終是個機巧的人雖然一時窩藏林澹然在家心中時時擔著血海於系凡一應來往的人俱留心察言觀色以妨漏泄這陳阿保心下有了三百兩銀子打攪一刻也把持不定吃罷酒飯即站立門首呆想面皮變色李秀故意把些閒話挑撥他陳阿保口雖答應卻是半吞半吐有前沒後李秀心下甚是疑惑一面門前做著交易一面款住陳阿保不放他走開捱至天晚燙了幾壺好酒切了一盤熟牛肉上了門扇叫陳阿保到後邊房裏坐下飲酒陳阿保道今日爲何叨主人盛設李秀道你且吃酒有一樁心腹事要和你商議特意請你酌一杯陳阿保又吃了幾碗問道主人委實有甚麽事分付小人講明瞭吃得下李秀道你今日進城買酒藥可聽得有甚新聞異事麽陳阿保暗想道這廝問我甚的新聞必有緣故不如將機就機把幾句言語試探他看他如何回答即應道別無甚麽新聞但主人藏留那夜買酒的和尚在家甚是干系日前止見巡捕捱查不知道有甚賞銀今日小人進城聞人傳說有人拿得林和尚者官給賞銀三百兩我也有些不信想官府要這住持得緊故將此言哄人若見了林住持時又捨不得三百兩了李秀綽口道怎的哄人血瀝瀝榜文各門張挂有了林住持自然當官領賞今正爲這三百兩銀子與你計議那夜林太空買酒之時我已認定他了他告訴逃奔一事我想是朝廷重犯故假意款留住了希圖一場富貴親無心腹之人可以行事故此躊躕不決陳阿保此時已有幾分酒意不覺笑道不瞞主人講小人初意正欲首告林太空出來請受那賞錢享用但恐連累主人因此不敢發動不期主人先有此心李秀拍手笑道我不爲此銀子留這林和尚在此何用我和你明早同去出首領的賞銀我得七分你得三分陳阿保道若主翁肯挈帶小人時得來賞銀任憑分派小人焉敢計論李秀道既與你同行出首財帛必要分明我留養著他該得二百兩你得一百兩方見公道但此事切要機密不可泄露陳阿保道主人分付焉敢漏泄二人又吃了數壺酒陳阿保被李秀灌得大醉斜倒在桑木凳上齁齁的睡著了李秀用繩索縛住了手腳將房門鎖上忙進臥房移開廚掇過石板跳下窖子裏見林澹然細道其事又道這廝被我將酒灌醉了鎖在房內特來和爺爺酌議林澹然歎氣道事已到頭亦難回避李秀道不是這等說小人先把這狗男女殺了爺爺另生計較脫離此處便了林澹然道這一場禍患皆由前生種成罪孽今世領受俺今生死聽天大數由命豈可妄害他人性命煩足下與尊閫整頓些乾糧待夜闌人靜俺只索離此遠去惟慮難脫虎口這也聽其自然若稍遲緩立刻必遭大禍連你一家送了性命李秀忽然垂下淚來道小人只是捨不得恩人遠去便是我一家受害亦所甘心情願林澹然道不然害了你一家仍救俺不得彼此受累有何益哉或者脫得